<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Documentación técnica</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0b0b;
  color:#fff;
}

.top{
  padding:15px;
  background:#111;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

h1{
  margin:0;
  font-size:22px;
  color:#f39b2f;
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  font-weight:bold;
}

.main{
  padding:15px;
}

input,textarea,select{
  width:100%;
  margin-bottom:10px;
  padding:10px;
  border-radius:10px;
  border:1px solid #333;
  background:#111;
  color:#fff;
}

.card{
  background:#111;
  padding:15px;
  border-radius:15px;
  margin-bottom:10px;
}

a.btn{
  display:inline-block;
  padding:10px;
  background:#f39b2f;
  color:#000;
  border-radius:10px;
  text-decoration:none;
  font-weight:bold;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="top">
  <h1>Documentación</h1>
  <button onclick="volver()">Volver</button>
</div>

<div class="main">

<input id="marca" placeholder="Marca">
<input id="modelo" placeholder="Modelo">
<textarea id="notas" placeholder="Notas"></textarea>
<input id="archivo" type="file">

<button onclick="guardar()">Guardar</button>

<hr>

<div id="lista"></div>

</div>

<script>

let db;

const req = indexedDB.open("DOC_DB",1);

req.onupgradeneeded = e=>{
  db = e.target.result;
  db.createObjectStore("docs",{keyPath:"id"});
};

req.onsuccess = e=>{
  db = e.target.result;
  cargar();
};

function guardar(){

  const file = document.getElementById("archivo").files[0];

  if(!file){
    alert("Selecciona archivo");
    return;
  }

  const reader = new FileReader();

  reader.onload = function(){

    const doc = {
      id: Date.now(),
      marca:marca.value,
      modelo:modelo.value,
      notas:notas.value,
      data:reader.result,
      nombre:file.name
    };

    const tx = db.transaction("docs","readwrite");
    tx.objectStore("docs").put(doc);

    cargar();
  };

  reader.readAsDataURL(file);
}

function cargar(){

  const tx = db.transaction("docs","readonly");
  const store = tx.objectStore("docs");

  const req = store.getAll();

  req.onsuccess = ()=>{
    const lista = document.getElementById("lista");
    lista.innerHTML="";

    req.result.reverse().forEach(d=>{

      const div = document.createElement("div");
      div.className="card";

      div.innerHTML = `
        <b>${d.marca} ${d.modelo}</b><br>
        ${d.notas}<br>
        <a class="btn" href="${d.data}" target="_blank">Abrir archivo</a>
      `;

      lista.appendChild(div);
    });
  };
}

function volver(){
  window.location="app.html";
}

</script>

</body>
</html>
