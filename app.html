<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALLCALOR PRO</title>

<style>
:root{
  --bg:#0b0b0b;
  --panel:#151515;
  --panel2:#1d1d1d;
  --text:#ffffff;
  --muted:#bdbdbd;
  --accent:#f39b2f;
  --border:#2b2b2b;
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
.header{
  padding:20px;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.logo-container{
  display:flex;
  align-items:center;
  gap:15px;
}

.logo-container img{
  max-height:50px;
}

.titulo{
  font-size:22px;
}

/* BOTÓN CONFIG */
.config-btn{
  background:var(--accent);
  color:#000;
  border:none;
  padding:10px 16px;
  border-radius:8px;
  cursor:pointer;
}

/* CONTENIDO */
.container{
  padding:20px;
}

/* TARJETAS */
.card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:12px;
  padding:20px;
  margin-bottom:20px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
}

.modulo{
  background:var(--panel2);
  border:1px solid var(--border);
  border-radius:10px;
  padding:15px;
}

.modulo button{
  margin-top:10px;
  background:var(--accent);
  border:none;
  padding:8px 12px;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo-container">
    <img id="logo" style="display:none;">
    <div>
      <div id="titulo" class="titulo">ALLCALOR PRO</div>
      <div id="subtitulo" style="color:var(--muted);font-size:13px;">Centro de control</div>
    </div>
  </div>

  <button class="config-btn" onclick="irConfig()">Configuración</button>
</div>

<div class="container">

  <div class="card">
    <h2>Panel principal</h2>
    <p>Desde aquí accedes a todos los módulos.</p>
  </div>

  <div class="grid">
    <div class="modulo">Clientes<br><button>Abrir</button></div>
    <div class="modulo">Obras<br><button>Abrir</button></div>
    <div class="modulo">Planos<br><button onclick="location.href='plano.html'">Abrir</button></div>
    <div class="modulo">Presupuestos<br><button>Pendiente</button></div>
    <div class="modulo">Facturas<br><button>Pendiente</button></div>
    <div class="modulo">Agenda<br><button>Pendiente</button></div>
    <div class="modulo">Vehículos<br><button>Pendiente</button></div>
    <div class="modulo">Stock<br><button>Pendiente</button></div>
  </div>

</div>

<script>
function irConfig(){
  window.location.href="configuracion.html";
}

/* APLICAR CONFIGURACIÓN */
const cfg = JSON.parse(localStorage.getItem("config") || "{}");

/* NOMBRE */
if(cfg.nombre){
  document.getElementById("titulo").innerText = cfg.nombre;
  document.title = cfg.nombre;
}

/* SUBTITULO */
if(cfg.subtitulo){
  document.getElementById("subtitulo").innerText = cfg.subtitulo;
}

/* LOGO */
if(cfg.logo){
  const logo = document.getElementById("logo");
  logo.src = cfg.logo;
  logo.style.display = "block";
}

/* COLOR PRINCIPAL */
if(cfg.color){
  document.documentElement.style.setProperty("--accent", cfg.color);
}

/* FUENTE */
if(cfg.fuente){
  document.body.style.fontFamily = cfg.fuente;
}

/* TAMAÑO */
if(cfg.tamano){
  document.getElementById("titulo").style.fontSize = cfg.tamano + "px";
}

/* GROSOR */
if(cfg.grosor){
  document.getElementById("titulo").style.fontWeight = cfg.grosor;
}

/* MAYÚSCULAS */
if(cfg.mayus){
  document.getElementById("titulo").style.textTransform = "uppercase";
}

/* CURSIVA */
if(cfg.cursiva){
  document.getElementById("titulo").style.fontStyle = "italic";
}

/* ESPACIADO */
if(cfg.espaciado){
  document.getElementById("titulo").style.letterSpacing = cfg.espaciado + "px";
}

/* SOMBRA */
if(cfg.sombra){
  document.getElementById("titulo").style.textShadow = "0 0 10px " + cfg.color;
}

/* COLORES AVANZADOS */
if(cfg.bg) document.documentElement.style.setProperty("--bg", cfg.bg);
if(cfg.panel) document.documentElement.style.setProperty("--panel", cfg.panel);
if(cfg.panel2) document.documentElement.style.setProperty("--panel2", cfg.panel2);
if(cfg.text) document.documentElement.style.setProperty("--text", cfg.text);
if(cfg.muted) document.documentElement.style.setProperty("--muted", cfg.muted);

</script>

</body>
</html>
