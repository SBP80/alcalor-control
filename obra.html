<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Obra</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0b0b;
    color: white;
}

.header {
    padding: 15px;
    font-size: 20px;
    border-bottom: 2px solid orange;
}

.container {
    padding: 15px;
}

.input {
    width: 100%;
    padding: 12px;
    margin-bottom: 10px;
    border: none;
    border-radius: 6px;
    font-size: 16px;
}

.btn {
    width: 100%;
    padding: 15px;
    background: orange;
    border: none;
    font-size: 18px;
    margin-top: 10px;
    cursor: pointer;
    color: #111;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="header">Ficha de obra</div>

<div class="container">

<input class="input" id="nombre" placeholder="Nombre obra">
<input class="input" id="direccion" placeholder="Dirección">
<input class="input" id="tipo" placeholder="Tipo de obra">
<input class="input" id="estado" placeholder="Estado">
<input class="input" id="inicio" placeholder="Fecha inicio">
<input class="input" id="fin" placeholder="Fecha fin">
<input class="input" id="tecnicos" placeholder="Técnicos">
<input class="input" id="responsable" placeholder="Responsable">
<input class="input" id="notas" placeholder="Notas">

<button class="btn" onclick="guardar()">Guardar</button>
<button class="btn" onclick="volver()">Volver a obras</button>

</div>

<script>

let clienteId = localStorage.getItem("clienteActivo");
let obraId = localStorage.getItem("obraActiva");

let obras = JSON.parse(localStorage.getItem("obras_" + clienteId)) || [];

let obra = obras.find(o => o.id == obraId);

function cargar() {

    if (!obra) return;

    document.getElementById("nombre").value = obra.nombre || "";
    document.getElementById("direccion").value = obra.direccion || "";
    document.getElementById("tipo").value = obra.tipo || "";
    document.getElementById("estado").value = obra.estado || "";
    document.getElementById("inicio").value = obra.inicio || "";
    document.getElementById("fin").value = obra.fin || "";
    document.getElementById("tecnicos").value = obra.tecnicos || "";
    document.getElementById("responsable").value = obra.responsable || "";
    document.getElementById("notas").value = obra.notas || "";
}

function guardar() {

    obra.nombre = document.getElementById("nombre").value;
    obra.direccion = document.getElementById("direccion").value;
    obra.tipo = document.getElementById("tipo").value;
    obra.estado = document.getElementById("estado").value;
    obra.inicio = document.getElementById("inicio").value;
    obra.fin = document.getElementById("fin").value;
    obra.tecnicos = document.getElementById("tecnicos").value;
    obra.responsable = document.getElementById("responsable").value;
    obra.notas = document.getElementById("notas").value;

    localStorage.setItem("obras_" + clienteId, JSON.stringify(obras));

    alert("Guardado correctamente");
}

function volver() {
    window.location.href = "obras.html";
}

cargar();

</script>

</body>
</html>
