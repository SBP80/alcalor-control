<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Obra</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0b0b;
    color: white;
}

.header {
    padding: 15px;
    font-size: 20px;
    border-bottom: 2px solid orange;
}

.container {
    padding: 15px;
}

.campo {
    margin-bottom: 14px;
}

.label {
    display: block;
    margin-bottom: 6px;
    font-size: 14px;
    font-weight: bold;
    color: orange;
}

.input, .textarea, .select {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    box-sizing: border-box;
}

.textarea {
    min-height: 100px;
    resize: vertical;
    font-family: Arial, sans-serif;
}

.btn {
    width: 100%;
    padding: 15px;
    background: orange;
    border: none;
    font-size: 18px;
    margin-top: 10px;
    cursor: pointer;
    color: #111;
    font-weight: bold;
}

.foto, .doc {
    position: relative;
    margin-bottom: 10px;
    background: #1a1a1a;
    padding: 10px;
    border-radius: 8px;
}

.foto img {
    width: 100%;
    border-radius: 8px;
    display: block;
}

.doc a {
    color: white;
    text-decoration: underline;
    word-break: break-word;
    display: inline-block;
    padding-right: 50px;
}

.borrar {
    position: absolute;
    top: 10px;
    right: 10px;
    background: red;
    border: none;
    color: white;
    padding: 5px 10px;
    cursor: pointer;
    border-radius: 6px;
    font-weight: bold;
}

.bloque-calculo {
    margin-top: 18px;
    margin-bottom: 18px;
    padding: 12px;
    background: #141414;
    border-radius: 8px;
    border: 1px solid #2a2a2a;
}
</style>
</head>

<body>

<div class="header">Ficha de obra</div>

<div class="container">

    <div class="campo">
        <label class="label" for="nombre">Nombre de obra</label>
        <input class="input" id="nombre">
    </div>

    <div class="campo">
        <label class="label" for="direccion">Dirección</label>
        <input class="input" id="direccion">
    </div>

    <div class="campo">
        <label class="label" for="tipo">Tipo de obra</label>
        <select class="select" id="tipo">
            <option value="">Seleccionar</option>
            <option>Suelo radiante</option>
            <option>Aerotermia</option>
            <option>Radiadores</option>
            <option>Fancoils</option>
            <option>Híbrido</option>
            <option>Otro</option>
        </select>
    </div>

    <div class="campo">
        <label class="label" for="estado">Estado</label>
        <select class="select" id="estado">
            <option value="">Seleccionar</option>
            <option>Presupuesto</option>
            <option>Aceptado</option>
            <option>En ejecución</option>
            <option>Parado</option>
            <option>Terminado</option>
        </select>
    </div>

    <div class="campo">
        <label class="label" for="inicio">Fecha inicio</label>
        <input class="input" id="inicio">
    </div>

    <div class="campo">
        <label class="label" for="fin">Fecha fin</label>
        <input class="input" id="fin">
    </div>

    <div class="campo">
        <label class="label" for="tecnicos">Técnicos</label>
        <input class="input" id="tecnicos">
    </div>

    <div class="campo">
        <label class="label" for="responsable">Responsable</label>
        <input class="input" id="responsable">
    </div>

    <div class="bloque-calculo">

        <div class="campo">
            <label class="label" for="superficie">Superficie (m²)</label>
            <input class="input" id="superficie" type="number" step="0.01" oninput="calcular()">
        </div>

        <div class="campo">
            <label class="label" for="paso">Paso tubo (cm)</label>
            <select class="select" id="paso" onchange="calcular()">
                <option value="10">10</option>
                <option value="15" selected>15</option>
                <option value="20">20</option>
            </select>
        </div>

        <div class="campo">
            <label class="label" for="metros">Metros de tubo</label>
            <input class="input" id="metros" readonly>
        </div>

        <div class="campo">
            <label class="label" for="circuitos">Nº de circuitos</label>
            <input class="input" id="circuitos" readonly>
        </div>

        <div class="campo">
            <label class="label" for="mCircuito">Metros por circuito</label>
            <input class="input" id="mCircuito" readonly>
        </div>

    </div>

    <div class="campo">
        <label class="label" for="notas">Notas</label>
        <textarea class="textarea" id="notas"></textarea>
    </div>

    <button class="btn" onclick="guardar()">Guardar datos</button>

    <div class="campo">
        <label class="label" for="inputFoto">Subir foto</label>
        <input id="inputFoto" type="file" accept="image/*" onchange="subirFoto(event)">
    </div>

    <div id="fotos"></div>

    <div class="campo">
        <label class="label" for="inputDoc">Subir documento</label>
        <input id="inputDoc" type="file" onchange="subirDoc(event)">
    </div>

    <div id="docs"></div>

    <button class="btn" onclick="volver()">Volver</button>

</div>

<script>
const PIN = "1234";

let clienteId = localStorage.getItem("clienteActivo");
let obraId = localStorage.getItem("obraActiva");

let obras = JSON.parse(localStorage.getItem("obras_" + clienteId)) || [];
let obra = obras.find(o => o.id == obraId);

if (!obra) {
    alert("Obra no encontrada");
}

if (obra && !obra.fotos) obra.fotos = [];
if (obra && !obra.docs) obra.docs = [];

function guardar() {
    if (!obra) return;

    obra.nombre = document.getElementById("nombre").value;
    obra.direccion = document.getElementById("direccion").value;
    obra.tipo = document.getElementById("tipo").value;
    obra.estado = document.getElementById("estado").value;
    obra.inicio = document.getElementById("inicio").value;
    obra.fin = document.getElementById("fin").value;
    obra.tecnicos = document.getElementById("tecnicos").value;
    obra.responsable = document.getElementById("responsable").value;
    obra.notas = document.getElementById("notas").value;
    obra.superficie = parseFloat(document.getElementById("superficie").value) || 0;
    obra.paso = parseFloat(document.getElementById("paso").value) || 15;

    localStorage.setItem("obras_" + clienteId, JSON.stringify(obras));
    alert("Guardado correctamente");
}

function calcular() {
    if (!obra) return;

    let superficie = parseFloat(document.getElementById("superficie").value);
    let paso = parseFloat(document.getElementById("paso").value);

    if (!superficie || !paso) {
        document.getElementById("metros").value = "";
        document.getElementById("circuitos").value = "";
        document.getElementById("mCircuito").value = "";
        obra.superficie = superficie || 0;
        obra.paso = paso || 15;
        obra.metros = 0;
        obra.circuitos = 0;
        obra.mCircuito = 0;
        localStorage.setItem("obras_" + clienteId, JSON.stringify(obras));
        return;
    }

    let metros = superficie * (100 / paso);
    let maxCircuito = 100;
    let circuitos = Math.ceil(metros / maxCircuito);
    let mCircuito = metros / circuitos;

    document.getElementById("metros").value = metros.toFixed(0);
    document.getElementById("circuitos").value = circuitos;
    document.getElementById("mCircuito").value = mCircuito.toFixed(1);

    obra.superficie = superficie;
    obra.paso = paso;
    obra.metros = metros;
    obra.circuitos = circuitos;
    obra.mCircuito = mCircuito;

    localStorage.setItem("obras_" + clienteId, JSON.stringify(obras));
}

function cargar() {
    if (!obra) return;

    document.getElementById("nombre").value = obra.nombre || "";
    document.getElementById("direccion").value = obra.direccion || "";
    document.getElementById("tipo").value = obra.tipo || "";
    document.getElementById("estado").value = obra.estado || "";
    document.getElementById("inicio").value = obra.inicio || "";
    document.getElementById("fin").value = obra.fin || "";
    document.getElementById("tecnicos").value = obra.tecnicos || "";
    document.getElementById("responsable").value = obra.responsable || "";
    document.getElementById("notas").value = obra.notas || "";
    document.getElementById("superficie").value = obra.superficie || "";
    document.getElementById("paso").value = obra.paso || "15";

    if (obra.metros) {
        document.getElementById("metros").value = obra.metros.toFixed(0);
        document.getElementById("circuitos").value = obra.circuitos;
        document.getElementById("mCircuito").value = obra.mCircuito.toFixed(1);
    } else {
        document.getElementById("metros").value = "";
        document.getElementById("circuitos").value = "";
        document.getElementById("mCircuito").value = "";
    }

    mostrarFotos();
    mostrarDocs();
}

function subirFoto(e) {
    if (!obra) return;

    const input = e.target;
    const file = input.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = function(evt) {
        obra.fotos.push(evt.target.result);
        localStorage.setItem("obras_" + clienteId, JSON.stringify(obras));
        mostrarFotos();
        input.value = "";
    };

    reader.readAsDataURL(file);
}

function mostrarFotos() {
    const contenedor = document.getElementById("fotos");
    contenedor.innerHTML = "";

    if (!obra || !obra.fotos) return;

    obra.fotos.forEach((f, i) => {
        let div = document.createElement("div");
        div.className = "foto";

        div.innerHTML = `
            <img src="${f}">
            <button class="borrar">X</button>
        `;

        div.querySelector(".borrar").onclick = () => borrarFoto(i);

        contenedor.appendChild(div);
    });
}

function borrarFoto(i) {
    if (!confirm("Eliminar foto?")) return;

    let pin = prompt("PIN:");
    if (pin !== PIN) {
        alert("PIN incorrecto");
        return;
    }

    obra.fotos.splice(i, 1);
    localStorage.setItem("obras_" + clienteId, JSON.stringify(obras));
    mostrarFotos();
    document.getElementById("inputFoto").value = "";
}

function subirDoc(e) {
    if (!obra) return;

    const input = e.target;
    const file = input.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = function(evt) {
        obra.docs.push({
            nombre: file.name,
            data: evt.target.result
        });

        localStorage.setItem("obras_" + clienteId, JSON.stringify(obras));
        mostrarDocs();
        input.value = "";
    };

    reader.readAsDataURL(file);
}

function mostrarDocs() {
    const contenedor = document.getElementById("docs");
    contenedor.innerHTML = "";

    if (!obra || !obra.docs) return;

    obra.docs.forEach((d, i) => {
        let div = document.createElement("div");
        div.className = "doc";

        div.innerHTML = `
            <a href="${d.data}" target="_blank">${d.nombre}</a>
            <button class="borrar">X</button>
        `;

        div.querySelector(".borrar").onclick = () => borrarDoc(i);

        contenedor.appendChild(div);
    });
}

function borrarDoc(i) {
    if (!confirm("Eliminar documento?")) return;

    let pin = prompt("PIN:");
    if (pin !== PIN) {
        alert("PIN incorrecto");
        return;
    }

    obra.docs.splice(i, 1);
    localStorage.setItem("obras_" + clienteId, JSON.stringify(obras));
    mostrarDocs();
    document.getElementById("inputDoc").value = "";
}

function volver() {
    window.location.href = "obras.html";
}

cargar();
</script>

</body>
</html>
