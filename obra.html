<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Obras · ALLCALOR</title>
<style>
:root{
  --bg:#0b0b0b;
  --panel:#151515;
  --line:#2b2b2b;
  --text:#ffffff;
  --muted:#bdbdbd;
  --accent:#f39b2f;
  --btnText:#111111;
  --danger:#c94b4b;
  --fontMain:Arial,sans-serif;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:var(--fontMain);}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid var(--line);}
h1{margin:0;color:var(--accent);}
.btn-top{padding:10px 14px;border:none;border-radius:10px;background:var(--accent);color:#000;font-weight:800;}
.wrap{padding:16px;max-width:1200px;margin:auto;}
.panel{background:var(--panel);padding:16px;border-radius:16px;margin-bottom:16px;border:1px solid var(--line);}
input,select,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#111;color:#fff;margin-bottom:10px;}
textarea{min-height:100px;}
button{padding:10px 14px;border:none;border-radius:10px;font-weight:800;}
.btn-main{background:var(--accent);color:#000;}
.btn-sec{background:#333;color:#fff;}
.btn-danger{background:var(--danger);color:#fff;}
.card{background:#111;padding:14px;border-radius:14px;margin-bottom:10px;border:1px solid var(--line);}
.small{color:var(--muted);font-size:12px;}
.search{width:100%;padding:12px;border-radius:12px;border:1px solid var(--line);background:#111;color:#fff;margin-bottom:10px;}
</style>
</head>

<body>

<div class="topbar">
  <h1 id="tituloApp">OBRAS</h1>
  <button class="btn-top" onclick="volver()">Volver</button>
</div>

<div class="wrap">

<div class="panel">
  <input id="nombre" placeholder="Nombre de la obra">
  <input id="cliente" placeholder="Cliente">
  <input id="direccion" placeholder="Dirección">

  <select id="tipo">
    <option>Aerotermia</option>
    <option>Aire acondicionado</option>
    <option>Suelo radiante</option>
    <option>Caldera</option>
    <option>Otro</option>
  </select>

  <select id="estado">
    <option>Pendiente</option>
    <option>En curso</option>
    <option>Terminada</option>
  </select>

  <textarea id="notas" placeholder="Notas"></textarea>

  <button class="btn-main" onclick="guardar()">Guardar</button>
  <button class="btn-sec" onclick="cancelar()" id="cancelarBtn" style="display:none;">Cancelar</button>
</div>

<div class="panel">
  <input id="buscar" class="search" placeholder="Buscar obras">
  <div id="lista"></div>
</div>

</div>

<script>
let editando = null;

function aplicarConfig(){
  let c = JSON.parse(localStorage.getItem("configAllcalor") || "{}");

  if(c.color) document.documentElement.style.setProperty("--accent", c.color);
  if(c.colorFondo) document.documentElement.style.setProperty("--bg", c.colorFondo);
  if(c.colorPanel) document.documentElement.style.setProperty("--panel", c.colorPanel);
  if(c.colorTexto) document.documentElement.style.setProperty("--text", c.colorTexto);
  if(c.fuente) document.documentElement.style.setProperty("--fontMain", c.fuente);

  if(c.nombre){
    document.getElementById("tituloApp").innerText = c.nombre;
  }
}

function getObras(){
  return JSON.parse(localStorage.getItem("obras") || "[]");
}

function setObras(data){
  localStorage.setItem("obras", JSON.stringify(data));
}

function guardar(){
  let obras = getObras();

  let obj = {
    id: editando || Date.now(),
    nombre:nombre.value,
    cliente:cliente.value,
    direccion:direccion.value,
    tipo:tipo.value,
    estado:estado.value,
    notas:notas.value
  };

  if(!obj.nombre){
    alert("Nombre obligatorio");
    return;
  }

  if(editando){
    obras = obras.map(o => o.id === editando ? obj : o);
  }else{
    obras.unshift(obj);
  }

  setObras(obras);
  limpiar();
  pintar();
}

function editar(id){
  let o = getObras().find(x => x.id === id);
  if(!o) return;

  editando = id;

  nombre.value = o.nombre;
  cliente.value = o.cliente;
  direccion.value = o.direccion;
  tipo.value = o.tipo;
  estado.value = o.estado;
  notas.value = o.notas;

  cancelarBtn.style.display="inline-block";
  window.scrollTo(0,0);
}

function borrar(id){
  if(!confirm("Borrar obra?")) return;
  let obras = getObras().filter(o => o.id !== id);
  setObras(obras);
  pintar();
}

function cancelar(){
  limpiar();
}

function limpiar(){
  editando = null;
  nombre.value="";
  cliente.value="";
  direccion.value="";
  notas.value="";
  cancelarBtn.style.display="none";
}

function pintar(){
  let lista = document.getElementById("lista");
  let txt = buscar.value.toLowerCase();

  let obras = getObras().filter(o =>
    (o.nombre + o.cliente + o.direccion + o.notas).toLowerCase().includes(txt)
  );

  lista.innerHTML = "";

  obras.forEach(o=>{
    let div = document.createElement("div");
    div.className="card";

    div.innerHTML = `
      <b>${o.nombre}</b><br>
      <span class="small">${o.cliente} · ${o.direccion}</span><br>
      <span class="small">${o.tipo} · ${o.estado}</span><br>
      <div style="margin-top:10px;">
        <button onclick="editar(${o.id})">Editar</button>
        <button class="btn-danger" onclick="borrar(${o.id})">Borrar</button>
      </div>
    `;

    lista.appendChild(div);
  });

  if(!obras.length){
    lista.innerHTML = "<div class='small'>No hay obras</div>";
  }
}

function volver(){
  location.href="app.html";
}

buscar.oninput = pintar;

aplicarConfig();
pintar();
</script>

</body>
</html>
