<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Obra</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0b0b;
    color: white;
}

.header {
    padding: 15px;
    font-size: 20px;
    border-bottom: 2px solid orange;
}

.container {
    padding: 15px;
}

.campo {
    margin-bottom: 14px;
}

.label {
    display: block;
    margin-bottom: 6px;
    font-size: 14px;
    font-weight: bold;
    color: orange;
}

.input, .textarea {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 6px;
    font-size: 16px;
}

.textarea {
    min-height: 100px;
}

.btn {
    width: 100%;
    padding: 15px;
    background: orange;
    border: none;
    font-size: 18px;
    margin-top: 10px;
    cursor: pointer;
    color: #111;
    font-weight: bold;
}

.fotos {
    margin-top: 15px;
}

.foto {
    position: relative;
    margin-bottom: 10px;
}

.foto img {
    width: 100%;
    border-radius: 8px;
}

.borrar {
    position: absolute;
    top: 10px;
    right: 10px;
    background: red;
    border: none;
    color: white;
    padding: 5px 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="header">Ficha de obra</div>

<div class="container">

<input class="input" id="nombre" placeholder="Nombre obra">
<input class="input" id="direccion" placeholder="Dirección">
<input class="input" id="tipo" placeholder="Tipo de obra">
<input class="input" id="estado" placeholder="Estado">
<input class="input" id="inicio" placeholder="Fecha inicio">
<input class="input" id="fin" placeholder="Fecha fin">
<input class="input" id="tecnicos" placeholder="Técnicos">
<input class="input" id="responsable" placeholder="Responsable">
<textarea class="textarea" id="notas" placeholder="Notas"></textarea>

<button class="btn" onclick="guardar()">Guardar</button>

<input type="file" accept="image/*" onchange="subirFoto(event)">

<div class="fotos" id="fotos"></div>

<button class="btn" onclick="volver()">Volver</button>

</div>

<script>

const PIN = "1234";

let clienteId = localStorage.getItem("clienteActivo");
let obraId = localStorage.getItem("obraActiva");

let obras = JSON.parse(localStorage.getItem("obras_" + clienteId)) || [];
let obra = obras.find(o => o.id == obraId);

if (!obra.fotos) obra.fotos = [];

function guardar() {
    obra.nombre = document.getElementById("nombre").value;
    obra.direccion = document.getElementById("direccion").value;
    obra.tipo = document.getElementById("tipo").value;
    obra.estado = document.getElementById("estado").value;
    obra.inicio = document.getElementById("inicio").value;
    obra.fin = document.getElementById("fin").value;
    obra.tecnicos = document.getElementById("tecnicos").value;
    obra.responsable = document.getElementById("responsable").value;
    obra.notas = document.getElementById("notas").value;

    localStorage.setItem("obras_" + clienteId, JSON.stringify(obras));
}

function cargar() {
    document.getElementById("nombre").value = obra.nombre || "";
    document.getElementById("direccion").value = obra.direccion || "";
    document.getElementById("tipo").value = obra.tipo || "";
    document.getElementById("estado").value = obra.estado || "";
    document.getElementById("inicio").value = obra.inicio || "";
    document.getElementById("fin").value = obra.fin || "";
    document.getElementById("tecnicos").value = obra.tecnicos || "";
    document.getElementById("responsable").value = obra.responsable || "";
    document.getElementById("notas").value = obra.notas || "";

    mostrarFotos();
}

function subirFoto(e) {
    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = function(evt) {
        obra.fotos.push(evt.target.result);
        guardar();
        mostrarFotos();
    };

    reader.readAsDataURL(file);
}

function mostrarFotos() {
    const contenedor = document.getElementById("fotos");
    contenedor.innerHTML = "";

    obra.fotos.forEach((f, i) => {
        let div = document.createElement("div");
        div.className = "foto";

        div.innerHTML = `
            <img src="${f}">
            <button class="borrar">X</button>
        `;

        div.querySelector(".borrar").onclick = () => borrarFoto(i);

        contenedor.appendChild(div);
    });
}

function borrarFoto(i) {
    let ok = confirm("Eliminar foto?");
    if (!ok) return;

    let pin = prompt("PIN:");
    if (pin !== PIN) return alert("PIN incorrecto");

    obra.fotos.splice(i, 1);
    guardar();
    mostrarFotos();
}

function volver() {
    window.location.href = "obras.html";
}

cargar();

</script>

</body>
</html>
