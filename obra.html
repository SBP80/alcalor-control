<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Obras</title>

<style>
:root{
  --bg:#0b0b0b;
  --panel:#151515;
  --line:#2b2b2b;
  --text:#ffffff;
  --muted:#9f9f9f;
  --accent:#f39b2f;
  --danger:#c94b4b;
  --fontMain:Arial;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:var(--fontMain);
}

/* HEADER */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px;
  border-bottom:1px solid var(--line);
}
.title{
  font-weight:900;
  color:var(--accent);
  font-size:18px;
}

/* BOTONES */
button{
  border:none;
  border-radius:10px;
  padding:10px 12px;
  font-weight:800;
}
.btn-main{background:var(--accent);color:#000;}
.btn-danger{background:var(--danger);color:#fff;}
.btn-sec{background:#2a2a2a;color:#fff;}

/* CONTENIDO */
.wrap{padding:12px;max-width:900px;margin:auto;}

.search{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid var(--line);
  background:#111;
  color:#fff;
  margin-bottom:12px;
}

/* TARJETAS */
.card{
  background:var(--panel);
  padding:14px;
  border-radius:14px;
  margin-bottom:10px;
  border:1px solid var(--line);
}
.card-title{font-weight:900;}
.card-sub{font-size:12px;color:var(--muted);}
.card-actions{margin-top:10px;display:flex;gap:6px;}

/* BOTÓN + */
.fab{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  background:var(--accent);
  font-size:28px;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.85);
  display:none;
  align-items:flex-end;
}
.modal-content{
  width:100%;
  background:#111;
  padding:16px;
  border-radius:20px 20px 0 0;
}

input,select,textarea{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  border:1px solid var(--line);
  background:#000;
  color:#fff;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="title" id="appName">OBRAS</div>
  <button class="btn-sec" onclick="volver()">Salir</button>
</div>

<div class="wrap">
  <input id="buscar" class="search" placeholder="Buscar obra">
  <div id="lista"></div>
</div>

<button class="fab" onclick="abrir()">+</button>

<div class="modal" id="modal">
  <div class="modal-content">

    <input id="nombre" placeholder="Nombre obra">
    <input id="cliente" placeholder="Cliente">
    <input id="direccion" placeholder="Dirección">

    <select id="tipo">
      <option>Aerotermia</option>
      <option>Aire acondicionado</option>
      <option>Suelo radiante</option>
    </select>

    <select id="estado">
      <option>Pendiente</option>
      <option>En curso</option>
      <option>Terminada</option>
    </select>

    <textarea id="notas" placeholder="Notas"></textarea>

    <button class="btn-main" onclick="guardar()">Guardar</button>
    <button class="btn-sec" onclick="cerrar()">Cancelar</button>

  </div>
</div>

<script>
let edit=null;

function aplicarConfig(){
  let c=JSON.parse(localStorage.getItem("configAllcalor")||"{}");

  if(c.color) document.documentElement.style.setProperty("--accent",c.color);
  if(c.colorFondo) document.documentElement.style.setProperty("--bg",c.colorFondo);
  if(c.colorPanel) document.documentElement.style.setProperty("--panel",c.colorPanel);
  if(c.colorTexto) document.documentElement.style.setProperty("--text",c.colorTexto);
  if(c.fuente) document.documentElement.style.setProperty("--fontMain",c.fuente);

  if(c.nombre){
    document.getElementById("appName").innerText=c.nombre+" · Obras";
  }
}

function getData(){
  return JSON.parse(localStorage.getItem("obras")||"[]");
}
function setData(d){
  localStorage.setItem("obras",JSON.stringify(d));
}

function abrir(){
  modal.style.display="flex";
}
function cerrar(){
  modal.style.display="none";
  edit=null;
  nombre.value="";
  cliente.value="";
  direccion.value="";
  notas.value="";
}

function guardar(){
  let d=getData();

  let obj={
    id:edit||Date.now(),
    nombre:nombre.value,
    cliente:cliente.value,
    direccion:direccion.value,
    tipo:tipo.value,
    estado:estado.value,
    notas:notas.value
  };

  if(!obj.nombre){alert("Nombre obligatorio");return;}

  if(edit){
    d=d.map(x=>x.id===edit?obj:x);
  }else{
    d.unshift(obj);
  }

  setData(d);
  cerrar();
  pintar();
}

function editar(id){
  let o=getData().find(x=>x.id===id);
  edit=id;
  abrir();

  nombre.value=o.nombre;
  cliente.value=o.cliente;
  direccion.value=o.direccion;
  tipo.value=o.tipo;
  estado.value=o.estado;
  notas.value=o.notas;
}

function borrar(id){
  if(!confirm("Borrar obra?"))return;
  setData(getData().filter(x=>x.id!==id));
  pintar();
}

function pintar(){
  let lista=document.getElementById("lista");
  let txt=buscar.value.toLowerCase();

  let data=getData().filter(o=>
    (o.nombre+o.cliente+o.direccion+o.notas).toLowerCase().includes(txt)
  );

  lista.innerHTML="";

  data.forEach(o=>{
    lista.innerHTML+=`
      <div class="card">
        <div class="card-title">${o.nombre}</div>
        <div class="card-sub">${o.cliente} · ${o.estado}</div>
        <div class="card-actions">
          <button onclick="editar(${o.id})">Editar</button>
          <button class="btn-danger" onclick="borrar(${o.id})">Borrar</button>
        </div>
      </div>
    `;
  });
}

function volver(){
  location.href="app.html";
}

buscar.oninput=pintar;

aplicarConfig();
pintar();
</script>

</body>
</html>
