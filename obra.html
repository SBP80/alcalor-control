<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Obras · ALLCALOR</title>

<style>
:root{
  --bg:#0b0b0b;
  --panel:#151515;
  --line:#2b2b2b;
  --text:#ffffff;
  --muted:#9f9f9f;
  --accent:#f39b2f;
  --danger:#c94b4b;
  --fontMain:Arial,sans-serif;
}

*{box-sizing:border-box}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:var(--fontMain);
}

/* HEADER */
.topbar{
  position:sticky;
  top:0;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px;
  border-bottom:1px solid var(--line);
  background:#0b0b0b;
  z-index:10;
}
.title{
  font-size:20px;
  font-weight:800;
  color:var(--accent);
}
.btn{
  border:none;
  border-radius:10px;
  padding:10px 12px;
  font-weight:800;
}
.btn-main{background:var(--accent);color:#000;}
.btn-danger{background:var(--danger);color:#fff;}
.btn-sec{background:#2a2a2a;color:#fff;}

/* CONTENT */
.wrap{padding:12px;max-width:900px;margin:auto;}

.search{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid var(--line);
  background:#111;
  color:#fff;
  margin-bottom:12px;
}

/* CARD */
.card{
  background:var(--panel);
  padding:14px;
  border-radius:14px;
  margin-bottom:10px;
  border:1px solid var(--line);
}
.card-title{font-size:16px;font-weight:800;}
.card-sub{font-size:12px;color:var(--muted);margin-top:4px;}
.card-actions{margin-top:10px;display:flex;gap:6px;}

/* FLOAT BUTTON */
.fab{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  background:var(--accent);
  color:#000;
  font-size:30px;
  border:none;
  font-weight:900;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.8);
  display:none;
  align-items:flex-end;
}
.modal-content{
  width:100%;
  background:#111;
  padding:16px;
  border-radius:20px 20px 0 0;
}

input,select,textarea{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  border:1px solid var(--line);
  background:#000;
  color:#fff;
}
textarea{min-height:80px;}
</style>
</head>

<body>

<div class="topbar">
  <div class="title" id="appName">OBRAS</div>
  <button class="btn btn-sec" onclick="volver()">Salir</button>
</div>

<div class="wrap">

<input id="buscar" class="search" placeholder="Buscar obra...">

<div id="lista"></div>

</div>

<button class="fab" onclick="abrirModal()">+</button>

<div class="modal" id="modal">
  <div class="modal-content">

    <input id="nombre" placeholder="Nombre obra">
    <input id="cliente" placeholder="Cliente">
    <input id="direccion" placeholder="Dirección">

    <select id="tipo">
      <option>Aerotermia</option>
      <option>Aire acondicionado</option>
      <option>Suelo radiante</option>
      <option>Caldera</option>
    </select>

    <select id="estado">
      <option>Pendiente</option>
      <option>En curso</option>
      <option>Terminada</option>
    </select>

    <textarea id="notas" placeholder="Notas"></textarea>

    <button class="btn btn-main" onclick="guardar()">Guardar</button>
    <button class="btn btn-sec" onclick="cerrarModal()">Cancelar</button>

  </div>
</div>

<script>
let edit = null;

function aplicarConfig(){
  let c = JSON.parse(localStorage.getItem("configAllcalor")||"{}");
  if(c.nombre) document.getElementById("appName").innerText=c.nombre;
  if(c.color) document.documentElement.style.setProperty("--accent",c.color);
}

function getData(){
  return JSON.parse(localStorage.getItem("obras")||"[]");
}
function setData(d){
  localStorage.setItem("obras",JSON.stringify(d));
}

function abrirModal(){
  document.getElementById("modal").style.display="flex";
}

function cerrarModal(){
  edit=null;
  modal.style.display="none";
  nombre.value="";
  cliente.value="";
  direccion.value="";
  notas.value="";
}

function guardar(){
  let d=getData();

  let obj={
    id:edit||Date.now(),
    nombre:nombre.value,
    cliente:cliente.value,
    direccion:direccion.value,
    tipo:tipo.value,
    estado:estado.value,
    notas:notas.value
  };

  if(!obj.nombre){alert("Nombre obligatorio");return;}

  if(edit){
    d=d.map(x=>x.id===edit?obj:x);
  }else{
    d.unshift(obj);
  }

  setData(d);
  cerrarModal();
  pintar();
}

function editar(id){
  let o=getData().find(x=>x.id===id);
  if(!o)return;

  edit=id;
  abrirModal();

  nombre.value=o.nombre;
  cliente.value=o.cliente;
  direccion.value=o.direccion;
  tipo.value=o.tipo;
  estado.value=o.estado;
  notas.value=o.notas;
}

function borrar(id){
  if(!confirm("Borrar obra?"))return;
  setData(getData().filter(x=>x.id!==id));
  pintar();
}

function pintar(){
  let lista=document.getElementById("lista");
  let txt=buscar.value.toLowerCase();

  let data=getData().filter(o=>
    (o.nombre+o.cliente+o.direccion+o.notas).toLowerCase().includes(txt)
  );

  lista.innerHTML="";

  data.forEach(o=>{
    let div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <div class="card-title">${o.nombre}</div>
      <div class="card-sub">${o.cliente} · ${o.estado}</div>
      <div class="card-actions">
        <button onclick="editar(${o.id})">Editar</button>
        <button class="btn-danger" onclick="borrar(${o.id})">Borrar</button>
      </div>
    `;

    lista.appendChild(div);
  });

  if(!data.length){
    lista.innerHTML="<div style='color:#777'>Sin obras</div>";
  }
}

function volver(){
  location.href="app.html";
}

buscar.oninput=pintar;

aplicarConfig();
pintar();
</script>

</body>
</html>
