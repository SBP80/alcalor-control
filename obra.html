<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Obras</title>

<style>
:root{
  --bg:#0b0b0b;
  --panel:#151515;
  --line:#2b2b2b;
  --text:#ffffff;
  --muted:#8f8f8f;
  --accent:#f39b2f;
  --danger:#c94b4b;
  --fontMain:Arial;
}

/* BASE */
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:var(--fontMain);
}

/* HEADER */
.header{
  padding:18px;
  border-bottom:1px solid var(--line);
}
.header h1{
  margin:0;
  font-size:26px;
  color:var(--accent);
}
.header small{
  color:var(--muted);
}

/* CONTENIDO */
.container{
  padding:16px;
  max-width:900px;
  margin:auto;
}

/* BUSCADOR */
.search{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:1px solid var(--line);
  background:#111;
  color:#fff;
  margin-bottom:16px;
}

/* BOTÓN NUEVO */
.new-btn{
  width:100%;
  padding:16px;
  border-radius:16px;
  border:none;
  font-weight:900;
  font-size:16px;
  background:var(--accent);
  color:#000;
  margin-bottom:20px;
}

/* TARJETAS */
.card{
  background:var(--panel);
  padding:16px;
  border-radius:16px;
  margin-bottom:12px;
  border:1px solid var(--line);
}
.card-title{
  font-weight:900;
  font-size:16px;
}
.card-info{
  font-size:12px;
  color:var(--muted);
  margin-top:4px;
}
.card-actions{
  margin-top:12px;
  display:flex;
  gap:8px;
}

/* BOTONES */
button{
  border:none;
  border-radius:10px;
  padding:10px 12px;
  font-weight:800;
}
.btn-danger{background:var(--danger);color:#fff;}
.btn-sec{background:#2b2b2b;color:#fff;}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.85);
  display:none;
  align-items:flex-end;
}
.modal-box{
  width:100%;
  background:#111;
  padding:16px;
  border-radius:20px 20px 0 0;
}

/* INPUTS */
input,select,textarea{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  border:1px solid var(--line);
  background:#000;
  color:#fff;
}
</style>
</head>

<body>

<div class="header">
  <h1 id="titulo">Obras</h1>
  <small>Gestión rápida de trabajos</small>
</div>

<div class="container">

<input id="buscar" class="search" placeholder="Buscar obra...">

<button class="new-btn" onclick="abrir()">+ Nueva obra</button>

<div id="lista"></div>

</div>

<div class="modal" id="modal">
  <div class="modal-box">

    <input id="nombre" placeholder="Nombre obra">
    <input id="cliente" placeholder="Cliente">
    <input id="direccion" placeholder="Dirección">

    <select id="tipo">
      <option>Aerotermia</option>
      <option>Aire acondicionado</option>
      <option>Suelo radiante</option>
    </select>

    <select id="estado">
      <option>Pendiente</option>
      <option>En curso</option>
      <option>Terminada</option>
    </select>

    <textarea id="notas" placeholder="Notas"></textarea>

    <button class="new-btn" onclick="guardar()">Guardar</button>
    <button class="btn-sec" onclick="cerrar()">Cancelar</button>

  </div>
</div>

<script>
let edit=null;

/* CONFIG */
function aplicarConfig(){
  let c=JSON.parse(localStorage.getItem("configAllcalor")||"{}");

  if(c.color) document.documentElement.style.setProperty("--accent",c.color);
  if(c.colorFondo) document.documentElement.style.setProperty("--bg",c.colorFondo);
  if(c.colorPanel) document.documentElement.style.setProperty("--panel",c.colorPanel);
  if(c.colorTexto) document.documentElement.style.setProperty("--text",c.colorTexto);
  if(c.fuente) document.documentElement.style.setProperty("--fontMain",c.fuente);

  if(c.nombre){
    document.getElementById("titulo").innerText=c.nombre+" · Obras";
  }
}

/* DATA */
function getData(){
  return JSON.parse(localStorage.getItem("obras")||"[]");
}
function setData(d){
  localStorage.setItem("obras",JSON.stringify(d));
}

/* UI */
function abrir(){modal.style.display="flex";}
function cerrar(){
  modal.style.display="none";
  edit=null;
  nombre.value="";
  cliente.value="";
  direccion.value="";
  notas.value="";
}

/* CRUD */
function guardar(){
  let d=getData();

  let obj={
    id:edit||Date.now(),
    nombre:nombre.value,
    cliente:cliente.value,
    direccion:direccion.value,
    tipo:tipo.value,
    estado:estado.value,
    notas:notas.value
  };

  if(!obj.nombre){alert("Nombre obligatorio");return;}

  if(edit){
    d=d.map(x=>x.id===edit?obj:x);
  }else{
    d.unshift(obj);
  }

  setData(d);
  cerrar();
  pintar();
}

function editar(id){
  let o=getData().find(x=>x.id===id);
  edit=id;
  abrir();

  nombre.value=o.nombre;
  cliente.value=o.cliente;
  direccion.value=o.direccion;
  tipo.value=o.tipo;
  estado.value=o.estado;
  notas.value=o.notas;
}

function borrar(id){
  if(!confirm("Borrar obra?"))return;
  setData(getData().filter(x=>x.id!==id));
  pintar();
}

/* LISTA */
function pintar(){
  let lista=document.getElementById("lista");
  let txt=buscar.value.toLowerCase();

  let data=getData().filter(o=>
    (o.nombre+o.cliente+o.direccion+o.notas).toLowerCase().includes(txt)
  );

  lista.innerHTML="";

  data.forEach(o=>{
    lista.innerHTML+=`
      <div class="card">
        <div class="card-title">${o.nombre}</div>
        <div class="card-info">${o.cliente} · ${o.estado}</div>
        <div class="card-actions">
          <button onclick="editar(${o.id})">Editar</button>
          <button class="btn-danger" onclick="borrar(${o.id})">Borrar</button>
        </div>
      </div>
    `;
  });

  if(!data.length){
    lista.innerHTML="<div style='color:#777'>Sin obras</div>";
  }
}

buscar.oninput=pintar;

aplicarConfig();
pintar();
</script>

</body>
</html>
