<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Usuarios y permisos</title>
<style>
:root{
  --bg:#0b0b0b;
  --panel:#151515;
  --panel2:#1d1d1d;
  --line:#2b2b2b;
  --text:#ffffff;
  --muted:#bdbdbd;
  --accent:#f39b2f;
  --btnText:#111111;
  --danger:#c94b4b;
  --ok:#39a96b;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
}
.wrap{
  max-width:1200px;
  margin:0 auto;
  padding:18px;
}
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  margin-bottom:16px;
}
h1{
  margin:0;
  color:var(--accent);
  font-size:38px;
}
.actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
.btn{
  border:none;
  border-radius:14px;
  padding:12px 16px;
  font-weight:800;
  cursor:pointer;
}
.btn-main{
  background:var(--accent);
  color:var(--btnText);
}
.btn-sec{
  background:#2b2b2b;
  color:#fff;
}
.btn-danger{
  background:var(--danger);
  color:#fff;
}
.panel{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:18px;
  padding:16px;
  margin-bottom:16px;
}
.panel-title{
  margin:0 0 14px 0;
  color:var(--accent);
  font-size:22px;
}
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
.grid-3{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:12px;
}
.field{
  display:flex;
  flex-direction:column;
  gap:6px;
}
.field label{
  font-size:13px;
  color:var(--muted);
}
input,select{
  width:100%;
  border:1px solid var(--line);
  background:#101010;
  color:#fff;
  border-radius:12px;
  padding:12px 14px;
  font:inherit;
}
.cards{
  display:grid;
  gap:12px;
}
.card{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:18px;
  padding:16px;
}
.card-top{
  display:flex;
  justify-content:space-between;
  gap:12px;
  align-items:flex-start;
}
.card-title{
  margin:0;
  font-size:22px;
}
.card-sub{
  margin:6px 0 0 0;
  color:var(--muted);
  font-size:13px;
}
.badge{
  display:inline-block;
  background:var(--panel2);
  border:1px solid var(--line);
  color:var(--muted);
  border-radius:999px;
  padding:6px 10px;
  font-size:12px;
  font-weight:700;
}
.badge.ok{
  color:#d7ffd7;
  border-color:#285528;
}
.badge.off{
  color:#ffd1d1;
  border-color:#5a2626;
}
.permissions{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:8px;
  margin-top:12px;
}
.perm{
  background:#101010;
  border:1px solid var(--line);
  border-radius:12px;
  padding:10px 12px;
  font-size:13px;
}
.card-actions{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-top:14px;
}
.check{
  display:flex;
  align-items:center;
  gap:10px;
  background:#101010;
  border:1px solid var(--line);
  border-radius:12px;
  padding:12px 14px;
}
.check input{
  width:auto;
  margin:0;
  flex:0 0 auto;
}
.check span{
  display:block;
  color:var(--text);
  line-height:1.25;
}
.hidden{
  display:none !important;
}
.msg{
  min-height:22px;
  margin-top:10px;
  color:#c7ffd5;
  font-size:13px;
}
.help{
  color:var(--muted);
  font-size:12px;
  line-height:1.45;
}
@media (max-width:820px){
  .topbar{
    flex-direction:column;
    align-items:stretch;
  }
  h1{font-size:34px}
  .grid,.grid-3{
    grid-template-columns:1fr;
  }
  .actions .btn{
    width:100%;
  }
}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <h1>Usuarios y permisos</h1>
    <div class="actions">
      <button class="btn btn-main" onclick="nuevoUsuario()">Nuevo usuario</button>
      <button class="btn btn-sec" onclick="volver()">Volver</button>
    </div>
  </div>

  <div id="panelFormulario" class="panel hidden">
    <div class="panel-title" id="tituloFormulario">Nuevo usuario</div>

    <div class="grid">
      <div class="field">
        <label>Nombre visible</label>
        <input id="uNombre" type="text" placeholder="Nombre y apellidos">
      </div>
      <div class="field">
        <label>Usuario</label>
        <input id="uUsername" type="text" placeholder="usuario">
      </div>
    </div>

    <div class="grid">
      <div class="field">
        <label>Clave</label>
        <input id="uPassword" type="password" placeholder="Clave">
      </div>
      <div class="field">
        <label>Rol</label>
        <select id="uRole">
          <option value="administrador">Administrador</option>
          <option value="oficina">Oficina</option>
          <option value="tecnico">Técnico</option>
          <option value="almacen">Almacén</option>
          <option value="lectura">Solo lectura</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label>Estado</label>
      <label class="check">
        <input id="uActive" type="checkbox" checked>
        <span>Usuario activo</span>
      </label>
    </div>

    <div class="panel" style="margin-top:14px">
      <div class="panel-title" style="font-size:18px">Permisos</div>

      <div class="grid-3">
        <label class="check"><input class="perm-check" type="checkbox" value="clientes"><span>Clientes</span></label>
        <label class="check"><input class="perm-check" type="checkbox" value="obras"><span>Obras</span></label>
        <label class="check"><input class="perm-check" type="checkbox" value="planos"><span>Planos</span></label>

        <label class="check"><input class="perm-check" type="checkbox" value="usuarios"><span>Usuarios</span></label>
        <label class="check"><input class="perm-check" type="checkbox" value="personal"><span>Personal</span></label>
        <label class="check"><input class="perm-check" type="checkbox" value="stock"><span>Compras y stock</span></label>

        <label class="check"><input class="perm-check" type="checkbox" value="configuracion"><span>Configuración</span></label>
        <label class="check"><input class="perm-check" type="checkbox" value="presupuestos"><span>Presupuestos</span></label>
        <label class="check"><input class="perm-check" type="checkbox" value="facturas"><span>Facturas</span></label>
      </div>

      <div class="help" style="margin-top:10px">
        Al cambiar el rol se cargan permisos base. Luego puedes retocar manualmente.
      </div>
    </div>

    <div class="msg" id="msg"></div>

    <div class="card-actions">
      <button class="btn btn-main" onclick="guardarUsuario()">Guardar usuario</button>
      <button class="btn btn-sec" onclick="cerrarFormulario()">Cancelar</button>
    </div>
  </div>

  <div class="panel">
    <div class="panel-title">Listado de usuarios</div>
    <div id="listaUsuarios" class="cards"></div>
  </div>
</div>

<script>
function getSession(){
  try{
    return JSON.parse(localStorage.getItem("allcalor_session")) || null;
  }catch(e){
    return null;
  }
}

function getConfig(){
  try{
    return JSON.parse(localStorage.getItem("configAllcalor")) || {};
  }catch(e){
    return {};
  }
}

function applyConfig(){
  const cfg = Object.assign({
    color:"#f39b2f"
  }, getConfig());

  document.documentElement.style.setProperty("--accent", cfg.color || "#f39b2f");
}

const currentSession = getSession();
if(!currentSession){
  window.location.href = "login.html";
}

if((currentSession.role || "") !== "administrador"){
  alert("Solo el administrador puede entrar aquí.");
  window.location.href = "app.html";
}

let editUsername = null;

function getUsers(){
  try{
    const users = JSON.parse(localStorage.getItem("allcalor_users"));
    if(Array.isArray(users) && users.length) return users;
  }catch(e){}
  const inicial = [
    {
      username:"admin",
      password:"1234",
      nombre:"Administrador",
      role:"administrador",
      active:true,
      permissions:["clientes","obras","planos","usuarios","personal","stock","configuracion","presupuestos","facturas"]
    }
  ];
  localStorage.setItem("allcalor_users", JSON.stringify(inicial));
  return inicial;
}

function setUsers(users){
  localStorage.setItem("allcalor_users", JSON.stringify(users));
}

function normalizarUsername(v){
  return String(v || "").trim().toLowerCase();
}

function permisosPorRol(role){
  const map = {
    administrador:["clientes","obras","planos","usuarios","personal","stock","configuracion","presupuestos","facturas"],
    oficina:["clientes","obras","presupuestos","facturas","configuracion"],
    tecnico:["clientes","obras","planos"],
    almacen:["stock","obras"],
    lectura:["clientes"]
  };
  return map[role] ? [...map[role]] : [];
}

function volver(){
  window.location.href = "app.html";
}

function nuevoUsuario(){
  editUsername = null;
  document.getElementById("tituloFormulario").textContent = "Nuevo usuario";
  document.getElementById("uNombre").value = "";
  document.getElementById("uUsername").value = "";
  document.getElementById("uPassword").value = "";
  document.getElementById("uRole").value = "tecnico";
  document.getElementById("uActive").checked = true;
  document.getElementById("msg").textContent = "";
  aplicarPermisosRol();
  document.getElementById("panelFormulario").classList.remove("hidden");
  window.scrollTo({top:0, behavior:"smooth"});
}

function cerrarFormulario(){
  document.getElementById("panelFormulario").classList.add("hidden");
}

function aplicarPermisosRoleArray(perms){
  document.querySelectorAll(".perm-check").forEach(chk => {
    chk.checked = perms.includes(chk.value);
  });
}

function aplicarPermisosRol(){
  const role = document.getElementById("uRole").value;
  aplicarPermisosRoleArray(permisosPorRol(role));
}

function leerPermisosFormulario(){
  return Array.from(document.querySelectorAll(".perm-check"))
    .filter(chk => chk.checked)
    .map(chk => chk.value);
}

function guardarUsuario(){
  const nombre = document.getElementById("uNombre").value.trim();
  const username = normalizarUsername(document.getElementById("uUsername").value);
  const password = document.getElementById("uPassword").value.trim();
  const role = document.getElementById("uRole").value;
  const active = document.getElementById("uActive").checked;
  const permissions = leerPermisosFormulario();
  const msg = document.getElementById("msg");
  msg.textContent = "";

  if(!nombre){
    msg.textContent = "Introduce el nombre visible.";
    return;
  }
  if(!username){
    msg.textContent = "Introduce el usuario.";
    return;
  }

  const users = getUsers();

  if(editUsername === null){
    if(!password || password.length < 4){
      msg.textContent = "La clave debe tener al menos 4 caracteres.";
      return;
    }
    if(users.some(u => normalizarUsername(u.username) === username)){
      msg.textContent = "Ese usuario ya existe.";
      return;
    }

    users.push({
      username,
      password,
      nombre,
      role,
      active,
      permissions
    });
  } else {
    const idx = users.findIndex(u => normalizarUsername(u.username) === normalizarUsername(editUsername));
    if(idx === -1){
      msg.textContent = "No se encontró el usuario a editar.";
      return;
    }

    if(username !== normalizarUsername(editUsername) && users.some(u => normalizarUsername(u.username) === username)){
      msg.textContent = "Ese usuario ya existe.";
      return;
    }

    users[idx].nombre = nombre;
    users[idx].username = username;
    users[idx].role = role;
    users[idx].active = active;
    users[idx].permissions = permissions;

    if(password){
      if(password.length < 4){
        msg.textContent = "La nueva clave debe tener al menos 4 caracteres.";
        return;
      }
      users[idx].password = password;
    }
  }

  setUsers(users);
  cerrarFormulario();
  pintarUsuarios();
}

function editarUsuario(username){
  const users = getUsers();
  const u = users.find(x => normalizarUsername(x.username) === normalizarUsername(username));
  if(!u) return;

  editUsername = u.username;
  document.getElementById("tituloFormulario").textContent = "Editar usuario";
  document.getElementById("uNombre").value = u.nombre || "";
  document.getElementById("uUsername").value = u.username || "";
  document.getElementById("uPassword").value = "";
  document.getElementById("uRole").value = u.role || "tecnico";
  document.getElementById("uActive").checked = u.active !== false;
  document.getElementById("msg").textContent = "";
  aplicarPermisosRoleArray(Array.isArray(u.permissions) ? u.permissions : permisosPorRol(u.role || "tecnico"));
  document.getElementById("panelFormulario").classList.remove("hidden");
  window.scrollTo({top:0, behavior:"smooth"});
}

function borrarUsuario(username){
  if(normalizarUsername(username) === "admin"){
    alert("No se puede borrar el usuario admin.");
    return;
  }
  if(!confirm("¿Borrar este usuario?")) return;

  const users = getUsers().filter(u => normalizarUsername(u.username) !== normalizarUsername(username));
  setUsers(users);
  pintarUsuarios();
}

function toggleActivo(username){
  const users = getUsers();
  const idx = users.findIndex(u => normalizarUsername(u.username) === normalizarUsername(username));
  if(idx === -1) return;

  if(normalizarUsername(username) === "admin" && users[idx].active === true){
    alert("No se puede desactivar el usuario admin.");
    return;
  }

  users[idx].active = !(users[idx].active !== false);
  setUsers(users);
  pintarUsuarios();
}

function pintarUsuarios(){
  const lista = document.getElementById("listaUsuarios");
  const users = getUsers();

  if(!users.length){
    lista.innerHTML = '<div class="card">No hay usuarios.</div>';
    return;
  }

  lista.innerHTML = users.map(u => {
    const perms = Array.isArray(u.permissions) ? u.permissions : permisosPorRol(u.role || "tecnico");
    return `
      <div class="card">
        <div class="card-top">
          <div>
            <h3 class="card-title">${escapeHtml(u.nombre || "-")}</h3>
            <div class="card-sub">Usuario: ${escapeHtml(u.username || "-")} · Rol: ${escapeHtml(u.role || "-")}</div>
          </div>
          <span class="badge ${u.active !== false ? "ok" : "off"}">${u.active !== false ? "Activo" : "Inactivo"}</span>
        </div>

        <div class="permissions">
          ${perms.map(p => `<div class="perm">${escapeHtml(p)}</div>`).join("")}
        </div>

        <div class="card-actions">
          <button class="btn btn-main" onclick="editarUsuario('${escapeJs(u.username)}')">Editar</button>
          <button class="btn btn-sec" onclick="toggleActivo('${escapeJs(u.username)}')">${u.active !== false ? "Desactivar" : "Activar"}</button>
          <button class="btn btn-danger" onclick="borrarUsuario('${escapeJs(u.username)}')">Borrar</button>
        </div>
      </div>
    `;
  }).join("");
}

function escapeHtml(str){
  return String(str || "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#39;");
}

function escapeJs(str){
  return String(str || "")
    .replace(/\\/g,"\\\\")
    .replace(/'/g,"\\'");
}

document.getElementById("uRole").addEventListener("change", aplicarPermisosRol);

window.addEventListener("storage", function(e){
  if(e.key === "configAllcalor") applyConfig();
});
window.addEventListener("pageshow", applyConfig);
window.addEventListener("focus", applyConfig);

applyConfig();
pintarUsuarios();
</script>
</body>
</html>
