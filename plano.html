<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plano</title>

<style>
body {
    margin: 0;
    background: #0b0b0b;
    color: white;
    font-family: Arial, sans-serif;
}

.header {
    padding: 15px;
    border-bottom: 2px solid orange;
    font-size: 20px;
}

.canvas-container {
    padding: 10px;
}

.info {
    padding: 10px;
    background: #141414;
    border: 1px solid #2a2a2a;
    margin-bottom: 10px;
    border-radius: 8px;
    font-size: 14px;
    line-height: 1.4;
}

canvas {
    background: #111;
    border: 1px solid #333;
    display: block;
    width: 100%;
    touch-action: none;
}

.btn {
    width: 100%;
    padding: 15px;
    background: orange;
    border: none;
    margin-top: 10px;
    font-size: 18px;
    cursor: pointer;
    color: #111;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="header">Plano</div>

<div class="canvas-container">
    <div class="info" id="info">Sin estancias</div>

    <canvas id="canvas"></canvas>

    <button class="btn" onclick="nuevaEstancia()">Nueva estancia</button>
    <button class="btn" onclick="cerrarEstancia()">Cerrar estancia</button>
    <button class="btn" onclick="guardarEstancia()">Guardar estancia</button>
    <button class="btn" onclick="limpiarActual()">Limpiar actual</button>
    <button class="btn" onclick="volver()">Volver</button>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const info = document.getElementById("info");

function ajustarCanvas() {
    canvas.width = window.innerWidth - 20;
    canvas.height = window.innerHeight - 320;
}
ajustarCanvas();

let clienteId = localStorage.getItem("clienteActivo");
let obraId = localStorage.getItem("obraActiva");

let obras = JSON.parse(localStorage.getItem("obras_" + clienteId)) || [];
let obra = obras.find(o => o.id == obraId);

if (!obra) {
    alert("Obra no encontrada");
    window.location.href = "obras.html";
}

if (!obra.plano) {
    obra.plano = { estancias: [] };
}

if (!Array.isArray(obra.plano.estancias)) {
    obra.plano.estancias = [];
}

let estancias = obra.plano.estancias;
let puntos = [];
let cerrado = false;

function guardarMemoria() {
    obra.plano.estancias = estancias;
    localStorage.setItem("obras_" + clienteId, JSON.stringify(obras));
}

function obtenerPosicion(evento) {
    const rect = canvas.getBoundingClientRect();

    if (evento.touches && evento.touches.length > 0) {
        return {
            x: evento.touches[0].clientX - rect.left,
            y: evento.touches[0].clientY - rect.top
        };
    }

    return {
        x: evento.clientX - rect.left,
        y: evento.clientY - rect.top
    };
}

function dibujar() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.lineWidth = 2;
    ctx.font = "14px Arial";

    // estancias guardadas
    estancias.forEach(est => {
        if (!est.puntos || est.puntos.length < 2) return;

        ctx.beginPath();
        est.puntos.forEach((p, i) => {
            if (i === 0) ctx.moveTo(p.x, p.y);
            else ctx.lineTo(p.x, p.y);
        });
        ctx.closePath();

        ctx.strokeStyle = "orange";
        ctx.stroke();

        ctx.fillStyle = "rgba(255,165,0,0.08)";
        ctx.fill();

        est.puntos.forEach(p => {
            ctx.beginPath();
            ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
            ctx.fillStyle = "orange";
            ctx.fill();
        });

        if (est.nombre) {
            const p = est.puntos[0];
            ctx.fillStyle = "white";
            ctx.fillText(est.nombre, p.x + 8, p.y - 8);
        }
    });

    // estancia actual
    if (puntos.length > 0) {
        ctx.beginPath();
        puntos.forEach((p, i) => {
            if (i === 0) ctx.moveTo(p.x, p.y);
            else ctx.lineTo(p.x, p.y);
        });

        if (cerrado && puntos.length >= 3) {
            ctx.closePath();
            ctx.fillStyle = "rgba(255,255,255,0.06)";
            ctx.fill();
        }

        ctx.strokeStyle = "white";
        ctx.stroke();

        puntos.forEach((p, i) => {
            ctx.beginPath();
            ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
            ctx.fillStyle = "white";
            ctx.fill();

            ctx.fillStyle = "white";
            ctx.fillText(String(i + 1), p.x + 8, p.y - 8);
        });
    }

    let texto = "Estancias guardadas: " + estancias.length;

    if (puntos.length > 0) {
        texto += "<br>Puntos de la estancia actual: " + puntos.length;
    }

    if (cerrado) {
        texto += "<br>Estancia actual cerrada";
    } else {
        texto += "<br>Estancia actual abierta";
    }

    info.innerHTML = texto;
}

function anadirPunto(evento) {
    if (cerrado) return;

    const pos = obtenerPosicion(evento);
    puntos.push({ x: pos.x, y: pos.y });
    dibujar();

    if (evento.cancelable) evento.preventDefault();
}

function cerrarEstancia() {
    if (puntos.length < 3) {
        alert("Necesitas al menos 3 puntos");
        return;
    }

    cerrado = true;
    dibujar();
}

function guardarEstancia() {
    if (!cerrado || puntos.length < 3) {
        alert("Primero cierra la estancia");
        return;
    }

    let nombre = prompt("Nombre estancia:");
    if (!nombre || nombre.trim() === "") return;

    estancias.push({
        nombre: nombre.trim(),
        puntos: JSON.parse(JSON.stringify(puntos))
    });

    guardarMemoria();
    puntos = [];
    cerrado = false;
    dibujar();
}

function nuevaEstancia() {
    puntos = [];
    cerrado = false;
    dibujar();
}

function limpiarActual() {
    puntos = [];
    cerrado = false;
    dibujar();
}

function volver() {
    window.location.href = "obra.html";
}

canvas.addEventListener("click", anadirPunto);
canvas.addEventListener("touchstart", anadirPunto, { passive: false });

window.addEventListener("resize", function() {
    ajustarCanvas();
    dibujar();
});

dibujar();
</script>

</body>
</html>
