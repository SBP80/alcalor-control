<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plano</title>

<style>
body {
    margin: 0;
    background: #0b0b0b;
    color: white;
    font-family: Arial, sans-serif;
}

.header {
    padding: 12px 15px;
    border-bottom: 2px solid orange;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.header-btn {
    background: orange;
    border: none;
    padding: 10px;
    border-radius: 8px;
    font-weight: bold;
}

.wrap {
    padding: 10px;
    position: relative;
}

.info {
    background: #141414;
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 10px;
}

.tools {
    position: absolute;
    top: 60px;
    right: 10px;
    width: 200px;
    background: #141414;
    padding: 10px;
    border-radius: 10px;
    display: none;
}

.tools.abierto {
    display: block;
}

canvas {
    width: 100%;
    background: #111;
}

.btn {
    width: 100%;
    padding: 10px;
    margin-top: 6px;
    border-radius: 6px;
    border: none;
    font-weight: bold;
}

.orange { background: orange; }
.red { background: #c93b2f; color:white; }
</style>
</head>

<body>

<div class="header">
    <button class="header-btn" onclick="volver()">Volver</button>
    <div>Plano</div>
    <button class="header-btn" onclick="toggleTools()">Herramientas</button>
</div>

<div class="wrap">
    <div id="info" class="info"></div>

    <div id="tools" class="tools">
        <button class="btn orange" onclick="nuevaEstancia()">Nueva</button>
        <button class="btn orange" onclick="cerrarEstancia()">Cerrar</button>
        <button class="btn orange" onclick="guardarEstancia()">Guardar</button>
        <button class="btn" onclick="borrarUltimo()">Borrar punto</button>
        <button class="btn" onclick="escala()">Escala</button>
        <button class="btn red" onclick="eliminar()">Eliminar</button>
    </div>

    <canvas id="canvas"></canvas>
</div>
<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const tools = document.getElementById("tools");
const info = document.getElementById("info");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight - 150;

let puntos = [];
let estancias = [];
let cerrado = false;
let escalaMetro = null;

let seleccion = -1;
let arrastrando = false;
let lastX = 0;
let lastY = 0;

function toggleTools(){
    tools.classList.toggle("abierto");
}

function volver(){
    window.location.href="obra.html";
}

function distancia(a,b){
    return Math.hypot(b.x-a.x,b.y-a.y);
}
function dibujar(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    estancias.forEach((e,i)=>{
        ctx.beginPath();
        e.forEach((p,j)=> j?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y));
        ctx.closePath();
        ctx.strokeStyle="orange";
        ctx.stroke();

        if(escalaMetro){
            for(let i=0;i<e.length;i++){
                let j=(i+1)%e.length;
                let m=distancia(e[i],e[j])*escalaMetro;
                ctx.fillText(m.toFixed(2)+"m",
                    (e[i].x+e[j].x)/2,
                    (e[i].y+e[j].y)/2);
            }
        }
    });

    if(puntos.length){
        ctx.beginPath();
        puntos.forEach((p,i)=> i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y));
        if(cerrado)ctx.closePath();
        ctx.strokeStyle="white";
        ctx.stroke();
    }
}

function nuevaEstancia(){
    puntos=[];cerrado=false;
}

function cerrarEstancia(){
    if(puntos.length<3)return;
    cerrado=true;
}

function guardarEstancia(){
    if(!cerrado)return;
    estancias.push([...puntos]);
    puntos=[];cerrado=false;
}

function borrarUltimo(){
    puntos.pop();
}

function escala(){
    if(puntos.length<2)return;
    let m=prompt("metros reales lado 1");
    escalaMetro = m / distancia(puntos[0],puntos[1]);
}

function eliminar(){
    estancias.pop();
}

canvas.onclick=(e)=>{
    if(!cerrado){
        puntos.push({x:e.offsetX,y:e.offsetY});
    }
    dibujar();
};

canvas.onmousedown=(e)=>{
    arrastrando=true;
    lastX=e.offsetX;
    lastY=e.offsetY;
};

canvas.onmousemove=(e)=>{
    if(!arrastrando)return;
    let dx=e.offsetX-lastX;
    let dy=e.offsetY-lastY;

    puntos.forEach(p=>{
        p.x+=dx;
        p.y+=dy;
    });

    lastX=e.offsetX;
    lastY=e.offsetY;
    dibujar();
};

canvas.onmouseup=()=>arrastrando=false;

dibujar();
</script>

</body>
</html>
