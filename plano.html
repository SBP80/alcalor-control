<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plano</title>

<style>
body {
    margin: 0;
    background: #0b0b0b;
    color: white;
    font-family: Arial, sans-serif;
}

.header {
    padding: 15px;
    border-bottom: 2px solid orange;
    font-size: 20px;
}

.canvas-container {
    padding: 10px;
}

.info {
    padding: 10px;
    background: #141414;
    border: 1px solid #2a2a2a;
    margin-bottom: 10px;
    border-radius: 8px;
    font-size: 14px;
    line-height: 1.4;
}

canvas {
    background: #111;
    border: 1px solid #333;
    touch-action: none;
    display: block;
    width: 100%;
}

.btn {
    width: 100%;
    padding: 15px;
    background: orange;
    border: none;
    margin-top: 10px;
    font-size: 18px;
    cursor: pointer;
    color: #111;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="header">Plano</div>

<div class="canvas-container">
    <div class="info" id="estadoPlano">Plano sin cerrar</div>

    <canvas id="canvas"></canvas>

    <button class="btn" onclick="cerrarEstancia()">Cerrar estancia</button>
    <button class="btn" onclick="definirEscala()">Definir escala real</button>
    <button class="btn" onclick="borrarUltimoPunto()">Borrar último punto</button>
    <button class="btn" onclick="guardarPlano()">Guardar plano</button>
    <button class="btn" onclick="limpiarPlano()">Limpiar</button>
    <button class="btn" onclick="volver()">Volver</button>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const estadoPlano = document.getElementById("estadoPlano");

function ajustarCanvas() {
    canvas.width = window.innerWidth - 20;
    canvas.height = window.innerHeight - 360;
}
ajustarCanvas();

let clienteId = localStorage.getItem("clienteActivo");
let obraId = localStorage.getItem("obraActiva");

let obras = JSON.parse(localStorage.getItem("obras_" + clienteId)) || [];
let obra = obras.find(o => o.id == obraId);

if (!obra) {
    alert("Obra no encontrada");
    window.location.href = "obras.html";
}

if (!obra.plano) {
    obra.plano = {
        puntos: [],
        cerrado: false,
        metrosPorPixel: null,
        superficie: 0
    };
}

let puntos = Array.isArray(obra.plano.puntos) ? obra.plano.puntos : [];
let cerrado = obra.plano.cerrado === true;
let metrosPorPixel = obra.plano.metrosPorPixel || null;
let superficie = obra.plano.superficie || 0;

let puntoSeleccionado = -1;
let arrastrando = false;
const radioSeleccion = 12;

function guardarEnMemoria() {
    obra.plano = {
        puntos: puntos,
        cerrado: cerrado,
        metrosPorPixel: metrosPorPixel,
        superficie: superficie
    };

    obra.superficiePlano = superficie;
    localStorage.setItem("obras_" + clienteId, JSON.stringify(obras));
}

function obtenerPosicion(evento) {
    const rect = canvas.getBoundingClientRect();

    if (evento.touches && evento.touches.length > 0) {
        return {
            x: evento.touches[0].clientX - rect.left,
            y: evento.touches[0].clientY - rect.top
        };
    }

    return {
        x: evento.clientX - rect.left,
        y: evento.clientY - rect.top
    };
}

function buscarPunto(x, y) {
    for (let i = 0; i < puntos.length; i++) {
        const p = puntos[i];
        const d = Math.hypot(p.x - x, p.y - y);
        if (d <= radioSeleccion) return i;
    }
    return -1;
}

function distancia(p1, p2) {
    return Math.hypot(p2.x - p1.x, p2.y - p1.y);
}

function puntoMedio(p1, p2) {
    return {
        x: (p1.x + p2.x) / 2,
        y: (p1.y + p2.y) / 2
    };
}

function calcularSuperficiePixels() {
    if (puntos.length < 3) return 0;

    let area = 0;
    for (let i = 0; i < puntos.length; i++) {
        const j = (i + 1) % puntos.length;
        area += puntos[i].x * puntos[j].y;
        area -= puntos[j].x * puntos[i].y;
    }

    return Math.abs(area / 2);
}

function recalcularSuperficieReal() {
    if (!cerrado || !metrosPorPixel) {
        superficie = 0;
        return;
    }

    const areaPx = calcularSuperficiePixels();
    superficie = areaPx * metrosPorPixel * metrosPorPixel;
}

function actualizarEstado() {
    let texto = cerrado ? "Estancia cerrada" : "Plano sin cerrar";

    if (metrosPorPixel) {
        texto += "<br>Escala definida";
    } else {
        texto += "<br>Escala sin definir";
    }

    if (superficie > 0) {
        texto += "<br>Superficie: " + superficie.toFixed(2) + " m²";
    }

    if (puntoSeleccionado >= 0) {
        texto += "<br>Punto seleccionado: " + (puntoSeleccionado + 1);
    }

    estadoPlano.innerHTML = texto;
}

function dibujarLongitudes() {
    if (!metrosPorPixel) return;

    ctx.fillStyle = "white";
    ctx.font = "12px Arial";

    const totalLados = cerrado ? puntos.length : puntos.length - 1;

    for (let i = 0; i < totalLados; i++) {
        const j = (i + 1) % puntos.length;
        const p1 = puntos[i];
        const p2 = puntos[j];
        const medio = puntoMedio(p1, p2);
        const metros = distancia(p1, p2) * metrosPorPixel;

        ctx.fillText(metros.toFixed(2) + " m", medio.x + 6, medio.y - 6);
    }
}

function dibujar() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (puntos.length === 0) {
        actualizarEstado();
        return;
    }

    ctx.strokeStyle = "orange";
    ctx.lineWidth = 2;
    ctx.beginPath();

    for (let i = 0; i < puntos.length; i++) {
        const p = puntos[i];
        if (i === 0) ctx.moveTo(p.x, p.y);
        else ctx.lineTo(p.x, p.y);
    }

    if (cerrado && puntos.length >= 3) {
        ctx.closePath();
        ctx.fillStyle = "rgba(255,165,0,0.12)";
        ctx.fill();
    }

    ctx.stroke();

    for (let i = 0; i < puntos.length; i++) {
        const p = puntos[i];

        ctx.beginPath();
        ctx.arc(p.x, p.y, i === puntoSeleccionado ? 7 : 5, 0, Math.PI * 2);
        ctx.fillStyle = i === puntoSeleccionado ? "white" : "orange";
        ctx.fill();

        ctx.fillStyle = "orange";
        ctx.font = "12px Arial";
        ctx.fillText(String(i + 1), p.x + 8, p.y - 8);
    }

    dibujarLongitudes();
    actualizarEstado();
}

function cerrarEstancia() {
    if (puntos.length < 3) {
        alert("Necesitas al menos 3 puntos");
        return;
    }

    cerrado = true;
    recalcularSuperficieReal();
    guardarEnMemoria();
    dibujar();
}

function definirEscala() {
    if (puntos.length < 2) {
        alert("Necesitas al menos 2 puntos");
        return;
    }

    const largoReal = prompt("Introduce la medida real del primer lado en metros (entre el punto 1 y el 2):");
    if (!largoReal) return;

    const metrosReales = parseFloat(largoReal.replace(",", "."));
    if (!metrosReales || metrosReales <= 0) {
        alert("Medida no válida");
        return;
    }

    const pixeles = distancia(puntos[0], puntos[1]);
    if (pixeles <= 0) {
        alert("No se puede calcular la escala");
        return;
    }

    metrosPorPixel = metrosReales / pixeles;
    recalcularSuperficieReal();
    guardarEnMemoria();
    dibujar();

    alert("Escala guardada correctamente");
}

function guardarPlano() {
    recalcularSuperficieReal();
    guardarEnMemoria();
    alert("Plano guardado");
}

function borrarUltimoPunto() {
    if (puntos.length === 0) return;

    puntos.pop();

    if (puntos.length < 3) {
        cerrado = false;
    }

    puntoSeleccionado = -1;
    recalcularSuperficieReal();
    guardarEnMemoria();
    dibujar();
}

function limpiarPlano() {
    puntos = [];
    cerrado = false;
    metrosPorPixel = null;
    superficie = 0;
    puntoSeleccionado = -1;
    arrastrando = false;

    guardarEnMemoria();
    dibujar();
}

function volver() {
    window.location.href = "obra.html";
}

function iniciarInteraccion(e) {
    const pos = obtenerPosicion(e);
    const indice = buscarPunto(pos.x, pos.y);

    if (indice >= 0) {
        puntoSeleccionado = indice;
        arrastrando = true;
        dibujar();
        e.preventDefault();
        return;
    }

    if (cerrado) {
        puntoSeleccionado = -1;
        dibujar();
        return;
    }

    puntos.push({ x: pos.x, y: pos.y });
    puntoSeleccionado = puntos.length - 1;
    guardarEnMemoria();
    dibujar();
    e.preventDefault();
}

function moverInteraccion(e) {
    if (!arrastrando || puntoSeleccionado < 0) return;

    const pos = obtenerPosicion(e);
    puntos[puntoSeleccionado].x = pos.x;
    puntos[puntoSeleccionado].y = pos.y;

    recalcularSuperficieReal();
    guardarEnMemoria();
    dibujar();
    e.preventDefault();
}

function finInteraccion(e) {
    if (arrastrando) {
        arrastrando = false;
        recalcularSuperficieReal();
        guardarEnMemoria();
        dibujar();
    }
}

canvas.addEventListener("mousedown", iniciarInteraccion);
canvas.addEventListener("mousemove", moverInteraccion);
canvas.addEventListener("mouseup", finInteraccion);
canvas.addEventListener("mouseleave", finInteraccion);

canvas.addEventListener("touchstart", iniciarInteraccion, { passive: false });
canvas.addEventListener("touchmove", moverInteraccion, { passive: false });
canvas.addEventListener("touchend", finInteraccion);
canvas.addEventListener("touchcancel", finInteraccion);

window.addEventListener("resize", function() {
    ajustarCanvas();
    dibujar();
});

recalcularSuperficieReal();
dibujar();
</script>

</body>
</html>
