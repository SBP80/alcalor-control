<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALLCALOR - Plano móvil</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#111;
    color:#fff;
    overflow:hidden;
}

/* CABECERA */
.topbar{
    height:50px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 10px;
    background:#000;
    border-bottom:2px solid #ff7a00;
}

.btn{
    background:#ff7a00;
    border:none;
    padding:8px 12px;
    border-radius:8px;
    color:#000;
    font-weight:bold;
}

/* CANVAS */
#canvas{
    display:block;
    background:#1a1a1a;
}

/* BARRA INFERIOR */
.bottombar{
    position:fixed;
    bottom:0;
    width:100%;
    height:60px;
    background:#000;
    display:flex;
}

.bottombar button{
    flex:1;
    border:none;
    background:#111;
    color:#fff;
    font-size:14px;
}

/* PANEL INFERIOR */
.panel{
    position:fixed;
    bottom:-300px;
    width:100%;
    background:#222;
    padding:10px;
    transition:0.3s;
}

.panel.active{
    bottom:60px;
}

/* VERIFICACIÓN */
.verificacion{
    position:fixed;
    bottom:60px;
    width:100%;
    background:#222;
    padding:10px;
    display:none;
}

.verificacion input{
    width:100%;
    padding:10px;
    margin:5px 0;
}

.verificacion button{
    width:32%;
    margin:1%;
    padding:10px;
    border:none;
}
</style>
</head>

<body>

<div class="topbar">
    <button class="btn">Volver</button>
    <div>ALLCALOR</div>
    <button class="btn" onclick="togglePanel()">⚙</button>
</div>

<canvas id="canvas"></canvas>

<div class="bottombar">
    <button onclick="modo='dibujar'">Dibujar</button>
    <button onclick="modo='editar'">Editar</button>
    <button onclick="modo='medir'">Medidas</button>
    <button onclick="verificar()">Verificar</button>
</div>

<div class="panel" id="panel">
    <button onclick="nuevaEstancia()">Nueva estancia</button>
    <button onclick="guardar()">Guardar</button>
</div>

<div class="verificacion" id="verif">
    <div id="textoDiag"></div>
    <input id="inputDiag" type="number">
    <div>
        <button onclick="cancelar()">Cancelar</button>
        <button onclick="saltar()">Saltar</button>
        <button onclick="aceptar()">Aceptar</button>
    </div>
</div>

<script>

let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

let W = window.innerWidth;
let H = window.innerHeight - 110;

canvas.width = W;
canvas.height = H;

let puntos = [];
let modo = "dibujar";

function draw(){
    ctx.clearRect(0,0,W,H);

    ctx.strokeStyle="white";
    ctx.beginPath();

    puntos.forEach((p,i)=>{
        if(i==0) ctx.moveTo(p.x,p.y);
        else ctx.lineTo(p.x,p.y);
    });

    ctx.stroke();

    puntos.forEach((p,i)=>{
        ctx.fillStyle="orange";
        ctx.beginPath();
        ctx.arc(p.x,p.y,5,0,Math.PI*2);
        ctx.fill();

        ctx.fillStyle="white";
        ctx.fillText("V"+(i+1),p.x+5,p.y-5);
    });
}

canvas.addEventListener("click",(e)=>{
    if(modo=="dibujar"){
        puntos.push({x:e.offsetX,y:e.offsetY});
        draw();
    }
});

function togglePanel(){
    document.getElementById("panel").classList.toggle("active");
}

function nuevaEstancia(){
    puntos=[];
    draw();
}

function guardar(){
    alert("Guardado");
}

/* -------- VERIFICACIÓN -------- */

let diagIndex=0;

function verificar(){
    if(puntos.length<4)return;

    diagIndex=0;
    mostrarDiag();
    document.getElementById("verif").style.display="block";
}

function mostrarDiag(){
    let d = distancia(puntos[0], puntos[2]);
    document.getElementById("textoDiag").innerText="Diagonal: "+d.toFixed(2)+" m";
    document.getElementById("inputDiag").value=d.toFixed(2);
}

function aceptar(){
    let real = parseFloat(document.getElementById("inputDiag").value);

    let p1=puntos[0];
    let p2=puntos[2];

    let dx = p2.x - p1.x;
    let dy = p2.y - p1.y;
    let actual = Math.sqrt(dx*dx+dy*dy);

    let factor = real/actual;

    p2.x = p1.x + dx*factor;
    p2.y = p1.y + dy*factor;

    draw();
}

function cancelar(){
    document.getElementById("verif").style.display="none";
}

function saltar(){
    cancelar();
}

function distancia(a,b){
    let dx=a.x-b.x;
    let dy=a.y-b.y;
    return Math.sqrt(dx*dx+dy*dy);
}

draw();

</script>

</body>
</html>
