<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plano</title>

<style>
body {
    margin: 0;
    background: #0b0b0b;
    color: white;
    font-family: Arial, sans-serif;
}

.header {
    padding: 15px;
    border-bottom: 2px solid orange;
    font-size: 20px;
}

.canvas-container {
    padding: 10px;
}

.info {
    padding: 10px;
    background: #141414;
    border: 1px solid #2a2a2a;
    margin-bottom: 10px;
    border-radius: 8px;
    font-size: 14px;
}

canvas {
    background: #111;
    border: 1px solid #333;
    touch-action: none;
    display: block;
    width: 100%;
}

.btn {
    width: 100%;
    padding: 15px;
    background: orange;
    border: none;
    margin-top: 10px;
    font-size: 18px;
    cursor: pointer;
    color: #111;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="header">Plano</div>

<div class="canvas-container">
    <div class="info" id="estadoPlano">Plano sin cerrar</div>

    <canvas id="canvas"></canvas>

    <button class="btn" onclick="cerrarEstancia()">Cerrar estancia</button>
    <button class="btn" onclick="guardarPlano()">Guardar plano</button>
    <button class="btn" onclick="limpiarPlano()">Limpiar</button>
    <button class="btn" onclick="volver()">Volver</button>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const estadoPlano = document.getElementById("estadoPlano");

function ajustarCanvas() {
    canvas.width = window.innerWidth - 20;
    canvas.height = window.innerHeight - 260;
}
ajustarCanvas();

let clienteId = localStorage.getItem("clienteActivo");
let obraId = localStorage.getItem("obraActiva");

let obras = JSON.parse(localStorage.getItem("obras_" + clienteId)) || [];
let obra = obras.find(o => o.id == obraId);

if (!obra) {
    alert("Obra no encontrada");
    window.location.href = "obras.html";
}

if (!obra.plano) {
    obra.plano = {
        puntos: [],
        cerrado: false
    };
}

let puntos = Array.isArray(obra.plano.puntos) ? obra.plano.puntos : [];
let cerrado = obra.plano.cerrado === true;

function guardarEnMemoria() {
    obra.plano = {
        puntos: puntos,
        cerrado: cerrado
    };
    localStorage.setItem("obras_" + clienteId, JSON.stringify(obras));
}

canvas.addEventListener("click", function(e) {
    if (cerrado) return;

    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    puntos.push({ x, y });
    guardarEnMemoria();
    dibujar();
});

function actualizarEstado() {
    estadoPlano.textContent = cerrado ? "Estancia cerrada" : "Plano sin cerrar";
}

function dibujar() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (puntos.length === 0) {
        actualizarEstado();
        return;
    }

    ctx.strokeStyle = "orange";
    ctx.lineWidth = 2;
    ctx.beginPath();

    for (let i = 0; i < puntos.length; i++) {
        const p = puntos[i];
        if (i === 0) ctx.moveTo(p.x, p.y);
        else ctx.lineTo(p.x, p.y);
    }

    if (cerrado && puntos.length >= 3) {
        ctx.closePath();
        ctx.fillStyle = "rgba(255,165,0,0.12)";
        ctx.fill();
    }

    ctx.stroke();

    for (const p of puntos) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
        ctx.fillStyle = "orange";
        ctx.fill();
    }

    actualizarEstado();
}

function cerrarEstancia() {
    if (puntos.length < 3) {
        alert("Necesitas al menos 3 puntos");
        return;
    }

    cerrado = true;
    guardarEnMemoria();
    dibujar();
}

function guardarPlano() {
    guardarEnMemoria();
    alert("Plano guardado");
}

function limpiarPlano() {
    puntos = [];
    cerrado = false;
    guardarEnMemoria();
    dibujar();
}

function volver() {
    window.location.href = "obra.html";
}

window.addEventListener("resize", function() {
    ajustarCanvas();
    dibujar();
});

dibujar();
</script>

</body>
</html>
