<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plano</title>

<style>
body { margin:0; background:#0b0b0b; color:white; font-family:Arial; }
.header { padding:15px; border-bottom:2px solid orange; font-size:20px; }
.canvas-container { padding:10px; }

.info {
    padding:10px;
    background:#141414;
    border:1px solid #2a2a2a;
    margin-bottom:10px;
    border-radius:8px;
    font-size:14px;
}

canvas {
    background:#111;
    border:1px solid #333;
    width:100%;
}

.btn {
    width:100%;
    padding:15px;
    background:orange;
    border:none;
    margin-top:10px;
    font-size:18px;
}
</style>
</head>

<body>

<div class="header">Plano</div>

<div class="canvas-container">

<div class="info" id="info"></div>

<canvas id="canvas"></canvas>

<button class="btn" onclick="nuevaEstancia()">Nueva estancia</button>
<button class="btn" onclick="cerrarEstancia()">Cerrar estancia</button>
<button class="btn" onclick="guardarEstancia()">Guardar estancia</button>
<button class="btn" onclick="limpiarActual()">Limpiar actual</button>
<button class="btn" onclick="volver()">Volver</button>

</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const info = document.getElementById("info");

canvas.width = window.innerWidth - 20;
canvas.height = window.innerHeight - 300;

let clienteId = localStorage.getItem("clienteActivo");
let obraId = localStorage.getItem("obraActiva");

let obras = JSON.parse(localStorage.getItem("obras_" + clienteId)) || [];
let obra = obras.find(o => o.id == obraId);

if (!obra.plano) {
    obra.plano = { estancias: [] };
}

let estancias = obra.plano.estancias;
let puntos = [];
let cerrado = false;

canvas.addEventListener("click", e => {
    if (cerrado) return;

    const rect = canvas.getBoundingClientRect();
    puntos.push({
        x: e.clientX - rect.left,
        y: e.clientY - rect.top
    });

    dibujar();
});

function dibujar() {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // dibujar estancias guardadas
    estancias.forEach(est => {
        ctx.beginPath();
        est.puntos.forEach((p,i)=>{
            if(i===0) ctx.moveTo(p.x,p.y);
            else ctx.lineTo(p.x,p.y);
        });
        ctx.closePath();
        ctx.strokeStyle="orange";
        ctx.stroke();

        ctx.fillStyle="rgba(255,165,0,0.08)";
        ctx.fill();

        // nombre
        let p=est.puntos[0];
        ctx.fillStyle="white";
        ctx.fillText(est.nombre,p.x+5,p.y-5);
    });

    // dibujar actual
    if(puntos.length>0){
        ctx.beginPath();
        puntos.forEach((p,i)=>{
            if(i===0) ctx.moveTo(p.x,p.y);
            else ctx.lineTo(p.x,p.y);
        });
        if(cerrado) ctx.closePath();
        ctx.strokeStyle="white";
        ctx.stroke();
    }

    info.innerHTML = "Estancias: "+estancias.length + (cerrado?"<br>cerrada":"");
}

function cerrarEstancia(){
    if(puntos.length<3)return;
    cerrado=true;
    dibujar();
}

function guardarEstancia(){
    if(!cerrado)return;

    let nombre = prompt("Nombre estancia:");
    if(!nombre)return;

    estancias.push({
        nombre:nombre,
        puntos:[...puntos]
    });

    puntos=[];
    cerrado=false;

    obra.plano.estancias=estancias;
    localStorage.setItem("obras_"+clienteId,JSON.stringify(obras));

    dibujar();
}

function nuevaEstancia(){
    puntos=[];
    cerrado=false;
    dibujar();
}

function limpiarActual(){
    puntos=[];
    cerrado=false;
    dibujar();
}

function volver(){
    window.location.href="obra.html";
}

dibujar();
</script>

</body>
</html>
