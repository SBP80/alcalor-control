<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALLCALOR - Plano</title>

<style>
body{
    margin:0;
    background:#0b0b0b;
    color:#fff;
    font-family:Arial;
}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    padding:10px;
    border-bottom:2px solid orange;
}
.btn{
    background:orange;
    border:none;
    padding:10px;
    border-radius:8px;
    font-weight:bold;
}

/* CANVAS */
canvas{
    width:100%;
    height:80vh;
    display:block;
    background:#111;
}

/* BARRA INFERIOR */
.toolbar{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    display:flex;
    gap:6px;
    padding:8px;
    background:#151515;
}
.toolbar button{
    flex:1;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#333;
    color:#fff;
}
.toolbar button.active{
    background:orange;
    color:#000;
}
</style>
</head>

<body>

<div class="header">
    <button class="btn" onclick="volver()">Volver</button>
    <b>ALLCALOR</b>
    <button class="btn" onclick="guardar()">Guardar</button>
</div>

<canvas id="c"></canvas>

<div class="toolbar">
    <button onclick="modo='dibujar'">Dibujar</button>
    <button onclick="modo='editar'">Editar</button>
    <button onclick="modo='medir'">Medidas</button>
    <button onclick="modo='unir'">Unir</button>
</div>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

function resize(){
    c.width = c.offsetWidth;
    c.height = c.offsetHeight;
}
resize();
window.onresize = resize;

/* DATOS */
let estancias = [];
let actual = [];
let modo = "dibujar";
let seleccion = null;

/* UTILS */
function dist(a,b){
    return Math.hypot(b.x-a.x,b.y-a.y);
}
function puntoEnPoligono(x,y,poly){
    let inside=false;
    for(let i=0,j=poly.length-1;i<poly.length;j=i++){
        const xi=poly[i].x, yi=poly[i].y;
        const xj=poly[j].x, yj=poly[j].y;
        const inter = ((yi>y)!=(yj>y)) &&
            (x<(xj-xi)*(y-yi)/(yj-yi)+xi);
        if(inter) inside=!inside;
    }
    return inside;
}

/* DIBUJO */
function draw(){
    ctx.clearRect(0,0,c.width,c.height);

    // estancias guardadas
    estancias.forEach((e,i)=>{
        ctx.beginPath();
        e.forEach((p,j)=>{
            j?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y);
        });
        ctx.closePath();
        ctx.strokeStyle = "#f39b2f";
        ctx.stroke();

        // vertices
        e.forEach((p,i)=>{
            ctx.fillStyle="#fff";
            ctx.fillText("V"+(i+1),p.x+5,p.y-5);
        });
    });

    // actual
    if(actual.length){
        ctx.beginPath();
        actual.forEach((p,i)=>{
            i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y);
        });
        ctx.strokeStyle="#fff";
        ctx.stroke();
    }
}

/* CLICK */
c.addEventListener("click",e=>{
    const r=c.getBoundingClientRect();
    const x=e.clientX-r.left;
    const y=e.clientY-r.top;

    if(modo==="dibujar"){
        actual.push({x,y});
    }

    if(modo==="editar"){
        estancias.forEach((e,i)=>{
            if(puntoEnPoligono(x,y,e)){
                seleccion=i;
                if(confirm("¿Editar estancia?")){
                    actual = JSON.parse(JSON.stringify(e));
                    estancias.splice(i,1);
                }
            }
        });
    }

    if(modo==="unir"){
        estancias.forEach((e,i)=>{
            if(puntoEnPoligono(x,y,e)){
                if(seleccion===null){
                    seleccion=i;
                }else{
                    unir(seleccion,i);
                    seleccion=null;
                }
            }
        });
    }

    draw();
});

/* DOBLE CLICK CERRAR */
c.addEventListener("dblclick",()=>{
    if(actual.length>=3){
        estancias.push(JSON.parse(JSON.stringify(actual)));
        actual=[];
    }
    draw();
});

/* UNIÓN SIMPLE */
function unir(a,b){
    const A = estancias[a];
    const B = estancias[b];

    // unión básica (simplificada)
    const union = A.concat(B);

    estancias[a] = union;
    estancias.splice(b,1);
}

/* GUARDAR */
function guardar(){
    localStorage.setItem("plano",JSON.stringify(estancias));
}

/* CARGAR */
const data = localStorage.getItem("plano");
if(data) estancias = JSON.parse(data);

function volver(){
    history.back();
}

draw();
</script>

</body>
</html>
