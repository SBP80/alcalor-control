<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plano</title>
<style>
body{
    margin:0;
    background:#0b0b0b;
    color:#fff;
    font-family:Arial,sans-serif;
}
.header{
    padding:12px 15px;
    border-bottom:2px solid orange;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
}
.header-titulo{
    font-size:22px;
    font-weight:bold;
}
.header-btn{
    background:orange;
    border:none;
    color:#111;
    font-weight:bold;
    padding:10px 14px;
    border-radius:8px;
    font-size:15px;
    cursor:pointer;
}
.wrap{
    padding:10px;
    position:relative;
}
.info{
    padding:10px;
    background:#141414;
    border:1px solid #2a2a2a;
    margin-bottom:10px;
    border-radius:8px;
    font-size:14px;
    line-height:1.45;
}
.tools{
    position:absolute;
    top:58px;
    right:10px;
    width:185px;
    max-height:75vh;
    overflow-y:auto;
    background:#141414;
    border:1px solid #2a2a2a;
    border-radius:10px;
    padding:8px;
    display:none;
    z-index:30;
    box-shadow:0 8px 24px rgba(0,0,0,.45);
}
.tools.abierto{
    display:block;
}
.subtitulo{
    margin:4px 0 6px 0;
    font-size:12px;
    color:orange;
    font-weight:bold;
}
canvas{
    background:#111;
    border:1px solid #333;
    display:block;
    width:100%;
    touch-action:none;
}
.btn{
    width:100%;
    padding:11px;
    background:orange;
    border:none;
    margin-top:7px;
    font-size:14px;
    cursor:pointer;
    color:#111;
    font-weight:bold;
    border-radius:8px;
}
.btn-sec{
    background:#d6a13b;
}
.btn-danger{
    background:#c93b2f;
    color:#fff;
}
</style>
</head>
<body>

<div class="header">
    <button class="header-btn" onclick="volver()">Volver</button>
    <div class="header-titulo">Plano</div>
    <button class="header-btn" onclick="toggleTools()">Herramientas</button>
</div>

<div class="wrap">
    <div class="info" id="info">Cargando...</div>

    <div class="tools" id="tools">
        <div class="subtitulo">Plano</div>
        <button class="btn" onclick="nuevaEstancia()">Nueva estancia</button>
        <button class="btn" onclick="cerrarEstancia()">Cerrar estancia</button>
        <button class="btn" onclick="guardarEstancia()">Guardar estancia</button>
        <button class="btn btn-sec" onclick="activarZonaMuerta()">Zona muerta</button>
        <button class="btn btn-sec" onclick="borrarUltimoPunto()">Borrar último punto</button>
        <button class="btn btn-sec" onclick="definirEscala()">Definir escala</button>
        <button class="btn btn-danger" onclick="eliminarEstanciaSeleccionada()">Eliminar estancia</button>
        <button class="btn btn-sec" onclick="limpiarActual()">Limpiar actual</button>
        <button class="btn" onclick="guardarPlano()">Guardar plano</button>
    </div>

    <canvas id="canvas"></canvas>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const info = document.getElementById("info");
const tools = document.getElementById("tools");

function toggleTools() {
    tools.classList.toggle("abierto");
}

function ajustarCanvas() {
    canvas.width = window.innerWidth - 20;
    canvas.height = window.innerHeight - 165;
}
ajustarCanvas();

let clienteId = localStorage.getItem("clienteActivo");
let obraId = localStorage.getItem("obraActiva");

let obras = JSON.parse(localStorage.getItem("obras_" + clienteId)) || [];
let obra = obras.find(o => String(o.id) === String(obraId));

if (!obra) {
    alert("Obra no encontrada");
    window.location.href = "obras.html";
}

if (!obra.plano) {
    obra.plano = {
        estancias: [],
        metrosPorPixel: null
    };
}

if (!Array.isArray(obra.plano.estancias)) {
    obra.plano.estancias = [];
}

let estancias = obra.plano.estancias;
    
let modoZonaMuerta = false;
let zonasMuertas = [];
let zonaMuertaTemp = null;   
let metrosPorPixel = obra.plano.metrosPorPixel || null;

let puntos = [];
let cerrado = false;

let seleccion = {
    tipo: null, // puntoActual, estanciaActual, puntoGuardado, estanciaGuardada
    estanciaIndex: -1,
    puntoIndex: -1
};

let arrastrando = false;
let ultimoX = 0;
let ultimoY = 0;

const RADIO_PUNTO = 14;
function guardarMemoria() {
    obra.plano = {
        estancias: estancias,
        metrosPorPixel: metrosPorPixel
    };

    obra.zonasMuertas = zonasMuertas;

    localStorage.setItem("obras_" + clienteId, JSON.stringify(obras));
}

function obtenerPosicion(evento) {
    const rect = canvas.getBoundingClientRect();

    if (evento.touches && evento.touches.length > 0) {
        return {
            x: evento.touches[0].clientX - rect.left,
            y: evento.touches[0].clientY - rect.top
        };
    }

    if (evento.changedTouches && evento.changedTouches.length > 0) {
        return {
            x: evento.changedTouches[0].clientX - rect.left,
            y: evento.changedTouches[0].clientY - rect.top
        };
    }

    return {
        x: evento.clientX - rect.left,
        y: evento.clientY - rect.top
    };
}

function distancia(p1, p2) {
    return Math.hypot(p2.x - p1.x, p2.y - p1.y);
}

function puntoMedio(p1, p2) {
    return {
        x: (p1.x + p2.x) / 2,
        y: (p1.y + p2.y) / 2
    };
}

function centroide(lista) {
    let sx = 0;
    let sy = 0;
    for (const p of lista) {
        sx += p.x;
        sy += p.y;
    }
    return {
        x: sx / lista.length,
        y: sy / lista.length
    };
}

function calcularAreaPixels(lista) {
    if (!lista || lista.length < 3) return 0;

    let area = 0;
    for (let i = 0; i < lista.length; i++) {
        const j = (i + 1) % lista.length;
        area += lista[i].x * lista[j].y;
        area -= lista[j].x * lista[i].y;
    }
    return Math.abs(area / 2);
}

function calcularSuperficieReal(lista) {
    if (!metrosPorPixel) return 0;
    return calcularAreaPixels(lista) * metrosPorPixel * metrosPorPixel;
}

function puntoDentroPoligono(x, y, poligono) {
    let dentro = false;

    for (let i = 0, j = poligono.length - 1; i < poligono.length; j = i++) {
        const xi = poligono[i].x;
        const yi = poligono[i].y;
        const xj = poligono[j].x;
        const yj = poligono[j].y;

        const cruza = ((yi > y) !== (yj > y)) &&
            (x < ((xj - xi) * (y - yi)) / ((yj - yi) || 0.000001) + xi);

        if (cruza) dentro = !dentro;
    }

    return dentro;
}

function buscarPuntoEnLista(x, y, lista) {
    for (let i = 0; i < lista.length; i++) {
        const p = lista[i];
        if (Math.hypot(p.x - x, p.y - y) <= RADIO_PUNTO) {
            return i;
        }
    }
    return -1;
}

function limpiarSeleccion() {
    seleccion.tipo = null;
    seleccion.estanciaIndex = -1;
    seleccion.puntoIndex = -1;
}

function obtenerEstanciaSeleccionada() {
    if (seleccion.tipo === "estanciaGuardada" || seleccion.tipo === "puntoGuardado") {
        return estancias[seleccion.estanciaIndex] || null;
    }

    if (seleccion.tipo === "estanciaActual" || seleccion.tipo === "puntoActual") {
        return {
            nombre: "Estancia actual",
            puntos: puntos
        };
    }

    return null;
}

function dibujarMedidas(lista, estaCerrada, colorTexto) {
    if (!metrosPorPixel || !lista || lista.length < 2) return;

    ctx.fillStyle = colorTexto;
    ctx.font = "12px Arial";

    const totalLados = estaCerrada ? lista.length : lista.length - 1;

    for (let i = 0; i < totalLados; i++) {
        const j = (i + 1) % lista.length;
        const p1 = lista[i];
        const p2 = lista[j];
        const medio = puntoMedio(p1, p2);
        const metros = distancia(p1, p2) * metrosPorPixel;
        ctx.fillText(metros.toFixed(2) + " m", medio.x + 6, medio.y - 6);
    }
}

function dibujarEstanciaGuardada(est, index) {
    if (!est.puntos || est.puntos.length < 3) return;

    const seleccionada =
        (seleccion.tipo === "estanciaGuardada" && seleccion.estanciaIndex === index) ||
        (seleccion.tipo === "puntoGuardado" && seleccion.estanciaIndex === index);

    ctx.beginPath();
    est.puntos.forEach((p, i) => {
        if (i === 0) ctx.moveTo(p.x, p.y);
        else ctx.lineTo(p.x, p.y);
    });
    ctx.closePath();

    ctx.strokeStyle = seleccionada ? "white" : "orange";
    ctx.lineWidth = seleccionada ? 3 : 2;
    ctx.stroke();

    ctx.fillStyle = seleccionada ? "rgba(255,255,255,0.12)" : "rgba(255,165,0,0.10)";
    ctx.fill();

    est.puntos.forEach((p, i) => {
        const esPuntoSel =
            seleccion.tipo === "puntoGuardado" &&
            seleccion.estanciaIndex === index &&
            seleccion.puntoIndex === i;

        ctx.beginPath();
        ctx.arc(p.x, p.y, esPuntoSel ? 7 : 5, 0, Math.PI * 2);
        ctx.fillStyle = esPuntoSel ? "white" : "orange";
        ctx.fill();
    });

    const c = centroide(est.puntos);
    ctx.fillStyle = "white";
    ctx.font = "16px Arial";
    ctx.fillText(est.nombre || "Estancia", c.x - 20, c.y - 10);

    if (metrosPorPixel) {
        ctx.font = "13px Arial";
        ctx.fillText(calcularSuperficieReal(est.puntos).toFixed(2) + " m²", c.x - 20, c.y + 10);
    }

    dibujarMedidas(est.puntos, true, "white");
}

function dibujarEstanciaActual() {
    if (puntos.length === 0) return;

    const seleccionada = seleccion.tipo === "estanciaActual" || seleccion.tipo === "puntoActual";

    ctx.beginPath();
    puntos.forEach((p, i) => {
        if (i === 0) ctx.moveTo(p.x, p.y);
        else ctx.lineTo(p.x, p.y);
    });

    if (cerrado && puntos.length >= 3) {
        ctx.closePath();
        ctx.fillStyle = seleccionada ? "rgba(255,255,255,0.12)" : "rgba(255,255,255,0.06)";
        ctx.fill();
    }

    ctx.strokeStyle = seleccionada ? "white" : "#dddddd";
    ctx.lineWidth = seleccionada ? 3 : 2;
    ctx.stroke();

    puntos.forEach((p, i) => {
        const esPuntoSel = seleccion.tipo === "puntoActual" && seleccion.puntoIndex === i;

        ctx.beginPath();
        ctx.arc(p.x, p.y, esPuntoSel ? 7 : 5, 0, Math.PI * 2);
        ctx.fillStyle = esPuntoSel ? "orange" : "white";
        ctx.fill();

        ctx.fillStyle = "white";
        ctx.font = "12px Arial";
        ctx.fillText(String(i + 1), p.x + 8, p.y - 8);
    });

    dibujarMedidas(puntos, cerrado, "white");
}

function actualizarInfo() {
    const estanciaSel = obtenerEstanciaSeleccionada();

    if (!estanciaSel) {
        let total = 0;
        for (const est of estancias) {
            total += calcularSuperficieReal(est.puntos);
        }

        let texto = "Resumen del plano";
        texto += "<br>Estancias guardadas: " + estancias.length;
        texto += "<br>Escala: " + (metrosPorPixel ? "definida" : "sin definir");

        if (total > 0) {
            texto += "<br>Superficie total: " + total.toFixed(2) + " m²";
        }

        if (puntos.length > 0) {
            texto += "<br>Estancia actual en edición: sí";
            texto += "<br>Puntos actuales: " + puntos.length;
            texto += "<br>Estado: " + (cerrado ? "cerrada" : "abierta");
            if (cerrado && metrosPorPixel) {
                texto += "<br>Superficie actual: " + calcularSuperficieReal(puntos).toFixed(2) + " m²";
            }
        }

        info.innerHTML = texto;
        return;
    }

    let texto = "Datos de la estancia seleccionada";
    texto += "<br>Nombre: " + (estanciaSel.nombre || "Sin nombre");
    texto += "<br>Lados: " + estanciaSel.puntos.length;

    if (metrosPorPixel) {
        texto += "<br>Superficie: " + calcularSuperficieReal(estanciaSel.puntos).toFixed(2) + " m²";
        texto += "<br>Longitudes:";
        for (let i = 0; i < estanciaSel.puntos.length; i++) {
            const j = (i + 1) % estanciaSel.puntos.length;
            const m = distancia(estanciaSel.puntos[i], estanciaSel.puntos[j]) * metrosPorPixel;
            texto += "<br>- Lado " + (i + 1) + ": " + m.toFixed(2) + " m";
        }
    }

    info.innerHTML = texto;
}

function dibujar() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (let i = 0; i < estancias.length; i++) {
        dibujarEstanciaGuardada(estancias[i], i);
    }

    dibujarEstanciaActual();

    zonasMuertas.forEach((z) => {
        ctx.fillStyle = "rgba(255, 0, 0, 0.25)";
        ctx.fillRect(z.x, z.y, z.w, z.h);

        ctx.strokeStyle = "red";
        ctx.lineWidth = 2;
        ctx.strokeRect(z.x, z.y, z.w, z.h);

        ctx.fillStyle = "white";
        ctx.font = "12px Arial";

        if (metrosPorPixel) {
            const ancho = (z.w * metrosPorPixel).toFixed(2);
            const alto = (z.h * metrosPorPixel).toFixed(2);
            ctx.fillText("Zona muerta " + ancho + "m x " + alto + "m", z.x + 6, z.y + 16);
        if (z.tipo === "zonaMuerta") {
    ctx.fillText("Zona muerta", z.x + 6, z.y + 16);
}
        }
    });

    if (modoZonaMuerta && zonaMuertaTemp) {
        const x = Math.min(zonaMuertaTemp.x1, zonaMuertaTemp.x2);
        const y = Math.min(zonaMuertaTemp.y1, zonaMuertaTemp.y2);
        const w = Math.abs(zonaMuertaTemp.x2 - zonaMuertaTemp.x1);
        const h = Math.abs(zonaMuertaTemp.y2 - zonaMuertaTemp.y1);

        ctx.fillStyle = "rgba(255,255,0,0.15)";
        ctx.fillRect(x, y, w, h);

        ctx.strokeStyle = "yellow";
        ctx.lineWidth = 2;
        ctx.strokeRect(x, y, w, h);
    }

    actualizarInfo();

function nuevaEstancia() {
    puntos = [];
    cerrado = false;
    limpiarSeleccion();
    dibujar();
}

function cerrarEstancia() {
    if (puntos.length < 3) {
        alert("Necesitas al menos 3 puntos");
        return;
    }
    cerrado = true;
    dibujar();
}

function definirEscala() {
    if (puntos.length < 2) {
        alert("Necesitas al menos 2 puntos en la estancia actual");
        return;
    }

    const valor = prompt("Introduce la medida real del primer lado en metros (entre punto 1 y punto 2):");
    if (!valor) return;

    const metrosReales = parseFloat(valor.replace(",", "."));
    if (!metrosReales || metrosReales <= 0) {
        alert("Medida no válida");
        return;
    }

    const pixeles = distancia(puntos[0], puntos[1]);
    if (!pixeles || pixeles <= 0) {
        alert("No se pudo calcular la escala");
        return;
    }

    metrosPorPixel = metrosReales / pixeles;
    guardarMemoria();
    dibujar();
    alert("Escala guardada correctamente");
}

function guardarEstancia() {
    if (!cerrado || puntos.length < 3) {
        alert("Primero cierra la estancia");
        return;
    }
    
    const nombre = prompt("Nombre estancia:");
    if (!nombre || nombre.trim() === "") return;

    estancias.push({
        nombre: nombre.trim(),
        puntos: JSON.parse(JSON.stringify(puntos))
});
    
    guardarMemoria();
    puntos = [];
    cerrado = false;
    limpiarSeleccion();
    dibujar();
}
    function activarZonaMuerta() {
    modoZonaMuerta = true;
    zonaMuertaTemp = null;
    arrastrando = false;
    limpiarSeleccion();
    dibujar();
}

function borrarUltimoPunto() {
    if (puntos.length === 0) return;

    puntos.pop();
    if (puntos.length < 3) cerrado = false;

    if (seleccion.tipo === "puntoActual" && seleccion.puntoIndex >= puntos.length) {
        limpiarSeleccion();
    }

    dibujar();
}

function eliminarEstanciaSeleccionada() {
    if (seleccion.tipo === "estanciaGuardada" || seleccion.tipo === "puntoGuardado") {
        const nombre = estancias[seleccion.estanciaIndex]?.nombre || "esta estancia";
        if (!confirm('Eliminar "' + nombre + '"?')) return;

        estancias.splice(seleccion.estanciaIndex, 1);
        guardarMemoria();
        limpiarSeleccion();
        dibujar();
        return;
    }

    if (seleccion.tipo === "estanciaActual" || seleccion.tipo === "puntoActual") {
        if (!confirm("Eliminar la estancia actual?")) return;

        puntos = [];
        cerrado = false;
        limpiarSeleccion();
        dibujar();
        return;
    }

    alert("Primero selecciona una estancia");
}

function limpiarActual() {
    puntos = [];
    cerrado = false;
    limpiarSeleccion();
    dibujar();
}

function guardarPlano() {
    guardarMemoria();
    alert("Plano guardado");
}

function volver() {
    window.location.href = "obra.html";
}

function empezarInteraccion(evento) {
    const pos = obtenerPosicion(evento);
    ultimoX = pos.x;
    ultimoY = pos.y;

    if (modoZonaMuerta) {
        zonaMuertaTemp = {
            x1: pos.x,
            y1: pos.y,
            x2: pos.x,
            y2: pos.y
        };
        arrastrando = true;
        dibujar();

        if (evento.cancelable) evento.preventDefault();
        return;
    }

    let idx = buscarPuntoEnLista(pos.x, pos.y, puntos);
    if (idx >= 0) {
        seleccion.tipo = "puntoActual";
        seleccion.estanciaIndex = -1;
        seleccion.puntoIndex = idx;
        arrastrando = true;
        dibujar();
        if (evento && evento.cancelable) evento.preventDefault();
        return;
    }

    for (let i = estancias.length - 1; i >= 0; i--) {
        idx = buscarPuntoEnLista(pos.x, pos.y, estancias[i].puntos);
        if (idx >= 0) {
            seleccion.tipo = "puntoGuardado";
            seleccion.estanciaIndex = i;
            seleccion.puntoIndex = idx;
            arrastrando = true;
            dibujar();
            if (evento && evento.cancelable) evento.preventDefault();
            return;
    }

    if (cerrado && puntos.length >= 3 && puntoDentroPoligono(pos.x, pos.y, puntos)) {
        seleccion.tipo = "estanciaActual";
        seleccion.estanciaIndex = -1;
        seleccion.puntoIndex = -1;
        arrastrando = true;
        dibujar();
        if (evento.cancelable) evento.preventDefault();
        return;
    }

    for (let i = estancias.length - 1; i >= 0; i--) {
        if (puntoDentroPoligono(pos.x, pos.y, estancias[i].puntos)) {
            seleccion.tipo = "estanciaGuardada";
            seleccion.estanciaIndex = i;
            seleccion.puntoIndex = -1;
            arrastrando = true;
            dibujar();
            if (evento.cancelable) evento.preventDefault();
            return;
        }
    }

    if (!cerrado) {
        puntos.push({ x: pos.x, y: pos.y });
        seleccion.tipo = "puntoActual";
        seleccion.estanciaIndex = -1;
        seleccion.puntoIndex = puntos.length - 1;
        dibujar();
        if (evento.cancelable) evento.preventDefault();
        return;
    }

    limpiarSeleccion();
    dibujar();

      
    idx = buscarPuntoEnLista(pos.x, pos.y, estancias[i].puntos);
    if (idx >= 0) {
        seleccion.tipo = "puntoActual";
        seleccion.estanciaIndex = -1;
        seleccion.puntoIndex = idx;
        arrastrando = true;
        dibujar();
        if (evento.cancelable) evento.preventDefault();
        return;
    }

    for (let i = estancias.length - 1; i >= 0; i--) {
        idx = buscarPuntoEnLista(pos.x, pos.y, estancias[i].puntos);
        if (idx >= 0) {
            seleccion.tipo = "puntoGuardado";
            seleccion.estanciaIndex = i;
            seleccion.puntoIndex = idx;
            arrastrando = true;
            dibujar();
            if (evento.cancelable) evento.preventDefault();
            return;
        }
    }

    if (cerrado && puntos.length >= 3 && puntoDentroPoligono(pos.x, pos.y, puntos)) {
        seleccion.tipo = "estanciaActual";
        seleccion.estanciaIndex = -1;
        seleccion.puntoIndex = -1;
        arrastrando = true;
        dibujar();
        if (evento.cancelable) evento.preventDefault();
        return;
    }

    for (let i = estancias.length - 1; i >= 0; i--) {
        if (puntoDentroPoligono(pos.x, pos.y, estancias[i].puntos)) {
            seleccion.tipo = "estanciaGuardada";
            seleccion.estanciaIndex = i;
            seleccion.puntoIndex = -1;
            arrastrando = true;
            dibujar();
            if (evento.cancelable) evento.preventDefault();
            return;
        }
    }

    if (!cerrado) {
        puntos.push({ x: pos.x, y: pos.y });
        seleccion.tipo = "puntoActual";
        seleccion.estanciaIndex = -1;
        seleccion.puntoIndex = puntos.length - 1;
        dibujar();
        if (evento.cancelable) evento.preventDefault();
        return;
    }

    limpiarSeleccion();
    dibujar();
}

function moverInteraccion(evento) {
    if (modoZonaMuerta && arrastrando && zonaMuertaTemp) {
        const pos = obtenerPosicion(evento);

        zonaMuertaTemp.x2 = pos.x;
        zonaMuertaTemp.y2 = pos.y;

        ultimoX = pos.x;
        ultimoY = pos.y;

        dibujar();

        if (evento.cancelable) evento.preventDefault();
        return;
    }

    if (!arrastrando || !seleccion.tipo) return;

    const pos = obtenerPosicion(evento);
    const dx = pos.x - ultimoX;
    const dy = pos.y - ultimoY;

    if (seleccion.tipo === "puntoActual") {
        puntos[seleccion.puntoIndex].x += dx;
        puntos[seleccion.puntoIndex].y += dy;
    }

    if (seleccion.tipo === "puntoGuardado") {
        const est = estancias[seleccion.estanciaIndex];
        est.puntos[seleccion.puntoIndex].x += dx;
        est.puntos[seleccion.puntoIndex].y += dy;
        guardarMemoria();
    }

    if (seleccion.tipo === "estanciaActual") {
        for (const p of puntos) {
            p.x += dx;
            p.y += dy;
        }
    }

    if (seleccion.tipo === "estanciaGuardada") {
        const est = estancias[seleccion.estanciaIndex];
        for (const p of est.puntos) {
            p.x += dx;
            p.y += dy;
        }
        guardarMemoria();
    }

    ultimoX = pos.x;
    ultimoY = pos.y;

    dibujar();
    if (evento.cancelable) evento.preventDefault();
}

function terminarInteraccion(evento) {
    if (modoZonaMuerta && arrastrando && zonaMuertaTemp) {
        const pos = obtenerPosicion(evento);

        zonaMuertaTemp.x2 = pos.x;
        zonaMuertaTemp.y2 = pos.y;

        const w = Math.abs(zonaMuertaTemp.x2 - zonaMuertaTemp.x1);
        const h = Math.abs(zonaMuertaTemp.y2 - zonaMuertaTemp.y1);

        if (w > 3 && h > 3) {
            zonasMuertas.push({
                x: Math.min(zonaMuertaTemp.x1, zonaMuertaTemp.x2),
                y: Math.min(zonaMuertaTemp.y1, zonaMuertaTemp.y2),
                w: w,
                h: h
            });
            guardarMemoria();
        }

        zonaMuertaTemp = null;
        modoZonaMuerta = false;
        arrastrando = false;
        dibujar();

        if (evento && evento.cancelable) evento.preventDefault();
    }

    if (!arrastrando) return;

arrastrando = false;

if (
    seleccion.tipo === "puntoGuardado" ||
    seleccion.tipo === "estanciaGuardada"
) {
    guardarMemoria();
}

if (evento && evento.cancelable) evento.preventDefault();
}
function activarZonaMuerta() {
    modoZonaMuerta = true;
    zonaMuertaTemp = null;
    arrastrando = false;
    limpiarSeleccion();
    dibujar();
}
canvas.addEventListener("mousedown", empezarInteraccion);
canvas.addEventListener("mousemove", moverInteraccion);
canvas.addEventListener("mouseup", terminarInteraccion);
canvas.addEventListener("mouseleave", terminarInteraccion);
canvas.addEventListener("touchstart", empezarInteraccion, { passive: false });
canvas.addEventListener("touchmove", moverInteraccion, { passive: false });
canvas.addEventListener("touchend", terminarInteraccion, { passive: false });
canvas.addEventListener("touchcancel", terminarInteraccion, { passive: false });

window.addEventListener("resize", () => {
    ajustarCanvas();
    dibujar();
});

dibujar();
function empezarInteraccion(evento) {
    const pos = obtenerPosicion(evento);
    arrastrando = true;
}
</script>
