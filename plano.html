<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALLCALOR PRO</title>

<style>
body{
    margin:0;
    background:#111;
    color:#fff;
    font-family:Arial;
    overflow:hidden;
}

/* HEADER */
.topbar{
    height:50px;
    background:#000;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 10px;
    border-bottom:2px solid #ff7a00;
}

.btn{
    background:#ff7a00;
    border:none;
    padding:8px;
    border-radius:6px;
    color:#000;
    font-weight:bold;
}

/* CANVAS */
#canvas{
    background:#1a1a1a;
    display:block;
}

/* BOTTOM BAR */
.bottombar{
    position:fixed;
    bottom:0;
    width:100%;
    height:60px;
    background:#000;
    display:flex;
}

.bottombar button{
    flex:1;
    background:#111;
    color:#fff;
    border:none;
}

/* VERIFICACION ABAJO */
.verif{
    position:fixed;
    bottom:60px;
    width:100%;
    background:#222;
    padding:10px;
    display:none;
}

.verif input{
    width:100%;
    padding:10px;
}

.verif button{
    width:32%;
    margin:1%;
    padding:10px;
    border:none;
}
</style>
</head>

<body>

<div class="topbar">
    <button class="btn">Volver</button>
    <div>ALLCALOR</div>
    <button class="btn">⚙</button>
</div>

<canvas id="canvas"></canvas>

<div class="bottombar">
    <button onclick="modo='dibujar'">Dibujar</button>
    <button onclick="modo='editar'">Editar</button>
    <button onclick="modo='medir'">Medidas</button>
    <button onclick="iniciarVerificacion()">Verificar</button>
</div>

<div class="verif" id="verif">
    <div id="texto"></div>
    <input id="valor">
    <div>
        <button onclick="cancelar()">Cancelar</button>
        <button onclick="saltar()">Saltar</button>
        <button onclick="aplicar()">Aceptar</button>
    </div>
</div>

<script>

/* -------- BASE ESTABLE -------- */

let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

let W = window.innerWidth;
let H = window.innerHeight - 110;

canvas.width = W;
canvas.height = H;

let puntos = [];
let modo = "dibujar";

/* -------- DIBUJO -------- */

function draw(){
    ctx.clearRect(0,0,W,H);

    if(puntos.length<1) return;

    ctx.beginPath();
    ctx.strokeStyle="white";

    puntos.forEach((p,i)=>{
        if(i===0) ctx.moveTo(p.x,p.y);
        else ctx.lineTo(p.x,p.y);
    });

    ctx.stroke();

    puntos.forEach((p,i)=>{
        ctx.fillStyle="orange";
        ctx.beginPath();
        ctx.arc(p.x,p.y,5,0,Math.PI*2);
        ctx.fill();

        ctx.fillStyle="white";
        ctx.fillText("V"+(i+1),p.x+6,p.y-6);
    });
}

/* -------- INPUT -------- */

canvas.addEventListener("click",(e)=>{
    if(modo==="dibujar"){
        puntos.push({x:e.offsetX,y:e.offsetY});
        draw();
    }
});

/* -------- VERIFICACIÓN REAL -------- */

let diagActual = null;

function iniciarVerificacion(){
    if(puntos.length < 4) return;

    // diagonal entre primer y tercer punto
    diagActual = [0,2];

    mostrarDiagonal();
}

function mostrarDiagonal(){
    let p1 = puntos[diagActual[0]];
    let p2 = puntos[diagActual[1]];

    let d = distancia(p1,p2);

    document.getElementById("texto").innerText =
        "Diagonal V"+(diagActual[0]+1)+" - V"+(diagActual[1]+1)+" = "+d.toFixed(2)+" m";

    document.getElementById("valor").value = d.toFixed(2);

    document.getElementById("verif").style.display = "block";
}

/* -------- CORRECCIÓN REAL -------- */

function aplicar(){
    let real = parseFloat(document.getElementById("valor").value);

    let i1 = diagActual[0];
    let i2 = diagActual[1];

    let p1 = puntos[i1];
    let p2 = puntos[i2];

    let dx = p2.x - p1.x;
    let dy = p2.y - p1.y;

    let actual = Math.sqrt(dx*dx + dy*dy);

    if(actual === 0) return;

    let factor = real / actual;

    // SOLO mueve el punto final (estable)
    puntos[i2] = {
        x: p1.x + dx * factor,
        y: p1.y + dy * factor
    };

    draw();
}

/* -------- CONTROLES -------- */

function cancelar(){
    document.getElementById("verif").style.display="none";
}

function saltar(){
    cancelar();
}

/* -------- UTILS -------- */

function distancia(a,b){
    let dx = a.x - b.x;
    let dy = a.y - b.y;
    return Math.sqrt(dx*dx + dy*dy);
}

draw();

</script>

</body>
</html>
