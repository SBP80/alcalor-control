<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Plano</title>
<style>
:root{
  --bg:#0f1115;
  --panel:#171a21;
  --panel2:#1f2430;
  --line:#2b3242;
  --text:#f5f7fb;
  --muted:#aeb7c8;
  --accent:#f39b2f;
  --accent2:#d9861f;
  --ok:#39a96b;
  --danger:#c94b4b;
  --chip:#12161d;
  --btnText:#111111;
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:Arial,sans-serif;
  overflow:hidden;
}
button,input,select{font:inherit}
button{touch-action:manipulation}

.app{
  height:100%;
  display:grid;
  grid-template-rows:auto auto 1fr auto;
}

.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  padding:10px 12px;
  background:var(--panel);
  border-bottom:1px solid var(--line);
  position:relative;
  z-index:20;
}
.brand{
  text-align:center;
  min-width:0;
}
.brand-title{
  font-size:18px;
  font-weight:700;
  line-height:1;
  word-break:break-word;
}
.brand-sub{
  font-size:11px;
  color:var(--muted);
  margin-top:4px;
}
.btn-top{
  border:none;
  border-radius:10px;
  background:var(--accent);
  color:var(--btnText);
  font-weight:700;
  padding:10px 12px;
  min-width:72px;
}

.infobar{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  padding:8px 10px;
  background:var(--panel);
  border-bottom:1px solid var(--line);
}
.chip{
  background:var(--chip);
  color:var(--text);
  border:1px solid var(--line);
  border-radius:999px;
  padding:6px 10px;
  font-size:12px;
}

.canvas-wrap{
  position:relative;
  min-height:0;
}
canvas{
  display:block;
  width:100%;
  height:100%;
  background:#0d1016;
  touch-action:none;
}

.mode-badge{
  position:absolute;
  left:10px;
  top:10px;
  z-index:10;
  background:rgba(243,155,47,.95);
  color:#111;
  border-radius:999px;
  padding:8px 12px;
  font-size:12px;
  font-weight:700;
}

.toast{
  position:absolute;
  left:50%;
  bottom:14px;
  transform:translateX(-50%);
  background:rgba(0,0,0,.78);
  color:#fff;
  border:1px solid rgba(255,255,255,.14);
  padding:10px 14px;
  border-radius:12px;
  font-size:12px;
  z-index:15;
  display:none;
  white-space:nowrap;
  max-width:90%;
  overflow:hidden;
  text-overflow:ellipsis;
}
.toast.show{display:block}

.bottom-bar{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:8px;
  padding:10px;
  background:var(--panel);
  border-top:1px solid var(--line);
}
.bottom-btn{
  border:none;
  border-radius:12px;
  background:var(--panel2);
  color:var(--text);
  padding:12px 8px;
  font-size:13px;
  font-weight:700;
}
.bottom-btn.active{
  background:var(--accent);
  color:#111;
}

.sheet-backdrop{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.38);
  display:none;
  z-index:40;
}
.sheet-backdrop.show{display:block}

.sheet{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  z-index:50;
  background:var(--panel);
  border-top-left-radius:18px;
  border-top-right-radius:18px;
  border:1px solid var(--line);
  border-bottom:none;
  transform:translateY(110%);
  transition:transform .2s ease;
  padding:12px;
  max-height:74vh;
  overflow:auto;
}
.sheet.show{
  transform:translateY(0);
}
.sheet-title{
  font-size:18px;
  font-weight:700;
  margin-bottom:10px;
}
.sheet-sub{
  font-size:12px;
  color:var(--muted);
  margin-bottom:12px;
}
.sheet-grid{
  display:grid;
  gap:8px;
}
.action-btn{
  border:none;
  border-radius:12px;
  padding:13px 12px;
  text-align:left;
  font-weight:700;
  background:var(--panel2);
  color:var(--text);
}
.action-btn.primary{
  background:var(--accent);
  color:#111;
}
.action-btn.ok{
  background:var(--ok);
  color:#fff;
}
.action-btn.danger{
  background:var(--danger);
  color:#fff;
}
.action-btn[disabled]{
  opacity:.45;
}

@media (min-width:901px){
  .app{
    grid-template-columns:1fr 320px;
    grid-template-rows:auto auto 1fr;
  }
  .topbar{grid-column:1 / span 2}
  .infobar{grid-column:1 / span 2}
  .canvas-wrap{grid-column:1; grid-row:3}
  .bottom-bar{
    grid-column:2;
    grid-row:3;
    align-content:start;
    grid-template-columns:1fr;
    border-top:none;
    border-left:1px solid var(--line);
    padding:12px;
  }
  .sheet-backdrop{
    display:none !important;
  }
  .sheet{
    position:static;
    transform:none !important;
    border:none;
    border-left:1px solid var(--line);
    border-radius:0;
    max-height:none;
    height:100%;
    grid-column:2;
    grid-row:3;
    display:none;
  }
  .sheet.show{
    display:block;
  }
}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <button class="btn-top" id="btnVolver">Volver</button>
    <div class="brand">
      <div class="brand-title" id="brandTitle">ALLCALOR</div>
      <div class="brand-sub" id="brandSub">Plano fase 1 estable</div>
    </div>
    <button class="btn-top" id="btnAcciones">Acciones</button>
  </div>

  <div class="infobar">
    <div class="chip" id="chipObra">Sin obra</div>
    <div class="chip" id="chipModo">Modo: ver</div>
    <div class="chip" id="chipEscala">Escala sin definir</div>
    <div class="chip" id="chipSeleccion">Sin selección</div>
    <div class="chip" id="chipBorrador">Sin borrador</div>
  </div>

  <div class="canvas-wrap">
    <div class="mode-badge" id="modeBadge">Ver</div>
    <canvas id="canvas"></canvas>
    <div class="toast" id="toast"></div>
  </div>

  <div class="bottom-bar">
    <button class="bottom-btn active" id="tabVer">Ver</button>
    <button class="bottom-btn" id="tabDibujar">Dibujar</button>
    <button class="bottom-btn" id="tabMoverEstancia">Estancia</button>
    <button class="bottom-btn" id="tabMoverVertice">Vértice</button>
    <button class="bottom-btn" id="tabMas">Más</button>
  </div>

  <div class="sheet-backdrop" id="sheetBackdrop"></div>
  <div class="sheet" id="sheet">
    <div class="sheet-title" id="sheetTitle">Acciones</div>
    <div class="sheet-sub" id="sheetSub">Selecciona una acción</div>
    <div class="sheet-grid" id="sheetContent"></div>
  </div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const btnVolver = document.getElementById("btnVolver");
const btnAcciones = document.getElementById("btnAcciones");

const chipObra = document.getElementById("chipObra");
const chipModo = document.getElementById("chipModo");
const chipEscala = document.getElementById("chipEscala");
const chipSeleccion = document.getElementById("chipSeleccion");
const chipBorrador = document.getElementById("chipBorrador");
const modeBadge = document.getElementById("modeBadge");
const toast = document.getElementById("toast");

const tabVer = document.getElementById("tabVer");
const tabDibujar = document.getElementById("tabDibujar");
const tabMoverEstancia = document.getElementById("tabMoverEstancia");
const tabMoverVertice = document.getElementById("tabMoverVertice");
const tabMas = document.getElementById("tabMas");

const sheet = document.getElementById("sheet");
const sheetBackdrop = document.getElementById("sheetBackdrop");
const sheetTitle = document.getElementById("sheetTitle");
const sheetSub = document.getElementById("sheetSub");
const sheetContent = document.getElementById("sheetContent");

const brandTitle = document.getElementById("brandTitle");
const brandSub = document.getElementById("brandSub");

function leerConfigVisual(){
  const base = {
    nombre:"ALLCALOR",
    subtitulo:"Plano fase 1 estable",
    fuente:"Arial, sans-serif",
    tamNombre:20,
    pesoNombre:700,
    espacioLetras:0,
    sombraNombre:0,
    mayusculas:false,
    cursiva:false,
    colorPrincipal:"#f39b2f",
    colorFondo:"#0f1115",
    colorPanel:"#171a21",
    colorTexto:"#f5f7fb",
    colorLinea:"#2b3242",
    colorBotonTexto:"#111111"
  };
  try{
    return {...base, ...(JSON.parse(localStorage.getItem("configAllcalor")) || {})};
  }catch(e){
    return base;
  }
}

let visualConfigCache = null;

function aplicarConfigVisual(force = false){
  const cfg = leerConfigVisual();
  const sig = JSON.stringify(cfg);
  if (!force && visualConfigCache === sig) return;
  visualConfigCache = sig;

  document.documentElement.style.setProperty("--bg", cfg.colorFondo || "#0f1115");
  document.documentElement.style.setProperty("--panel", cfg.colorPanel || "#171a21");
  document.documentElement.style.setProperty("--panel2", cfg.colorPanel || "#171a21");
  document.documentElement.style.setProperty("--text", cfg.colorTexto || "#f5f7fb");
  document.documentElement.style.setProperty("--muted", cfg.colorTexto || "#aeb7c8");
  document.documentElement.style.setProperty("--line", cfg.colorLinea || "#2b3242");
  document.documentElement.style.setProperty("--accent", cfg.colorPrincipal || "#f39b2f");
  document.documentElement.style.setProperty("--accent2", cfg.colorPrincipal || "#d9861f");
  document.documentElement.style.setProperty("--btnText", cfg.colorBotonTexto || "#111111");

  document.body.style.fontFamily = cfg.fuente || "Arial, sans-serif";

  const nombre = cfg.mayusculas ? String(cfg.nombre || "ALLCALOR").toUpperCase() : String(cfg.nombre || "ALLCALOR");
  brandTitle.textContent = nombre;
  brandSub.textContent = cfg.subtitulo || "Plano fase 1 estable";

  brandTitle.style.fontFamily = cfg.fuente || "Arial, sans-serif";
  brandTitle.style.fontSize = Math.max(14, Number(cfg.tamNombre || 20)) + "px";
  brandTitle.style.fontWeight = cfg.pesoNombre || 700;
  brandTitle.style.letterSpacing = (cfg.espacioLetras || 0) + "px";
  brandTitle.style.textShadow = "0 0 " + (cfg.sombraNombre || 0) + "px #000";
  brandTitle.style.fontStyle = cfg.cursiva ? "italic" : "normal";
  brandTitle.style.color = cfg.colorPrincipal || "#f39b2f";

  brandSub.style.fontFamily = cfg.fuente || "Arial, sans-serif";

  draw();
}
aplicarConfigVisual(true);

window.addEventListener("storage", e => {
  if (e.key === "configAllcalor") aplicarConfigVisual(true);
});
window.addEventListener("pageshow", () => aplicarConfigVisual(true));
window.addEventListener("focus", () => aplicarConfigVisual(true));
document.addEventListener("visibilitychange", () => {
  if (!document.hidden) aplicarConfigVisual(true);
});

const clienteId = localStorage.getItem("clienteActivo");
const obraId = localStorage.getItem("obraActiva");
const obrasKey = "obras_" + clienteId;
const obras = JSON.parse(localStorage.getItem(obrasKey)) || [];
const obra = obras.find(o => String(o.id) === String(obraId));

if (!obra) {
  alert("Obra no encontrada");
  location.href = "obras.html";
}

if (!obra.plano) obra.plano = {};
if (!Array.isArray(obra.plano.estancias)) obra.plano.estancias = [];
if (typeof obra.plano.metrosPorPixel !== "number") obra.plano.metrosPorPixel = null;

let estancias = obra.plano.estancias
  .filter(e => e && Array.isArray(e.puntos) && e.puntos.length >= 3)
  .map(e => ({
    id: e.id || cryptoRandomId(),
    nombre: e.nombre || "Estancia",
    puntos: e.puntos.map(p => ({x:Number(p.x), y:Number(p.y)}))
  }));

let metrosPorPixel = obra.plano.metrosPorPixel;

let modo = "ver"; // ver | dibujar | mover-room | mover-point | escala

let draft = [];
let draftClosed = false;

let selectedRoomId = null;
let selectedPointIndex = -1;

let dragging = false;
let dragKind = null; // point | room
let lastPos = null;

let scaleStep = null; // p1 | p2 | done
let scaleP1 = null;
let scaleP2 = null;

function cryptoRandomId() {
  return "r" + Math.random().toString(36).slice(2, 10);
}

function clonePoints(arr){
  return arr.map(p => ({x:p.x, y:p.y}));
}

function saveData() {
  obra.plano.estancias = estancias.map(e => ({
    id: e.id,
    nombre: e.nombre,
    puntos: clonePoints(e.puntos)
  }));
  obra.plano.metrosPorPixel = metrosPorPixel;
  localStorage.setItem(obrasKey, JSON.stringify(obras));
}

function resizeCanvas() {
  const rect = canvas.getBoundingClientRect();
  canvas.width = Math.max(320, Math.floor(rect.width));
  canvas.height = Math.max(320, Math.floor(rect.height));
  draw();
}

window.addEventListener("resize", resizeCanvas);

function showToast(text) {
  toast.textContent = text;
  toast.classList.add("show");
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => toast.classList.remove("show"), 1800);
}

function getRoomById(id) {
  return estancias.find(r => r.id === id) || null;
}

function getSelectedRoom() {
  return getRoomById(selectedRoomId);
}

function setMode(next) {
  modo = next;
  dragging = false;
  dragKind = null;
  lastPos = null;
  selectedPointIndex = -1;

  if (modo !== "escala") {
    scaleStep = null;
    scaleP1 = null;
    scaleP2 = null;
  }

  updateUI();
  draw();
}

function updateTabs() {
  [tabVer, tabDibujar, tabMoverEstancia, tabMoverVertice, tabMas].forEach(b => b.classList.remove("active"));
  if (modo === "ver") tabVer.classList.add("active");
  if (modo === "dibujar") tabDibujar.classList.add("active");
  if (modo === "mover-room") tabMoverEstancia.classList.add("active");
  if (modo === "mover-point") tabMoverVertice.classList.add("active");
}

function updateUI() {
  updateTabs();

  chipObra.textContent = obra.nombre ? "Obra: " + obra.nombre : "Obra activa";
  chipModo.textContent = "Modo: " + modo;
  chipEscala.textContent = metrosPorPixel ? "Escala definida" : "Escala sin definir";

  const selRoom = getSelectedRoom();
  if (selRoom) {
    chipSeleccion.textContent = selectedPointIndex >= 0
      ? selRoom.nombre + " · V" + (selectedPointIndex + 1)
      : selRoom.nombre;
  } else {
    chipSeleccion.textContent = "Sin selección";
  }

  if (draft.length) {
    chipBorrador.textContent = draftClosed ? "Borrador cerrado" : "Borrador abierto";
  } else {
    chipBorrador.textContent = "Sin borrador";
  }

  if (modo === "escala") {
    if (!scaleStep) modeBadge.textContent = "Escala";
    else if (scaleStep === "p1") modeBadge.textContent = "Escala · punto 1";
    else if (scaleStep === "p2") modeBadge.textContent = "Escala · punto 2";
    else modeBadge.textContent = "Escala lista";
  } else if (modo === "dibujar") {
    modeBadge.textContent = draftClosed ? "Dibujar · cerrada" : "Dibujar";
  } else if (modo === "mover-room") {
    modeBadge.textContent = "Mover estancia";
  } else if (modo === "mover-point") {
    modeBadge.textContent = "Mover vértice";
  } else {
    modeBadge.textContent = "Ver";
  }
}

function openSheet(title, sub, html) {
  sheetTitle.textContent = title;
  sheetSub.textContent = sub;
  sheetContent.innerHTML = html;
  sheet.classList.add("show");
  sheetBackdrop.classList.add("show");
}

function closeSheet() {
  sheet.classList.remove("show");
  sheetBackdrop.classList.remove("show");
}

function pointDist(a, b) {
  return Math.hypot(b.x - a.x, b.y - a.y);
}

function getPos(ev) {
  const rect = canvas.getBoundingClientRect();
  if (ev.touches && ev.touches.length) {
    return {x: ev.touches[0].clientX - rect.left, y: ev.touches[0].clientY - rect.top};
  }
  if (ev.changedTouches && ev.changedTouches.length) {
    return {x: ev.changedTouches[0].clientX - rect.left, y: ev.changedTouches[0].clientY - rect.top};
  }
  return {x: ev.clientX - rect.left, y: ev.clientY - rect.top};
}

function pointInPolygon(x, y, poly) {
  let inside = false;
  for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
    const xi = poly[i].x, yi = poly[i].y;
    const xj = poly[j].x, yj = poly[j].y;
    const intersect = ((yi > y) !== (yj > y)) &&
      (x < ((xj - xi) * (y - yi)) / ((yj - yi) || 0.000001) + xi);
    if (intersect) inside = !inside;
  }
  return inside;
}

function findPointIndex(poly, x, y, r = 16) {
  for (let i = 0; i < poly.length; i++) {
    if (Math.hypot(poly[i].x - x, poly[i].y - y) <= r) return i;
  }
  return -1;
}

function getRoomAt(x, y) {
  for (let i = estancias.length - 1; i >= 0; i--) {
    if (pointInPolygon(x, y, estancias[i].puntos)) return estancias[i];
  }
  return null;
}

function polygonAreaPx(poly) {
  let area = 0;
  for (let i = 0; i < poly.length; i++) {
    const j = (i + 1) % poly.length;
    area += poly[i].x * poly[j].y - poly[j].x * poly[i].y;
  }
  return Math.abs(area / 2);
}

function polygonAreaM2(poly) {
  if (!metrosPorPixel) return null;
  return polygonAreaPx(poly) * metrosPorPixel * metrosPorPixel;
}

function centroid(poly) {
  let sx = 0, sy = 0;
  for (const p of poly) {
    sx += p.x;
    sy += p.y;
  }
  return {x:sx / poly.length, y:sy / poly.length};
}

function drawPolygon(poly, opts = {}) {
  if (!poly.length) return;
  const {
    fill = "rgba(243,155,47,.10)",
    stroke = "#f39b2f",
    lineWidth = 2,
    closed = true
  } = opts;

  ctx.beginPath();
  poly.forEach((p, i) => {
    if (i === 0) ctx.moveTo(p.x, p.y);
    else ctx.lineTo(p.x, p.y);
  });
  if (closed) ctx.closePath();

  if (closed) {
    ctx.fillStyle = fill;
    ctx.fill();
  }

  ctx.strokeStyle = stroke;
  ctx.lineWidth = lineWidth;
  ctx.stroke();
}

function drawPoints(poly, selectedIndex = -1, color = "#ffd28a") {
  poly.forEach((p, i) => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, i === selectedIndex ? 7 : 5, 0, Math.PI * 2);
    ctx.fillStyle = i === selectedIndex ? "#ffffff" : color;
    ctx.fill();

    ctx.fillStyle = "#fff";
    ctx.font = "12px Arial";
    ctx.fillText("V" + (i + 1), p.x + 8, p.y - 8);
  });
}

function drawLengths(poly, closed = true) {
  if (!metrosPorPixel || poly.length < 2) return;
  const sides = closed ? poly.length : poly.length - 1;
  ctx.fillStyle = "#d8deea";
  ctx.font = "12px Arial";
  for (let i = 0; i < sides; i++) {
    const a = poly[i];
    const b = poly[(i + 1) % poly.length];
    const m = {x:(a.x + b.x)/2, y:(a.y + b.y)/2};
    const len = pointDist(a, b) * metrosPorPixel;
    ctx.fillText(len.toFixed(2) + " m", m.x + 6, m.y - 6);
  }
}

function drawRoomLabel(room) {
  if (!room || room.puntos.length < 3) return;
  const c = centroid(room.puntos);
  ctx.fillStyle = "#fff";
  ctx.font = "16px Arial";
  ctx.fillText(room.nombre, c.x - 24, c.y - 8);
  const area = polygonAreaM2(room.puntos);
  if (area !== null) {
    ctx.font = "12px Arial";
    ctx.fillText(area.toFixed(2) + " m²", c.x - 20, c.y + 12);
  }
}

function drawScaleLine() {
  if (!scaleP1) return;

  ctx.strokeStyle = "#7dd3ff";
  ctx.lineWidth = 2;
  ctx.setLineDash([8, 6]);
  ctx.beginPath();
  ctx.moveTo(scaleP1.x, scaleP1.y);
  const end = scaleP2 || scaleP1;
  ctx.lineTo(end.x, end.y);
  ctx.stroke();
  ctx.setLineDash([]);

  ctx.beginPath();
  ctx.arc(scaleP1.x, scaleP1.y, 6, 0, Math.PI * 2);
  ctx.fillStyle = "#7dd3ff";
  ctx.fill();

  if (scaleP2) {
    ctx.beginPath();
    ctx.arc(scaleP2.x, scaleP2.y, 6, 0, Math.PI * 2);
    ctx.fill();
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (const room of estancias) {
    const isSelected = room.id === selectedRoomId;
    drawPolygon(room.puntos, {
      fill: isSelected ? "rgba(255,255,255,.12)" : "rgba(243,155,47,.10)",
      stroke: isSelected ? "#ffffff" : "#f39b2f",
      lineWidth: isSelected ? 3 : 2,
      closed: true
    });
    drawPoints(room.puntos, isSelected ? selectedPointIndex : -1, isSelected ? "#ffffff" : "#ffd28a");
    drawLengths(room.puntos, true);
    drawRoomLabel(room);
  }

  if (draft.length) {
    drawPolygon(draft, {
      fill: draftClosed ? "rgba(255,255,255,.10)" : "transparent",
      stroke: "#d8deea",
      lineWidth: 2,
      closed: draftClosed
    });
    drawPoints(draft, -1, "#f39b2f");
    drawLengths(draft, draftClosed);
  }

  if (modo === "escala") drawScaleLine();
}

function selectRoom(roomId) {
  selectedRoomId = roomId;
  selectedPointIndex = -1;
  updateUI();
  draw();
}

function unselectAll() {
  selectedRoomId = null;
  selectedPointIndex = -1;
  updateUI();
  draw();
}

function addDraftPoint(pos) {
  if (draftClosed) {
    showToast("El borrador ya está cerrado");
    return;
  }
  draft.push({x: pos.x, y: pos.y});
  updateUI();
  draw();
}

function closeDraft() {
  if (draft.length < 3) {
    showToast("Necesitas al menos 3 puntos");
    return;
  }
  draftClosed = true;
  updateUI();
  draw();
  showToast("Estancia cerrada");
}

function clearDraft() {
  draft = [];
  draftClosed = false;
  updateUI();
  draw();
}

function saveDraftRoom() {
  if (!draftClosed || draft.length < 3) {
    showToast("Primero cierra la estancia");
    return;
  }

  const nombre = prompt("Nombre de la estancia:");
  if (!nombre || !nombre.trim()) return;

  const room = {
    id: cryptoRandomId(),
    nombre: nombre.trim(),
    puntos: clonePoints(draft)
  };

  estancias.push(room);
  saveData();

  selectedRoomId = room.id;
  selectedPointIndex = -1;

  clearDraft();
  setMode("ver");
  showToast("Estancia guardada");
}

function beginScale() {
  scaleStep = "p1";
  scaleP1 = null;
  scaleP2 = null;
  setMode("escala");
  showToast("Toca el punto 1");
}

function finishScale() {
  if (!scaleP1 || !scaleP2) {
    showToast("Faltan puntos de escala");
    return;
  }

  const px = pointDist(scaleP1, scaleP2);
  if (px <= 0) {
    showToast("Escala no válida");
    return;
  }

  const value = prompt("Distancia real entre esos dos puntos, en metros:");
  if (!value) return;

  const meters = parseFloat(String(value).replace(",", "."));
  if (!meters || meters <= 0) {
    showToast("Medida no válida");
    return;
  }

  metrosPorPixel = meters / px;
  saveData();

  scaleStep = "done";
  updateUI();
  draw();
  showToast("Escala guardada");
}

function deleteSelectedRoom() {
  const room = getSelectedRoom();
  if (!room) {
    showToast("No hay estancia seleccionada");
    return;
  }

  if (!confirm("¿Eliminar estancia seleccionada?")) return;

  estancias = estancias.filter(r => r.id !== room.id);
  saveData();
  unselectAll();
  showToast("Estancia eliminada");
}

function openMainActions() {
  const room = getSelectedRoom();

  if (draft.length) {
    openSheet(
      "Borrador",
      draftClosed ? "La estancia nueva está cerrada" : "La estancia nueva está abierta",
      `
      <button class="action-btn primary" onclick="closeDraftAndKeep()">Cerrar estancia</button>
      <button class="action-btn ok" onclick="saveDraftRoomAndCloseSheet()">Guardar estancia</button>
      <button class="action-btn danger" onclick="discardDraftAndCloseSheet()">Descartar borrador</button>
      <button class="action-btn" onclick="closeSheet()">Cerrar</button>
      `
    );
    return;
  }

  if (room) {
    openSheet(
      room.nombre,
      "Acciones sobre la estancia seleccionada",
      `
      <button class="action-btn primary" onclick="selectMoveRoomMode()">Mover estancia</button>
      <button class="action-btn primary" onclick="selectMovePointMode()">Mover vértice</button>
      <button class="action-btn primary" onclick="renameSelectedRoom()">Cambiar nombre</button>
      <button class="action-btn danger" onclick="deleteSelectedRoomAndCloseSheet()">Eliminar estancia</button>
      <button class="action-btn" onclick="closeSheet()">Cerrar</button>
      `
    );
    return;
  }

  openSheet(
    "Acciones",
    "Plano base",
    `
    <button class="action-btn primary" onclick="startNewDrawing()">Nueva estancia</button>
    <button class="action-btn primary" onclick="beginScaleAndCloseSheet()">Definir escala</button>
    <button class="action-btn ok" onclick="savePlanAndCloseSheet()">Guardar plano</button>
    <button class="action-btn" onclick="closeSheet()">Cerrar</button>
    `
  );
}

function closeDraftAndKeep() {
  closeDraft();
  closeSheet();
}

function saveDraftRoomAndCloseSheet() {
  closeSheet();
  saveDraftRoom();
}

function discardDraftAndCloseSheet() {
  clearDraft();
  closeSheet();
  setMode("ver");
}

function startNewDrawing() {
  closeSheet();
  unselectAll();
  clearDraft();
  setMode("dibujar");
}

function beginScaleAndCloseSheet() {
  closeSheet();
  beginScale();
}

function savePlanAndCloseSheet() {
  saveData();
  closeSheet();
  showToast("Plano guardado");
}

function renameSelectedRoom() {
  const room = getSelectedRoom();
  if (!room) return;
  const name = prompt("Nuevo nombre:", room.nombre);
  if (!name || !name.trim()) return;
  room.nombre = name.trim();
  saveData();
  closeSheet();
  draw();
}

function deleteSelectedRoomAndCloseSheet() {
  closeSheet();
  deleteSelectedRoom();
}

function selectMoveRoomMode() {
  closeSheet();
  setMode("mover-room");
}

function selectMovePointMode() {
  closeSheet();
  setMode("mover-point");
}

function handleScaleTap(pos) {
  if (!scaleStep || scaleStep === "done") {
    scaleStep = "p1";
    scaleP1 = null;
    scaleP2 = null;
  }

  if (scaleStep === "p1") {
    scaleP1 = {x: pos.x, y: pos.y};
    scaleP2 = null;
    scaleStep = "p2";
    draw();
    showToast("Toca el punto 2");
    return;
  }

  if (scaleStep === "p2") {
    scaleP2 = {x: pos.x, y: pos.y};
    draw();
    finishScale();
  }
}

function onPointerStart(ev) {
  const pos = getPos(ev);

  if (modo === "escala") {
    handleScaleTap(pos);
    if (ev.cancelable) ev.preventDefault();
    return;
  }

  if (modo === "dibujar") {
    if (!draftClosed) {
      addDraftPoint(pos);
      if (ev.cancelable) ev.preventDefault();
      return;
    } else {
      showToast("Guarda o descarta el borrador");
      if (ev.cancelable) ev.preventDefault();
      return;
    }
  }

  const room = getRoomAt(pos.x, pos.y);

  if (room) {
    selectRoom(room.id);
    const pointIndex = findPointIndex(room.puntos, pos.x, pos.y, 18);

    if (modo === "mover-room") {
      dragging = true;
      lastPos = pos;
      selectedPointIndex = -1;
      dragKind = "room";
      updateUI();
      draw();
      if (ev.cancelable) ev.preventDefault();
      return;
    }

    if (modo === "mover-point") {
      if (pointIndex < 0) {
        showToast("Toca un vértice");
        if (ev.cancelable) ev.preventDefault();
        return;
      }
      dragging = true;
      lastPos = pos;
      selectedPointIndex = pointIndex;
      dragKind = "point";
      updateUI();
      draw();
      if (ev.cancelable) ev.preventDefault();
      return;
    }

    selectedPointIndex = pointIndex;
    updateUI();
    draw();
    if (ev.cancelable) ev.preventDefault();
    return;
  }

  unselectAll();
}

function onPointerMove(ev) {
  if (!dragging) return;

  const pos = getPos(ev);
  const dx = pos.x - lastPos.x;
  const dy = pos.y - lastPos.y;
  const room = getSelectedRoom();
  if (!room) return;

  if (dragKind === "point" && selectedPointIndex >= 0) {
    room.puntos[selectedPointIndex].x += dx;
    room.puntos[selectedPointIndex].y += dy;
  } else if (dragKind === "room") {
    for (const p of room.puntos) {
      p.x += dx;
      p.y += dy;
    }
  }

  lastPos = pos;
  saveData();
  draw();
  if (ev.cancelable) ev.preventDefault();
}

function onPointerEnd(ev) {
  if (!dragging) return;
  dragging = false;
  dragKind = null;
  lastPos = null;
  saveData();
  draw();
  if (ev && ev.cancelable) ev.preventDefault();
}

canvas.addEventListener("mousedown", onPointerStart);
canvas.addEventListener("mousemove", onPointerMove);
canvas.addEventListener("mouseup", onPointerEnd);
canvas.addEventListener("mouseleave", onPointerEnd);

canvas.addEventListener("touchstart", onPointerStart, {passive:false});
canvas.addEventListener("touchmove", onPointerMove, {passive:false});
canvas.addEventListener("touchend", onPointerEnd, {passive:false});
canvas.addEventListener("touchcancel", onPointerEnd, {passive:false});

canvas.addEventListener("dblclick", () => {
  if (modo === "dibujar" && !draftClosed) closeDraft();
});

btnVolver.addEventListener("click", () => {
  location.href = "obra.html";
});

btnAcciones.addEventListener("click", openMainActions);
sheetBackdrop.addEventListener("click", closeSheet);

tabVer.addEventListener("click", () => {
  closeSheet();
  setMode("ver");
});

tabDibujar.addEventListener("click", () => {
  closeSheet();
  setMode("dibujar");
});

tabMoverEstancia.addEventListener("click", () => {
  closeSheet();
  if (draft.length) {
    showToast("Primero guarda o descarta el borrador");
    return;
  }
  setMode("mover-room");
});

tabMoverVertice.addEventListener("click", () => {
  closeSheet();
  if (draft.length) {
    showToast("Primero guarda o descarta el borrador");
    return;
  }
  setMode("mover-point");
});

tabMas.addEventListener("click", openMainActions);

window.closeSheet = closeSheet;
window.closeDraftAndKeep = closeDraftAndKeep;
window.saveDraftRoomAndCloseSheet = saveDraftRoomAndCloseSheet;
window.discardDraftAndCloseSheet = discardDraftAndCloseSheet;
window.startNewDrawing = startNewDrawing;
window.beginScaleAndCloseSheet = beginScaleAndCloseSheet;
window.savePlanAndCloseSheet = savePlanAndCloseSheet;
window.renameSelectedRoom = renameSelectedRoom;
window.deleteSelectedRoomAndCloseSheet = deleteSelectedRoomAndCloseSheet;
window.selectMoveRoomMode = selectMoveRoomMode;
window.selectMovePointMode = selectMovePointMode;

resizeCanvas();
updateUI();
draw();
</script>
</body>
</html>
