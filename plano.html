<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Plano</title>
<style>
:root{
  --bg:#0b0b0b;
  --panel:#151515;
  --line:#2b2b2b;
  --text:#ffffff;
  --muted:#c8c8c8;
  --accent:#f39b2f;
  --accent2:#d5a23d;
  --danger:#c93b2f;
  --btnText:#111111;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:Arial,sans-serif;
}
input,select,button{font:inherit}
.header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  padding:12px 14px;
  border-bottom:2px solid var(--accent);
  position:sticky;
  top:0;
  background:var(--bg);
  z-index:50;
}
.brand-wrap{
  display:flex;
  align-items:center;
  gap:10px;
  min-width:0;
}
.brand-logo{
  width:40px;
  height:40px;
  object-fit:contain;
  border-radius:8px;
  background:#fff;
  display:none;
  flex:0 0 auto;
}
.brand-text{
  min-width:0;
  text-align:center;
}
.brand-name{
  font-size:18px;
  font-weight:bold;
  line-height:1.05;
  color:var(--accent);
  word-break:break-word;
}
.brand-sub{
  font-size:12px;
  color:var(--muted);
  margin-top:4px;
}
.btn-top{
  border:none;
  background:var(--accent);
  color:var(--btnText);
  font-weight:bold;
  border-radius:10px;
  padding:10px 14px;
  cursor:pointer;
}
.main{padding:10px}
.info{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:10px;
  padding:10px;
  font-size:14px;
  line-height:1.45;
  margin-bottom:10px;
  min-height:88px;
}
.canvas-wrap{position:relative}
canvas{
  width:100%;
  height:calc(100vh - 194px);
  min-height:420px;
  display:block;
  background:#101010;
  border:1px solid var(--line);
  border-radius:10px;
  touch-action:none;
}
.panel{
  position:absolute;
  top:10px;
  right:10px;
  width:300px;
  background:rgba(21,21,21,.97);
  border:1px solid var(--line);
  border-radius:12px;
  padding:8px;
  box-shadow:0 10px 28px rgba(0,0,0,.42);
  z-index:30;
  display:none;
}
.panel.open{display:block}
.panel-group{
  border:1px solid var(--line);
  border-radius:10px;
  overflow:hidden;
  margin-bottom:8px;
}
.panel-group:last-child{margin-bottom:0}
.panel-group-title{
  width:100%;
  border:none;
  background:#1f1f1f;
  color:var(--accent);
  text-align:left;
  padding:8px 10px;
  font-weight:bold;
  font-size:12px;
  cursor:pointer;
}
.panel-group-content{
  display:none;
  padding:8px;
  background:#171717;
}
.panel-group.open .panel-group-content{display:block}
.grid{
  display:grid;
  grid-template-columns:1fr;
  gap:6px;
}
.grid-2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px;
}
.btn{
  border:none;
  border-radius:8px;
  padding:9px 10px;
  font-weight:bold;
  cursor:pointer;
  background:var(--accent);
  color:var(--btnText);
  width:100%;
  font-size:12px;
}
.btn.secondary{background:var(--accent2)}
.btn.neutral{background:#c8c8c8;color:#111}
.btn.danger{background:var(--danger);color:#fff}
.btn.active{outline:2px solid #fff}
.field{
  display:flex;
  flex-direction:column;
  gap:4px;
  margin-bottom:7px;
}
.field:last-child{margin-bottom:0}
.label{
  font-size:11px;
  color:var(--muted);
}
.in{
  width:100%;
  border:1px solid var(--line);
  border-radius:8px;
  background:#101010;
  color:#fff;
  padding:8px 9px;
  font-size:12px;
}
.note{
  margin-top:6px;
  color:var(--muted);
  font-size:11px;
  line-height:1.3;
}
.quickbar{
  position:absolute;
  left:10px;
  bottom:10px;
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  z-index:25;
}
.quickbar .chip{
  background:rgba(21,21,21,.92);
  border:1px solid var(--line);
  color:var(--text);
  border-radius:999px;
  padding:7px 11px;
  font-size:12px;
}
.mode-badge{
  position:absolute;
  left:10px;
  top:10px;
  background:rgba(243,155,47,.95);
  color:var(--btnText);
  font-weight:bold;
  border-radius:999px;
  padding:8px 12px;
  z-index:20;
  display:none;
  font-size:12px;
}
.mode-badge.show{display:block}
.small{font-size:11px;color:var(--muted)}
@media (max-width:900px){
  canvas{
    height:calc(100vh - 215px);
    min-height:360px;
  }
  .panel{
    left:10px;
    right:10px;
    top:auto;
    bottom:10px;
    width:auto;
    max-height:64vh;
    overflow:auto;
  }
  .brand-name{font-size:16px}
}
</style>
</head>
<body>

<div class="header">
  <button class="btn-top" onclick="volver()">Volver</button>

  <div class="brand-wrap">
    <img id="brandLogo" class="brand-logo" alt="Logo">
    <div class="brand-text">
      <div id="brandName" class="brand-name">ALLCALOR PRO</div>
      <div id="brandSub" class="brand-sub">Plano</div>
    </div>
  </div>

  <button class="btn-top" onclick="togglePanel()">Herramientas</button>
</div>

<div class="main">
  <div class="info" id="info">Cargando...</div>

  <div class="canvas-wrap">
    <div class="mode-badge" id="modeBadge"></div>

    <div class="panel" id="panel">
      <div class="panel-group open">
        <button class="panel-group-title" type="button" onclick="toggleGroup(this)">Plano</button>
        <div class="panel-group-content">
          <div class="grid">
            <button class="btn neutral" onclick="guardarPlano()">Guardar</button>
            <button class="btn secondary" onclick="definirEscala()">Escala</button>
            <button class="btn danger" onclick="eliminarSeleccionado()">Eliminar</button>
          </div>
        </div>
      </div>

      <div class="panel-group open">
        <button class="panel-group-title" type="button" onclick="toggleGroup(this)">Estancia</button>
        <div class="panel-group-content">
          <div class="grid">
            <button class="btn" onclick="nuevaEstancia()">Nueva</button>
            <button class="btn" onclick="cerrarEstancia()">Cerrar</button>
            <button class="btn" onclick="guardarEstancia()">Guardar estancia</button>
            <button class="btn secondary" onclick="verificarSeleccion()">Verificar diagonales</button>
          </div>
          <div class="note">
            Crea la forma punto a punto.<br>
            Después puedes mover vértices y editar lados.
          </div>
        </div>
      </div>

      <div class="panel-group open">
        <button class="panel-group-title" type="button" onclick="toggleGroup(this)">Medidas</button>
        <div class="panel-group-content">
          <div class="small" id="measureTarget">Selecciona una estancia guardada o actual</div>

          <div class="field">
            <label class="label">Lado</label>
            <select class="in" id="editSideSelect"></select>
          </div>

          <div class="grid-2">
            <div class="field">
              <label class="label">Longitud lado (m)</label>
              <input class="in" id="editSideLength" type="number" min="0.01" step="0.01">
            </div>
            <div class="field">
              <label class="label">Aplicar</label>
              <button class="btn secondary" onclick="aplicarMedidaLado()">Cambiar lado</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <canvas id="canvas"></canvas>

    <div class="quickbar">
      <div class="chip" id="chipSeleccion">Sin selección</div>
      <div class="chip" id="chipEscala">Escala sin definir</div>
      <div class="chip" id="chipEdicion">Sin edición</div>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const info = document.getElementById("info");
const panel = document.getElementById("panel");
const modeBadge = document.getElementById("modeBadge");
const chipSeleccion = document.getElementById("chipSeleccion");
const chipEscala = document.getElementById("chipEscala");
const chipEdicion = document.getElementById("chipEdicion");
const measureTarget = document.getElementById("measureTarget");
const editSideSelect = document.getElementById("editSideSelect");
const editSideLength = document.getElementById("editSideLength");

const CONFIG_DEFAULT = {
  nombre: "ALLCALOR PRO",
  subtitulo: "Plano",
  logo: "",
  fuente: "Arial, sans-serif",
  tamNombre: 22,
  pesoNombre: 700,
  espacioLetras: 0,
  sombraNombre: 0,
  mayusculas: false,
  cursiva: false,
  colorPrincipal: "#f39b2f",
  colorFondo: "#0b0b0b",
  colorPanel: "#151515",
  colorTexto: "#ffffff",
  colorLinea: "#2b2b2b",
  colorBotonTexto: "#111111"
};

function leerConfigVisual(){
  try{
    return {
      ...CONFIG_DEFAULT,
      ...(JSON.parse(localStorage.getItem("configAllcalor")) || {})
    };
  }catch(e){
    return { ...CONFIG_DEFAULT };
  }
}

function aplicarConfigVisual(){
  const cfg = leerConfigVisual();
  document.documentElement.style.setProperty("--bg", cfg.colorFondo || CONFIG_DEFAULT.colorFondo);
  document.documentElement.style.setProperty("--panel", cfg.colorPanel || CONFIG_DEFAULT.colorPanel);
  document.documentElement.style.setProperty("--text", cfg.colorTexto || CONFIG_DEFAULT.colorTexto);
  document.documentElement.style.setProperty("--muted", cfg.colorTexto || CONFIG_DEFAULT.colorTexto);
  document.documentElement.style.setProperty("--line", cfg.colorLinea || CONFIG_DEFAULT.colorLinea);
  document.documentElement.style.setProperty("--accent", cfg.colorPrincipal || CONFIG_DEFAULT.colorPrincipal);
  document.documentElement.style.setProperty("--accent2", cfg.colorPrincipal || CONFIG_DEFAULT.colorPrincipal);
  document.documentElement.style.setProperty("--btnText", cfg.colorBotonTexto || CONFIG_DEFAULT.colorBotonTexto);

  document.body.style.fontFamily = cfg.fuente || CONFIG_DEFAULT.fuente;

  const brandName = document.getElementById("brandName");
  const brandSub = document.getElementById("brandSub");
  const brandLogo = document.getElementById("brandLogo");

  const nombreFinal = cfg.mayusculas
    ? (cfg.nombre || CONFIG_DEFAULT.nombre).toUpperCase()
    : (cfg.nombre || CONFIG_DEFAULT.nombre);

  brandName.textContent = nombreFinal;
  brandSub.textContent = cfg.subtitulo || CONFIG_DEFAULT.subtitulo;
  brandName.style.fontFamily = cfg.fuente || CONFIG_DEFAULT.fuente;
  brandName.style.fontSize = Math.max(14, Number(cfg.tamNombre || CONFIG_DEFAULT.tamNombre) - 2) + "px";
  brandName.style.fontWeight = cfg.pesoNombre || CONFIG_DEFAULT.pesoNombre;
  brandName.style.letterSpacing = (cfg.espacioLetras || 0) + "px";
  brandName.style.textShadow = "0 0 " + (cfg.sombraNombre || 0) + "px #000";
  brandName.style.fontStyle = cfg.cursiva ? "italic" : "normal";
  brandName.style.color = cfg.colorPrincipal || CONFIG_DEFAULT.colorPrincipal;

  brandSub.style.fontFamily = cfg.fuente || CONFIG_DEFAULT.fuente;
  brandSub.style.fontStyle = cfg.cursiva ? "italic" : "normal";

  if(cfg.logo){
    brandLogo.src = cfg.logo;
    brandLogo.style.display = "block";
  }else{
    brandLogo.style.display = "none";
  }
}
aplicarConfigVisual();

const clienteId = localStorage.getItem("clienteActivo");
const obraId = localStorage.getItem("obraActiva");

const obras = JSON.parse(localStorage.getItem("obras_" + clienteId)) || [];
const obra = obras.find(o => String(o.id) === String(obraId));

if (!obra) {
  alert("Obra no encontrada");
  window.location.href = "obras.html";
}

if (!obra.plano) obra.plano = {};
if (!Array.isArray(obra.plano.estancias)) obra.plano.estancias = [];
if (typeof obra.plano.metrosPorPixel !== "number") obra.plano.metrosPorPixel = null;

let estancias = limpiarEstancias(obra.plano.estancias);
let metrosPorPixel = obra.plano.metrosPorPixel;

let puntos = [];
let cerrado = false;
let enEdicionNuevaEstancia = false;
let arrastrando = false;
let ultimoX = 0;
let ultimoY = 0;

const SNAP_DIST = 14;
const HIT_POINT = 14;

const seleccion = {
  tipo: null, // estanciaActual, puntoActual, estanciaGuardada, puntoGuardado
  estanciaIndex: -1,
  puntoIndex: -1
};

function limpiarEstancias(arr){
  return (Array.isArray(arr) ? arr : []).filter(e =>
    e && typeof e.nombre === "string" && Array.isArray(e.puntos) && e.puntos.length >= 3
  );
}

function guardarMemoria() {
  obra.plano.estancias = estancias;
  obra.plano.metrosPorPixel = metrosPorPixel;
  localStorage.setItem("obras_" + clienteId, JSON.stringify(obras));
}

function volver(){ window.location.href = "obra.html"; }

function ajustarCanvas() {
  const rect = canvas.getBoundingClientRect();
  canvas.width = Math.max(300, Math.floor(rect.width));
  canvas.height = Math.max(300, Math.floor(rect.height));
}
window.addEventListener("resize", () => {
  ajustarCanvas();
  dibujar();
});

function togglePanel(){ panel.classList.toggle("open"); }
function cerrarPanel(){ panel.classList.remove("open"); }
function autoCerrarPanel(){ if (window.innerWidth <= 900) cerrarPanel(); }
function toggleGroup(btn){ btn.parentElement.classList.toggle("open"); }

function limpiarSeleccion(){
  seleccion.tipo = null;
  seleccion.estanciaIndex = -1;
  seleccion.puntoIndex = -1;
}

function dist(a, b){ return Math.hypot(b.x - a.x, b.y - a.y); }

function midpoint(a, b){
  return { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 };
}

function centroid(poly){
  let sx = 0, sy = 0;
  for (const p of poly) {
    sx += p.x;
    sy += p.y;
  }
  return { x: sx / poly.length, y: sy / poly.length };
}

function polygonAreaPx(poly){
  if (!poly || poly.length < 3) return 0;
  let area = 0;
  for (let i = 0; i < poly.length; i++) {
    const j = (i + 1) % poly.length;
    area += poly[i].x * poly[j].y - poly[j].x * poly[i].y;
  }
  return Math.abs(area / 2);
}

function polygonAreaM2(poly){
  if (!metrosPorPixel) return 0;
  return polygonAreaPx(poly) * metrosPorPixel * metrosPorPixel;
}

function pointInPolygon(x, y, poly) {
  let inside = false;
  for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
    const xi = poly[i].x, yi = poly[i].y;
    const xj = poly[j].x, yj = poly[j].y;
    const inter = ((yi > y) !== (yj > y)) &&
      (x < ((xj - xi) * (y - yi)) / ((yj - yi) || 0.000001) + xi);
    if (inter) inside = !inside;
  }
  return inside;
}

function findPoint(poly, x, y) {
  for (let i = 0; i < poly.length; i++) {
    if (Math.hypot(poly[i].x - x, poly[i].y - y) <= HIT_POINT) return i;
  }
  return -1;
}

function segPointDistance(px, py, ax, ay, bx, by) {
  const dx = bx - ax;
  const dy = by - ay;
  const len2 = dx * dx + dy * dy;
  if (len2 === 0) {
    return { d: Math.hypot(px - ax, py - ay), t: 0, qx: ax, qy: ay };
  }
  let t = ((px - ax) * dx + (py - ay) * dy) / len2;
  t = Math.max(0, Math.min(1, t));
  const qx = ax + t * dx;
  const qy = ay + t * dy;
  return { d: Math.hypot(px - qx, py - qy), t, qx, qy };
}

function allSavedPoints(ignoreRoom=-999, ignorePoint=-999){
  const arr = [];
  for(let i=0;i<estancias.length;i++){
    const pts = estancias[i].puntos || [];
    for(let j=0;j<pts.length;j++){
      if(i===ignoreRoom && j===ignorePoint) continue;
      arr.push({x:pts[j].x, y:pts[j].y});
    }
  }
  return arr;
}

function allSavedSegments(ignoreRoom=-999){
  const arr = [];
  for(let i=0;i<estancias.length;i++){
    if(i===ignoreRoom) continue;
    const pts = estancias[i].puntos || [];
    if(pts.length < 2) continue;
    for(let j=0;j<pts.length;j++){
      const a = pts[j];
      const b = pts[(j+1)%pts.length];
      arr.push({a,b});
    }
  }
  return arr;
}

function snapPoint(pos, ignoreRoom=-999, ignorePoint=-999){
  let best = {x:pos.x, y:pos.y, d:Infinity};

  const pts = allSavedPoints(ignoreRoom, ignorePoint);
  for(const p of pts){
    const d = Math.hypot(pos.x - p.x, pos.y - p.y);
    if(d < best.d && d <= SNAP_DIST){
      best = {x:p.x, y:p.y, d};
    }
  }

  const segs = allSavedSegments(ignoreRoom);
  for(const s of segs){
    const hit = segPointDistance(pos.x, pos.y, s.a.x, s.a.y, s.b.x, s.b.y);
    if(hit.d < best.d && hit.d <= SNAP_DIST){
      best = {x:hit.qx, y:hit.qy, d:hit.d};
    }
  }

  return {x:best.x, y:best.y};
}

function getPos(ev) {
  const rect = canvas.getBoundingClientRect();
  if (ev.touches && ev.touches.length) {
    return { x: ev.touches[0].clientX - rect.left, y: ev.touches[0].clientY - rect.top };
  }
  if (ev.changedTouches && ev.changedTouches.length) {
    return { x: ev.changedTouches[0].clientX - rect.left, y: ev.changedTouches[0].clientY - rect.top };
  }
  return { x: ev.clientX - rect.left, y: ev.clientY - rect.top };
}

function getSelectedRoomData() {
  if (seleccion.tipo === "estanciaActual" || seleccion.tipo === "puntoActual") {
    return { nombre: "Estancia actual", puntos };
  }
  if (seleccion.tipo === "estanciaGuardada" || seleccion.tipo === "puntoGuardado") {
    return estancias[seleccion.estanciaIndex] || null;
  }
  return null;
}

function getSelectedRoomPolyRef(){
  if (seleccion.tipo === "estanciaActual" || seleccion.tipo === "puntoActual") return puntos;
  if (seleccion.tipo === "estanciaGuardada" || seleccion.tipo === "puntoGuardado") {
    return estancias[seleccion.estanciaIndex]?.puntos || null;
  }
  return null;
}

function getSelectedSavedRoomIndex(){
  if (seleccion.tipo === "estanciaGuardada" || seleccion.tipo === "puntoGuardado") return seleccion.estanciaIndex;
  return -1;
}

function actualizarUI() {
  modeBadge.textContent = "Geometría limpia";
  modeBadge.classList.add("show");

  chipEscala.textContent = metrosPorPixel ? "Escala definida" : "Escala sin definir";
  chipEdicion.textContent = enEdicionNuevaEstancia ? "Editando estancia" : "Sin edición";

  if (seleccion.tipo === "estanciaActual" || seleccion.tipo === "puntoActual") chipSeleccion.textContent = "Estancia actual";
  else if (seleccion.tipo === "estanciaGuardada" || seleccion.tipo === "puntoGuardado") chipSeleccion.textContent = "Estancia guardada";
  else chipSeleccion.textContent = "Sin selección";

  actualizarPanelMedidas();
}

function drawRoom(poly, selected, fillColor, strokeColor) {
  ctx.beginPath();
  poly.forEach((p, i) => {
    if (i === 0) ctx.moveTo(p.x, p.y);
    else ctx.lineTo(p.x, p.y);
  });
  ctx.closePath();
  ctx.fillStyle = fillColor;
  ctx.fill();
  ctx.strokeStyle = strokeColor;
  ctx.lineWidth = selected ? 3 : 2;
  ctx.stroke();
}

function drawSideMeasures(poly, closedPoly, colorText) {
  if (!metrosPorPixel || !poly || poly.length < 2) return;
  ctx.fillStyle = colorText;
  ctx.font = "12px Arial";
  const totalSides = closedPoly ? poly.length : poly.length - 1;
  for (let i = 0; i < totalSides; i++) {
    const j = (i + 1) % poly.length;
    const a = poly[i];
    const b = poly[j];
    const m = midpoint(a, b);
    const mm = dist(a, b) * metrosPorPixel;
    ctx.fillText("L" + (i + 1) + ": " + mm.toFixed(2) + " m", m.x + 6, m.y - 6);
  }
}

function drawVertexNumbers(poly, prefix, selectedPointIndex=-1, current=false){
  poly.forEach((p, i) => {
    const sel = i === selectedPointIndex;
    ctx.beginPath();
    ctx.arc(p.x, p.y, sel ? 8 : 6, 0, Math.PI * 2);
    ctx.fillStyle = sel ? "#ffffff" : (current ? "#f39b2f" : "#ffd28a");
    ctx.fill();

    ctx.fillStyle = "#111";
    ctx.font = "bold 11px Arial";
    ctx.fillText(String(i + 1), p.x - 3, p.y + 4);

    ctx.fillStyle = "#fff";
    ctx.font = "11px Arial";
    ctx.fillText(prefix + (i + 1), p.x + 10, p.y - 10);
  });
}

function drawSavedRooms() {
  for (let i = 0; i < estancias.length; i++) {
    const est = estancias[i];
    if (!est.puntos || est.puntos.length < 3) continue;

    const selected =
      (seleccion.tipo === "estanciaGuardada" && seleccion.estanciaIndex === i) ||
      (seleccion.tipo === "puntoGuardado" && seleccion.estanciaIndex === i);

    drawRoom(
      est.puntos,
      selected,
      selected ? "rgba(255,255,255,.12)" : "rgba(243,155,47,.10)",
      selected ? "#ffffff" : "#f39b2f"
    );

    drawVertexNumbers(
      est.puntos,
      "V",
      (seleccion.tipo === "puntoGuardado" && seleccion.estanciaIndex === i) ? seleccion.puntoIndex : -1,
      false
    );

    const c = centroid(est.puntos);
    const area = polygonAreaM2(est.puntos);

    ctx.fillStyle = "#fff";
    ctx.font = "16px Arial";
    ctx.fillText(est.nombre || "Estancia", c.x - 24, c.y - 14);

    if (metrosPorPixel) {
      ctx.font = "13px Arial";
      ctx.fillText(area.toFixed(2) + " m²", c.x - 20, c.y + 8);
    }

    drawSideMeasures(est.puntos, true, "#fff");
  }
}

function drawCurrentRoom() {
  if (!puntos.length) return;

  const selected = seleccion.tipo === "estanciaActual" || seleccion.tipo === "puntoActual";

  ctx.beginPath();
  puntos.forEach((p, i) => {
    if (i === 0) ctx.moveTo(p.x, p.y);
    else ctx.lineTo(p.x, p.y);
  });

  if (cerrado && puntos.length >= 3) {
    ctx.closePath();
    ctx.fillStyle = selected ? "rgba(255,255,255,.12)" : "rgba(255,255,255,.05)";
    ctx.fill();
  }

  ctx.strokeStyle = selected ? "#ffffff" : "#dddddd";
  ctx.lineWidth = selected ? 3 : 2;
  ctx.stroke();

  drawVertexNumbers(
    puntos,
    "V",
    seleccion.tipo === "puntoActual" ? seleccion.puntoIndex : -1,
    true
  );

  drawSideMeasures(puntos, cerrado, "#fff");

  if (cerrado && metrosPorPixel && puntos.length >= 3) {
    const c = centroid(puntos);
    const area = polygonAreaM2(puntos);
    ctx.fillStyle = "#fff";
    ctx.font = "16px Arial";
    ctx.fillText("actual", c.x - 16, c.y - 14);
    ctx.font = "13px Arial";
    ctx.fillText(area.toFixed(2) + " m²", c.x - 18, c.y + 8);
  }
}

function updateInfo() {
  let html = "";

  const room = getSelectedRoomData();
  if (room && room.puntos && room.puntos.length >= 2) {
    html += "Datos de la estancia seleccionada";
    html += "<br>Nombre: " + (room.nombre || "Sin nombre");
    html += "<br>Vértices: " + room.puntos.length;

    if (metrosPorPixel && room.puntos.length >= 3) {
      html += "<br>Superficie: " + polygonAreaM2(room.puntos).toFixed(2) + " m²";
    }

    if (seleccion.tipo === "puntoActual" || seleccion.tipo === "puntoGuardado") {
      html += "<br>Vértice: V" + (seleccion.puntoIndex + 1);
    }

    info.innerHTML = html;
    actualizarUI();
    return;
  }

  let total = 0;
  for (const est of estancias) total += polygonAreaM2(est.puntos);

  html += "Resumen del plano";
  html += "<br>Estancias guardadas: " + estancias.length;
  html += "<br>Escala: " + (metrosPorPixel ? "definida" : "sin definir");
  if (metrosPorPixel) html += "<br>Superficie total: " + total.toFixed(2) + " m²";
  if (puntos.length > 0) html += "<br>Estancia actual: " + (cerrado ? "cerrada" : "abierta");

  info.innerHTML = html;
  actualizarUI();
}

function dibujar() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawSavedRooms();
  drawCurrentRoom();
  updateInfo();
}

function nuevaEstancia() {
  puntos = [];
  cerrado = false;
  enEdicionNuevaEstancia = true;
  limpiarSeleccion();
  dibujar();
  autoCerrarPanel();
}

function cerrarEstancia() {
  if (!enEdicionNuevaEstancia) return alert("Primero pulsa Nueva");
  if (puntos.length < 3) return alert("Necesitas al menos 3 puntos");
  cerrado = true;
  limpiarSeleccion();
  dibujar();
  autoCerrarPanel();
}

function guardarEstancia() {
  if (!enEdicionNuevaEstancia) return alert("Primero pulsa Nueva");
  if (!cerrado || puntos.length < 3) return alert("Primero cierra la estancia");

  const nombre = prompt("Nombre estancia:");
  if (!nombre || !nombre.trim()) return;

  estancias.push({
    nombre: nombre.trim(),
    puntos: JSON.parse(JSON.stringify(puntos))
  });

  guardarMemoria();
  puntos = [];
  cerrado = false;
  enEdicionNuevaEstancia = false;
  limpiarSeleccion();
  dibujar();
  autoCerrarPanel();

  const nuevoIdx = estancias.length - 1;
  seleccion.tipo = "estanciaGuardada";
  seleccion.estanciaIndex = nuevoIdx;
  actualizarUI();

  const quiere = confirm("¿Quieres verificar diagonales ahora?");
  if (quiere) verificarSeleccion();
}

function definirEscala() {
  const ref = puntos.length >= 2 ? puntos : (estancias[0]?.puntos || null);
  if (!ref || ref.length < 2) return alert("Necesitas una estancia con al menos 2 puntos");

  const valor = prompt("Introduce la medida real entre punto 1 y punto 2, en metros:");
  if (!valor) return;

  const metros = parseFloat(String(valor).replace(",", "."));
  if (!metros || metros <= 0) return alert("Medida no válida");

  const px = dist(ref[0], ref[1]);
  if (!px || px <= 0) return alert("No se pudo calcular la escala");

  metrosPorPixel = metros / px;
  guardarMemoria();
  dibujar();
  autoCerrarPanel();
  alert("Escala guardada");
}

function guardarPlano() {
  guardarMemoria();
  autoCerrarPanel();
  alert("Plano guardado");
}

function actualizarPanelMedidas(){
  measureTarget.textContent = "Selecciona una estancia guardada o actual";
  editSideSelect.innerHTML = "";
  editSideLength.value = "";

  const room = getSelectedRoomData();
  if (!room || !room.puntos || room.puntos.length < 2) return;

  measureTarget.textContent = "Estancia: " + (room.nombre || "Sin nombre");

  const closed = !(seleccion.tipo === "estanciaActual" || seleccion.tipo === "puntoActual") ? true : cerrado;
  const totalSides = closed ? room.puntos.length : Math.max(0, room.puntos.length - 1);

  for(let i=0;i<totalSides;i++){
    const a = room.puntos[i];
    const b = room.puntos[(i+1)%room.puntos.length];
    const len = metrosPorPixel ? (dist(a,b) * metrosPorPixel).toFixed(2) : dist(a,b).toFixed(0);
    const op = document.createElement("option");
    op.value = String(i);
    op.textContent = "Lado " + (i+1) + " · V" + (i+1) + " → V" + (((i+1)%room.puntos.length)+1) + " · " + len + (metrosPorPixel ? " m" : " px");
    editSideSelect.appendChild(op);
  }

  if (totalSides > 0 && metrosPorPixel) {
    const a = room.puntos[0];
    const b = room.puntos[1];
    editSideLength.value = (dist(a,b) * metrosPorPixel).toFixed(2);
  }
}

function aplicarMedidaLado(){
  if (!metrosPorPixel) return alert("Define escala primero");
  const poly = getSelectedRoomPolyRef();
  if (!poly || poly.length < 2) return alert("Selecciona una estancia");

  const sideIdx = parseInt(editSideSelect.value, 10);
  const lenM = parseFloat(String(editSideLength.value).replace(",", "."));
  if (!Number.isFinite(sideIdx) || !lenM || lenM <= 0) return alert("Medida no válida");

  const closed = !(seleccion.tipo === "estanciaActual" || seleccion.tipo === "puntoActual") ? true : cerrado;
  const maxSide = closed ? poly.length : poly.length - 1;
  if (sideIdx < 0 || sideIdx >= maxSide) return alert("Lado no válido");

  const a = poly[sideIdx];
  const b = poly[(sideIdx + 1) % poly.length];
  const old = dist(a, b);
  if (!old) return alert("Ese lado no es válido");

  const newPx = lenM / metrosPorPixel;
  const dx = (b.x - a.x) / old;
  const dy = (b.y - a.y) / old;

  b.x = a.x + dx * newPx;
  b.y = a.y + dy * newPx;

  guardarMemoria();
  dibujar();
}

function getAllDiagonals(poly, closed=true){
  const res = [];
  const n = poly.length;
  if (n < 4) return res;
  for (let i = 0; i < n; i++) {
    for (let j = i + 2; j < n; j++) {
      if (closed && i === 0 && j === n - 1) continue;
      res.push({i, j});
    }
  }
  return res;
}

function verificarSeleccion(){
  if (!metrosPorPixel) return alert("Define escala primero");
  const room = getSelectedRoomData();
  if (!room || !room.puntos || room.puntos.length < 3) return alert("Selecciona una estancia");

  const closed = !(seleccion.tipo === "estanciaActual" || seleccion.tipo === "puntoActual") ? true : cerrado;
  if (!closed) return alert("Primero cierra la estancia");

  const poly = room.puntos;
  const diags = getAllDiagonals(poly, true);
  if (!diags.length) return alert("Esta estancia no necesita diagonales");

  let media = 0;
  let usadas = 0;

  for (const d of diags) {
    const calculada = dist(poly[d.i], poly[d.j]) * metrosPorPixel;
    const txt = prompt(
      "Diagonal V" + (d.i + 1) + " - V" + (d.j + 1) + " en metros.\n" +
      "Calculada: " + calculada.toFixed(2) + "\n" +
      "Deja vacío para saltarla.",
      calculada.toFixed(2)
    );
    if (txt === null || txt === "") continue;

    const real = parseFloat(String(txt).replace(",", "."));
    if (!real || real <= 0) continue;

    media += Math.abs(real - calculada);
    usadas++;
  }

  if (!usadas) return alert("No se introdujo ninguna diagonal");

  media = media / usadas;

  let msg = "Verificación terminada\n";
  msg += "Diagonales usadas: " + usadas + "\n";
  msg += "Desviación media: " + media.toFixed(2) + " m\n";
  if (media <= 0.03) msg += "Resultado: muy bien";
  else if (media <= 0.08) msg += "Resultado: aceptable";
  else msg += "Resultado: revisar forma";

  alert(msg);
}

function eliminarSeleccionado() {
  if (seleccion.tipo === "estanciaGuardada" || seleccion.tipo === "puntoGuardado") {
    const idx = Number(seleccion.estanciaIndex);
    if (idx >= 0 && idx < estancias.length) {
      if (confirm("Eliminar estancia guardada?")) {
        estancias.splice(idx, 1);
        guardarMemoria();
        limpiarSeleccion();
        dibujar();
      }
    }
    return;
  }

  if (seleccion.tipo === "estanciaActual" || seleccion.tipo === "puntoActual") {
    if (confirm("Eliminar estancia actual?")) {
      puntos = [];
      cerrado = false;
      enEdicionNuevaEstancia = false;
      guardarMemoria();
      limpiarSeleccion();
      dibujar();
    }
    return;
  }

  alert("Primero selecciona algo");
}

function onStart(ev) {
  const raw = getPos(ev);
  const posSnap = snapPoint(raw);

  ultimoX = posSnap.x;
  ultimoY = posSnap.y;

  let idx = findPoint(puntos, raw.x, raw.y);
  if (idx >= 0) {
    limpiarSeleccion();
    seleccion.tipo = "puntoActual";
    seleccion.puntoIndex = idx;
    arrastrando = true;
    dibujar();
    if (ev.cancelable) ev.preventDefault();
    return;
  }

  for (let i = estancias.length - 1; i >= 0; i--) {
    idx = findPoint(estancias[i].puntos, raw.x, raw.y);
    if (idx >= 0) {
      limpiarSeleccion();
      seleccion.tipo = "puntoGuardado";
      seleccion.estanciaIndex = i;
      seleccion.puntoIndex = idx;
      arrastrando = true;
      dibujar();
      if (ev.cancelable) ev.preventDefault();
      return;
    }
  }

  if (cerrado && puntos.length >= 3 && pointInPolygon(raw.x, raw.y, puntos)) {
    limpiarSeleccion();
    seleccion.tipo = "estanciaActual";
    arrastrando = true;
    dibujar();
    if (ev.cancelable) ev.preventDefault();
    return;
  }

  for (let i = estancias.length - 1; i >= 0; i--) {
    if (pointInPolygon(raw.x, raw.y, estancias[i].puntos)) {
      limpiarSeleccion();
      seleccion.tipo = "estanciaGuardada";
      seleccion.estanciaIndex = i;
      arrastrando = true;
      dibujar();
      if (ev.cancelable) ev.preventDefault();
      return;
    }
  }

  if (enEdicionNuevaEstancia && !cerrado) {
    limpiarSeleccion();
    puntos.push({ x: posSnap.x, y: posSnap.y });
    seleccion.tipo = "puntoActual";
    seleccion.puntoIndex = puntos.length - 1;
    dibujar();
    if (ev.cancelable) ev.preventDefault();
    return;
  }

  limpiarSeleccion();
  dibujar();
}

function onMove(ev) {
  const raw = getPos(ev);
  if (!arrastrando || !seleccion.tipo) return;

  let pos = { x: raw.x, y: raw.y };

  if (seleccion.tipo === "puntoGuardado") {
    pos = snapPoint(raw, seleccion.estanciaIndex, seleccion.puntoIndex);
  } else if (seleccion.tipo === "puntoActual") {
    pos = snapPoint(raw);
  }

  const dx = pos.x - ultimoX;
  const dy = pos.y - ultimoY;

  if (seleccion.tipo === "puntoActual") {
    puntos[seleccion.puntoIndex].x += dx;
    puntos[seleccion.puntoIndex].y += dy;
  } else if (seleccion.tipo === "puntoGuardado") {
    const est = estancias[seleccion.estanciaIndex];
    est.puntos[seleccion.puntoIndex].x += dx;
    est.puntos[seleccion.puntoIndex].y += dy;
    guardarMemoria();
  } else if (seleccion.tipo === "estanciaActual") {
    for (const p of puntos) {
      p.x += dx;
      p.y += dy;
    }
  } else if (seleccion.tipo === "estanciaGuardada") {
    const est = estancias[seleccion.estanciaIndex];
    for (const p of est.puntos) {
      p.x += dx;
      p.y += dy;
    }
    guardarMemoria();
  }

  ultimoX = pos.x;
  ultimoY = pos.y;
  dibujar();
  if (ev.cancelable) ev.preventDefault();
}

function onEnd(ev) {
  if (!arrastrando) return;
  arrastrando = false;

  if (
    seleccion.tipo === "puntoGuardado" ||
    seleccion.tipo === "estanciaGuardada"
  ) {
    guardarMemoria();
  }

  if (ev && ev.cancelable) ev.preventDefault();
}

editSideSelect.addEventListener("change", () => {
  const room = getSelectedRoomData();
  if (!room || !room.puntos || !metrosPorPixel) return;
  const i = parseInt(editSideSelect.value, 10);
  if (!Number.isFinite(i)) return;
  const a = room.puntos[i];
  const b = room.puntos[(i+1)%room.puntos.length];
  editSideLength.value = (dist(a,b) * metrosPorPixel).toFixed(2);
});

canvas.addEventListener("mousedown", onStart);
canvas.addEventListener("mousemove", onMove);
canvas.addEventListener("mouseup", onEnd);
canvas.addEventListener("mouseleave", onEnd);

canvas.addEventListener("touchstart", onStart, { passive:false });
canvas.addEventListener("touchmove", onMove, { passive:false });
canvas.addEventListener("touchend", onEnd, { passive:false });
canvas.addEventListener("touchcancel", onEnd, { passive:false });

window.addEventListener("keydown", (e) => {
  if (e.key === "Delete" || e.key === "Backspace") {
    const tag = document.activeElement ? document.activeElement.tagName : "";
    if (tag !== "INPUT" && tag !== "TEXTAREA" && tag !== "SELECT") {
      if (seleccion.tipo) eliminarSeleccionado();
    }
  }
});

requestAnimationFrame(() => {
  ajustarCanvas();
  guardarMemoria();
  actualizarUI();
  dibujar();
});
</script>
