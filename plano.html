<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Plano</title>
<style>
:root{
    --bg:#0b0b0b;
    --panel:#151515;
    --line:#2b2b2b;
    --text:#ffffff;
    --muted:#c8c8c8;
    --accent:#f39b2f;
    --accent2:#d5a23d;
    --danger:#c93b2f;
    --ok:#4caf50;
    --btnText:#111111;
}
*{box-sizing:border-box}
body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:Arial,sans-serif;
}
input,select,button{font:inherit}
.header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    padding:12px 14px;
    border-bottom:2px solid var(--accent);
    position:sticky;
    top:0;
    background:var(--bg);
    z-index:50;
}
.brand-wrap{
    display:flex;
    align-items:center;
    gap:10px;
    min-width:0;
}
.brand-logo{
    width:40px;
    height:40px;
    object-fit:contain;
    border-radius:8px;
    background:#fff;
    display:none;
    flex:0 0 auto;
}
.brand-text{
    min-width:0;
    text-align:center;
}
.brand-name{
    font-size:18px;
    font-weight:bold;
    line-height:1.05;
    color:var(--accent);
    word-break:break-word;
}
.brand-sub{
    font-size:12px;
    color:var(--muted);
    margin-top:4px;
}
.btn-top{
    border:none;
    background:var(--accent);
    color:var(--btnText);
    font-weight:bold;
    border-radius:10px;
    padding:10px 14px;
    cursor:pointer;
}
.main{padding:10px}
.info{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px;
    padding:10px;
    font-size:14px;
    line-height:1.45;
    margin-bottom:10px;
    min-height:92px;
}
.canvas-wrap{position:relative}
canvas{
    width:100%;
    height:calc(100vh - 198px);
    min-height:420px;
    display:block;
    background:#101010;
    border:1px solid var(--line);
    border-radius:10px;
    touch-action:none;
}
.panel{
    position:absolute;
    top:10px;
    right:10px;
    width:280px;
    background:rgba(21,21,21,.97);
    border:1px solid var(--line);
    border-radius:12px;
    padding:8px;
    box-shadow:0 10px 28px rgba(0,0,0,.42);
    z-index:30;
    display:none;
}
.panel.open{display:block}
.panel-group{
    border:1px solid var(--line);
    border-radius:10px;
    overflow:hidden;
    margin-bottom:8px;
}
.panel-group:last-child{margin-bottom:0}
.panel-group-title{
    width:100%;
    border:none;
    background:#1f1f1f;
    color:var(--accent);
    text-align:left;
    padding:8px 10px;
    font-weight:bold;
    font-size:12px;
    cursor:pointer;
}
.panel-group-content{
    display:none;
    padding:8px;
    background:#171717;
}
.panel-group.open .panel-group-content{display:block}
.grid{
    display:grid;
    grid-template-columns:1fr;
    gap:6px;
}
.grid-2{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:6px;
}
.btn{
    border:none;
    border-radius:8px;
    padding:9px 10px;
    font-weight:bold;
    cursor:pointer;
    background:var(--accent);
    color:var(--btnText);
    width:100%;
    font-size:12px;
}
.btn.secondary{background:var(--accent2)}
.btn.neutral{background:#c8c8c8;color:#111}
.btn.danger{background:var(--danger);color:#fff}
.btn.active{outline:2px solid #fff}
.note{
    margin-top:6px;
    color:var(--muted);
    font-size:11px;
    line-height:1.3;
}
.small{
    font-size:11px;
    color:var(--muted);
}
.warn-box{
    border:1px solid var(--line);
    background:#111;
    border-radius:8px;
    padding:8px;
    font-size:11px;
    line-height:1.35;
}
.warn-ok{color:#8ee08e}
.warn-bad{color:#ff8d8d}
.warn-mid{color:#ffd27d}
.quickbar{
    position:absolute;
    left:10px;
    bottom:10px;
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    z-index:25;
}
.quickbar .chip{
    background:rgba(21,21,21,.92);
    border:1px solid var(--line);
    color:var(--text);
    border-radius:999px;
    padding:7px 11px;
    font-size:12px;
}
.mode-badge{
    position:absolute;
    left:10px;
    top:10px;
    background:rgba(243,155,47,.95);
    color:var(--btnText);
    font-weight:bold;
    border-radius:999px;
    padding:8px 12px;
    z-index:20;
    display:none;
    font-size:12px;
}
.mode-badge.show{display:block}
.temp-label{
    position:absolute;
    pointer-events:none;
    transform:translate(-50%,-100%);
    background:rgba(0,0,0,.88);
    color:#fff;
    padding:6px 8px;
    border-radius:8px;
    border:1px solid #444;
    font-size:12px;
    white-space:nowrap;
    z-index:28;
    display:none;
}
@media (max-width:900px){
    canvas{
        height:calc(100vh - 220px);
        min-height:360px;
    }
    .panel{
        left:10px;
        right:10px;
        top:auto;
        bottom:10px;
        width:auto;
        max-height:68vh;
        overflow:auto;
    }
    .brand-name{font-size:16px}
}
</style>
</head>
<body>

<div class="header">
    <button class="btn-top" onclick="volver()">Volver</button>

    <div class="brand-wrap">
        <img id="brandLogo" class="brand-logo" alt="Logo">
        <div class="brand-text">
            <div id="brandName" class="brand-name">ALLCALOR PRO</div>
            <div id="brandSub" class="brand-sub">Centro de control</div>
        </div>
    </div>

    <button class="btn-top" onclick="togglePanel()">Herramientas</button>
</div>

<div class="main">
    <div class="info" id="info">Cargando...</div>

    <div class="canvas-wrap">
        <div class="mode-badge" id="modeBadge"></div>
        <div class="temp-label" id="tempLabel"></div>

        <div class="panel" id="panel">
            <div class="panel-group open">
                <button class="panel-group-title" type="button" onclick="toggleGroup(this)">Plano</button>
                <div class="panel-group-content">
                    <div class="grid">
                        <button class="btn neutral" onclick="guardarPlano()">Guardar</button>
                        <button class="btn secondary" onclick="recalcularTodoCircuitos()">Recalcular todo</button>
                        <button class="btn danger" onclick="eliminarSeleccionado()">Eliminar</button>
                    </div>
                </div>
            </div>

            <div class="panel-group">
                <button class="panel-group-title" type="button" onclick="toggleGroup(this)">Estancia</button>
                <div class="panel-group-content">
                    <div class="grid">
                        <button class="btn" onclick="nuevaEstancia()">Nueva</button>
                        <button class="btn" onclick="cerrarEstancia()">Cerrar</button>
                        <button class="btn" onclick="guardarEstancia()">Guardar</button>
                        <button class="btn secondary" onclick="definirEscala()">Escala</button>
                        <button class="btn secondary" onclick="verificarDiagonales()">Verificar</button>
                        <button class="btn secondary" onclick="editarMedidaLado()">Editar lado</button>
                    </div>
                </div>
            </div>

            <div class="panel-group">
                <button class="panel-group-title" type="button" onclick="toggleGroup(this)">Elementos</button>
                <div class="panel-group-content">
                    <div class="grid">
                        <button class="btn secondary" id="btnZona" onclick="activarModo('zona')">Zona</button>
                        <button class="btn secondary" id="btnPuerta" onclick="activarModo('puerta')">Puerta</button>
                        <button class="btn secondary" id="btnVentana" onclick="activarModo('ventana')">Ventana</button>
                        <button class="btn secondary" onclick="editarElementoSeleccionado()">Editar elemento</button>
                    </div>
                    <div class="note">
                        Zona: tocar y arrastrar.<br>
                        Puerta / ventana: tocar un lado.<br>
                        Hay pegado automático entre estancias.
                    </div>
                </div>
            </div>

            <div class="panel-group open">
                <button class="panel-group-title" type="button" onclick="toggleGroup(this)">Circuitos</button>
                <div class="panel-group-content">
                    <div class="small" id="circuitRoomName">Selecciona una estancia guardada</div>

                    <div class="grid-2">
                        <div>
                            <div class="small">Modo</div>
                            <select class="in" id="cfgModo" style="width:100%;border:1px solid var(--line);border-radius:8px;background:#101010;color:#fff;padding:8px 9px;font-size:12px">
                                <option value="auto">Automático</option>
                                <option value="manual">Manual</option>
                            </select>
                        </div>
                        <div>
                            <div class="small">Tipo</div>
                            <select class="in" id="cfgTipo" style="width:100%;border:1px solid var(--line);border-radius:8px;background:#101010;color:#fff;padding:8px 9px;font-size:12px">
                                <option value="general">General</option>
                                <option value="bano">Baño / aseo</option>
                                <option value="alta">Alta pérdida</option>
                                <option value="interior">Interior</option>
                            </select>
                        </div>
                    </div>

                    <div class="grid-2" style="margin-top:6px">
                        <div>
                            <div class="small">Paso</div>
                            <select class="in" id="cfgPaso" style="width:100%;border:1px solid var(--line);border-radius:8px;background:#101010;color:#fff;padding:8px 9px;font-size:12px">
                                <option value="0.05">5 cm</option>
                                <option value="0.10">10 cm</option>
                                <option value="0.15">15 cm</option>
                                <option value="0.20">20 cm</option>
                            </select>
                        </div>
                        <div>
                            <div class="small">Long. máx.</div>
                            <input class="in" id="cfgMax" type="number" min="40" max="150" step="1" value="90" style="width:100%;border:1px solid var(--line);border-radius:8px;background:#101010;color:#fff;padding:8px 9px;font-size:12px">
                        </div>
                    </div>

                    <div style="margin-top:6px">
                        <div class="small">Circuitos manual</div>
                        <input class="in" id="cfgCircuitos" type="number" min="1" max="12" step="1" value="1" style="width:100%;border:1px solid var(--line);border-radius:8px;background:#101010;color:#fff;padding:8px 9px;font-size:12px">
                    </div>

                    <div class="grid" style="margin-top:6px">
                        <button class="btn secondary" onclick="aplicarCircuitosEstancia()">Recalcular estancia</button>
                    </div>

                    <div class="warn-box" id="warnBox" style="margin-top:6px">
                        <div class="warn-mid">Aún no hay cálculo para esta estancia.</div>
                    </div>
                </div>
            </div>
        </div>

        <canvas id="canvas"></canvas>

        <div class="quickbar">
            <div class="chip" id="chipSeleccion">Sin selección</div>
            <div class="chip" id="chipEscala">Escala sin definir</div>
            <div class="chip" id="chipEdicion">Sin edición</div>
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const info = document.getElementById("info");
const panel = document.getElementById("panel");
const modeBadge = document.getElementById("modeBadge");
const chipSeleccion = document.getElementById("chipSeleccion");
const chipEscala = document.getElementById("chipEscala");
const chipEdicion = document.getElementById("chipEdicion");
const tempLabel = document.getElementById("tempLabel");

const cfgModo = document.getElementById("cfgModo");
const cfgPaso = document.getElementById("cfgPaso");
const cfgMax = document.getElementById("cfgMax");
const cfgTipo = document.getElementById("cfgTipo");
const cfgCircuitos = document.getElementById("cfgCircuitos");
const warnBox = document.getElementById("warnBox");
const circuitRoomName = document.getElementById("circuitRoomName");

const CONFIG_DEFAULT = {
    nombre: "ALLCALOR PRO",
    subtitulo: "Centro de control",
    logo: "",
    fuente: "Arial, sans-serif",
    tamNombre: 22,
    pesoNombre: 700,
    espacioLetras: 0,
    sombraNombre: 0,
    mayusculas: false,
    cursiva: false,
    colorPrincipal: "#f39b2f",
    colorFondo: "#0b0b0b",
    colorPanel: "#151515",
    colorTexto: "#ffffff",
    colorLinea: "#2b2b2b",
    colorBotonTexto: "#111111"
};

function leerConfigVisual(){
    try{
        return {
            ...CONFIG_DEFAULT,
            ...(JSON.parse(localStorage.getItem("configAllcalor")) || {})
        };
    }catch(e){
        return { ...CONFIG_DEFAULT };
    }
}

function aplicarConfigVisual(){
    const cfg = leerConfigVisual();

    document.documentElement.style.setProperty("--bg", cfg.colorFondo || CONFIG_DEFAULT.colorFondo);
    document.documentElement.style.setProperty("--panel", cfg.colorPanel || CONFIG_DEFAULT.colorPanel);
    document.documentElement.style.setProperty("--text", cfg.colorTexto || CONFIG_DEFAULT.colorTexto);
    document.documentElement.style.setProperty("--muted", cfg.colorTexto || CONFIG_DEFAULT.colorTexto);
    document.documentElement.style.setProperty("--line", cfg.colorLinea || CONFIG_DEFAULT.colorLinea);
    document.documentElement.style.setProperty("--accent", cfg.colorPrincipal || CONFIG_DEFAULT.colorPrincipal);
    document.documentElement.style.setProperty("--accent2", cfg.colorPrincipal || CONFIG_DEFAULT.colorPrincipal);
    document.documentElement.style.setProperty("--btnText", cfg.colorBotonTexto || CONFIG_DEFAULT.colorBotonTexto);
    document.body.style.fontFamily = cfg.fuente || CONFIG_DEFAULT.fuente;

    const brandName = document.getElementById("brandName");
    const brandSub = document.getElementById("brandSub");
    const brandLogo = document.getElementById("brandLogo");

    const nombreFinal = cfg.mayusculas ? (cfg.nombre || CONFIG_DEFAULT.nombre).toUpperCase() : (cfg.nombre || CONFIG_DEFAULT.nombre);

    brandName.textContent = nombreFinal;
    brandSub.textContent = cfg.subtitulo || CONFIG_DEFAULT.subtitulo;
    brandName.style.fontFamily = cfg.fuente || CONFIG_DEFAULT.fuente;
    brandName.style.fontSize = Math.max(14, Number(cfg.tamNombre || CONFIG_DEFAULT.tamNombre) - 2) + "px";
    brandName.style.fontWeight = cfg.pesoNombre || CONFIG_DEFAULT.pesoNombre;
    brandName.style.letterSpacing = (cfg.espacioLetras || 0) + "px";
    brandName.style.textShadow = "0 0 " + (cfg.sombraNombre || 0) + "px #000";
    brandName.style.fontStyle = cfg.cursiva ? "italic" : "normal";
    brandName.style.color = cfg.colorPrincipal || CONFIG_DEFAULT.colorPrincipal;
    brandSub.style.fontFamily = cfg.fuente || CONFIG_DEFAULT.fuente;
    brandSub.style.fontStyle = cfg.cursiva ? "italic" : "normal";

    if(cfg.logo){
        brandLogo.src = cfg.logo;
        brandLogo.style.display = "block";
    }else{
        brandLogo.style.display = "none";
    }
}
aplicarConfigVisual();

function ajustarCanvas() {
    const rect = canvas.getBoundingClientRect();
    canvas.width = Math.max(300, Math.floor(rect.width));
    canvas.height = Math.max(300, Math.floor(rect.height));
}
window.addEventListener("resize", () => {
    ajustarCanvas();
    dibujar();
});

function togglePanel(){ panel.classList.toggle("open"); }
function cerrarPanel(){ panel.classList.remove("open"); }
function autoCerrarPanel(){ if (window.innerWidth <= 900) cerrarPanel(); }
function toggleGroup(btn){ btn.parentElement.classList.toggle("open"); }

const clienteId = localStorage.getItem("clienteActivo");
const obraId = localStorage.getItem("obraActiva");

const obras = JSON.parse(localStorage.getItem("obras_" + clienteId)) || [];
const obra = obras.find(o => String(o.id) === String(obraId));

if (!obra) {
    alert("Obra no encontrada");
    window.location.href = "obras.html";
}

if (!obra.plano) obra.plano = {};
if (!Array.isArray(obra.plano.estancias)) obra.plano.estancias = [];
if (typeof obra.plano.metrosPorPixel !== "number") obra.plano.metrosPorPixel = null;
if (!Array.isArray(obra.zonasMuertas)) obra.zonasMuertas = [];
if (!Array.isArray(obra.aberturas)) obra.aberturas = [];
if (!Array.isArray(obra.circuitos)) obra.circuitos = [];
if (!obra.ajustesCircuitos || typeof obra.ajustesCircuitos !== "object") obra.ajustesCircuitos = {};

let estancias = obra.plano.estancias;
let zonasMuertas = obra.zonasMuertas;
let aberturas = obra.aberturas;
let circuitos = obra.circuitos;
let ajustesCircuitos = obra.ajustesCircuitos;
let metrosPorPixel = obra.plano.metrosPorPixel;

let puntos = [];
let cerrado = false;
let enEdicionNuevaEstancia = false;

let modo = null;
let zonaTemp = null;

let arrastrando = false;
let ultimoX = 0;
let ultimoY = 0;

const HANDLE_SIZE = 10;
const HIT_POINT = 14;
const MIN_ZONA = 12;
const MIN_ABERTURA_M = 0.4;
const MAX_DIST_LINE = 14;
const SNAP_DIST = 12;

const seleccion = {
    tipo: null,
    estanciaIndex: -1,
    puntoIndex: -1,
    zonaIndex: -1,
    aberturaIndex: -1,
    handle: null
};

function saneaDatos(){
    estancias = estancias.filter(e => e && Array.isArray(e.puntos) && e.puntos.length >= 3);

    zonasMuertas = zonasMuertas.filter(z =>
        z && isFinite(z.x) && isFinite(z.y) && isFinite(z.w) && isFinite(z.h) && z.w > 1 && z.h > 1
    );

    aberturas = aberturas.filter(a => {
        if (!a || !isFinite(a.widthM) || a.widthM <= 0) return false;
        if (a.currentRoom === true) return false;
        if (!Number.isInteger(a.roomIndex)) return false;
        if (a.roomIndex < 0 || a.roomIndex >= estancias.length) return false;
        if (!Number.isInteger(a.sideIndex)) return false;
        const poly = estancias[a.roomIndex]?.puntos;
        if (!poly || a.sideIndex < 0 || a.sideIndex >= poly.length) return false;
        if (typeof a.t !== "number" || a.t < 0 || a.t > 1) return false;
        if (a.tipo !== "puerta" && a.tipo !== "ventana") return false;
        return true;
    });

    circuitos = circuitos.filter(c => c && Number.isInteger(c.estancia) && c.estancia >= 0 && c.estancia < estancias.length);

    const nuevosAjustes = {};
    for (let i = 0; i < estancias.length; i++) {
        nuevosAjustes[String(i)] = ajustesCircuitos[String(i)] || {
            modo: "auto",
            paso: 0.15,
            maxLong: 90,
            tipo: "general",
            manualCircuitos: 1
        };
    }
    ajustesCircuitos = nuevosAjustes;
}
saneaDatos();

function guardarMemoria() {
    obra.plano.estancias = estancias;
    obra.plano.metrosPorPixel = metrosPorPixel;
    obra.zonasMuertas = zonasMuertas;
    obra.aberturas = aberturas;
    obra.circuitos = circuitos;
    obra.ajustesCircuitos = ajustesCircuitos;
    localStorage.setItem("obras_" + clienteId, JSON.stringify(obras));
}

function volver(){ window.location.href = "obra.html"; }

function limpiarSeleccion() {
    seleccion.tipo = null;
    seleccion.estanciaIndex = -1;
    seleccion.puntoIndex = -1;
    seleccion.zonaIndex = -1;
    seleccion.aberturaIndex = -1;
    seleccion.handle = null;
}

function cancelarModo() {
    modo = null;
    zonaTemp = null;
    tempLabel.style.display = "none";
    actualizarUI();
}

function activarModo(nuevoModo) {
    if (modo === nuevoModo) {
        cancelarModo();
        dibujar();
        return;
    }
    modo = nuevoModo;
    zonaTemp = null;
    limpiarSeleccion();
    actualizarUI();
    dibujar();
    autoCerrarPanel();
}

function actualizarUI() {
    document.getElementById("btnZona").classList.toggle("active", modo === "zona");
    document.getElementById("btnPuerta").classList.toggle("active", modo === "puerta");
    document.getElementById("btnVentana").classList.toggle("active", modo === "ventana");

    let txt = "";
    if (modo === "zona") txt = "Modo: zona muerta";
    if (modo === "puerta") txt = "Modo: puerta";
    if (modo === "ventana") txt = "Modo: ventana";

    modeBadge.textContent = txt;
    modeBadge.classList.toggle("show", !!txt);

    chipEscala.textContent = metrosPorPixel ? "Escala definida" : "Escala sin definir";
    chipEdicion.textContent = enEdicionNuevaEstancia ? "Editando estancia" : "Sin edición";

    if (seleccion.tipo === "zonaMuerta" || seleccion.tipo === "zonaHandle") chipSeleccion.textContent = "Zona seleccionada";
    else if (seleccion.tipo === "abertura") chipSeleccion.textContent = "Elemento seleccionado";
    else if (seleccion.tipo === "estanciaActual" || seleccion.tipo === "puntoActual") chipSeleccion.textContent = "Estancia actual";
    else if (seleccion.tipo === "estanciaGuardada" || seleccion.tipo === "puntoGuardado") chipSeleccion.textContent = "Estancia guardada";
    else chipSeleccion.textContent = "Sin selección";

    actualizarPanelCircuitos();
}

function getPos(ev) {
    const rect = canvas.getBoundingClientRect();
    if (ev.touches && ev.touches.length) {
        return {
            x: ev.touches[0].clientX - rect.left,
            y: ev.touches[0].clientY - rect.top
        };
    }
    if (ev.changedTouches && ev.changedTouches.length) {
        return {
            x: ev.changedTouches[0].clientX - rect.left,
            y: ev.changedTouches[0].clientY - rect.top
        };
    }
    return {
        x: ev.clientX - rect.left,
        y: ev.clientY - rect.top
    };
}

function dist(a, b){ return Math.hypot(b.x - a.x, b.y - a.y); }
function midpoint(a, b){ return { x:(a.x+b.x)/2, y:(a.y+b.y)/2 }; }

function centroid(poly) {
    let sx = 0, sy = 0;
    for (const p of poly) { sx += p.x; sy += p.y; }
    return { x: sx / poly.length, y: sy / poly.length };
}

function polygonAreaPx(poly) {
    if (!poly || poly.length < 3) return 0;
    let area = 0;
    for (let i = 0; i < poly.length; i++) {
        const j = (i + 1) % poly.length;
        area += poly[i].x * poly[j].y - poly[j].x * poly[i].y;
    }
    return Math.abs(area / 2);
}

function polygonAreaM2(poly) {
    if (!metrosPorPixel) return 0;
    return polygonAreaPx(poly) * metrosPorPixel * metrosPorPixel;
}

function pointInPolygon(x, y, poly) {
    let inside = false;
    for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
        const xi = poly[i].x, yi = poly[i].y;
        const xj = poly[j].x, yj = poly[j].y;
        const inter = ((yi > y) !== (yj > y)) &&
            (x < ((xj - xi) * (y - yi)) / ((yj - yi) || 0.000001) + xi);
        if (inter) inside = !inside;
    }
    return inside;
}

function findPoint(poly, x, y) {
    for (let i = 0; i < poly.length; i++) {
        if (Math.hypot(poly[i].x - x, poly[i].y - y) <= HIT_POINT) return i;
    }
    return -1;
}

function pointInRect(x, y, r) {
    return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h;
}

function getZonaHandles(z) {
    return [
        { name:"nw", x:z.x, y:z.y },
        { name:"ne", x:z.x+z.w, y:z.y },
        { name:"se", x:z.x+z.w, y:z.y+z.h },
        { name:"sw", x:z.x, y:z.y+z.h }
    ];
}

function findZonaHandle(z, x, y) {
    const hs = getZonaHandles(z);
    for (const h of hs) {
        if (Math.abs(x - h.x) <= HANDLE_SIZE && Math.abs(y - h.y) <= HANDLE_SIZE) return h.name;
    }
    return null;
}

function lineIntersectionsHorizontal(y, poly) {
    const xs = [];
    for (let i = 0; i < poly.length; i++) {
        const a = poly[i];
        const b = poly[(i + 1) % poly.length];
        if (a.y === b.y) continue;
        const minY = Math.min(a.y, b.y);
        const maxY = Math.max(a.y, b.y);
        if (y < minY || y >= maxY) continue;
        const t = (y - a.y) / (b.y - a.y);
        xs.push(a.x + t * (b.x - a.x));
    }
    xs.sort((m,n) => m - n);
    return xs;
}

function lineIntersectionsVertical(x, poly) {
    const ys = [];
    for (let i = 0; i < poly.length; i++) {
        const a = poly[i];
        const b = poly[(i + 1) % poly.length];
        if (a.x === b.x) continue;
        const minX = Math.min(a.x, b.x);
        const maxX = Math.max(a.x, b.x);
        if (x < minX || x >= maxX) continue;
        const t = (x - a.x) / (b.x - a.x);
        ys.push(a.y + t * (b.y - a.y));
    }
    ys.sort((m,n) => m - n);
    return ys;
}

function drawMeasureLine(x1, y1, x2, y2, text) {
    ctx.save();
    ctx.strokeStyle = "rgba(255,255,255,.70)";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
    ctx.fillStyle = "#fff";
    ctx.font = "12px Arial";
    ctx.fillText(text, (x1+x2)/2 + 4, (y1+y2)/2 - 4);
    ctx.restore();
}

function getContainerIndexForZone(z) {
    const cx = z.x + z.w / 2;
    const cy = z.y + z.h / 2;

    if (cerrado && puntos.length >= 3 && pointInPolygon(cx, cy, puntos)) return -2;
    for (let i = estancias.length - 1; i >= 0; i--) {
        if (pointInPolygon(cx, cy, estancias[i].puntos)) return i;
    }
    return null;
}

function getPolygonByContainerIndex(idx) {
    if (idx === -2) return puntos;
    if (idx === null || idx === undefined) return null;
    return estancias[idx]?.puntos || null;
}

function drawZoneDistances(idx) {
    if (!metrosPorPixel) return;
    const z = zonasMuertas[idx];
    const cont = getContainerIndexForZone(z);
    const poly = getPolygonByContainerIndex(cont);
    if (!poly || poly.length < 3) return;

    const cx = z.x + z.w / 2;
    const cy = z.y + z.h / 2;

    const xs = lineIntersectionsHorizontal(cy, poly);
    const ys = lineIntersectionsVertical(cx, poly);

    let leftBound = null, rightBound = null, topBound = null, bottomBound = null;

    for (const x of xs) {
        if (x <= z.x) leftBound = x;
        if (x >= z.x + z.w && rightBound === null) rightBound = x;
    }
    for (const y of ys) {
        if (y <= z.y) topBound = y;
        if (y >= z.y + z.h && bottomBound === null) bottomBound = y;
    }

    if (leftBound !== null) drawMeasureLine(leftBound, cy, z.x, cy, ((z.x - leftBound) * metrosPorPixel).toFixed(2) + " m");
    if (rightBound !== null) drawMeasureLine(z.x + z.w, cy, rightBound, cy, ((rightBound - (z.x + z.w)) * metrosPorPixel).toFixed(2) + " m");
    if (topBound !== null) drawMeasureLine(cx, topBound, cx, z.y, ((z.y - topBound) * metrosPorPixel).toFixed(2) + " m");
    if (bottomBound !== null) drawMeasureLine(cx, z.y + z.h, cx, bottomBound, ((bottomBound - (z.y + z.h)) * metrosPorPixel).toFixed(2) + " m");
}

function clipPolygonWithRect(subjectPolygon, rect) {
    let output = subjectPolygon.slice();
    const edges = [
        {
            inside: p => p.x >= rect.x,
            intersect: (a, b) => {
                const t = (rect.x - a.x) / (b.x - a.x);
                return { x: rect.x, y: a.y + t * (b.y - a.y) };
            }
        },
        {
            inside: p => p.x <= rect.x + rect.w,
            intersect: (a, b) => {
                const xr = rect.x + rect.w;
                const t = (xr - a.x) / (b.x - a.x);
                return { x: xr, y: a.y + t * (b.y - a.y) };
            }
        },
        {
            inside: p => p.y >= rect.y,
            intersect: (a, b) => {
                const t = (rect.y - a.y) / (b.y - a.y);
                return { x: a.x + t * (b.x - a.x), y: rect.y };
            }
        },
        {
            inside: p => p.y <= rect.y + rect.h,
            intersect: (a, b) => {
                const yr = rect.y + rect.h;
                const t = (yr - a.y) / (b.y - a.y);
                return { x: a.x + t * (b.x - a.x), y: yr };
            }
        }
    ];

    for (const edge of edges) {
        const input = output.slice();
        output = [];
        if (input.length === 0) break;
        let S = input[input.length - 1];
        for (const E of input) {
            const Sin = edge.inside(S);
            const Ein = edge.inside(E);
            if (Ein) {
                if (!Sin) output.push(edge.intersect(S, E));
                output.push(E);
            } else if (Sin) {
                output.push(edge.intersect(S, E));
            }
            S = E;
        }
    }
    return output;
}

function deadAreaForPolygon(poly) {
    if (!metrosPorPixel || !poly || poly.length < 3) return 0;
    let totalPx = 0;
    for (const z of zonasMuertas) {
        const clipped = clipPolygonWithRect(poly, z);
        if (clipped.length >= 3) totalPx += polygonAreaPx(clipped);
    }
    return totalPx * metrosPorPixel * metrosPorPixel;
}

function roomStats(poly) {
    const total = polygonAreaM2(poly);
    const dead = deadAreaForPolygon(poly);
    return { total, dead, useful: Math.max(0, total - dead) };
}

function getSelectedRoomData() {
    if (seleccion.tipo === "estanciaActual" || seleccion.tipo === "puntoActual") return { nombre:"Estancia actual", puntos };
    if (seleccion.tipo === "estanciaGuardada" || seleccion.tipo === "puntoGuardado") return estancias[seleccion.estanciaIndex] || null;
    return null;
}

function drawSideMeasures(poly, closedPoly, colorText) {
    if (!metrosPorPixel || !poly || poly.length < 2) return;
    ctx.fillStyle = colorText;
    ctx.font = "12px Arial";
    const totalSides = closedPoly ? poly.length : poly.length - 1;
    for (let i = 0; i < totalSides; i++) {
        const j = (i + 1) % poly.length;
        const a = poly[i];
        const b = poly[j];
        const m = midpoint(a, b);
        const mm = dist(a, b) * metrosPorPixel;
        ctx.fillText(mm.toFixed(2) + " m", m.x + 6, m.y - 6);
    }
}

function drawRoom(poly, selected, fillColor, strokeColor) {
    ctx.beginPath();
    poly.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
    ctx.closePath();
    ctx.fillStyle = fillColor;
    ctx.fill();
    ctx.strokeStyle = strokeColor;
    ctx.lineWidth = selected ? 3 : 2;
    ctx.stroke();
}

function segPointDistance(px, py, ax, ay, bx, by) {
    const dx = bx - ax;
    const dy = by - ay;
    const len2 = dx*dx + dy*dy;
    if (len2 === 0) return { d:Math.hypot(px-ax, py-ay), t:0, qx:ax, qy:ay };
    let t = ((px-ax)*dx + (py-ay)*dy) / len2;
    t = Math.max(0, Math.min(1, t));
    const qx = ax + t*dx;
    const qy = ay + t*dy;
    return { d:Math.hypot(px-qx, py-qy), t, qx, qy };
}

function snapPoint(raw, ignoreRoomIdx = -999, ignorePointIdx = -999) {
    let best = { x: raw.x, y: raw.y, d: Infinity };

    function testPoint(p){
        const d = Math.hypot(raw.x - p.x, raw.y - p.y);
        if (d < best.d && d <= SNAP_DIST) best = { x:p.x, y:p.y, d };
    }

    function testSegment(a,b){
        const hit = segPointDistance(raw.x, raw.y, a.x, a.y, b.x, b.y);
        if (hit.d < best.d && hit.d <= SNAP_DIST) best = { x:hit.qx, y:hit.qy, d:hit.d };
    }

    if (cerrado && puntos.length >= 2) {
        for (let i = 0; i < puntos.length; i++) testPoint(puntos[i]);
    }

    for (let r = 0; r < estancias.length; r++) {
        const poly = estancias[r].puntos;
        for (let i = 0; i < poly.length; i++) {
            if (!(r === ignoreRoomIdx && i === ignorePointIdx)) testPoint(poly[i]);
        }
        for (let i = 0; i < poly.length; i++) {
            const j = (i + 1) % poly.length;
            testSegment(poly[i], poly[j]);
        }
    }

    return { x: best.x, y: best.y };
}

function drawTempZoneLabel(x, y, w, h) {
    if (w < 3 || h < 3) {
        tempLabel.style.display = "none";
        return;
    }
    let text = "Zona";
    if (metrosPorPixel) {
        const wm = (w * metrosPorPixel).toFixed(2);

        text = wm + " m × " + hm + " m · " + am2 + " m²";

    tempLabel.textContent = text;
    tempLabel.style.left = (x + w / 2) + "px";
    tempLabel.style.top = (y - 6) + "px";
    tempLabel.style.display = "block";
}

/* CIRCUITOS */
function getRoomBounds(poly){
    return {
        minX: Math.min(...poly.map(p => p.x)),
        maxX: Math.max(...poly.map(p => p.x)),
        minY: Math.min(...poly.map(p => p.y)),
        maxY: Math.max(...poly.map(p => p.y))
    };
}

function getCircuitSetting(idx){
    const saved = ajustesCircuitos[String(idx)] || {};
    return {
        modo: saved.modo || "auto",
        paso: typeof saved.paso === "number" ? saved.paso : 0.15,
        maxLong: typeof saved.maxLong === "number" ? saved.maxLong : 90,
        tipo: saved.tipo || "general",
        manualCircuitos: typeof saved.manualCircuitos === "number" ? saved.manualCircuitos : 1
    };
}

function saveCircuitSetting(idx, obj){
    ajustesCircuitos[String(idx)] = { ...getCircuitSetting(idx), ...obj };
}

function getAutoPasoPorTipo(tipo, areaUtil){
    if (tipo === "bano") return 0.10;
    if (tipo === "alta") return 0.10;
    if (tipo === "interior") return 0.15;
    if (areaUtil <= 8) return 0.10;
    if (areaUtil <= 22) return 0.15;
    return 0.15;
}

function estimateLength(areaUtil, paso){
    if (!paso || paso <= 0) return 0;
    return areaUtil / paso;
}

function buildWarnings(calc){
    const warnings = [];
    if (calc.paso <= 0.05 && calc.tipo !== "bano" && calc.tipo !== "alta") {
        warnings.push({ level:"mid", text:"Paso de 5 cm: úsalo solo donde haga falta." });
    }
    if (calc.paso >= 0.20 && calc.tipo !== "interior") {
        warnings.push({ level:"mid", text:"Paso de 20 cm: puede quedarse largo." });
    }
    if (calc.longitudPorCircuito > calc.maxLong) {
        warnings.push({ level:"bad", text:"La longitud por circuito supera el máximo." });
    }
    if (calc.longitudPorCircuito > 100) {
        warnings.push({ level:"bad", text:"Circuito muy largo." });
    }
    if (calc.longitudPorCircuito < 40) {
        warnings.push({ level:"mid", text:"Circuito corto." });
    }
    if (calc.numCircuitos > 6) {
        warnings.push({ level:"mid", text:"Muchos circuitos para una estancia." });
    }
    if (calc.areaUtil <= 0) {
        warnings.push({ level:"bad", text:"Superficie útil incorrecta." });
    }
    if (!warnings.length) warnings.push({ level:"ok", text:"Cálculo coherente con los datos actuales." });
    return warnings;
}

function calcularCircuitosParaEstancia(idx){
    const est = estancias[idx];
    if (!est || !est.puntos || est.puntos.length < 3) return null;

    const s = roomStats(est.puntos);
    const aj = getCircuitSetting(idx);

    let paso = aj.paso;
    if (aj.modo === "auto") paso = getAutoPasoPorTipo(aj.tipo, s.useful);

    const maxLong = aj.maxLong || 90;
    const longitudTotal = estimateLength(s.useful, paso);
    let numCircuitos = aj.modo === "manual"
        ? Math.max(1, Math.round(aj.manualCircuitos || 1))
        : Math.max(1, Math.ceil(longitudTotal / maxLong));

    const longitudPorCircuito = numCircuitos > 0 ? longitudTotal / numCircuitos : 0;

    const calc = {
        estancia: idx,
        nombre: est.nombre || "Estancia",
        areaTotal: s.total,
        areaMuerta: s.dead,
        areaUtil: s.useful,
        modo: aj.modo,
        tipo: aj.tipo,
        paso,
        maxLong,
        numCircuitos,
        longitudTotal,
        longitudPorCircuito
    };
    calc.warnings = buildWarnings(calc);
    return calc;
}

function recalcularCircuitosEstancia(idx){
    const calc = calcularCircuitosParaEstancia(idx);
    circuitos = circuitos.filter(c => c.estancia !== idx);

    if (!calc || calc.areaUtil <= 0) {
        guardarMemoria();
        dibujar();
        return;
    }

    for(let i = 0; i < calc.numCircuitos; i++){
        circuitos.push({
            estancia: idx,
            circuito: i + 1,
            paso: calc.paso,
            longitud: calc.longitudPorCircuito,
            modo: calc.modo,
            tipo: calc.tipo,
            maxLong: calc.maxLong
        });
    }
    guardarMemoria();
}

function recalcularTodoCircuitos(){
    if(!metrosPorPixel){
        alert("Define escala primero");
        return;
    }
    circuitos = [];
    for(let i = 0; i < estancias.length; i++) recalcularCircuitosEstancia(i);
    guardarMemoria();
    dibujar();
    autoCerrarPanel();
    alert("Circuitos recalculados");
}

function getSelectedSavedRoomIndex(){
    if (seleccion.tipo === "estanciaGuardada" || seleccion.tipo === "puntoGuardado") return seleccion.estanciaIndex;
    return -1;
}

function actualizarPanelCircuitos(){
    const idx = getSelectedSavedRoomIndex();
    if (idx < 0 || !estancias[idx]) {
        circuitRoomName.textContent = "Selecciona una estancia guardada";
        warnBox.innerHTML = '<div class="warn-mid">Selecciona una estancia para editar sus circuitos.</div>';
        return;
    }

    const est = estancias[idx];
    const aj = getCircuitSetting(idx);
    cfgModo.value = aj.modo;
    cfgPaso.value = String(aj.paso.toFixed(2));
    cfgMax.value = aj.maxLong;
    cfgTipo.value = aj.tipo;
    cfgCircuitos.value = aj.manualCircuitos;

    const calc = calcularCircuitosParaEstancia(idx);
    circuitRoomName.textContent = "Estancia: " + (est.nombre || "Sin nombre");

    let html = "";
    if (calc) {
        html += '<div class="warn-mid">Útil: ' + calc.areaUtil.toFixed(2) + ' m²</div>';
        html += '<div class="warn-mid">Paso: ' + (calc.paso * 100).toFixed(0) + ' cm</div>';
        html += '<div class="warn-mid">Circuitos: ' + calc.numCircuitos + '</div>';
        html += '<div class="warn-mid">Long./circuito: ' + calc.longitudPorCircuito.toFixed(1) + ' m</div>';
        html += '<hr style="border:none;border-top:1px solid #2b2b2b;margin:7px 0">';
        for (const w of calc.warnings) {
            if (w.level === "ok") html += '<div class="warn-ok">• ' + w.text + '</div>';
            else if (w.level === "bad") html += '<div class="warn-bad">• ' + w.text + '</div>';
            else html += '<div class="warn-mid">• ' + w.text + '</div>';
        }
    } else {
        html = '<div class="warn-bad">No se pudo calcular esta estancia.</div>';
    }
    warnBox.innerHTML = html;
}

function aplicarCircuitosEstancia(){
    const idx = getSelectedSavedRoomIndex();
    if (idx < 0 || !estancias[idx]) {
        alert("Selecciona una estancia guardada");
        return;
    }

    const modoVal = cfgModo.value;
    const pasoVal = parseFloat(cfgPaso.value);
    const maxVal = parseFloat(cfgMax.value);
    const tipoVal = cfgTipo.value;
    const manualVal = parseInt(cfgCircuitos.value, 10);

    if (!pasoVal || pasoVal <= 0) {
        alert("Paso no válido");
        return;
    }
    if (!maxVal || maxVal <= 0) {
        alert("Longitud máxima no válida");
        return;
    }
    if (!manualVal || manualVal <= 0) {
        alert("Número de circuitos manual no válido");
        return;
    }

    saveCircuitSetting(idx, {
        modo: modoVal,
        paso: pasoVal,
        maxLong: maxVal,
        tipo: tipoVal,
        manualCircuitos: manualVal
    });

    recalcularCircuitosEstancia(idx);
    actualizarPanelCircuitos();
    dibujar();
}

function subtractRectIntervals(left, right, y){
    let segments = [{a:left, b:right}];
    for (const z of zonasMuertas) {
        if (y < z.y || y > z.y + z.h) continue;
        const za = z.x;
        const zb = z.x + z.w;
        const next = [];
        for (const s of segments) {
            if (zb <= s.a || za >= s.b) next.push(s);
            else {
                if (za > s.a) next.push({a:s.a, b:Math.max(s.a, za)});
                if (zb < s.b) next.push({a:Math.min(s.b, zb), b:s.b});
            }
        }
        segments = next.filter(s => s.b - s.a > 4);
        if (!segments.length) break;
    }
    return segments;
}

function drawCircuitos(){
    if(!Array.isArray(circuitos) || !circuitos.length || !metrosPorPixel) return;

    ctx.save();
    ctx.strokeStyle = "#00d9ff";
    ctx.lineWidth = 1.8;

    estancias.forEach((est, idx)=>{
        const lista = circuitos.filter(c => c.estancia === idx);
        if(!lista.length) return;
        const p = est.puntos;
        if(!p || p.length < 3) return;

        const bounds = getRoomBounds(p);
        const ancho = bounds.maxX - bounds.minX;
        if (ancho < 10) return;

        const num = lista.length;
        const banda = ancho / num;

        for(let c = 0; c < num; c++){
            const x0 = bounds.minX + c * banda + 8;
            const x1 = bounds.minX + (c + 1) * banda - 8;
            if (x1 <= x0) continue;

            const pasoPx = Math.max(10, lista[c].paso / metrosPorPixel);
            let sentido = true;

            for(let y = bounds.minY + 8; y <= bounds.maxY - 8; y += pasoPx){
                const xs = lineIntersectionsHorizontal(y, p);
                if(xs.length < 2) continue;

                for(let k = 0; k < xs.length; k += 2){
                    const a = xs[k];
                    const b = xs[k + 1];
                    if (b === undefined) continue;

                    let left = Math.max(a, x0);
                    let right = Math.min(b, x1);
                    if (right <= left) continue;

                    const trozos = subtractRectIntervals(left, right, y);
                    for (const t of trozos) {
                        ctx.beginPath();
                        if (sentido) {
                            ctx.moveTo(t.a, y);
                            ctx.lineTo(t.b, y);
                        } else {
                            ctx.moveTo(t.b, y);
                            ctx.lineTo(t.a, y);
                        }
                        ctx.stroke();
                    }
                }
                sentido = !sentido;
            }

            const cxy = centroid(p);
            ctx.fillStyle = "#00d9ff";
            ctx.font = "11px Arial";
            ctx.fillText("C" + lista[c].circuito + " · " + lista[c].longitud.toFixed(0) + " m", cxy.x - 30, cxy.y + 40 + (c * 14));
        }
    });

    ctx.restore();
}

function drawCurrentRoom() {
    if (!puntos.length) return;
    const selected = seleccion.tipo === "estanciaActual" || seleccion.tipo === "puntoActual";

    ctx.beginPath();
    puntos.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));

    if (cerrado && puntos.length >= 3) {
        ctx.closePath();
        ctx.fillStyle = selected ? "rgba(255,255,255,.12)" : "rgba(255,255,255,.05)";
        ctx.fill();
    }

    ctx.strokeStyle = selected ? "#ffffff" : "#dddddd";
    ctx.lineWidth = selected ? 3 : 2;
    ctx.stroke();

    puntos.forEach((p, i) => {
        const sel = seleccion.tipo === "puntoActual" && seleccion.puntoIndex === i;
        ctx.beginPath();
        ctx.arc(p.x, p.y, sel ? 7 : 5, 0, Math.PI * 2);
        ctx.fillStyle = sel ? "#f39b2f" : "#ffffff";
        ctx.fill();

        ctx.fillStyle = "#fff";
        ctx.font = "12px Arial";
        ctx.fillText(String(i + 1), p.x + 8, p.y - 8);
    });

    drawSideMeasures(puntos, cerrado, "#fff");

    if (cerrado && metrosPorPixel) {
        const c = centroid(puntos);
        const stats = roomStats(puntos);
        ctx.fillStyle = "#fff";
        ctx.font = "16px Arial";
        ctx.fillText("actual", c.x - 18, c.y - 12);
        ctx.font = "13px Arial";
        ctx.fillText("Útil " + stats.useful.toFixed(2) + " m²", c.x - 22, c.y + 8);
        if (stats.dead > 0) ctx.fillText("Muerta " + stats.dead.toFixed(2) + " m²", c.x - 28, c.y + 24);
    }
}

function drawSavedRooms() {
    for (let i = 0; i < estancias.length; i++) {
        const est = estancias[i];
        if (!est.puntos || est.puntos.length < 3) continue;

        const selected =
            (seleccion.tipo === "estanciaGuardada" && seleccion.estanciaIndex === i) ||
            (seleccion.tipo === "puntoGuardado" && seleccion.estanciaIndex === i);

        drawRoom(
            est.puntos,
            selected,
            selected ? "rgba(255,255,255,.12)" : "rgba(243,155,47,.10)",
            selected ? "#ffffff" : "#f39b2f"
        );

        est.puntos.forEach((p, idx) => {
            const pointSelected = seleccion.tipo === "puntoGuardado" && seleccion.estanciaIndex === i && seleccion.puntoIndex === idx;
            ctx.beginPath();
            ctx.arc(p.x, p.y, pointSelected ? 7 : 5, 0, Math.PI * 2);
            ctx.fillStyle = pointSelected ? "#ffffff" : "#f39b2f";
            ctx.fill();
        });

        const c = centroid(est.puntos);
        const stats = roomStats(est.puntos);
        ctx.fillStyle = "#fff";
        ctx.font = "16px Arial";
        ctx.fillText(est.nombre || "Estancia", c.x - 24, c.y - 12);
        if (metrosPorPixel) {
            ctx.font = "13px Arial";
            ctx.fillText("Útil " + stats.useful.toFixed(2) + " m²", c.x - 24, c.y + 8);
            if (stats.dead > 0) ctx.fillText("Muerta " + stats.dead.toFixed(2) + " m²", c.x - 28, c.y + 24);
        }

        drawSideMeasures(est.puntos, true, "#fff");
    }
}

function drawZonaHandles(z) {
    ctx.save();
    ctx.fillStyle = "#fff";
    ctx.strokeStyle = "#000";
    ctx.lineWidth = 1;
    for (const h of getZonaHandles(z)) {
        ctx.beginPath();
        ctx.rect(h.x - HANDLE_SIZE / 2, h.y - HANDLE_SIZE / 2, HANDLE_SIZE, HANDLE_SIZE);
        ctx.fill();
        ctx.stroke();
    }
    ctx.restore();
}

function drawZones() {
    zonasMuertas.forEach((z, i) => {
        const selected = (seleccion.tipo === "zonaMuerta" || seleccion.tipo === "zonaHandle") && seleccion.zonaIndex === i;
        ctx.fillStyle = selected ? "rgba(255,0,0,.36)" : "rgba(255,0,0,.24)";
        ctx.fillRect(z.x, z.y, z.w, z.h);
        ctx.strokeStyle = selected ? "#fff" : "#ff4b3a";
        ctx.lineWidth = selected ? 3 : 2;
        ctx.strokeRect(z.x, z.y, z.w, z.h);

        ctx.fillStyle = "#fff";
        ctx.font = "12px Arial";
        if (metrosPorPixel) {
            ctx.fillText("Zona muerta " + (z.w * metrosPorPixel).toFixed(2) + "m x " + (z.h * metrosPorPixel).toFixed(2) + "m", z.x + 6, z.y + 16);
        } else {
            ctx.fillText("Zona muerta", z.x + 6, z.y + 16);
        }

        if (selected) {
            drawZonaHandles(z);
            drawZoneDistances(i);
        }
    });

    if (modo === "zona" && zonaTemp) {
        const x = Math.min(zonaTemp.x1, zonaTemp.x2);
        const y = Math.min(zonaTemp.y1, zonaTemp.y2);
        const w = Math.abs(zonaTemp.x2 - zonaTemp.x1);
        const h = Math.abs(zonaTemp.y2 - zonaTemp.y1);
        ctx.fillStyle = "rgba(255,255,0,.15)";
        ctx.fillRect(x, y, w, h);
        ctx.strokeStyle = "yellow";
        ctx.lineWidth = 2;
        ctx.strokeRect(x, y, w, h);

        if (metrosPorPixel) {
            ctx.fillStyle = "#fff";
            ctx.font = "12px Arial";
            ctx.fillText((w * metrosPorPixel).toFixed(2) + "m × " + (h * metrosPorPixel).toFixed(2) + "m", x + 6, y + h + 16);
        }
    }
}

function findNearestWall(x, y) {
    let best = null;

    function testPoly(poly, roomIndex, currentRoom) {
        if (!poly || poly.length < 2) return;
        for (let i = 0; i < poly.length; i++) {
            const j = (i + 1) % poly.length;
            const a = poly[i];
            const b = poly[j];
            const hit = segPointDistance(x, y, a.x, a.y, b.x, b.y);
            if (hit.d <= MAX_DIST_LINE) {
                if (!best || hit.d < best.d) {
                    best = {
                        d: hit.d,
                        t: hit.t,
                        x: hit.qx,
                        y: hit.qy,
                        roomIndex,
                        currentRoom,
                        sideIndex: i,
                        a: { x: a.x, y: a.y },
                        b: { x: b.x, y: b.y }
                    };
                }
            }
        }
    }

    if (cerrado && puntos.length >= 3) testPoly(puntos, -2, true);
    for (let i = 0; i < estancias.length; i++) testPoly(estancias[i].puntos, i, false);

    return best;
}

function aberturaWidthPx(widthM) {
    if (!metrosPorPixel) return 50;
    return widthM / metrosPorPixel;
}

function getAberturaSegment(ab) {
    const poly = estancias[ab.roomIndex]?.puntos;
    if (!poly || poly.length < 2) return null;
    const a = poly[ab.sideIndex];
    const b = poly[(ab.sideIndex + 1) % poly.length];
    return { a, b };
}

function aberturaVisual(ab) {
    const seg = getAberturaSegment(ab);
    if (!seg) return null;

    const ax = seg.a.x, ay = seg.a.y;
    const bx = seg.b.x, by = seg.b.y;
    const dx = bx - ax;
    const dy = by - ay;
    const segLen = Math.hypot(dx, dy);
    if (!segLen) return null;

    const ux = dx / segLen;
    const uy = dy / segLen;
    const nx = -uy;
    const ny = ux;

    const widthPx = Math.min(segLen - 12, aberturaWidthPx(ab.widthM));
    const centerX = ax + dx * ab.t;
    const centerY = ay + dy * ab.t;

    const half = widthPx / 2;
    const p1 = { x: centerX - ux * half, y: centerY - uy * half };
    const p2 = { x: centerX + ux * half, y: centerY + uy * half };

    const leftM = metrosPorPixel ? dist(seg.a, p1) * metrosPorPixel : 0;
    const rightM = metrosPorPixel ? dist(p2, seg.b) * metrosPorPixel : 0;

    return { p1, p2, centerX, centerY, ux, uy, nx, ny, leftM, rightM, segA: seg.a, segB: seg.b };
}

function hitAbertura(x, y) {
    for (let i = aberturas.length - 1; i >= 0; i--) {
        const v = aberturaVisual(aberturas[i]);
        if (!v) continue;
        const d = segPointDistance(x, y, v.p1.x, v.p1.y, v.p2.x, v.p2.y);
        if (d.d <= 10) return i;
    }
    return -1;
}

function moveAberturaAlongWall(ab, x, y) {
    const seg = getAberturaSegment(ab);
    if (!seg) return;
    const hit = segPointDistance(x, y, seg.a.x, seg.a.y, seg.b.x, seg.b.y);
    const segLenPx = dist(seg.a, seg.b);
    const widthPx = aberturaWidthPx(ab.widthM);
    const halfT = (widthPx / 2) / segLenPx;
    ab.t = Math.max(halfT, Math.min(1 - halfT, hit.t));
}

function drawAberturaDistances(v) {
    if (!metrosPorPixel) return;
    drawMeasureLine(v.segA.x, v.segA.y, v.p1.x, v.p1.y, v.leftM.toFixed(2) + " m");
    drawMeasureLine(v.p2.x, v.p2.y, v.segB.x, v.segB.y, v.rightM.toFixed(2) + " m");
}

function drawAberturas() {
    aberturas.forEach((ab, i) => {
        const v = aberturaVisual(ab);
        if (!v) return;

        const selected = seleccion.tipo === "abertura" && seleccion.aberturaIndex === i;

        ctx.save();
        ctx.lineWidth = selected ? 5 : 4;
        ctx.strokeStyle = ab.tipo === "puerta" ? "#7dd3ff" : "#7dff9b";
        ctx.beginPath();
        ctx.moveTo(v.p1.x, v.p1.y);
        ctx.lineTo(v.p2.x, v.p2.y);
        ctx.stroke();

        ctx.fillStyle = "#fff";
        ctx.font = "12px Arial";
        ctx.fillText((ab.tipo === "puerta" ? "Puerta " : "Ventana ") + ab.widthM.toFixed(2) + " m", v.centerX + v.nx * 16, v.centerY + v.ny * 16);

        if (selected) {
            ctx.beginPath();
            ctx.arc(v.centerX, v.centerY, 6, 0, Math.PI * 2);
            ctx.fillStyle = "#fff";
            ctx.fill();
            drawAberturaDistances(v);
        }
        ctx.restore();
    });
}

function updateInfo() {
    let html = "";

    if (seleccion.tipo === "zonaMuerta" || seleccion.tipo === "zonaHandle") {
        const z = zonasMuertas[seleccion.zonaIndex];
        if (z) {
            html += "Zona muerta seleccionada";
            if (metrosPorPixel) {
                html += "<br>Ancho: " + (z.w * metrosPorPixel).toFixed(2) + " m";
                html += "<br>Alto: " + (z.h * metrosPorPixel).toFixed(2) + " m";
                html += "<br>Superficie: " + ((z.w * metrosPorPixel) * (z.h * metrosPorPixel)).toFixed(2) + " m²";
            }
            const cont = getContainerIndexForZone(z);
            if (cont === -2) html += "<br>Dentro de: estancia actual";
            else if (cont !== null && estancias[cont]) html += "<br>Dentro de: " + (estancias[cont].nombre || "Estancia");
            else html += "<br>Dentro de: fuera de estancia";
            info.innerHTML = html;
            actualizarUI();
            return;
        }
    }

    if (seleccion.tipo === "abertura") {
        const ab = aberturas[seleccion.aberturaIndex];
        if (ab) {
            const v = aberturaVisual(ab);
            html += (ab.tipo === "puerta" ? "Puerta" : "Ventana") + " seleccionada";
            html += "<br>Ancho: " + ab.widthM.toFixed(2) + " m";
            if (v && metrosPorPixel) {
                html += "<br>Izquierda: " + v.leftM.toFixed(2) + " m";
                html += "<br>Derecha: " + v.rightM.toFixed(2) + " m";
            }
            if (estancias[ab.roomIndex]) html += "<br>En: " + (estancias[ab.roomIndex].nombre || "Estancia");
            info.innerHTML = html;
            actualizarUI();
            return;
        }
    }

    const estSel = getSelectedRoomData();
    if (estSel && estSel.puntos && estSel.puntos.length >= 3) {
        const idx = getSelectedSavedRoomIndex();
        const stats = roomStats(estSel.puntos);
        html += "Datos de la estancia seleccionada";
        html += "<br>Nombre: " + (estSel.nombre || "Sin nombre");
        html += "<br>Lados: " + estSel.puntos.length;
        if (metrosPorPixel) {
            html += "<br>Superficie total: " + stats.total.toFixed(2) + " m²";
            html += "<br>Superficie muerta: " + stats.dead.toFixed(2) + " m²";
            html += "<br>Superficie útil: " + stats.useful.toFixed(2) + " m²";
        }
        if (idx >= 0) {
            const calc = calcularCircuitosParaEstancia(idx);
            if (calc) {
                html += "<br>Paso: " + (calc.paso * 100).toFixed(0) + " cm";
                html += "<br>Circuitos: " + calc.numCircuitos;
                html += "<br>Longitud por circuito: " + calc.longitudPorCircuito.toFixed(1) + " m";
            }
        }
        info.innerHTML = html;
        actualizarUI();
        return;
    }

    let total = 0, dead = 0, useful = 0;
    for (const est of estancias) {
        const s = roomStats(est.puntos);
        total += s.total;
        dead += s.dead;
        useful += s.useful;
    }

    html += "Resumen del plano";
    html += "<br>Estancias guardadas: " + estancias.length;
    html += "<br>Escala: " + (metrosPorPixel ? "definida" : "sin definir");
    if (metrosPorPixel) {
        html += "<br>Superficie total: " + total.toFixed(2) + " m²";
        html += "<br>Superficie útil: " + useful.toFixed(2) + " m²";
        html += "<br>Superficie muerta: " + dead.toFixed(2) + " m²";
    }
    html += "<br>Zonas muertas: " + zonasMuertas.length;
    html += "<br>Puertas: " + aberturas.filter(a => a.tipo === "puerta").length;
    html += "<br>Ventanas: " + aberturas.filter(a => a.tipo === "ventana").length;
    html += "<br>Circuitos: " + circuitos.length;

    if (puntos.length > 0) html += "<br>Estancia actual: " + (cerrado ? "cerrada" : "abierta");

    info.innerHTML = html;
    actualizarUI();
}

function dibujar() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawSavedRooms();
    drawCurrentRoom();
    drawZones();
    drawAberturas();
    drawCircuitos();
    updateInfo();
}

function nuevaEstancia() {
    puntos = [];
    cerrado = false;
    enEdicionNuevaEstancia = true;
    aberturas = aberturas.filter(a => a && a.currentRoom !== true);
    cancelarModo();
    limpiarSeleccion();
    dibujar();
    autoCerrarPanel();
}

function cerrarEstancia() {
    if (!enEdicionNuevaEstancia) {
        alert("Primero pulsa Nueva");
        return;
    }
    if (puntos.length < 3) {
        alert("Necesitas al menos 3 puntos");
        return;
    }
    cerrado = true;
    cancelarModo();
    limpiarSeleccion();
    dibujar();
    autoCerrarPanel();
}

function guardarEstancia() {
    if (!enEdicionNuevaEstancia) {
        alert("Primero pulsa Nueva");
        return;
    }
    if (!cerrado || puntos.length < 3) {
        alert("Primero cierra la estancia");
        return;
    }

    const nombre = prompt("Nombre estancia:");
    if (!nombre || !nombre.trim()) return;

    estancias.push({
        nombre: nombre.trim(),
        puntos: JSON.parse(JSON.stringify(puntos))
    });

    const nuevoIdx = estancias.length - 1;
    if (!ajustesCircuitos[String(nuevoIdx)]) {
        ajustesCircuitos[String(nuevoIdx)] = {
            modo: "auto",
            paso: 0.15,
            maxLong: 90,
            tipo: "general",
            manualCircuitos: 1
        };
    }

    guardarMemoria();
    puntos = [];
    cerrado = false;
    enEdicionNuevaEstancia = false;
    cancelarModo();
    limpiarSeleccion();
    dibujar();
    autoCerrarPanel();
}

function definirEscala() {
    const ref = puntos.length >= 2 ? puntos : (estancias[0]?.puntos || null);
    if (!ref || ref.length < 2) {
        alert("Necesitas una estancia con al menos 2 puntos");
        return;
    }

    const valor = prompt("Introduce la medida real entre punto 1 y punto 2, en metros:");
    if (!valor) return;

    const metros = parseFloat(String(valor).replace(",", "."));
    if (!metros || metros <= 0) {
        alert("Medida no válida");
        return;
    }

    const px = dist(ref[0], ref[1]);
    if (!px || px <= 0) {
        alert("No se pudo calcular la escala");
        return;
    }

    metrosPorPixel = metros / px;
    guardarMemoria();
    dibujar();
    autoCerrarPanel();
    alert("Escala guardada");
}

function guardarPlano() {
    guardarMemoria();
    autoCerrarPanel();
    alert("Plano guardado");
}

function editarMedidaLado() {
    const idx = getSelectedSavedRoomIndex();
    if (idx < 0) {
        alert("Selecciona una estancia guardada");
        return;
    }
    if (!metrosPorPixel) {
        alert("Define escala primero");
        return;
    }

    const poly = estancias[idx].puntos;
    const total = poly.length;
    const ladoTxt = prompt("Número de lado a corregir (1 a " + total + "):");
    if (!ladoTxt) return;
    const lado = parseInt(ladoTxt, 10) - 1;
    if (!Number.isInteger(lado) || lado < 0 || lado >= total) {
        alert("Lado no válido");
        return;
    }

    const j = (lado + 1) % total;
    const actualM = dist(poly[lado], poly[j]) * metrosPorPixel;
    const valor = prompt("Medida real en metros del lado " + (lado + 1) + ":", actualM.toFixed(2));
    if (!valor) return;
    const nuevoM = parseFloat(String(valor).replace(",", "."));
    if (!nuevoM || nuevoM <= 0) {
        alert("Medida no válida");
        return;
    }

    const actualPx = dist(poly[lado], poly[j]);
    const nuevoPx = nuevoM / metrosPorPixel;
    const ratio = nuevoPx / actualPx;
    const dx = (poly[j].x - poly[lado].x) * ratio;
    const dy = (poly[j].y - poly[lado].y) * ratio;

    poly[j].x = poly[lado].x + dx;
    poly[j].y = poly[lado].y + dy;

    recalcularCircuitosEstancia(idx);
    guardarMemoria();
    dibujar();
}

function editarElementoSeleccionado() {
    if (!metrosPorPixel) {
        alert("Define escala primero");
        return;
    }

    if (seleccion.tipo === "zonaMuerta" || seleccion.tipo === "zonaHandle") {
        const z = zonasMuertas[seleccion.zonaIndex];
        if (!z) return;

        const an = prompt("Ancho en metros:", (z.w * metrosPorPixel).toFixed(2));
        if (!an) return;
        const al = prompt("Alto en metros:", (z.h * metrosPorPixel).toFixed(2));
        if (!al) return;

        const anM = parseFloat(String(an).replace(",", "."));
        const alM = parseFloat(String(al).replace(",", "."));
        if (!anM || anM <= 0 || !alM || alM <= 0) {
            alert("Medidas no válidas");
            return;
        }

        z.w = anM / metrosPorPixel;
        z.h = alM / metrosPorPixel;

        for (let i = 0; i < estancias.length; i++) recalcularCircuitosEstancia(i);
        guardarMemoria();
        dibujar();
        return;
    }

    if (seleccion.tipo === "abertura") {
        const ab = aberturas[seleccion.aberturaIndex];
        if (!ab) return;

        const an = prompt("Ancho en metros:", ab.widthM.toFixed(2));
        if (!an) return;
        const nuevo = parseFloat(String(an).replace(",", "."));
        if (!nuevo || nuevo <= 0) {
            alert("Medida no válida");
            return;
        }
        ab.widthM = nuevo;
        guardarMemoria();
        dibujar();
        return;
    }

    alert("Selecciona una zona muerta, puerta o ventana");
}

function verificarDiagonales() {
    const idx = getSelectedSavedRoomIndex();
    if (idx < 0) {
        alert("Selecciona una estancia guardada");
        return;
    }
    if (!metrosPorPixel) {
        alert("Define escala primero");
        return;
    }

    const poly = estancias[idx].puntos;
    if (poly.length < 4) {
        alert("Esta estancia no necesita verificación por diagonales");
        return;
    }

    const diagonales = [];
    for (let i = 0; i < poly.length; i++) {
        for (let j = i + 1; j < poly.length; j++) {
            const adyacentes = j === i + 1 || (i === 0 && j === poly.length - 1);
            if (!adyacentes) diagonales.push([i, j]);
        }
    }

    let informe = [];
    for (const [i, j] of diagonales) {
        const calculada = dist(poly[i], poly[j]) * metrosPorPixel;
        const valor = prompt("Diagonal " + (i + 1) + "-" + (j + 1) + " en metros. Calculada: " + calculada.toFixed(2), calculada.toFixed(2));
        if (valor === null) continue;
        const real = parseFloat(String(valor).replace(",", "."));
        if (!real || real <= 0) continue;
        const dif = Math.abs(real - calculada);
        informe.push("Diagonal " + (i + 1) + "-" + (j + 1) + ": diferencia " + dif.toFixed(2) + " m");
    }

    if (!informe.length) {
        alert("Verificación cancelada");
        return;
    }

    alert(informe.join("\n"));
}

function eliminarSeleccionado() {
    if (seleccion.tipo === "zonaMuerta" || seleccion.tipo === "zonaHandle") {
        const idx = Number(seleccion.zonaIndex);
        if (idx >= 0 && idx < zonasMuertas.length) {
            if (confirm("Eliminar zona muerta seleccionada?")) {
                zonasMuertas.splice(idx, 1);
                for (let i = 0; i < estancias.length; i++) recalcularCircuitosEstancia(i);
                guardarMemoria();
                limpiarSeleccion();
                dibujar();
            }
        }
        return;
    }

    if (seleccion.tipo === "abertura") {
        const idx = Number(seleccion.aberturaIndex);
        if (idx >= 0 && idx < aberturas.length) {
            if (confirm("Eliminar elemento seleccionado?")) {
                aberturas.splice(idx, 1);
                guardarMemoria();
                limpiarSeleccion();
                dibujar();
            }
        }
        return;
    }

    if (seleccion.tipo === "estanciaGuardada" || seleccion.tipo === "puntoGuardado") {
        const idx = Number(seleccion.estanciaIndex);
        if (idx >= 0 && idx < estancias.length) {
            if (confirm("Eliminar estancia guardada?")) {
                estancias.splice(idx, 1);
                aberturas = aberturas
                    .filter(a => a.roomIndex !== idx)
                    .map(a => {
                        if (a.roomIndex > idx) a.roomIndex -= 1;
                        return a;
                    });

                const nuevosAjustes = {};
                Object.keys(ajustesCircuitos).forEach(k => {
                    const n = Number(k);
                    if (n < idx) nuevosAjustes[String(n)] = ajustesCircuitos[k];
                    if (n > idx) nuevosAjustes[String(n - 1)] = ajustesCircuitos[k];
                });
                ajustesCircuitos = nuevosAjustes;

                circuitos = [];
                for (let i = 0; i < estancias.length; i++) recalcularCircuitosEstancia(i);

                guardarMemoria();
                limpiarSeleccion();
                dibujar();
            }
        }
        return;
    }

    if (seleccion.tipo === "estanciaActual" || seleccion.tipo === "puntoActual") {
        if (confirm("Eliminar estancia actual?")) {
            puntos = [];
            cerrado = false;
            enEdicionNuevaEstancia = false;
            cancelarModo();
            guardarMemoria();
            limpiarSeleccion();
            dibujar();
        }
        return;
    }

    alert("Primero selecciona algo");
}

function moveZona(z, dx, dy) {
    z.x += dx;
    z.y += dy;
}

function resizeZona(z, handle, pos) {
    let left = z.x;
    let top = z.y;
    let right = z.x + z.w;
    let bottom = z.y + z.h;

    if (handle === "nw") { left = pos.x; top = pos.y; }
    else if (handle === "ne") { right = pos.x; top = pos.y; }
    else if (handle === "se") { right = pos.x; bottom = pos.y; }
    else if (handle === "sw") { left = pos.x; bottom = pos.y; }

    if (right - left < MIN_ZONA) {
        if (handle === "nw" || handle === "sw") left = right - MIN_ZONA;
        else right = left + MIN_ZONA;
    }
    if (bottom - top < MIN_ZONA) {
        if (handle === "nw" || handle === "ne") top = bottom - MIN_ZONA;
        else bottom = top + MIN_ZONA;
    }

    z.x = Math.min(left, right);
    z.y = Math.min(top, bottom);
    z.w = Math.abs(right - left);
    z.h = Math.abs(bottom - top);
}

function onStart(ev) {
    const raw = getPos(ev);
    const pos = snapPoint(raw);
    ultimoX = pos.x;
    ultimoY = pos.y;

    if (modo === "zona") {
        zonaTemp = { x1: pos.x, y1: pos.y, x2: pos.x, y2: pos.y };
        arrastrando = true;
        dibujar();
        if (ev.cancelable) ev.preventDefault();
        return;
    }

    if (modo === "puerta" || modo === "ventana") {
        const wall = findNearestWall(pos.x, pos.y);
        if (!wall) {
            alert("Toca un lado de la estancia");
            return;
        }
        crearAbertura(modo, wall);
        if (ev.cancelable) ev.preventDefault();
        return;
    }

    for (let i = zonasMuertas.length - 1; i >= 0; i--) {
        const h = findZonaHandle(zonasMuertas[i], pos.x, pos.y);
        if (h) {
            limpiarSeleccion();
            seleccion.tipo = "zonaHandle";
            seleccion.zonaIndex = i;
            seleccion.handle = h;
            arrastrando = true;
            dibujar();
            if (ev.cancelable) ev.preventDefault();
            return;
        }
    }

    const abIdx = hitAbertura(pos.x, pos.y);
    if (abIdx >= 0) {
        limpiarSeleccion();
        seleccion.tipo = "abertura";
        seleccion.aberturaIndex = abIdx;
        arrastrando = true;
        dibujar();
        if (ev.cancelable) ev.preventDefault();
        return;
    }

    for (let i = zonasMuertas.length - 1; i >= 0; i--) {
        if (pointInRect(pos.x, pos.y, zonasMuertas[i])) {
            limpiarSeleccion();
            seleccion.tipo = "zonaMuerta";
            seleccion.zonaIndex = i;
            arrastrando = true;
            dibujar();
            if (ev.cancelable) ev.preventDefault();
            return;
        }
    }

    let idx = findPoint(puntos, pos.x, pos.y);
    if (idx >= 0) {
        limpiarSeleccion();
        seleccion.tipo = "puntoActual";
        seleccion.puntoIndex = idx;
        arrastrando = true;
        dibujar();
        if (ev.cancelable) ev.preventDefault();
        return;
    }

    for (let i = estancias.length - 1; i >= 0; i--) {
        idx = findPoint(estancias[i].puntos, pos.x, pos.y);
        if (idx >= 0) {
            limpiarSeleccion();
            seleccion.tipo = "puntoGuardado";
            seleccion.estanciaIndex = i;
            seleccion.puntoIndex = idx;
            arrastrando = true;
            dibujar();
            if (ev.cancelable) ev.preventDefault();
            return;
        }
    }

    if (cerrado && puntos.length >= 3 && pointInPolygon(pos.x, pos.y, puntos)) {
        limpiarSeleccion();
        seleccion.tipo = "estanciaActual";
        arrastrando = true;
        dibujar();
        if (ev.cancelable) ev.preventDefault();
        return;
    }

    for (let i = estancias.length - 1; i >= 0; i--) {
        if (pointInPolygon(pos.x, pos.y, estancias[i].puntos)) {
            limpiarSeleccion();
            seleccion.tipo = "estanciaGuardada";
            seleccion.estanciaIndex = i;
            arrastrando = true;
            actualizarUI();
            dibujar();
            if (ev.cancelable) ev.preventDefault();
            return;
        }
    }

    if (enEdicionNuevaEstancia && !cerrado) {
        limpiarSeleccion();
        const snapped = snapPoint(pos);
        puntos.push({ x: snapped.x, y: snapped.y });
        seleccion.tipo = "puntoActual";
        seleccion.puntoIndex = puntos.length - 1;
        dibujar();
        if (ev.cancelable) ev.preventDefault();
        return;
    }

    limpiarSeleccion();
    dibujar();
}

function onMove(ev) {
    const raw = getPos(ev);
    const pos = snapPoint(raw);

    if (modo === "zona" && arrastrando && zonaTemp) {
        zonaTemp.x2 = pos.x;
        zonaTemp.y2 = pos.y;
        const x = Math.min(zonaTemp.x1, zonaTemp.x2);
        const y = Math.min(zonaTemp.y1, zonaTemp.y2);
        const w = Math.abs(zonaTemp.x2 - zonaTemp.x1);
        const h = Math.abs(zonaTemp.y2 - zonaTemp.y1);
        drawTempZoneLabel(x, y, w, h);
        dibujar();
        if (ev.cancelable) ev.preventDefault();
        return;
    }

    if (!arrastrando || !seleccion.tipo) return;

    const dx = pos.x - ultimoX;
    const dy = pos.y - ultimoY;

    if (seleccion.tipo === "zonaMuerta") {
        moveZona(zonasMuertas[seleccion.zonaIndex], dx, dy);
        for (let i = 0; i < estancias.length; i++) recalcularCircuitosEstancia(i);
        guardarMemoria();
    } else if (seleccion.tipo === "zonaHandle") {
        resizeZona(zonasMuertas[seleccion.zonaIndex], seleccion.handle, pos);
        for (let i = 0; i < estancias.length; i++) recalcularCircuitosEstancia(i);
        guardarMemoria();
    } else if (seleccion.tipo === "abertura") {
        moveAberturaAlongWall(aberturas[seleccion.aberturaIndex], pos.x, pos.y);
        guardarMemoria();
    } else if (seleccion.tipo === "puntoActual") {
        const snapped = snapPoint(pos);
        puntos[seleccion.puntoIndex].x = snapped.x;
        puntos[seleccion.puntoIndex].y = snapped.y;
    } else if (seleccion.tipo === "puntoGuardado") {
        const est = estancias[seleccion.estanciaIndex];
        const snapped = snapPoint(pos, seleccion.estanciaIndex, seleccion.puntoIndex);
        est.puntos[seleccion.puntoIndex].x = snapped.x;
        est.puntos[seleccion.puntoIndex].y = snapped.y;
        recalcularCircuitosEstancia(seleccion.estanciaIndex);
        guardarMemoria();
    } else if (seleccion.tipo === "estanciaActual") {
        for (const p of puntos) { p.x += dx; p.y += dy; }
    } else if (seleccion.tipo === "estanciaGuardada") {
        const est = estancias[seleccion.estanciaIndex];
        for (const p of est.puntos) { p.x += dx; p.y += dy; }
        recalcularCircuitosEstancia(seleccion.estanciaIndex);
        guardarMemoria();
    }

    ultimoX = pos.x;
    ultimoY = pos.y;
    dibujar();
    if (ev.cancelable) ev.preventDefault();
}

function onEnd(ev) {
    if (modo === "zona" && arrastrando && zonaTemp) {
        const x = Math.min(zonaTemp.x1, zonaTemp.x2);
        const y = Math.min(zonaTemp.y1, zonaTemp.y2);
        const w = Math.abs(zonaTemp.x2 - zonaTemp.x1);
        const h = Math.abs(zonaTemp.y2 - zonaTemp.y1);

        tempLabel.style.display = "none";

        if (w > 3 && h > 3) {
            zonasMuertas.push({ x, y, w, h });
            for (let i = 0; i < estancias.length; i++) recalcularCircuitosEstancia(i);
            guardarMemoria();
            limpiarSeleccion();
            seleccion.tipo = "zonaMuerta";
            seleccion.zonaIndex = zonasMuertas.length - 1;
        }

        zonaTemp = null;
        modo = null;
        arrastrando = false;
        actualizarUI();
        dibujar();
        if (ev && ev.cancelable) ev.preventDefault();
        return;
    }

    tempLabel.style.display = "none";

    if (!arrastrando) return;
    arrastrando = false;

    if (
        seleccion.tipo === "zonaMuerta" ||
        seleccion.tipo === "zonaHandle" ||
        seleccion.tipo === "abertura" ||
        seleccion.tipo === "puntoGuardado" ||
        seleccion.tipo === "estanciaGuardada"
    ) {
        guardarMemoria();
    }

    if (ev && ev.cancelable) ev.preventDefault();
}

function crearAbertura(tipo, wall) {
    if (wall.currentRoom) {
        alert("Primero guarda la estancia");
        return;
    }

    const valor = prompt("Ancho en metros:", tipo === "puerta" ? "0.82" : "1.20");
    if (!valor) return;
    const widthM = parseFloat(String(valor).replace(",", "."));
    if (!widthM || widthM < MIN_ABERTURA_M) {
        alert("Ancho no válido");
        return;
    }

    const segLenPx = dist(wall.a, wall.b);
    const lenM = metrosPorPixel ? segLenPx * metrosPorPixel : 999999;
    if (widthM >= lenM) {
        alert("El ancho es mayor que el lado");
        return;
    }

    aberturas.push({
        tipo,
        roomIndex: wall.roomIndex,
        currentRoom: false,
        sideIndex: wall.sideIndex,
        t: wall.t,
        widthM
    });

    guardarMemoria();
    limpiarSeleccion();
    seleccion.tipo = "abertura";
    seleccion.aberturaIndex = aberturas.length - 1;
    cancelarModo();
    dibujar();
}

cfgModo.addEventListener("change", actualizarPanelCircuitos);
cfgPaso.addEventListener("change", actualizarPanelCircuitos);
cfgMax.addEventListener("input", actualizarPanelCircuitos);
cfgTipo.addEventListener("change", actualizarPanelCircuitos);
cfgCircuitos.addEventListener("input", actualizarPanelCircuitos);

canvas.addEventListener("mousedown", onStart);
canvas.addEventListener("mousemove", onMove);
canvas.addEventListener("mouseup", onEnd);
canvas.addEventListener("mouseleave", onEnd);

canvas.addEventListener("touchstart", onStart, { passive:false });
canvas.addEventListener("touchmove", onMove, { passive:false });
canvas.addEventListener("touchend", onEnd, { passive:false });
canvas.addEventListener("touchcancel", onEnd, { passive:false });

window.addEventListener("keydown", (e) => {
    if (e.key === "Escape") {
        cancelarModo();
        dibujar();
    }
    if (e.key === "Delete" || e.key === "Backspace") {
        const tag = document.activeElement ? document.activeElement.tagName : "";
        if (tag !== "INPUT" && tag !== "TEXTAREA" && tag !== "SELECT") {
            if (seleccion.tipo) eliminarSeleccionado();
        }
    }
});

requestAnimationFrame(() => {
    ajustarCanvas();
    actualizarUI();
    dibujar();
});
</script>
</body>
