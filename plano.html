<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plano</title>

<style>
body {
    margin: 0;
    background: #0b0b0b;
    color: white;
    font-family: Arial, sans-serif;
}

/* HEADER */
.header {
    padding: 12px 15px;
    border-bottom: 2px solid orange;
    font-size: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.header-btn {
    background: orange;
    border: none;
    color: #111;
    font-weight: bold;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 15px;
    cursor: pointer;
}

/* CONTENIDO */
.wrap {
    padding: 10px;
    position: relative;
}

.info {
    padding: 10px;
    background: #141414;
    border: 1px solid #2a2a2a;
    margin-bottom: 10px;
    border-radius: 8px;
    font-size: 14px;
}

/* PANEL LATERAL */
.tools {
    position: absolute;
    top: 60px;
    right: 10px;
    width: 260px;
    max-height: 75vh;
    overflow-y: auto;
    background: #141414;
    border: 1px solid #2a2a2a;
    border-radius: 10px;
    padding: 10px;
    display: none;
    z-index: 10;
}

.tools.abierto {
    display: block;
}

/* CANVAS */
canvas {
    background: #111;
    border: 1px solid #333;
    display: block;
    width: 100%;
    touch-action: none;
}

/* BOTONES */
.btn {
    width: 100%;
    padding: 12px;
    background: orange;
    border: none;
    margin-top: 8px;
    font-size: 15px;
    cursor: pointer;
    color: #111;
    font-weight: bold;
    border-radius: 8px;
}

.btn-sec { background: #d6a13b; }
.btn-danger { background: #c93b2f; color: white; }

.subtitulo {
    margin-top: 6px;
    margin-bottom: 6px;
    font-size: 13px;
    color: orange;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="header">
    <button class="header-btn" onclick="volver()">Volver</button>
    <div>Plano</div>
    <button class="header-btn" onclick="toggleTools()">Herramientas</button>
</div>

<div class="wrap">

    <div class="info" id="info"></div>

    <div class="tools" id="tools">
        <div class="subtitulo">Plano</div>
        <button class="btn" onclick="nuevaEstancia()">Nueva estancia</button>
        <button class="btn" onclick="cerrarEstancia()">Cerrar estancia</button>
        <button class="btn" onclick="guardarEstancia()">Guardar estancia</button>
        <button class="btn btn-sec" onclick="borrarUltimoPunto()">Borrar último punto</button>
        <button class="btn btn-sec" onclick="definirEscala()">Definir escala</button>
        <button class="btn btn-danger" onclick="eliminarEstanciaSeleccionada()">Eliminar estancia</button>
        <button class="btn btn-sec" onclick="limpiarActual()">Limpiar actual</button>
        <button class="btn" onclick="guardarPlano()">Guardar plano</button>
    </div>

    <canvas id="canvas"></canvas>

</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const info = document.getElementById("info");
const tools = document.getElementById("tools");

function toggleTools(){
    tools.classList.toggle("abierto");
}

function ajustarCanvas(){
    canvas.width = window.innerWidth - 20;
    canvas.height = window.innerHeight - 160;
}
ajustarCanvas();

/* DATOS */
let clienteId = localStorage.getItem("clienteActivo");
let obraId = localStorage.getItem("obraActiva");

let obras = JSON.parse(localStorage.getItem("obras_" + clienteId)) || [];
let obra = obras.find(o => o.id == obraId);

if(!obra.plano){
    obra.plano = { estancias:[], metrosPorPixel:null };
}

let estancias = obra.plano.estancias;
let metrosPorPixel = obra.plano.metrosPorPixel;

let puntos = [];
let cerrado = false;

let seleccion = { tipo:null, estanciaIndex:-1, puntoIndex:-1 };

let arrastrando = false;
let ultimoX=0, ultimoY=0;

const RADIO = 14;

/* UTIL */
function guardar(){
    localStorage.setItem("obras_"+clienteId,JSON.stringify(obras));
}

function pos(e){
    const r = canvas.getBoundingClientRect();
    if(e.touches){
        return {x:e.touches[0].clientX-r.left,y:e.touches[0].clientY-r.top};
    }
    return {x:e.clientX-r.left,y:e.clientY-r.top};
}

function distancia(a,b){
    return Math.hypot(b.x-a.x,b.y-a.y);
}

function dentro(x,y,poly){
    let d=false;
    for(let i=0,j=poly.length-1;i<poly.length;j=i++){
        let xi=poly[i].x, yi=poly[i].y;
        let xj=poly[j].x, yj=poly[j].y;
        let c=((yi>y)!=(yj>y))&&(x<(xj-xi)*(y-yi)/(yj-yi||1)+xi);
        if(c)d=!d;
    }
    return d;
}

/* DIBUJO */
function dibujar(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    estancias.forEach((e,i)=>{
        ctx.beginPath();
        e.puntos.forEach((p,j)=> j?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y));
        ctx.closePath();
        ctx.strokeStyle="orange";
        ctx.stroke();
    });

    if(puntos.length){
        ctx.beginPath();
        puntos.forEach((p,i)=> i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y));
        if(cerrado)ctx.closePath();
        ctx.strokeStyle="white";
        ctx.stroke();
    }

    actualizarInfo();
}

function actualizarInfo(){
    if(seleccion.tipo && seleccion.estanciaIndex>=0){
        let e=estancias[seleccion.estanciaIndex];
        info.innerHTML="Estancia: "+e.nombre+"<br>Lados: "+e.puntos.length;
    }else{
        info.innerHTML="Estancias: "+estancias.length;
    }
}

/* ACCIONES */
function nuevaEstancia(){
    puntos=[];cerrado=false;seleccion.tipo=null;dibujar();
}

function cerrarEstancia(){
    if(puntos.length<3)return alert("mínimo 3 puntos");
    cerrado=true;dibujar();
}

function guardarEstancia(){
    if(!cerrado)return;
    let n=prompt("Nombre");
    if(!n)return;
    estancias.push({nombre:n,puntos:[...puntos]});
    puntos=[];cerrado=false;
    guardar();dibujar();
}

function eliminarEstanciaSeleccionada(){
    if(seleccion.estanciaIndex<0)return alert("Selecciona una estancia");
    if(!confirm("Eliminar?"))return;
    estancias.splice(seleccion.estanciaIndex,1);
    seleccion.tipo=null;
    guardar();dibujar();
}

function limpiarActual(){puntos=[];cerrado=false;dibujar();}
function borrarUltimoPunto(){puntos.pop();dibujar();}
function guardarPlano(){guardar();alert("Guardado");}
function definirEscala(){alert("ya lo activaremos luego");}
function volver(){window.location.href="obra.html";}

/* INTERACCIÓN */
canvas.addEventListener("mousedown",e=>{
    let p=pos(e);
    ultimoX=p.x;ultimoY=p.y;

    for(let i=estancias.length-1;i>=0;i--){
        if(dentro(p.x,p.y,estancias[i].puntos)){
            seleccion.tipo="estancia";
            seleccion.estanciaIndex=i;
            arrastrando=true;
            dibujar();return;
        }
    }

    if(!cerrado){
        puntos.push(p);
        dibujar();
    }
});

canvas.addEventListener("mousemove",e=>{
    if(!arrastrando)return;
    let p=pos(e);
    let dx=p.x-ultimoX, dy=p.y-ultimoY;

    let est=estancias[seleccion.estanciaIndex];
    est.puntos.forEach(pt=>{
        pt.x+=dx; pt.y+=dy;
    });

    ultimoX=p.x;ultimoY=p.y;
    guardar();dibujar();
});

canvas.addEventListener("mouseup",()=>arrastrando=false);

canvas.addEventListener("touchstart",e=>canvas.dispatchEvent(new MouseEvent("mousedown",{clientX:e.touches[0].clientX,clientY:e.touches[0].clientY})),{passive:false});
canvas.addEventListener("touchmove",e=>canvas.dispatchEvent(new MouseEvent("mousemove",{clientX:e.touches[0].clientX,clientY:e.touches[0].clientY})),{passive:false});
canvas.addEventListener("touchend",()=>arrastrando=false);

window.addEventListener("resize",()=>{ajustarCanvas();dibujar();});

dibujar();
</script>

</body>
</html>
