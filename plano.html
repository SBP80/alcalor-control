<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plano</title>
<style>
body{
    margin:0;
    background:#0b0b0b;
    color:#fff;
    font-family:Arial,sans-serif;
}
.header{
    padding:12px 15px;
    border-bottom:2px solid orange;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
}
.header-titulo{
    font-size:22px;
    font-weight:bold;
}
.header-btn{
    background:orange;
    border:none;
    color:#111;
    font-weight:bold;
    padding:10px 14px;
    border-radius:8px;
    font-size:15px;
    cursor:pointer;
}
.wrap{
    padding:10px;
    position:relative;
}
.info{
    padding:10px;
    background:#141414;
    border:1px solid #2a2a2a;
    margin-bottom:10px;
    border-radius:8px;
    font-size:14px;
    line-height:1.45;
}
.tools{
    position:absolute;
    top:58px;
    right:10px;
    width:250px;
    max-height:75vh;
    overflow-y:auto;
    background:#141414;
    border:1px solid #2a2a2a;
    border-radius:10px;
    padding:8px;
    display:none;
    z-index:30;
    box-shadow:0 8px 24px rgba(0,0,0,.45);
}
.tools.abierto{
    display:block;
}
.subtitulo{
    margin:4px 0 6px 0;
    font-size:12px;
    color:orange;
    font-weight:bold;
}
canvas{
    background:#111;
    border:1px solid #333;
    display:block;
    width:100%;
    touch-action:none;
}
.btn{
    width:100%;
    padding:11px;
    background:orange;
    border:none;
    margin-top:7px;
    font-size:14px;
    cursor:pointer;
    color:#111;
    font-weight:bold;
    border-radius:8px;
}
.btn-sec{
    background:#d6a13b;
}
.btn-danger{
    background:#c93b2f;
    color:#fff;
}
.small-note{
    font-size:12px;
    color:#bbb;
    margin-top:8px;
}
</style>
</head>
<body>

<div class="header">
    <button class="header-btn" onclick="volver()">Volver</button>
    <div class="header-titulo">Plano</div>
    <button class="header-btn" onclick="toggleTools()">Herramientas</button>
</div>

<div class="wrap">
    <div class="info" id="info">Cargando...</div>

    <div class="tools" id="tools">
        <div class="subtitulo">Plano</div>
        <button class="btn" onclick="nuevaEstancia()">Nueva estancia</button>
        <button class="btn" onclick="cerrarEstancia()">Cerrar estancia</button>
        <button class="btn" onclick="guardarEstancia()">Guardar estancia</button>
        <button class="btn btn-sec" onclick="activarZonaMuerta()">Zona muerta</button>
        <button class="btn btn-sec" onclick="borrarUltimoPunto()">Borrar último punto</button>
        <button class="btn btn-sec" onclick="definirEscala()">Definir escala</button>
        <button class="btn btn-danger" onclick="eliminarSeleccionado()">Eliminar seleccionado</button>
        <button class="btn btn-sec" onclick="limpiarActual()">Limpiar actual</button>
        <button class="btn" onclick="guardarPlano()">Guardar plano</button>
        <div class="small-note">
            Zona muerta: clic para seleccionar, arrastra dentro para mover, arrastra las esquinas blancas para cambiar tamaño.
        </div>
    </div>

    <canvas id="canvas"></canvas>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const info = document.getElementById("info");
const tools = document.getElementById("tools");

function toggleTools() {
    tools.classList.toggle("abierto");
}

function ajustarCanvas() {
    canvas.width = window.innerWidth - 20;
    canvas.height = window.innerHeight - 165;
}
ajustarCanvas();

const clienteId = localStorage.getItem("clienteActivo");
const obraId = localStorage.getItem("obraActiva");

const obras = JSON.parse(localStorage.getItem("obras_" + clienteId)) || [];
const obra = obras.find(o => String(o.id) === String(obraId));

if (!obra) {
    alert("Obra no encontrada");
    window.location.href = "obras.html";
}

if (!obra.plano) {
    obra.plano = {
        estancias: [],
        metrosPorPixel: null
    };
}

if (!Array.isArray(obra.plano.estancias)) {
    obra.plano.estancias = [];
}

if (!Array.isArray(obra.zonasMuertas)) {
    obra.zonasMuertas = [];
}

let estancias = obra.plano.estancias;
let zonasMuertas = obra.zonasMuertas;
let metrosPorPixel = obra.plano.metrosPorPixel || null;

let modoZonaMuerta = false;
let zonaMuertaTemp = null;

let puntos = [];
let cerrado = false;

let seleccion = {
    tipo: null, // puntoActual, puntoGuardado, estanciaActual, estanciaGuardada, zonaMuerta, zonaHandle
    estanciaIndex: -1,
    puntoIndex: -1,
    zonaIndex: -1,
    handle: null
};

let arrastrando = false;
let ultimoX = 0;
let ultimoY = 0;

const RADIO_PUNTO = 14;
const HANDLE_SIZE = 10;
const MIN_ZONA = 12;

function guardarMemoria() {
    obra.plano = {
        estancias: estancias,
        metrosPorPixel: metrosPorPixel
    };
    obra.zonasMuertas = zonasMuertas;
    localStorage.setItem("obras_" + clienteId, JSON.stringify(obras));
}

function obtenerPosicion(evento) {
    const rect = canvas.getBoundingClientRect();

    if (evento.touches && evento.touches.length > 0) {
        return {
            x: evento.touches[0].clientX - rect.left,
            y: evento.touches[0].clientY - rect.top
        };
    }

    if (evento.changedTouches && evento.changedTouches.length > 0) {
        return {
            x: evento.changedTouches[0].clientX - rect.left,
            y: evento.changedTouches[0].clientY - rect.top
        };
    }

    return {
        x: evento.clientX - rect.left,
        y: evento.clientY - rect.top
    };
}

function distancia(p1, p2) {
    return Math.hypot(p2.x - p1.x, p2.y - p1.y);
}

function puntoMedio(p1, p2) {
    return { x: (p1.x + p2.x) / 2, y: (p1.y + p2.y) / 2 };
}

function centroide(lista) {
    let sx = 0;
    let sy = 0;
    for (const p of lista) {
        sx += p.x;
        sy += p.y;
    }
    return { x: sx / lista.length, y: sy / lista.length };
}

function calcularAreaPixels(lista) {
    if (!lista || lista.length < 3) return 0;
    let area = 0;
    for (let i = 0; i < lista.length; i++) {
        const j = (i + 1) % lista.length;
        area += lista[i].x * lista[j].y;
        area -= lista[j].x * lista[i].y;
    }
    return Math.abs(area / 2);
}

function calcularSuperficieReal(lista) {
    if (!metrosPorPixel) return 0;
    return calcularAreaPixels(lista) * metrosPorPixel * metrosPorPixel;
}

function puntoDentroPoligono(x, y, poligono) {
    let dentro = false;
    for (let i = 0, j = poligono.length - 1; i < poligono.length; j = i++) {
        const xi = poligono[i].x;
        const yi = poligono[i].y;
        const xj = poligono[j].x;
        const yj = poligono[j].y;

        const cruza = ((yi > y) !== (yj > y)) &&
            (x < ((xj - xi) * (y - yi)) / ((yj - yi) || 0.000001) + xi);

        if (cruza) dentro = !dentro;
    }
    return dentro;
}

function buscarPuntoEnLista(x, y, lista) {
    for (let i = 0; i < lista.length; i++) {
        const p = lista[i];
        if (Math.hypot(p.x - x, p.y - y) <= RADIO_PUNTO) {
            return i;
        }
    }
    return -1;
}

function limpiarSeleccion() {
    seleccion.tipo = null;
    seleccion.estanciaIndex = -1;
    seleccion.puntoIndex = -1;
    seleccion.zonaIndex = -1;
    seleccion.handle = null;
}

function obtenerEstanciaSeleccionada() {
    if (seleccion.tipo === "estanciaGuardada" || seleccion.tipo === "puntoGuardado") {
        return estancias[seleccion.estanciaIndex] || null;
    }
    if (seleccion.tipo === "estanciaActual" || seleccion.tipo === "puntoActual") {
        return { nombre: "Estancia actual", puntos: puntos };
    }
    return null;
}

function puntoDentroRect(x, y, r) {
    return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h;
}

function getZonaHandles(z) {
    return [
        { name: "nw", x: z.x,       y: z.y },
        { name: "ne", x: z.x + z.w, y: z.y },
        { name: "se", x: z.x + z.w, y: z.y + z.h },
        { name: "sw", x: z.x,       y: z.y + z.h }
    ];
}

function buscarHandleZona(x, y, z) {
    const handles = getZonaHandles(z);
    for (const h of handles) {
        if (Math.abs(x - h.x) <= HANDLE_SIZE && Math.abs(y - h.y) <= HANDLE_SIZE) {
            return h.name;
        }
    }
    return null;
}

function dibujarMedidas(lista, estaCerrada, colorTexto) {
    if (!metrosPorPixel || !lista || lista.length < 2) return;

    ctx.fillStyle = colorTexto;
    ctx.font = "12px Arial";

    const totalLados = estaCerrada ? lista.length : lista.length - 1;

    for (let i = 0; i < totalLados; i++) {
        const j = (i + 1) % lista.length;
        const p1 = lista[i];
        const p2 = lista[j];
        const medio = puntoMedio(p1, p2);
        const metros = distancia(p1, p2) * metrosPorPixel;
        ctx.fillText(metros.toFixed(2) + " m", medio.x + 6, medio.y - 6);
    }
}

function dibujarLineaMedida(x1, y1, x2, y2, texto) {
    ctx.save();
    ctx.strokeStyle = "rgba(255,255,255,0.70)";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();

    const mx = (x1 + x2) / 2;
    const my = (y1 + y2) / 2;

    ctx.fillStyle = "#fff";
    ctx.font = "12px Arial";
    ctx.fillText(texto, mx + 4, my - 4);
    ctx.restore();
}

function dibujarHandlesZona(z) {
    const handles = getZonaHandles(z);
    ctx.save();
    ctx.fillStyle = "#fff";
    ctx.strokeStyle = "#000";
    ctx.lineWidth = 1;

    for (const h of handles) {
        ctx.beginPath();
        ctx.rect(h.x - HANDLE_SIZE / 2, h.y - HANDLE_SIZE / 2, HANDLE_SIZE, HANDLE_SIZE);
        ctx.fill();
        ctx.stroke();
    }
    ctx.restore();
}

function lineIntersectionsHorizontal(y, polygon) {
    const xs = [];
    for (let i = 0; i < polygon.length; i++) {
        const a = polygon[i];
        const b = polygon[(i + 1) % polygon.length];

        if (a.y === b.y) continue;
        const minY = Math.min(a.y, b.y);
        const maxY = Math.max(a.y, b.y);
        if (y < minY || y >= maxY) continue;

        const t = (y - a.y) / (b.y - a.y);
        xs.push(a.x + t * (b.x - a.x));
    }
    xs.sort((m, n) => m - n);
    return xs;
}

function lineIntersectionsVertical(x, polygon) {
    const ys = [];
    for (let i = 0; i < polygon.length; i++) {
        const a = polygon[i];
        const b = polygon[(i + 1) % polygon.length];

        if (a.x === b.x) continue;
        const minX = Math.min(a.x, b.x);
        const maxX = Math.max(a.x, b.x);
        if (x < minX || x >= maxX) continue;

        const t = (x - a.x) / (b.x - a.x);
        ys.push(a.y + t * (b.y - a.y));
    }
    ys.sort((m, n) => m - n);
    return ys;
}

function encontrarEstanciaContenedoraZona(zona) {
    const cx = zona.x + zona.w / 2;
    const cy = zona.y + zona.h / 2;

    for (let i = estancias.length - 1; i >= 0; i--) {
        if (puntoDentroPoligono(cx, cy, estancias[i].puntos)) {
            return i;
        }
    }

    if (cerrado && puntos.length >= 3 && puntoDentroPoligono(cx, cy, puntos)) {
        return -2;
    }

    return null;
}

function getPolygonByContainerIndex(idx) {
    if (idx === -2) return puntos;
    if (idx === null || idx === undefined) return null;
    return estancias[idx]?.puntos || null;
}

function dibujarMedidasZonaDentroEstancia(zonaIndex) {
    if (!metrosPorPixel) return;

    const z = zonasMuertas[zonaIndex];
    const cont = encontrarEstanciaContenedoraZona(z);
    const polygon = getPolygonByContainerIndex(cont);
    if (!polygon || polygon.length < 3) return;

    const cx = z.x + z.w / 2;
    const cy = z.y + z.h / 2;

    const xs = lineIntersectionsHorizontal(cy, polygon);
    const ys = lineIntersectionsVertical(cx, polygon);

    let leftBound = null;
    let rightBound = null;
    let topBound = null;
    let bottomBound = null;

    for (const x of xs) {
        if (x <= z.x) leftBound = x;
        if (x >= z.x + z.w && rightBound === null) rightBound = x;
    }

    for (const y of ys) {
        if (y <= z.y) topBound = y;
        if (y >= z.y + z.h && bottomBound === null) bottomBound = y;
    }

    if (leftBound !== null) {
        dibujarLineaMedida(leftBound, cy, z.x, cy, ((z.x - leftBound) * metrosPorPixel).toFixed(2) + " m");
    }
    if (rightBound !== null) {
        dibujarLineaMedida(z.x + z.w, cy, rightBound, cy, ((rightBound - (z.x + z.w)) * metrosPorPixel).toFixed(2) + " m");
    }
    if (topBound !== null) {
        dibujarLineaMedida(cx, topBound, cx, z.y, ((z.y - topBound) * metrosPorPixel).toFixed(2) + " m");
    }
    if (bottomBound !== null) {
        dibujarLineaMedida(cx, z.y + z.h, cx, bottomBound, ((bottomBound - (z.y + z.h)) * metrosPorPixel).toFixed(2) + " m");
    }
}

function clipPolygonWithRect(subjectPolygon, rect) {
    let output = subjectPolygon.slice();

    const edges = [
        {
            inside: p => p.x >= rect.x,
            intersect: (a, b) => {
                const t = (rect.x - a.x) / (b.x - a.x);
                return { x: rect.x, y: a.y + t * (b.y - a.y) };
            }
        },
        {
            inside: p => p.x <= rect.x + rect.w,
            intersect: (a, b) => {
                const xEdge = rect.x + rect.w;
                const t = (xEdge - a.x) / (b.x - a.x);
                return { x: xEdge, y: a.y + t * (b.y - a.y) };
            }
        },
        {
            inside: p => p.y >= rect.y,
            intersect: (a, b) => {
                const t = (rect.y - a.y) / (b.y - a.y);
                return { x: a.x + t * (b.x - a.x), y: rect.y };
            }
        },
        {
            inside: p => p.y <= rect.y + rect.h,
            intersect: (a, b) => {
                const yEdge = rect.y + rect.h;
                const t = (yEdge - a.y) / (b.y - a.y);
                return { x: a.x + t * (b.x - a.x), y: yEdge };
            }
        }
    ];

    for (const edge of edges) {
        const input = output.slice();
        output = [];
        if (input.length === 0) break;

        let S = input[input.length - 1];

        for (const E of input) {
            const Ein = edge.inside(E);
            const Sin = edge.inside(S);

            if (Ein) {
                if (!Sin) output.push(edge.intersect(S, E));
                output.push(E);
            } else if (Sin) {
                output.push(edge.intersect(S, E));
            }

            S = E;
        }
    }

    return output;
}

function calcularAreaMuertaPoligono(polygon) {
    if (!metrosPorPixel) return 0;
    if (!polygon || polygon.length < 3) return 0;

    let totalSolapePx = 0;

    for (const z of zonasMuertas) {
        const clipped = clipPolygonWithRect(polygon, z);
        if (clipped.length >= 3) {
            totalSolapePx += calcularAreaPixels(clipped);
        }
    }

    return totalSolapePx * metrosPorPixel * metrosPorPixel;
}

function calcularAreaMuertaEnEstancia(estanciaIndex) {
    const polygon = estancias[estanciaIndex]?.puntos;
    return calcularAreaMuertaPoligono(polygon);
}

function dibujarEstanciaGuardada(est, index) {
    if (!est.puntos || est.puntos.length < 3) return;

    const seleccionada =
        (seleccion.tipo === "estanciaGuardada" && seleccion.estanciaIndex === index) ||
        (seleccion.tipo === "puntoGuardado" && seleccion.estanciaIndex === index);

    ctx.beginPath();
    est.puntos.forEach((p, i) => {
        if (i === 0) ctx.moveTo(p.x, p.y);
        else ctx.lineTo(p.x, p.y);
    });
    ctx.closePath();

    ctx.strokeStyle = seleccionada ? "white" : "orange";
    ctx.lineWidth = seleccionada ? 3 : 2;
    ctx.stroke();

    ctx.fillStyle = seleccionada ? "rgba(255,255,255,0.12)" : "rgba(255,165,0,0.10)";
    ctx.fill();

    est.puntos.forEach((p, i) => {
        const esPuntoSel =
            seleccion.tipo === "puntoGuardado" &&
            seleccion.estanciaIndex === index &&
            seleccion.puntoIndex === i;

        ctx.beginPath();
        ctx.arc(p.x, p.y, esPuntoSel ? 7 : 5, 0, Math.PI * 2);
        ctx.fillStyle = esPuntoSel ? "white" : "orange";
        ctx.fill();
    });

    const c = centroide(est.puntos);
    const areaTotal = calcularSuperficieReal(est.puntos);
    const areaMuerta = calcularAreaMuertaEnEstancia(index);
    const areaUtil = Math.max(0, areaTotal - areaMuerta);

    ctx.fillStyle = "white";
    ctx.font = "16px Arial";
    ctx.fillText(est.nombre || "Estancia", c.x - 20, c.y - 12);

    if (metrosPorPixel) {
        ctx.font = "13px Arial";
        ctx.fillText("Útil " + areaUtil.toFixed(2) + " m²", c.x - 20, c.y + 8);
        if (areaMuerta > 0) {
            ctx.fillText("Muerta " + areaMuerta.toFixed(2) + " m²", c.x - 20, c.y + 24);
        }
    }

    dibujarMedidas(est.puntos, true, "white");
}

function dibujarEstanciaActual() {
    if (puntos.length === 0) return;

    const seleccionada = seleccion.tipo === "estanciaActual" || seleccion.tipo === "puntoActual";

    ctx.beginPath();
    puntos.forEach((p, i) => {
        if (i === 0) ctx.moveTo(p.x, p.y);
        else ctx.lineTo(p.x, p.y);
    });

    if (cerrado && puntos.length >= 3) {
        ctx.closePath();
        ctx.fillStyle = seleccionada ? "rgba(255,255,255,0.12)" : "rgba(255,255,255,0.06)";
        ctx.fill();
    }

    ctx.strokeStyle = seleccionada ? "white" : "#dddddd";
    ctx.lineWidth = seleccionada ? 3 : 2;
    ctx.stroke();

    puntos.forEach((p, i) => {
        const esPuntoSel = seleccion.tipo === "puntoActual" && seleccion.puntoIndex === i;

        ctx.beginPath();
        ctx.arc(p.x, p.y, esPuntoSel ? 7 : 5, 0, Math.PI * 2);
        ctx.fillStyle = esPuntoSel ? "orange" : "white";
        ctx.fill();

        ctx.fillStyle = "white";
        ctx.font = "12px Arial";
        ctx.fillText(String(i + 1), p.x + 8, p.y - 8);
    });

    dibujarMedidas(puntos, cerrado, "white");
}

function dibujarZonasMuertas() {
    zonasMuertas.forEach((z, i) => {
        const seleccionada = seleccion.tipo === "zonaMuerta" && seleccion.zonaIndex === i;
        const handleSel = seleccion.tipo === "zonaHandle" && seleccion.zonaIndex === i;

        ctx.fillStyle = seleccionada || handleSel ? "rgba(255,0,0,0.35)" : "rgba(255,0,0,0.25)";
        ctx.fillRect(z.x, z.y, z.w, z.h);

        ctx.strokeStyle = seleccionada || handleSel ? "white" : "red";
        ctx.lineWidth = seleccionada || handleSel ? 3 : 2;
        ctx.strokeRect(z.x, z.y, z.w, z.h);

        ctx.fillStyle = "white";
        ctx.font = "12px Arial";

        if (metrosPorPixel) {
            const ancho = (z.w * metrosPorPixel).toFixed(2);
            const alto = (z.h * metrosPorPixel).toFixed(2);
            ctx.fillText("Zona muerta " + ancho + "m x " + alto + "m", z.x + 6, z.y + 16);
        } else {
            ctx.fillText("Zona muerta", z.x + 6, z.y + 16);
        }

        if (seleccionada || handleSel) {
            dibujarHandlesZona(z);
            dibujarMedidasZonaDentroEstancia(i);
        }
    });

    if (modoZonaMuerta && zonaMuertaTemp) {
        const x = Math.min(zonaMuertaTemp.x1, zonaMuertaTemp.x2);
        const y = Math.min(zonaMuertaTemp.y1, zonaMuertaTemp.y2);
        const w = Math.abs(zonaMuertaTemp.x2 - zonaMuertaTemp.x1);
        const h = Math.abs(zonaMuertaTemp.y2 - zonaMuertaTemp.y1);

        ctx.fillStyle = "rgba(255,255,0,0.15)";
        ctx.fillRect(x, y, w, h);

        ctx.strokeStyle = "yellow";
        ctx.lineWidth = 2;
        ctx.strokeRect(x, y, w, h);
    }
}

function actualizarInfo() {
    if (seleccion.tipo === "zonaMuerta" || seleccion.tipo === "zonaHandle") {
        const z = zonasMuertas[seleccion.zonaIndex];
        let texto = "Zona muerta seleccionada";

        if (metrosPorPixel) {
            texto += "<br>Ancho: " + (z.w * metrosPorPixel).toFixed(2) + " m";
            texto += "<br>Alto: " + (z.h * metrosPorPixel).toFixed(2) + " m";
            texto += "<br>Superficie: " + ((z.w * metrosPorPixel) * (z.h * metrosPorPixel)).toFixed(2) + " m²";
        } else {
            texto += "<br>Ancho: " + z.w.toFixed(0) + " px";
            texto += "<br>Alto: " + z.h.toFixed(0) + " px";
        }

        const cont = encontrarEstanciaContenedoraZona(z);
        if (cont === -2) {
            texto += "<br>Dentro de: estancia actual";
        } else if (cont !== null && estancias[cont]) {
            texto += "<br>Dentro de: " + (estancias[cont].nombre || "Estancia");
        } else {
            texto += "<br>Dentro de: fuera de estancia";
        }

        info.innerHTML = texto;
        return;
    }

    const estanciaSel = obtenerEstanciaSeleccionada();

    if (!estanciaSel) {
        let total = 0;
        let totalMuerta = 0;
        let totalUtil = 0;

        for (let i = 0; i < estancias.length; i++) {
            const area = calcularSuperficieReal(estancias[i].puntos);
            const muerta = calcularAreaMuertaEnEstancia(i);
            total += area;
            totalMuerta += muerta;
            totalUtil += Math.max(0, area - muerta);
        }

        let texto = "Resumen del plano";
        texto += "<br>Estancias guardadas: " + estancias.length;
        texto += "<br>Escala: " + (metrosPorPixel ? "definida" : "sin definir");

        if (total > 0) {
            texto += "<br>Superficie total: " + total.toFixed(2) + " m²";
            texto += "<br>Superficie útil: " + totalUtil.toFixed(2) + " m²";
            texto += "<br>Superficie muerta: " + totalMuerta.toFixed(2) + " m²";
        }

        if (zonasMuertas.length > 0) {
            texto += "<br>Zonas muertas: " + zonasMuertas.length;
        }

        if (modoZonaMuerta) {
            texto += "<br>Modo zona muerta: activo";
        }

        if (puntos.length > 0) {
            texto += "<br>Estancia actual en edición: sí";
            texto += "<br>Puntos actuales: " + puntos.length;
            texto += "<br>Estado: " + (cerrado ? "cerrada" : "abierta");
            if (cerrado && metrosPorPixel) {
                const areaTotalActual = calcularSuperficieReal(puntos);
                const areaMuertaActual = calcularAreaMuertaPoligono(puntos);
                const areaUtilActual = Math.max(0, areaTotalActual - areaMuertaActual);
                texto += "<br>Superficie actual total: " + areaTotalActual.toFixed(2) + " m²";
                texto += "<br>Superficie actual muerta: " + areaMuertaActual.toFixed(2) + " m²";
                texto += "<br>Superficie actual útil: " + areaUtilActual.toFixed(2) + " m²";
            }
        }

        info.innerHTML = texto;
        return;
    }

    let texto = "Datos de la estancia seleccionada";
    texto += "<br>Nombre: " + (estanciaSel.nombre || "Sin nombre");
    texto += "<br>Lados: " + estanciaSel.puntos.length;

    if (metrosPorPixel) {
        let areaTotal = calcularSuperficieReal(estanciaSel.puntos);
        let areaMuerta = calcularAreaMuertaPoligono(estanciaSel.puntos);
        let areaUtil = Math.max(0, areaTotal - areaMuerta);

        texto += "<br>Superficie total: " + areaTotal.toFixed(2) + " m²";
        texto += "<br>Superficie muerta: " + areaMuerta.toFixed(2) + " m²";
        texto += "<br>Superficie útil: " + areaUtil.toFixed(2) + " m²";
        texto += "<br>Longitudes:";

        for (let i = 0; i < estanciaSel.puntos.length; i++) {
            const j = (i + 1) % estanciaSel.puntos.length;
            const m = distancia(estanciaSel.puntos[i], estanciaSel.puntos[j]) * metrosPorPixel;
            texto += "<br>- Lado " + (i + 1) + ": " + m.toFixed(2) + " m";
        }
    }

    info.innerHTML = texto;
}

function dibujar() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (let i = 0; i < estancias.length; i++) {
        dibujarEstanciaGuardada(estancias[i], i);
    }

    dibujarEstanciaActual();
    dibujarZonasMuertas();
    actualizarInfo();
}

function nuevaEstancia() {
    puntos = [];
    cerrado = false;
    modoZonaMuerta = false;
    zonaMuertaTemp = null;
    limpiarSeleccion();
    dibujar();
}

function cerrarEstancia() {
    if (puntos.length < 3) {
        alert("Necesitas al menos 3 puntos");
        return;
    }
    cerrado = true;
    dibujar();
}

function definirEscala() {
    const poligonoReferencia = puntos.length >= 2 ? puntos : (estancias[0]?.puntos || null);

    if (!poligonoReferencia || poligonoReferencia.length < 2) {
        alert("Necesitas al menos 2 puntos en una estancia para definir escala");
        return;
    }

    const valor = prompt("Introduce la medida real del lado entre punto 1 y punto 2, en metros:");
    if (!valor) return;

    const metrosReales = parseFloat(valor.replace(",", "."));
    if (!metrosReales || metrosReales <= 0) {
        alert("Medida no válida");
        return;
    }

    const pixeles = distancia(poligonoReferencia[0], poligonoReferencia[1]);
    if (!pixeles || pixeles <= 0) {
        alert("No se pudo calcular la escala");
        return;
    }

    metrosPorPixel = metrosReales / pixeles;
    guardarMemoria();
    dibujar();
    alert("Escala guardada");
}

function guardarEstancia() {
    if (!cerrado || puntos.length < 3) {
        alert("Primero cierra la estancia");
        return;
    }

    const nombre = prompt("Nombre estancia:");
    if (!nombre || nombre.trim() === "") return;

    estancias.push({
        nombre: nombre.trim(),
        puntos: JSON.parse(JSON.stringify(puntos))
    });

    guardarMemoria();
    puntos = [];
    cerrado = false;
    limpiarSeleccion();
    dibujar();
}

function activarZonaMuerta() {
    if (!cerrado && puntos.length < 3 && estancias.length === 0) {
        alert("Primero crea una estancia");
        return;
    }

    modoZonaMuerta = true;
    zonaMuertaTemp = null;
    arrastrando = false;
    limpiarSeleccion();
    dibujar();
}

function borrarUltimoPunto() {
    if (puntos.length === 0) return;

    puntos.pop();
    if (puntos.length < 3) cerrado = false;

    if (seleccion.tipo === "puntoActual" && seleccion.puntoIndex >= puntos.length) {
        limpiarSeleccion();
    }

    dibujar();
}

function eliminarSeleccionado() {
    if (seleccion.tipo === "zonaMuerta" || seleccion.tipo === "zonaHandle") {
        const idx = seleccion.zonaIndex;
        if (idx >= 0 && idx < zonasMuertas.length) {
            zonasMuertas.splice(idx, 1);
            guardarMemoria();
            limpiarSeleccion();
            dibujar();
        }
        return;
    }

    if (seleccion.tipo === "estanciaGuardada" || seleccion.tipo === "puntoGuardado") {
        const idx = seleccion.estanciaIndex;
        if (idx >= 0 && idx < estancias.length) {
            estancias.splice(idx, 1);
            guardarMemoria();
            limpiarSeleccion();
            dibujar();
        }
        return;
    }

    if (seleccion.tipo === "estanciaActual" || seleccion.tipo === "puntoActual") {
        puntos = [];
        cerrado = false;
        limpiarSeleccion();
        dibujar();
        return;
    }

    alert("Primero selecciona algo");
}

function limpiarActual() {
    puntos = [];
    cerrado = false;
    modoZonaMuerta = false;
    zonaMuertaTemp = null;
    limpiarSeleccion();
    dibujar();
}

function guardarPlano() {
    guardarMemoria();
    alert("Plano guardado");
}

function volver() {
    window.location.href = "obra.html";
}

function moverZona(z, dx, dy) {
    z.x += dx;
    z.y += dy;
}

function resizeZona(z, handle, pos) {
    let left = z.x;
    let top = z.y;
    let right = z.x + z.w;
    let bottom = z.y + z.h;

    if (handle === "nw") {
        left = pos.x;
        top = pos.y;
    } else if (handle === "ne") {
        right = pos.x;
        top = pos.y;
    } else if (handle === "se") {
        right = pos.x;
        bottom = pos.y;
    } else if (handle === "sw") {
        left = pos.x;
        bottom = pos.y;
    }

    if (right - left < MIN_ZONA) {
        if (handle === "nw" || handle === "sw") left = right - MIN_ZONA;
        else right = left + MIN_ZONA;
    }

    if (bottom - top < MIN_ZONA) {
        if (handle === "nw" || handle === "ne") top = bottom - MIN_ZONA;
        else bottom = top + MIN_ZONA;
    }

    z.x = Math.min(left, right);
    z.y = Math.min(top, bottom);
    z.w = Math.abs(right - left);
    z.h = Math.abs(bottom - top);
}

function empezarInteraccion(evento) {
    const pos = obtenerPosicion(evento);
    ultimoX = pos.x;
    ultimoY = pos.y;

    if (modoZonaMuerta) {
        zonaMuertaTemp = {
            x1: pos.x,
            y1: pos.y,
            x2: pos.x,
            y2: pos.y
        };
        arrastrando = true;
        dibujar();
        if (evento.cancelable) evento.preventDefault();
        return;
    }

    for (let i = zonasMuertas.length - 1; i >= 0; i--) {
        const h = buscarHandleZona(pos.x, pos.y, zonasMuertas[i]);
        if (h) {
            seleccion.tipo = "zonaHandle";
            seleccion.zonaIndex = i;
            seleccion.handle = h;
            arrastrando = true;
            dibujar();
            if (evento.cancelable) evento.preventDefault();
            return;
        }
    }

    for (let i = zonasMuertas.length - 1; i >= 0; i--) {
        if (puntoDentroRect(pos.x, pos.y, zonasMuertas[i])) {
            seleccion.tipo = "zonaMuerta";
            seleccion.zonaIndex = i;
            arrastrando = true;
            dibujar();
            if (evento.cancelable) evento.preventDefault();
            return;
        }
    }

    let idx = buscarPuntoEnLista(pos.x, pos.y, puntos);
    if (idx >= 0) {
        seleccion.tipo = "puntoActual";
        seleccion.estanciaIndex = -1;
        seleccion.puntoIndex = idx;
        arrastrando = true;
        dibujar();
        if (evento.cancelable) evento.preventDefault();
        return;
    }

    for (let i = estancias.length - 1; i >= 0; i--) {
        idx = buscarPuntoEnLista(pos.x, pos.y, estancias[i].puntos);
        if (idx >= 0) {
            seleccion.tipo = "puntoGuardado";
            seleccion.estanciaIndex = i;
            seleccion.puntoIndex = idx;
            arrastrando = true;
            dibujar();
            if (evento.cancelable) evento.preventDefault();
            return;
        }
    }

    if (cerrado && puntos.length >= 3 && puntoDentroPoligono(pos.x, pos.y, puntos)) {
        seleccion.tipo = "estanciaActual";
        seleccion.estanciaIndex = -1;
        seleccion.puntoIndex = -1;
        arrastrando = true;
        dibujar();
        if (evento.cancelable) evento.preventDefault();
        return;
    }

    for (let i = estancias.length - 1; i >= 0; i--) {
        if (puntoDentroPoligono(pos.x, pos.y, estancias[i].puntos)) {
            seleccion.tipo = "estanciaGuardada";
            seleccion.estanciaIndex = i;
            seleccion.puntoIndex = -1;
            arrastrando = true;
            dibujar();
            if (evento.cancelable) evento.preventDefault();
            return;
        }
    }

    if (!cerrado) {
        puntos.push({ x: pos.x, y: pos.y });
        seleccion.tipo = "puntoActual";
        seleccion.estanciaIndex = -1;
        seleccion.puntoIndex = puntos.length - 1;
        dibujar();
        if (evento.cancelable) evento.preventDefault();
        return;
    }

    limpiarSeleccion();
    dibujar();
}

function moverInteraccion(evento) {
    const pos = obtenerPosicion(evento);

    if (modoZonaMuerta && arrastrando && zonaMuertaTemp) {
        zonaMuertaTemp.x2 = pos.x;
        zonaMuertaTemp.y2 = pos.y;
        dibujar();
        if (evento.cancelable) evento.preventDefault();
        return;
    }

    if (!arrastrando || !seleccion.tipo) return;

    const dx = pos.x - ultimoX;
    const dy = pos.y - ultimoY;

    if (seleccion.tipo === "zonaMuerta") {
        moverZona(zonasMuertas[seleccion.zonaIndex], dx, dy);
        guardarMemoria();
    }

    if (seleccion.tipo === "zonaHandle") {
        resizeZona(zonasMuertas[seleccion.zonaIndex], seleccion.handle, pos);
        guardarMemoria();
    }

    if (seleccion.tipo === "puntoActual") {
        puntos[seleccion.puntoIndex].x += dx;
        puntos[seleccion.puntoIndex].y += dy;
    }

    if (seleccion.tipo === "puntoGuardado") {
        const est = estancias[seleccion.estanciaIndex];
        est.puntos[seleccion.puntoIndex].x += dx;
        est.puntos[seleccion.puntoIndex].y += dy;
        guardarMemoria();
    }

    if (seleccion.tipo === "estanciaActual") {
        for (const p of puntos) {
            p.x += dx;
            p.y += dy;
        }
    }

    if (seleccion.tipo === "estanciaGuardada") {
        const est = estancias[seleccion.estanciaIndex];
        for (const p of est.puntos) {
            p.x += dx;
            p.y += dy;
        }
        guardarMemoria();
    }

    ultimoX = pos.x;
    ultimoY = pos.y;

    dibujar();
    if (evento.cancelable) evento.preventDefault();
}

function terminarInteraccion(evento) {
    if (modoZonaMuerta && arrastrando && zonaMuertaTemp) {
        const x = Math.min(zonaMuertaTemp.x1, zonaMuertaTemp.x2);
        const y = Math.min(zonaMuertaTemp.y1, zonaMuertaTemp.y2);
        const w = Math.abs(zonaMuertaTemp.x2 - zonaMuertaTemp.x1);
        const h = Math.abs(zonaMuertaTemp.y2 - zonaMuertaTemp.y1);

        if (w > 3 && h > 3) {
            zonasMuertas.push({ x, y, w, h });
            guardarMemoria();
        }

        zonaMuertaTemp = null;
        modoZonaMuerta = false;
        arrastrando = false;
        dibujar();
        if (evento && evento.cancelable) evento.preventDefault();
        return;
    }

    if (!arrastrando) return;

    arrastrando = false;

    if (
        seleccion.tipo === "puntoGuardado" ||
        seleccion.tipo === "estanciaGuardada" ||
        seleccion.tipo === "zonaMuerta" ||
        seleccion.tipo === "zonaHandle"
    ) {
        guardarMemoria();
    }

    if (evento && evento.cancelable) evento.preventDefault();
}

canvas.addEventListener("mousedown", empezarInteraccion);
canvas.addEventListener("mousemove", moverInteraccion);
canvas.addEventListener("mouseup", terminarInteraccion);
canvas.addEventListener("mouseleave", terminarInteraccion);

canvas.addEventListener("touchstart", empezarInteraccion, { passive: false });
canvas.addEventListener("touchmove", moverInteraccion, { passive: false });
canvas.addEventListener("touchend", terminarInteraccion, { passive: false });
canvas.addEventListener("touchcancel", terminarInteraccion, { passive: false });

window.addEventListener("resize", () => {
    ajustarCanvas();
    dibujar();
});

window.addEventListener("keydown", (e) => {
    if (e.key === "Delete" || e.key === "Backspace") {
        const tag = document.activeElement ? document.activeElement.tagName : "";
        if (tag !== "INPUT" && tag !== "TEXTAREA") {
            if (seleccion.tipo) {
                eliminarSeleccionado();
            }
        }
    }
});

dibujar();
</script>
