<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Obras</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0b0b;
    color: white;
}

.header {
    padding: 15px;
    font-size: 20px;
    border-bottom: 2px solid orange;
}

.container {
    padding: 15px;
}

.btn {
    width: 100%;
    padding: 15px;
    background: orange;
    border: none;
    font-size: 18px;
    margin-bottom: 15px;
    cursor: pointer;
    color: #111;
    font-weight: bold;
}

.card {
    background: #1a1a1a;
    padding: 15px;
    margin-bottom: 10px;
    border-radius: 10px;
    position: relative;
    cursor: pointer;
}

.eliminar {
    position: absolute;
    right: 10px;
    top: 10px;
    background: #b30000;
    border: none;
    color: white;
    padding: 8px 12px;
    cursor: pointer;
    border-radius: 6px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="header">Obras del cliente</div>

<div class="container">

<button class="btn" onclick="nuevaObra()">+ Nueva obra</button>

<div id="lista"></div>

<button class="btn" onclick="volverAFichaCliente()">Volver a ficha cliente</button>

</div>

<script>

const PIN_ADMIN = "1234";

let clienteId = localStorage.getItem("clienteActivo");
let obras = JSON.parse(localStorage.getItem("obras_" + clienteId)) || [];

function guardar() {
    localStorage.setItem("obras_" + clienteId, JSON.stringify(obras));
}

function nuevaObra() {
    let nombre = prompt("Nombre de la obra:");
    if (!nombre || nombre.trim() === "") return;

    obras.push({
        id: Date.now(),
        nombre: nombre.trim()
    });

    guardar();
    mostrar();
}

function pedirPin() {
    let pin = prompt("Introduce PIN de administrador:");
    if (pin === null) return false;
    return pin === PIN_ADMIN;
}

function eliminarObra(id) {
    let confirmar = confirm("¿Seguro que quieres eliminar esta obra?");
    if (!confirmar) return;

    let pinCorrecto = pedirPin();
    if (!pinCorrecto) {
        alert("PIN incorrecto");
        return;
    }

    obras = obras.filter(o => o.id !== id);
    guardar();
    mostrar();
}

function mostrar() {
    const contenedor = document.getElementById("lista");
    contenedor.innerHTML = "";

    obras.forEach(o => {
        let div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <button class="eliminar">X</button>
            <strong>${o.nombre}</strong>
        `;

        // entrar en ficha de obra
        div.onclick = () => {
            localStorage.setItem("obraActiva", o.id);
            window.location.href = "obra.html";
        };

        // eliminar obra
        div.querySelector(".eliminar").onclick = (e) => {
            e.stopPropagation();
            eliminarObra(o.id);
        };

        contenedor.appendChild(div);
    });
}

function volverAFichaCliente() {
    window.location.href = "cliente.html";
}

mostrar();

</script>

</body>
</html>
