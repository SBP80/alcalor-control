<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ALLCALOR PRO</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
}

/* CABECERA */
.header {
    background: black;
    padding: 15px;
    font-size: 20px;
    font-weight: bold;
    border-bottom: 2px solid orange;
}

/* CONTENIDO */
.container {
    padding: 15px;
}

/* BOTÓN */
.btn {
    background: orange;
    color: black;
    padding: 12px;
    border: none;
    width: 100%;
    font-size: 16px;
    font-weight: bold;
    margin-bottom: 15px;
    cursor: pointer;
}

/* LISTA */
.clientes {
    background: #1c1c1c;
    padding: 10px;
    border-radius: 5px;
}

.cliente {
    padding: 10px;
    border-bottom: 1px solid #333;
}
</style>

</head>

<body>

<div class="header">
    ALLCALOR PRO
</div>

<div class="container">

    <button class="btn">+ Nuevo cliente</button>

    <div class="clientes">
        <div class="cliente">Cliente de prueba</div>
    </div>

</div>

</body>
</html>
