<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clientes</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0b0b;
  color:#fff;
}

.wrap{
  max-width:900px;
  margin:auto;
  padding:20px;
}

h1{
  color:#f39b2f;
}

input{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  border:1px solid #333;
  background:#101010;
  color:#fff;
}

button{
  padding:12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.btn{
  background:#f39b2f;
  color:#111;
}

.card{
  background:#151515;
  border:1px solid #333;
  border-radius:12px;
  padding:15px;
  margin-top:10px;
}

.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}
</style>
</head>

<body>

<div class="wrap">

  <h1>Clientes</h1>

  <!-- CREAR -->
  <input id="nombre" placeholder="Nombre cliente">
  <input id="telefono" placeholder="Teléfono">
  <input id="direccion" placeholder="Dirección">

  <button class="btn" onclick="crearCliente()">Crear cliente</button>

  <hr style="margin:20px 0; border:1px solid #333;">

  <!-- LISTA -->
  <div id="lista"></div>

  <button onclick="volver()" style="margin-top:20px;">Volver</button>

</div>

<script>

function getClientes(){
  return JSON.parse(localStorage.getItem("clientes")) || [];
}

function setClientes(data){
  localStorage.setItem("clientes", JSON.stringify(data));
}

// CREAR
function crearCliente(){

  const nombre = document.getElementById("nombre").value;

  if(!nombre){
    alert("Pon nombre");
    return;
  }

  const clientes = getClientes();

  clientes.push({
    id: Date.now(),
    nombre: nombre,
    telefono: document.getElementById("telefono").value,
    direccion: document.getElementById("direccion").value
  });

  setClientes(clientes);

  document.getElementById("nombre").value="";
  document.getElementById("telefono").value="";
  document.getElementById("direccion").value="";

  pintar();
}

// LISTAR
function pintar(){

  const lista = document.getElementById("lista");
  lista.innerHTML="";

  const clientes = getClientes();

  clientes.forEach(c=>{

    const div = document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <div class="row">
        <div>
          <b>${c.nombre}</b><br>
          ${c.telefono}<br>
          ${c.direccion}
        </div>
        <button onclick="abrirCliente(${c.id})">Abrir</button>
      </div>
    `;

    lista.appendChild(div);
  });
}

// ABRIR (SIGUIENTE PASO)
function abrirCliente(id){
  localStorage.setItem("clienteActivo", id);
  alert("Cliente seleccionado (siguiente paso: obras)");
}

// VOLVER
function volver(){
  window.location.href="app.html";
}

// INIT
pintar();

</script>

</body>
</html>
