<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clientes</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0b0b;
    color: white;
}

.header {
    padding: 12px 15px;
    border-bottom: 2px solid orange;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
}

.header-titulo {
    font-size: 20px;
    font-weight: bold;
}

.header-btn {
    background: orange;
    border: none;
    color: #111;
    font-weight: bold;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 15px;
    cursor: pointer;
}

.wrap {
    padding: 10px;
    position: relative;
}

.tools {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 210px;
    max-height: 75vh;
    overflow-y: auto;
    background: #141414;
    border: 1px solid #2a2a2a;
    border-radius: 10px;
    padding: 8px;
    display: none;
    z-index: 30;
    box-shadow: 0 8px 24px rgba(0,0,0,.45);
}

.tools.abierto {
    display: block;
}

.subtitulo {
    margin: 4px 0 6px 0;
    font-size: 12px;
    color: orange;
    font-weight: bold;
}

.info {
    margin-bottom: 10px;
    padding: 10px;
    background: #141414;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    font-size: 14px;
}

.mensaje {
    margin-bottom: 10px;
    padding: 10px;
    background: #141414;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    font-size: 14px;
    display: none;
}

.btn {
    width: 100%;
    padding: 11px;
    background: orange;
    border: none;
    margin-top: 7px;
    font-size: 14px;
    cursor: pointer;
    color: #111;
    font-weight: bold;
    border-radius: 8px;
}

.cliente {
    background: #1a1a1a;
    padding: 15px;
    margin-bottom: 10px;
    border-radius: 10px;
    cursor: pointer;
    position: relative;
    border: 1px solid #252525;
}

.eliminar {
    position: absolute;
    right: 10px;
    top: 10px;
    background: #b30000;
    border: none;
    color: white;
    padding: 8px 12px;
    cursor: pointer;
    border-radius: 6px;
    font-weight: bold;
}

.nombre {
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 6px;
}
</style>
</head>
<body>

<div class="header">
    <div></div>
    <div class="header-titulo">Clientes</div>
    <button class="header-btn" onclick="toggleTools()">Menú</button>
</div>

<div class="wrap">

    <div id="mensaje" class="mensaje"></div>
    <div id="info" class="info"></div>

    <div class="tools" id="tools">
        <div class="subtitulo">Acciones</div>
        <button class="btn" onclick="nuevoCliente()">Nuevo cliente</button>
    </div>

    <div class="clientes" id="listaClientes"></div>

</div>

<script>
const PIN_ADMIN = "1234";

const tools = document.getElementById("tools");
const mensaje = document.getElementById("mensaje");
const info = document.getElementById("info");

let clientes = JSON.parse(localStorage.getItem("clientes")) || [];

function toggleTools() {
    tools.classList.toggle("abierto");
}

function mostrarMensaje(texto) {
    mensaje.textContent = texto;
    mensaje.style.display = "block";
    setTimeout(() => {
        mensaje.style.display = "none";
    }, 2000);
}

function actualizarInfo() {
    info.innerHTML = "Total de clientes: " + clientes.length;
}

function guardar() {
    localStorage.setItem("clientes", JSON.stringify(clientes));
}

function nuevoCliente() {
    let nombre = prompt("Nombre del cliente:");
    if (!nombre || nombre.trim() === "") return;

    let telefonos = prompt("Teléfonos (separa varios con coma):") || "";
    let email = prompt("Email:") || "";
    let direccion = prompt("Dirección:") || "";
    let notas = prompt("Notas:") || "";

    clientes.push({
        id: Date.now(),
        nombre: nombre.trim(),
        telefonos: telefonos.trim(),
        email: email.trim(),
        direccion: direccion.trim(),
        notas: notas.trim()
    });

    guardar();
    mostrarClientes();
    actualizarInfo();
    tools.classList.remove("abierto");
    mostrarMensaje("Cliente creado");
}

function pedirPin() {
    let pin = prompt("Introduce PIN de administrador:");
    if (pin === null) return false;
    return pin === PIN_ADMIN;
}

function eliminarCliente(id) {
    let confirmar = confirm("¿Seguro que quieres eliminar este cliente?");
    if (!confirmar) return;

    let pinCorrecto = pedirPin();
    if (!pinCorrecto) {
        alert("PIN incorrecto");
        return;
    }

    clientes = clientes.filter(c => c.id !== id);
    guardar();

    localStorage.removeItem("obras_" + id);

    if (localStorage.getItem("clienteActivo") == id) {
        localStorage.removeItem("clienteActivo");
    }

    mostrarClientes();
    actualizarInfo();
    mostrarMensaje("Cliente eliminado");
}

function mostrarClientes() {
    const contenedor = document.getElementById("listaClientes");
    contenedor.innerHTML = "";

    clientes.forEach(cliente => {
        const div = document.createElement("div");
        div.className = "cliente";

        const telefonosTexto = cliente.telefonos || cliente.telefono || "";
        const emailTexto = cliente.email || "";

        div.innerHTML = `
            <button class="eliminar">X</button>
            <div class="nombre">${cliente.nombre}</div>
            📞 ${telefonosTexto}<br>
            ✉️ ${emailTexto}<br>
            📍 ${cliente.direccion || ""}<br>
            📝 ${cliente.notas || ""}
        `;

        div.onclick = () => abrirCliente(cliente.id);

        div.querySelector(".eliminar").onclick = (e) => {
            e.stopPropagation();
            eliminarCliente(cliente.id);
        };

        contenedor.appendChild(div);
    });
}

function abrirCliente(id) {
    localStorage.setItem("clienteActivo", id);
    window.location.href = "cliente.html";
}

mostrarClientes();
actualizarInfo();
</script>

</body>
</html>
