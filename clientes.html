<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALLCALOR PRO</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0b0b;
    color: white;
}

.header {
    padding: 15px;
    font-size: 20px;
    border-bottom: 2px solid orange;
}

.container {
    padding: 15px;
}

.btn {
    width: 100%;
    padding: 15px;
    background: orange;
    border: none;
    font-size: 18px;
    margin-bottom: 15px;
    cursor: pointer;
    color: #111;
    font-weight: bold;
}

.cliente {
    background: #1a1a1a;
    padding: 15px;
    margin-bottom: 10px;
    border-radius: 10px;
    cursor: pointer;
    position: relative;
}

.eliminar {
    position: absolute;
    right: 10px;
    top: 10px;
    background: #b30000;
    border: none;
    color: white;
    padding: 8px 12px;
    cursor: pointer;
    border-radius: 6px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="header">ALLCALOR PRO</div>

<div class="container">

    <button class="btn" onclick="nuevoCliente()">+ Nuevo cliente</button>

    <div class="clientes"></div>

</div>

<script>
const PIN_ADMIN = "1234";

let clientes = JSON.parse(localStorage.getItem("clientes")) || [];

function guardar() {
    localStorage.setItem("clientes", JSON.stringify(clientes));
}

function nuevoCliente() {
    let nombre = prompt("Nombre del cliente:");
    if (!nombre || nombre.trim() === "") return;

    let telefono = prompt("Teléfono:") || "";
    let direccion = prompt("Dirección:") || "";
    let notas = prompt("Notas:") || "";

    clientes.push({
        id: Date.now(),
        nombre: nombre.trim(),
        telefono: telefono.trim(),
        direccion: direccion.trim(),
        notas: notas.trim()
    });

    guardar();
    mostrarClientes();
}

function pedirPin() {
    let pin = prompt("Introduce PIN de administrador:");
    if (pin === null) return false;
    return pin === PIN_ADMIN;
}

function eliminarCliente(id) {
    let confirmar = confirm("¿Seguro que quieres eliminar este cliente?");
    if (!confirmar) return;

    let pinCorrecto = pedirPin();
    if (!pinCorrecto) {
        alert("PIN incorrecto");
        return;
    }

    clientes = clientes.filter(c => c.id !== id);
    guardar();

    localStorage.removeItem("obras_" + id);

    if (localStorage.getItem("clienteActivo") == id) {
        localStorage.removeItem("clienteActivo");
    }

    mostrarClientes();
}

function mostrarClientes() {
    const contenedor = document.querySelector(".clientes");
    contenedor.innerHTML = "";

    clientes.forEach(cliente => {
        let div = document.createElement("div");
        div.className = "cliente";

        div.innerHTML = `
            <button class="eliminar">X</button>
            <strong>${cliente.nombre}</strong><br>
            📞 ${cliente.telefono || ""}<br>
            📍 ${cliente.direccion || ""}<br>
            📝 ${cliente.notas || ""}
        `;

        div.onclick = () => abrirCliente(cliente.id);

        div.querySelector(".eliminar").onclick = (e) => {
            e.stopPropagation();
            eliminarCliente(cliente.id);
        };

        contenedor.appendChild(div);
    });
}

function abrirCliente(id) {
    localStorage.setItem("clienteActivo", id);
    window.location.href = "cliente.html";
}

mostrarClientes();
</script>

</body>
</html>
