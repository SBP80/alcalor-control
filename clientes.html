<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALLCALOR PRO</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
}

.header {
    padding: 15px;
    font-size: 22px;
    border-bottom: 2px solid orange;
}

.container {
    padding: 15px;
}

.btn {
    width: 100%;
    padding: 15px;
    background: orange;
    border: none;
    font-weight: bold;
    font-size: 18px;
    cursor: pointer;
    color: #111;
}

.clientes {
    margin-top: 20px;
}

.cliente {
    background: #1c1c1c;
    padding: 15px;
    border-radius: 5px;
    margin-bottom: 10px;
}

.cliente strong {
    font-size: 18px;
}
</style>
</head>
<body>

<div class="header">
    ALLCALOR PRO
</div>

<div class="container">
    <button class="btn" onclick="nuevoCliente()">+ Nuevo cliente</button>
    <div class="clientes" id="listaClientes"></div>
</div>

<script>
let clientes = JSON.parse(localStorage.getItem("clientes")) || [];

function nuevoCliente() {
    let nombre = prompt("Nombre del cliente:");
    if (!nombre) return;

    let telefono = prompt("Teléfono:");
    let direccion = prompt("Dirección:");
    let notas = prompt("Notas:");

    clientes.push({
        nombre: nombre.trim(),
        telefono: telefono || "",
        direccion: direccion || "",
        notas: notas || ""
    });

    guardar();
    mostrarClientes();
}

function guardar() {
    localStorage.setItem("clientes", JSON.stringify(clientes));
}

function mostrarClientes() {
    const contenedor = document.getElementById("listaClientes");
    contenedor.innerHTML = "";

    clientes.forEach(cliente => {
        const div = document.createElement("div");
        div.className = "cliente";

        div.innerHTML = `
            <strong>${cliente.nombre}</strong><br>
            📞 ${cliente.telefono}<br>
            📍 ${cliente.direccion}<br>
            📝 ${cliente.notas}
        `;

        contenedor.appendChild(div);
    });
}

mostrarClientes();
</script>

</body>
</html>
