<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clientes</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0b0b;
  color:#fff;
}

.wrap{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

h1{
  color:#f39b2f;
}

input, textarea{
  width:100%;
  padding:10px;
  margin-bottom:8px;
  border-radius:10px;
  border:1px solid #333;
  background:#101010;
  color:#fff;
}

textarea{
  min-height:60px;
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.btn{
  background:#f39b2f;
  color:#111;
}

.card{
  background:#151515;
  border:1px solid #333;
  border-radius:12px;
  padding:12px;
  margin-top:10px;
}

.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}

.mini{
  font-size:12px;
  color:#aaa;
  cursor:pointer;
}

</style>
</head>

<body>

<div class="wrap">

<h1>Clientes</h1>

<input id="buscador" placeholder="Buscar cliente..." oninput="pintar()">

<hr>

<input id="nombre" placeholder="Nombre cliente">
<input id="empresa" placeholder="Empresa">
<input id="dni" placeholder="DNI / CIF">

<input id="telefono1" placeholder="Teléfono 1">
<input id="telefono2" placeholder="Teléfono 2">

<input id="email1" placeholder="Email 1">
<input id="email2" placeholder="Email 2">

<input id="direccion" placeholder="Dirección">

<textarea id="notas" placeholder="Notas"></textarea>

<button class="btn" onclick="crearCliente()">Crear cliente</button>

<hr>

<div id="lista"></div>

<button onclick="volver()" style="margin-top:20px;">Volver</button>

</div>

<script>

function getClientes(){
  return JSON.parse(localStorage.getItem("clientes")) || [];
}

function setClientes(data){
  localStorage.setItem("clientes", JSON.stringify(data));
}

// CREAR
function crearCliente(){

  const clientes = getClientes();

  const nuevo = {
    id: Date.now(),
    numero: clientes.length + 1,
    nombre: nombre.value,
    empresa: empresa.value,
    dni: dni.value,
    telefonos: [telefono1.value, telefono2.value].filter(t=>t),
    emails: [email1.value, email2.value].filter(e=>e),
    direccion: direccion.value,
    notas: notas.value
  };

  clientes.push(nuevo);
  setClientes(clientes);

  limpiar();
  pintar();
}

function limpiar(){
  document.querySelectorAll("input,textarea").forEach(el=>el.value="");
}

// ACCIONES

function llamar(tel){
  if(confirm("¿Llamar?")){
    window.location.href = "tel:" + tel;
  }
}

function whatsapp(tel){
  window.open("https://wa.me/" + tel);
}

function sms(tel){
  window.location.href = "sms:" + tel;
}

function emailAccion(mail){
  window.location.href = "mailto:" + mail;
}

function abrirMapa(dir){
  const url = encodeURIComponent(dir);

  const opcion = prompt("1 Google Maps\n2 Waze");

  if(opcion=="1"){
    window.open("https://www.google.com/maps/search/?api=1&query="+url);
  }
  if(opcion=="2"){
    window.open("https://waze.com/ul?q="+url);
  }
}

// LISTAR
function pintar(){

  const lista = document.getElementById("lista");
  lista.innerHTML="";

  const txt = buscador.value.toLowerCase();

  getClientes().forEach(c=>{

    if(!c.nombre.toLowerCase().includes(txt)) return;

    const div = document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <b>#${c.numero} - ${c.nombre}</b><br>
      ${c.empresa || ""}<br>
      ${c.dni || ""}<br><br>

      ${c.telefonos.map(t=>`
        <div class="mini">
          📞 ${t}
          <span onclick="llamar('${t}')">[Llamar]</span>
          <span onclick="whatsapp('${t}')">[WA]</span>
          <span onclick="sms('${t}')">[SMS]</span>
        </div>
      `).join("")}

      ${c.emails.map(e=>`
        <div class="mini" onclick="emailAccion('${e}')">
          📧 ${e}
        </div>
      `).join("")}

      <div class="mini" onclick="abrirMapa('${c.direccion}')">
        📍 ${c.direccion}
      </div>

      <div class="mini">
        📝 ${c.notas || ""}
      </div>

      <br>
      <button onclick="abrirCliente(${c.id})">Entrar</button>
    `;

    lista.appendChild(div);
  });
}

// SIGUIENTE PASO
function abrirCliente(id){
  localStorage.setItem("clienteActivo", id);
  alert("Siguiente: obras de este cliente");
}

// VOLVER
function volver(){
  window.location.href="app.html";
}

// INIT
pintar();

</script>

</body>
</html>
