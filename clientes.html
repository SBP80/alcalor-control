<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALLCALOR PRO</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b0b0b;
    color: white;
}

.header {
    padding: 15px;
    font-size: 20px;
    border-bottom: 2px solid orange;
}

.container {
    padding: 15px;
}

.btn {
    width: 100%;
    padding: 15px;
    background: orange;
    border: none;
    font-size: 18px;
    margin-bottom: 15px;
    cursor: pointer;
}

.cliente {
    background: #1a1a1a;
    padding: 15px;
    margin-bottom: 10px;
    border-radius: 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="header">ALLCALOR PRO</div>

<div class="container">

<button class="btn" onclick="nuevoCliente()">+ Nuevo cliente</button>

<div class="clientes"></div>

</div>

<script>

let clientes = JSON.parse(localStorage.getItem("clientes")) || [];

function guardar() {
    localStorage.setItem("clientes", JSON.stringify(clientes));
}

function nuevoCliente() {

    let nombre = prompt("Nombre del cliente:");
    if (!nombre) return;

    let telefono = prompt("Teléfono:");
    let direccion = prompt("Dirección:");
    let notas = prompt("Notas:");

    clientes.push({
        id: Date.now(),
        nombre,
        telefono,
        direccion,
        notas
    });

    guardar();
    mostrarClientes();
}

function mostrarClientes() {

    const contenedor = document.querySelector(".clientes");
    contenedor.innerHTML = "";

    clientes.forEach(cliente => {

        let div = document.createElement("div");
        div.className = "cliente";

        div.innerHTML = `
            <strong>${cliente.nombre}</strong><br>
            📞 ${cliente.telefono || ""}<br>
            📍 ${cliente.direccion || ""}<br>
            📝 ${cliente.notas || ""}
        `;

        div.onclick = () => abrirCliente(cliente.id);

        contenedor.appendChild(div);
    });
}

function abrirCliente(id) {
    localStorage.setItem("clienteActivo", id);
    window.location.href = "cliente.html";
}

mostrarClientes();

</script>

</body>
</html>
