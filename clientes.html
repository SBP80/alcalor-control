<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clientes</title>

<style>
:root{
    --bg:#0b0b0b;
    --panel:#141414;
    --line:#2a2a2a;
    --text:#ffffff;
    --muted:#bdbdbd;
    --accent:#f39b2f;
    --btnText:#111111;
    --danger:#b30000;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
}

/* HEADER */
.header {
    padding: 12px 15px;
    border-bottom: 2px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.header-titulo-wrap{
    flex:1;
    text-align:center;
}

.header-titulo {
    font-size: 20px;
    font-weight: bold;
    color: var(--accent);
}

.header-subtitulo{
    font-size:11px;
    color:var(--muted);
}

.header-btn {
    background: var(--accent);
    border: none;
    color: var(--btnText);
    font-weight: bold;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 15px;
    cursor: pointer;
}

/* CONTENIDO */
.wrap {
    padding: 10px;
}

.info, .mensaje {
    margin-bottom: 10px;
    padding: 10px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 8px;
}

.mensaje { display:none; }

.input-busqueda {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border:1px solid var(--line);
    background:#101010;
    color:white;
    margin-bottom:10px;
}

/* CLIENTES */
.cliente {
    background: #1a1a1a;
    padding: 15px;
    margin-bottom: 10px;
    border-radius: 10px;
    border: 1px solid #252525;
    cursor: pointer;
    position:relative;
}

.nombre {
    font-size: 18px;
    font-weight: bold;
}

.eliminar {
    position: absolute;
    right: 10px;
    top: 10px;
    background: var(--danger);
    border: none;
    color: white;
    padding: 6px 10px;
    border-radius:6px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
    <button class="header-btn" id="btnVolver">Volver</button>

    <div class="header-titulo-wrap">
        <div class="header-titulo">Clientes</div>
        <div class="header-subtitulo">Gestión</div>
    </div>

    <button class="header-btn" onclick="toggleTools()">Menú</button>
</div>

<div class="wrap">

    <div id="mensaje" class="mensaje"></div>
    <div id="info" class="info"></div>

    <input id="busqueda" class="input-busqueda" placeholder="Buscar..." oninput="mostrarClientes()">

    <div id="listaClientes"></div>

</div>

<script>
const btnVolver = document.getElementById("btnVolver");
const lista = document.getElementById("listaClientes");
const input = document.getElementById("busqueda");
const info = document.getElementById("info");
const mensaje = document.getElementById("mensaje");

let clientes = JSON.parse(localStorage.getItem("clientes")) || [];

btnVolver.addEventListener("click", () => {
    window.location.replace("index.html");
});

function toggleTools(){}

function guardar(){
    localStorage.setItem("clientes", JSON.stringify(clientes));
}

function mostrarMensaje(t){
    mensaje.textContent = t;
    mensaje.style.display="block";
    setTimeout(()=>mensaje.style.display="none",2000);
}

function eliminar(id){
    if(!confirm("Eliminar cliente?")) return;
    clientes = clientes.filter(c=>c.id!==id);
    guardar();
    mostrarClientes();
}

function mostrarClientes(){
    lista.innerHTML="";
    const txt = input.value.toLowerCase();

    const filtrados = clientes.filter(c =>
        (c.nombre||"").toLowerCase().includes(txt)
    );

    info.textContent = "Total: "+clientes.length+" | Mostrados: "+filtrados.length;

    filtrados.forEach(c=>{
        const div = document.createElement("div");
        div.className="cliente";

        div.innerHTML = `
            <button class="eliminar">X</button>
            <div class="nombre">${c.nombre || ""}</div>
        `;

        div.onclick=()=>{
            localStorage.setItem("clienteActivo",c.id);
            location.href="cliente.html";
        };

        div.querySelector(".eliminar").onclick=(e)=>{
            e.stopPropagation();
            eliminar(c.id);
        };

        lista.appendChild(div);
    });
}

mostrarClientes();
</script>

</body>
</html>
