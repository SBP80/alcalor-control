<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALLCALOR PRO</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
}

.header {
    padding: 15px;
    font-size: 22px;
    border-bottom: 2px solid orange;
}

.container {
    padding: 15px;
}

.btn {
    width: 100%;
    padding: 15px;
    background: orange;
    border: none;
    font-weight: bold;
    font-size: 18px;
    cursor: pointer;
}

.clientes {
    margin-top: 20px;
}

.cliente {
    background: #1c1c1c;
    padding: 15px;
    border-bottom: 1px solid #333;
    border-radius: 5px;
    margin-bottom: 10px;
}
</style>

</head>

<body>

<div class="header">
    ALLCALOR PRO
</div>

<div class="container">

    <button class="btn" onclick="nuevoCliente()">+ Nuevo cliente</button>

    <div class="clientes" id="listaClientes"></div>

</div>

<script>
let clientes = [];

function nuevoCliente() {
    let nombre = prompt("Nombre del cliente:");

    if (nombre && nombre.trim() !== "") {
        clientes.push(nombre);
        mostrarClientes();
    }
}

function mostrarClientes() {
    const contenedor = document.getElementById("listaClientes");
    contenedor.innerHTML = "";

    clientes.forEach(cliente => {
        const div = document.createElement("div");
        div.className = "cliente";
        div.textContent = cliente;
        contenedor.appendChild(div);
    });
}
</script>

</body>
</html>
