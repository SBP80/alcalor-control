<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ALLCALOR - Plano Suelo Radiante</title>

<style>
body {
font-family: Arial;
background:#0f172a;
color:white;
margin:0;
}

header{
background:#1e293b;
padding:15px;
text-align:center;
font-weight:bold;
}

.container{
padding:20px;
max-width:1000px;
margin:auto;
}

input, select{
width:100%;
padding:8px;
margin:6px 0 12px 0;
border-radius:5px;
border:none;
}

button{
background:#2563eb;
color:white;
border:none;
padding:10px 20px;
border-radius:5px;
cursor:pointer;
}

canvas{
background:white;
margin-top:20px;
border-radius:8px;
}
</style>
</head>

<body>

<header>
ALLCALOR - GENERADOR DE PLANO SUELO RADIANTE
</header>

<div class="container">

<label>Largo estancia (m)</label>
<input type="number" id="largo" step="0.1">

<label>Ancho estancia (m)</label>
<input type="number" id="ancho" step="0.1">

<label>Separación (cm)</label>
<select id="paso">
<option value="10">10 cm</option>
<option value="15">15 cm</option>
<option value="20">20 cm</option>
</select>

<label>Tipo de trazado</label>
<select id="tipo">
<option value="serpentina">Serpentina</option>
<option value="espiral">Espiral</option>
<option value="espina">Espina de pez</option>
</select>

<button onclick="generarPlano()">Generar plano</button>

<canvas id="plano" width="800" height="600"></canvas>

</div>
