<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>🔥 ALLCALOR PRO</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f2b44;
color:white;
padding:10px;
}

h1{
text-align:center;
margin-bottom:10px;
}

.toolbar{
background:#12314a;
padding:10px;
border-radius:8px;
margin-bottom:10px;
display:flex;
gap:8px;
flex-wrap:wrap;
}

button{
border:none;
padding:8px 12px;
border-radius:5px;
font-weight:bold;
cursor:pointer;
}

.green{background:#28a745}
.blue{background:#2b83ff}
.orange{background:#ff9800}
.red{background:#e53935}
.gray{background:#555}

#layout{
display:flex;
gap:10px;
}

#panel{
width:220px;
background:#12314a;
padding:10px;
border-radius:8px;
}

canvas{
background:#f4f1e8;
border-radius:8px;
cursor:crosshair;
}

#hud{
position:absolute;
background:rgba(0,0,0,0.7);
padding:4px 8px;
border-radius:6px;
font-weight:bold;
font-size:14px;
pointer-events:none;
}

</style>
</head>

<body>

<h1>🔥 ALLCALOR PRO</h1>

<div class="toolbar">

Escala
<input id="scale" type="number" value="100" style="width:70px">

<button class="green" onclick="newRoom()">Nueva estancia</button>
<button class="blue" onclick="closeRoom()">Cerrar estancia</button>
<button class="orange" onclick="undo()">Deshacer</button>
<button class="red" onclick="reset()">Reiniciar</button>

<button class="gray" onclick="zoom(1.2)">Zoom +</button>
<button class="gray" onclick="zoom(0.8)">Zoom -</button>
<button class="gray" onclick="centerView()">Centrar</button>

</div>

<div id="layout">

<div id="panel">
<b>ESTANCIAS</b>
<div id="rooms"></div>
<hr>
<div id="total"></div>
</div>

<div style="position:relative">

<div id="hud">0 m | 0°</div>

<canvas id="canvas" width="1100" height="650"></canvas>

</div>

</div>

<script>

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")
const hud=document.getElementById("hud")

let rooms=[]
let current=[]
let drawing=true

let mouse={x:0,y:0}

let dragVertex=null
let dragRoom=null

let zoomLevel=1
let offsetX=0
let offsetY=0

function scale(){
return parseFloat(document.getElementById("scale").value)
}

function worldToScreen(x,y){

return{
x:(x*scale()*zoomLevel)+offsetX,
y:(y*scale()*zoomLevel)+offsetY
}

}

function screenToWorld(x,y){

return{
x:(x-offsetX)/(scale()*zoomLevel),
y:(y-offsetY)/(scale()*zoomLevel)
}

}

canvas.addEventListener("mousemove",move)
canvas.addEventListener("mousedown",start)
canvas.addEventListener("mouseup",end)

function getMouse(e){

const r=canvas.getBoundingClientRect()

return screenToWorld(
e.clientX-r.left,
e.clientY-r.top
)

}

function start(e){

let p=getMouse(e)

mouse=p

if(drawing){

current.push({x:p.x,y:p.y})
draw()
return

}

for(let r of rooms){

for(let v of r.v){

if(Math.hypot(v.x-p.x,v.y-p.y)<0.1){

dragVertex=v
return

}

}

}

for(let r of rooms){

if(pointInside(p,r.v)){

dragRoom={room:r,start:p}
return

}

}

}

function move(e){

const rect=canvas.getBoundingClientRect()

let p=getMouse(e)

mouse=p

hud.style.left=(e.clientX-rect.left+15)+"px"
hud.style.top=(e.clientY-rect.top+15)+"px"

if(dragVertex){

dragVertex.x=p.x
dragVertex.y=p.y

updatePanel()
draw()
return

}

if(dragRoom){

let dx=p.x-dragRoom.start.x
let dy=p.y-dragRoom.start.y

dragRoom.start=p

for(let v of dragRoom.room.v){

v.x+=dx
v.y+=dy

}

updatePanel()
draw()
return

}

draw()

}

function end(){

dragVertex=null
dragRoom=null

}

function zoom(f){

zoomLevel*=f
draw()

}

function centerView(){

zoomLevel=1
offsetX=0
offsetY=0
draw()

}

function newRoom(){

drawing=true
current=[]

}

function closeRoom(){

if(current.length<3)return

let name=prompt("Nombre estancia")

rooms.push({
name:name||"estancia",
v:[...current]
})

drawing=false
current=[]

updatePanel()
draw()

}

function undo(){

current.pop()
draw()

}

function reset(){

rooms=[]
current=[]
drawing=true

updatePanel()
draw()

}

function area(poly){

let sum=0

for(let i=0;i<poly.length;i++){

let j=(i+1)%poly.length

sum+=poly[i].x*poly[j].y
sum-=poly[j].x*poly[i].y

}

return Math.abs(sum/2)

}

function perimeter(poly){

let p=0

for(let i=0;i<poly.length;i++){

let j=(i+1)%poly.length

p+=Math.hypot(
poly[j].x-poly[i].x,
poly[j].y-poly[i].y)

}

return p

}

function updatePanel(){

let html=""
let total=0

for(let r of rooms){

let a=area(r.v)
let p=perimeter(r.v)

total+=a

html+=`
<div>
<b>${r.name}</b><br>
Área: ${a.toFixed(2)} m²<br>
Perímetro: ${p.toFixed(2)} m
</div><br>
`

}

document.getElementById("rooms").innerHTML=html
document.getElementById("total").innerHTML="Total: "+total.toFixed(2)+" m²"

}

function angle(a,b,c){

let ang=Math.atan2(c.y-b.y,c.x-b.x)-
Math.atan2(a.y-b.y,a.x-b.x)

ang=Math.abs(ang*180/Math.PI)

if(ang>180)ang=360-ang

return ang

}

function pointInside(p,poly){

let inside=false

for(let i=0,j=poly.length-1;i<poly.length;j=i++){

let xi=poly[i].x,yi=poly[i].y
let xj=poly[j].x,yj=poly[j].y

let intersect=((yi>p.y)!=(yj>p.y)) &&
(p.x<(xj-xi)*(p.y-yi)/(yj-yi)+xi)

if(intersect)inside=!inside

}

return inside

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

for(let r of rooms){

ctx.beginPath()

let p=worldToScreen(r.v[0].x,r.v[0].y)

ctx.moveTo(p.x,p.y)

for(let i=1;i<r.v.length;i++){

let q=worldToScreen(r.v[i].x,r.v[i].y)

ctx.lineTo(q.x,q.y)

}

ctx.closePath()

ctx.fillStyle="rgba(0,120,255,0.2)"
ctx.fill()

ctx.strokeStyle="#2b83ff"
ctx.lineWidth=2
ctx.stroke()

for(let v of r.v){

let p=worldToScreen(v.x,v.y)

ctx.beginPath()
ctx.arc(p.x,p.y,5,0,Math.PI*2)
ctx.fillStyle="red"
ctx.fill()

}

for(let i=0;i<r.v.length;i++){

let j=(i+1)%r.v.length

let mx=(r.v[i].x+r.v[j].x)/2
let my=(r.v[i].y+r.v[j].y)/2

let d=Math.hypot(
r.v[j].x-r.v[i].x,
r.v[j].y-r.v[i].y)

let p=worldToScreen(mx,my)

ctx.fillStyle="black"
ctx.fillText(d.toFixed(2)+" m",p.x,p.y)

}

for(let i=0;i<r.v.length;i++){

let prev=r.v[(i-1+r.v.length)%r.v.length]
let cur=r.v[i]
let next=r.v[(i+1)%r.v.length]

let ang=angle(prev,cur,next)

let p=worldToScreen(cur.x,cur.y)

ctx.fillStyle="orange"
ctx.fillText(ang.toFixed(0)+"°",p.x+6,p.y-6)

}

}

if(current.length){

let last=current[current.length-1]

let dist=Math.hypot(mouse.x-last.x,mouse.y-last.y)

let ang=0

if(current.length>1){

let prev=current[current.length-2]
ang=angle(prev,last,mouse)

}

hud.innerText=dist.toFixed(2)+" m | "+ang.toFixed(1)+"°"

let p1=worldToScreen(last.x,last.y)
let p2=worldToScreen(mouse.x,mouse.y)

ctx.beginPath()
ctx.moveTo(p1.x,p1.y)
ctx.lineTo(p2.x,p2.y)

ctx.setLineDash([6,6])
ctx.strokeStyle="#444"
ctx.stroke()
ctx.setLineDash([])

}

}

draw()

</script>

</body>
</html>
