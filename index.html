<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ALLCALOR PRO</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f2238;
color:white;
}

header{
text-align:center;
padding:14px;
font-size:24px;
font-weight:bold;
}

#toolbar{
display:flex;
gap:10px;
padding:10px;
background:#162f4d;
align-items:center;
}

button{
border:none;
padding:8px 12px;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

.green{background:#4caf50}
.blue{background:#3498db}
.orange{background:#ff9800}
.red{background:#e53935}
.gray{background:#ddd}

#container{
display:flex;
height:calc(100vh - 90px);
}

#panel{
width:220px;
background:#17395d;
padding:10px;
}

#canvasBox{
flex:1;
background:#e6e6e6;
position:relative;
}

canvas{
background:white;
}

#measure{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
background:#111;
color:#0f0;
padding:6px 10px;
border-radius:4px;
font-size:14px;
}

</style>
</head>

<body>

<header>🔥 ALLCALOR PRO</header>

<div id="toolbar">

Escala <input id="scaleInput" type="number" value="100" style="width:70px">

<button class="green" onclick="newRoom()">Nueva estancia</button>
<button class="blue" onclick="closeRoom()">Cerrar estancia</button>
<button class="orange" onclick="undo()">Deshacer</button>
<button class="red" onclick="resetAll()">Reiniciar</button>

<button class="gray" onclick="zoomIn()">+</button>
<button class="gray" onclick="zoomOut()">-</button>
<button class="gray" onclick="togglePan()">✋</button>

</div>

<div id="container">

<div id="panel">
<h3>ESTANCIAS</h3>
<div id="roomList"></div>
</div>

<div id="canvasBox">

<div id="measure">0 m | 0°</div>

<canvas id="canvas"></canvas>

</div>

</div>

<script>

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth-220
canvas.height=window.innerHeight-100

let rooms=[]
let currentRoom=null

let mouse={x:0,y:0}

let zoom=1
let offsetX=0
let offsetY=0

let panMode=false
let panning=false

const measure=document.getElementById("measure")

canvas.addEventListener("mousemove",e=>{

const rect=canvas.getBoundingClientRect()

mouse.x=(e.clientX-rect.left-offsetX)/zoom
mouse.y=(e.clientY-rect.top-offsetY)/zoom

if(panning){

offsetX+=e.movementX
offsetY+=e.movementY
draw()
return

}

if(currentRoom && currentRoom.points.length>0){

let last=currentRoom.points[currentRoom.points.length-1]

let dx=mouse.x-last.x
let dy=mouse.y-last.y

let dist=Math.sqrt(dx*dx+dy*dy)/100
let ang=Math.atan2(dy,dx)*180/Math.PI

measure.innerText=dist.toFixed(2)+" m | "+ang.toFixed(1)+"°"

}

draw()

})

canvas.addEventListener("mousedown",e=>{

if(panMode){

panning=true
return

}

if(!currentRoom)return

currentRoom.points.push({x:mouse.x,y:mouse.y})

draw()

})

canvas.addEventListener("mouseup",()=>{

panning=false

})

function newRoom(){

let name=prompt("Nombre estancia")

if(!name)return

currentRoom={

name:name,
points:[]

}

rooms.push(currentRoom)

updateList()

}

function closeRoom(){

currentRoom=null
draw()

}

function undo(){

if(currentRoom && currentRoom.points.length>0){

currentRoom.points.pop()
draw()

}

}

function resetAll(){

rooms=[]
currentRoom=null
updateList()
draw()

}

function zoomIn(){

zoom*=1.2
draw()

}

function zoomOut(){

zoom/=1.2
draw()

}

function togglePan(){

panMode=!panMode

}

function updateList(){

let list=document.getElementById("roomList")

list.innerHTML=""

rooms.forEach(r=>{

let div=document.createElement("div")
div.innerText=r.name
list.appendChild(div)

})

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.save()

ctx.translate(offsetX,offsetY)
ctx.scale(zoom,zoom)

rooms.forEach(room=>{

let pts=room.points

if(pts.length<2)return

ctx.beginPath()

ctx.moveTo(pts[0].x,pts[0].y)

for(let i=1;i<pts.length;i++){

ctx.lineTo(pts[i].x,pts[i].y)

}

ctx.strokeStyle="#2196f3"
ctx.lineWidth=2
ctx.stroke()

pts.forEach(p=>{

ctx.beginPath()
ctx.arc(p.x,p.y,5,0,Math.PI*2)
ctx.fillStyle="red"
ctx.fill()

})

for(let i=0;i<pts.length-1;i++){

let a=pts[i]
let b=pts[i+1]

let mx=(a.x+b.x)/2
let my=(a.y+b.y)/2

let dist=Math.hypot(b.x-a.x,b.y-a.y)/100

ctx.fillStyle="black"
ctx.fillRect(mx-30,my-10,60,20)

ctx.fillStyle="#0f0"
ctx.fillText(dist.toFixed(2)+" m",mx-25,my+5)

}

})

if(currentRoom && currentRoom.points.length>0){

let last=currentRoom.points[currentRoom.points.length-1]

ctx.beginPath()
ctx.moveTo(last.x,last.y)
ctx.lineTo(mouse.x,mouse.y)

ctx.setLineDash([6,6])
ctx.stroke()
ctx.setLineDash([])

}

ctx.restore()

}

draw()

</script>

</body>
</html>
