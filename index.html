<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ALLCALOR PRO</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f2b44;
color:white;
}

header{
background:#1b1b1b;
padding:12px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.toolbar{
background:#173a5e;
padding:10px;
}

button{
border:none;
padding:6px 12px;
margin-right:6px;
border-radius:4px;
cursor:pointer;
font-weight:bold;
}

.green{background:#28a745}
.blue{background:#2b83ff}
.orange{background:#ff9800}
.red{background:#e53935}
.yellow{background:#ffc107;color:black}
.purple{background:#7e57c2}

#layout{
display:flex;
}

#panel{
width:230px;
background:#1c3f63;
padding:10px;
}

canvas{
background:#f4f1e8;
cursor:crosshair;
}

</style>
</head>

<body>

<header>🔥 ALLCALOR PRO</header>

<div class="toolbar">

Escala px/m
<input id="scale" type="number" value="100" style="width:60px">

<button class="green" onclick="newRoom()">Nueva estancia</button>
<button class="blue" onclick="closeRoom()">Cerrar estancia</button>

<button class="yellow" onclick="addDoor()">Puerta</button>
<button class="yellow" onclick="addWindow()">Ventana</button>
<button class="yellow" onclick="addCollector()">Colector</button>

<button class="orange" onclick="undo()">Deshacer</button>
<button class="red" onclick="resetAll()">Reiniciar</button>

<button class="yellow" onclick="zoomIn()">+</button>
<button class="yellow" onclick="zoomOut()">-</button>
<button class="yellow" onclick="centerView()">Centrar</button>

</div>

<div id="layout">

<div id="panel">

<h3>Estancias</h3>

<div id="rooms"></div>

<hr>

Total: <span id="totalArea">0</span> m²

</div>

<canvas id="canvas" width="1200" height="700"></canvas>

</div>

<script>

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

const scaleInput=document.getElementById("scale")

let scale=100

let camera={x:0,y:0,zoom:1}

let rooms=[]
let current=[]
let drawing=false

let doors=[]
let windows=[]
let collectors=[]

let mouse={x:0,y:0}

let dragVertex=null
let dragRoom=null
let dragElement=null

let mode="draw"

function dist(a,b){
return Math.hypot(a.x-b.x,a.y-b.y)
}

function polygonArea(v){

let sum=0

for(let i=0;i<v.length;i++){
let j=(i+1)%v.length
sum+=v[i].x*v[j].y-v[j].x*v[i].y
}

return Math.abs(sum/2)/(scale*scale)

}

function perimeter(v){

let p=0

for(let i=0;i<v.length;i++){
let j=(i+1)%v.length
p+=dist(v[i],v[j])
}

return p/scale

}

function centroid(v){

let x=0
let y=0

for(let p of v){
x+=p.x
y+=p.y
}

return {x:x/v.length,y:y/v.length}

}

function screenToWorld(p){

return{
x:(p.x-camera.x)/camera.zoom,
y:(p.y-camera.y)/camera.zoom
}

}

canvas.onmousedown=e=>{

scale=parseFloat(scaleInput.value)

let r=canvas.getBoundingClientRect()

let p=screenToWorld({
x:e.clientX-r.left,
y:e.clientY-r.top
})

mouse=p

if(mode==="door"){
doors.push({x:p.x,y:p.y})
mode="draw"
draw()
return
}

if(mode==="window"){
windows.push({x:p.x,y:p.y})
mode="draw"
draw()
return
}

if(mode==="collector"){
collectors.push({x:p.x,y:p.y})
mode="draw"
draw()
return
}

if(drawing){

current.push(p)
draw()
return

}

for(let room of rooms){

for(let v of room.v){

if(dist(v,p)<10){
dragVertex=v
return
}

}

}

for(let d of doors){
if(dist(d,p)<10){dragElement=d;return}
}

for(let w of windows){
if(dist(w,p)<10){dragElement=w;return}
}

for(let c of collectors){
if(dist(c,p)<10){dragElement=c;return}
}

}

canvas.onmousemove=e=>{

let r=canvas.getBoundingClientRect()

let p=screenToWorld({
x:e.clientX-r.left,
y:e.clientY-r.top
})

mouse=p

if(dragVertex){

dragVertex.x=p.x
dragVertex.y=p.y

draw()
updateRooms()

return

}

if(dragElement){

dragElement.x=p.x
dragElement.y=p.y

draw()

}

draw()

}

canvas.onmouseup=()=>{

dragVertex=null
dragElement=null

}

function newRoom(){

drawing=true
current=[]

}

function closeRoom(){

if(current.length<3) return

let nombre=prompt("Nombre de la estancia","Salón")

rooms.push({
name:nombre,
v:[...current]
})

current=[]
drawing=false

updateRooms()
draw()

}

function addDoor(){
mode="door"
}

function addWindow(){
mode="window"
}

function addCollector(){
mode="collector"
}

function undo(){
current.pop()
draw()
}

function resetAll(){

rooms=[]
current=[]
doors=[]
windows=[]
collectors=[]

updateRooms()
draw()

}

function zoomIn(){
camera.zoom*=1.2
draw()
}

function zoomOut(){
camera.zoom/=1.2
draw()
}

function centerView(){

camera.x=0
camera.y=0
camera.zoom=1

draw()

}

function updateRooms(){

let div=document.getElementById("rooms")
div.innerHTML=""

let total=0

for(let r of rooms){

let area=polygonArea(r.v)
let per=perimeter(r.v)

total+=area

let d=document.createElement("div")

d.innerHTML="<b>"+r.name+"</b><br>"+
"Área: "+area.toFixed(2)+" m²<br>"+
"Perímetro: "+per.toFixed(2)+" m"

d.style.marginBottom="10px"

div.appendChild(d)

}

document.getElementById("totalArea").innerText=total.toFixed(2)

}

function draw(){

ctx.setTransform(camera.zoom,0,0,camera.zoom,camera.x,camera.y)

ctx.clearRect(-10000,-10000,20000,20000)

ctx.lineWidth=2

for(let r of rooms){

ctx.beginPath()

for(let i=0;i<r.v.length;i++){

let p=r.v[i]

if(i==0) ctx.moveTo(p.x,p.y)
else ctx.lineTo(p.x,p.y)

}

ctx.closePath()

ctx.fillStyle="rgba(0,150,255,0.2)"
ctx.fill()

ctx.strokeStyle="#4aa3ff"
ctx.stroke()

for(let v of r.v){

ctx.beginPath()
ctx.arc(v.x,v.y,5,0,Math.PI*2)
ctx.fillStyle="red"
ctx.fill()

}

let c=centroid(r.v)

ctx.fillStyle="black"
ctx.fillText(r.name,c.x-20,c.y)

}

for(let d of doors){

ctx.fillStyle="brown"
ctx.fillRect(d.x-10,d.y-3,20,6)

}

for(let w of windows){

ctx.fillStyle="cyan"
ctx.fillRect(w.x-10,w.y-3,20,6)

}

for(let c of collectors){

ctx.fillStyle="purple"
ctx.beginPath()
ctx.arc(c.x,c.y,8,0,Math.PI*2)
ctx.fill()

}

if(current.length){

ctx.beginPath()

for(let i=0;i<current.length;i++){

let p=current[i]

if(i==0) ctx.moveTo(p.x,p.y)
else ctx.lineTo(p.x,p.y)

}

ctx.lineTo(mouse.x,mouse.y)

ctx.stroke()

}

}

draw()

</script>

</body>
</html>
