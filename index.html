<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ALLCALOR CONTROL</title>

<style>

body{
margin:0;
background:#1e1e1e;
font-family:Arial;
overflow:hidden;
color:white;
}

#toolbar{
height:60px;
background:#2b2b2b;
display:flex;
align-items:center;
gap:10px;
padding:10px;
}

button{
padding:8px 14px;
background:#444;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#666;
}

canvas{
display:block;
background:#111;
}

#info{
position:absolute;
right:10px;
top:70px;
background:#2b2b2b;
padding:10px;
border-radius:8px;
font-size:13px;
}

</style>
</head>

<body>

<div id="toolbar">

<button id="newRoom">Nueva estancia</button>
<button id="closeRoom">Cerrar estancia</button>
<button id="reset">Reset</button>

</div>

<canvas id="canvas"></canvas>

<div id="info">
<div id="cursor"></div>
</div>

<script>

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight-60

let scale=1
let offsetX=0
let offsetY=0

const GRID=100

let rooms=[]
let drawing=false
let currentRoom=null

let mouse={x:0,y:0}

function screenToWorld(x,y){

return{
x:(x-offsetX)/scale,
y:(y-offsetY)/scale
}

}

function worldToScreen(x,y){

return{
x:x*scale+offsetX,
y:y*scale+offsetY
}

}

canvas.addEventListener("mousemove",e=>{

let pos=screenToWorld(e.offsetX,e.offsetY)

mouse.x=Math.round(pos.x/GRID)*GRID
mouse.y=Math.round(pos.y/GRID)*GRID

})

canvas.addEventListener("click",e=>{

if(!drawing)return

currentRoom.points.push({x:mouse.x,y:mouse.y})

})

document.getElementById("newRoom").onclick=()=>{

let name=prompt("Nombre estancia")

currentRoom={
name:name,
points:[]
}

rooms.push(currentRoom)
drawing=true

}

document.getElementById("closeRoom").onclick=()=>{

drawing=false

}

document.getElementById("reset").onclick=()=>{

rooms=[]
drawing=false

}

canvas.addEventListener("wheel",e=>{

let zoom=e.deltaY<0?1.1:0.9

scale*=zoom

})

let dragging=false

canvas.addEventListener("mousedown",e=>{

if(e.button===1 || e.spaceKey){

dragging=true

}

})

canvas.addEventListener("mouseup",()=>{

dragging=false

})

canvas.addEventListener("mousemove",e=>{

if(dragging){

offsetX+=e.movementX
offsetY+=e.movementY

}

})

function drawGrid(){

let step=GRID*scale

for(let x=offsetX%step;x<canvas.width;x+=step){

ctx.strokeStyle="#222"

ctx.beginPath()
ctx.moveTo(x,0)
ctx.lineTo(x,canvas.height)
ctx.stroke()

}

for(let y=offsetY%step;y<canvas.height;y+=step){

ctx.beginPath()
ctx.moveTo(0,y)
ctx.lineTo(canvas.width,y)
ctx.stroke()

}

}

function drawRooms(){

rooms.forEach(room=>{

ctx.strokeStyle="#00ffaa"
ctx.lineWidth=2

ctx.beginPath()

room.points.forEach((p,i)=>{

let s=worldToScreen(p.x,p.y)

if(i===0)ctx.moveTo(s.x,s.y)
else ctx.lineTo(s.x,s.y)

})

ctx.stroke()

})

}

function drawPreview(){

if(!drawing)return
if(currentRoom.points.length===0)return

let last=currentRoom.points[currentRoom.points.length-1]

let a=worldToScreen(last.x,last.y)
let b=worldToScreen(mouse.x,mouse.y)

ctx.strokeStyle="#ffaa00"

ctx.beginPath()
ctx.moveTo(a.x,a.y)
ctx.lineTo(b.x,b.y)
ctx.stroke()

let dx=mouse.x-last.x
let dy=mouse.y-last.y

let length=Math.sqrt(dx*dx+dy*dy)/1000
let angle=Math.atan2(dy,dx)*180/Math.PI

document.getElementById("cursor").innerText=
length.toFixed(2)+" m | "+angle.toFixed(1)+"°"

}

function render(){

ctx.clearRect(0,0,canvas.width,canvas.height)

drawGrid()
drawRooms()
drawPreview()

requestAnimationFrame(render)

}

render()

</script>

</body>
</html>
