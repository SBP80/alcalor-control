<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ALLCALOR PRO</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f2b44;
color:white;
padding:10px;
}

h1{text-align:center}

.toolbar{
background:#12314a;
padding:10px;
border-radius:8px;
margin-bottom:10px;
display:flex;
gap:8px;
flex-wrap:wrap;
}

button{
border:none;
padding:8px 12px;
border-radius:5px;
font-weight:bold;
cursor:pointer;
}

.green{background:#28a745}
.blue{background:#2b83ff}
.orange{background:#ff9800}
.red{background:#e53935}
.zoom{background:#ffb300;color:black}

#layout{
display:flex;
gap:10px;
}

#panel{
width:220px;
background:#12314a;
padding:10px;
border-radius:8px;
}

canvas{
background:#f4f1e8;
border-radius:8px;
cursor:crosshair;
}

#hud{
position:absolute;
background:rgba(0,0,0,0.75);
padding:4px 10px;
border-radius:6px;
font-weight:bold;
font-size:14px;
pointer-events:none;
}

</style>
</head>

<body>

<h1>🔥 ALLCALOR PRO</h1>

<div class="toolbar">

Escala
<input id="scale" type="number" value="100" style="width:70px">

<button class="green" onclick="newRoom()">Nueva estancia</button>
<button class="blue" onclick="closeRoom()">Cerrar estancia</button>
<button class="orange" onclick="undo()">Deshacer</button>
<button class="red" onclick="reset()">Reiniciar</button>

<button class="zoom" onclick="zoomIn()">Zoom +</button>
<button class="zoom" onclick="zoomOut()">Zoom -</button>
<button class="zoom" onclick="centerView()">Centrar</button>

</div>

<div id="layout">

<div id="panel">
<b>ESTANCIAS</b>
<div id="rooms"></div>
<hr>
<div id="total"></div>
</div>

<div style="position:relative">

<div id="hud"></div>

<canvas id="canvas" width="1100" height="650"></canvas>

</div>

</div>

<script>

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")
const hud=document.getElementById("hud")

let rooms=[]
let current=[]
let drawing=true

let mouse={x:0,y:0}

let dragVertex=null
let dragRoom=null
let dragStart=null

let zoom=1
let offsetX=0
let offsetY=0

function scale(){
return parseFloat(document.getElementById("scale").value)
}

function screenToWorld(x,y){

const rect=canvas.getBoundingClientRect()

return{
x:(x-rect.left-offsetX)/(scale()*zoom),
y:(y-rect.top-offsetY)/(scale()*zoom)
}

}

canvas.addEventListener("mousemove",move)
canvas.addEventListener("mousedown",start)
canvas.addEventListener("mouseup",end)

function start(e){

let p=screenToWorld(e.clientX,e.clientY)
mouse=p

if(drawing){

current.push({x:p.x,y:p.y})
draw()
return

}

for(let r of rooms){

for(let i=0;i<r.v.length;i++){

let v=r.v[i]

if(Math.hypot(v.x-p.x,v.y-p.y)<0.1){

dragVertex={room:r,index:i}
return

}

}

if(pointInPolygon(p,r.v)){

dragRoom=r
dragStart=p
return

}

}

}

function move(e){

let p=screenToWorld(e.clientX,e.clientY)
mouse=p

const rect=canvas.getBoundingClientRect()

hud.style.left=(e.clientX-rect.left+15)+"px"
hud.style.top=(e.clientY-rect.top+15)+"px"

if(dragVertex){

let r=dragVertex.room
let i=dragVertex.index

r.v[i].x=p.x
r.v[i].y=p.y

let prev=r.v[(i-1+r.v.length)%r.v.length]
let next=r.v[(i+1)%r.v.length]

let d1=Math.hypot(prev.x-r.v[i].x,prev.y-r.v[i].y)
let d2=Math.hypot(next.x-r.v[i].x,next.y-r.v[i].y)

let ang=angle(prev,r.v[i],next)

hud.innerText=d1.toFixed(2)+" m | "+d2.toFixed(2)+" m | "+ang.toFixed(1)+"°"

draw()
return
}

if(dragRoom){

let dx=p.x-dragStart.x
let dy=p.y-dragStart.y

for(let v of dragRoom.v){

v.x+=dx
v.y+=dy

}

dragStart=p
draw()
return

}

draw()

}

function end(){
dragVertex=null
dragRoom=null
}

function zoomIn(){

zoom*=1.2
draw()

}

function zoomOut(){

zoom/=1.2
draw()

}

function centerView(){

zoom=1
offsetX=0
offsetY=0

draw()

}

function newRoom(){

drawing=true
current=[]

}

function closeRoom(){

if(current.length<3)return

let name=prompt("Nombre de la estancia")

if(!name)name="Estancia"

rooms.push({
name:name,
v:[...current]
})

drawing=false
current=[]

updatePanel()
draw()

}

function undo(){

current.pop()
draw()

}

function reset(){

rooms=[]
current=[]
drawing=true

updatePanel()
draw()

}

function angle(a,b,c){

let ang=Math.atan2(c.y-b.y,c.x-b.x)-Math.atan2(a.y-b.y,a.x-b.x)

ang=Math.abs(ang*180/Math.PI)

if(ang>180)ang=360-ang

return ang

}

function draw(){

ctx.setTransform(zoom,0,0,zoom,offsetX,offsetY)

ctx.clearRect(-offsetX/zoom,-offsetY/zoom,canvas.width/zoom,canvas.height/zoom)

for(let r of rooms){

let poly=r.v

ctx.beginPath()
ctx.moveTo(poly[0].x*scale(),poly[0].y*scale())

for(let i=1;i<poly.length;i++)
ctx.lineTo(poly[i].x*scale(),poly[i].y*scale())

ctx.closePath()

ctx.fillStyle="rgba(0,120,255,0.2)"
ctx.fill()

ctx.strokeStyle="#2b83ff"
ctx.lineWidth=2
ctx.stroke()

for(let v of poly){

ctx.beginPath()
ctx.arc(v.x*scale(),v.y*scale(),5,0,Math.PI*2)
ctx.fillStyle="red"
ctx.fill()

}

for(let i=0;i<poly.length;i++){

let j=(i+1)%poly.length

let dist=Math.hypot(poly[j].x-poly[i].x,poly[j].y-poly[i].y)

let mx=(poly[i].x+poly[j].x)/2
let my=(poly[i].y+poly[j].y)/2

ctx.fillStyle="black"
ctx.fillText(dist.toFixed(2)+" m",mx*scale(),my*scale())

}

for(let i=0;i<poly.length;i++){

let prev=poly[(i-1+poly.length)%poly.length]
let cur=poly[i]
let next=poly[(i+1)%poly.length]

let ang=angle(prev,cur,next)

ctx.fillStyle="orange"
ctx.fillText(ang.toFixed(0)+"°",cur.x*scale()+6,cur.y*scale()-6)

}

}

if(current.length){

for(let v of current){

ctx.beginPath()
ctx.arc(v.x*scale(),v.y*scale(),5,0,Math.PI*2)
ctx.fillStyle="red"
ctx.fill()

}

for(let i=0;i<current.length-1;i++){

ctx.beginPath()
ctx.moveTo(current[i].x*scale(),current[i].y*scale())
ctx.lineTo(current[i+1].x*scale(),current[i+1].y*scale())
ctx.strokeStyle="#2b83ff"
ctx.stroke()

}

let last=current[current.length-1]

ctx.beginPath()
ctx.moveTo(last.x*scale(),last.y*scale())
ctx.lineTo(mouse.x*scale(),mouse.y*scale())
ctx.setLineDash([6,6])
ctx.stroke()
ctx.setLineDash([])

ctx.beginPath()
ctx.arc(mouse.x*scale(),mouse.y*scale(),5,0,Math.PI*2)
ctx.fillStyle="red"
ctx.fill()

let dist=Math.hypot(mouse.x-last.x,mouse.y-last.y)

let ang=0

if(current.length>1){

let prev=current[current.length-2]
ang=angle(prev,last,mouse)

}

hud.innerText=dist.toFixed(2)+" m | "+ang.toFixed(1)+"°"

}

}

function pointInPolygon(p,poly){

let inside=false

for(let i=0,j=poly.length-1;i<poly.length;j=i++){

let xi=poly[i].x
let yi=poly[i].y
let xj=poly[j].x
let yj=poly[j].y

let intersect=((yi>p.y)!=(yj>p.y)) &&
(p.x<(xj-xi)*(p.y-yi)/(yj-yi)+xi)

if(intersect)inside=!inside

}

return inside

}

function updatePanel(){

let html=""
let total=0

for(let r of rooms){

let v=r.v
let area=0

for(let i=0;i<v.length;i++){

let j=(i+1)%v.length
area+=v[i].x*v[j].y-v[j].x*v[i].y

}

area=Math.abs(area/2)

let per=0

for(let i=0;i<v.length;i++){

let j=(i+1)%v.length
per+=Math.hypot(v[j].x-v[i].x,v[j].y-v[i].y)

}

total+=area

html+=`
<div>
<b>${r.name}</b><br>
Área: ${area.toFixed(2)} m²<br>
Perímetro: ${per.toFixed(2)} m
</div><br>
`

}

document.getElementById("rooms").innerHTML=html
document.getElementById("total").innerHTML="Total: "+total.toFixed(2)+" m²"

}

draw()

</script>

</body>
</html>
