<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ALLCALOR - Plano Profesional Real</title>

<style>
body{
    font-family: Arial;
    background:#0f172a;
    color:white;
    margin:0;
}

header{
    background:#1e293b;
    padding:15px;
    text-align:center;
    font-weight:bold;
}

.container{
    padding:20px;
    max-width:1000px;
    margin:auto;
}

input, select{
    width:100%;
    padding:8px;
    margin:6px 0 12px 0;
    border-radius:5px;
    border:none;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:5px;
    cursor:pointer;
}

canvas{
    background:white;
    margin-top:20px;
    border-radius:8px;
}

.resultado{
    margin-top:15px;
    font-size:18px;
    font-weight:bold;
}
</style>
</head>

<body>

<header>
ALLCALOR - GENERADOR PROFESIONAL SUELO RADIANTE
</header>

<div class="container">

<label>Largo estancia (m)</label>
<input type="number" id="largo" step="0.1">

<label>Ancho estancia (m)</label>
<input type="number" id="ancho" step="0.1">

<label>Separación (cm)</label>
<select id="paso">
<option value="10">10</option>
<option value="15">15</option>
<option value="20">20</option>
</select>

<button onclick="generarPlano()">Generar plano</button>

<canvas id="plano" width="900" height="650"></canvas>

<div class="resultado" id="resultado"></div>

</div>

<script>
function generarPlano(){

    const largo = parseFloat(document.getElementById("largo").value);
    const ancho = parseFloat(document.getElementById("ancho").value);
    const paso = parseFloat(document.getElementById("paso").value)/100;

    if(!largo || !ancho) return;

    const canvas = document.getElementById("plano");
    const ctx = canvas.getContext("2d");
    ctx.clearRect(0,0,canvas.width,canvas.height);

    const margen = 80;

    const escala = Math.min(
        (canvas.width - margen*2)/largo,
        (canvas.height - margen*2)/ancho
    );

    const largoPx = largo * escala;
    const anchoPx = ancho * escala;
    const pasoPx = paso * escala;

    const maxCircuito = 100;

    let metrosCircuito = 0;
    let totalMetros = 0;
    let circuito = 1;

    const colores = ["red","blue","green","orange","purple","brown"];

    // Colector pequeño lateral
    const colectorX = margen - 25;
    const colectorY = margen + 40;

    ctx.strokeStyle="black";
    ctx.lineWidth=3;
    ctx.beginPath();
    ctx.moveTo(colectorX, colectorY);
    ctx.lineTo(colectorX, colectorY + 120);
    ctx.stroke();

    ctx.lineWidth=2;

    let xMin = margen;
    let yMin = margen;
    let xMax = margen + largoPx;
    let yMax = margen + anchoPx;

    let x = xMin;
    let y = yMin;

    ctx.strokeStyle = colores[0];
    ctx.beginPath();

    // Entrada real desde colector (horizontal pegado pared)
    ctx.moveTo(colectorX, colectorY);
    ctx.lineTo(xMin, yMin);

    while(xMax - xMin > pasoPx && yMax - yMin > pasoPx){

        // → arriba
        ctx.lineTo(xMax, yMin);
        metrosCircuito += largo;
        totalMetros += largo;

        if(metrosCircuito > maxCircuito){
            ctx.stroke();
            circuito++;
            ctx.beginPath();
            ctx.strokeStyle = colores[(circuito-1)%colores.length];
            metrosCircuito = 0;
        }

        yMin += pasoPx;

        // ↓ derecha
        ctx.lineTo(xMax, yMax);
        metrosCircuito += ancho;
        totalMetros += ancho;

        xMax -= pasoPx;

        // ← abajo
        ctx.lineTo(xMin, yMax);
        metrosCircuito += largo;
        totalMetros += largo;

        yMax -= pasoPx;

        // ↑ izquierda
        ctx.lineTo(xMin, yMin);
        metrosCircuito += ancho;
        totalMetros += ancho;

        xMin += pasoPx;
    }

    // Retorno recto al colector
    ctx.lineTo(colectorX, colectorY);

    ctx.stroke();

    document.getElementById("resultado").innerHTML =
        "Longitud total aproximada: " + totalMetros.toFixed(1) + " m<br>" +
        "Circuitos generados: " + circuito + "<br>" +
        "Máx 100m por circuito";
}
</script>

</body>
</html>
