<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>ALLCALOR CONTROL</title>

<style>

body{
margin:0;
font-family:Arial;
background:#1b1b1b;
color:white;
overflow:hidden;
}

#toolbar{
height:60px;
background:#2c2c2c;
display:flex;
align-items:center;
padding:10px;
gap:10px;
}

button{
padding:10px 14px;
background:#444;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

button:hover{
background:#666;
}

#canvasContainer{
position:absolute;
top:60px;
bottom:0;
left:0;
right:0;
}

canvas{
background:#111;
}

#panel{
position:absolute;
right:10px;
top:70px;
background:#2c2c2c;
padding:12px;
border-radius:8px;
font-size:13px;
width:200px;
}

</style>

</head>

<body>

<div id="toolbar">

<button id="newRoom">Nueva estancia</button>
<button id="closeRoom">Cerrar estancia</button>
<button id="generate">Generar circuito</button>
<button id="reset">Reset</button>

</div>

<div id="canvasContainer">
<canvas id="canvas"></canvas>
</div>

<div id="panel">

<div>Estancia: <span id="roomName">-</span></div>
<div>Superficie: <span id="area">0</span> m²</div>
<div>Tubo total: <span id="meters">0</span> m</div>

</div>

<script>

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight-60

const GRID=50

let rooms=[]
let pipes=[]
let drawing=false
let currentRoom=null

function drawGrid(){

ctx.strokeStyle="#222"

for(let x=0;x<canvas.width;x+=GRID){

ctx.beginPath()
ctx.moveTo(x,0)
ctx.lineTo(x,canvas.height)
ctx.stroke()

}

for(let y=0;y<canvas.height;y+=GRID){

ctx.beginPath()
ctx.moveTo(0,y)
ctx.lineTo(canvas.width,y)
ctx.stroke()

}

}

function drawRooms(){

rooms.forEach(room=>{

ctx.strokeStyle="#00ff88"
ctx.lineWidth=2

ctx.beginPath()

room.points.forEach((p,i)=>{

if(i==0) ctx.moveTo(p.x,p.y)
else ctx.lineTo(p.x,p.y)

})

ctx.closePath()
ctx.stroke()

drawMeasurements(room)

})

}

function drawMeasurements(room){

ctx.fillStyle="white"

for(let i=0;i<room.points.length;i++){

let p1=room.points[i]
let p2=room.points[(i+1)%room.points.length]

let mx=(p1.x+p2.x)/2
let my=(p1.y+p2.y)/2

let dx=p2.x-p1.x
let dy=p2.y-p1.y

let length=Math.sqrt(dx*dx+dy*dy)/100

ctx.fillText(length.toFixed(2)+" m",mx,my)

}

}

function drawPipes(){

ctx.strokeStyle="#00aaff"
ctx.lineWidth=2

pipes.forEach(pipe=>{

ctx.beginPath()

pipe.forEach((p,i)=>{

if(i==0) ctx.moveTo(p.x,p.y)
else ctx.lineTo(p.x,p.y)

})

ctx.stroke()

})

}

function render(){

ctx.clearRect(0,0,canvas.width,canvas.height)

drawGrid()
drawRooms()
drawPipes()

requestAnimationFrame(render)

}

render()

canvas.onclick=(e)=>{

if(!drawing) return

currentRoom.points.push({
x:e.offsetX,
y:e.offsetY
})

}

document.getElementById("newRoom").onclick=()=>{

let name=prompt("Nombre de la estancia")

currentRoom={
name:name,
points:[]
}

rooms.push(currentRoom)

drawing=true

document.getElementById("roomName").innerText=name

}

document.getElementById("closeRoom").onclick=()=>{

drawing=false
calculateArea(currentRoom)

}

document.getElementById("reset").onclick=()=>{

rooms=[]
pipes=[]
document.getElementById("meters").innerText="0"
document.getElementById("area").innerText="0"

}

function calculateArea(room){

let area=0

let pts=room.points

for(let i=0;i<pts.length;i++){

let j=(i+1)%pts.length

area+=pts[i].x*pts[j].y
area-=pts[j].x*pts[i].y

}

area=Math.abs(area/2)/10000

document.getElementById("area").innerText=area.toFixed(2)

}

function generateCircuit(room){

let minX=Math.min(...room.points.map(p=>p.x))
let minY=Math.min(...room.points.map(p=>p.y))
let maxX=Math.max(...room.points.map(p=>p.x))
let maxY=Math.max(...room.points.map(p=>p.y))

let step=20
let pipe=[]

while(minX<maxX && minY<maxY){

pipe.push({x:minX,y:minY})
pipe.push({x:maxX,y:minY})
pipe.push({x:maxX,y:maxY})
pipe.push({x:minX,y:maxY})

minX+=step
minY+=step
maxX-=step
maxY-=step

}

return pipe

}

function pipeLength(pipe){

let L=0

for(let i=1;i<pipe.length;i++){

let dx=pipe[i].x-pipe[i-1].x
let dy=pipe[i].y-pipe[i-1].y

L+=Math.sqrt(dx*dx+dy*dy)

}

return L/100

}

document.getElementById("generate").onclick=()=>{

pipes=[]

let total=0

rooms.forEach(room=>{

let circuit=generateCircuit(room)

pipes.push(circuit)

total+=pipeLength(circuit)

})

document.getElementById("meters").innerText=total.toFixed(1)

}

</script>

</body>
</html>
