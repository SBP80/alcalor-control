<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ALLCALOR</title>

<style>
*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:Arial, Helvetica, sans-serif;
  background:#111;
  color:#fff;
  touch-action:none;
}

body{
  display:flex;
  flex-direction:column;
}

#topbar{
  flex:0 0 auto;
  background:#1f1f1f;
  padding:8px;
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  border-bottom:1px solid #333;
}

button{
  appearance:none;
  border:none;
  background:#f0842f;
  color:#fff;
  padding:10px 14px;
  font-weight:700;
  font-size:15px;
  border-radius:8px;
}

button.activo{
  background:#2f8f46;
}

button.sec{
  background:#4b5563;
}

#panelMedidas{
  flex:0 0 auto;
  background:#252525;
  padding:8px;
  display:flex;
  gap:8px;
  align-items:center;
  flex-wrap:wrap;
  border-bottom:1px solid #333;
}

#panelMedidas.oculto{
  display:none;
}

.campo{
  display:flex;
  align-items:center;
  gap:6px;
  background:#1b1b1b;
  padding:8px 10px;
  border-radius:8px;
}

.campo span{
  font-size:14px;
  color:#ddd;
}

.campo input{
  width:86px;
  padding:8px 6px;
  border:none;
  border-radius:6px;
  font-size:16px;
  background:#fff;
  color:#111;
}

#zonaCanvas{
  flex:1 1 auto;
  min-height:0;
  position:relative;
  background:#1a1a1a;
}

#canvas{
  display:block;
  width:100%;
  height:100%;
  background:#1a1a1a;
  touch-action:none;
}

#info{
  flex:0 0 auto;
  background:#1f1f1f;
  padding:8px 10px;
  font-size:13px;
  line-height:1.35;
  border-top:1px solid #333;
  white-space:pre-line;
}
</style>
</head>
<body>

<div id="topbar">
  <button id="btnEstancia">Estancia</button>
  <button id="btnEditar">Editar</button>
  <button id="btnBorrar" class="sec">Borrar activa</button>
  <button id="btnLimpiar" class="sec">Limpiar</button>
</div>

<div id="panelMedidas" class="oculto">
  <div class="campo">
    <span>Ancho</span>
    <input id="inputAncho" type="number" min="0" step="0.01" inputmode="decimal">
    <span>m</span>
  </div>

  <div class="campo">
    <span>Alto</span>
    <input id="inputAlto" type="number" min="0" step="0.01" inputmode="decimal">
    <span>m</span>
  </div>

  <button id="btnAplicarMedidas">Aplicar</button>
</div>

<div id="zonaCanvas">
  <canvas id="canvas"></canvas>
</div>

<div id="info">ALLCALOR listo.</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const zonaCanvas = document.getElementById("zonaCanvas");
const info = document.getElementById("info");

const btnEstancia = document.getElementById("btnEstancia");
const btnEditar = document.getElementById("btnEditar");
const btnBorrar = document.getElementById("btnBorrar");
const btnLimpiar = document.getElementById("btnLimpiar");

const panelMedidas = document.getElementById("panelMedidas");
const inputAncho = document.getElementById("inputAncho");
const inputAlto = document.getElementById("inputAlto");
const btnAplicarMedidas = document.getElementById("btnAplicarMedidas");

let canvasW = 0;
let canvasH = 0;

let modo = "ninguno"; // estancia | editar | ninguno
let estancias = [];
let activa = -1;

let dibujando = false;
let moviendo = false;

let inicioX = 0;
let inicioY = 0;
let actualX = 0;
let actualY = 0;

let offsetMoveX = 0;
let offsetMoveY = 0;

const PX_POR_METRO = 100;

function ponerInfo(texto){
  info.textContent = texto;
}

function ajustarCanvas(){
  const r = zonaCanvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;

  canvasW = Math.max(1, Math.round(r.width));
  canvasH = Math.max(1, Math.round(r.height));

  canvas.width = Math.round(canvasW * dpr);
  canvas.height = Math.round(canvasH * dpr);

  canvas.style.width = canvasW + "px";
  canvas.style.height = canvasH + "px";

  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  dibujar();
}

function pos(e){
  const r = canvas.getBoundingClientRect();
  return {
    x: e.clientX - r.left,
    y: e.clientY - r.top
  };
}

function rectNormalizado(x1,y1,x2,y2){
  return {
    x: Math.min(x1,x2),
    y: Math.min(y1,y2),
    w: Math.abs(x2-x1),
    h: Math.abs(y2-y1)
  };
}

function metros(px){
  return px / PX_POR_METRO;
}

function px(m){
  return m * PX_POR_METRO;
}

function dentro(pxP, pyP, r){
  return pxP >= r.x && pxP <= r.x + r.w && pyP >= r.y && pyP <= r.y + r.h;
}

function buscarEstancia(x,y){
  for(let i = estancias.length - 1; i >= 0; i--){
    if(dentro(x,y,estancias[i])) return i;
  }
  return -1;
}

function textoEstado(){
  return "Modo: " + modo + " · Estancias: " + estancias.length + " · Activa: " + (activa === -1 ? "ninguna" : (activa + 1));
}

function actualizarPanel(){
  const hayActiva = activa !== -1;

  panelMedidas.classList.toggle("oculto", !hayActiva);

  btnEstancia.classList.toggle("activo", modo === "estancia");
  btnEditar.classList.toggle("activo", modo === "editar");

  if(hayActiva){
    inputAncho.value = metros(estancias[activa].w).toFixed(2);
    inputAlto.value = metros(estancias[activa].h).toFixed(2);
  }
}

function dibujarCotas(r){
  ctx.fillStyle = "#ffffff";
  ctx.font = "12px Arial";
  ctx.fillText(metros(r.w).toFixed(2).replace(".", ",") + " m", r.x + 8, r.y + 18);
  ctx.fillText(metros(r.h).toFixed(2).replace(".", ",") + " m", r.x + 8, r.y + 34);
}

function dibujarRect(r, seleccionada){
  ctx.fillStyle = seleccionada ? "rgba(240,132,47,0.20)" : "rgba(0,227,138,0.10)";
  ctx.fillRect(r.x, r.y, r.w, r.h);

  ctx.strokeStyle = seleccionada ? "#f0842f" : "#78f1af";
  ctx.lineWidth = seleccionada ? 3 : 2;
  ctx.strokeRect(r.x, r.y, r.w, r.h);

  dibujarCotas(r);
}

function dibujar(){
  ctx.clearRect(0,0,canvasW,canvasH);

  for(let i = 0; i < estancias.length; i++){
    dibujarRect(estancias[i], i === activa);
  }

  if(dibujando){
    const r = rectNormalizado(inicioX, inicioY, actualX, actualY);

    ctx.fillStyle = "rgba(240,132,47,0.10)";
    ctx.fillRect(r.x, r.y, r.w, r.h);

    ctx.strokeStyle = "#f0842f";
    ctx.lineWidth = 2;
    ctx.strokeRect(r.x, r.y, r.w, r.h);

    dibujarCotas(r);
  }

  actualizarPanel();
}

btnEstancia.onclick = function(){
  modo = "estancia";
  ponerInfo("Modo estancia activo. Toca, arrastra y suelta.\n" + textoEstado());
  dibujar();
};

btnEditar.onclick = function(){
  modo = "editar";
  ponerInfo("Modo editar activo. Toca una estancia para seleccionarla y arrástrala para moverla.\n" + textoEstado());
  dibujar();
};

btnBorrar.onclick = function(){
  if(activa === -1){
    ponerInfo("No hay estancia activa.\n" + textoEstado());
    return;
  }

  estancias.splice(activa, 1);

  if(estancias.length === 0){
    activa = -1;
  }else if(activa >= estancias.length){
    activa = estancias.length - 1;
  }

  ponerInfo("Estancia activa borrada.\n" + textoEstado());
  dibujar();
};

btnLimpiar.onclick = function(){
  estancias = [];
  activa = -1;
  dibujando = false;
  moviendo = false;
  ponerInfo("Plano limpiado.\n" + textoEstado());
  dibujar();
};

btnAplicarMedidas.onclick = function(){
  if(activa === -1) return;

  const anchoM = Number(String(inputAncho.value).replace(",", "."));
  const altoM = Number(String(inputAlto.value).replace(",", "."));

  if(!Number.isFinite(anchoM) || !Number.isFinite(altoM) || anchoM <= 0 || altoM <= 0){
    ponerInfo("Medidas no válidas.\n" + textoEstado());
    return;
  }

  estancias[activa].w = px(anchoM);
  estancias[activa].h = px(altoM);

  ponerInfo(
    "Medidas aplicadas.\n" +
    "Ancho: " + anchoM.toFixed(2).replace(".", ",") + " m\n" +
    "Alto: " + altoM.toFixed(2).replace(".", ",") + " m\n" +
    textoEstado()
  );

  dibujar();
};

canvas.addEventListener("pointerdown", function(e){
  const p = pos(e);

  if(modo === "estancia"){
    dibujando = true;
    inicioX = p.x;
    inicioY = p.y;
    actualX = p.x;
    actualY = p.y;
    ponerInfo("Dibujando estancia...\n" + textoEstado());
    return;
  }

  if(modo === "editar"){
    const idx = buscarEstancia(p.x, p.y);

    if(idx === -1){
      activa = -1;
      ponerInfo("No has tocado ninguna estancia.\n" + textoEstado());
      dibujar();
      return;
    }

    activa = idx;
    moviendo = true;
    offsetMoveX = p.x - estancias[idx].x;
    offsetMoveY = p.y - estancias[idx].y;

    ponerInfo("Estancia seleccionada. Arrastra para mover.\n" + textoEstado());
    dibujar();
  }
});

canvas.addEventListener("pointermove", function(e){
  const p = pos(e);

  if(dibujando){
    actualX = p.x;
    actualY = p.y;
    dibujar();
    return;
  }

  if(moviendo && activa !== -1){
    estancias[activa].x = p.x - offsetMoveX;
    estancias[activa].y = p.y - offsetMoveY;
    dibujar();
  }
});

canvas.addEventListener("pointerup", function(e){
  const p = pos(e);

  if(dibujando){
    actualX = p.x;
    actualY = p.y;

    const r = rectNormalizado(inicioX, inicioY, actualX, actualY);
    dibujando = false;

    if(r.w > 20 && r.h > 20){
      estancias.push(r);
      activa = estancias.length - 1;
      ponerInfo(
        "Estancia creada.\n" +
        "Ancho: " + metros(r.w).toFixed(2).replace(".", ",") + " m\n" +
        "Alto: " + metros(r.h).toFixed(2).replace(".", ",") + " m\n" +
        textoEstado()
      );
    }else{
      ponerInfo("La estancia era demasiado pequeña.\n" + textoEstado());
    }

    dibujar();
  }

  if(moviendo){
    moviendo = false;
    ponerInfo("Estancia movida.\n" + textoEstado());
    dibujar();
  }
});

canvas.addEventListener("pointercancel", function(){
  dibujando = false;
  moviendo = false;
  dibujar();
});

window.addEventListener("resize", ajustarCanvas);
window.addEventListener("orientationchange", ajustarCanvas);

ajustarCanvas();
ponerInfo("ALLCALOR listo.\nPulsa Estancia para crear o Editar para seleccionar y mover.\n" + textoEstado());
</script>

</body>
</html>
