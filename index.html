<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ALLCALOR PRO</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f2b44;
color:white;
}

header{
background:#1b1b1b;
padding:12px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.toolbar{
background:#173a5e;
padding:10px;
}

button{
border:none;
padding:6px 12px;
margin-right:6px;
border-radius:4px;
cursor:pointer;
font-weight:bold;
}

.green{background:#28a745}
.blue{background:#2b83ff}
.orange{background:#ff9800}
.red{background:#e53935}
.yellow{background:#ffcc00;color:black}

#layout{
display:flex;
}

#panel{
width:220px;
background:#1c3f63;
padding:10px;
}

canvas{
background:#f4f1e8;
cursor:crosshair;
}

#cursorInfo{
position:absolute;
background:#333;
color:white;
padding:4px 8px;
border-radius:4px;
font-size:12px;
pointer-events:none;
}

</style>
</head>

<body>

<header>🔥 ALLCALOR PRO</header>

<div class="toolbar">

Escala px/m
<input id="scale" type="number" value="100" style="width:60px">

<button class="green" onclick="newRoom()">Nueva estancia</button>
<button class="blue" onclick="closeRoom()">Cerrar estancia</button>
<button class="orange" onclick="undo()">Deshacer</button>
<button class="red" onclick="resetAll()">Reiniciar</button>

<button class="yellow" onclick="zoomIn()">+</button>
<button class="yellow" onclick="zoomOut()">-</button>
<button class="yellow" onclick="centerView()">Centrar</button>

</div>

<div id="layout">

<div id="panel">

<h3>Estancias</h3>

<div id="rooms"></div>

<hr>

Total: <span id="totalArea">0</span> m²

</div>

<div style="position:relative">

<canvas id="canvas" width="1200" height="700"></canvas>

<div id="cursorInfo"></div>

</div>

</div>

<script>

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

let scale=100

let rooms=[]
let current=[]
let drawing=false

let mouse={x:0,y:0}

let dragVertex=null
let dragRoom=null

function dist(a,b){
return Math.hypot(a.x-b.x,a.y-b.y)
}

function angle(a,b,c){

let ang=Math.atan2(c.y-b.y,c.x-b.x)-Math.atan2(a.y-b.y,a.x-b.x)
ang=Math.abs(ang*180/Math.PI)

if(ang>180) ang=360-ang

return ang

}

function polygonArea(v){

let sum=0

for(let i=0;i<v.length;i++){

let j=(i+1)%v.length

sum+=v[i].x*v[j].y-v[j].x*v[i].y

}

return Math.abs(sum/2)

}

function centroid(v){

let x=0
let y=0

for(let p of v){
x+=p.x
y+=p.y
}

return{
x:x/v.length,
y:y/v.length
}

}

function perimeter(v){

let sum=0

for(let i=0;i<v.length;i++){

let j=(i+1)%v.length
sum+=dist(v[i],v[j])

}

return sum

}

function pointInside(point,poly){

let inside=false

for(let i=0,j=poly.length-1;i<poly.length;j=i++){

let xi=poly[i].x,yi=poly[i].y
let xj=poly[j].x,yj=poly[j].y

let intersect=((yi>point.y)!=(yj>point.y)) &&
(point.x<(xj-xi)*(point.y-yi)/(yj-yi)+xi)

if(intersect) inside=!inside

}

return inside

}

canvas.onmousedown=e=>{

let r=canvas.getBoundingClientRect()

let p={
x:e.clientX-r.left,
y:e.clientY-r.top
}

mouse=p

if(drawing){

current.push(p)
draw()
return

}

for(let room of rooms){

for(let v of room.v){

if(dist(v,p)<10){

dragVertex=v
return

}

}

}

for(let room of rooms){

if(pointInside(p,room.v)){

dragRoom={
room:room,
start:p
}

return

}

}

}

canvas.onmousemove=e=>{

let r=canvas.getBoundingClientRect()

let p={
x:e.clientX-r.left,
y:e.clientY-r.top
}

mouse=p

if(dragVertex){

dragVertex.x=p.x
dragVertex.y=p.y

updateList()

}

if(dragRoom){

let dx=p.x-dragRoom.start.x
let dy=p.y-dragRoom.start.y

dragRoom.start=p

for(let v of dragRoom.room.v){

v.x+=dx
v.y+=dy

}

updateList()

}

updateCursor()

draw()

}

canvas.onmouseup=()=>{

dragVertex=null
dragRoom=null

}

function newRoom(){

drawing=true
current=[]

}

function closeRoom(){

if(current.length<3) return

let name=prompt("Nombre estancia")

rooms.push({
name:name||"estancia",
v:[...current]
})

drawing=false
current=[]

updateList()
draw()

}

function undo(){

current.pop()
draw()

}

function resetAll(){

rooms=[]
current=[]
drawing=false

updateList()
draw()

}

function zoomIn(){}
function zoomOut(){}
function centerView(){}

function updateCursor(){

let div=document.getElementById("cursorInfo")

if(!drawing || current.length===0){

div.style.display="none"
return

}

div.style.display="block"

div.style.left=(mouse.x+15)+"px"
div.style.top=(mouse.y+15)+"px"

let last=current[current.length-1]

let d=dist(last,mouse)/scale

let ang=0

if(current.length>1){

let prev=current[current.length-2]
ang=angle(prev,last,mouse)

}

let per=0

for(let i=1;i<current.length;i++){

per+=dist(current[i-1],current[i])

}

per+=dist(last,mouse)

per/=scale

div.innerText=
d.toFixed(2)+" m | "+
ang.toFixed(0)+"° | perímetro "+
per.toFixed(2)+" m"

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

for(let room of rooms){

ctx.beginPath()

ctx.moveTo(room.v[0].x,room.v[0].y)

for(let i=1;i<room.v.length;i++){

ctx.lineTo(room.v[i].x,room.v[i].y)

}

ctx.closePath()

ctx.fillStyle="rgba(0,150,255,0.15)"
ctx.fill()

ctx.strokeStyle="#2b83ff"
ctx.lineWidth=2
ctx.stroke()

for(let v of room.v){

ctx.beginPath()
ctx.arc(v.x,v.y,5,0,Math.PI*2)
ctx.fillStyle="red"
ctx.fill()

}

let c=centroid(room.v)

let area=polygonArea(room.v)/scale/scale

ctx.fillStyle="black"
ctx.textAlign="center"

ctx.fillText(room.name,c.x,c.y)
ctx.fillText(area.toFixed(2)+" m²",c.x,c.y+14)

}

if(current.length){

ctx.beginPath()

ctx.moveTo(current[0].x,current[0].y)

for(let i=1;i<current.length;i++){

ctx.lineTo(current[i].x,current[i].y)

}

ctx.strokeStyle="#2b83ff"
ctx.stroke()

for(let v of current){

ctx.beginPath()
ctx.arc(v.x,v.y,5,0,Math.PI*2)
ctx.fillStyle="red"
ctx.fill()

}

let last=current[current.length-1]

ctx.setLineDash([6,6])

ctx.beginPath()
ctx.moveTo(last.x,last.y)
ctx.lineTo(mouse.x,mouse.y)
ctx.stroke()

ctx.setLineDash([])

}

}

function updateList(){

let html=""
let total=0

for(let r of rooms){

let area=polygonArea(r.v)/scale/scale
let per=perimeter(r.v)/scale

total+=area

html+=`
<b>${r.name}</b><br>
Área: ${area.toFixed(2)} m²<br>
Perímetro: ${per.toFixed(2)} m
<hr>
`

}

document.getElementById("rooms").innerHTML=html
document.getElementById("totalArea").innerText=total.toFixed(2)

}

draw()

</script>

</body>
</html>
