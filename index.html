<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ALLCALOR PRO</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f2238;
color:white;
}

header{
text-align:center;
padding:15px;
font-size:26px;
font-weight:bold;
}

#toolbar{
display:flex;
gap:10px;
padding:10px;
background:#162f4d;
}

button{
border:none;
padding:8px 12px;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

.green{background:#4caf50}
.blue{background:#3498db}
.orange{background:#ff9800}
.red{background:#e53935}

#container{
display:flex;
height:calc(100vh - 100px);
}

#panel{
width:220px;
background:#17395d;
padding:10px;
}

#canvasContainer{
flex:1;
position:relative;
background:#e6e6e6;
}

canvas{
background:white;
}

.measure{
position:absolute;
background:#111;
color:#0f0;
padding:4px 8px;
border-radius:4px;
font-size:13px;
}

</style>
</head>

<body>

<header>🔥 ALLCALOR PRO</header>

<div id="toolbar">

Escala <input type="number" value="100" style="width:70px">

<button class="green" onclick="newRoom()">Nueva estancia</button>
<button class="blue" onclick="closeRoom()">Cerrar estancia</button>
<button class="orange" onclick="undo()">Deshacer</button>
<button class="red" onclick="resetAll()">Reiniciar</button>

</div>

<div id="container">

<div id="panel">
<h3>ESTANCIAS</h3>
<div id="roomList"></div>
</div>

<div id="canvasContainer">
<canvas id="canvas"></canvas>
</div>

</div>

<script>

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth-220
canvas.height=window.innerHeight-100

let rooms=[]
let current=null
let draggingPoint=null
let draggingRoom=null

let mouse={x:0,y:0}

canvas.onmousemove=e=>{

const r=canvas.getBoundingClientRect()

mouse.x=e.clientX-r.left
mouse.y=e.clientY-r.top

if(draggingPoint){

draggingPoint.x=mouse.x
draggingPoint.y=mouse.y
draw()

}

if(draggingRoom){

let dx=mouse.x-draggingRoom.start.x
let dy=mouse.y-draggingRoom.start.y

for(let p of draggingRoom.room.points){

p.x=p.ox+dx
p.y=p.oy+dy

}

draw()

}

}

canvas.onmousedown=e=>{

for(let room of rooms){

for(let p of room.points){

let d=Math.hypot(mouse.x-p.x,mouse.y-p.y)

if(d<8){

draggingPoint=p
return

}

}

}

for(let room of rooms){

if(pointInPoly(mouse,room.points)){

draggingRoom={
room:room,
start:{x:mouse.x,y:mouse.y}
}

for(let p of room.points){

p.ox=p.x
p.oy=p.y

}

return

}

}

if(current){

current.points.push({x:mouse.x,y:mouse.y})
draw()

}

}

canvas.onmouseup=()=>{

draggingPoint=null
draggingRoom=null

}

function newRoom(){

let name=prompt("Nombre estancia")

if(!name)return

current={
name:name,
points:[]
}

rooms.push(current)

updateList()

}

function closeRoom(){

current=null
draw()

}

function undo(){

if(current && current.points.length>0){

current.points.pop()
draw()

}

}

function resetAll(){

rooms=[]
current=null
updateList()
draw()

}

function updateList(){

let div=document.getElementById("roomList")

div.innerHTML=""

rooms.forEach(r=>{

let el=document.createElement("div")
el.innerText=r.name
div.appendChild(el)

})

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

rooms.forEach(room=>{

let pts=room.points

if(pts.length<2)return

ctx.beginPath()
ctx.moveTo(pts[0].x,pts[0].y)

for(let i=1;i<pts.length;i++){

ctx.lineTo(pts[i].x,pts[i].y)

}

ctx.strokeStyle="#2196f3"
ctx.lineWidth=2
ctx.stroke()

pts.forEach(p=>{

ctx.beginPath()
ctx.arc(p.x,p.y,5,0,Math.PI*2)
ctx.fillStyle="red"
ctx.fill()

})

for(let i=0;i<pts.length;i++){

let a=pts[i]
let b=pts[(i+1)%pts.length]

if(!b)continue

let mx=(a.x+b.x)/2
let my=(a.y+b.y)/2

let dist=Math.hypot(b.x-a.x,b.y-a.y)/100

ctx.fillStyle="black"
ctx.fillRect(mx-30,my-10,60,20)

ctx.fillStyle="#0f0"
ctx.fillText(dist.toFixed(2)+" m",mx-25,my+5)

}

})

if(current && current.points.length>0){

let last=current.points[current.points.length-1]

ctx.beginPath()
ctx.moveTo(last.x,last.y)
ctx.lineTo(mouse.x,mouse.y)

ctx.setLineDash([6,6])
ctx.stroke()
ctx.setLineDash([])

}

}

function pointInPoly(p,poly){

let inside=false

for(let i=0,j=poly.length-1;i<poly.length;j=i++){

let xi=poly[i].x
let yi=poly[i].y
let xj=poly[j].x
let yj=poly[j].y

let intersect=((yi>p.y)!=(yj>p.y)) &&
(p.x<(xj-xi)*(p.y-yi)/(yj-yi)+xi)

if(intersect)inside=!inside

}

return inside

}

draw()

</script>

</body>
</html>
