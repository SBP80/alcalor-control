<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ALLCALOR PRO</title>

<style>

body{margin:0;font-family:Arial;background:#0f2b44;color:white}

header{
background:#1b1b1b;
padding:12px;
text-align:center;
font-size:24px;
font-weight:bold
}

.toolbar{
background:#173a5e;
padding:10px
}

button{
border:none;
padding:6px 12px;
margin-right:6px;
border-radius:4px;
cursor:pointer;
font-weight:bold
}

.green{background:#28a745}
.blue{background:#2b83ff}
.orange{background:#ff9800}
.red{background:#e53935}
.yellow{background:#ffc107;color:black}

#layout{display:flex}

#panel{
width:220px;
background:#1c3f63;
padding:10px
}

canvas{
background:#f4f1e8;
cursor:crosshair
}

</style>
</head>

<body>

<header>🔥 ALLCALOR PRO</header>

<div class="toolbar">

Escala px/m
<input id="scale" type="number" value="100" style="width:60px">

<button class="green" onclick="newRoom()">Nueva estancia</button>
<button class="blue" onclick="closeRoom()">Cerrar estancia</button>
<button class="orange" onclick="undo()">Deshacer</button>
<button class="red" onclick="resetAll()">Reiniciar</button>

<button class="yellow" onclick="zoomIn()">+</button>
<button class="yellow" onclick="zoomOut()">−</button>
<button class="yellow" onclick="centerView()">Centrar</button>

</div>

<div id="layout">

<div id="panel">
<h3>Estancias</h3>
<div id="rooms"></div>
<hr>
Total: <span id="totalArea">0</span> m²
</div>

<canvas id="canvas" width="1200" height="700"></canvas>

</div>

<script>

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

let scale=100

let rooms=[]
let current=[]
let drawing=false

let mouse={x:0,y:0}

function dist(a,b){
return Math.hypot(a.x-b.x,a.y-b.y)
}

function polygonArea(v){

let sum=0

for(let i=0;i<v.length;i++){

let j=(i+1)%v.length
sum+=v[i].x*v[j].y-v[j].x*v[i].y

}

return Math.abs(sum/2)

}

function centroid(v){

let x=0
let y=0

for(let p of v){

x+=p.x
y+=p.y

}

return{x:x/v.length,y:y/v.length}

}

canvas.onmousedown=e=>{

const r=canvas.getBoundingClientRect()

mouse={
x:e.clientX-r.left,
y:e.clientY-r.top
}

if(drawing){

current.push({...mouse})
draw()

}

}

canvas.onmousemove=e=>{

const r=canvas.getBoundingClientRect()

mouse={
x:e.clientX-r.left,
y:e.clientY-r.top
}

draw()

}

function newRoom(){

drawing=true
current=[]

}

function closeRoom(){

if(current.length<3)return

rooms.push({
name:"estancia",
v:[...current]
})

drawing=false
current=[]

updateList()
draw()

}

function undo(){

current.pop()
draw()

}

function resetAll(){

rooms=[]
current=[]
drawing=false

updateList()
draw()

}

function zoomIn(){}

function zoomOut(){}

function centerView(){}

function drawVertex(p){

ctx.beginPath()
ctx.arc(p.x,p.y,5,0,Math.PI*2)
ctx.fillStyle="red"
ctx.fill()

}

function drawPolygon(v){

ctx.beginPath()
ctx.moveTo(v[0].x,v[0].y)

for(let i=1;i<v.length;i++){
ctx.lineTo(v[i].x,v[i].y)
}

ctx.closePath()

ctx.fillStyle="rgba(0,150,255,0.15)"
ctx.fill()

ctx.strokeStyle="#2b83ff"
ctx.lineWidth=2
ctx.stroke()

for(let i=0;i<v.length;i++){

let a=v[i]
let b=v[(i+1)%v.length]

let mid={
x:(a.x+b.x)/2,
y:(a.y+b.y)/2
}

let d=dist(a,b)/scale

ctx.fillStyle="black"
ctx.fillText(d.toFixed(2)+" m",mid.x,mid.y)

}

for(let p of v){
drawVertex(p)
}

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

for(let r of rooms){

drawPolygon(r.v)

let c=centroid(r.v)
let area=polygonArea(r.v)/scale/scale

ctx.fillStyle="black"
ctx.textAlign="center"

ctx.fillText(area.toFixed(2)+" m²",c.x,c.y)

}

if(current.length){

ctx.beginPath()
ctx.moveTo(current[0].x,current[0].y)

for(let i=1;i<current.length;i++){
ctx.lineTo(current[i].x,current[i].y)
}

ctx.lineTo(mouse.x,mouse.y)

ctx.strokeStyle="#2b83ff"
ctx.stroke()

for(let p of current){
drawVertex(p)
}

}

}

function updateList(){

let html=""
let total=0

for(let r of rooms){

let area=polygonArea(r.v)/scale/scale
total+=area

html+=`
<b>${r.name}</b><br>
Área: ${area.toFixed(2)} m²<br><hr>
`

}

document.getElementById("rooms").innerHTML=html
document.getElementById("totalArea").innerText=total.toFixed(2)

}

draw()

</script>

</body>
</html>
