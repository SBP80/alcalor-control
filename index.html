<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ALLCALOR V9</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;height:100%;background:#111;color:#fff;font-family:Arial;overflow:hidden}
body{display:flex;flex-direction:column;height:100dvh}
#barra{background:#1f1f1f;padding:10px;display:flex;flex-wrap:wrap;gap:8px}
button{border:none;padding:12px 16px;border-radius:10px;font-weight:bold;font-size:15px;background:#f0842f;color:#fff}
button.sec{background:#666}
button.activo{background:#2f8f46}
#canvas{flex:1;background:#181818;touch-action:none}
#info{background:#1f1f1f;padding:8px;font-size:13px}
</style>
</head>

<body>

<div id="barra">
<button id="btnPoligono">Polígono</button>
<button id="btnCerrar">Cerrar estancia</button>
<button id="btnEditar">Editar</button>
<button id="btnLimpiar" class="sec">Limpiar</button>
</div>

<canvas id="canvas"></canvas>
<div id="info">Modo polígono</div>

<script>

// canvas
const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

function resize(){
canvas.width=window.innerWidth
canvas.height=window.innerHeight
draw()
}
window.addEventListener("resize",resize)
resize()

// cámara
let zoom=80
let camX=0
let camY=0

function worldToScreen(x,y){
return{
x:(x-camX)*zoom+canvas.width/2,
y:(y-camY)*zoom+canvas.height/2
}
}

function screenToWorld(x,y){
return{
x:(x-canvas.width/2)/zoom+camX,
y:(y-canvas.height/2)/zoom+camY
}
}

// estado
let modo="poligono"
let estancias=[]
let poly=[]
let activa=-1

// utilidades
function dist(a,b){
return Math.hypot(a.x-b.x,a.y-b.y)
}

function m(px){
return px.toFixed(2)
}

function inside(x,y,p){
let inside=false
for(let i=0,j=p.length-1;i<p.length;j=i++){
const xi=p[i].x,yi=p[i].y
const xj=p[j].x,yj=p[j].y
const intersect=((yi>y)!=(yj>y))&&(x<(xj-xi)*(y-yi)/(yj-yi)+xi)
if(intersect)inside=!inside
}
return inside
}

// detectar cruce de segmentos
function intersect(a,b,c,d){

function ccw(p1,p2,p3){
return (p3.y-p1.y)*(p2.x-p1.x)>(p2.y-p1.y)*(p3.x-p1.x)
}

return ccw(a,c,d)!=ccw(b,c,d)&&ccw(a,b,c)!=ccw(a,b,d)
}

// evitar polígonos cruzados
function validaNuevoPunto(p){

if(poly.length<2)return true

const a=poly[poly.length-1]

for(let i=0;i<poly.length-2;i++){
const b=poly[i]
const c=poly[i+1]

if(intersect(a,p,b,c))return false
}

return true
}

// dibujo
function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

// estancias
for(let i=0;i<estancias.length;i++){

const p=estancias[i]

ctx.beginPath()

let s=worldToScreen(p[0].x,p[0].y)
ctx.moveTo(s.x,s.y)

for(let j=1;j<p.length;j++){
s=worldToScreen(p[j].x,p[j].y)
ctx.lineTo(s.x,s.y)
}

ctx.closePath()

ctx.fillStyle=i===activa?"rgba(240,132,47,.25)":"rgba(0,227,138,.1)"
ctx.fill()

ctx.strokeStyle=i===activa?"#f0842f":"#78f1af"
ctx.lineWidth=2
ctx.stroke()

for(let j=0;j<p.length;j++){

const a=p[j]
const b=p[(j+1)%p.length]

const mid={
x:(a.x+b.x)/2,
y:(a.y+b.y)/2
}

const ms=worldToScreen(mid.x,mid.y)

ctx.fillStyle="#fff"
ctx.fillText(m(dist(a,b))+" m",ms.x,ms.y)

}

}

// polígono abierto
if(poly.length){

ctx.beginPath()

let s=worldToScreen(poly[0].x,poly[0].y)
ctx.moveTo(s.x,s.y)

for(let i=1;i<poly.length;i++){
s=worldToScreen(poly[i].x,poly[i].y)
ctx.lineTo(s.x,s.y)
}

ctx.strokeStyle="#f0842f"
ctx.stroke()

}

}

// interacción
let pointers=new Map()

canvas.addEventListener("pointerdown",e=>{
canvas.setPointerCapture(e.pointerId)
pointers.set(e.pointerId,{x:e.clientX,y:e.clientY})
})

canvas.addEventListener("pointermove",e=>{

if(!pointers.has(e.pointerId))return

pointers.set(e.pointerId,{x:e.clientX,y:e.clientY})

if(pointers.size==2){

const pts=[...pointers.values()]

const dx=pts[0].x-pts[1].x
const dy=pts[0].y-pts[1].y

const distNow=Math.hypot(dx,dy)

if(!window.lastDist)window.lastDist=distNow

const delta=distNow/window.lastDist

zoom*=delta

zoom=Math.max(20,Math.min(400,zoom))

window.lastDist=distNow

draw()
}

})

canvas.addEventListener("pointerup",e=>{
pointers.delete(e.pointerId)
window.lastDist=null
})

// click
canvas.addEventListener("click",e=>{

const p=screenToWorld(e.clientX,e.clientY)

if(modo==="poligono"){

if(validaNuevoPunto(p)){
poly.push(p)
}else{
document.getElementById("info").innerText="La pared se cruzaría"
}

draw()
return
}

for(let i=estancias.length-1;i>=0;i--){
if(inside(p.x,p.y,estancias[i])){
activa=i
draw()
return
}
}

})

// botones
document.getElementById("btnCerrar").onclick=()=>{

if(poly.length<3)return

estancias.push(poly)
poly=[]
draw()

}

document.getElementById("btnPoligono").onclick=()=>{
modo="poligono"
}

document.getElementById("btnEditar").onclick=()=>{
modo="editar"
}

document.getElementById("btnLimpiar").onclick=()=>{
estancias=[]
poly=[]
activa=-1
draw()
}

draw()

</script>
</body>
</html>
