<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>🔥 ALLCALOR PRO</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f2b44;
color:white;
padding:10px;
}

h1{
text-align:center;
margin-bottom:10px;
}

.toolbar{
background:#12314a;
padding:10px;
border-radius:8px;
margin-bottom:10px;
}

button{
border:none;
padding:8px 12px;
margin-right:6px;
border-radius:5px;
font-weight:bold;
cursor:pointer;
}

.green{background:#28a745}
.blue{background:#2b83ff}
.orange{background:#ff9800}
.red{background:#e53935}

#layout{
display:flex;
gap:10px;
}

#panel{
width:220px;
background:#12314a;
padding:10px;
border-radius:8px;
}

canvas{
background:#f4f1e8;
border-radius:8px;
cursor:crosshair;
}

#hud{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.6);
padding:6px 12px;
border-radius:6px;
font-weight:bold;
}

</style>
</head>

<body>

<h1>🔥 ALLCALOR PRO</h1>

<div class="toolbar">

Escala (px por metro)
<input id="scale" type="number" value="100" style="width:70px">

<button class="green" onclick="newRoom()">Nueva estancia</button>
<button class="blue" onclick="closeRoom()">Cerrar estancia</button>
<button class="orange" onclick="undo()">Deshacer</button>
<button class="red" onclick="reset()">Reiniciar</button>

</div>

<div id="layout">

<div id="panel">
<b>ESTANCIAS</b>
<div id="rooms"></div>
<hr>
<div id="total"></div>
</div>

<div style="position:relative">

<div id="hud">0 m</div>

<canvas id="canvas" width="1100" height="650"></canvas>

</div>

</div>

<script>

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

let rooms=[]
let current=[]
let drawing=true

let mouse={x:0,y:0}

function scale(){
return parseFloat(document.getElementById("scale").value)
}

function metersToScreen(m){
return m*scale()
}

function screenToMeters(px){
return px/scale()
}

canvas.addEventListener("mousemove",e=>{

const rect=canvas.getBoundingClientRect()

mouse.x=screenToMeters(e.clientX-rect.left)
mouse.y=screenToMeters(e.clientY-rect.top)

draw()

})

canvas.addEventListener("mousedown",e=>{

const rect=canvas.getBoundingClientRect()

let mx=screenToMeters(e.clientX-rect.left)
let my=screenToMeters(e.clientY-rect.top)

if(drawing){

current.push({x:mx,y:my})

}

draw()

})

function newRoom(){
drawing=true
current=[]
}

function closeRoom(){

if(current.length<3)return

rooms.push({
name:"h"+(rooms.length+1),
v:[...current]
})

current=[]
drawing=false

updatePanel()
draw()

}

function undo(){
if(current.length>0){
current.pop()
draw()
}
}

function reset(){

rooms=[]
current=[]
drawing=true

updatePanel()
draw()

}

function area(poly){

let sum=0

for(let i=0;i<poly.length;i++){

let j=(i+1)%poly.length

sum+=poly[i].x*poly[j].y
sum-=poly[j].x*poly[i].y

}

return Math.abs(sum/2)

}

function perimeter(poly){

let p=0

for(let i=0;i<poly.length;i++){

let j=(i+1)%poly.length

p+=Math.hypot(
poly[j].x-poly[i].x,
poly[j].y-poly[i].y)

}

return p

}

function updatePanel(){

let html=""
let total=0

for(let r of rooms){

let a=area(r.v)
let p=perimeter(r.v)

total+=a

html+=`
<div>
<b>${r.name}</b><br>
Área: ${a.toFixed(2)} m²<br>
Perímetro: ${p.toFixed(2)} m
</div><br>
`

}

document.getElementById("rooms").innerHTML=html
document.getElementById("total").innerHTML="Total: "+total.toFixed(2)+" m²"

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

for(let r of rooms){

ctx.beginPath()

ctx.moveTo(
metersToScreen(r.v[0].x),
metersToScreen(r.v[0].y)
)

for(let i=1;i<r.v.length;i++){

ctx.lineTo(
metersToScreen(r.v[i].x),
metersToScreen(r.v[i].y)
)

}

ctx.closePath()

ctx.fillStyle="rgba(0,120,255,0.2)"
ctx.fill()

ctx.strokeStyle="#2b83ff"
ctx.lineWidth=2
ctx.stroke()

}

if(current.length){

for(let p of current){

ctx.beginPath()
ctx.arc(
metersToScreen(p.x),
metersToScreen(p.y),
4,
0,
Math.PI*2
)
ctx.fillStyle="red"
ctx.fill()

}

let last=current[current.length-1]

ctx.beginPath()
ctx.moveTo(
metersToScreen(last.x),
metersToScreen(last.y)
)

ctx.lineTo(
metersToScreen(mouse.x),
metersToScreen(mouse.y)
)

ctx.setLineDash([6,6])
ctx.strokeStyle="#444"
ctx.stroke()
ctx.setLineDash([])

let dist=Math.hypot(mouse.x-last.x,mouse.y-last.y)

document.getElementById("hud").innerText=dist.toFixed(2)+" m"

}

}

draw()

</script>

</body>
</html>
