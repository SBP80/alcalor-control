<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ALLCALOR PRO</title>

<style>

body{
font-family:Arial;
background:#0f2b44;
color:white;
margin:0;
padding:15px;
user-select:none;
-webkit-user-select:none;
}

h1{
text-align:center;
}

.panel{
background:#12314a;
padding:12px;
border-radius:8px;
margin-bottom:10px;
}

button{
background:#2b83ff;
color:white;
border:none;
padding:8px 12px;
margin-right:6px;
cursor:pointer;
}

canvas{
background:#f4f1e8;
border-radius:8px;
display:block;
margin:auto;
touch-action:none;
}

#hud{
margin-top:6px;
font-weight:bold;
}

</style>

</head>

<body>

<h1>ALLCALOR PRO</h1>

<div class="panel">

Escala px/m
<input id="escala" type="number" value="100">

<button onclick="nuevaEstancia()">Nueva estancia</button>
<button onclick="cerrar()">Cerrar estancia</button>
<button onclick="deshacer()">Deshacer</button>
<button onclick="reiniciar()">Reiniciar</button>

<div id="hud">
Longitud: 0 m | Ángulo: 0°
</div>

<div id="datos"></div>

</div>

<canvas id="canvas" width="1200" height="650"></canvas>

<script>

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

let rooms=[]
let current=[]
let cerrado=false

let dragging=null

let mouse={x:0,y:0}

let zoom=1
let offsetX=0
let offsetY=0

function escala(){
return parseFloat(document.getElementById("escala").value)
}

function screenToWorld(x,y){

return{
x:(x-offsetX)/zoom,
y:(y-offsetY)/zoom
}

}

function worldToScreen(x,y){

return{
x:x*zoom+offsetX,
y:y*zoom+offsetY
}

}

function pos(e){

const r=canvas.getBoundingClientRect()

if(e.touches){

return screenToWorld(
e.touches[0].clientX-r.left,
e.touches[0].clientY-r.top
)

}

return screenToWorld(
e.clientX-r.left,
e.clientY-r.top
)

}

canvas.addEventListener("mousedown",inicio)
canvas.addEventListener("mousemove",mover)
canvas.addEventListener("mouseup",fin)

canvas.addEventListener("touchstart",inicio,{passive:false})
canvas.addEventListener("touchmove",mover,{passive:false})
canvas.addEventListener("touchend",fin)

canvas.addEventListener("wheel",zoomRueda)

canvas.addEventListener("dblclick",insertarVertice)

function inicio(e){

let p=pos(e)

for(let i=0;i<current.length;i++){

if(Math.hypot(p.x-current[i].x,p.y-current[i].y)<10/zoom){

dragging=i
return

}

}

if(!cerrado){

current.push(p)

}

}

function mover(e){

let p=pos(e)

mouse=p

if(dragging!=null){

current[dragging]=p

}

dibujar()

}

function fin(){

dragging=null

}

function zoomRueda(e){

let factor=e.deltaY<0?1.1:0.9

zoom*=factor

dibujar()

}

function nuevaEstancia(){

if(current.length>2){

rooms.push([...current])

}

current=[]

cerrado=false

dibujar()

}

function cerrar(){

if(current.length<3)return

cerrado=true

rooms.push([...current])

calcularDatos()

dibujar()

}

function deshacer(){

current.pop()

dibujar()

}

function reiniciar(){

rooms=[]
current=[]
cerrado=false

document.getElementById("datos").innerHTML=""

dibujar()

}

function insertarVertice(e){

if(current.length<2)return

let p=pos(e)

let mejor=99999
let index=0

for(let i=0;i<current.length;i++){

let j=(i+1)%current.length

let d=distanciaSegmento(p,current[i],current[j])

if(d<mejor){

mejor=d
index=j

}

}

if(mejor<20/zoom){

current.splice(index,0,p)

}

dibujar()

}

function distanciaSegmento(p,a,b){

let l2=(b.x-a.x)*(b.x-a.x)+(b.y-a.y)*(b.y-a.y)

let t=((p.x-a.x)*(b.x-a.x)+(p.y-a.y)*(b.y-a.y))/l2

t=Math.max(0,Math.min(1,t))

let x=a.x+t*(b.x-a.x)
let y=a.y+t*(b.y-a.y)

return Math.hypot(p.x-x,p.y-y)

}

function angulo(a,b,c){

let ang=Math.atan2(c.y-b.y,c.x-b.x)-Math.atan2(a.y-b.y,a.x-b.x)

ang=ang*180/Math.PI

if(ang<0)ang+=360

return ang

}

function cuadricula(){

let paso=escala()

ctx.strokeStyle="#ddd"

for(let x=-2000;x<2000;x+=paso){

let s=worldToScreen(x,0).x

ctx.beginPath()
ctx.moveTo(s,0)
ctx.lineTo(s,canvas.height)
ctx.stroke()

}

for(let y=-2000;y<2000;y+=paso){

let s=worldToScreen(0,y).y

ctx.beginPath()
ctx.moveTo(0,s)
ctx.lineTo(canvas.width,s)
ctx.stroke()

}

}

function dibujar(){

ctx.clearRect(0,0,canvas.width,canvas.height)

cuadricula()

for(let room of rooms){

ctx.beginPath()

let s=worldToScreen(room[0].x,room[0].y)

ctx.moveTo(s.x,s.y)

for(let i=1;i<room.length;i++){

let p=worldToScreen(room[i].x,room[i].y)

ctx.lineTo(p.x,p.y)

}

ctx.closePath()

ctx.fillStyle="rgba(0,120,255,0.15)"
ctx.fill()

ctx.strokeStyle="#2b83ff"
ctx.stroke()

}

if(current.length){

ctx.beginPath()

let s=worldToScreen(current[0].x,current[0].y)

ctx.moveTo(s.x,s.y)

for(let i=1;i<current.length;i++){

let p=worldToScreen(current[i].x,current[i].y)

ctx.lineTo(p.x,p.y)

}

ctx.stroke()

}

for(let p of current){

let s=worldToScreen(p.x,p.y)

ctx.beginPath()
ctx.arc(s.x,s.y,5,0,Math.PI*2)
ctx.fillStyle="red"
ctx.fill()

}

if(current.length){

let p=current[current.length-1]

let d=Math.hypot(mouse.x-p.x,mouse.y-p.y)/escala()

document.getElementById("hud").innerHTML=
"Longitud: "+d.toFixed(2)+" m"

}

}

function calcularDatos(){

let area=0
let per=0

for(let i=0;i<current.length;i++){

let j=(i+1)%current.length

area+=current[i].x*current[j].y-current[j].x*current[i].y

per+=Math.hypot(
current[i].x-current[j].x,
current[i].y-current[j].y
)

}

area=Math.abs(area/2)/(escala()*escala())
per=per/escala()

document.getElementById("datos").innerHTML=
"Área: "+area.toFixed(2)+" m²<br>Perímetro: "+per.toFixed(2)+" m"

}

dibujar()

</script>

</body>
</html>
