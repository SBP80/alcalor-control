<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ALLCALOR</title>

<style>
*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html,body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
font-family:Arial, Helvetica, sans-serif;
background:#111;
color:#fff;
}

body{
display:flex;
flex-direction:column;
}

header{
flex:0 0 auto;
background:#1f1f1f;
padding:20px 16px;
text-align:center;
font-weight:700;
font-size:24px;
letter-spacing:.5px;
}

#barra{
flex:0 0 auto;
background:#2a2a2a;
padding:12px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

button{
appearance:none;
border:none;
background:#f0842f;
color:white;
padding:14px 18px;
font-weight:700;
font-size:16px;
border-radius:10px;
}

button.activo{
background:#2f8f46;
}

#zonaCanvas{
flex:1 1 auto;
position:relative;
min-height:0;
background:#1d1d1d;
}

#canvas{
display:block;
width:100%;
height:100%;
background:#1d1d1d;
touch-action:none;
}

#info{
flex:0 0 auto;
background:#1f1f1f;
padding:10px 12px;
font-size:14px;
line-height:1.35;
border-top:1px solid #333;
}
</style>
</head>
<body>

<header>ALLCALOR ENGINE v2</header>

<div id="barra">
  <button id="btnEstancia">Nueva estancia</button>
  <button id="btnBorrar">Borrar última</button>
  <button id="btnLimpiar">Limpiar todo</button>
</div>

<div id="zonaCanvas">
  <canvas id="canvas"></canvas>
</div>

<div id="info">Pulsa “Nueva estancia”, toca el plano, arrastra y suelta.</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const zonaCanvas = document.getElementById("zonaCanvas");
const btnEstancia = document.getElementById("btnEstancia");
const btnBorrar = document.getElementById("btnBorrar");
const btnLimpiar = document.getElementById("btnLimpiar");
const info = document.getElementById("info");

let estancias = [];
let modo = "ninguno";

let dibujando = false;
let x0 = 0;
let y0 = 0;
let x1 = 0;
let y1 = 0;

function ajustarCanvas(){
  const r = zonaCanvas.getBoundingClientRect();
  canvas.width = Math.round(r.width * window.devicePixelRatio);
  canvas.height = Math.round(r.height * window.devicePixelRatio);
  canvas.style.width = r.width + "px";
  canvas.style.height = r.height + "px";
  ctx.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);
  dibujar();
}

function obtenerPosicion(e){
  const r = canvas.getBoundingClientRect();
  return {
    x: e.clientX - r.left,
    y: e.clientY - r.top
  };
}

function rectNormalizado(a,b,c,d){
  const x = Math.min(a,c);
  const y = Math.min(b,d);
  const w = Math.abs(c-a);
  const h = Math.abs(d-b);
  return {x,y,w,h};
}

function metrosDesdePx(px){
  return px / 100;
}

function dibujarCotaHorizontal(rect){
  const texto = metrosDesdePx(rect.w).toFixed(2).replace(".", ",") + " m";
  ctx.fillStyle = "#ffffff";
  ctx.font = "12px Arial";
  ctx.fillText(texto, rect.x + 6, rect.y + 16);
}

function dibujarCotaVertical(rect){
  const texto = metrosDesdePx(rect.h).toFixed(2).replace(".", ",") + " m";
  ctx.save();
  ctx.translate(rect.x + rect.w - 6, rect.y + 20);
  ctx.rotate(Math.PI / 2);
  ctx.fillStyle = "#ffffff";
  ctx.font = "12px Arial";
  ctx.fillText(texto, 0, 0);
  ctx.restore();
}

function dibujarRectangulo(rect, colorLinea, colorRelleno){
  ctx.fillStyle = colorRelleno;
  ctx.fillRect(rect.x, rect.y, rect.w, rect.h);

  ctx.strokeStyle = colorLinea;
  ctx.lineWidth = 2;
  ctx.strokeRect(rect.x, rect.y, rect.w, rect.h);

  dibujarCotaHorizontal(rect);
  dibujarCotaVertical(rect);
}

function dibujar(){
  const r = zonaCanvas.getBoundingClientRect();

  ctx.clearRect(0, 0, r.width, r.height);

  for(const est of estancias){
    dibujarRectangulo(est, "#00e38a", "rgba(0,227,138,0.08)");
  }

  if(dibujando){
    const prev = rectNormalizado(x0, y0, x1, y1);
    dibujarRectangulo(prev, "#f0842f", "rgba(240,132,47,0.10)");
  }

  if(modo === "estancia"){
    btnEstancia.classList.add("activo");
  } else {
    btnEstancia.classList.remove("activo");
  }
}

btnEstancia.addEventListener("click", () => {
  modo = "estancia";
  info.textContent = "Modo estancia activo. Toca el plano, arrastra y suelta.";
  dibujar();
});

btnBorrar.addEventListener("click", () => {
  if(estancias.length > 0){
    estancias.pop();
    info.textContent = "Última estancia borrada.";
    dibujar();
  }
});

btnLimpiar.addEventListener("click", () => {
  estancias = [];
  dibujando = false;
  info.textContent = "Plano limpiado.";
  dibujar();
});

canvas.addEventListener("pointerdown", (e) => {
  if(modo !== "estancia") return;

  const p = obtenerPosicion(e);
  dibujando = true;
  x0 = p.x;
  y0 = p.y;
  x1 = p.x;
  y1 = p.y;

  canvas.setPointerCapture(e.pointerId);
  info.textContent = "Arrastrando estancia...";
  dibujar();
});

canvas.addEventListener("pointermove", (e) => {
  if(!dibujando) return;

  const p = obtenerPosicion(e);
  x1 = p.x;
  y1 = p.y;
  dibujar();
});

canvas.addEventListener("pointerup", (e) => {
  if(!dibujando) return;

  const p = obtenerPosicion(e);
  x1 = p.x;
  y1 = p.y;

  const rect = rectNormalizado(x0, y0, x1, y1);

  dibujando = false;

  if(rect.w >= 20 && rect.h >= 20){
    estancias.push(rect);
    info.textContent = "Estancia creada. Puedes crear otra.";
  } else {
    info.textContent = "La estancia era demasiado pequeña.";
  }

  dibujar();
});

canvas.addEventListener("pointercancel", () => {
  dibujando = false;
  dibujar();
});

window.addEventListener("resize", ajustarCanvas);
ajustarCanvas();
</script>

</body>
</html>
