<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>ALLCALOR PRO</title>

<script src="https://cdn.jsdelivr.net/npm/konva@9/konva.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0f2b44;
color:white;
}

header{
background:#1b1b1b;
padding:10px;
text-align:center;
font-size:22px;
}

.toolbar{
background:#173a5e;
padding:10px;
}

button{
padding:6px 12px;
border:none;
border-radius:4px;
cursor:pointer;
font-weight:bold;
margin-right:6px;
}

.green{background:#28a745}
.blue{background:#2b83ff}
.orange{background:#ff9800}
.red{background:#e53935}

#layout{
display:flex;
}

#panel{
width:220px;
background:#1c3f63;
padding:10px;
}

#container{
flex:1;
background:#f4f1e8;
}

</style>
</head>

<body>

<header>🔥 ALLCALOR PRO</header>

<div class="toolbar">

<button class="green" onclick="startRoom()">Nueva estancia</button>
<button class="blue" onclick="closeRoom()">Cerrar estancia</button>
<button class="orange" onclick="undo()">Deshacer</button>
<button class="red" onclick="resetAll()">Reiniciar</button>

</div>

<div id="layout">

<div id="panel">

<h3>Estancias</h3>

<div id="roomsPanel"></div>

<hr>

Total: <span id="totalArea">0</span> m²

</div>

<div id="container"></div>

</div>

<script>

let stage=new Konva.Stage({
container:"container",
width:window.innerWidth-220,
height:700
})

let layer=new Konva.Layer()
stage.add(layer)

let drawing=false
let points=[]
let rooms=[]

let tempLine=new Konva.Line({
stroke:"blue",
strokeWidth:2
})

layer.add(tempLine)

function startRoom(){

drawing=true
points=[]
tempLine.points([])

}

stage.on("click",function(e){

if(!drawing)return

let pos=stage.getPointerPosition()

points.push(pos.x,pos.y)

tempLine.points(points)

layer.draw()

})

function closeRoom(){

if(points.length<6)return

drawing=false

let poly=new Konva.Line({
points:[...points],
closed:true,
fill:"rgba(0,150,255,0.2)",
stroke:"#2b83ff",
strokeWidth:2,
draggable:true
})

layer.add(poly)

rooms.push(poly)

points=[]
tempLine.points([])

layer.draw()

updatePanel()

}

function undo(){

points.splice(points.length-2,2)
tempLine.points(points)
layer.draw()

}

function resetAll(){

rooms.forEach(r=>r.destroy())

rooms=[]
points=[]
tempLine.points([])

layer.draw()

updatePanel()

}

function polygonArea(points){

let area=0

for(let i=0;i<points.length;i+=2){

let j=(i+2)%points.length

area+=points[i]*points[j+1]-points[j]*points[i+1]

}

return Math.abs(area/2)

}

function updatePanel(){

let html=""
let total=0

rooms.forEach((r,i)=>{

let a=polygonArea(r.points())/10000

total+=a

html+=`
Estancia ${i+1}<br>
Área: ${a.toFixed(2)} m²<hr>
`

})

document.getElementById("roomsPanel").innerHTML=html
document.getElementById("totalArea").innerText=total.toFixed(2)

}

</script>

</body>
</html>
