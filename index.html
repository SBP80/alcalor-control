<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ALLCALOR</title>

<style>

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html,body{
margin:0;
padding:0;
height:100dvh;
width:100%;
overflow:hidden;
background:#111;
font-family:Arial;
color:white;
display:flex;
flex-direction:column;
}

/* BARRA SUPERIOR */

#barra{

background:#1f1f1f;

display:flex;
gap:6px;

padding:6px;

flex-wrap:wrap;

}

/* BOTONES */

button{

border:none;

background:#f0842f;

color:white;

font-size:14px;

font-weight:bold;

padding:8px 10px;

border-radius:6px;

}

button.activo{
background:#2f8f46;
}

button.sec{
background:#4b5563;
}

/* AREA DIBUJO */

#zonaCanvas{

flex:1;

width:100%;

position:relative;

background:#1b1b1b;

}

#canvas{

width:100%;

height:100%;

display:block;

}

/* INFORMACION */

#info{

background:#1f1f1f;

padding:6px 10px;

font-size:12px;

border-top:1px solid #333;

white-space:pre-line;

}

</style>
</head>

<body>

<div id="barra">

<button id="btnEstancia">Estancia</button>

<button id="btnMover">Mover</button>

<button id="btnBorrarActiva">Borrar</button>

<button id="btnBorrarUltima" class="sec">Última</button>

<button id="btnLimpiar" class="sec">Limpiar</button>

</div>

<div id="zonaCanvas">

<canvas id="canvas"></canvas>

</div>

<div id="info">ALLCALOR listo</div>

<script>

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

const zonaCanvas=document.getElementById("zonaCanvas")

const btnEstancia=document.getElementById("btnEstancia")
const btnMover=document.getElementById("btnMover")
const btnBorrarActiva=document.getElementById("btnBorrarActiva")
const btnBorrarUltima=document.getElementById("btnBorrarUltima")
const btnLimpiar=document.getElementById("btnLimpiar")

const info=document.getElementById("info")

let modo="ninguno"

let estancias=[]
let activa=-1

let dibujando=false
let moviendo=false

let inicioX=0
let inicioY=0
let actualX=0
let actualY=0

let offsetMoveX=0
let offsetMoveY=0

let canvasW=0
let canvasH=0

function ajustarCanvas(){

const r=zonaCanvas.getBoundingClientRect()

const dpr=window.devicePixelRatio||1

canvasW=r.width
canvasH=r.height

canvas.width=canvasW*dpr
canvas.height=canvasH*dpr

canvas.style.width=canvasW+"px"
canvas.style.height=canvasH+"px"

ctx.setTransform(dpr,0,0,dpr,0,0)

dibujar()

}

function pos(e){

const r=canvas.getBoundingClientRect()

return{

x:e.clientX-r.left,
y:e.clientY-r.top

}

}

function rectNorm(x1,y1,x2,y2){

return{

x:Math.min(x1,x2),
y:Math.min(y1,y2),
w:Math.abs(x2-x1),
h:Math.abs(y2-y1)

}

}

function metros(px){

return px/100

}

function dentro(px,py,r){

return px>=r.x && px<=r.x+r.w && py>=r.y && py<=r.y+r.h

}

function buscar(x,y){

for(let i=estancias.length-1;i>=0;i--){

if(dentro(x,y,estancias[i]))return i

}

return -1

}

function textoRect(r){

ctx.fillStyle="#fff"

ctx.font="12px Arial"

ctx.fillText(metros(r.w).toFixed(2)+" m",r.x+8,r.y+18)
ctx.fillText(metros(r.h).toFixed(2)+" m",r.x+8,r.y+32)

}

function dibujarRect(r,sel){

ctx.fillStyle=sel?"rgba(240,132,47,0.18)":"rgba(0,227,138,0.10)"

ctx.fillRect(r.x,r.y,r.w,r.h)

ctx.strokeStyle=sel?"#f0842f":"#6af2a6"

ctx.lineWidth=sel?3:2

ctx.strokeRect(r.x,r.y,r.w,r.h)

textoRect(r)

}

function dibujar(){

ctx.clearRect(0,0,canvasW,canvasH)

for(let i=0;i<estancias.length;i++){

dibujarRect(estancias[i],i===activa)

}

if(dibujando){

const r=rectNorm(inicioX,inicioY,actualX,actualY)

ctx.strokeStyle="#f0842f"

ctx.lineWidth=2

ctx.strokeRect(r.x,r.y,r.w,r.h)

textoRect(r)

}

}

btnEstancia.onclick=()=>{

modo="estancia"

}

btnMover.onclick=()=>{

modo="mover"

}

btnBorrarActiva.onclick=()=>{

if(activa===-1)return

estancias.splice(activa,1)

activa=-1

dibujar()

}

btnBorrarUltima.onclick=()=>{

estancias.pop()

dibujar()

}

btnLimpiar.onclick=()=>{

estancias=[]

activa=-1

dibujar()

}

canvas.addEventListener("pointerdown",e=>{

const p=pos(e)

if(modo==="estancia"){

dibujando=true

inicioX=p.x
inicioY=p.y

actualX=p.x
actualY=p.y

}

if(modo==="mover"){

const i=buscar(p.x,p.y)

if(i!==-1){

activa=i

moviendo=true

offsetMoveX=p.x-estancias[i].x
offsetMoveY=p.y-estancias[i].y

}

}

})

canvas.addEventListener("pointermove",e=>{

const p=pos(e)

if(dibujando){

actualX=p.x
actualY=p.y

dibujar()

}

if(moviendo){

const r=estancias[activa]

r.x=p.x-offsetMoveX
r.y=p.y-offsetMoveY

dibujar()

}

})

canvas.addEventListener("pointerup",e=>{

if(dibujando){

const r=rectNorm(inicioX,inicioY,actualX,actualY)

dibujando=false

if(r.w>20 && r.h>20){

estancias.push(r)

activa=estancias.length-1

}

dibujar()

}

moviendo=false

})

window.addEventListener("resize",ajustarCanvas)

ajustarCanvas()

</script>

</body>
</html>
