<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ALLCALOR PRO</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f2b44;
color:white;
}

header{
background:#1b1b1b;
padding:12px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.toolbar{
background:#173a5e;
padding:10px;
}

button{
border:none;
padding:6px 12px;
margin-right:6px;
border-radius:4px;
cursor:pointer;
font-weight:bold;
}

.green{background:#28a745}
.blue{background:#2b83ff}
.orange{background:#ff9800}
.red{background:#e53935}
.yellow{background:#ffcc00;color:black}

#layout{
display:flex;
}

#panel{
width:220px;
background:#1c3f63;
padding:10px;
}

canvas{
background:#f4f1e8;
cursor:crosshair;
}

</style>
</head>

<body>

<header>🔥 ALLCALOR PRO</header>

<div class="toolbar">

Escala px/m
<input id="scale" type="number" value="100" style="width:60px">

<button class="green" onclick="newRoom()">Nueva estancia</button>
<button class="blue" onclick="closeRoom()">Cerrar estancia</button>
<button class="orange" onclick="undo()">Deshacer</button>
<button class="red" onclick="resetAll()">Reiniciar</button>

</div>

<div id="layout">

<div id="panel">

<h3>Estancias</h3>

<div id="rooms"></div>

<hr>

Total: <span id="totalArea">0</span> m²

</div>

<canvas id="canvas" width="1200" height="700"></canvas>

</div>

<script>

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

let scale=100

let rooms=[]
let current=[]
let drawing=false

let mouse={x:0,y:0}

let dragVertex=null
let dragRoom=null

function dist(a,b){
return Math.hypot(a.x-b.x,a.y-b.y)
}

function angle(a,b,c){

let ang=Math.atan2(c.y-b.y,c.x-b.x)-Math.atan2(a.y-b.y,a.x-b.x)
ang=Math.abs(ang*180/Math.PI)

if(ang>180) ang=360-ang

return ang

}

function polygonArea(v){

let sum=0

for(let i=0;i<v.length;i++){

let j=(i+1)%v.length

sum+=v[i].x*v[j].y-v[j].x*v[i].y

}

return Math.abs(sum/2)

}

function centroid(v){

let x=0
let y=0

for(let p of v){

x+=p.x
y+=p.y

}

return{
x:x/v.length,
y:y/v.length
}

}

function perimeter(v){

let sum=0

for(let i=0;i<v.length;i++){

let j=(i+1)%v.length
sum+=dist(v[i],v[j])

}

return sum

}

function snapPoint(last,point){

let dx=point.x-last.x
let dy=point.y-last.y

let ang=Math.atan2(dy,dx)
let deg=ang*180/Math.PI

let snap=[0,45,90,135,180,-45,-90,-135]

let closest=snap.reduce((a,b)=>
Math.abs(b-deg)<Math.abs(a-deg)?b:a)

let rad=closest*Math.PI/180
let d=Math.sqrt(dx*dx+dy*dy)

return{
x:last.x+Math.cos(rad)*d,
y:last.y+Math.sin(rad)*d
}

}

canvas.onmousedown=e=>{

let r=canvas.getBoundingClientRect()

let p={
x:e.clientX-r.left,
y:e.clientY-r.top
}

mouse=p

if(drawing){

if(current.length>0){

p=snapPoint(current[current.length-1],p)

}

current.push(p)

draw()
return

}

for(let room of rooms){

for(let v of room.v){

if(dist(v,p)<10){

dragVertex=v
return

}

}

}

}

canvas.onmousemove=e=>{

let r=canvas.getBoundingClientRect()

mouse={
x:e.clientX-r.left,
y:e.clientY-r.top
}

if(drawing && current.length>0){

mouse=snapPoint(current[current.length-1],mouse)

}

if(dragVertex){

dragVertex.x=mouse.x
dragVertex.y=mouse.y

updateList()

}

draw()

}

canvas.onmouseup=()=>{

dragVertex=null
dragRoom=null

}

function newRoom(){

drawing=true
current=[]

}

function closeRoom(){

if(current.length<3) return

let name=prompt("Nombre estancia")

rooms.push({
name:name||"estancia",
v:[...current]
})

drawing=false
current=[]

updateList()
draw()

}

function undo(){

current.pop()
draw()

}

function resetAll(){

rooms=[]
current=[]
drawing=false

updateList()
draw()

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

for(let room of rooms){

let v=room.v

ctx.beginPath()

ctx.moveTo(v[0].x,v[0].y)

for(let i=1;i<v.length;i++){

ctx.lineTo(v[i].x,v[i].y)

}

ctx.closePath()

ctx.fillStyle="rgba(0,150,255,0.15)"
ctx.fill()

ctx.strokeStyle="#2b83ff"
ctx.lineWidth=2
ctx.stroke()

for(let i=0;i<v.length;i++){

let a=v[i]
let b=v[(i+1)%v.length]
let mid={
x:(a.x+b.x)/2,
y:(a.y+b.y)/2
}

let d=dist(a,b)/scale

ctx.fillStyle="black"
ctx.fillText(d.toFixed(2)+" m",mid.x,mid.y)

}

for(let i=0;i<v.length;i++){

let a=v[(i-1+v.length)%v.length]
let b=v[i]
let c=v[(i+1)%v.length]

let ang=angle(a,b,c)

ctx.fillStyle="darkorange"
ctx.fillText(ang.toFixed(0)+"°",b.x+5,b.y-5)

}

for(let p of v){

ctx.beginPath()
ctx.arc(p.x,p.y,5,0,Math.PI*2)
ctx.fillStyle="red"
ctx.fill()

}

let c=centroid(v)

let area=polygonArea(v)/scale/scale

ctx.fillStyle="black"
ctx.textAlign="center"

ctx.fillText(room.name,c.x,c.y)
ctx.fillText(area.toFixed(2)+" m²",c.x,c.y+14)

}

if(current.length){

ctx.beginPath()

ctx.moveTo(current[0].x,current[0].y)

for(let i=1;i<current.length;i++){

ctx.lineTo(current[i].x,current[i].y)

}

ctx.strokeStyle="#2b83ff"
ctx.stroke()

}

}

function updateList(){

let html=""
let total=0

for(let r of rooms){

let area=polygonArea(r.v)/scale/scale
let per=perimeter(r.v)/scale

total+=area

html+=`
<b>${r.name}</b><br>
Área: ${area.toFixed(2)} m²<br>
Perímetro: ${per.toFixed(2)} m
<hr>
`

}

document.getElementById("rooms").innerHTML=html
document.getElementById("totalArea").innerText=total.toFixed(2)

}

draw()

</script>

</body>
</html>
