<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ALLCALOR V8</title>

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

html,body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
background:#111;
color:#fff;
font-family:Arial,Helvetica,sans-serif;
}

body{
display:flex;
flex-direction:column;
height:100dvh;
}

#barra{
flex:0 0 auto;
background:#1f1f1f;
padding:10px;
display:flex;
gap:8px;
flex-wrap:wrap;
border-bottom:1px solid #333;
}

button{
border:none;
border-radius:10px;
padding:12px 16px;
font-size:16px;
font-weight:700;
background:#f0842f;
color:#fff;
}

button.sec{background:#5a616c}
button.activo{background:#2f8f46}

#panel{
flex:0 0 auto;
display:none;
gap:10px;
align-items:center;
flex-wrap:wrap;
padding:10px;
background:#252525;
border-bottom:1px solid #333;
}

#panel.visible{display:flex}

.bloque{
display:flex;
align-items:center;
gap:8px;
background:#1a1a1a;
padding:8px 10px;
border-radius:10px;
}

.bloque span{font-size:15px}

.bloque input{
width:110px;
padding:8px;
font-size:18px;
border:none;
border-radius:8px;
background:#fff;
color:#111;
}

#zonaCanvas{
flex:1 1 auto;
min-height:0;
background:#181818;
}

#canvas{
width:100%;
height:100%;
display:block;
touch-action:none;
}

#info{
flex:0 0 auto;
padding:8px 10px;
font-size:13px;
line-height:1.35;
background:#1f1f1f;
border-top:1px solid #333;
white-space:pre-line;
}
</style>
</head>

<body>

<div id="barra">
<button id="btnPoligono">Polígono</button>
<button id="btnCerrar">Cerrar estancia</button>
<button id="btnEditar">Editar</button>
<button id="btnPuerta">Puerta</button>
<button id="btnBorrar" class="sec">Borrar activa</button>
<button id="btnLimpiar" class="sec">Limpiar</button>
</div>

<div id="panel">
<div class="bloque">
<span>Lado</span>
<input id="ladoInput" type="number" step="0.01">
<span>m</span>
</div>
<button id="aplicarLado">Aplicar</button>

<div class="bloque">
<span>Puerta</span>
<input id="puertaInput" type="number" step="0.01">
<span>m</span>
</div>
<button id="aplicarPuerta">Aplicar</button>

<button id="girarPuerta">Cambiar apertura</button>
</div>

<div id="zonaCanvas">
<canvas id="canvas"></canvas>
</div>

<div id="info">Modo polígono activo</div>

<script>

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")
const zonaCanvas=document.getElementById("zonaCanvas")
const info=document.getElementById("info")

const btnPoligono=document.getElementById("btnPoligono")
const btnCerrar=document.getElementById("btnCerrar")
const btnEditar=document.getElementById("btnEditar")
const btnPuerta=document.getElementById("btnPuerta")
const btnBorrar=document.getElementById("btnBorrar")
const btnLimpiar=document.getElementById("btnLimpiar")

const panel=document.getElementById("panel")
const ladoInput=document.getElementById("ladoInput")
const puertaInput=document.getElementById("puertaInput")

const aplicarLado=document.getElementById("aplicarLado")
const aplicarPuerta=document.getElementById("aplicarPuerta")
const girarPuerta=document.getElementById("girarPuerta")

let W=0,H=0

let modo="poligono"
let estancias=[]
let puertas=[]

let poligonoActual=[]

let activa=-1
let ladoActivo=-1

let PX=100

function resize(){
const r=zonaCanvas.getBoundingClientRect()
W=r.width
H=r.height
canvas.width=W*devicePixelRatio
canvas.height=H*devicePixelRatio
canvas.style.width=W+"px"
canvas.style.height=H+"px"
ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0)
draw()
}

function pos(ev){
const r=canvas.getBoundingClientRect()
return{
x:ev.clientX-r.left,
y:ev.clientY-r.top
}
}

function dist(a,b){
return Math.hypot(a.x-b.x,a.y-b.y)
}

function m(px){return (px/PX).toFixed(2)}

function inside(x,y,p){
let inside=false
for(let i=0,j=p.length-1;i<p.length;j=i++){
const xi=p[i].x,yi=p[i].y
const xj=p[j].x,yj=p[j].y
const intersect=((yi>y)!=(yj>y))&&(x<(xj-xi)*(y-yi)/(yj-yi)+xi)
if(intersect)inside=!inside
}
return inside
}

function sideHit(x,y,poly){
for(let i=0;i<poly.length;i++){
const a=poly[i]
const b=poly[(i+1)%poly.length]
const d=lineDist(x,y,a.x,a.y,b.x,b.y)
if(d<20)return i
}
return -1
}

function lineDist(px,py,x1,y1,x2,y2){
const A=px-x1
const B=py-y1
const C=x2-x1
const D=y2-y1
const dot=A*C+B*D
const len=C*C+D*D
let t=dot/len
t=Math.max(0,Math.min(1,t))
const x=x1+t*C
const y=y1+t*D
return Math.hypot(px-x,py-y)
}

function drawDoor(d){

const a=d.a
const b=d.b

const dx=b.x-a.x
const dy=b.y-a.y

const len=Math.hypot(dx,dy)

const ux=dx/len
const uy=dy/len

const cx=a.x+ux*d.pos
const cy=a.y+uy*d.pos

const w=d.width*PX

const hx=ux*w/2
const hy=uy*w/2

const x1=cx-hx
const y1=cy-hy
const x2=cx+hx
const y2=cy+hy

ctx.lineWidth=4
ctx.strokeStyle="#fff"
ctx.beginPath()
ctx.moveTo(x1,y1)
ctx.lineTo(x2,y2)
ctx.stroke()

const nx=-uy
const ny=ux

const dir=d.flip? -1:1

const arcR=w

ctx.beginPath()
ctx.strokeStyle="#aaa"
ctx.arc(cx,cy,arcR,
Math.atan2(y1-cy,x1-cx),
Math.atan2(y1-cy,x1-cx)+dir*Math.PI/2)
ctx.stroke()

}

function drawPoly(p,sel){

ctx.beginPath()
ctx.moveTo(p[0].x,p[0].y)
for(let i=1;i<p.length;i++)ctx.lineTo(p[i].x,p[i].y)
ctx.closePath()

ctx.fillStyle=sel?"rgba(240,132,47,.2)":"rgba(0,227,138,.1)"
ctx.fill()

ctx.strokeStyle=sel?"#f0842f":"#78f1af"
ctx.lineWidth=2
ctx.stroke()

for(let i=0;i<p.length;i++){
const a=p[i]
const b=p[(i+1)%p.length]
ctx.fillStyle="#fff"
ctx.font="12px Arial"
ctx.fillText(m(dist(a,b))+" m",(a.x+b.x)/2,(a.y+b.y)/2)
}

}

function draw(){

ctx.clearRect(0,0,W,H)

for(let i=0;i<estancias.length;i++){
drawPoly(estancias[i],i===activa)
}

for(const d of puertas){
drawDoor(d)
}

if(poligonoActual.length){
ctx.beginPath()
ctx.moveTo(poligonoActual[0].x,poligonoActual[0].y)
for(let i=1;i<poligonoActual.length;i++)
ctx.lineTo(poligonoActual[i].x,poligonoActual[i].y)
ctx.strokeStyle="#f0842f"
ctx.stroke()
}

}

canvas.addEventListener("pointerdown",e=>{

const p=pos(e)

if(modo==="poligono"){
poligonoActual.push(p)
draw()
return
}

for(let i=estancias.length-1;i>=0;i--){
if(inside(p.x,p.y,estancias[i])){
activa=i
ladoActivo=sideHit(p.x,p.y,estancias[i])
panel.classList.add("visible")
draw()
return
}
}

})

btnCerrar.onclick=()=>{
if(poligonoActual.length<3)return
estancias.push(poligonoActual)
poligonoActual=[]
draw()
}

btnEditar.onclick=()=>{
modo="editar"
info.textContent="Modo editar"
}

btnPoligono.onclick=()=>{
modo="poligono"
info.textContent="Modo polígono"
}

btnPuerta.onclick=()=>{

if(activa==-1||ladoActivo==-1)return

const poly=estancias[activa]

const a=poly[ladoActivo]
const b=poly[(ladoActivo+1)%poly.length]

const len=dist(a,b)

puertas.push({
a,b,
pos:len/2,
width:0.82,
flip:false
})

draw()

}

aplicarPuerta.onclick=()=>{
const v=parseFloat(puertaInput.value)
if(!v)return
const d=puertas[puertas.length-1]
d.width=v
draw()
}

girarPuerta.onclick=()=>{
const d=puertas[puertas.length-1]
d.flip=!d.flip
draw()
}

btnLimpiar.onclick=()=>{
estancias=[]
puertas=[]
poligonoActual=[]
activa=-1
draw()
}

window.addEventListener("resize",resize)
resize()

</script>
</body>
</html>
