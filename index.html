<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>ALLCALOR PRO</title>

<style>

body{
font-family:Arial;
background:#0f2b44;
color:white;
margin:0;
padding:20px;
}

h1{
text-align:center;
}

.panel{
background:#12314a;
padding:15px;
border-radius:8px;
margin-bottom:15px;
}

button{
background:#2b83ff;
color:white;
border:none;
padding:8px 12px;
cursor:pointer;
margin-right:8px;
}

canvas{
background:#f4f1e8;
border-radius:8px;
display:block;
margin:auto;
}

input{
padding:6px;
width:120px;
}

</style>

</head>

<body>

<h1>ALLCALOR PRO - Motor Geométrico</h1>

<div class="panel">

Nombre estancia
<input id="nombreEstancia" value="habitacion 1">

<br><br>

Escala: 1m =
<input type="number" id="escalaInput" value="100">

px

Separación tubo (cm)
<input type="number" id="pasoInput" value="10">

<br><br>

<button onclick="cerrarPoligono()">Cerrar estancia</button>
<button onclick="deshacer()">Deshacer</button>
<button onclick="reiniciar()">Reiniciar</button>
<button onclick="generarCircuito()">Generar circuito</button>
<button onclick="modoColector()">Colocar colector</button>
<button onclick="modoPuerta()">Colocar puerta</button>

<div id="datos"></div>

</div>

<canvas id="canvas" width="1000" height="600"></canvas>

<script>

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

let puntos=[]
let cerrado=false

let mouse={x:0,y:0}

let arrastrandoPunto=null
let arrastrandoColector=false
let arrastrandoPuerta=null

let colector=null
let modo_col=false

let puertas=[]
let modo_puerta=false

let circuito=[]

let puertaSeleccionada=null

document.addEventListener("keydown",e=>{

if(e.key==="r" && puertaSeleccionada!==null){

puertas[puertaSeleccionada].orientacion+=Math.PI/2
dibujar()

}

})

canvas.addEventListener("wheel",e=>{

if(puertaSeleccionada!==null){

puertas[puertaSeleccionada].ancho+=e.deltaY>0?-5:5

if(puertas[puertaSeleccionada].ancho<20)
puertas[puertaSeleccionada].ancho=20

dibujar()

}

})

canvas.addEventListener("mousedown",e=>{

const rect=canvas.getBoundingClientRect()

let x=e.clientX-rect.left
let y=e.clientY-rect.top

for(let i=0;i<puntos.length;i++){

let p=puntos[i]

if(Math.hypot(x-p.x,y-p.y)<8){

arrastrandoPunto=i
return

}

}

if(colector){

if(Math.hypot(x-colector.x,y-colector.y)<10){

arrastrandoColector=true
return

}

}

for(let i=0;i<puertas.length;i++){

let p=puertas[i]

if(Math.hypot(x-p.x,y-p.y)<10){

arrastrandoPuerta=i
puertaSeleccionada=i
return

}

}

})

canvas.addEventListener("mouseup",()=>{

arrastrandoPunto=null
arrastrandoColector=false
arrastrandoPuerta=null

})

canvas.addEventListener("mousemove",e=>{

const rect=canvas.getBoundingClientRect()

mouse.x=e.clientX-rect.left
mouse.y=e.clientY-rect.top

if(arrastrandoPunto!==null){

puntos[arrastrandoPunto].x=mouse.x
puntos[arrastrandoPunto].y=mouse.y

dibujar()
return

}

if(arrastrandoColector){

colector.x=mouse.x
colector.y=mouse.y

dibujar()
return

}

if(arrastrandoPuerta!==null){

puertas[arrastrandoPuerta].x=mouse.x
puertas[arrastrandoPuerta].y=mouse.y

dibujar()
return

}

dibujar()

})

canvas.addEventListener("click",e=>{

const rect=canvas.getBoundingClientRect()

let x=e.clientX-rect.left
let y=e.clientY-rect.top

if(modo_col){

colector={x,y}
modo_col=false
dibujar()
return

}

if(modo_puerta){

puertas.push({
x,
y,
ancho:90,
orientacion:0
})

modo_puerta=false
dibujar()
return

}

if(cerrado)return

puntos.push({x,y})

dibujar()

})

function modoColector(){

modo_col=true

}

function modoPuerta(){

modo_puerta=true

}

function cerrarPoligono(){

if(puntos.length<3)return

cerrado=true

calcularDatos()

dibujar()

}

function deshacer(){

if(cerrado)return

puntos.pop()

dibujar()

}

function reiniciar(){

puntos=[]
puertas=[]
colector=null
circuito=[]
cerrado=false

document.getElementById("datos").innerHTML=""

dibujar()

}

function getEscala(){

return parseFloat(document.getElementById("escalaInput").value)

}

function dibujarCuadricula(){

let escala=getEscala()

let fino=escala/10
let metro=escala

for(let x=0;x<canvas.width;x+=fino){

ctx.beginPath()

ctx.strokeStyle=(x%metro===0)?"#cfcfcf":"#e7e7e7"

ctx.moveTo(x,0)
ctx.lineTo(x,canvas.height)
ctx.stroke()

}

for(let y=0;y<canvas.height;y+=fino){

ctx.beginPath()

ctx.strokeStyle=(y%metro===0)?"#cfcfcf":"#e7e7e7"

ctx.moveTo(0,y)
ctx.lineTo(canvas.width,y)
ctx.stroke()

}

}

function dibujar(){

ctx.clearRect(0,0,canvas.width,canvas.height)

dibujarCuadricula()

if(puntos.length){

ctx.beginPath()
ctx.moveTo(puntos[0].x,puntos[0].y)

for(let i=1;i<puntos.length;i++)
ctx.lineTo(puntos[i].x,puntos[i].y)

if(cerrado){
ctx.closePath()
ctx.fillStyle="rgba(0,120,255,0.15)"
ctx.fill()
}

ctx.strokeStyle="#2b83ff"
ctx.lineWidth=2
ctx.stroke()

}

for(let p of puntos){

ctx.beginPath()
ctx.arc(p.x,p.y,5,0,Math.PI*2)
ctx.fillStyle="red"
ctx.fill()

}

if(!cerrado && puntos.length){

let p=puntos[puntos.length-1]

ctx.beginPath()
ctx.moveTo(p.x,p.y)
ctx.lineTo(mouse.x,mouse.y)
ctx.setLineDash([5,5])
ctx.stroke()
ctx.setLineDash([])

let dx=mouse.x-p.x
let dy=mouse.y-p.y

let dist=Math.hypot(dx,dy)/getEscala()

ctx.fillStyle="black"
ctx.fillText(dist.toFixed(2)+" m",mouse.x+10,mouse.y-10)

}

for(let puerta of puertas){

ctx.strokeStyle="brown"
ctx.lineWidth=4

ctx.beginPath()

let dx=Math.cos(puerta.orientacion)*puerta.ancho/2
let dy=Math.sin(puerta.orientacion)*puerta.ancho/2

ctx.moveTo(puerta.x-dx,puerta.y-dy)
ctx.lineTo(puerta.x+dx,puerta.y+dy)

ctx.stroke()

ctx.beginPath()

ctx.arc(puerta.x,puerta.y,puerta.ancho,puerta.orientacion,puerta.orientacion+Math.PI/2)

ctx.strokeStyle="rgba(150,150,150,0.6)"
ctx.stroke()

}

if(colector){

ctx.beginPath()
ctx.arc(colector.x,colector.y,7,0,Math.PI*2)
ctx.fillStyle="orange"
ctx.fill()

ctx.fillStyle="black"
ctx.fillText("Colector",colector.x+10,colector.y)

}

if(circuito.length){

ctx.beginPath()
ctx.moveTo(circuito[0].x,circuito[0].y)

for(let p of circuito)
ctx.lineTo(p.x,p.y)

ctx.strokeStyle="green"
ctx.stroke()

}

}

function generarCircuito(){

if(!cerrado)return

circuito=[]

let paso=(parseFloat(document.getElementById("pasoInput").value)/100)*getEscala()

let minX=Math.min(...puntos.map(p=>p.x))
let maxX=Math.max(...puntos.map(p=>p.x))
let minY=Math.min(...puntos.map(p=>p.y))
let maxY=Math.max(...puntos.map(p=>p.y))

for(let y=minY;y<maxY;y+=paso){

for(let x=minX;x<maxX;x+=paso){

if(puntoDentro(x,y))
circuito.push({x,y})

}

}

dibujar()

}

function puntoDentro(x,y){

let dentro=false

for(let i=0,j=puntos.length-1;i<puntos.length;j=i++){

let xi=puntos[i].x
let yi=puntos[i].y
let xj=puntos[j].x
let yj=puntos[j].y

let intersect=((yi>y)!=(yj>y))&&(x<(xj-xi)*(y-yi)/(yj-yi)+xi)

if(intersect)dentro=!dentro

}

return dentro

}

function calcularDatos(){

let area=0
let per=0

for(let i=0;i<puntos.length;i++){

let j=(i+1)%puntos.length

area+=puntos[i].x*puntos[j].y-puntos[j].x*puntos[i].y

per+=Math.hypot(
puntos[i].x-puntos[j].x,
puntos[i].y-puntos[j].y
)

}

area=Math.abs(area/2)/(getEscala()*getEscala())
per=per/getEscala()

document.getElementById("datos").innerHTML=
document.getElementById("nombreEstancia").value+
"<br>Área: "+area.toFixed(2)+" m²"+
"<br>Perímetro: "+per.toFixed(2)+" m"

}

dibujar()

</script>

</body>
</html>
