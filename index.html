<!DOCTYPE html>
<!-- Define que usamos HTML5 -->

<html lang="es">
<!-- Idioma del documento -->

<head>

<meta charset="UTF-8">
<!-- Permite caracteres especiales -->

<title>ALLCALOR PRO</title>
<!-- Título de la pestaña -->

<style>

/* Estilo general del documento */
body{
    font-family:Arial;
    background:#0f2b44;
    color:white;
    margin:0;
    padding:20px;
}

/* Título centrado */
h1{
    text-align:center;
}

/* Panel de controles */
.panel{
    background:#12314a;
    padding:15px;
    border-radius:8px;
    margin-bottom:15px;
}

/* Botones */
button{
    background:#2b83ff;
    color:white;
    border:none;
    padding:8px 12px;
    cursor:pointer;
    margin-right:8px;
}

/* Canvas de dibujo */
canvas{
    background:#efe9dd;
    border-radius:8px;
    display:block;
    margin:auto;
}

/* Texto de información */
.info{
    margin-top:10px;
}

/* Inputs */
input{
    padding:6px;
    width:80px;
}

</style>

</head>

<body>

<h1>ALLCALOR PRO - Motor Geométrico</h1>

<div class="panel">

Escala: 1 metro =
<input type="number" id="escalaInput" value="50">
px

Separación tubo (cm):
<input type="number" id="pasoInput" value="10">

<br><br>

<button onclick="cerrarPoligono()">Cerrar estancia</button>

<button onclick="deshacer()">Deshacer</button>

<button onclick="reiniciar()">Reiniciar</button>

<button onclick="generarAnillos()">Generar anillos</button>

<div class="info" id="info"></div>

</div>

<canvas id="canvas" width="1000" height="600"></canvas>

<script>

/* Referencia al canvas */
const canvas = document.getElementById("canvas");

/* Contexto de dibujo 2D */
const ctx = canvas.getContext("2d");

/* Array que guarda vértices de la estancia */
let puntos = [];

/* Indica si el polígono está cerrado */
let cerrado = false;

/* Array que almacenará todos los anillos */
let anillos = [];

/* Obtiene escala px por metro */
function getEscala(){
    return parseFloat(document.getElementById("escalaInput").value);
}

/* Convierte separación del tubo en píxeles */
function getPaso(){

    let cm = parseFloat(document.getElementById("pasoInput").value);

    return (cm/100) * getEscala();

}

/* Evento clic sobre el canvas */
canvas.addEventListener("click", function(e){

    /* Si el polígono está cerrado no añadimos más puntos */
    if(cerrado) return;

    /* Posición del canvas */
    const rect = canvas.getBoundingClientRect();

    /* Coordenadas del clic */
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    /* Guardamos punto */
    puntos.push({x,y});

    /* Redibujamos */
    dibujar();

});

/* Cierra el polígono */
function cerrarPoligono(){

    /* Necesitamos mínimo 3 puntos */
    if(puntos.length < 3) return;

    /* Detectamos si hay cruces */
    if(tieneInterseccion()){

        alert("El polígono tiene líneas cruzadas");

        return;

    }

    cerrado = true;

    dibujar();

}

/* Deshacer último punto */
function deshacer(){

    if(cerrado) return;

    puntos.pop();

    dibujar();

}

/* Reiniciar editor */
function reiniciar(){

    puntos = [];
    anillos = [];
    cerrado = false;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    document.getElementById("info").innerHTML="";

}

/* Dibuja todo el sistema */
function dibujar(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    if(puntos.length===0) return;

    /* Dibujar polígono principal */

    ctx.beginPath();
    ctx.moveTo(puntos[0].x,puntos[0].y);

    for(let i=1;i<puntos.length;i++){
        ctx.lineTo(puntos[i].x,puntos[i].y);
    }

    if(cerrado){

        ctx.closePath();

        ctx.fillStyle="rgba(43,131,255,0.2)";
        ctx.fill();

    }

    ctx.strokeStyle="#2b83ff";
    ctx.lineWidth=2;
    ctx.stroke();

    /* Dibujar vértices */

    for(let p of puntos){

        ctx.beginPath();
        ctx.arc(p.x,p.y,4,0,Math.PI*2);
        ctx.fillStyle="#ff4444";
        ctx.fill();

    }

    /* Dibujar anillos interiores */

    for(let anillo of anillos){

        ctx.beginPath();
        ctx.moveTo(anillo[0].x,anillo[0].y);

        for(let i=1;i<anillo.length;i++){
            ctx.lineTo(anillo[i].x,anillo[i].y);
        }

        ctx.closePath();

        ctx.strokeStyle="green";
        ctx.lineWidth=2;
        ctx.stroke();

    }

    mostrarDatos();

}

/* Genera múltiples anillos interiores */
function generarAnillos(){

    if(!cerrado) return;

    anillos = [];

    let actual = puntos;

    const paso = getPaso();

    while(true){

        let nuevo = generarOffset(actual,paso);

        if(nuevo.length < 3) break;

        anillos.push(nuevo);

        actual = nuevo;

        if(anillos.length > 100) break;

    }

    dibujar();

}

/* Genera offset interior */
function generarOffset(poligono,dist){

    let nuevo=[];

    for(let i=0;i<poligono.length;i++){

        let p0 = poligono[(i-1+poligono.length)%poligono.length];
        let p1 = poligono[i];
        let p2 = poligono[(i+1)%poligono.length];

        let v1x=p1.x-p0.x;
        let v1y=p1.y-p0.y;

        let v2x=p2.x-p1.x;
        let v2y=p2.y-p1.y;

        let l1=Math.hypot(v1x,v1y);
        let l2=Math.hypot(v2x,v2y);

        v1x/=l1;
        v1y/=l1;

        v2x/=l2;
        v2y/=l2;

        let nx=v1y-v2y;
        let ny=-(v1x-v2x);

        let len=Math.hypot(nx,ny);

        if(len===0) continue;

        nx/=len;
        ny/=len;

        nuevo.push({

            x:p1.x+nx*dist,
            y:p1.y+ny*dist

        });

    }

    return nuevo;

}

/* Calcula área del polígono */
function calcularArea(){

    let area=0;

    for(let i=0;i<puntos.length;i++){

        let j=(i+1)%puntos.length;

        area+=puntos[i].x*puntos[j].y;
        area-=puntos[j].x*puntos[i].y;

    }

    return Math.abs(area/2);

}

/* Calcula perímetro */
function calcularPerimetro(){

    let p=0;

    for(let i=0;i<puntos.length;i++){

        let j=(i+1)%puntos.length;

        let dx=puntos[j].x-puntos[i].x;
        let dy=puntos[j].y-puntos[i].y;

        p+=Math.hypot(dx,dy);

    }

    return p;

}

/* Muestra datos técnicos */
function mostrarDatos(){

    if(puntos.length<3) return;

    const escala=getEscala();

    let areaM=calcularArea()/(escala*escala);

    let perM=calcularPerimetro()/escala;

    document.getElementById("info").innerHTML=
    "Área: "+areaM.toFixed(2)+" m² | Perímetro: "+perM.toFixed(2)+" m";

}

/* Detecta intersecciones */
function tieneInterseccion(){

    for(let i=0;i<puntos.length-1;i++){

        for(let j=i+2;j<puntos.length-1;j++){

            if(intersectan(puntos[i],puntos[i+1],puntos[j],puntos[j+1]))
                return true;

        }

    }

    return false;

}

/* Algoritmo geométrico */
function intersectan(p1,p2,p3,p4){

    function ccw(a,b,c){
        return (c.y-a.y)*(b.x-a.x) > (b.y-a.y)*(c.x-a.x);
    }

    return (ccw(p1,p3,p4)!=ccw(p2,p3,p4)) &&
           (ccw(p1,p2,p3)!=ccw(p1,p2,p4));

}

</script>

</body>
</html>
