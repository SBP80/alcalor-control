<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>🔥 ALLCALOR PRO</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f2b44;
color:white;
padding:10px;
}

h1{
text-align:center;
margin-bottom:10px;
}

.toolbar{
background:#12314a;
padding:10px;
border-radius:8px;
margin-bottom:10px;
}

button{
border:none;
padding:8px 12px;
margin-right:6px;
border-radius:5px;
font-weight:bold;
cursor:pointer;
}

.green{background:#28a745}
.blue{background:#2b83ff}
.orange{background:#ff9800}
.red{background:#e53935}
.zoom{background:#ffcc00;color:black}

#layout{
display:flex;
gap:10px;
}

#panel{
width:220px;
background:#12314a;
padding:10px;
border-radius:8px;
}

canvas{
background:#f4f1e8;
border-radius:8px;
cursor:crosshair;
}

#hud{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.6);
padding:6px 12px;
border-radius:6px;
font-weight:bold;
}

</style>
</head>

<body>

<h1>🔥 ALLCALOR PRO</h1>

<div class="toolbar">

Escala px/m
<input id="scale" type="number" value="100" style="width:70px">

<button class="green" onclick="newRoom()">Nueva estancia</button>
<button class="blue" onclick="closeRoom()">Cerrar estancia</button>
<button class="orange" onclick="undo()">Deshacer</button>
<button class="red" onclick="resetAll()">Reiniciar</button>

<button class="zoom" onclick="zoomIn()">+</button>
<button class="zoom" onclick="zoomOut()">−</button>
<button class="zoom" onclick="centerView()">Centrar</button>

</div>

<div id="layout">

<div id="panel">
<b>Estancias</b>
<div id="rooms"></div>
</div>

<div style="position:relative">

<div id="hud">
<span id="len">0 m</span> |
<span id="ang">0°</span>
</div>

<canvas id="canvas" width="1100" height="650"></canvas>

</div>

</div>

<script>

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

let rooms=[]
let current=[]
let drawing=false

let scale=100

let zoom=1
let offsetX=0
let offsetY=0

let mouse={x:0,y:0}

let dragVertex=null
let dragRoom=null

function w2s(x,y){
return{
x:x*zoom+offsetX,
y:y*zoom+offsetY
}
}

function s2w(x,y){
return{
x:(x-offsetX)/zoom,
y:(y-offsetY)/zoom
}
}

function pos(e){
const r=canvas.getBoundingClientRect()
return s2w(
e.clientX-r.left,
e.clientY-r.top
)
}

canvas.onmousedown=e=>start(e)
canvas.onmousemove=e=>move(e)
canvas.onmouseup=end

function start(e){

let p=pos(e)
mouse=p

if(drawing){
current.push(p)
draw()
return
}

for(let r of rooms){
for(let v of r.v){
if(Math.hypot(v.x-p.x,v.y-p.y)<10/zoom){
dragVertex=v
return
}
}
}

for(let r of rooms){
if(pointInside(p,r.v)){
dragRoom={room:r,start:p}
return
}
}

}

function move(e){

let p=pos(e)
mouse=p

if(dragVertex){
dragVertex.x=p.x
dragVertex.y=p.y
}

if(dragRoom){
let dx=p.x-dragRoom.start.x
let dy=p.y-dragRoom.start.y
dragRoom.start=p
for(let v of dragRoom.room.v){
v.x+=dx
v.y+=dy
}
}

updateHUD()

draw()

}

function end(){
dragVertex=null
dragRoom=null
}

function newRoom(){
drawing=true
current=[]
}

function closeRoom(){

if(current.length<3)return

let name=prompt("Nombre estancia")
rooms.push({name:name||"estancia",v:[...current]})

current=[]
drawing=false
updateList()
draw()

}

function undo(){
current.pop()
draw()
}

function resetAll(){
rooms=[]
current=[]
drawing=false
updateList()
draw()
}

function zoomIn(){zoom*=1.2;draw()}
function zoomOut(){zoom*=0.8;draw()}
function centerView(){zoom=1;offsetX=0;offsetY=0;draw()}

function updateHUD(){

if(current.length===0)return

let last=current[current.length-1]

let dist=Math.hypot(mouse.x-last.x,mouse.y-last.y)/scale

let ang=0

if(current.length>1){
let prev=current[current.length-2]
ang=angle(prev,last,mouse)
}

document.getElementById("len").innerText=dist.toFixed(2)+" m"
document.getElementById("ang").innerText=ang.toFixed(1)+"°"

}

function angle(a,b,c){

let ang=Math.atan2(c.y-b.y,c.x-b.x)-
Math.atan2(a.y-b.y,a.x-b.x)

ang=Math.abs(ang*180/Math.PI)

if(ang>180)ang=360-ang

return ang

}

function pointInside(p,poly){

let inside=false

for(let i=0,j=poly.length-1;i<poly.length;j=i++){

let xi=poly[i].x,yi=poly[i].y
let xj=poly[j].x,yj=poly[j].y

let intersect=((yi>p.y)!=(yj>p.y)) &&
(p.x<(xj-xi)*(p.y-yi)/(yj-yi)+xi)

if(intersect)inside=!inside

}

return inside

}

function updateList(){

let html=""

for(let r of rooms){
html+=`<div>${r.name}</div>`
}

document.getElementById("rooms").innerHTML=html

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

for(let r of rooms){

ctx.beginPath()

let s=w2s(r.v[0].x,r.v[0].y)
ctx.moveTo(s.x,s.y)

for(let i=1;i<r.v.length;i++){
let p=w2s(r.v[i].x,r.v[i].y)
ctx.lineTo(p.x,p.y)
}

ctx.closePath()

ctx.fillStyle="rgba(0,120,255,0.15)"
ctx.fill()

ctx.strokeStyle="#2b83ff"
ctx.lineWidth=2
ctx.stroke()

for(let v of r.v){

let p=w2s(v.x,v.y)

ctx.beginPath()
ctx.arc(p.x,p.y,5,0,Math.PI*2)
ctx.fillStyle="red"
ctx.fill()

}

}

if(current.length){

for(let v of current){

let p=w2s(v.x,v.y)

ctx.beginPath()
ctx.arc(p.x,p.y,5,0,Math.PI*2)
ctx.fillStyle="red"
ctx.fill()

}

let last=current[current.length-1]

let s1=w2s(last.x,last.y)
let s2=w2s(mouse.x,mouse.y)

ctx.setLineDash([6,6])
ctx.beginPath()
ctx.moveTo(s1.x,s1.y)
ctx.lineTo(s2.x,s2.y)
ctx.stroke()
ctx.setLineDash([])

}

}

draw()

</script>

</body>
</html>
