<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>🔥 ALLCALOR PRO</title>

<style>

body{
font-family:Arial;
background:#0f2b44;
color:white;
margin:0;
padding:10px;
}

h1{text-align:center}

.panel{
background:#12314a;
padding:10px;
border-radius:8px;
margin-bottom:10px;
display:flex;
gap:8px;
align-items:center;
flex-wrap:wrap;
}

button{
border:none;
padding:8px 12px;
font-weight:bold;
border-radius:4px;
cursor:pointer;
}

.new{background:#28a745}
.close{background:#2b83ff}
.undo{background:#ff9800}
.reset{background:#e53935}

.nav{background:#555}

#layout{
display:flex;
gap:10px;
}

#lista{
width:220px;
background:#12314a;
padding:10px;
border-radius:8px;
}

canvas{
background:#f4f1e8;
border-radius:8px;
touch-action:none;
}

#canvasBox{position:relative}

#hud{
position:absolute;
top:0;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.6);
padding:6px 14px;
border-radius:6px;
font-size:18px;
font-weight:bold;
}

.len{color:#00e676}
.ang{color:#ff9800}

#cursor{
position:absolute;
pointer-events:none;
background:rgba(0,0,0,0.6);
padding:4px 8px;
border-radius:4px;
font-size:14px;
}

</style>
</head>

<body>

<h1>🔥 ALLCALOR PRO</h1>

<div class="panel">

Escala
<input id="escala" type="number" value="100">

<button class="new" onclick="newRoom()">Nueva estancia</button>
<button class="close" onclick="closeRoom()">Cerrar estancia</button>
<button class="undo" onclick="undo()">Deshacer</button>
<button class="reset" onclick="reset()">Reiniciar</button>

<button class="nav" onclick="zoom(1.2)">+</button>
<button class="nav" onclick="zoom(0.8)">−</button>
<button class="nav" onclick="center()">⛶</button>
<button class="nav" onclick="toggleMove()">🖐</button>

</div>

<div id="layout">

<div id="lista">
<b>ESTANCIAS</b>
<div id="rooms"></div>
<hr>
<div id="total"></div>
</div>

<div id="canvasBox">

<div id="hud">
<span class="len">0 m</span> |
<span class="ang">0°</span>
</div>

<div id="cursor"></div>

<canvas id="canvas" width="1100" height="650"></canvas>

</div>

</div>

<script>

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

let rooms=[]
let current=[]
let drawing=true

let zoomLevel=1
let offsetX=0
let offsetY=0

let mouse={x:0,y:0}

let dragVertex=null
let dragRoom=null
let moveMode=false

function scale(){
return parseFloat(document.getElementById("escala").value)
}

function worldToScreen(x,y){
return{
x:x*zoomLevel+offsetX,
y:y*zoomLevel+offsetY
}
}

function screenToWorld(x,y){
return{
x:(x-offsetX)/zoomLevel,
y:(y-offsetY)/zoomLevel
}
}

function getPos(e){

const r=canvas.getBoundingClientRect()

return screenToWorld(
e.clientX-r.left,
e.clientY-r.top
)

}

canvas.onmousedown=e=>start(e)
canvas.onmousemove=e=>move(e)
canvas.onmouseup=end

function start(e){

let p=getPos(e)
mouse=p

if(drawing){
current.push(p)
draw()
return
}

for(let r of rooms){

for(let v of r.v){

if(Math.hypot(v.x-p.x,v.y-p.y)<10/zoomLevel){

dragVertex=v
return

}

}

}

for(let r of rooms){

if(pointInside(p,r.v)){

dragRoom={room:r,start:p}
return

}

}

}

function move(e){

let p=getPos(e)
mouse=p

updateCursor(e)

if(dragVertex){

dragVertex.x=p.x
dragVertex.y=p.y
updateList()

}

if(dragRoom){

let dx=p.x-dragRoom.start.x
let dy=p.y-dragRoom.start.y

dragRoom.start=p

for(let v of dragRoom.room.v){
v.x+=dx
v.y+=dy
}

updateList()

}

draw()

}

function end(){
dragVertex=null
dragRoom=null
}

function zoom(f){

let wx=(mouse.x)
let wy=(mouse.y)

zoomLevel*=f

offsetX=canvas.width/2-wx*zoomLevel
offsetY=canvas.height/2-wy*zoomLevel

draw()

}

function center(){
zoomLevel=1
offsetX=0
offsetY=0
draw()
}

function toggleMove(){
moveMode=!moveMode
}

function newRoom(){
drawing=true
current=[]
}

function closeRoom(){

if(current.length<3)return

let name=prompt("Nombre estancia")

rooms.push({name:name||"estancia",v:[...current]})

current=[]
drawing=false

updateList()
draw()

}

function undo(){
current.pop()
draw()
}

function reset(){

rooms=[]
current=[]
drawing=true

updateList()
draw()

}

function area(p){

let a=0

for(let i=0;i<p.length;i++){

let j=(i+1)%p.length

a+=p[i].x*p[j].y
a-=p[j].x*p[i].y

}

return Math.abs(a/2)/(scale()*scale())

}

function per(p){

let s=0

for(let i=0;i<p.length;i++){

let j=(i+1)%p.length

s+=Math.hypot(p[j].x-p[i].x,p[j].y-p[i].y)

}

return s/scale()

}

function updateList(){

let html=""
let tot=0

for(let r of rooms){

let a=area(r.v)
let p=per(r.v)

tot+=a

html+=`<div>
<b>${r.name}</b><br>
Área: ${a.toFixed(2)} m²<br>
Perímetro: ${p.toFixed(2)} m
</div><br>`

}

document.getElementById("rooms").innerHTML=html
document.getElementById("total").innerHTML="<b>Total: "+tot.toFixed(2)+" m²</b>"

}

function angle(a,b,c){

let ang=Math.atan2(c.y-b.y,c.x-b.x)-
Math.atan2(a.y-b.y,a.x-b.x)

ang=Math.abs(ang*180/Math.PI)

if(ang>180)ang=360-ang

return ang

}

function pointInside(p,poly){

let inside=false

for(let i=0,j=poly.length-1;i<poly.length;j=i++){

let xi=poly[i].x,yi=poly[i].y
let xj=poly[j].x,yj=poly[j].y

let intersect=((yi>p.y)!=(yj>p.y)) &&
(p.x<(xj-xi)*(p.y-yi)/(yj-yi)+xi)

if(intersect)inside=!inside

}

return inside

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

for(let r of rooms){

ctx.beginPath()

let s=worldToScreen(r.v[0].x,r.v[0].y)
ctx.moveTo(s.x,s.y)

for(let i=1;i<r.v.length;i++){

let p=worldToScreen(r.v[i].x,r.v[i].y)
ctx.lineTo(p.x,p.y)

}

ctx.closePath()

ctx.fillStyle="rgba(0,120,255,0.15)"
ctx.fill()

ctx.strokeStyle="#2b83ff"
ctx.lineWidth=2
ctx.stroke()

for(let v of r.v){

let p=worldToScreen(v.x,v.y)

ctx.beginPath()
ctx.arc(p.x,p.y,5,0,Math.PI*2)
ctx.fillStyle="red"
ctx.fill()

}

}

if(current.length){

for(let v of current){

let p=worldToScreen(v.x,v.y)

ctx.beginPath()
ctx.arc(p.x,p.y,5,0,Math.PI*2)
ctx.fillStyle="red"
ctx.fill()

}

let last=current[current.length-1]

let s1=worldToScreen(last.x,last.y)
let s2=worldToScreen(mouse.x,mouse.y)

ctx.setLineDash([6,6])
ctx.beginPath()
ctx.moveTo(s1.x,s1.y)
ctx.lineTo(s2.x,s2.y)
ctx.stroke()
ctx.setLineDash([])

let dist=Math.hypot(mouse.x-last.x,mouse.y-last.y)/scale()

let ang=0

if(current.length>1){
ang=angle(current[current.length-2],last,mouse)
}

document.querySelector(".len").innerText=dist.toFixed(2)+" m"
document.querySelector(".ang").innerText=ang.toFixed(1)+"°"

}

}

function updateCursor(e){

const c=document.getElementById("cursor")

c.style.left=e.clientX+10+"px"
c.style.top=e.clientY+10+"px"

c.innerHTML=
document.querySelector(".len").innerText+
" | "+
document.querySelector(".ang").innerText

}

draw()

</script>

</body>
</html>
