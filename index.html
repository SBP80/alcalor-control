<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ALLCALOR - Plano Suelo Radiante</title>

<style>
body{
    font-family: Arial;
    background:#0f172a;
    color:white;
    margin:0;
}

header{
    background:#1e293b;
    padding:15px;
    text-align:center;
    font-weight:bold;
}

.container{
    padding:20px;
    max-width:1000px;
    margin:auto;
}

input, select{
    width:100%;
    padding:8px;
    margin:6px 0 12px 0;
    border-radius:5px;
    border:none;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:5px;
    cursor:pointer;
}

canvas{
    background:white;
    margin-top:20px;
    border-radius:8px;
}

.resultado{
    margin-top:15px;
    font-size:18px;
    font-weight:bold;
}
</style>
</head>

<body>

<header>
ALLCALOR - GENERADOR DE PLANO SUELO RADIANTE
</header>

<div class="container">

<label>Largo estancia (m)</label>
<input type="number" id="largo" step="0.1">

<label>Ancho estancia (m)</label>
<input type="number" id="ancho" step="0.1">

<label>Separación (cm)</label>
<select id="paso">
<option value="10">10 cm</option>
<option value="15">15 cm</option>
<option value="20">20 cm</option>
</select>

<button onclick="generarPlano()">Generar plano</button>

<canvas id="plano" width="900" height="650"></canvas>

<div class="resultado" id="resultado"></div>

</div>

<script>
function generarPlano(){

    const largo = parseFloat(document.getElementById("largo").value);
    const ancho = parseFloat(document.getElementById("ancho").value);
    const paso = parseFloat(document.getElementById("paso").value);

    if(!largo || !ancho){
        alert("Introduce largo y ancho");
        return;
    }

    const canvas = document.getElementById("plano");
    const ctx = canvas.getContext("2d");
    ctx.clearRect(0,0,canvas.width,canvas.height);

    const margen = 80;

    const escalaX = (canvas.width - margen*2) / largo;
    const escalaY = (canvas.height - margen*2) / ancho;
    const escala = Math.min(escalaX, escalaY);

    const largoPx = largo * escala;
    const anchoPx = ancho * escala;
    const pasoPx = (paso/100) * escala;

    const maxCircuito = 100;

    let metrosTotales = 0;
    let metrosCircuito = 0;
    let circuitoActual = 1;

    const colores = ["red","blue","green","orange","purple","brown"];

    // Decisión automática colector
    const colectorEnIzquierda = largo >= ancho;

    let colectorX = colectorEnIzquierda ? margen - 40 : margen + largoPx + 40;
    let colectorYInicio = margen;
    let colectorYFin = margen + anchoPx;

    // Dibujar colector
    ctx.strokeStyle = "black";
    ctx.lineWidth = 6;
    ctx.beginPath();
    ctx.moveTo(colectorX, colectorYInicio);
    ctx.lineTo(colectorX, colectorYFin);
    ctx.stroke();

    ctx.lineWidth = 2;

    let x = colectorEnIzquierda ? margen : margen + largoPx;
    let y = margen;
    let direccion = colectorEnIzquierda ? 1 : -1;

    ctx.strokeStyle = colores[0];
    ctx.beginPath();
    ctx.moveTo(colectorX, y);
    ctx.lineTo(x, y);

    while(y <= margen + anchoPx){

        let tramoHorizontal = largo;
        let tramoVertical = paso/100;

        if(direccion === 1){
            x = margen + largoPx;
        }else{
            x = margen;
        }

        if(metrosCircuito + tramoHorizontal > maxCircuito){
            ctx.stroke();
            circuitoActual++;
            ctx.beginPath();
            ctx.strokeStyle = colores[(circuitoActual-1)%colores.length];
            ctx.moveTo(colectorX, y);
            ctx.lineTo(x, y);
            metrosCircuito = 0;
        }

        ctx.lineTo(x, y);
        metrosTotales += tramoHorizontal;
        metrosCircuito += tramoHorizontal;

        y += pasoPx;

        if(y <= margen + anchoPx){

            if(metrosCircuito + tramoVertical > maxCircuito){
                ctx.stroke();
                circuitoActual++;
                ctx.beginPath();
                ctx.strokeStyle = colores[(circuitoActual-1)%colores.length];
                ctx.moveTo(colectorX, y);
                ctx.lineTo(x, y);
                metrosCircuito = 0;
            }

            ctx.lineTo(x, y);
            metrosTotales += tramoVertical;
            metrosCircuito += tramoVertical;
        }

        direccion *= -1;
    }

    ctx.stroke();

    metrosTotales += 2;

    document.getElementById("resultado").innerHTML =
        "Longitud total: " + metrosTotales.toFixed(1) + " m<br>" +
        "Número de circuitos: " + circuitoActual + "<br>" +
        "Colector automático: " + (colectorEnIzquierda ? "Izquierda" : "Derecha");
}
</script>

</body>
</html>
