<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ALLCALOR - Plano Profesional</title>

<style>
body{
    font-family: Arial;
    background:#0f172a;
    color:white;
    margin:0;
}

header{
    background:#1e293b;
    padding:15px;
    text-align:center;
    font-weight:bold;
}

.container{
    padding:20px;
    max-width:1000px;
    margin:auto;
}

input, select{
    width:100%;
    padding:8px;
    margin:6px 0 12px 0;
    border-radius:5px;
    border:none;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:5px;
    cursor:pointer;
}

canvas{
    background:white;
    margin-top:20px;
    border-radius:8px;
}

.resultado{
    margin-top:15px;
    font-size:18px;
    font-weight:bold;
}
</style>
</head>

<body>

<header>
ALLCALOR - GENERADOR PROFESIONAL SUELO RADIANTE
</header>

<div class="container">

<label>Largo estancia (m)</label>
<input type="number" id="largo" step="0.1">

<label>Ancho estancia (m)</label>
<input type="number" id="ancho" step="0.1">

<label>Separación (cm)</label>
<select id="paso">
<option value="10">10 cm</option>
<option value="15">15 cm</option>
<option value="20">20 cm</option>
</select>

<button onclick="generarPlano()">Generar plano</button>

<canvas id="plano" width="900" height="650"></canvas>

<div class="resultado" id="resultado"></div>

</div>

<script>
function generarPlano(){

    const largo = parseFloat(document.getElementById("largo").value);
    const ancho = parseFloat(document.getElementById("ancho").value);
    const paso = parseFloat(document.getElementById("paso").value);

    if(!largo || !ancho){
        alert("Introduce largo y ancho");
        return;
    }

    const canvas = document.getElementById("plano");
    const ctx = canvas.getContext("2d");
    ctx.clearRect(0,0,canvas.width,canvas.height);

    const margen = 80;

    const escala = Math.min(
        (canvas.width - margen*2)/largo,
        (canvas.height - margen*2)/ancho
    );

    const largoPx = largo * escala;
    const anchoPx = ancho * escala;
    const pasoPx = (paso/100) * escala;

    const maxCircuito = 100;

    let metrosTotales = 0;
    let circuito = 1;

    const colores = ["red","blue","green","orange","purple","brown"];

    // Colector pequeño realista
    const colectorX = margen - 30;
    const colectorY = margen + anchoPx/2;

    ctx.strokeStyle="black";
    ctx.lineWidth=4;
    ctx.beginPath();
    ctx.moveTo(colectorX, colectorY-40);
    ctx.lineTo(colectorX, colectorY+40);
    ctx.stroke();

    ctx.lineWidth=2;

    let x1 = margen;
    let y1 = margen;
    let x2 = margen + largoPx;
    let y2 = margen + anchoPx;

    let actualX = x1;
    let actualY = y1;

    ctx.strokeStyle = colores[0];
    ctx.beginPath();
    ctx.moveTo(colectorX, colectorY);
    ctx.lineTo(actualX, actualY);

    while((x2-x1) > pasoPx && (y2-y1) > pasoPx){

        // Arriba →
        ctx.lineTo(x2, y1);
        metrosTotales += largo;

        y1 += pasoPx;

        // Derecha ↓
        ctx.lineTo(x2, y2);
        metrosTotales += ancho;

        x2 -= pasoPx;

        // Abajo ←
        ctx.lineTo(x1, y2);
        metrosTotales += largo;

        y2 -= pasoPx;

        // Izquierda ↑
        ctx.lineTo(x1, y1);
        metrosTotales += ancho;

        x1 += pasoPx;
    }

    // Retorno al colector
    ctx.lineTo(colectorX, colectorY);

    ctx.stroke();

    metrosTotales += 2;

    let numCircuitos = Math.ceil(metrosTotales/maxCircuito);

    document.getElementById("resultado").innerHTML =
        "Longitud total: " + metrosTotales.toFixed(1) + " m<br>" +
        "Circuitos necesarios (≤100m): " + numCircuitos;
}
</script>

</body>
</html>
