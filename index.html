<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>ALLCALOR</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#0f1114;
overflow:hidden;
}

#barra{
background:#222;
padding:10px;
display:flex;
gap:10px;
flex-wrap:wrap;
align-items:center;
}

button{
padding:10px 14px;
border:none;
background:#f97316;
color:#fff;
border-radius:6px;
font-weight:bold;
font-size:14px;
}

button.activo{background:#15803d}
button.bloqueado{background:#6b7280}

input,select{
padding:10px;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

#info{
background:#fff;
padding:8px;
font-size:14px;
border-bottom:1px solid #ccc;
white-space:pre-line;
}

canvas{
display:block;
background:#f5f5f5;
touch-action:none;
}

</style>
</head>

<body>

<div id="barra">

<button id="nuevo">Nueva estancia</button>
<button id="borrarEstancia">Borrar estancia</button>
<button id="cerrar">Cerrar estancia</button>
<button id="borrar">Borrar punto</button>

<button id="fijar">Fijar estancia</button>
<button id="editar">Editar estancia</button>
<button id="mover">Mover estancia</button>
<button id="rotar">Rotar estancia</button>

<button id="verificar">Verificación</button>
<button id="diag">Diagonal siguiente</button>
<button id="aplicarDiag">Aplicar diagonal</button>
<button id="escala">Calibrar escala</button>

<input id="nombre" type="text" placeholder="Nombre estancia">

<select id="planta">
<option value="Planta baja">Planta baja</option>
<option value="Planta 1">Planta 1</option>
<option value="Planta 2">Planta 2</option>
<option value="Sótano">Sótano</option>
<option value="Buhardilla">Buhardilla</option>
</select>

</div>

<div id="info">Modo dibujo</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const btnNuevo = document.getElementById("nuevo");
const btnBorrarEstancia = document.getElementById("borrarEstancia");
const btnCerrar = document.getElementById("cerrar");
const btnBorrar = document.getElementById("borrar");
const btnFijar = document.getElementById("fijar");
const btnEditar = document.getElementById("editar");
const btnMover = document.getElementById("mover");
const btnRotar = document.getElementById("rotar");
const btnVerificar = document.getElementById("verificar");
const btnDiag = document.getElementById("diag");
const btnAplicarDiag = document.getElementById("aplicarDiag");
const btnEscala = document.getElementById("escala");
const inputNombre = document.getElementById("nombre");
const selectPlanta = document.getElementById("planta");
const info = document.getElementById("info");

let estancias = [];
let estanciaActiva = -1;

let modoMover = false;
let modoRotar = false;
let modoVerificacion = false;
let calibrando = false;

let pointerActivo = false;
let arrastrandoPunto = false;
let moviendoFigura = false;
let rotandoFigura = false;

let indicePunto = -1;

let startX = 0;
let startY = 0;
let lastX = 0;
let lastY = 0;

const RADIO_PUNTO = 20;
const UMBRAL_ARRASTRE = 6;
const UMBRAL_TOQUE = 10;

function crearEstanciaVacia(){
return{
nombre:"",
planta:"Planta baja",
puntos:[],
cerrado:false,
fijado:false,
pxPorMetro:100,
diagonales:[],
diagActual:0,
diagonalesObjetivo:[],
rotacionGrados:0
}
}

function getActiva(){
if(estanciaActiva<0||estanciaActiva>=estancias.length)return null
return estancias[estanciaActiva]
}

function ajustar(){
const barraH=document.getElementById("barra").offsetHeight
const infoH=document.getElementById("info").offsetHeight

canvas.width=window.innerWidth
canvas.height=window.innerHeight-barraH-infoH

dibujar()
}

window.addEventListener("resize",ajustar)

function pos(e){
const r=canvas.getBoundingClientRect()
return{
x:e.clientX-r.left,
y:e.clientY-r.top
}
}

function distancia(a,b){
return Math.hypot(a.x-b.x,a.y-b.y)
}

function distanciaXY(x1,y1,x2,y2){
return Math.hypot(x2-x1,y2-y1)
}

function metrosDesdePx(estancia,px){
return px/estancia.pxPorMetro
}

function pxDesdeMetros(estancia,m){
return m*estancia.pxPorMetro
}

function formatM(v){
return v.toFixed(2).replace(".",",")+" m"
}

function buscarPuntoEnEstancia(estancia,x,y){
for(let i=0;i<estancia.puntos.length;i++){
if(distanciaXY(estancia.puntos[i].x,estancia.puntos[i].y,x,y)<RADIO_PUNTO){
return i
}
}
return -1
}

function moverFigura(estancia,dx,dy){
for(const p of estancia.puntos){
p.x+=dx
p.y+=dy
}
}

function centroFigura(estancia){

if(estancia.puntos.length===0){
return{x:canvas.width/2,y:canvas.height/2}
}

let minX=estancia.puntos[0].x
let maxX=estancia.puntos[0].x
let minY=estancia.puntos[0].y
let maxY=estancia.puntos[0].y

for(const p of estancia.puntos){

if(p.x<minX)minX=p.x
if(p.x>maxX)maxX=p.x
if(p.y<minY)minY=p.y
if(p.y>maxY)maxY=p.y

}

return{
x:(minX+maxX)/2,
y:(minY+maxY)/2
}

}

function rotarPunto(p,centro,rad){

const dx=p.x-centro.x
const dy=p.y-centro.y

const cos=Math.cos(rad)
const sin=Math.sin(rad)

return{
x:centro.x+dx*cos-dy*sin,
y:centro.y+dx*sin+dy*cos
}

}

function rotarEstancia(estancia,rad){

const centro=centroFigura(estancia)

for(let i=0;i<estancia.puntos.length;i++){
estancia.puntos[i]=rotarPunto(estancia.puntos[i],centro,rad)
}

}

function dibujar(){

ctx.clearRect(0,0,canvas.width,canvas.height)

const activa=getActiva()

for(let idx=0;idx<estancias.length;idx++){

const estancia=estancias[idx]
const esActiva=idx===estanciaActiva

if(estancia.puntos.length>1){

ctx.beginPath()

ctx.moveTo(estancia.puntos[0].x,estancia.puntos[0].y)

for(let i=1;i<estancia.puntos.length;i++){
ctx.lineTo(estancia.puntos[i].x,estancia.puntos[i].y)
}

if(estancia.cerrado){
ctx.closePath()
ctx.fillStyle=esActiva?"rgba(249,115,22,0.1)":"rgba(0,0,0,0.05)"
ctx.fill()
}

ctx.strokeStyle=esActiva?"#f97316":"#999"
ctx.lineWidth=esActiva?3:2
ctx.stroke()

}

if(esActiva&&!estancia.fijado){

for(let i=0;i<estancia.puntos.length;i++){

const p=estancia.puntos[i]

ctx.beginPath()

if(i===0&&!estancia.cerrado&&estancia.puntos.length>=3){

ctx.arc(p.x,p.y,10,0,Math.PI*2)
ctx.fillStyle="#16a34a"
ctx.fill()

}else{

ctx.arc(p.x,p.y,7,0,Math.PI*2)
ctx.fillStyle="#000"
ctx.fill()

}

}

}

}

}
function seleccionarEstanciaPorPunto(x,y){

for(let i=estancias.length-1;i>=0;i--){

const estancia=estancias[i]

if(!estancia.cerrado) continue

let dentro=false

for(let a=0,b=estancia.puntos.length-1;a<estancia.puntos.length;b=a++){
const xi=estancia.puntos[a].x
const yi=estancia.puntos[a].y
const xj=estancia.puntos[b].x
const yj=estancia.puntos[b].y

const cruza=((yi>y)!==(yj>y))&&(x<((xj-xi)*(y-yi))/((yj-yi)||0.000001)+xi)

if(cruza) dentro=!dentro
}

if(dentro){
estanciaActiva=i
sincronizarCamposUI()
return true
}

}

return false
}

function sincronizarCamposUI(){
const estancia=getActiva()

if(!estancia){
inputNombre.value=""
selectPlanta.value="Planta baja"
return
}

inputNombre.value=estancia.nombre
selectPlanta.value=estancia.planta
}

function actualizarInfo(){

const activa=getActiva()

let texto="Modo dibujo"

if(calibrando){
texto="Calibrar escala"
}else if(modoRotar){
texto="Modo rotar estancia"
}else if(modoVerificacion){
texto="Modo verificación"
}else if(modoMover){
texto="Modo mover estancia"
}else if(activa&&activa.fijado){
texto="Estancia fijada"
}else if(activa&&activa.cerrado){
texto="Estancia cerrada"
}

texto+=" · Estancias: "+estancias.length

if(activa){
const nombre=activa.nombre.trim()||"Sin nombre"
texto+=" · Activa: "+nombre
texto+=" · "+activa.planta
}

info.textContent=texto
}

function actualizarBotones(){
const activa=getActiva()

btnMover.classList.toggle("activo",modoMover)
btnRotar.classList.toggle("activo",modoRotar)
btnVerificar.classList.toggle("activo",modoVerificacion)
btnEscala.classList.toggle("activo",calibrando)

const fijada=activa?activa.fijado:false
btnFijar.classList.toggle("bloqueado",fijada)
btnEditar.classList.toggle("activo",!fijada)
}

function redibujarTodo(){
dibujar()
actualizarInfo()
actualizarBotones()
}

function onPointerDown(e){

e.preventDefault()
canvas.setPointerCapture(e.pointerId)

const p=pos(e)

pointerActivo=true
arrastrandoPunto=false
moviendoFigura=false
rotandoFigura=false
indicePunto=-1

startX=p.x
startY=p.y
lastX=p.x
lastY=p.y

let activa=getActiva()

if(activa&&activa.fijado){
if(seleccionarEstanciaPorPunto(p.x,p.y)){
activa=getActiva()
}else{
redibujarTodo()
return
}
}

if(!activa) return

indicePunto=buscarPuntoEnEstancia(activa,p.x,p.y)

if(modoMover&&activa.cerrado){
moviendoFigura=true
indicePunto=-1
}

if(modoRotar&&activa.cerrado){
rotandoFigura=true
indicePunto=-1
}

sincronizarCamposUI()
redibujarTodo()
}

function onPointerMove(e){

const activa=getActiva()
if(!pointerActivo||!activa||activa.fijado) return

const p=pos(e)

if(rotandoFigura){

const centro=centroFigura(activa)
const angulo1=Math.atan2(lastY-centro.y,lastX-centro.x)
const angulo2=Math.atan2(p.y-centro.y,p.x-centro.x)
const delta=angulo2-angulo1

rotarEstancia(activa,delta)

lastX=p.x
lastY=p.y

redibujarTodo()
return
}

if(moviendoFigura){

const dx=p.x-lastX
const dy=p.y-lastY

moverFigura(activa,dx,dy)

lastX=p.x
lastY=p.y

redibujarTodo()
return
}

if(indicePunto!==-1&&!modoRotar){

if(distanciaXY(startX,startY,p.x,p.y)>UMBRAL_ARRASTRE){
arrastrandoPunto=true
}

if(arrastrandoPunto){
activa.puntos[indicePunto].x=p.x
activa.puntos[indicePunto].y=p.y
redibujarTodo()
}
}

}

function onPointerUp(e){

if(!pointerActivo) return
e.preventDefault()

const p=pos(e)
const movimiento=distanciaXY(startX,startY,p.x,p.y)
const activa=getActiva()

if(rotandoFigura){
pointerActivo=false
rotandoFigura=false
indicePunto=-1
redibujarTodo()
return
}

if(moviendoFigura){
pointerActivo=false
moviendoFigura=false
indicePunto=-1
redibujarTodo()
return
}

if(activa&&!activa.fijado&&!arrastrandoPunto&&movimiento<=UMBRAL_TOQUE){

const i=buscarPuntoEnEstancia(activa,p.x,p.y)

if(i===0&&activa.puntos.length>=3&&!activa.cerrado){
activa.cerrado=true
}else if(i===-1&&!activa.cerrado){
activa.puntos.push({x:p.x,y:p.y})
}else{
seleccionarEstanciaPorPunto(p.x,p.y)
}

}else{
seleccionarEstanciaPorPunto(p.x,p.y)
}

pointerActivo=false
arrastrandoPunto=false
indicePunto=-1

sincronizarCamposUI()
redibujarTodo()
}

canvas.addEventListener("pointerdown",onPointerDown)
canvas.addEventListener("pointermove",onPointerMove)
canvas.addEventListener("pointerup",onPointerUp)
canvas.addEventListener("pointercancel",onPointerUp)

btnNuevo.onclick=function(){

modoMover=false
modoRotar=false
modoVerificacion=false
calibrando=false
verticesCalibracion=[]

const activa=getActiva()

if(activa&&activa.puntos.length===0&&!activa.cerrado){
sincronizarCamposUI()
redibujarTodo()
return
}

estancias.push(crearEstanciaVacia())
estanciaActiva=estancias.length-1
sincronizarCamposUI()
redibujarTodo()
}

btnBorrarEstancia.onclick=function(){

if(estancias.length===0) return

if(estanciaActiva<0||estanciaActiva>=estancias.length){
estanciaActiva=0
}

estancias.splice(estanciaActiva,1)

if(estancias.length===0){
estancias=[crearEstanciaVacia()]
estanciaActiva=0
}else if(estanciaActiva>=estancias.length){
estanciaActiva=estancias.length-1
}

modoMover=false
modoRotar=false
modoVerificacion=false
calibrando=false
verticesCalibracion=[]

sincronizarCamposUI()
redibujarTodo()
}

btnCerrar.onclick=function(){
const activa=getActiva()
if(!activa) return

if(activa.puntos.length>=3){
activa.cerrado=true
redibujarTodo()
}
}

btnBorrar.onclick=function(){
const activa=getActiva()
if(!activa||activa.fijado) return

if(activa.puntos.length>0){
activa.puntos.pop()
}

if(activa.puntos.length<3){
activa.cerrado=false
modoVerificacion=false
}

redibujarTodo()
}

btnFijar.onclick=function(){
const activa=getActiva()
if(!activa||!activa.cerrado) return

activa.fijado=true
modoMover=false
modoRotar=false
redibujarTodo()
}

btnEditar.onclick=function(){
const activa=getActiva()
if(!activa) return

activa.fijado=false
modoMover=false
modoRotar=false
redibujarTodo()
}

btnMover.onclick=function(){
const activa=getActiva()
if(!activa||activa.fijado||!activa.cerrado) return

modoMover=!modoMover
if(modoMover) modoRotar=false

redibujarTodo()
}

btnRotar.onclick=function(){
const activa=getActiva()
if(!activa||activa.fijado||!activa.cerrado) return

modoRotar=!modoRotar
if(modoRotar) modoMover=false

redibujarTodo()
}

btnVerificar.onclick=function(){
const activa=getActiva()
if(!activa||!activa.cerrado) return

modoVerificacion=!modoVerificacion
redibujarTodo()
}

btnDiag.onclick=function(){
redibujarTodo()
}

btnAplicarDiag.onclick=function(){
redibujarTodo()
}

btnEscala.onclick=function(){
const activa=getActiva()
if(!activa||!activa.cerrado) return

calibrando=!calibrando
redibujarTodo()
}

inputNombre.oninput=function(){
const activa=getActiva()
if(!activa) return
activa.nombre=inputNombre.value
redibujarTodo()
}

selectPlanta.onchange=function(){
const activa=getActiva()
if(!activa) return
activa.planta=selectPlanta.value
redibujarTodo()
}

function iniciarApp(){
estancias=[crearEstanciaVacia()]
estanciaActiva=0
sincronizarCamposUI()
ajustar()
redibujarTodo()
}

iniciarApp()
</script>
</body>
</html>
