<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ALLCALOR - Plano Suelo Radiante</title>

<style>
body{
    font-family: Arial;
    background:#0f172a;
    color:white;
    margin:0;
}

header{
    background:#1e293b;
    padding:15px;
    text-align:center;
    font-weight:bold;
}

.container{
    padding:20px;
    max-width:1000px;
    margin:auto;
}

input, select{
    width:100%;
    padding:8px;
    margin:6px 0 12px 0;
    border-radius:5px;
    border:none;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:5px;
    cursor:pointer;
}

canvas{
    background:white;
    margin-top:20px;
    border-radius:8px;
}

.resultado{
    margin-top:15px;
    font-size:18px;
    font-weight:bold;
}
</style>
</head>

<body>

<header>
ALLCALOR - GENERADOR DE PLANO SUELO RADIANTE
</header>

<div class="container">

<label>Largo estancia (m)</label>
<input type="number" id="largo" step="0.1">

<label>Ancho estancia (m)</label>
<input type="number" id="ancho" step="0.1">

<label>Separación (cm)</label>
<select id="paso">
<option value="10">10 cm</option>
<option value="15">15 cm</option>
<option value="20">20 cm</option>
</select>

<button onclick="generarPlano()">Generar plano</button>

<canvas id="plano" width="800" height="600"></canvas>

<div class="resultado" id="metros"></div>

</div>

<script>
function generarPlano(){

    const largo = parseFloat(document.getElementById("largo").value);
    const ancho = parseFloat(document.getElementById("ancho").value);
    const paso = parseFloat(document.getElementById("paso").value);

    if(!largo || !ancho){
        alert("Introduce largo y ancho");
        return;
    }

    const canvas = document.getElementById("plano");
    const ctx = canvas.getContext("2d");
    ctx.clearRect(0,0,canvas.width,canvas.height);

    const margen = 50;

    const escalaX = (canvas.width - margen*2) / largo;
    const escalaY = (canvas.height - margen*2) / ancho;
    const escala = Math.min(escalaX, escalaY);

    const largoPx = largo * escala;
    const anchoPx = ancho * escala;
    const pasoPx = (paso/100) * escala;

    ctx.strokeStyle = "red";
    ctx.lineWidth = 2;

    let x = margen;
    let y = margen;
    let direccion = 1;

    ctx.beginPath();
    ctx.moveTo(x, y);

    let metrosTotales = 0;
    let numeroPasadas = Math.floor(ancho / (paso/100));

    while(y <= margen + anchoPx){

        if(direccion === 1){
            x = margen + largoPx;
        }else{
            x = margen;
        }

        ctx.lineTo(x, y);
        metrosTotales += largo;

        y += pasoPx;

        if(y <= margen + anchoPx){
            ctx.lineTo(x, y);
            metrosTotales += (paso/100);
        }

        direccion *= -1;
    }

    ctx.stroke();

    metrosTotales += 2; // margen ida y vuelta colector estimado

    document.getElementById("metros").innerHTML =
        "Longitud estimada de tubo: " + metrosTotales.toFixed(1) + " m" +
        (metrosTotales > 100 ? " ⚠️ SUPERA 100m" : "");
}
</script>

</body>
</html>
