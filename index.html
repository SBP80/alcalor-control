<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>ALLCALOR PRO</title>

<style>

body{
font-family:Arial;
background:#0f2b44;
color:white;
margin:0;
padding:20px;
}

h1{
text-align:center;
}

.panel{
background:#12314a;
padding:15px;
border-radius:8px;
margin-bottom:15px;
}

button{
background:#2b83ff;
color:white;
border:none;
padding:8px 12px;
cursor:pointer;
margin-right:8px;
}

canvas{
background:#efe9dd;
border-radius:8px;
display:block;
margin:auto;
}

input{
padding:6px;
width:120px;
}

.info{
margin-top:10px;
font-size:14px;
}

</style>

</head>

<body>

<h1>ALLCALOR PRO - Motor Geométrico</h1>

<div class="panel">

Nombre estancia

<input id="nombreEstancia" value="Estancia">

<br><br>

Escala: 1m =
<input type="number" id="escalaInput" value="50">

px

Separación tubo (cm)

<input type="number" id="pasoInput" value="10">

<br><br>

<button onclick="cerrarPoligono()">Cerrar estancia</button>
<button onclick="deshacer()">Deshacer</button>
<button onclick="reiniciar()">Reiniciar</button>
<button onclick="generarSistema()">Generar circuito</button>

<div class="info" id="medidaActual"></div>

<div class="info" id="datosEstancia"></div>

</div>

<canvas id="canvas" width="1000" height="600"></canvas>

<script>

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

let puntos=[]
let cerrado=false

let anillos=[]
let tubo=[]

let mouse={x:0,y:0}

function getEscala(){
return parseFloat(document.getElementById("escalaInput").value)
}

function getPaso(){

let cm=parseFloat(document.getElementById("pasoInput").value)

return (cm/100)*getEscala()

}

function getOffsetInicial(){
return (10/100)*getEscala()
}

canvas.addEventListener("mousemove",function(e){

const rect=canvas.getBoundingClientRect()

mouse.x=e.clientX-rect.left
mouse.y=e.clientY-rect.top

dibujar()

})

canvas.addEventListener("click",function(e){

if(cerrado)return

const rect=canvas.getBoundingClientRect()

const x=e.clientX-rect.left
const y=e.clientY-rect.top

puntos.push({x,y})

dibujar()

})

function cerrarPoligono(){

if(puntos.length<3)return

cerrado=true

calcularDatosEstancia()

dibujar()

}

function deshacer(){

if(cerrado)return

puntos.pop()

dibujar()

}

function reiniciar(){

puntos=[]
anillos=[]
tubo=[]
cerrado=false

document.getElementById("datosEstancia").innerHTML=""

ctx.clearRect(0,0,canvas.width,canvas.height)

}

function dibujar(){

ctx.clearRect(0,0,canvas.width,canvas.height)

if(puntos.length===0)return

ctx.beginPath()

ctx.moveTo(puntos[0].x,puntos[0].y)

for(let i=1;i<puntos.length;i++){
ctx.lineTo(puntos[i].x,puntos[i].y)
}

if(!cerrado){
ctx.lineTo(mouse.x,mouse.y)
}

if(cerrado){

ctx.closePath()

ctx.fillStyle="rgba(43,131,255,0.2)"
ctx.fill()

}

ctx.strokeStyle="#2b83ff"
ctx.lineWidth=2
ctx.stroke()

for(let i=0;i<puntos.length;i++){

let p=puntos[i]

ctx.beginPath()
ctx.arc(p.x,p.y,4,0,Math.PI*2)
ctx.fillStyle="red"
ctx.fill()

if(i>0 && i<puntos.length-1){

let angulo=calcularAngulo(puntos[i-1],puntos[i],puntos[i+1])

ctx.fillStyle="black"
ctx.fillText(angulo.toFixed(1)+"°",p.x+8,p.y-8)

}

}

if(!cerrado && puntos.length>0){

let ultimo=puntos[puntos.length-1]

let dx=mouse.x-ultimo.x
let dy=mouse.y-ultimo.y

let dist=Math.hypot(dx,dy)/getEscala()

document.getElementById("medidaActual").innerHTML=
"Longitud pared actual: "+dist.toFixed(2)+" m"

}

if(tubo.length>1){

ctx.beginPath()

ctx.moveTo(tubo[0].x,tubo[0].y)

for(let p of tubo){
ctx.lineTo(p.x,p.y)
}

ctx.strokeStyle="green"
ctx.lineWidth=2
ctx.stroke()

}

}

function calcularAngulo(a,b,c){

let abx=a.x-b.x
let aby=a.y-b.y

let cbx=c.x-b.x
let cby=c.y-b.y

let dot=abx*cbx+aby*cby

let mag1=Math.hypot(abx,aby)
let mag2=Math.hypot(cbx,cby)

let ang=Math.acos(dot/(mag1*mag2))

return ang*180/Math.PI

}

function calcularDatosEstancia(){

let area=areaPoligono(puntos)

let perimetro=perimetroPoligono(puntos)

let nombre=document.getElementById("nombreEstancia").value

document.getElementById("datosEstancia").innerHTML=

nombre+"<br>"+
"Área: "+area.toFixed(2)+" m²<br>"+
"Perímetro: "+perimetro.toFixed(2)+" m"

}

function generarSistema(){

if(!cerrado)return

anillos=[]
tubo=[]

let actual=offsetPoligono(puntos,getOffsetInicial())

if(actual.length<3)return

anillos.push(actual)

let paso=getPaso()

let minX=Infinity
let maxX=-Infinity
let minY=Infinity
let maxY=-Infinity

for(let p of puntos){

if(p.x<minX)minX=p.x
if(p.x>maxX)maxX=p.x
if(p.y<minY)minY=p.y
if(p.y>maxY)maxY=p.y

}

let ancho=maxX-minX
let alto=maxY-minY

let ladoMenor=Math.min(ancho,alto)

let maxAnillos=Math.floor((ladoMenor/2)/paso)

for(let i=0;i<maxAnillos;i++){

let nuevo=offsetPoligono(actual,paso)

if(nuevo.length<3)break

anillos.push(nuevo)

actual=nuevo

}

generarCaracol()

dibujar()

}

function generarCaracol(){

tubo=[]

for(let i=0;i<anillos.length;i++){

let ring=anillos[i]

if(i%2===0){

for(let p of ring){
tubo.push(p)
}

}else{

for(let j=ring.length-1;j>=0;j--){
tubo.push(ring[j])
}

}

}

}

function areaPoligono(poly){

let area=0

for(let i=0;i<poly.length;i++){

let j=(i+1)%poly.length

area+=poly[i].x*poly[j].y-poly[j].x*poly[i].y

}

return Math.abs(area/2)/(getEscala()*getEscala())

}

function perimetroPoligono(poly){

let p=0

for(let i=0;i<poly.length;i++){

let j=(i+1)%poly.length

let dx=poly[i].x-poly[j].x
let dy=poly[i].y-poly[j].y

p+=Math.hypot(dx,dy)/getEscala()

}

return p

}

function offsetPoligono(poligono,dist){

let lineas=[]
let n=poligono.length

for(let i=0;i<n;i++){

let p0=poligono[i]
let p1=poligono[(i+1)%n]

let dx=p1.x-p0.x
let dy=p1.y-p0.y

let len=Math.hypot(dx,dy)

dx/=len
dy/=len

let nx=-dy
let ny=dx

lineas.push({

x1:p0.x+nx*dist,
y1:p0.y+ny*dist,
x2:p1.x+nx*dist,
y2:p1.y+ny*dist

})

}

let nuevo=[]

for(let i=0;i<n;i++){

let p=interseccion(lineas[i],lineas[(i+1)%n])

if(p)nuevo.push(p)

}

return nuevo

}

function interseccion(a,b){

let x1=a.x1
let y1=a.y1
let x2=a.x2
let y2=a.y2

let x3=b.x1
let y3=b.y1
let x4=b.x2
let y4=b.y2

let den=(x1-x2)*(y3-y4)-(y1-y2)*(x3-x4)

if(den==0)return null

let px=((x1*y2-y1*x2)*(x3-x4)-(x1-x2)*(x3*y4-y3*x4))/den

let py=((x1*y2-y1*x2)*(y3-y4)-(y1-y2)*(x3*y4-y3*x4))/den

return{x:px,y:py}

}

</script>

</body>
</html>
