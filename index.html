<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>ALLCALOR PRO</title>

<style>

body{
font-family:Arial;
background:#0f2b44;
color:white;
margin:0;
padding:20px;
}

h1{
text-align:center;
}

.panel{
background:#12314a;
padding:15px;
border-radius:8px;
margin-bottom:15px;
}

button{
background:#2b83ff;
color:white;
border:none;
padding:8px 12px;
cursor:pointer;
margin-right:8px;
}

canvas{
background:#f4f1e8;
border-radius:8px;
display:block;
margin:auto;
}

input{
padding:6px;
width:120px;
}

</style>

</head>

<body>

<h1>ALLCALOR PRO - Motor Geométrico</h1>

<div class="panel">

Nombre estancia
<input id="nombreEstancia" value="habitacion 1">

<br><br>

Escala: 1m =
<input type="number" id="escalaInput" value="100">

px

Separación tubo (cm)
<input type="number" id="pasoInput" value="10">

<br><br>

<button onclick="cerrarPoligono()">Cerrar estancia</button>
<button onclick="deshacer()">Deshacer</button>
<button onclick="reiniciar()">Reiniciar</button>
<button onclick="generarCircuito()">Generar circuito</button>
<button onclick="modoColector()">Colocar colector</button>
<button onclick="modoPuerta()">Colocar puerta</button>

<div id="datos"></div>

</div>

<canvas id="canvas" width="1000" height="600"></canvas>

<script>

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

let puntos=[]
let cerrado=false

let mouse={x:0,y:0}

let colector=null
let modo_col=false

let puertas=[]
let modo_puerta=false

let circuito=[]

let shift=false
let alt=false

document.addEventListener("keydown",e=>{
if(e.key==="Shift")shift=true
if(e.key==="Alt")alt=true
})

document.addEventListener("keyup",e=>{
if(e.key==="Shift")shift=false
if(e.key==="Alt")alt=false
})

canvas.addEventListener("mousemove",e=>{

const rect=canvas.getBoundingClientRect()

mouse.x=e.clientX-rect.left
mouse.y=e.clientY-rect.top

dibujar()

})

canvas.addEventListener("click",e=>{

const rect=canvas.getBoundingClientRect()

let x=e.clientX-rect.left
let y=e.clientY-rect.top

if(modo_col){

colector={x,y}
modo_col=false
dibujar()
return

}

if(modo_puerta){

crearPuerta(x,y)
modo_puerta=false
dibujar()
return

}

if(cerrado)return

if(puntos.length>0){

let p=puntos[puntos.length-1]

let dx=x-p.x
let dy=y-p.y

let ang=Math.atan2(dy,dx)

if(shift){
ang=Math.round(ang/(Math.PI/2))*(Math.PI/2)
}

if(alt){
ang=Math.round(ang/(Math.PI/4))*(Math.PI/4)
}

let dist=Math.hypot(dx,dy)

x=p.x+Math.cos(ang)*dist
y=p.y+Math.sin(ang)*dist

}

puntos.push({x,y})

dibujar()

})

function modoPuerta(){

modo_puerta=true

}

function crearPuerta(x,y){

let ancho=0.9*getEscala()

puertas.push({x,y,ancho})

}

function modoColector(){

modo_col=true

}

function cerrarPoligono(){

if(puntos.length<3)return

cerrado=true

calcularDatos()

dibujar()

}

function deshacer(){

if(cerrado)return

puntos.pop()

dibujar()

}

function reiniciar(){

puntos=[]
circuito=[]
colector=null
puertas=[]
cerrado=false

document.getElementById("datos").innerHTML=""

dibujar()

}

function getEscala(){

return parseFloat(document.getElementById("escalaInput").value)

}

function getPaso(){

return (parseFloat(document.getElementById("pasoInput").value)/100)*getEscala()

}

function dibujarCuadricula(){

let escala=getEscala()

let fino=escala/10
let metro=escala

for(let x=0;x<canvas.width;x+=fino){

ctx.beginPath()

if(x%metro===0){
ctx.strokeStyle="#cfcfcf"
ctx.lineWidth=1.2
}else{
ctx.strokeStyle="#e7e7e7"
ctx.lineWidth=0.6
}

ctx.moveTo(x,0)
ctx.lineTo(x,canvas.height)
ctx.stroke()

}

for(let y=0;y<canvas.height;y+=fino){

ctx.beginPath()

if(y%metro===0){
ctx.strokeStyle="#cfcfcf"
ctx.lineWidth=1.2
}else{
ctx.strokeStyle="#e7e7e7"
ctx.lineWidth=0.6
}

ctx.moveTo(0,y)
ctx.lineTo(canvas.width,y)
ctx.stroke()

}

}

function dibujar(){

ctx.clearRect(0,0,canvas.width,canvas.height)

dibujarCuadricula()

if(puntos.length>0){

ctx.beginPath()
ctx.moveTo(puntos[0].x,puntos[0].y)

for(let i=1;i<puntos.length;i++){
ctx.lineTo(puntos[i].x,puntos[i].y)
}

if(cerrado){
ctx.closePath()
ctx.fillStyle="rgba(0,120,255,0.15)"
ctx.fill()
}

ctx.strokeStyle="#2b83ff"
ctx.lineWidth=2
ctx.stroke()

}

for(let p of puntos){

ctx.beginPath()
ctx.arc(p.x,p.y,4,0,Math.PI*2)
ctx.fillStyle="red"
ctx.fill()

}

if(!cerrado && puntos.length>0){

let p=puntos[puntos.length-1]

ctx.beginPath()
ctx.moveTo(p.x,p.y)
ctx.lineTo(mouse.x,mouse.y)
ctx.strokeStyle="#999"
ctx.setLineDash([5,5])
ctx.stroke()
ctx.setLineDash([])

let dx=mouse.x-p.x
let dy=mouse.y-p.y

let dist=Math.hypot(dx,dy)/getEscala()

let ang=null

if(puntos.length>=2){

let p0=puntos[puntos.length-2]

let abx=p0.x-p.x
let aby=p0.y-p.y

let cbx=mouse.x-p.x
let cby=mouse.y-p.y

let dot=abx*cbx+aby*cby

let mag1=Math.hypot(abx,aby)
let mag2=Math.hypot(cbx,cby)

ang=Math.acos(dot/(mag1*mag2))*180/Math.PI

}

ctx.fillStyle="black"
ctx.font="14px Arial"

let txt=dist.toFixed(2)+" m"

if(ang)txt+=" | "+ang.toFixed(1)+"°"

ctx.fillText(txt,mouse.x+10,mouse.y-10)

}

for(let puerta of puertas){

ctx.strokeStyle="brown"
ctx.lineWidth=4

ctx.beginPath()
ctx.moveTo(puerta.x-puerta.ancho/2,puerta.y)
ctx.lineTo(puerta.x+puerta.ancho/2,puerta.y)
ctx.stroke()

ctx.fillStyle="black"
ctx.fillText("Puerta",puerta.x-20,puerta.y-10)

}

if(colector){

ctx.beginPath()
ctx.arc(colector.x,colector.y,6,0,Math.PI*2)
ctx.fillStyle="orange"
ctx.fill()

ctx.fillStyle="black"
ctx.fillText("Colector",colector.x+10,colector.y)

}

if(circuito.length>1){

ctx.beginPath()
ctx.moveTo(circuito[0].x,circuito[0].y)

for(let p of circuito){
ctx.lineTo(p.x,p.y)
}

ctx.strokeStyle="green"
ctx.lineWidth=2
ctx.stroke()

}

}

function generarCircuito(){

if(!cerrado)return

circuito=[]

let paso=getPaso()

let minX=Infinity
let maxX=-Infinity
let minY=Infinity
let maxY=-Infinity

for(let p of puntos){

if(p.x<minX)minX=p.x
if(p.x>maxX)maxX=p.x
if(p.y<minY)minY=p.y
if(p.y>maxY)maxY=p.y

}

for(let y=minY;y<=maxY;y+=paso){

for(let x=minX;x<=maxX;x+=paso){

if(puntoDentro(x,y)){
circuito.push({x,y})
}

}

}

dibujar()

}

function puntoDentro(x,y){

let dentro=false

for(let i=0,j=puntos.length-1;i<puntos.length;j=i++){

let xi=puntos[i].x
let yi=puntos[i].y
let xj=puntos[j].x
let yj=puntos[j].y

let intersect=((yi>y)!=(yj>y)) && (x<(xj-xi)*(y-yi)/(yj-yi)+xi)

if(intersect)dentro=!dentro

}

return dentro

}

function calcularDatos(){

let area=0
let per=0

for(let i=0;i<puntos.length;i++){

let j=(i+1)%puntos.length

area+=puntos[i].x*puntos[j].y-puntos[j].x*puntos[i].y

let dx=puntos[i].x-puntos[j].x
let dy=puntos[i].y-puntos[j].y

per+=Math.hypot(dx,dy)

}

area=Math.abs(area/2)/(getEscala()*getEscala())
per=per/getEscala()

document.getElementById("datos").innerHTML=

document.getElementById("nombreEstancia").value+
"<br>Área: "+area.toFixed(2)+" m²"+
"<br>Perímetro: "+per.toFixed(2)+" m"

}

dibujar()

</script>

</body>
</html>
