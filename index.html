<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>ALLCALOR</title>
<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f0f0f0;
  overflow:hidden;
}
#barra{
  background:#222;
  padding:10px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
}
button{
  padding:10px 14px;
  border:none;
  background:#f97316;
  color:#fff;
  border-radius:4px;
  font-weight:bold;
  font-size:14px;
}
button.activo{ background:#15803d; }
button.bloqueado{ background:#6b7280; }
input,select{
  padding:10px 12px;
  border:1px solid #ccc;
  border-radius:4px;
  font-size:14px;
  min-width:140px;
}
#info{
  background:#fff;
  padding:8px 10px;
  font-size:14px;
  border-bottom:1px solid #ccc;
  white-space:pre-line;
}
canvas{
  display:block;
  background:#f5f5f5;
  touch-action:none;
}
</style>
</head>
<body>

<div id="barra">
  <button id="nuevo">Nueva estancia</button>
  <button id="cerrar">Cerrar estancia</button>
  <button id="borrar">Borrar punto</button>
  <button id="fijar">Fijar estancia</button>
  <button id="editar">Editar estancia</button>
  <button id="mover">Mover estancia</button>
  <button id="rotar">Rotar estancia</button>
  <button id="unir">Unir estancias</button>
  <button id="verificar">Verificación</button>
  <button id="diag">Diagonal siguiente</button>
  <button id="aplicarDiag">Aplicar diagonal</button>
  <button id="escala">Calibrar escala</button>

  <input id="nombre" type="text" placeholder="Nombre estancia">
  <select id="planta">
    <option value="Planta baja">Planta baja</option>
    <option value="Planta 1">Planta 1</option>
    <option value="Planta 2">Planta 2</option>
    <option value="Sótano">Sótano</option>
    <option value="Buhardilla">Buhardilla</option>
  </select>
</div>

<div id="info">Modo dibujo</div>
<canvas id="canvas"></canvas>

<script>

/* ========= VARIABLES ========= */

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const btnNuevo = document.getElementById("nuevo");
const btnCerrar = document.getElementById("cerrar");
const btnBorrar = document.getElementById("borrar");
const btnFijar = document.getElementById("fijar");
const btnEditar = document.getElementById("editar");
const btnMover = document.getElementById("mover");
const btnRotar = document.getElementById("rotar");
const btnUnir = document.getElementById("unir");
const btnVerificar = document.getElementById("verificar");
const btnDiag = document.getElementById("diag");
const btnAplicarDiag = document.getElementById("aplicarDiag");
const btnEscala = document.getElementById("escala");

const inputNombre = document.getElementById("nombre");
const selectPlanta = document.getElementById("planta");
const info = document.getElementById("info");

let estancias = [];
let estanciaActiva = -1;

let modoMover = false;
let modoRotar = false;
let modoUnir = false;

let puntoUnionActivo = null;

let pointerActivo=false;
let indicePunto=-1;
let startX=0;
let startY=0;
let lastX=0;
let lastY=0;
let arrastrando=false;

/* ========= UTILIDADES ========= */

function distancia(a,b){
  return Math.hypot(a.x-b.x,a.y-b.y);
}

function distanciaXY(x1,y1,x2,y2){
  return Math.hypot(x2-x1,y2-y1);
}

function centroFigura(est){
  let minX=est.puntos[0].x;
  let maxX=minX;
  let minY=est.puntos[0].y;
  let maxY=minY;

  for(const p of est.puntos){
    if(p.x<minX)minX=p.x;
    if(p.x>maxX)maxX=p.x;
    if(p.y<minY)minY=p.y;
    if(p.y>maxY)maxY=p.y;
  }

  return{
    x:(minX+maxX)/2,
    y:(minY+maxY)/2
  };
}

function buscarPunto(est,x,y){
  for(let i=0;i<est.puntos.length;i++){
    if(distanciaXY(est.puntos[i].x,est.puntos[i].y,x,y)<20){
      return i;
    }
  }
  return -1;
}

function moverEstancia(est,dx,dy){
  for(const p of est.puntos){
    p.x+=dx;
    p.y+=dy;
  }
}

/* ========= CREAR ESTANCIA ========= */

function crearEstancia(){
  return{
    nombre:"",
    planta:"Planta baja",
    puntos:[],
    cerrado:false,
    fijado:false
  }
}

function getActiva(){
  if(estanciaActiva<0)return null;
  return estancias[estanciaActiva];
}

/* ========= DIBUJO ========= */

function dibujar(){

ctx.clearRect(0,0,canvas.width,canvas.height);

for(let i=0;i<estancias.length;i++){

  const est=estancias[i];
  const activa=(i===estanciaActiva);

  if(est.puntos.length>1){

    ctx.beginPath();
    ctx.moveTo(est.puntos[0].x,est.puntos[0].y);

    for(let j=1;j<est.puntos.length;j++){
      ctx.lineTo(est.puntos[j].x,est.puntos[j].y);
    }

    if(est.cerrado){
      ctx.closePath();
      ctx.fillStyle=activa?"rgba(249,115,22,0.1)":"rgba(150,150,150,0.08)";
      ctx.fill();
    }

    ctx.strokeStyle=activa?"#f97316":"#999";
    ctx.lineWidth=activa?3:2;
    ctx.stroke();
  }

  if(activa && !est.fijado){

    for(let j=0;j<est.puntos.length;j++){

      const p=est.puntos[j];

      ctx.beginPath();

      if(j===0 && !est.cerrado && est.puntos.length>=3){
        ctx.arc(p.x,p.y,10,0,Math.PI*2);
        ctx.fillStyle="#16a34a";
        ctx.fill();
      }else{
        ctx.arc(p.x,p.y,7,0,Math.PI*2);
        ctx.fillStyle="#000";
        ctx.fill();
      }
    }

  }

}

/* marcar punto seleccionado para unión */

if(puntoUnionActivo){

ctx.beginPath();
ctx.arc(
puntoUnionActivo.x,
puntoUnionActivo.y,
12,0,Math.PI*2);
ctx.strokeStyle="blue";
ctx.lineWidth=3;
ctx.stroke();

}

}

/* ========= EVENTOS ========= */

function pos(e){
const r=canvas.getBoundingClientRect();
return{
x:e.clientX-r.left,
y:e.clientY-r.top
}
}

canvas.addEventListener("pointerdown",e=>{

const p=pos(e);

pointerActivo=true;
startX=p.x;
startY=p.y;
lastX=p.x;
lastY=p.y;

const activa=getActiva();
if(!activa)return;

indicePunto=buscarPunto(activa,p.x,p.y);

/* modo unir */

if(modoUnir){

if(indicePunto!==-1){

puntoUnionActivo=activa.puntos[indicePunto];
dibujar();
return;

}

/* buscar punto de otra estancia */

for(const est of estancias){

if(est===activa)continue;

const i=buscarPunto(est,p.x,p.y);

if(i!==-1 && puntoUnionActivo){

const destino=est.puntos[i];

const dx=destino.x-puntoUnionActivo.x;
const dy=destino.y-puntoUnionActivo.y;

moverEstancia(activa,dx,dy);

puntoUnionActivo=null;
modoUnir=false;

dibujar();
return;

}

}

}

});

canvas.addEventListener("pointermove",e=>{

if(!pointerActivo)return;

const p=pos(e);
const activa=getActiva();
if(!activa)return;

if(indicePunto!==-1 && !activa.fijado){

activa.puntos[indicePunto].x=p.x;
activa.puntos[indicePunto].y=p.y;

dibujar();
return;

}

if(modoMover && activa.cerrado){

const dx=p.x-lastX;
const dy=p.y-lastY;

moverEstancia(activa,dx,dy);

lastX=p.x;
lastY=p.y;

dibujar();

}

});

canvas.addEventListener("pointerup",e=>{

pointerActivo=false;

const p=pos(e);
const activa=getActiva();
if(!activa)return;

if(indicePunto===-1 && !activa.cerrado){

activa.puntos.push({x:p.x,y:p.y});
dibujar();
return;

}

if(indicePunto===0 && activa.puntos.length>=3 && !activa.cerrado){

activa.cerrado=true;
dibujar();
return;

}

indicePunto=-1;

});

/* ========= BOTONES ========= */

btnNuevo.onclick=()=>{

estancias.push(crearEstancia());
estanciaActiva=estancias.length-1;
dibujar();

}

btnCerrar.onclick=()=>{

const a=getActiva();
if(!a)return;

if(a.puntos.length>=3){
a.cerrado=true;
dibujar();
}

}

btnBorrar.onclick=()=>{

const a=getActiva();
if(!a)return;

a.puntos.pop();
dibujar();

}

btnMover.onclick=()=>{

modoMover=!modoMover;
modoRotar=false;
modoUnir=false;

}

btnRotar.onclick=()=>{

modoRotar=!modoRotar;
modoMover=false;
modoUnir=false;

}

btnUnir.onclick=()=>{

modoUnir=!modoUnir;
modoMover=false;
modoRotar=false;
puntoUnionActivo=null;

}

inputNombre.oninput=()=>{

const a=getActiva();
if(!a)return;

a.nombre=inputNombre.value;

}

selectPlanta.onchange=()=>{

const a=getActiva();
if(!a)return;

a.planta=selectPlanta.value;

}

/* ========= INICIO ========= */

function ajustar(){
const barraH=document.getElementById("barra").offsetHeight;
const infoH=document.getElementById("info").offsetHeight;

canvas.width=window.innerWidth;
canvas.height=window.innerHeight-barraH-infoH;

dibujar();
}

window.addEventListener("resize",ajustar);

function iniciar(){

estancias=[crearEstancia()];
estanciaActiva=0;

ajustar();

}

iniciar();

</script>
</body>
</html>
