<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Allcalor Control</title>
<style>

body {
font-family: Arial, sans-serif;
background-color: #0f172a;
color: white;
margin: 0;
padding: 0;
}

header {
background-color: #1e293b;
padding: 20px;
text-align: center;
font-size: 24px;
font-weight: bold;
}

.container {
padding: 30px;
}

.card {
background-color: #1e293b;
padding: 20px;
border-radius: 10px;
margin-bottom: 20px;
}

button {
background-color: #2563eb;
color: white;
border: none;
padding: 10px 20px;
border-radius: 5px;
cursor: pointer;
}

button:hover {
background-color: #1d4ed8;
}

</style>
</head>
<body>

<header>
ALLCALOR CONTROL
</header>

<div class="container">

<div class="card">
<h2>Instalaciones</h2>
<p>Gestión de proyectos activos</p>
<button>Entrar</button>
</div>

<div class="card">
<h2>Clientes</h2>
<p>Base de datos de clientes</p>
<button>Entrar</button>
</div>

<div class="card">
<h2>Presupuestos</h2>
<p>Generador profesional</p>
<button>Entrar</button>
</div>

</div>

</body>
</html>
