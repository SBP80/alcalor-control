<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALLCALOR ENGINE</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
display:flex;
flex-direction:column;
height:100vh;
overflow:hidden;
}

#barra{
background:#1f1f1f;
padding:10px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

button{
border:none;
padding:12px 16px;
font-size:16px;
border-radius:8px;
background:#f0842f;
color:white;
font-weight:bold;
}

.sec{
background:#5a5f69;
}

#panel{
background:#222;
padding:10px;
display:flex;
gap:10px;
align-items:center;
}

input{
font-size:18px;
padding:6px;
border-radius:6px;
border:none;
width:90px;
}

#canvas{
flex:1;
background:#181818;
touch-action:none;
}

</style>
</head>

<body>

<div id="barra">

<button id="crear">Estancia</button>

<button id="editar">Editar</button>

<button id="borrar" class="sec">Borrar activa</button>

<button id="limpiar" class="sec">Limpiar</button>

</div>

<div id="panel">

Ancho
<input id="ancho">

Alto
<input id="alto">

<button id="aplicar">Aplicar</button>

</div>

<canvas id="canvas"></canvas>

<script>

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

const anchoInput=document.getElementById("ancho")
const altoInput=document.getElementById("alto")

let W,H

function resize(){
W=canvas.clientWidth
H=canvas.clientHeight
canvas.width=W
canvas.height=H
draw()
}

window.addEventListener("resize",resize)

resize()

let modo="crear"

let estancias=[]

let activa=-1

let startX,startY
let moving=false
let drawMode=false
let offsetX,offsetY

document.getElementById("crear").onclick=()=>modo="crear"
document.getElementById("editar").onclick=()=>modo="editar"

document.getElementById("borrar").onclick=()=>{

if(activa==-1)return

estancias.splice(activa,1)

activa=-1

draw()

}

document.getElementById("limpiar").onclick=()=>{

estancias=[]

activa=-1

draw()

}

document.getElementById("aplicar").onclick=()=>{

if(activa==-1)return

let w=parseFloat(anchoInput.value)
let h=parseFloat(altoInput.value)

if(isNaN(w)||isNaN(h))return

estancias[activa].w=w*100
estancias[activa].h=h*100

draw()

}

canvas.addEventListener("pointerdown",e=>{

const r=canvas.getBoundingClientRect()

const x=e.clientX-r.left
const y=e.clientY-r.top

if(modo=="crear"){

drawMode=true

startX=x
startY=y

}

if(modo=="editar"){

for(let i=estancias.length-1;i>=0;i--){

const s=estancias[i]

if(x>s.x && x<s.x+s.w && y>s.y && y<s.y+s.h){

activa=i

moving=true

offsetX=x-s.x
offsetY=y-s.y

anchoInput.value=(s.w/100).toFixed(2)
altoInput.value=(s.h/100).toFixed(2)

draw()

return

}

}

activa=-1
draw()

}

})

canvas.addEventListener("pointermove",e=>{

const r=canvas.getBoundingClientRect()

const x=e.clientX-r.left
const y=e.clientY-r.top

if(drawMode){

draw()

ctx.strokeStyle="#f0842f"
ctx.lineWidth=2

ctx.strokeRect(startX,startY,x-startX,y-startY)

}

if(moving && activa!=-1){

const s=estancias[activa]

s.x=x-offsetX
s.y=y-offsetY

draw()

}

})

canvas.addEventListener("pointerup",e=>{

const r=canvas.getBoundingClientRect()

const x=e.clientX-r.left
const y=e.clientY-r.top

if(drawMode){

drawMode=false

const w=x-startX
const h=y-startY

if(Math.abs(w)>20 && Math.abs(h)>20){

estancias.push({
x:startX,
y:startY,
w:w,
h:h
})

}

draw()

}

moving=false

})

function draw(){

ctx.clearRect(0,0,W,H)

for(let i=0;i<estancias.length;i++){

const s=estancias[i]

ctx.fillStyle=i==activa?"rgba(240,132,47,0.25)":"rgba(0,255,150,0.15)"

ctx.fillRect(s.x,s.y,s.w,s.h)

ctx.strokeStyle=i==activa?"#f0842f":"#6df5b2"

ctx.lineWidth=3

ctx.strokeRect(s.x,s.y,s.w,s.h)

ctx.fillStyle="white"

ctx.font="14px Arial"

ctx.fillText((s.w/100).toFixed(2)+" m",s.x+10,s.y+20)
ctx.fillText((s.h/100).toFixed(2)+" m",s.x+10,s.y+38)

}

}

</script>

</body>
</html>
