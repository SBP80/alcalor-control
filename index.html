<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ALLCALOR ENGINE V5</title>

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;background:#111;color:#fff;font-family:Arial}
body{display:flex;flex-direction:column;height:100dvh;overflow:hidden}

#barra{
background:#1f1f1f;
padding:10px;
display:flex;
gap:8px;
flex-wrap:wrap;
border-bottom:1px solid #333
}

button{
border:none;
border-radius:10px;
padding:12px 16px;
font-size:16px;
font-weight:bold;
background:#f0842f;
color:#fff
}

.sec{background:#5a616c}
.activo{background:#2f8f46}

#canvasWrap{flex:1;position:relative}
canvas{width:100%;height:100%;background:#181818;display:block;touch-action:none}

#info{
background:#1f1f1f;
padding:8px;
font-size:13px;
border-top:1px solid #333
}
</style>
</head>

<body>

<div id="barra">
<button id="modoPoligono">Polígono</button>
<button id="cerrar">Cerrar estancia</button>
<button id="editar">Editar</button>
<button id="borrar" class="sec">Borrar</button>
<button id="limpiar" class="sec">Limpiar</button>
</div>

<div id="canvasWrap">
<canvas id="canvas"></canvas>
</div>

<div id="info">Modo polígono activo</div>

<script>

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")
const info=document.getElementById("info")

let W,H

function resize(){
const r=canvas.getBoundingClientRect()
W=r.width
H=r.height
canvas.width=W
canvas.height=H
draw()
}

window.addEventListener("resize",resize)
resize()

let modo="poligono"

let estancias=[]
let activa=-1

let poligonoActual=[]

let moverVertice=false
let verticeActivo=-1

function draw(){

ctx.clearRect(0,0,W,H)

for(let i=0;i<estancias.length;i++){

const p=estancias[i]

ctx.beginPath()
ctx.moveTo(p[0].x,p[0].y)

for(let j=1;j<p.length;j++)
ctx.lineTo(p[j].x,p[j].y)

ctx.closePath()

ctx.fillStyle=i===activa?"rgba(240,132,47,0.25)":"rgba(0,255,150,0.15)"
ctx.fill()

ctx.lineWidth=2
ctx.strokeStyle=i===activa?"#f0842f":"#6df5b2"
ctx.stroke()

for(const v of p){

ctx.beginPath()
ctx.arc(v.x,v.y,5,0,Math.PI*2)
ctx.fillStyle="#fff"
ctx.fill()

}

}

if(poligonoActual.length>0){

ctx.beginPath()
ctx.moveTo(poligonoActual[0].x,poligonoActual[0].y)

for(let i=1;i<poligonoActual.length;i++)
ctx.lineTo(poligonoActual[i].x,poligonoActual[i].y)

ctx.strokeStyle="#f0842f"
ctx.lineWidth=2
ctx.stroke()

for(const v of poligonoActual){

ctx.beginPath()
ctx.arc(v.x,v.y,4,0,Math.PI*2)
ctx.fillStyle="#fff"
ctx.fill()

}

}

}

function pos(e){
const r=canvas.getBoundingClientRect()
return{
x:e.clientX-r.left,
y:e.clientY-r.top
}
}

canvas.addEventListener("pointerdown",e=>{

const p=pos(e)

if(modo==="poligono"){

poligonoActual.push({x:p.x,y:p.y})
draw()
return

}

if(modo==="editar"){

for(let i=0;i<estancias.length;i++){

for(let j=0;j<estancias[i].length;j++){

const v=estancias[i][j]

if(Math.hypot(p.x-v.x,p.y-v.y)<10){

activa=i
verticeActivo=j
moverVertice=true
draw()
return

}

}

}

}

})

canvas.addEventListener("pointermove",e=>{

if(!moverVertice)return

const p=pos(e)

const v=estancias[activa][verticeActivo]

v.x=p.x
v.y=p.y

draw()

})

canvas.addEventListener("pointerup",()=>{

moverVertice=false

})

document.getElementById("modoPoligono").onclick=()=>{
modo="poligono"
info.textContent="Modo polígono activo"
}

document.getElementById("cerrar").onclick=()=>{

if(poligonoActual.length<3)return

estancias.push([...poligonoActual])
poligonoActual=[]
draw()

}

document.getElementById("editar").onclick=()=>{
modo="editar"
info.textContent="Arrastra vértices"
}

document.getElementById("borrar").onclick=()=>{

if(activa===-1)return

estancias.splice(activa,1)
activa=-1
draw()

}

document.getElementById("limpiar").onclick=()=>{

estancias=[]
poligonoActual=[]
activa=-1
draw()

}

</script>

</body>
</html>
