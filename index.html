<!DOCTYPE html>
<!-- Documento HTML5 -->

<html lang="es">
<!-- Idioma del documento -->

<head>

<meta charset="UTF-8">
<!-- Permite caracteres especiales -->

<title>ALLCALOR PRO</title>
<!-- Título del programa -->

<style>

/* Estilo general */
body{
font-family:Arial;
background:#0f2b44;
color:white;
margin:0;
padding:20px;
}

/* Título */
h1{
text-align:center;
}

/* Panel de controles */
.panel{
background:#12314a;
padding:15px;
border-radius:8px;
margin-bottom:15px;
}

/* Botones */
button{
background:#2b83ff;
color:white;
border:none;
padding:8px 12px;
cursor:pointer;
margin-right:8px;
}

/* Área de dibujo */
canvas{
background:#efe9dd;
border-radius:8px;
display:block;
margin:auto;
}

/* Inputs */
input{
padding:6px;
width:80px;
}

</style>

</head>

<body>

<h1>ALLCALOR PRO - Motor Geométrico</h1>

<div class="panel">

Escala: 1m =
<input type="number" id="escalaInput" value="50">
px

Separación tubo (cm):
<input type="number" id="pasoInput" value="10">

<br><br>

<button onclick="cerrarPoligono()">Cerrar estancia</button>

<button onclick="deshacer()">Deshacer</button>

<button onclick="reiniciar()">Reiniciar</button>

<button onclick="generarAnillos()">Generar anillos</button>

<div id="info"></div>

</div>

<canvas id="canvas" width="1000" height="600"></canvas>

<script>

/* Referencia canvas */
const canvas=document.getElementById("canvas");

/* Contexto dibujo */
const ctx=canvas.getContext("2d");

/* Lista de vértices */
let puntos=[];

/* Indica si el polígono está cerrado */
let cerrado=false;

/* Anillos generados */
let anillos=[];

/* Obtiene escala */
function getEscala(){
return parseFloat(document.getElementById("escalaInput").value);
}

/* Convierte separación a píxeles */
function getPaso(){

let cm=parseFloat(document.getElementById("pasoInput").value);

return (cm/100)*getEscala();

}

/* Offset inicial desde muro (10 cm) */
function getOffsetInicial(){

return (10/100)*getEscala();

}

/* Evento clic */
canvas.addEventListener("click",function(e){

if(cerrado)return;

const rect=canvas.getBoundingClientRect();

const x=e.clientX-rect.left;
const y=e.clientY-rect.top;

puntos.push({x,y});

dibujar();

});

/* Cerrar polígono */
function cerrarPoligono(){

if(puntos.length<3)return;

cerrado=true;

dibujar();

}

/* Deshacer */
function deshacer(){

if(cerrado)return;

puntos.pop();

dibujar();

}

/* Reiniciar */
function reiniciar(){

puntos=[];
anillos=[];
cerrado=false;

ctx.clearRect(0,0,canvas.width,canvas.height);

}

/* Dibujar escena */
function dibujar(){

ctx.clearRect(0,0,canvas.width,canvas.height);

if(puntos.length===0)return;

/* Dibujar polígono */
ctx.beginPath();

ctx.moveTo(puntos[0].x,puntos[0].y);

for(let i=1;i<puntos.length;i++){

ctx.lineTo(puntos[i].x,puntos[i].y);

}

if(cerrado){

ctx.closePath();

ctx.fillStyle="rgba(43,131,255,0.2)";
ctx.fill();

}

ctx.strokeStyle="#2b83ff";
ctx.lineWidth=2;
ctx.stroke();

/* Dibujar vértices */
for(let p of puntos){

ctx.beginPath();
ctx.arc(p.x,p.y,4,0,Math.PI*2);
ctx.fillStyle="red";
ctx.fill();

}

/* Dibujar anillos */
for(let a of anillos){

ctx.beginPath();

ctx.moveTo(a[0].x,a[0].y);

for(let i=1;i<a.length;i++){

ctx.lineTo(a[i].x,a[i].y);

}

ctx.closePath();

ctx.strokeStyle="green";
ctx.lineWidth=2;
ctx.stroke();

}

}

/* Generar anillos */
function generarAnillos(){

if(!cerrado)return;

anillos=[];

/* primer offset desde muro */
let actual=offsetPoligono(puntos,getOffsetInicial());

if(actual.length<3)return;

anillos.push(actual);

/* offsets siguientes */
const paso=getPaso();

while(true){

let nuevo=offsetPoligono(actual,paso);

if(nuevo.length<3)break;

anillos.push(nuevo);

actual=nuevo;

if(anillos.length>200)break;

}

dibujar();

}

/* Offset robusto por paralelas */
function offsetPoligono(poligono,dist){

let resultado=[];

let n=poligono.length;

for(let i=0;i<n;i++){

let p0=poligono[i];
let p1=poligono[(i+1)%n];

/* vector lado */
let dx=p1.x-p0.x;
let dy=p1.y-p0.y;

/* longitud */
let len=Math.hypot(dx,dy);

dx/=len;
dy/=len;

/* normal interior */
let nx=-dy;
let ny=dx;

/* línea paralela desplazada */
let x1=p0.x+nx*dist;
let y1=p0.y+ny*dist;

let x2=p1.x+nx*dist;
let y2=p1.y+ny*dist;

resultado.push({
x1:x1,
y1:y1,
x2:x2,
y2:y2
});

}

/* intersecciones */
let nuevo=[];

for(let i=0;i<resultado.length;i++){

let a=resultado[i];
let b=resultado[(i+1)%resultado.length];

let p=interseccionLineas(a,b);

if(p)nuevo.push(p);

}

return nuevo;

}

/* Intersección de dos rectas */
function interseccionLineas(l1,l2){

let x1=l1.x1;
let y1=l1.y1;
let x2=l1.x2;
let y2=l1.y2;

let x3=l2.x1;
let y3=l2.y1;
let x4=l2.x2;
let y4=l2.y2;

let den=(x1-x2)*(y3-y4)-(y1-y2)*(x3-x4);

if(den==0)return null;

let px=((x1*y2-y1*x2)*(x3-x4)-(x1-x2)*(x3*y4-y3*x4))/den;

let py=((x1*y2-y1*x2)*(y3-y4)-(y1-y2)*(x3*y4-y3*x4))/den;

return{x:px,y:py};

}

</script>

</body>
</html>
