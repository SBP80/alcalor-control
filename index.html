<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>ALLCALOR</title>
<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f0f0f0;
  overflow:hidden;
}
#barra{
  background:#222;
  padding:10px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
}
button{
  padding:10px 14px;
  border:none;
  background:#f97316;
  color:#fff;
  border-radius:4px;
  font-weight:bold;
  font-size:14px;
}
button.activo{ background:#15803d; }
button.bloqueado{ background:#6b7280; }
input,select{
  padding:10px 12px;
  border:1px solid #ccc;
  border-radius:4px;
  font-size:14px;
  min-width:140px;
}
#info{
  background:#fff;
  padding:8px 10px;
  font-size:14px;
  border-bottom:1px solid #ccc;
  white-space:pre-line;
}
canvas{
  display:block;
  background:#f5f5f5;
  touch-action:none;
}
</style>
</head>
<body>

<div id="barra">
  <button id="nuevo">Nueva estancia</button>
  <button id="cerrar">Cerrar estancia</button>
  <button id="borrar">Borrar punto</button>
  <button id="fijar">Fijar estancia</button>
  <button id="editar">Editar estancia</button>
  <button id="mover">Mover estancia</button>
  <button id="rotar">Rotar estancia</button>
  <button id="verificar">Verificación</button>
  <button id="diag">Diagonal siguiente</button>
  <button id="aplicarDiag">Aplicar diagonal</button>
  <button id="escala">Calibrar escala</button>

  <input id="nombre" type="text" placeholder="Nombre estancia">
  <select id="planta">
    <option value="Planta baja">Planta baja</option>
    <option value="Planta 1">Planta 1</option>
    <option value="Planta 2">Planta 2</option>
    <option value="Sótano">Sótano</option>
    <option value="Buhardilla">Buhardilla</option>
  </select>
</div>

<div id="info">Modo dibujo</div>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const btnNuevo = document.getElementById("nuevo");
const btnCerrar = document.getElementById("cerrar");
const btnBorrar = document.getElementById("borrar");
const btnFijar = document.getElementById("fijar");
const btnEditar = document.getElementById("editar");
const btnMover = document.getElementById("mover");
const btnRotar = document.getElementById("rotar");
const btnVerificar = document.getElementById("verificar");
const btnDiag = document.getElementById("diag");
const btnAplicarDiag = document.getElementById("aplicarDiag");
const btnEscala = document.getElementById("escala");
const inputNombre = document.getElementById("nombre");
const selectPlanta = document.getElementById("planta");
const info = document.getElementById("info");

let estancias = [];
let estanciaActiva = -1;

let modoMover = false;
let modoRotar = false;
let modoVerificacion = false;
let calibrando = false;
let verticesCalibracion = [];

let pointerActivo = false;
let arrastrandoPunto = false;
let moviendoFigura = false;
let rotandoFigura = false;
let indicePunto = -1;

let startX = 0;
let startY = 0;
let lastX = 0;
let lastY = 0;

let etiquetasLados = [];
let etiquetaDiagonal = null;
let tiradorRotacion = null;
let anguloInicioRotacion = 0;

const RADIO_PUNTO = 20;
const UMBRAL_ARRASTRE = 6;
const UMBRAL_TOQUE = 10;
const RADIO_TIRADOR = 18;

function crearEstanciaVacia(){
  return {
    nombre: "",
    planta: "Planta baja",
    puntos: [],
    cerrado: false,
    fijado: false,
    pxPorMetro: 100,
    diagonales: [],
    diagActual: 0,
    diagonalesObjetivo: [],
    rotacionGrados: 0
  };
}

function getActiva(){
  if(estanciaActiva < 0 || estanciaActiva >= estancias.length) return null;
  return estancias[estanciaActiva];
}

function ajustar(){
  const barraH = document.getElementById("barra").offsetHeight;
  const infoH = document.getElementById("info").offsetHeight;
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight - barraH - infoH;
  dibujar();
}
window.addEventListener("resize", ajustar);

function pos(e){
  const r = canvas.getBoundingClientRect();
  return {
    x: e.clientX - r.left,
    y: e.clientY - r.top
  };
}

function distancia(a,b){
  return Math.hypot(a.x - b.x, a.y - b.y);
}

function distanciaXY(x1,y1,x2,y2){
  return Math.hypot(x2 - x1, y2 - y1);
}

function metrosDesdePx(estancia, px){
  return px / estancia.pxPorMetro;
}

function pxDesdeMetros(estancia, m){
  return m * estancia.pxPorMetro;
}

function formatM(v){
  return v.toFixed(2).replace(".", ",") + " m";
}

function buscarPuntoEnEstancia(estancia, x, y){
  for(let i=0;i<estancia.puntos.length;i++){
    if(distanciaXY(estancia.puntos[i].x, estancia.puntos[i].y, x, y) < RADIO_PUNTO){
      return i;
    }
  }
  return -1;
}

function puntoSobreSegmento(px,py,a,b){
  const cross = Math.abs((py-a.y)*(b.x-a.x) - (px-a.x)*(b.y-a.y));
  if(cross > 0.8) return false;

  const dot = (px-a.x)*(b.x-a.x) + (py-a.y)*(b.y-a.y);
  if(dot < 0) return false;

  const lenSq = (b.x-a.x)*(b.x-a.x) + (b.y-a.y)*(b.y-a.y);
  if(dot > lenSq) return false;

  return true;
}

function puntoDentroPoligono(estancia, x, y){
  if(estancia.puntos.length < 3) return false;
  let dentro = false;

  for(let i=0,j=estancia.puntos.length-1;i<estancia.puntos.length;j=i++){
    const xi = estancia.puntos[i].x;
    const yi = estancia.puntos[i].y;
    const xj = estancia.puntos[j].x;
    const yj = estancia.puntos[j].y;

    const cruza = ((yi > y) !== (yj > y)) &&
      (x < (xj - xi) * (y - yi) / ((yj - yi) || 0.000001) + xi);

    if(cruza) dentro = !dentro;
  }
  return dentro;
}

function puntoSobreAlgunLado(estancia, x, y){
  if(estancia.puntos.length < 2) return false;
  const limite = estancia.cerrado ? estancia.puntos.length : estancia.puntos.length - 1;
  for(let i=0;i<limite;i++){
    const a = estancia.puntos[i];
    const b = estancia.puntos[(i+1)%estancia.puntos.length];
    if(puntoSobreSegmento(x,y,a,b)) return true;
  }
  return false;
}

function puntoDentroPoligonoConBorde(estancia, x, y){
  return puntoDentroPoligono(estancia, x, y) || puntoSobreAlgunLado(estancia, x, y);
}

function orient(a,b,c){
  const v = (b.y-a.y)*(c.x-b.x) - (b.x-a.x)*(c.y-b.y);
  if(Math.abs(v) < 0.000001) return 0;
  return v > 0 ? 1 : 2;
}

function segmentosIntersectan(a,b,c,d){
  const o1 = orient(a,b,c);
  const o2 = orient(a,b,d);
  const o3 = orient(c,d,a);
  const o4 = orient(c,d,b);

  if(o1 !== o2 && o3 !== o4) return true;

  if(o1 === 0 && puntoSobreSegmento(c.x,c.y,a,b)) return true;
  if(o2 === 0 && puntoSobreSegmento(d.x,d.y,a,b)) return true;
  if(o3 === 0 && puntoSobreSegmento(a.x,a.y,c,d)) return true;
  if(o4 === 0 && puntoSobreSegmento(b.x,b.y,c,d)) return true;

  return false;
}

function diagonalValida(estancia, i, j){
  const a = estancia.puntos[i];
  const b = estancia.puntos[j];

  for(let k=0;k<estancia.puntos.length;k++){
    const c = estancia.puntos[k];
    const d = estancia.puntos[(k+1)%estancia.puntos.length];

    const usaI = (k === i || (k+1)%estancia.puntos.length === i);
    const usaJ = (k === j || (k+1)%estancia.puntos.length === j);
    if(usaI || usaJ) continue;

    if(segmentosIntersectan(a,b,c,d)) return false;
  }

  const muestras = 12;
  for(let t=1;t<muestras;t++){
    const s = t / muestras;
    const x = a.x + (b.x - a.x) * s;
    const y = a.y + (b.y - a.y) * s;
    if(!puntoDentroPoligonoConBorde(estancia, x, y)) return false;
  }

  return true;
}

function calcularDiagonales(estancia){
  estancia.diagonales = [];
  if(!estancia.cerrado || estancia.puntos.length < 4) return;

  const n = estancia.puntos.length;
  for(let i=0;i<n;i++){
    for(let j=i+2;j<n;j++){
      if(i === 0 && j === n-1) continue;
      if(diagonalValida(estancia, i, j)) estancia.diagonales.push([i,j]);
    }
  }

  if(estancia.diagActual >= estancia.diagonales.length){
    estancia.diagActual = 0;
  }

  while(estancia.diagonalesObjetivo.length < estancia.diagonales.length){
    estancia.diagonalesObjetivo.push(undefined);
  }
}

function moverFigura(estancia, dx, dy){
  for(const p of estancia.puntos){
    p.x += dx;
    p.y += dy;
  }
}

function centroFigura(estancia){
  if(estancia.puntos.length === 0){
    return {x: canvas.width/2, y: canvas.height/2};
  }

  let minX = estancia.puntos[0].x, maxX = estancia.puntos[0].x;
  let minY = estancia.puntos[0].y, maxY = estancia.puntos[0].y;

  for(const p of estancia.puntos){
    if(p.x < minX) minX = p.x;
    if(p.x > maxX) maxX = p.x;
    if(p.y < minY) minY = p.y;
    if(p.y > maxY) maxY = p.y;
  }

  return { x:(minX+maxX)/2, y:(minY+maxY)/2 };
}

function angulo(a,b,c){
  const abx = a.x - b.x;
  const aby = a.y - b.y;
  const cbx = c.x - b.x;
  const cby = c.y - b.y;

  const dot = abx * cbx + aby * cby;
  const mag1 = Math.hypot(abx, aby);
  const mag2 = Math.hypot(cbx, cby);

  if(mag1 === 0 || mag2 === 0) return 0;

  let cos = dot / (mag1 * mag2);
  cos = Math.max(-1, Math.min(1, cos));

  return Math.acos(cos) * 180 / Math.PI;
}

function anguloPuntoRespectoCentro(centro, p){
  return Math.atan2(p.y - centro.y, p.x - centro.x);
}

function rotarPunto(p, centro, rad){
  const dx = p.x - centro.x;
  const dy = p.y - centro.y;
  const cos = Math.cos(rad);
  const sin = Math.sin(rad);
  return {
    x: centro.x + dx * cos - dy * sin,
    y: centro.y + dx * sin + dy * cos
  };
}

function rotarEstancia(estancia, rad){
  const centro = centroFigura(estancia);
  for(let i=0;i<estancia.puntos.length;i++){
    estancia.puntos[i] = rotarPunto(estancia.puntos[i], centro, rad);
  }
  estancia.rotacionGrados += rad * 180 / Math.PI;
  while(estancia.rotacionGrados > 180) estancia.rotacionGrados -= 360;
  while(estancia.rotacionGrados <= -180) estancia.rotacionGrados += 360;
}

function obtenerTiradorRotacion(estancia){
  const centro = centroFigura(estancia);
  let minY = estancia.puntos[0].y;
  for(const p of estancia.puntos){
    if(p.y < minY) minY = p.y;
  }
  return {
    x: centro.x,
    y: minY - 45
  };
}

function etiqueta(texto,x,y,color, relleno="rgba(255,255,255,0.96)"){
  const lineas = String(texto).split("\n");
  ctx.save();
  ctx.font = "bold 14px Arial";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  let ancho = 0;
  for(const linea of lineas){
    ancho = Math.max(ancho, ctx.measureText(linea).width);
  }
  ancho += 16;

  const altoLinea = 18;
  const alto = Math.max(24, lineas.length * altoLinea + 8);

  ctx.fillStyle = relleno;
  ctx.fillRect(x - ancho/2, y - alto/2, ancho, alto);

  ctx.strokeStyle = "rgba(0,0,0,0.12)";
  ctx.strokeRect(x - ancho/2, y - alto/2, ancho, alto);

  ctx.fillStyle = color;

  if(lineas.length === 1){
    ctx.fillText(lineas[0], x, y);
  }else{
    const inicioY = y - ((lineas.length - 1) * altoLinea) / 2;
    for(let i=0;i<lineas.length;i++){
      ctx.fillText(lineas[i], x, inicioY + i * altoLinea);
    }
  }

  ctx.restore();
  return {x, y, w: ancho, h: alto};
}

function generarEtiquetasLados(estancia){
  etiquetasLados = [];
  if(!estancia || !estancia.cerrado) return;

  for(let i=0;i<estancia.puntos.length;i++){
    const a = estancia.puntos[i];
    const b = estancia.puntos[(i+1)%estancia.puntos.length];
    const mx = (a.x+b.x)/2;
    const my = (a.y+b.y)/2;
    const caja = etiqueta(formatM(metrosDesdePx(estancia, distancia(a,b))), mx, my, "#2563eb");

    etiquetasLados.push({
      lado: i,
      x: caja.x,
      y: caja.y,
      w: caja.w,
      h: caja.h
    });
  }
}

function buscarEtiquetaLado(x,y){
  for(const e of etiquetasLados){
    if(
      x >= e.x - e.w/2 &&
      x <= e.x + e.w/2 &&
      y >= e.y - e.h/2 &&
      y <= e.y + e.h/2
    ){
      return e.lado;
    }
  }
  return -1;
}

function editarMedidaLado(estancia, lado){
  if(!estancia || !estancia.cerrado || modoVerificacion) return;

  const a = estancia.puntos[lado];
  const bIndex = (lado + 1) % estancia.puntos.length;
  const b = estancia.puntos[bIndex];
  const actualM = metrosDesdePx(estancia, distancia(a,b));

  const respuesta = prompt("Nueva medida del lado en metros", actualM.toFixed(2).replace(".", ","));
  if(respuesta === null) return;

  const nuevaM = Number(respuesta.replace(",", ".").trim());
  if(!Number.isFinite(nuevaM) || nuevaM <= 0) return;

  const nuevaPx = pxDesdeMetros(estancia, nuevaM);

  const dx = b.x - a.x;
  const dy = b.y - a.y;
  const len = Math.hypot(dx,dy);
  if(len <= 0.0001) return;

  const ux = dx / len;
  const uy = dy / len;

  b.x = a.x + ux * nuevaPx;
  b.y = a.y + uy * nuevaPx;

  calcularDiagonales(estancia);
  dibujar();
}

function editarDiagonal(estancia){
  if(!estancia || !modoVerificacion || !etiquetaDiagonal || estancia.diagonales.length === 0) return;

  const d = estancia.diagonales[estancia.diagActual];
  const a = estancia.puntos[d[0]];
  const b = estancia.puntos[d[1]];
  const actual = metrosDesdePx(estancia, distancia(a,b));

  const respuesta = prompt(
    "Medida real diagonal en metros",
    (estancia.diagonalesObjetivo[estancia.diagActual] ?? actual).toFixed(2).replace(".", ",")
  );
  if(respuesta === null) return;

  const valor = Number(respuesta.replace(",", ".").trim());
  if(!Number.isFinite(valor) || valor <= 0) return;

  estancia.diagonalesObjetivo[estancia.diagActual] = valor;
  dibujar();
}

function aplicarDiagonalObjetivo(estancia){
  if(!estancia || !modoVerificacion) return;
  if(estancia.diagonales.length === 0) return;
  if(estancia.diagonalesObjetivo[estancia.diagActual] === undefined) return;

  const d = estancia.diagonales[estancia.diagActual];
  const i = d[0];
  const j = d[1];
  const a = estancia.puntos[i];
  const b = estancia.puntos[j];

  const objetivoM = estancia.diagonalesObjetivo[estancia.diagActual];
  const objetivoPx = pxDesdeMetros(estancia, objetivoM);

  const dx = b.x - a.x;
  const dy = b.y - a.y;
  const len = Math.hypot(dx,dy);

  if(len <= 0.0001){
    b.x = a.x + objetivoPx;
    b.y = a.y;
  }else{
    const ux = dx / len;
    const uy = dy / len;
    b.x = a.x + ux * objetivoPx;
    b.y = a.y + uy * objetivoPx;
  }

  calcularDiagonales(estancia);
  dibujar();
}

function dibujarNombreYPlanta(estancia, activa){
  if(!estancia.cerrado || modoVerificacion) return;

  const c = centroFigura(estancia);
  const nombre = estancia.nombre.trim() || "Sin nombre";
  const planta = estancia.planta;
  const fondo = activa ? "rgba(255,255,255,0.98)" : "rgba(255,255,255,0.88)";

  etiqueta(nombre, c.x, c.y - 12, "#111827", fondo);
  etiqueta(planta, c.x, c.y + 18, "#374151", fondo);
}

function dibujarDiagonal(estancia){
  etiquetaDiagonal = null;
  if(!estancia || !modoVerificacion || estancia.diagonales.length === 0) return;

  const d = estancia.diagonales[estancia.diagActual];
  const a = estancia.puntos[d[0]];
  const b = estancia.puntos[d[1]];

  ctx.save();
  ctx.setLineDash([10,8]);
  ctx.beginPath();
  ctx.moveTo(a.x,a.y);
  ctx.lineTo(b.x,b.y);
  ctx.strokeStyle = "purple";
  ctx.lineWidth = 3;
  ctx.stroke();
  ctx.restore();

  const mx = (a.x+b.x)/2;
  const my = (a.y+b.y)/2;
  const valor = metrosDesdePx(estancia, distancia(a,b));

  let texto = "D" + (estancia.diagActual + 1) + " " + formatM(valor);

  if(estancia.diagonalesObjetivo[estancia.diagActual] !== undefined){
    const obj = estancia.diagonalesObjetivo[estancia.diagActual];
    const error = Math.abs(valor - obj);
    texto =
      "D" + (estancia.diagActual + 1) + " " + formatM(valor) +
      "\nObj " + formatM(obj) +
      "\nΔ " + formatM(error);
  }

  const caja = etiqueta(texto, mx, my, "purple");
  etiquetaDiagonal = {
    x: caja.x,
    y: caja.y,
    w: caja.w,
    h: caja.h
  };
}

function dibujarRotacion(estancia){
  tiradorRotacion = null;
  if(!estancia || !estancia.cerrado || !modoRotar) return;

  const centro = centroFigura(estancia);
  const tirador = obtenerTiradorRotacion(estancia);
  tiradorRotacion = tirador;

  ctx.save();
  ctx.setLineDash([6,6]);
  ctx.beginPath();
  ctx.moveTo(centro.x, centro.y);
  ctx.lineTo(tirador.x, tirador.y);
  ctx.strokeStyle = "#0ea5e9";
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.restore();

  ctx.beginPath();
  ctx.arc(tirador.x, tirador.y, RADIO_TIRADOR, 0, Math.PI * 2);
  ctx.fillStyle = "#0ea5e9";
  ctx.fill();
  ctx.strokeStyle = "#ffffff";
  ctx.lineWidth = 3;
  ctx.stroke();

  etiqueta("Rot " + estancia.rotacionGrados.toFixed(1).replace(".", ",") + "°", tirador.x, tirador.y - 32, "#0ea5e9");
}

function dibujarCalibracion(estancia){
  if(!calibrando || !estancia) return;

  for(const idx of verticesCalibracion){
    const p = estancia.puntos[idx];
    if(!p) continue;

    ctx.beginPath();
    ctx.arc(p.x,p.y,10,0,Math.PI*2);
    ctx.fillStyle = "#dc2626";
    ctx.fill();
    ctx.strokeStyle = "#ffffff";
    ctx.lineWidth = 3;
    ctx.stroke();
  }
}

function actualizarInfo(estancia){
  let texto = "";

  if(calibrando){
    texto = verticesCalibracion.length === 0
      ? "Calibrar escala · toca el primer vértice"
      : "Calibrar escala · toca el segundo vértice";
  }else if(modoRotar){
    texto = "Modo rotar estancia";
  }else if(modoVerificacion){
    texto = "Modo verificación";
    if(estancia){
      texto += estancia.diagonales.length > 0
        ? " · D" + (estancia.diagActual + 1) + " de " + estancia.diagonales.length
        : " · Sin diagonales válidas";
    }
    texto += " · Toca la etiqueta morada para introducir la diagonal real";
  }else if(estancia && estancia.fijado){
    texto = "Estancia fijada";
  }else if(modoMover){
    texto = "Modo mover estancia";
  }else if(estancia && estancia.cerrado){
    texto = "Estancia cerrada · Toca una medida azul para editar en metros";
  }else if(estancia && estancia.puntos.length >= 3){
    texto = "Modo dibujo · Toca el punto verde para cerrar";
  }else{
    texto = "Modo dibujo";
  }

  if(estancia){
    const nombre = estancia.nombre.trim() || "Sin nombre";
    texto += " · Activa: " + nombre + " · " + estancia.planta;
    texto += " · Escala: 1 m = " + estancia.pxPorMetro.toFixed(1).replace(".", ",") + " px";
  }

  texto += " · Estancias: " + estancias.length;
  info.textContent = texto;
}

function actualizarBotones(estancia){
  btnMover.classList.toggle("activo", modoMover);
  btnRotar.classList.toggle("activo", modoRotar);
  btnVerificar.classList.toggle("activo", modoVerificacion);
  btnEscala.classList.toggle("activo", calibrando);

  const fijada = estancia ? estancia.fijado : false;
  btnFijar.classList.toggle("bloqueado", fijada);
  btnEditar.classList.toggle("activo", !fijada);
  btnAplicarDiag.classList.toggle(
    "activo",
    !!estancia &&
    modoVerificacion &&
    estancia.diagonalesObjetivo[estancia.diagActual] !== undefined
  );
}

function sincronizarCamposUI(){
  const estancia = getActiva();
  if(!estancia){
    inputNombre.value = "";
    selectPlanta.value = "Planta baja";
    return;
  }
  inputNombre.value = estancia.nombre;
  selectPlanta.value = estancia.planta;
}

function dibujar(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  etiquetasLados = [];
  etiquetaDiagonal = null;
  tiradorRotacion = null;

  const activa = getActiva();

  for(let idx=0; idx<estancias.length; idx++){
    const estancia = estancias[idx];
    const esActiva = idx === estanciaActiva;

    if(estancia.puntos.length > 1){
      ctx.beginPath();
      ctx.moveTo(estancia.puntos[0].x, estancia.puntos[0].y);
      for(let i=1;i<estancia.puntos.length;i++){
        ctx.lineTo(estancia.puntos[i].x, estancia.puntos[i].y);
      }

      if(estancia.cerrado){
        ctx.closePath();
        ctx.fillStyle = esActiva ? "rgba(249,115,22,0.10)" : "rgba(107,114,128,0.06)";
        ctx.fill();
      }

      ctx.strokeStyle = esActiva ? "#f97316" : "#9ca3af";
      ctx.lineWidth = esActiva ? 3 : 2;
      ctx.stroke();
    }

    const mostrarPuntos = esActiva && !estancia.fijado && !modoRotar;

    if(mostrarPuntos){
      for(let i=0;i<estancia.puntos.length;i++){
        const p = estancia.puntos[i];
        ctx.beginPath();

        if(i === 0 && !estancia.cerrado && estancia.puntos.length >= 3){
          ctx.arc(p.x,p.y,10,0,Math.PI*2);
          ctx.fillStyle = "#16a34a";
          ctx.fill();
          ctx.strokeStyle = "#ffffff";
          ctx.lineWidth = 3;
          ctx.stroke();
        }else{
          ctx.arc(p.x,p.y,7,0,Math.PI*2);
          ctx.fillStyle = "#000000";
          ctx.fill();
        }
      }
    }

    if(estancia.cerrado){
      if(esActiva){
        generarEtiquetasLados(estancia);

        for(let i=0;i<estancia.puntos.length;i++){
          const a = estancia.puntos[(i-1+estancia.puntos.length)%estancia.puntos.length];
          const b = estancia.puntos[i];
          const c = estancia.puntos[(i+1)%estancia.puntos.length];
          ctx.fillStyle = "green";
          ctx.font = "14px Arial";
          ctx.textAlign = "center";
          ctx.fillText(Math.round(angulo(a,b,c)) + "°", b.x + 20, b.y - 10);
        }
      }else{
        for(let i=0;i<estancia.puntos.length;i++){
          const a = estancia.puntos[i];
          const b = estancia.puntos[(i+1)%estancia.puntos.length];
          const mx = (a.x+b.x)/2;
          const my = (a.y+b.y)/2;
          etiqueta(formatM(metrosDesdePx(estancia, distancia(a,b))), mx, my, "#6b7280", "rgba(255,255,255,0.82)");
        }
      }
    }

    dibujarNombreYPlanta(estancia, esActiva);
  }

  dibujarDiagonal(activa);
  dibujarRotacion(activa);
  dibujarCalibracion(activa);
  actualizarBotones(activa);
  actualizarInfo(activa);
}

function empezarCalibracion(estancia){
  if(!estancia || !estancia.cerrado || estancia.puntos.length < 2) return;
  calibrando = true;
  modoMover = false;
  modoRotar = false;
  modoVerificacion = false;
  verticesCalibracion = [];
  dibujar();
}

function terminarCalibracion(estancia){
  if(!estancia || verticesCalibracion.length !== 2) return;

  const a = estancia.puntos[verticesCalibracion[0]];
  const b = estancia.puntos[verticesCalibracion[1]];
  const largoPx = distancia(a,b);

  if(largoPx < 10){
    calibrando = false;
    verticesCalibracion = [];
    dibujar();
    return;
  }

  const respuesta = prompt("Distancia real en metros", "");
  if(respuesta === null){
    calibrando = false;
    verticesCalibracion = [];
    dibujar();
    return;
  }

  const realM = Number(respuesta.replace(",", ".").trim());
  if(!Number.isFinite(realM) || realM <= 0){
    calibrando = false;
    verticesCalibracion = [];
    dibujar();
    return;
  }

  estancia.pxPorMetro = largoPx / realM;
  calibrando = false;
  verticesCalibracion = [];
  dibujar();
}

function seleccionarEstanciaPorPunto(x,y){
  for(let i=estancias.length-1;i>=0;i--){
    const estancia = estancias[i];
    if(estancia.cerrado && puntoDentroPoligonoConBorde(estancia, x, y)){
      estanciaActiva = i;
      sincronizarCamposUI();
      return true;
    }
  }
  return false;
}

function onPointerDown(e){
  e.preventDefault();
  canvas.setPointerCapture(e.pointerId);

  const p = pos(e);
  pointerActivo = true;
  arrastrandoPunto = false;
  moviendoFigura = false;
  rotandoFigura = false;
  indicePunto = -1;

  startX = p.x;
  startY = p.y;
  lastX = p.x;
  lastY = p.y;

  let activa = getActiva();

  if(calibrando){
    if(!activa) return;
    return;
  }

  if(activa && activa.fijado){
    if(seleccionarEstanciaPorPunto(p.x,p.y)){
      activa = getActiva();
    }else{
      return;
    }
  }

  if(indicePunto === -1){
    seleccionarEstanciaPorPunto(p.x,p.y);
    activa = getActiva();
  }

  if(!activa) return;

  if(modoRotar && activa.cerrado){
    const tirador = obtenerTiradorRotacion(activa);
    if(distanciaXY(tirador.x, tirador.y, p.x, p.y) <= RADIO_TIRADOR + 8){
      rotandoFigura = true;
      const centro = centroFigura(activa);
      anguloInicioRotacion = anguloPuntoRespectoCentro(centro, p);
      dibujar();
      return;
    }
  }

  indicePunto = buscarPuntoEnEstancia(activa, p.x, p.y);

  if(modoMover && activa.cerrado && puntoDentroPoligonoConBorde(activa, p.x, p.y)){
    moviendoFigura = true;
    indicePunto = -1;
  }

  sincronizarCamposUI();
  dibujar();
}

function onPointerMove(e){
  const activa = getActiva();
  if(!pointerActivo || !activa || activa.fijado || calibrando) return;

  const p = pos(e);

  if(rotandoFigura){
    const centro = centroFigura(activa);
    const anguloActual = anguloPuntoRespectoCentro(centro, p);
    const delta = anguloActual - anguloInicioRotacion;
    rotarEstancia(activa, delta);
    anguloInicioRotacion = anguloActual;
    calcularDiagonales(activa);
    dibujar();
    return;
  }

  if(moviendoFigura){
    const dx = p.x - lastX;
    const dy = p.y - lastY;
    moverFigura(activa, dx, dy);
    lastX = p.x;
    lastY = p.y;
    calcularDiagonales(activa);
    dibujar();
    return;
  }

  if(indicePunto !== -1 && !modoRotar){
    if(distanciaXY(startX,startY,p.x,p.y) > UMBRAL_ARRASTRE){
      arrastrandoPunto = true;
    }

    if(arrastrandoPunto){
      activa.puntos[indicePunto].x = p.x;
      activa.puntos[indicePunto].y = p.y;
      if(activa.cerrado) calcularDiagonales(activa);
      dibujar();
    }
  }
}

function onPointerUp(e){
  if(!pointerActivo) return;
  e.preventDefault();

  const p = pos(e);
  const movimiento = distanciaXY(startX, startY, p.x, p.y);
  const activa = getActiva();

  if(calibrando){
    if(activa){
      const idx = buscarPuntoEnEstancia(activa, p.x,p.y);
      if(idx !== -1){
        if(verticesCalibracion.length === 0){
          verticesCalibracion.push(idx);
        }else if(verticesCalibracion.length === 1 && idx !== verticesCalibracion[0]){
          verticesCalibracion.push(idx);
          terminarCalibracion(activa);
        }
      }
    }
    pointerActivo = false;
    dibujar();
    return;
  }

  if(rotandoFigura){
    pointerActivo = false;
    rotandoFigura = false;
    indicePunto = -1;
    if(activa) calcularDiagonales(activa);
    dibujar();
    return;
  }

  if(moviendoFigura){
    pointerActivo = false;
    moviendoFigura = false;
    indicePunto = -1;
    if(activa) calcularDiagonales(activa);
    dibujar();
    return;
  }

  if(activa && !activa.fijado && !arrastrandoPunto && movimiento <= UMBRAL_TOQUE){
    if(modoVerificacion && etiquetaDiagonal){
      if(
        p.x >= etiquetaDiagonal.x - etiquetaDiagonal.w/2 &&
        p.x <= etiquetaDiagonal.x + etiquetaDiagonal.w/2 &&
        p.y >= etiquetaDiagonal.y - etiquetaDiagonal.h/2 &&
        p.y <= etiquetaDiagonal.y + etiquetaDiagonal.h/2
      ){
        pointerActivo = false;
        editarDiagonal(activa);
        return;
      }
    }

    const i = buscarPuntoEnEstancia(activa, p.x,p.y);

    if(i === 0 && activa.puntos.length >= 3 && !activa.cerrado){
      activa.cerrado = true;
      calcularDiagonales(activa);
    }else if(i === -1 && !activa.cerrado){
      activa.puntos.push({x:p.x,y:p.y});
    }else if(i === -1 && activa.cerrado && !modoMover && !modoVerificacion && !modoRotar){
      const lado = buscarEtiquetaLado(p.x,p.y);
      if(lado !== -1){
        pointerActivo = false;
        editarMedidaLado(activa, lado);
        return;
      }else{
        seleccionarEstanciaPorPunto(p.x,p.y);
        sincronizarCamposUI();
      }
    }
  }else{
    seleccionarEstanciaPorPunto(p.x,p.y);
    sincronizarCamposUI();
  }

  pointerActivo = false;
  arrastrandoPunto = false;
  indicePunto = -1;
  dibujar();
}

canvas.addEventListener("pointerdown", onPointerDown);
canvas.addEventListener("pointermove", onPointerMove);
canvas.addEventListener("pointerup", onPointerUp);
canvas.addEventListener("pointercancel", onPointerUp);

btnNuevo.onclick = function(){
  modoMover = false;
  modoRotar = false;
  modoVerificacion = false;
  calibrando = false;
  verticesCalibracion = [];

  estancias.push(crearEstanciaVacia());
  estanciaActiva = estancias.length - 1;
  sincronizarCamposUI();
  dibujar();
};

btnCerrar.onclick = function(){
  const activa = getActiva();
  if(!activa) return;

  if(activa.puntos.length >= 3){
    activa.cerrado = true;
    calcularDiagonales(activa);
    dibujar();
  }
};

btnBorrar.onclick = function(){
  const activa = getActiva();
  if(!activa || activa.fijado) return;

  if(activa.puntos.length > 0){
    activa.puntos.pop();
  }

  if(activa.puntos.length < 3){
    activa.cerrado = false;
    modoVerificacion = false;
    activa.diagonales = [];
    activa.diagActual = 0;
    activa.diagonalesObjetivo = [];
    etiquetaDiagonal = null;
    calibrando = false;
    verticesCalibracion = [];
  }else if(activa.cerrado){
    calcularDiagonales(activa);
  }

  dibujar();
};

btnFijar.onclick = function(){
  const activa = getActiva();
  if(!activa || !activa.cerrado) return;
  activa.fijado = true;
  modoMover = false;
  modoRotar = false;
  dibujar();
};

btnEditar.onclick = function(){
  const activa = getActiva();
  if(!activa) return;
  activa.fijado = false;
  modoMover = false;
  modoRotar = false;
  dibujar();
};

btnMover.onclick = function(){
  const activa = getActiva();
  if(!activa || activa.fijado || !activa.cerrado) return;
  modoMover = !modoMover;
  if(modoMover){
    modoRotar = false;
  }
  dibujar();
};

btnRotar.onclick = function(){
  const activa = getActiva();
  if(!activa || activa.fijado || !activa.cerrado) return;
  modoRotar = !modoRotar;
  if(modoRotar){
    modoMover = false;
    modoVerificacion = false;
  }
  dibujar();
};

btnVerificar.onclick = function(){
  const activa = getActiva();
  if(!activa || !activa.cerrado) return;

  modoVerificacion = !modoVerificacion;

  if(modoVerificacion){
    modoRotar = false;
    calibrando = false;
    verticesCalibracion = [];
    calcularDiagonales(activa);
    activa.diagActual = 0;
  }

  dibujar();
};

btnDiag.onclick = function(){
  const activa = getActiva();
  if(!activa || !modoVerificacion || activa.diagonales.length === 0) return;
  activa.diagActual++;
  if(activa.diagActual >= activa.diagonales.length) activa.diagActual = 0;
  dibujar();
};

btnAplicarDiag.onclick = function(){
  aplicarDiagonalObjetivo(getActiva());
};

btnEscala.onclick = function(){
  empezarCalibracion(getActiva());
};

inputNombre.oninput = function(){
  const activa = getActiva();
  if(!activa) return;
  activa.nombre = inputNombre.value;
  dibujar();
};

selectPlanta.onchange = function(){
  const activa = getActiva();
  if(!activa) return;
  activa.planta = selectPlanta.value;
  dibujar();
};

function iniciarApp(){
  estancias = [crearEstanciaVacia()];
  estanciaActiva = 0;
  sincronizarCamposUI();
  ajustar();
}

iniciarApp();
</script>
