<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>ALLCALOR PRO</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f2238;
color:white;
}

header{
text-align:center;
padding:15px;
font-size:26px;
font-weight:bold;
}

#toolbar{
display:flex;
gap:10px;
padding:10px;
background:#162f4d;
}

button{
border:none;
padding:8px 12px;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

.green{background:#4caf50}
.blue{background:#3498db}
.orange{background:#ff9800}
.red{background:#e53935}

#container{
display:flex;
height:calc(100vh - 100px);
}

#panel{
width:200px;
background:#17395d;
padding:10px;
}

#canvasContainer{
flex:1;
position:relative;
background:#e6e6e6;
}

canvas{
background:white;
cursor:crosshair;
}

#measure{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
background:#222;
padding:6px 10px;
border-radius:5px;
color:#0f0;
font-weight:bold;
}

</style>
</head>

<body>

<header>🔥 ALLCALOR PRO</header>

<div id="toolbar">

Escala <input type="number" value="100" style="width:70px">

<button class="green" onclick="startRoom()">Nueva estancia</button>
<button class="blue" onclick="closeRoom()">Cerrar estancia</button>
<button class="orange" onclick="undo()">Deshacer</button>
<button class="red" onclick="resetAll()">Reiniciar</button>

</div>

<div id="container">

<div id="panel">
<h3>ESTANCIAS</h3>
</div>

<div id="canvasContainer">

<div id="measure">0 m | 0°</div>

<canvas id="canvas"></canvas>

</div>
</div>

<script>

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")
const measure=document.getElementById("measure")

canvas.width=window.innerWidth-200
canvas.height=window.innerHeight-100

let rooms=[]
let current=null

let mouse={x:0,y:0}

canvas.addEventListener("mousemove",e=>{

const rect=canvas.getBoundingClientRect()

mouse.x=e.clientX-rect.left
mouse.y=e.clientY-rect.top

if(current && current.length>0){

let last=current[current.length-1]

let dx=mouse.x-last.x
let dy=mouse.y-last.y

let dist=Math.sqrt(dx*dx+dy*dy)/100
let ang=Math.atan2(dy,dx)*180/Math.PI

measure.innerText=dist.toFixed(2)+" m | "+ang.toFixed(1)+"°"

}

draw()

})

canvas.addEventListener("mousedown",e=>{

if(!current) return

current.push({x:mouse.x,y:mouse.y})

draw()

})

function startRoom(){

current=[]
rooms.push(current)

}

function closeRoom(){

if(!current) return

if(current.length<3){
alert("mínimo 3 puntos")
return
}

current.push({...current[0]})

current=null

draw()

}

function undo(){

if(current && current.length>0){

current.pop()
draw()

}

}

function resetAll(){

rooms=[]
current=null
draw()

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

for(let r of rooms){

if(r.length<2) continue

ctx.beginPath()

ctx.moveTo(r[0].x,r[0].y)

for(let i=1;i<r.length;i++){

ctx.lineTo(r[i].x,r[i].y)

}

ctx.strokeStyle="#2196f3"
ctx.lineWidth=2
ctx.stroke()

}

for(let r of rooms){

for(let p of r){

ctx.beginPath()
ctx.arc(p.x,p.y,4,0,Math.PI*2)
ctx.fillStyle="red"
ctx.fill()

}

}

if(current && current.length>0){

let last=current[current.length-1]

ctx.beginPath()
ctx.moveTo(last.x,last.y)
ctx.lineTo(mouse.x,mouse.y)

ctx.setLineDash([6,6])
ctx.stroke()
ctx.setLineDash([])

}

}

draw()

</script>

</body>
</html>
