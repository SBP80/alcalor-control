<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>ALLCALOR</title>
<style>
:root{
  --bg:#101214;
  --panel:#181b1f;
  --panel-2:#20242a;
  --line:#2c3138;
  --text:#f3f4f6;
  --muted:#a7afb9;
  --accent:#f97316;
  --accent-2:#fb923c;
  --ok:#15803d;
  --danger:#b91c1c;
  --canvas:#f3f4f6;
  --chip:#2a2f36;
  --shadow:0 8px 24px rgba(0,0,0,.22);
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:var(--bg);
  font-family:Arial,sans-serif;
  color:var(--text);
}

body{
  display:flex;
  flex-direction:column;
}

#topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  padding:10px 12px calc(10px + env(safe-area-inset-top)) 12px;
  background:linear-gradient(180deg,#111315 0%, #171a1e 100%);
  border-bottom:1px solid var(--line);
  box-shadow:var(--shadow);
  z-index:30;
}

.brandWrap{
  display:flex;
  align-items:center;
  gap:10px;
  min-width:0;
}

.brandMark{
  width:40px;
  height:40px;
  border-radius:12px;
  background:linear-gradient(180deg,#242932 0%, #171a1e 100%);
  border:1px solid #343944;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  flex:0 0 auto;
}

.brandMark .a{
  font-size:28px;
  font-weight:900;
  line-height:1;
  color:#fff;
  transform:translateY(1px);
}

.brandMark .flame{
  position:absolute;
  right:5px;
  top:3px;
  color:var(--accent);
  font-size:12px;
  line-height:1;
}

.brandText{
  min-width:0;
}

.brandText .name{
  font-size:18px;
  font-weight:900;
  letter-spacing:.4px;
  line-height:1.05;
}

.brandText .sub{
  font-size:10px;
  color:var(--accent-2);
  font-weight:700;
  letter-spacing:1.2px;
  margin-top:2px;
}

#tituloApp{
  margin-top:4px;
  font-size:12px;
  color:var(--muted);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  max-width:180px;
}

#togglePanel{
  border:none;
  background:var(--panel-2);
  color:#fff;
  padding:10px 12px;
  border-radius:12px;
  font-weight:700;
  font-size:13px;
  border:1px solid #333943;
  flex:0 0 auto;
}

#info{
  background:#ffffff;
  color:#111827;
  padding:7px 10px;
  font-size:13px;
  border-bottom:1px solid #d6d9de;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  z-index:20;
}

#canvasWrap{
  flex:1 1 auto;
  position:relative;
  background:var(--canvas);
  overflow:hidden;
}

canvas{
  display:block;
  width:100%;
  height:100%;
  background:var(--canvas);
  touch-action:none;
}

#tools{
  background:linear-gradient(180deg,#171a1e 0%, #13161a 100%);
  border-top:1px solid var(--line);
  box-shadow:var(--shadow);
  z-index:25;
  transition:max-height .22s ease, padding .22s ease;
  overflow:hidden;
}

#tools.collapsed{
  max-height:0 !important;
  padding-top:0 !important;
  padding-bottom:0 !important;
  border-top:none;
}

.toolsInner{
  padding:10px 10px 8px 10px;
}

.toolPanel{
  display:none;
  gap:8px;
  flex-wrap:wrap;
}

.toolPanel.active{
  display:flex;
}

button.toolBtn,
.fieldWrap input,
.fieldWrap select,
.tabBtn{
  border-radius:12px;
}

.toolBtn{
  border:none;
  background:var(--accent);
  color:#fff;
  padding:10px 12px;
  font-size:13px;
  font-weight:800;
  min-height:42px;
  box-shadow:none;
}

.toolBtn.sec{
  background:var(--panel-2);
  border:1px solid #343944;
  color:#fff;
}

.toolBtn.activo{
  background:var(--ok);
}

.toolBtn.bloqueado{
  background:#515967;
}

.fieldWrap{
  display:flex;
  gap:8px;
  width:100%;
  flex-wrap:wrap;
}

.field{
  flex:1 1 180px;
  min-width:140px;
}

.field label{
  display:block;
  font-size:11px;
  color:var(--muted);
  margin:0 0 5px 2px;
  font-weight:700;
  letter-spacing:.4px;
}

.field input,
.field select{
  width:100%;
  min-height:42px;
  border:1px solid #343944;
  background:var(--panel-2);
  color:#fff;
  padding:10px 12px;
  font-size:14px;
  outline:none;
}

.field input::placeholder{
  color:#8b95a3;
}

#tabs{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  padding:8px 10px calc(8px + env(safe-area-inset-bottom)) 10px;
  background:#111315;
  border-top:1px solid var(--line);
  z-index:30;
}

.tabBtn{
  border:none;
  background:#20242a;
  color:#d1d5db;
  min-height:48px;
  font-size:12px;
  font-weight:800;
  border:1px solid #343944;
}

.tabBtn.active{
  background:#fff;
  color:#111827;
  border-color:#fff;
}

.statusChip{
  display:inline-flex;
  align-items:center;
  gap:6px;
  background:var(--chip);
  color:#fff;
  border:1px solid #383e47;
  padding:8px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:700;
}

.statusRow{
  width:100%;
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

@media (min-width:700px){
  #tituloApp{max-width:340px}
  .toolBtn{font-size:14px}
}
</style>
</head>
<body>

<div id="topbar">
  <div class="brandWrap">
    <div class="brandMark">
      <div class="a">a</div>
      <div class="flame">🔥</div>
    </div>
    <div class="brandText">
      <div class="name">Allcalor</div>
      <div class="sub">SOLUTIONS</div>
      <div id="tituloApp">Editor de estancias</div>
    </div>
  </div>
  <button id="togglePanel">Ocultar</button>
</div>

<div id="info">Modo dibujo</div>

<div id="canvasWrap">
  <canvas id="canvas"></canvas>
</div>

<div id="tools">
  <div class="toolsInner">
    <div id="panel-dibujo" class="toolPanel active">
      <button id="nuevo" class="toolBtn">Nueva estancia</button>
      <button id="cerrar" class="toolBtn">Cerrar estancia</button>
      <button id="borrar" class="toolBtn sec">Borrar punto</button>
      <button id="borrarEstancia" class="toolBtn sec">Borrar estancia</button>
      <div class="statusRow">
        <div class="statusChip" id="chipEstancias">0 estancias</div>
        <div class="statusChip" id="chipEscala">Escala 1 m = 100 px</div>
      </div>
    </div>

    <div id="panel-editar" class="toolPanel">
      <button id="editar" class="toolBtn sec">Editar</button>
      <button id="fijar" class="toolBtn sec">Fijar</button>
      <button id="mover" class="toolBtn sec">Mover</button>
      <button id="rotar" class="toolBtn sec">Rotar</button>
      <button id="escala" class="toolBtn sec">Calibrar escala</button>
    </div>

    <div id="panel-verificar" class="toolPanel">
      <button id="verificar" class="toolBtn sec">Verificación</button>
      <button id="diag" class="toolBtn sec">Diagonal siguiente</button>
      <button id="aplicarDiag" class="toolBtn sec">Aplicar diagonal</button>
    </div>

    <div id="panel-datos" class="toolPanel">
      <div class="fieldWrap">
        <div class="field">
          <label for="nombre">Nombre estancia</label>
          <input id="nombre" type="text" placeholder="Nombre estancia">
        </div>
        <div class="field">
          <label for="planta">Planta</label>
          <select id="planta">
            <option value="Planta baja">Planta baja</option>
            <option value="Planta 1">Planta 1</option>
            <option value="Planta 2">Planta 2</option>
            <option value="Sótano">Sótano</option>
            <option value="Buhardilla">Buhardilla</option>
          </select>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="tabs">
  <button class="tabBtn active" data-tab="dibujo">Dibujar</button>
  <button class="tabBtn" data-tab="editar">Editar</button>
  <button class="tabBtn" data-tab="verificar">Verificar</button>
  <button class="tabBtn" data-tab="datos">Datos</button>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const btnNuevo = document.getElementById("nuevo");
const btnBorrarEstancia = document.getElementById("borrarEstancia");
const btnCerrar = document.getElementById("cerrar");
const btnBorrar = document.getElementById("borrar");
const btnFijar = document.getElementById("fijar");
const btnEditar = document.getElementById("editar");
const btnMover = document.getElementById("mover");
const btnRotar = document.getElementById("rotar");
const btnVerificar = document.getElementById("verificar");
const btnDiag = document.getElementById("diag");
const btnAplicarDiag = document.getElementById("aplicarDiag");
const btnEscala = document.getElementById("escala");
const inputNombre = document.getElementById("nombre");
const selectPlanta = document.getElementById("planta");
const info = document.getElementById("info");
const tituloApp = document.getElementById("tituloApp");
const chipEstancias = document.getElementById("chipEstancias");
const chipEscala = document.getElementById("chipEscala");
const tools = document.getElementById("tools");
const togglePanel = document.getElementById("togglePanel");
const tabButtons = [...document.querySelectorAll(".tabBtn")];
const panels = {
  dibujo: document.getElementById("panel-dibujo"),
  editar: document.getElementById("panel-editar"),
  verificar: document.getElementById("panel-verificar"),
  datos: document.getElementById("panel-datos")
};

let tabActiva = "dibujo";
let panelAbierto = true;

let estancias = [];
let estanciaActiva = -1;

let modoMover = false;
let modoRotar = false;
let modoVerificacion = false;
let calibrando = false;
let verticesCalibracion = [];

let pointerActivo = false;
let arrastrandoPunto = false;
let moviendoFigura = false;
let rotandoFigura = false;
let indicePunto = -1;

let startX = 0;
let startY = 0;
let lastX = 0;
let lastY = 0;

let etiquetasLados = [];
let etiquetaDiagonal = null;
let tiradorRotacion = null;
let anguloInicioRotacion = 0;

const RADIO_PUNTO = 20;
const UMBRAL_ARRASTRE = 6;
const UMBRAL_TOQUE = 10;
const RADIO_TIRADOR = 18;

function crearEstanciaVacia(){
  return {
    nombre: "",
    planta: "Planta baja",
    puntos: [],
    cerrado: false,
    fijado: false,
    pxPorMetro: 100,
    diagonales: [],
    diagActual: 0,
    diagonalesObjetivo: [],
    rotacionGrados: 0
  };
}

function getActiva(){
  if(estanciaActiva < 0 || estanciaActiva >= estancias.length) return null;
  return estancias[estanciaActiva];
}

function esEstanciaVacia(estancia){
  return (
    estancia &&
    estancia.puntos.length === 0 &&
    !estancia.cerrado &&
    estancia.nombre.trim() === "" &&
    estancia.planta === "Planta baja"
  );
}

function contarEstanciasConContenido(){
  let total = 0;
  for(const estancia of estancias){
    if(!esEstanciaVacia(estancia)) total++;
  }
  return total;
}

function activarTab(tab){
  tabActiva = tab;
  tabButtons.forEach(btn => btn.classList.toggle("active", btn.dataset.tab === tab));
  Object.entries(panels).forEach(([k,p]) => p.classList.toggle("active", k === tab));
  ajustar();
}

function cambiarPanel(){
  panelAbierto = !panelAbierto;
  tools.classList.toggle("collapsed", !panelAbierto);
  togglePanel.textContent = panelAbierto ? "Ocultar" : "Mostrar";
  ajustar();
}

togglePanel.addEventListener("click", cambiarPanel);
tabButtons.forEach(btn=>{
  btn.addEventListener("click", ()=>activarTab(btn.dataset.tab));
});

function ajustar(){
  const topbarH = document.getElementById("topbar").offsetHeight;
  const infoH = document.getElementById("info").offsetHeight;
  const tabsH = document.getElementById("tabs").offsetHeight;
  const toolsH = panelAbierto ? tools.offsetHeight : 0;

  const libre = window.innerHeight - topbarH - infoH - tabsH - toolsH;
  canvas.width = window.innerWidth;
  canvas.height = Math.max(180, libre);
  dibujar();
}
window.addEventListener("resize", ajustar);

function pos(e){
  const r = canvas.getBoundingClientRect();
  return {
    x: e.clientX - r.left,
    y: e.clientY - r.top
  };
}

function distancia(a,b){
  return Math.hypot(a.x - b.x, a.y - b.y);
}

function distanciaXY(x1,y1,x2,y2){
  return Math.hypot(x2 - x1, y2 - y1);
}

function metrosDesdePx(estancia, px){
  return px / estancia.pxPorMetro;
}

function pxDesdeMetros(estancia, m){
  return m * estancia.pxPorMetro;
}

function formatM(v){
  return v.toFixed(2).replace(".", ",") + " m";
}

function buscarPuntoEnEstancia(estancia, x, y){
  for(let i=0;i<estancia.puntos.length;i++){
    if(distanciaXY(estancia.puntos[i].x, estancia.puntos[i].y, x, y) < RADIO_PUNTO){
      return i;
    }
  }
  return -1;
}

function puntoSobreSegmento(px,py,a,b){
  const cross = Math.abs((py-a.y)*(b.x-a.x) - (px-a.x)*(b.y-a.y));
  if(cross > 0.8) return false;

  const dot = (px-a.x)*(b.x-a.x) + (py-a.y)*(b.y-a.y);
  if(dot < 0) return false;

  const lenSq = (b.x-a.x)*(b.x-a.x) + (b.y-a.y)*(b.y-a.y);
  if(dot > lenSq) return false;

  return true;
}

function puntoDentroPoligono(estancia, x, y){
  if(estancia.puntos.length < 3) return false;
  let dentro = false;

  for(let i=0,j=estancia.puntos.length-1;i<estancia.puntos.length;j=i++){
    const xi = estancia.puntos[i].x;
    const yi = estancia.puntos[i].y;
    const xj = estancia.puntos[j].x;
    const yj = estancia.puntos[j].y;

    const cruza = ((yi > y) !== (yj > y)) &&
      (x < (xj - xi) * (y - yi) / ((yj - yi) || 0.000001) + xi);

    if(cruza) dentro = !dentro;
  }
  return dentro;
}

function puntoSobreAlgunLado(estancia, x, y){
  if(estancia.puntos.length < 2) return false;
  const limite = estancia.cerrado ? estancia.puntos.length : estancia.puntos.length - 1;
  for(let i=0;i<limite;i++){
    const a = estancia.puntos[i];
    const b = estancia.puntos[(i+1)%estancia.puntos.length];
    if(puntoSobreSegmento(x,y,a,b)) return true;
  }
  return false;
}

function puntoDentroPoligonoConBorde(estancia, x, y){
  return puntoDentroPoligono(estancia, x, y) || puntoSobreAlgunLado(estancia, x, y);
}

function orient(a,b,c){
  const v = (b.y-a.y)*(c.x-b.x) - (b.x-a.x)*(c.y-b.y);
  if(Math.abs(v) < 0.000001) return 0;
  return v > 0 ? 1 : 2;
}

function segmentosIntersectan(a,b,c,d){
  const o1 = orient(a,b,c);
  const o2 = orient(a,b,d);
  const o3 = orient(c,d,a);
  const o4 = orient(c,d,b);

  if(o1 !== o2 && o3 !== o4) return true;

  if(o1 === 0 && puntoSobreSegmento(c.x,c.y,a,b)) return true;
  if(o2 === 0 && puntoSobreSegmento(d.x,d.y,a,b)) return true;
  if(o3 === 0 && puntoSobreSegmento(a.x,a.y,c,d)) return true;
  if(o4 === 0 && puntoSobreSegmento(b.x,b.y,c,d)) return true;

  return false;
}

function diagonalValida(estancia, i, j){
  const a = estancia.puntos[i];
  const b = estancia.puntos[j];

  for(let k=0;k<estancia.puntos.length;k++){
    const c = estancia.puntos[k];
    const d = estancia.puntos[(k+1)%estancia.puntos.length];

    const usaI = (k === i || (k+1)%estancia.puntos.length === i);
    const usaJ = (k === j || (k+1)%estancia.puntos.length === j);
    if(usaI || usaJ) continue;

    if(segmentosIntersectan(a,b,c,d)) return false;
  }

  const muestras = 12;
  for(let t=1;t<muestras;t++){
    const s = t / muestras;
    const x = a.x + (b.x - a.x) * s;
    const y = a.y + (b.y - a.y) * s;
    if(!puntoDentroPoligonoConBorde(estancia, x, y)) return false;
  }

  return true;
}

function calcularDiagonales(estancia){
  estancia.diagonales = [];
  if(!estancia.cerrado || estancia.puntos.length < 4) return;

  const n = estancia.puntos.length;
  for(let i=0;i<n;i++){
    for(let j=i+2;j<n;j++){
      if(i === 0 && j === n-1) continue;
      if(diagonalValida(estancia, i, j)) estancia.diagonales.push([i,j]);
    }
  }

  if(estancia.diagActual >= estancia.diagonales.length){
    estancia.diagActual = 0;
  }

  while(estancia.diagonalesObjetivo.length < estancia.diagonales.length){
    estancia.diagonalesObjetivo.push(undefined);
  }
}

function moverFigura(estancia, dx, dy){
  for(const p of estancia.puntos){
    p.x += dx;
    p.y += dy;
  }
}

function centroFigura(estancia){
  if(estancia.puntos.length === 0){
    return {x: canvas.width/2, y: canvas.height/2};
  }

  let minX = estancia.puntos[0].x, maxX = estancia.puntos[0].x;
  let minY = estancia.puntos[0].y, maxY = estancia.puntos[0].y;

  for(const p of estancia.puntos){
    if(p.x < minX) minX = p.x;
    if(p.x > maxX) maxX = p.x;
    if(p.y < minY) minY = p.y;
    if(p.y > maxY) maxY = p.y;
  }

  return { x:(minX+maxX)/2, y:(minY+maxY)/2 };
}

function angulo(a,b,c){
  const abx = a.x - b.x;
  const aby = a.y - b.y;
  const cbx = c.x - b.x;
  const cby = c.y - b.y;

  const dot = abx * cbx + aby * cby;
  const mag1 = Math.hypot(abx, aby);
  const mag2 = Math.hypot(cbx, cby);

  if(mag1 === 0 || mag2 === 0) return 0;

  let cos = dot / (mag1 * mag2);
  cos = Math.max(-1, Math.min(1, cos));

  return Math.acos(cos) * 180 / Math.PI;
}

function anguloPuntoRespectoCentro(centro, p){
  return Math.atan2(p.y - centro.y, p.x - centro.x);
}

function rotarPunto(p, centro, rad){
  const dx = p.x - centro.x;
  const dy = p.y - centro.y;
  const cos = Math.cos(rad);
  const sin = Math.sin(rad);
  return {
    x: centro.x + dx * cos - dy * sin,
    y: centro.y + dx * sin + dy * cos
  };
}

function rotarEstancia(estancia, rad){
  const centro = centroFigura(estancia);
  for(let i=0;i<estancia.puntos.length;i++){
    estancia.puntos[i] = rotarPunto(estancia.puntos[i], centro, rad);
  }
  estancia.rotacionGrados += rad * 180 / Math.PI;
  while(estancia.rotacionGrados > 180) estancia.rotacionGrados -= 360;
  while(estancia.rotacionGrados <= -180) estancia.rotacionGrados += 360;
}

function obtenerTiradorRotacion(estancia){
  const centro = centroFigura(estancia);
  let minY = estancia.puntos[0].y;
  for(const p of estancia.puntos){
    if(p.y < minY) minY = p.y;
  }
  return {
    x: centro.x,
    y: minY - 45
  };
}

function etiqueta(texto,x,y,color, relleno="rgba(255,255,255,0.96)"){
  const lineas = String(texto).split("\n");
  ctx.save();
  ctx.font = "bold 14px Arial";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  let ancho = 0;
  for(const linea of lineas){
    ancho = Math.max(ancho, ctx.measureText(linea).width);
  }
  ancho += 16;

  const altoLinea = 18;
  const alto = Math.max(24, lineas.length * altoLinea + 8);

  ctx.fillStyle = relleno;
  ctx.fillRect(x - ancho/2, y - alto/2, ancho, alto);

  ctx.strokeStyle = "rgba(0,0,0,0.12)";
  ctx.strokeRect(x - ancho/2, y - alto/2, ancho, alto);

  ctx.fillStyle = color;

  if(lineas.length === 1){
    ctx.fillText(lineas[0], x, y);
  }else{
    const inicioY = y - ((lineas.length - 1) * altoLinea) / 2;
    for(let i=0;i<lineas.length;i++){
      ctx.fillText(lineas[i], x, inicioY + i * altoLinea);
    }
  }

  ctx.restore();
  return {x, y, w: ancho, h: alto};
}

function generarEtiquetasLados(estancia){
  etiquetasLados = [];
  if(!estancia || !estancia.cerrado) return;

  for(let i=0;i<estancia.puntos.length;i++){
    const a = estancia.puntos[i];
    const b = estancia.puntos[(i+1)%estancia.puntos.length];
    const mx = (a.x+b.x)/2;
    const my = (a.y+b.y)/2;
    const caja = etiqueta(formatM(metrosDesdePx(estancia, distancia(a,b))), mx, my, "#2563eb");

    etiquetasLados.push({
      lado: i,
      x: caja.x,
      y: caja.y,
      w: caja.w,
      h: caja.h
    });
  }
}

function buscarEtiquetaLado(x,y){
  for(const e of etiquetasLados){
    if(
      x >= e.x - e.w/2 &&
      x <= e.x + e.w/2 &&
      y >= e.y - e.h/2 &&
      y <= e.y + e.h/2
    ){
      return e.lado;
    }
  }
  return -1;
}

function editarMedidaLado(estancia, lado){
  if(!estancia || !estancia.cerrado || modoVerificacion) return;

  const a = estancia.puntos[lado];
  const bIndex = (lado + 1) % estancia.puntos.length;
  const b = estancia.puntos[bIndex];
  const actualM = metrosDesdePx(estancia, distancia(a,b));

  const respuesta = prompt("Nueva medida del lado en metros", actualM.toFixed(2).replace(".", ","));
  if(respuesta === null) return;

  const nuevaM = Number(respuesta.replace(",", ".").trim());
  if(!Number.isFinite(nuevaM) || nuevaM <= 0) return;

  const nuevaPx = pxDesdeMetros(estancia, nuevaM);

  const dx = b.x - a.x;
  const dy = b.y - a.y;
  const len = Math.hypot(dx,dy);
  if(len <= 0.0001) return;

  const ux = dx / len;
  const uy = dy / len;

  b.x = a.x + ux * nuevaPx;
  b.y = a.y + uy * nuevaPx;

  calcularDiagonales(estancia);
  dibujar();
}

function editarDiagonal(estancia){
  if(!estancia || !modoVerificacion || !etiquetaDiagonal || estancia.diagonales.length === 0) return;

  const d = estancia.diagonales[estancia.diagActual];
  const a = estancia.puntos[d[0]];
  const b = estancia.puntos[d[1]];
  const actual = metrosDesdePx(estancia, distancia(a,b));

  const respuesta = prompt(
    "Medida real diagonal en metros",
    (estancia.diagonalesObjetivo[estancia.diagActual] ?? actual).toFixed(2).replace(".", ",")
  );
  if(respuesta === null) return;

  const valor = Number(respuesta.replace(",", ".").trim());
  if(!Number.isFinite(valor) || valor <= 0) return;

  estancia.diagonalesObjetivo[estancia.diagActual] = valor;
  dibujar();
}

function aplicarDiagonalObjetivo(estancia){
  if(!estancia || !modoVerificacion) return;
  if(estancia.diagonales.length === 0) return;
  if(estancia.diagonalesObjetivo[estancia.diagActual] === undefined) return;

  const d = estancia.diagonales[estancia.diagActual];
  const i = d[0];
  const j = d[1];
  const a = estancia.puntos[i];
  const b = estancia.puntos[j];

  const objetivoM = estancia.diagonalesObjetivo[estancia.diagActual];
  const objetivoPx = pxDesdeMetros(estancia, objetivoM);

  const dx = b.x - a.x;
  const dy = b.y - a.y;
  const len = Math.hypot(dx,dy);

  if(len <= 0.0001){
    b.x = a.x + objetivoPx;
    b.y = a.y;
  }else{
    const ux = dx / len;
    const uy = dy / len;
    b.x = a.x + ux * objetivoPx;
    b.y = a.y + uy * objetivoPx;
  }

  calcularDiagonales(estancia);
  dibujar();
}

function dibujarNombreYPlanta(estancia, activa){
  if(!estancia.cerrado || modoVerificacion) return;

  const c = centroFigura(estancia);
  const nombre = estancia.nombre.trim() || "Sin nombre";
  const planta = estancia.planta;
  const fondo = activa ? "rgba(255,255,255,0.98)" : "rgba(255,255,255,0.88)";

  etiqueta(nombre, c.x, c.y - 12, "#111827", fondo);
  etiqueta(planta, c.x, c.y + 18, "#374151", fondo);
}

function dibujarDiagonal(estancia){
  etiquetaDiagonal = null;
  if(!estancia || !modoVerificacion || estancia.diagonales.length === 0) return;

  const d = estancia.diagonales[estancia.diagActual];
  const a = estancia.puntos[d[0]];
  const b = estancia.puntos[d[1]];

  ctx.save();
  ctx.setLineDash([10,8]);
  ctx.beginPath();
  ctx.moveTo(a.x,a.y);
  ctx.lineTo(b.x,b.y);
  ctx.strokeStyle = "purple";
  ctx.lineWidth = 3;
  ctx.stroke();
  ctx.restore();

  const mx = (a.x+b.x)/2;
  const my = (a.y+b.y)/2;
  const valor = metrosDesdePx(estancia, distancia(a,b));

  let texto = "D" + (estancia.diagActual + 1) + " " + formatM(valor);

  if(estancia.diagonalesObjetivo[estancia.diagActual] !== undefined){
    const obj = estancia.diagonalesObjetivo[estancia.diagActual];
    const error = Math.abs(valor - obj);
    texto =
      "D" + (estancia.diagActual + 1) + " " + formatM(valor) +
      "\nObj " + formatM(obj) +
      "\nΔ " + formatM(error);
  }

  const caja = etiqueta(texto, mx, my, "purple");
  etiquetaDiagonal = {
    x: caja.x,
    y: caja.y,
    w: caja.w,
    h: caja.h
  };
}

function dibujarRotacion(estancia){
  tiradorRotacion = null;
  if(!estancia || !estancia.cerrado || !modoRotar) return;

  const centro = centroFigura(estancia);
  const tirador = obtenerTiradorRotacion(estancia);
  tiradorRotacion = tirador;

  ctx.save();
  ctx.setLineDash([6,6]);
  ctx.beginPath();
  ctx.moveTo(centro.x, centro.y);
  ctx.lineTo(tirador.x, tirador.y);
  ctx.strokeStyle = "#0ea5e9";
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.restore();

  ctx.beginPath();
  ctx.arc(tirador.x, tirador.y, RADIO_TIRADOR, 0, Math.PI * 2);
  ctx.fillStyle = "#0ea5e9";
  ctx.fill();
  ctx.strokeStyle = "#ffffff";
  ctx.lineWidth = 3;
  ctx.stroke();

  etiqueta("Rot " + estancia.rotacionGrados.toFixed(1).replace(".", ",") + "°", tirador.x, tirador.y - 32, "#0ea5e9");
}

function dibujarCalibracion(estancia){
  if(!calibrando || !estancia) return;

  for(const idx of verticesCalibracion){
    const p = estancia.puntos[idx];
    if(!p) continue;

    ctx.beginPath();
    ctx.arc(p.x,p.y,10,0,Math.PI*2);
    ctx.fillStyle = "#dc2626";
    ctx.fill();
    ctx.strokeStyle = "#ffffff";
    ctx.lineWidth = 3;
    ctx.stroke();
  }
}
