<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ALLCALOR PRO</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f2b44;
color:white;
}

header{
background:#1b1b1b;
padding:12px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.toolbar{
background:#173a5e;
padding:10px;
}

button{
border:none;
padding:6px 12px;
margin-right:6px;
border-radius:4px;
cursor:pointer;
font-weight:bold;
}

.green{background:#28a745}
.blue{background:#2b83ff}
.orange{background:#ff9800}
.red{background:#e53935}
.yellow{background:#ffc107;color:black}
.purple{background:#7e57c2}

#layout{
display:flex;
}

#panel{
width:230px;
background:#1c3f63;
padding:10px;
}

canvas{
background:#f4f1e8;
cursor:crosshair;
}

</style>
</head>

<body>

<header>🔥 ALLCALOR PRO</header>

<div class="toolbar">

Escala px/m
<input id="scale" type="number" value="100" style="width:60px">

<button class="green" onclick="newRoom()">Nueva estancia</button>
<button class="blue" onclick="closeRoom()">Cerrar estancia</button>
<button class="orange" onclick="undo()">Deshacer</button>
<button class="red" onclick="resetAll()">Reiniciar</button>

<button class="yellow" onclick="zoomIn()">+</button>
<button class="yellow" onclick="zoomOut()">-</button>
<button class="yellow" onclick="centerView()">Centrar</button>

<button id="snapButton" class="purple" onclick="toggleSnap()">SNAP OFF</button>

</div>

<div id="layout">

<div id="panel">

<h3>Estancias</h3>

<div id="rooms"></div>

<hr>

Total: <span id="totalArea">0</span> m²

</div>

<canvas id="canvas" width="1200" height="700"></canvas>

</div>

<script>

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

const scaleInput=document.getElementById("scale")
const snapButton=document.getElementById("snapButton")

let scale=100

let camera={x:0,y:0,zoom:1}

let rooms=[]
let current=[]
let drawing=false

let mouse={x:0,y:0}

let dragVertex=null
let dragRoom=null

let snapEnabled=false

document.addEventListener("keydown",e=>{
if(e.key==="Shift") lockAxis=true
})

document.addEventListener("keyup",e=>{
if(e.key==="Shift") lockAxis=false
})

let lockAxis=false

function toggleSnap(){
snapEnabled=!snapEnabled
snapButton.innerText=snapEnabled?"SNAP ON":"SNAP OFF"
}

function dist(a,b){
return Math.hypot(a.x-b.x,a.y-b.y)
}

function polygonArea(v){
let sum=0
for(let i=0;i<v.length;i++){
let j=(i+1)%v.length
sum+=v[i].x*v[j].y-v[j].x*v[i].y
}
return Math.abs(sum/2)/(scale*scale)
}

function perimeter(v){
let p=0
for(let i=0;i<v.length;i++){
let j=(i+1)%v.length
p+=dist(v[i],v[j])
}
return p/scale
}

function centroid(v){
let x=0
let y=0
for(let p of v){
x+=p.x
y+=p.y
}
return {x:x/v.length,y:y/v.length}
}

function angle(a,b,c){

let ang=Math.atan2(c.y-b.y,c.x-b.x)-Math.atan2(a.y-b.y,a.x-b.x)
ang=Math.abs(ang*180/Math.PI)

if(ang>180) ang=360-ang

return ang

}

function pointInside(point,poly){

let inside=false

for(let i=0,j=poly.length-1;i<poly.length;j=i++){

let xi=poly[i].x
let yi=poly[i].y

let xj=poly[j].x
let yj=poly[j].y

let intersect=((yi>point.y)!=(yj>point.y)) &&
(point.x<(xj-xi)*(point.y-yi)/(yj-yi)+xi)

if(intersect) inside=!inside

}

return inside
}

function snapPoint(p){

if(!snapEnabled) return p

for(let r of rooms){
for(let v of r.v){
if(dist(p,v)<15) return v
}
}

return p
}

function screenToWorld(p){

return{
x:(p.x-camera.x)/camera.zoom,
y:(p.y-camera.y)/camera.zoom
}

}

canvas.onmousedown=e=>{

scale=parseFloat(scaleInput.value)

let r=canvas.getBoundingClientRect()

let p=screenToWorld({
x:e.clientX-r.left,
y:e.clientY-r.top
})

p=snapPoint(p)

mouse=p

if(drawing){

current.push(p)
draw()
return

}

for(let room of rooms){

for(let v of room.v){

if(dist(v,p)<10){
dragVertex=v
return
}

}

if(pointInside(p,room.v)){

dragRoom={
room:room,
start:p
}

return

}

}

}

canvas.onmousemove=e=>{

let r=canvas.getBoundingClientRect()

let p=screenToWorld({
x:e.clientX-r.left,
y:e.clientY-r.top
})

if(lockAxis && current.length){

let last=current[current.length-1]

let dx=Math.abs(p.x-last.x)
let dy=Math.abs(p.y-last.y)

if(dx>dy) p.y=last.y
else p.x=last.x

}

mouse=p

if(dragVertex){

dragVertex.x=p.x
dragVertex.y=p.y

draw()
updateRooms()

return

}

if(dragRoom){

let dx=p.x-dragRoom.start.x
let dy=p.y-dragRoom.start.y

for(let v of dragRoom.room.v){
v.x+=dx
v.y+=dy
}

dragRoom.start=p

draw()
updateRooms()

}

draw()

}

canvas.onmouseup=()=>{

dragVertex=null
dragRoom=null

}

function newRoom(){
drawing=true
current=[]
}

function closeRoom(){

if(current.length<3) return

rooms.push({
name:"Estancia "+(rooms.length+1),
v:[...current]
})

current=[]
drawing=false

updateRooms()
draw()

}

function undo(){
current.pop()
draw()
}

function resetAll(){

rooms=[]
current=[]

updateRooms()
draw()

}

function zoomIn(){
camera.zoom*=1.2
draw()
}

function zoomOut(){
camera.zoom/=1.2
draw()
}

function centerView(){

camera.x=0
camera.y=0
camera.zoom=1

draw()

}

function updateRooms(){

let div=document.getElementById("rooms")
div.innerHTML=""

let total=0

for(let r of rooms){

let area=polygonArea(r.v)
let per=perimeter(r.v)

total+=area

let d=document.createElement("div")

d.innerHTML="<b>"+r.name+"</b><br>"+
"Área: "+area.toFixed(2)+" m²<br>"+
"Perímetro: "+per.toFixed(2)+" m"

d.style.marginBottom="10px"

div.appendChild(d)

}

document.getElementById("totalArea").innerText=total.toFixed(2)

}

function draw(){

ctx.setTransform(camera.zoom,0,0,camera.zoom,camera.x,camera.y)

ctx.clearRect(-10000,-10000,20000,20000)

ctx.lineWidth=2

for(let r of rooms){

ctx.beginPath()

for(let i=0;i<r.v.length;i++){

let p=r.v[i]

if(i==0) ctx.moveTo(p.x,p.y)
else ctx.lineTo(p.x,p.y)

}

ctx.closePath()

ctx.fillStyle="rgba(0,150,255,0.2)"
ctx.fill()

ctx.strokeStyle="#4aa3ff"
ctx.stroke()

for(let i=0;i<r.v.length;i++){

let v=r.v[i]

ctx.beginPath()
ctx.arc(v.x,v.y,5,0,Math.PI*2)
ctx.fillStyle="red"
ctx.fill()

let prev=r.v[(i-1+r.v.length)%r.v.length]
let next=r.v[(i+1)%r.v.length]

let ang=angle(prev,v,next)

ctx.fillStyle="red"
ctx.fillText(ang.toFixed(0)+"°",v.x+6,v.y-6)

}

for(let i=0;i<r.v.length;i++){

let a=r.v[i]
let b=r.v[(i+1)%r.v.length]

let midX=(a.x+b.x)/2
let midY=(a.y+b.y)/2

let len=dist(a,b)/scale

ctx.fillStyle="black"
ctx.fillText(len.toFixed(2)+" m",midX,midY)

}

let c=centroid(r.v)

ctx.fillStyle="black"
ctx.fillText(r.name,c.x-20,c.y)

}

if(current.length){

ctx.beginPath()

for(let i=0;i<current.length;i++){

let p=current[i]

if(i==0) ctx.moveTo(p.x,p.y)
else ctx.lineTo(p.x,p.y)

}

ctx.lineTo(mouse.x,mouse.y)

ctx.stroke()

let last=current[current.length-1]

let d=dist(last,mouse)/scale

ctx.fillStyle="black"
ctx.fillText(d.toFixed(2)+" m",(last.x+mouse.x)/2,(last.y+mouse.y)/2)

}

}

draw()

</script>

</body>
</html>
