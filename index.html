<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ALLCALOR PRO</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f2b44;
color:white;
}

header{
background:#1b1b1b;
padding:12px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.toolbar{
background:#173a5e;
padding:10px;
}

button{
border:none;
padding:6px 12px;
margin-right:6px;
border-radius:4px;
cursor:pointer;
font-weight:bold;
}

.green{background:#28a745}
.blue{background:#2b83ff}
.orange{background:#ff9800}
.red{background:#e53935}

#layout{
display:flex;
}

#panel{
width:220px;
background:#1c3f63;
padding:10px;
}

canvas{
background:#f4f1e8;
cursor:crosshair;
}

</style>
</head>

<body>

<header>🔥 ALLCALOR PRO</header>

<div class="toolbar">

Escala px/m
<input id="scaleInput" type="number" value="100" style="width:60px">

<button class="green" onclick="startRoom()">Nueva estancia</button>
<button class="blue" onclick="closeRoom()">Cerrar estancia</button>
<button class="orange" onclick="undoPoint()">Deshacer</button>
<button class="red" onclick="resetAll()">Reiniciar</button>

</div>

<div id="layout">

<div id="panel">

<h3>Estancias</h3>

<div id="roomsPanel"></div>

<hr>

Total: <span id="totalArea">0</span> m²

</div>

<canvas id="canvas" width="1200" height="700"></canvas>

</div>

<script>

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

let scale=100

let rooms=[]
let drawingPoints=[]
let drawing=false

let mouse={x:0,y:0}

let dragVertex=null
let dragRoom=null

// ---------- utilidades ----------

function dist(a,b){
return Math.hypot(a.x-b.x,a.y-b.y)
}

function polygonArea(v){

let sum=0

for(let i=0;i<v.length;i++){

let j=(i+1)%v.length
sum+=v[i].x*v[j].y-v[j].x*v[i].y

}

return Math.abs(sum/2)

}

function centroid(v){

let x=0
let y=0

for(let p of v){
x+=p.x
y+=p.y
}

return{x:x/v.length,y:y/v.length}

}

function pointInside(point,poly){

let inside=false

for(let i=0,j=poly.length-1;i<poly.length;j=i++){

let xi=poly[i].x,yi=poly[i].y
let xj=poly[j].x,yj=poly[j].y

let intersect=((yi>point.y)!=(yj>point.y)) &&
(point.x<(xj-xi)*(point.y-yi)/(yj-yi)+xi)

if(intersect) inside=!inside

}

return inside

}

// ---------- mouse ----------

canvas.onmousedown=e=>{

const r=canvas.getBoundingClientRect()

const p={
x:e.clientX-r.left,
y:e.clientY-r.top
}

mouse=p

if(drawing){

drawingPoints.push({...p})
draw()
return

}

for(let room of rooms){

for(let v of room.v){

if(dist(v,p)<10){
dragVertex=v
return
}

}

}

for(let room of rooms){

if(pointInside(p,room.v)){

dragRoom={
room:room,
start:p
}

return

}

}

}

canvas.onmousemove=e=>{

const r=canvas.getBoundingClientRect()

mouse={
x:e.clientX-r.left,
y:e.clientY-r.top
}

if(dragVertex){

dragVertex.x=mouse.x
dragVertex.y=mouse.y

}

if(dragRoom){

let dx=mouse.x-dragRoom.start.x
let dy=mouse.y-dragRoom.start.y

dragRoom.start=mouse

for(let v of dragRoom.room.v){

v.x+=dx
v.y+=dy

}

}

draw()

}

canvas.onmouseup=()=>{

dragVertex=null
dragRoom=null

}

// ---------- acciones ----------

function startRoom(){

drawing=true
drawingPoints=[]

}

function closeRoom(){

if(drawingPoints.length<3) return

rooms.push({
name:"estancia",
v:[...drawingPoints]
})

drawing=false
drawingPoints=[]

updatePanel()
draw()

}

function undoPoint(){

if(drawingPoints.length)
drawingPoints.pop()

draw()

}

function resetAll(){

rooms=[]
drawingPoints=[]
drawing=false

updatePanel()
draw()

}

// ---------- dibujo ----------

function drawVertex(p){

ctx.beginPath()
ctx.arc(p.x,p.y,5,0,Math.PI*2)
ctx.fillStyle="red"
ctx.fill()

}

function drawPolygon(v){

ctx.beginPath()
ctx.moveTo(v[0].x,v[0].y)

for(let i=1;i<v.length;i++){
ctx.lineTo(v[i].x,v[i].y)
}

ctx.closePath()

ctx.fillStyle="rgba(0,150,255,0.15)"
ctx.fill()

ctx.strokeStyle="#2b83ff"
ctx.lineWidth=2
ctx.stroke()

for(let p of v)
drawVertex(p)

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

for(let r of rooms){

drawPolygon(r.v)

let c=centroid(r.v)
let area=polygonArea(r.v)/(scale*scale)

ctx.fillStyle="black"
ctx.textAlign="center"

ctx.fillText(area.toFixed(2)+" m²",c.x,c.y)

}

if(drawing){

ctx.beginPath()

if(drawingPoints.length){

ctx.moveTo(drawingPoints[0].x,drawingPoints[0].y)

for(let i=1;i<drawingPoints.length;i++)
ctx.lineTo(drawingPoints[i].x,drawingPoints[i].y)

ctx.lineTo(mouse.x,mouse.y)

}

ctx.strokeStyle="#2b83ff"
ctx.stroke()

for(let p of drawingPoints)
drawVertex(p)

}

}

// ---------- panel ----------

function updatePanel(){

let html=""
let total=0

for(let r of rooms){

let area=polygonArea(r.v)/(scale*scale)
total+=area

html+=`
<b>${r.name}</b><br>
Área: ${area.toFixed(2)} m²<hr>
`

}

document.getElementById("roomsPanel").innerHTML=html
document.getElementById("totalArea").innerText=total.toFixed(2)

}

draw()

</script>

</body>
</html>
