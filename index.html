<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ALLCALOR CONTROL</title>

<style>

body{
margin:0;
background:#1e1e1e;
font-family:Arial;
color:white;
overflow:hidden;
}

#toolbar{
height:60px;
background:#2b2b2b;
display:flex;
align-items:center;
gap:10px;
padding:10px;
}

button{
padding:8px 14px;
background:#444;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#666;
}

canvas{
background:#111;
display:block;
}

#info{
position:absolute;
right:10px;
top:70px;
background:#2b2b2b;
padding:10px;
border-radius:6px;
font-size:13px;
}

</style>
</head>

<body>

<div id="toolbar">
<button id="newRoom">Nueva estancia</button>
<button id="reset">Reset</button>
</div>

<canvas id="canvas"></canvas>

<div id="info">
<div id="cursorInfo"></div>
<div id="typedInfo"></div>
</div>

<script>

const canvas = document.getElementById("canvas")
const ctx = canvas.getContext("2d")

canvas.width = window.innerWidth
canvas.height = window.innerHeight - 60

const GRID = 100

let rooms = []
let currentRoom = null
let drawing = false

let mouse = {x:0,y:0}
let lastPoint = null
let typedLength = ""

canvas.addEventListener("mousemove", e => {

mouse.x = Math.round(e.offsetX / GRID) * GRID
mouse.y = Math.round(e.offsetY / GRID) * GRID

})

canvas.addEventListener("click", () => {

if(!drawing) return

if(!lastPoint){

lastPoint = {x:mouse.x,y:mouse.y}
currentRoom.points.push(lastPoint)
return

}

})

document.getElementById("newRoom").onclick = () => {

let name = prompt("Nombre estancia")

currentRoom = {
name:name,
points:[]
}

rooms.push(currentRoom)

drawing = true
lastPoint = null
typedLength = ""

}

document.getElementById("reset").onclick = () => {

rooms = []
currentRoom = null
drawing = false
lastPoint = null
typedLength = ""

}

document.addEventListener("keydown", e => {

if(!drawing) return
if(!lastPoint) return

if((e.key >= "0" && e.key <= "9") || e.key === "."){
typedLength += e.key
}

if(e.key === "Backspace"){
typedLength = typedLength.slice(0,-1)
}

if(e.key === "Enter"){

let meters = parseFloat(typedLength)

if(!meters) return

let dx = mouse.x - lastPoint.x
let dy = mouse.y - lastPoint.y

let angle = Math.atan2(dy,dx)

let length = meters * 1000

let newX = lastPoint.x + Math.cos(angle)*length
let newY = lastPoint.y + Math.sin(angle)*length

let newPoint = {x:newX,y:newY}

currentRoom.points.push(newPoint)

lastPoint = newPoint
typedLength = ""

}

})

function drawGrid(){

ctx.strokeStyle="#222"

for(let x=0;x<canvas.width;x+=GRID){
ctx.beginPath()
ctx.moveTo(x,0)
ctx.lineTo(x,canvas.height)
ctx.stroke()
}

for(let y=0;y<canvas.height;y+=GRID){
ctx.beginPath()
ctx.moveTo(0,y)
ctx.lineTo(canvas.width,y)
ctx.stroke()
}

}

function drawRooms(){

rooms.forEach(room=>{

ctx.strokeStyle="#00ffaa"
ctx.lineWidth=2

ctx.beginPath()

room.points.forEach((p,i)=>{

if(i===0){
ctx.moveTo(p.x,p.y)
}else{
ctx.lineTo(p.x,p.y)
}

})

ctx.stroke()

})

}

function drawPreview(){

if(!drawing) return
if(!lastPoint) return

ctx.strokeStyle="#ffaa00"

ctx.beginPath()
ctx.moveTo(lastPoint.x,lastPoint.y)
ctx.lineTo(mouse.x,mouse.y)
ctx.stroke()

let dx = mouse.x - lastPoint.x
let dy = mouse.y - lastPoint.y

let length = Math.sqrt(dx*dx+dy*dy)/1000
let angle = Math.atan2(dy,dx)*180/Math.PI

document.getElementById("cursorInfo").innerText =
length.toFixed(2)+" m | "+angle.toFixed(1)+"°"

document.getElementById("typedInfo").innerText =
"medida: "+typedLength

}

function render(){

ctx.clearRect(0,0,canvas.width,canvas.height)

drawGrid()
drawRooms()
drawPreview()

requestAnimationFrame(render)

}

render()

</script>

</body>
</html>
