<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ALLCALOR PRO</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f2b44;
color:white;
}

header{
background:#1a1a1a;
padding:12px;
text-align:center;
font-size:22px;
}

.toolbar{
background:#173a5e;
padding:10px;
display:flex;
gap:8px;
}

button{
border:none;
padding:6px 12px;
border-radius:4px;
cursor:pointer;
font-weight:bold;
}

.green{background:#28a745}
.blue{background:#2b83ff}
.orange{background:#ff9800}
.red{background:#e53935}

#layout{
display:flex;
}

#panel{
width:250px;
background:#1c3f63;
padding:10px;
height:calc(100vh - 90px);
}

canvas{
background:#f4f1e8;
cursor:crosshair;
}

</style>
</head>

<body>

<header>🔥 ALLCALOR PRO</header>

<div class="toolbar">

Escala
<input id="scale" type="number" value="100" style="width:60px">

<button class="green" onclick="startRoom()">Nueva estancia</button>
<button class="blue" onclick="finishRoom()">Cerrar estancia</button>
<button class="orange" onclick="undo()">Deshacer</button>
<button class="red" onclick="resetAll()">Reiniciar</button>

</div>

<div id="layout">

<div id="panel">

<h3>Estancias</h3>

<div id="roomList"></div>

</div>

<canvas id="canvas" width="1100" height="700"></canvas>

</div>

<script>

const canvas = document.getElementById("canvas")
const ctx = canvas.getContext("2d")

let rooms = []
let current = []
let drawing = false

canvas.addEventListener("click",clickCanvas)

function startRoom(){

drawing=true
current=[]

}

function finishRoom(){

if(current.length<3)return

rooms.push([...current])
current=[]
drawing=false

draw()

}

function undo(){

current.pop()
draw()

}

function resetAll(){

rooms=[]
current=[]
drawing=false

draw()

}

function clickCanvas(e){

if(!drawing)return

const rect = canvas.getBoundingClientRect()

const x = e.clientX-rect.left
const y = e.clientY-rect.top

current.push({x,y})

draw()

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

rooms.forEach(room=>{

ctx.beginPath()

ctx.moveTo(room[0].x,room[0].y)

for(let i=1;i<room.length;i++){

ctx.lineTo(room[i].x,room[i].y)

}

ctx.closePath()
ctx.strokeStyle="blue"
ctx.stroke()

room.forEach(p=>{

ctx.beginPath()
ctx.arc(p.x,p.y,4,0,Math.PI*2)
ctx.fillStyle="red"
ctx.fill()

})

})

if(current.length){

ctx.beginPath()

ctx.moveTo(current[0].x,current[0].y)

for(let i=1;i<current.length;i++){

ctx.lineTo(current[i].x,current[i].y)

}

ctx.strokeStyle="black"
ctx.stroke()

current.forEach(p=>{

ctx.beginPath()
ctx.arc(p.x,p.y,4,0,Math.PI*2)
ctx.fillStyle="red"
ctx.fill()

})

}

}

draw()

</script>

</body>
</html>
