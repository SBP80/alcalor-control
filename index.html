<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ALLCALOR PRO</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f2238;
color:white;
}

header{
text-align:center;
padding:15px;
font-size:28px;
font-weight:bold;
}

#toolbar{
display:flex;
gap:10px;
padding:10px;
background:#162f4d;
align-items:center;
}

button{
border:none;
padding:8px 12px;
border-radius:5px;
font-weight:bold;
cursor:pointer;
}

.green{background:#4caf50}
.blue{background:#3498db}
.orange{background:#ff9800}
.red{background:#e53935}

#container{
display:flex;
height:calc(100vh - 110px);
}

#panel{
width:200px;
background:#17395d;
padding:10px;
}

#canvasContainer{
flex:1;
position:relative;
background:#e6e6e6;
overflow:hidden;
}

#measureBox{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
background:#222;
color:#0f0;
padding:6px 10px;
border-radius:5px;
font-weight:bold;
}

canvas{
background:white;
cursor:crosshair;
}

</style>
</head>

<body>

<header>🔥 ALLCALOR PRO</header>

<div id="toolbar">

Escala <input id="scaleInput" type="number" value="100" style="width:70px">

<button class="green" onclick="newRoom()">Nueva estancia</button>
<button class="blue" onclick="closeRoom()">Cerrar estancia</button>
<button class="orange" onclick="undo()">Deshacer</button>
<button class="red" onclick="resetAll()">Reiniciar</button>

<button onclick="zoom(1.2)">+</button>
<button onclick="zoom(0.8)">-</button>
<button onclick="resetView()">□</button>
<button onclick="togglePan()">🖐</button>

</div>

<div id="container">

<div id="panel">
<h3>ESTANCIAS</h3>
<div id="roomsInfo"></div>
</div>

<div id="canvasContainer">

<div id="measureBox">0.00 m | 0°</div>

<canvas id="canvas"></canvas>

</div>
</div>

<script>

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")
const measureBox=document.getElementById("measureBox")

canvas.width=window.innerWidth-200
canvas.height=window.innerHeight-110

let rooms=[]
let currentRoom=null
let drawing=false

let offsetX=0
let offsetY=0
let scale=1

let isPanning=false
let panStart=null

let mouse={x:0,y:0}

function world(x,y){
return{
x:(x-offsetX)/scale,
y:(y-offsetY)/scale
}
}

function screen(x,y){
return{
x:x*scale+offsetX,
y:y*scale+offsetY
}
}

canvas.addEventListener("mousemove",e=>{

const rect=canvas.getBoundingClientRect()

mouse.x=e.clientX-rect.left
mouse.y=e.clientY-rect.top

if(isPanning && e.buttons===1){

offsetX+=e.movementX
offsetY+=e.movementY
draw()
return

}

if(drawing && currentRoom && currentRoom.length>0){

const last=currentRoom[currentRoom.length-1]
const w=world(mouse.x,mouse.y)

const dx=w.x-last.x
const dy=w.y-last.y

const dist=Math.sqrt(dx*dx+dy*dy)/100
const angle=Math.atan2(dy,dx)*180/Math.PI

measureBox.innerText=dist.toFixed(2)+" m | "+angle.toFixed(1)+"°"

}

draw()

})

canvas.addEventListener("mousedown",e=>{

if(isPanning){
return
}

const w=world(mouse.x,mouse.y)

if(drawing){

currentRoom.push(w)

}

draw()

})

function newRoom(){

drawing=true
currentRoom=[]
rooms.push(currentRoom)

}

function closeRoom(){

if(!currentRoom) return

if(currentRoom.length<3){
alert("mínimo 3 puntos")
return
}

currentRoom.push({...currentRoom[0]})

drawing=false
currentRoom=null

draw()

}

function undo(){

if(currentRoom && currentRoom.length>0){

currentRoom.pop()

}

draw()

}

function resetAll(){

rooms=[]
currentRoom=null
drawing=false

draw()

}

function zoom(f){

scale*=f
draw()

}

function resetView(){

scale=1
offsetX=0
offsetY=0

draw()

}

function togglePan(){

isPanning=!isPanning

}

canvas.addEventListener("wheel",e=>{

const delta=e.deltaY<0?1.1:0.9
zoom(delta)

})

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

for(let room of rooms){

if(room.length<2) continue

ctx.beginPath()

for(let i=0;i<room.length;i++){

const p=screen(room[i].x,room[i].y)

if(i===0){
ctx.moveTo(p.x,p.y)
}else{
ctx.lineTo(p.x,p.y)
}

ctx.fillStyle="red"
ctx.beginPath()
ctx.arc(p.x,p.y,4,0,Math.PI*2)
ctx.fill()

}

ctx.strokeStyle="#2196f3"
ctx.lineWidth=2
ctx.stroke()

}

if(drawing && currentRoom && currentRoom.length>0){

const last=currentRoom[currentRoom.length-1]
const p=screen(last.x,last.y)

ctx.beginPath()
ctx.moveTo(p.x,p.y)
ctx.lineTo(mouse.x,mouse.y)
ctx.setLineDash([6,6])
ctx.stroke()
ctx.setLineDash([])

}

}

draw()

</script>

</body>
</html>
