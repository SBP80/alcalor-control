<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ALLCALOR PRO</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f2238;
color:white;
}

header{
text-align:center;
padding:14px;
font-size:24px;
font-weight:bold;
}

#toolbar{
display:flex;
gap:10px;
padding:10px;
background:#162f4d;
align-items:center;
}

button{
border:none;
padding:8px 12px;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

.green{background:#4caf50}
.blue{background:#3498db}
.orange{background:#ff9800}
.red{background:#e53935}
.gray{background:#ddd}

#container{
display:flex;
height:calc(100vh - 90px);
}

#panel{
width:220px;
background:#17395d;
padding:10px;
}

#canvasBox{
flex:1;
background:#e6e6e6;
position:relative;
}

canvas{
background:white;
cursor:crosshair;
}

#measure{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
background:#111;
color:#0f0;
padding:6px 10px;
border-radius:4px;
font-size:14px;
}

</style>
</head>

<body>

<header>🔥 ALLCALOR PRO</header>

<div id="toolbar">

Escala <input id="scaleInput" type="number" value="100" style="width:70px">

<button class="green" onclick="newRoom()">Nueva estancia</button>
<button class="blue" onclick="closeRoom()">Cerrar estancia</button>
<button class="orange" onclick="undo()">Deshacer</button>
<button class="red" onclick="resetAll()">Reiniciar</button>

<button class="gray" onclick="zoomIn()">+</button>
<button class="gray" onclick="zoomOut()">-</button>
<button class="gray" onclick="togglePan()">✋</button>

</div>

<div id="container">

<div id="panel">
<h3>ESTANCIAS</h3>
<div id="roomList"></div>
</div>

<div id="canvasBox">

<div id="measure">0 m | 0°</div>

<canvas id="canvas"></canvas>

</div>

</div>

<script>

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth-220
canvas.height=window.innerHeight-100

let rooms=[]
let currentRoom=null

let mouse={x:0,y:0}

let zoom=1
let offsetX=0
let offsetY=0

let panMode=false
let panning=false

let walls=[]

const measure=document.getElementById("measure")

canvas.addEventListener("mousemove",e=>{

const rect=canvas.getBoundingClientRect()

mouse.x=(e.clientX-rect.left-offsetX)/zoom
mouse.y=(e.clientY-rect.top-offsetY)/zoom

if(panning){

offsetX+=e.movementX
offsetY+=e.movementY
draw()
return

}

if(currentRoom && currentRoom.points.length>0){

let last=currentRoom.points[currentRoom.points.length-1]

let dx=mouse.x-last.x
let dy=mouse.y-last.y

let angle=Math.atan2(dy,dx)*180/Math.PI
let dist=Math.sqrt(dx*dx+dy*dy)

if(Math.abs(angle)<10 || Math.abs(Math.abs(angle)-180)<10){
mouse.y=last.y
}

else if(Math.abs(angle-90)<10 || Math.abs(angle+90)<10){
mouse.x=last.x
}

let finaldx=mouse.x-last.x
let finaldy=mouse.y-last.y

let finaldist=Math.sqrt(finaldx*finaldx+finaldy*finaldy)/100
let finalang=Math.atan2(finaldy,finaldx)*180/Math.PI

measure.innerText=finaldist.toFixed(2)+" m | "+finalang.toFixed(1)+"°"

}

draw()

})

canvas.addEventListener("mousedown",e=>{

if(panMode){

panning=true
canvas.style.cursor="grabbing"
return

}

if(!currentRoom)return

currentRoom.points.push({x:mouse.x,y:mouse.y})

draw()

})

canvas.addEventListener("mouseup",()=>{

panning=false

if(panMode){
canvas.style.cursor="grab"
}

})

canvas.addEventListener("dblclick",e=>{

const rect=canvas.getBoundingClientRect()

let x=(e.clientX-rect.left-offsetX)/zoom
let y=(e.clientY-rect.top-offsetY)/zoom

walls.forEach(w=>{

let dx=x-w.mx
let dy=y-w.my

if(Math.sqrt(dx*dx+dy*dy)<30){

let val=prompt("Nueva medida (m)",w.length)

if(val){
w.length=parseFloat(val)
}

}

})

draw()

})

function newRoom(){

let name=prompt("Nombre estancia")

if(!name)return

currentRoom={name:name,points:[]}

rooms.push(currentRoom)

updateList()

}

function closeRoom(){

if(!currentRoom)return

if(currentRoom.points.length>2){

let first=currentRoom.points[0]

currentRoom.points.push({x:first.x,y:first.y})

}

currentRoom=null

draw()

}

function undo(){

if(currentRoom && currentRoom.points.length>0){
currentRoom.points.pop()
}

draw()

}

function resetAll(){

rooms=[]
currentRoom=null
walls=[]

updateList()
draw()

}

function zoomIn(){

zoom*=1.2
draw()

}

function zoomOut(){

zoom/=1.2
draw()

}

function togglePan(){

panMode=!panMode

if(panMode){
canvas.style.cursor="grab"
}else{
canvas.style.cursor="crosshair"
}

}

function updateList(){

let list=document.getElementById("roomList")

list.innerHTML=""

rooms.forEach(r=>{

let div=document.createElement("div")
div.innerText=r.name
list.appendChild(div)

})

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.save()

ctx.translate(offsetX,offsetY)
ctx.scale(zoom,zoom)

walls=[]

rooms.forEach(room=>{

let pts=room.points

for(let i=0;i<pts.length-1;i++){

let a=pts[i]
let b=pts[i+1]

ctx.beginPath()
ctx.moveTo(a.x,a.y)
ctx.lineTo(b.x,b.y)
ctx.strokeStyle="#2196f3"
ctx.lineWidth=2
ctx.stroke()

ctx.beginPath()
ctx.arc(a.x,a.y,5,0,Math.PI*2)
ctx.fillStyle="red"
ctx.fill()

let mx=(a.x+b.x)/2
let my=(a.y+b.y)/2

let dist=Math.hypot(b.x-a.x,b.y-a.y)/100

walls.push({mx:mx,my:my,length:dist})

ctx.fillStyle="black"
ctx.fillRect(mx-30,my-10,60,20)

ctx.fillStyle="#0f0"
ctx.fillText(dist.toFixed(2)+" m",mx-25,my+5)

}

})

if(currentRoom && currentRoom.points.length>0){

let last=currentRoom.points[currentRoom.points.length-1]

ctx.beginPath()
ctx.moveTo(last.x,last.y)
ctx.lineTo(mouse.x,mouse.y)

ctx.setLineDash([6,6])
ctx.stroke()
ctx.setLineDash([])

}

ctx.restore()

}

draw()

</script>

</body>
</html>
