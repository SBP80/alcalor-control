<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ALLCALOR PRO</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f2b44;
color:white;
}

header{
background:#1b1b1b;
padding:12px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.toolbar{
background:#173a5e;
padding:10px;
}

button{
border:none;
padding:6px 12px;
margin-right:6px;
border-radius:4px;
cursor:pointer;
font-weight:bold;
}

.green{background:#28a745}
.blue{background:#2b83ff}
.orange{background:#ff9800}
.red{background:#e53935}
.yellow{background:#ffc107;color:black}
.purple{background:#7e57c2}

#layout{
display:flex;
}

#panel{
width:220px;
background:#1c3f63;
padding:10px;
}

canvas{
background:#f4f1e8;
cursor:crosshair;
}

#cursor{
position:absolute;
background:#333;
padding:6px 10px;
border-radius:4px;
font-size:12px;
pointer-events:none;
}

#inputLength{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
background:black;
padding:6px 12px;
border-radius:6px;
font-weight:bold;
display:none;
}

</style>
</head>

<body>

<header>🔥 ALLCALOR PRO</header>

<div class="toolbar">

Escala px/m
<input id="scale" type="number" value="100" style="width:60px">

<button class="green" onclick="newRoom()">Nueva estancia</button>
<button class="blue" onclick="closeRoom()">Cerrar estancia</button>
<button class="orange" onclick="undo()">Deshacer</button>
<button class="red" onclick="resetAll()">Reiniciar</button>

<button class="yellow" onclick="zoomIn()">+</button>
<button class="yellow" onclick="zoomOut()">−</button>
<button class="yellow" onclick="centerView()">Centrar</button>

<button id="snapButton" class="purple" onclick="toggleSnap()">SNAP OFF</button>

</div>

<div id="layout">

<div id="panel">

<h3>Estancias</h3>

<div id="rooms"></div>

<hr>

Total: <span id="totalArea">0</span> m²

</div>

<div style="position:relative">

<canvas id="canvas" width="1200" height="700"></canvas>

<div id="cursor"></div>
<div id="inputLength"></div>

</div>

</div>

<script>

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")
const cursor=document.getElementById("cursor")
const snapButton=document.getElementById("snapButton")
const inputBox=document.getElementById("inputLength")

let scale=100
let camera={x:0,y:0,zoom:1}

let rooms=[]
let current=[]
let drawing=false

let mouse={x:0,y:0}

let dragVertex=null
let dragRoom=null

let snapEnabled=false
let typedLength=""

function toggleSnap(){

snapEnabled=!snapEnabled
snapButton.innerText=snapEnabled?"SNAP ON":"SNAP OFF"

}

function dist(a,b){
return Math.hypot(a.x-b.x,a.y-b.y)
}

function angle(a,b,c){

let ang=Math.atan2(c.y-b.y,c.x-b.x)-Math.atan2(a.y-b.y,a.x-b.x)
ang=Math.abs(ang*180/Math.PI)
if(ang>180) ang=360-ang
return ang

}

function polygonArea(v){

let sum=0
for(let i=0;i<v.length;i++){
let j=(i+1)%v.length
sum+=v[i].x*v[j].y-v[j].x*v[i].y
}

return Math.abs(sum/2)

}

function centroid(v){

let x=0
let y=0

for(let p of v){

x+=p.x
y+=p.y

}

return{x:x/v.length,y:y/v.length}

}

function perimeter(v){

let sum=0

for(let i=0;i<v.length;i++){

let j=(i+1)%v.length
sum+=dist(v[i],v[j])

}

return sum

}

function pointInside(point,poly){

let inside=false

for(let i=0,j=poly.length-1;i<poly.length;j=i++){

let xi=poly[i].x,yi=poly[i].y
let xj=poly[j].x,yj=poly[j].y

let intersect=((yi>point.y)!=(yj>point.y)) &&
(point.x<(xj-xi)*(point.y-yi)/(yj-yi)+xi)

if(intersect) inside=!inside

}

return inside

}

function snapPoint(point){

if(!snapEnabled) return point

let snapDistance=15/camera.zoom

for(let room of rooms){

for(let v of room.v){

if(dist(point,v)<snapDistance){

return{x:v.x,y:v.y}

}

}

}

return point

}

function screenToWorld(p){

return{
x:(p.x-camera.x)/camera.zoom,
y:(p.y-camera.y)/camera.zoom
}

}

canvas.onmousedown=e=>{

let r=canvas.getBoundingClientRect()

let p=screenToWorld({
x:e.clientX-r.left,
y:e.clientY-r.top
})

p=snapPoint(p)

mouse=p

if(drawing){

current.push(p)
draw()
return

}

for(let room of rooms){

for(let v of room.v){

if(dist(v,p)<10){

dragVertex=v
return

}

}

}

for(let room of rooms){

if(pointInside(p,room.v)){

dragRoom={room:room,start:p}
return

}

}

}

canvas.onmousemove=e=>{

let r=canvas.getBoundingClientRect()

let p=screenToWorld({
x:e.clientX-r.left,
y:e.clientY-r.top
})

mouse=snapPoint(p)

if(dragVertex){

dragVertex.x=mouse.x
dragVertex.y=mouse.y
updateList()

}

if(dragRoom){

let dx=mouse.x-dragRoom.start.x
let dy=mouse.y-dragRoom.start.y

dragRoom.start=mouse

for(let v of dragRoom.room.v){

v.x+=dx
v.y+=dy

}

updateList()

}

draw()

}

canvas.onmouseup=()=>{

dragVertex=null
dragRoom=null

}

function newRoom(){

drawing=true
current=[]

}

function closeRoom(){

if(current.length<3) return

let name=prompt("Nombre estancia")

rooms.push({
name:name||"estancia",
v:[...current]
})

drawing=false
current=[]

updateList()
draw()

}

function undo(){

current.pop()
draw()

}

function resetAll(){

rooms=[]
current=[]
drawing=false

updateList()
draw()

}

function zoomIn(){

camera.zoom*=1.2
draw()

}

function zoomOut(){

camera.zoom/=1.2
draw()

}

function centerView(){

camera.x=canvas.width/2
camera.y=canvas.height/2
draw()

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.save()

ctx.translate(camera.x,camera.y)
ctx.scale(camera.zoom,camera.zoom)

for(let room of rooms){

let v=room.v

ctx.beginPath()
ctx.moveTo(v[0].x,v[0].y)

for(let i=1;i<v.length;i++){

ctx.lineTo(v[i].x,v[i].y)

}

ctx.closePath()

ctx.fillStyle="rgba(0,150,255,0.15)"
ctx.fill()

ctx.strokeStyle="#2b83ff"
ctx.lineWidth=2
ctx.stroke()

for(let i=0;i<v.length;i++){

let a=v[i]
let b=v[(i+1)%v.length]

let mid={
x:(a.x+b.x)/2,
y:(a.y+b.y)/2
}

let d=dist(a,b)/scale

ctx.fillStyle="black"
ctx.fillText(d.toFixed(2)+" m",mid.x,mid.y)

}

for(let i=0;i<v.length;i++){

let a=v[(i-1+v.length)%v.length]
let b=v[i]
let c=v[(i+1)%v.length]

let ang=angle(a,b,c)

ctx.fillStyle="orange"
ctx.fillText(ang.toFixed(0)+"°",b.x+5,b.y-5)

}

for(let p of v){

ctx.beginPath()
ctx.arc(p.x,p.y,5,0,Math.PI*2)
ctx.fillStyle="red"
ctx.fill()

}

let c=centroid(v)

let area=polygonArea(v)/scale/scale

ctx.fillStyle="black"
ctx.textAlign="center"

ctx.fillText(room.name,c.x,c.y)
ctx.fillText(area.toFixed(2)+" m²",c.x,c.y+14)

}

ctx.restore()

}

function updateList(){

let html=""
let total=0

for(let r of rooms){

let area=polygonArea(r.v)/scale/scale
let per=perimeter(r.v)/scale

total+=area

html+=`
<b>${r.name}</b><br>
Área: ${area.toFixed(2)} m²<br>
Perímetro: ${per.toFixed(2)} m
<hr>
`

}

document.getElementById("rooms").innerHTML=html
document.getElementById("totalArea").innerText=total.toFixed(2)

}

draw()

</script>

</body>
</html>
