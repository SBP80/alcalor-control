<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ALLCALOR PRO</title>

<style>

body{
font-family:Arial;
background:#0f2b44;
color:white;
margin:0;
padding:10px;
}

h1{
text-align:center;
margin:10px;
}

.panel{
background:#12314a;
padding:10px;
border-radius:8px;
margin-bottom:8px;
}

button{
background:#2b83ff;
color:white;
border:none;
padding:6px 10px;
margin-right:6px;
cursor:pointer;
}

canvas{
background:#f4f1e8;
border-radius:8px;
display:block;
margin:auto;
touch-action:none;
}

#hud{
font-size:18px;
font-weight:bold;
margin-top:6px;
}

#layout{
display:flex;
gap:10px;
}

#lista{
width:220px;
background:#12314a;
padding:10px;
border-radius:8px;
}

.roomItem{
margin-bottom:8px;
padding-bottom:6px;
border-bottom:1px solid rgba(255,255,255,0.2);
}

</style>
</head>

<body>

<h1>ALLCALOR PRO</h1>

<div class="panel">

Escala px/m
<input id="escala" type="number" value="100">

<button onclick="nuevaEstancia()">Nueva estancia</button>
<button onclick="cerrar()">Cerrar estancia</button>
<button onclick="deshacer()">Deshacer</button>
<button onclick="reiniciar()">Reiniciar</button>

<div id="hud">
Longitud: 0 m | Ángulo: 0°
</div>

</div>

<div id="layout">

<div id="lista">

<b>ESTANCIAS</b>
<div id="rooms"></div>

<hr>

<div id="total"></div>

</div>

<canvas id="canvas" width="1100" height="650"></canvas>

</div>

<script>

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

let rooms=[]
let current=[]
let drawing=true

let zoom=1
let offsetX=0
let offsetY=0

let draggingVertex=null
let draggingRoom=null

let mouse={x:0,y:0}

let pinchStartDist=0
let pinchStartZoom=1

function escala(){
return parseFloat(document.getElementById("escala").value)
}

function worldToScreen(x,y){
return{
x:x*zoom+offsetX,
y:y*zoom+offsetY
}
}

function screenToWorld(x,y){
return{
x:(x-offsetX)/zoom,
y:(y-offsetY)/zoom
}
}

function pos(e){

const r=canvas.getBoundingClientRect()

if(e.touches){

return screenToWorld(
e.touches[0].clientX-r.left,
e.touches[0].clientY-r.top)

}

return screenToWorld(
e.clientX-r.left,
e.clientY-r.top)

}

canvas.addEventListener("mousedown",mouseDown)
canvas.addEventListener("mousemove",mouseMove)
canvas.addEventListener("mouseup",mouseUp)

canvas.addEventListener("touchstart",touchStart,{passive:false})
canvas.addEventListener("touchmove",touchMove,{passive:false})
canvas.addEventListener("touchend",mouseUp)

canvas.addEventListener("wheel",wheelZoom)

function mouseDown(e){

let p=pos(e)
mouse=p

if(drawing){

current.push(p)
dibujar()
return

}

for(let room of rooms){

for(let v of room.vertices){

if(Math.hypot(p.x-v.x,p.y-v.y)<10/zoom){

draggingVertex=v
return

}

}

}

for(let room of rooms){

if(pointInPolygon(p,room.vertices)){

draggingRoom={
room:room,
start:p
}

return

}

}

}

function mouseMove(e){

let p=pos(e)
mouse=p

if(draggingVertex){

draggingVertex.x=p.x
draggingVertex.y=p.y

}

if(draggingRoom){

let dx=p.x-draggingRoom.start.x
let dy=p.y-draggingRoom.start.y

draggingRoom.start=p

for(let v of draggingRoom.room.vertices){

v.x+=dx
v.y+=dy

}

}

dibujar()

}

function mouseUp(){

draggingVertex=null
draggingRoom=null

}

function wheelZoom(e){

let factor=e.deltaY<0?1.1:0.9
zoom*=factor
dibujar()

}

function touchStart(e){

if(e.touches.length==2){

let dx=e.touches[0].clientX-e.touches[1].clientX
let dy=e.touches[0].clientY-e.touches[1].clientY

pinchStartDist=Math.hypot(dx,dy)
pinchStartZoom=zoom

}

}

function touchMove(e){

if(e.touches.length==2){

let dx=e.touches[0].clientX-e.touches[1].clientX
let dy=e.touches[0].clientY-e.touches[1].clientY

let dist=Math.hypot(dx,dy)

zoom=pinchStartZoom*(dist/pinchStartDist)

dibujar()

}

}

function nuevaEstancia(){

drawing=true
current=[]

}

function cerrar(){

if(current.length<3)return

let nombre=prompt("Nombre estancia")

rooms.push({
name:nombre||"estancia",
vertices:[...current]
})

drawing=false
current=[]

actualizarLista()
dibujar()

}

function deshacer(){

current.pop()
dibujar()

}

function reiniciar(){

rooms=[]
current=[]
drawing=true

actualizarLista()
dibujar()

}

function area(vertices){

let sum=0

for(let i=0;i<vertices.length;i++){

let j=(i+1)%vertices.length

sum+=vertices[i].x*vertices[j].y
sum-=vertices[j].x*vertices[i].y

}

return Math.abs(sum/2)/(escala()*escala())

}

function perimetro(vertices){

let p=0

for(let i=0;i<vertices.length;i++){

let j=(i+1)%vertices.length

p+=Math.hypot(
vertices[j].x-vertices[i].x,
vertices[j].y-vertices[i].y
)

}

return p/escala()

}

function actualizarLista(){

let html=""
let total=0

for(let r of rooms){

let a=area(r.vertices)
let p=perimetro(r.vertices)

total+=a

html+=`
<div class="roomItem">
<b>${r.name}</b><br>
Área: ${a.toFixed(2)} m²<br>
Perímetro: ${p.toFixed(2)} m
</div>
`

}

document.getElementById("rooms").innerHTML=html

document.getElementById("total").innerHTML=
"<b>Total m²:</b> "+total.toFixed(2)

}

function puntoCentral(vertices){

let x=0
let y=0

for(let v of vertices){

x+=v.x
y+=v.y

}

return{
x:x/vertices.length,
y:y/vertices.length
}

}

function pointInPolygon(point,vs){

let x=point.x,y=point.y
let inside=false

for(let i=0,j=vs.length-1;i<vs.length;j=i++){

let xi=vs[i].x,yi=vs[i].y
let xj=vs[j].x,yj=vs[j].y

let intersect=((yi>y)!=(yj>y)) &&
(x<(xj-xi)*(y-yi)/(yj-yi)+xi)

if(intersect)inside=!inside

}

return inside

}

function angulo(a,b,c){

let ang=Math.atan2(c.y-b.y,c.x-b.x)-
Math.atan2(a.y-b.y,a.x-b.x)

ang=ang*180/Math.PI

if(ang<0)ang+=360

return ang

}

function dibujar(){

ctx.clearRect(0,0,canvas.width,canvas.height)

grid()

for(let room of rooms){

ctx.beginPath()

let s=worldToScreen(room.vertices[0].x,room.vertices[0].y)
ctx.moveTo(s.x,s.y)

for(let i=1;i<room.vertices.length;i++){

let p=worldToScreen(room.vertices[i].x,room.vertices[i].y)
ctx.lineTo(p.x,p.y)

}

ctx.closePath()

ctx.fillStyle="rgba(0,120,255,0.15)"
ctx.fill()

ctx.strokeStyle="#2b83ff"
ctx.stroke()

for(let v of room.vertices){

let p=worldToScreen(v.x,v.y)

ctx.beginPath()
ctx.arc(p.x,p.y,5,0,Math.PI*2)
ctx.fillStyle="red"
ctx.fill()

}

let c=puntoCentral(room.vertices)
let sc=worldToScreen(c.x,c.y)

ctx.fillStyle="black"
ctx.fillText(room.name,sc.x,sc.y)

}

if(current.length){

ctx.beginPath()

let s=worldToScreen(current[0].x,current[0].y)
ctx.moveTo(s.x,s.y)

for(let i=1;i<current.length;i++){

let p=worldToScreen(current[i].x,current[i].y)
ctx.lineTo(p.x,p.y)

}

ctx.stroke()

for(let v of current){

let p=worldToScreen(v.x,v.y)

ctx.beginPath()
ctx.arc(p.x,p.y,5,0,Math.PI*2)
ctx.fillStyle="red"
ctx.fill()

}

let last=current[current.length-1]

let s1=worldToScreen(last.x,last.y)
let s2=worldToScreen(mouse.x,mouse.y)

ctx.beginPath()
ctx.moveTo(s1.x,s1.y)
ctx.lineTo(s2.x,s2.y)
ctx.setLineDash([5,5])
ctx.stroke()
ctx.setLineDash([])

let d=Math.hypot(mouse.x-last.x,mouse.y-last.y)/escala()

let ang=0

if(current.length>1){

let prev=current[current.length-2]
ang=angulo(prev,last,mouse)

}

document.getElementById("hud").innerHTML=
"Longitud: "+d.toFixed(2)+" m | Ángulo: "+ang.toFixed(1)+"°"

ctx.fillStyle="black"
ctx.fillText(d.toFixed(2)+" m",s2.x+10,s2.y)

}

}

function grid(){

let step=escala()

ctx.strokeStyle="#ddd"

for(let x=-2000;x<2000;x+=step){

let s=worldToScreen(x,0).x

ctx.beginPath()
ctx.moveTo(s,0)
ctx.lineTo(s,canvas.height)
ctx.stroke()

}

for(let y=-2000;y<2000;y+=step){

let s=worldToScreen(0,y).y

ctx.beginPath()
ctx.moveTo(0,s)
ctx.lineTo(canvas.width,s)
ctx.stroke()

}

}

dibujar()

</script>

</body>
</html>
