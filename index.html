<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALLCALOR PRO</title>

<style>

body{
margin:0;
background:#111;
font-family:Arial;
color:white;
overflow:hidden;
}

#ui{
position:fixed;
top:0;
left:0;
width:100%;
background:#1f1f1f;
padding:10px;
display:flex;
flex-wrap:wrap;
gap:8px;
z-index:10;
}

button{
border:none;
padding:12px 16px;
border-radius:8px;
font-weight:bold;
font-size:16px;
}

.orange{background:#e28a3b;color:white;}
.green{background:#4f9d57;color:white;}
.gray{background:#666;color:white;}

#canvas{
position:absolute;
top:90px;
left:0;
width:100%;
height:calc(100vh - 90px);
}

#info{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#1f1f1f;
padding:8px;
font-size:13px;
}

</style>
</head>

<body>

<div id="ui">

<button class="orange" onclick="modoPoligono()">Polígono</button>
<button class="orange" onclick="cerrarEstancia()">Cerrar estancia</button>
<button class="green" onclick="modoEditar()">Editar</button>
<button class="orange" onclick="agregarPuerta()">+ Puerta</button>
<button class="gray" onclick="borrarActiva()">Borrar activa</button>
<button class="gray" onclick="limpiar()">Limpiar</button>

</div>

<canvas id="canvas"></canvas>

<div id="info">ALLCALOR listo</div>

<script>

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let estancias=[]
let actual=null

let modo="poligono"

let verticeSeleccionado=null
let arrastrando=false

function distancia(a,b){
return Math.hypot(a.x-b.x,a.y-b.y)
}

function modoPoligono(){
modo="poligono"
info("Modo polígono")
}

function modoEditar(){
modo="editar"
info("Modo editar")
}

function cerrarEstancia(){

if(!actual || actual.length<3) return

estancias.push({
puntos:actual,
puertas:[]
})

actual=null

dibujar()

}

function agregarPuerta(){

if(estancias.length==0) return

let e=estancias[estancias.length-1]

let p1=e.puntos[0]
let p2=e.puntos[1]

e.puertas.push({
a:p1,
b:p2,
tipo:"interiorIzq",
ancho:0.8
})

dibujar()

}

function borrarActiva(){
estancias.pop()
dibujar()
}

function limpiar(){
estancias=[]
actual=null
dibujar()
}

canvas.addEventListener("pointerdown",e=>{

let p={x:e.offsetX,y:e.offsetY}

if(modo==="poligono"){

if(!actual) actual=[]

actual.push(p)

dibujar()

}

if(modo==="editar"){

for(let est of estancias){

for(let i=0;i<est.puntos.length;i++){

if(distancia(est.puntos[i],p)<20){

verticeSeleccionado=est.puntos[i]
arrastrando=true

return

}

}

}

}

})

canvas.addEventListener("pointermove",e=>{

if(arrastrando && verticeSeleccionado){

verticeSeleccionado.x=e.offsetX
verticeSeleccionado.y=e.offsetY

dibujar()

}

})

canvas.addEventListener("pointerup",()=>{

arrastrando=false
verticeSeleccionado=null

})

function dibujar(){

ctx.clearRect(0,0,canvas.width,canvas.height)

for(let est of estancias){

ctx.beginPath()

ctx.moveTo(est.puntos[0].x,est.puntos[0].y)

for(let p of est.puntos){
ctx.lineTo(p.x,p.y)
}

ctx.closePath()

ctx.fillStyle="#4a2f16"
ctx.fill()

ctx.strokeStyle="#e28a3b"
ctx.lineWidth=3
ctx.stroke()

for(let p of est.puntos){

ctx.beginPath()
ctx.arc(p.x,p.y,7,0,Math.PI*2)
ctx.fillStyle="white"
ctx.fill()

}

}

if(actual){

ctx.beginPath()

ctx.moveTo(actual[0].x,actual[0].y)

for(let p of actual){
ctx.lineTo(p.x,p.y)
}

ctx.strokeStyle="#e28a3b"
ctx.lineWidth=2
ctx.stroke()

}

}

function info(t){
document.getElementById("info").innerText=t
}

dibujar()

</script>

</body>
</html>
