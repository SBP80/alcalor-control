<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ALLCALOR PRO - Motor Hidráulico Real 3.0</title>

<style>
body{
    font-family:Arial;
    background:#0f172a;
    color:white;
    margin:0;
    padding:20px;
}
h1{
    text-align:center;
}
.panel{
    background:#1e293b;
    padding:20px;
    border-radius:8px;
    margin-bottom:20px;
}
input, select{
    width:100%;
    padding:8px;
    margin-bottom:10px;
}
button{
    background:#2563eb;
    color:white;
    border:none;
    padding:10px;
    cursor:pointer;
}
canvas{
    background:white;
    border-radius:8px;
}
.resultado{
    margin-top:20px;
}
</style>
</head>

<body>

<h1>ALLCALOR PRO – Motor Hidráulico Real 3.0</h1>

<div class="panel">

<label>Largo estancia (m)</label>
<input type="number" id="largo" value="5">

<label>Ancho estancia (m)</label>
<input type="number" id="ancho" value="6">

<label>Separación (cm)</label>
<select id="paso">
<option value="0.10">10</option>
<option value="0.15">15</option>
<option value="0.20">20</option>
<option value="0.05">5 (Baños)</option>
</select>

<label>Máx metros por circuito</label>
<input type="number" id="maxMetro" value="100">

<label>Pared colector</label>
<select id="pared">
<option value="izquierda">Izquierda</option>
<option value="derecha">Derecha</option>
</select>

<button onclick="generar()">Generar plano</button>

</div>

<canvas id="plano" width="900" height="600"></canvas>

<div class="resultado" id="resultado"></div>

<script>

// ===============================
// CORE MATEMÁTICO
// ===============================

class Core {

    static superficie(largo, ancho){
        return largo * ancho;
    }

    static longitudTotal(superficie, paso){
        return superficie / paso;
    }

    static circuitos(longitudTotal, maxMetro){
        return Math.ceil(longitudTotal / maxMetro);
    }

    static colectores(circuitos){
        return Math.ceil(circuitos / 12);
    }

}

// ===============================
// MOTOR DE DIBUJO SIMPLE
// ===============================

function generar(){

    const largo = parseFloat(document.getElementById("largo").value);
    const ancho = parseFloat(document.getElementById("ancho").value);
    const paso = parseFloat(document.getElementById("paso").value);
    const maxMetro = parseFloat(document.getElementById("maxMetro").value);
    const pared = document.getElementById("pared").value;

    const superficie = Core.superficie(largo, ancho);
    const longitudTotal = Core.longitudTotal(superficie, paso);
    const circuitos = Core.circuitos(longitudTotal, maxMetro);
    const colectores = Core.colectores(circuitos);

    const canvas = document.getElementById("plano");
    const ctx = canvas.getContext("2d");

    ctx.clearRect(0,0,canvas.width,canvas.height);

    const margin = 60;
    const escala = Math.min(
        (canvas.width-200)/largo,
        (canvas.height-200)/ancho
    );

    const largoPx = largo * escala;
    const anchoPx = ancho * escala;

    // Dibujar estancia
    ctx.lineWidth=3;
    ctx.strokeStyle="black";
    ctx.strokeRect(margin,margin,largoPx,anchoPx);

    // Dibujar colector
    ctx.lineWidth=6;
    ctx.beginPath();
    if(pared==="izquierda"){
        ctx.moveTo(margin-30,margin);
        ctx.lineTo(margin-30,margin+anchoPx);
    }else{
        ctx.moveTo(margin+largoPx+30,margin);
        ctx.lineTo(margin+largoPx+30,margin+anchoPx);
    }
    ctx.stroke();

    // Generar caracoles reales simples por circuito
    let offset = 0;
    const pasoPx = paso * escala;

    for(let c=0;c<circuitos;c++){

        ctx.strokeStyle = `hsl(${c*60},70%,50%)`;
        ctx.lineWidth=2;
        ctx.beginPath();

        let x1 = margin + offset;
        let y1 = margin + offset;
        let x2 = margin + largoPx - offset;
        let y2 = margin + anchoPx - offset;

        while(x1<x2 && y1<y2){

            ctx.moveTo(x1,y1);
            ctx.lineTo(x2,y1);
            ctx.lineTo(x2,y2);
            ctx.lineTo(x1,y2);

            x1 += pasoPx;
            y1 += pasoPx;
            x2 -= pasoPx;
            y2 -= pasoPx;
        }

        ctx.stroke();

        offset += pasoPx*2;
    }

    // RESULTADOS
    let html="";
    html+="Superficie: "+superficie.toFixed(1)+" m²<br>";
    html+="Longitud total estimada: "+longitudTotal.toFixed(1)+" m<br>";
    html+="Circuitos: "+circuitos+"<br>";
    html+="Colectores necesarios: "+colectores+"<br>";

    document.getElementById("resultado").innerHTML=html;
}

</script>

</body>
</html>
