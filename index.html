<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>APP SUELO RADIANTE</title>

<style>

body{
margin:0;
font-family:Arial;
background:#1b1b1b;
color:white;
overflow:hidden;
}

#toolbar{
height:60px;
background:#2c2c2c;
display:flex;
align-items:center;
padding:10px;
gap:10px;
}

button{
padding:10px;
background:#444;
color:white;
border:none;
border-radius:6px;
}

button:hover{
background:#666;
}

#canvasContainer{
position:absolute;
top:60px;
bottom:0;
left:0;
right:0;
}

canvas{
background:#101010;
touch-action:none;
}

#info{
position:absolute;
right:10px;
top:70px;
background:#2c2c2c;
padding:10px;
border-radius:6px;
font-size:13px;
}

</style>

</head>

<body>

<div id="toolbar">

<button id="room">Estancia</button>
<button id="obstacle">Obstáculo</button>
<button id="close">Cerrar estancia</button>
<button id="generate">Generar circuito</button>
<button id="reset">Reset</button>

</div>

<div id="canvasContainer">
<canvas id="canvas"></canvas>
</div>

<div id="info">
metros tubo: <span id="meters">0</span>
</div>

<script>

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

let W=window.innerWidth
let H=window.innerHeight-60

canvas.width=W
canvas.height=H

const GRID=10

let mode=null
let currentRoom=null
let currentObstacle=null

let rooms=[]
let obstacles=[]
let pipes=[]

function drawGrid(){

ctx.strokeStyle="#222"

for(let x=0;x<W;x+=GRID){

ctx.beginPath()
ctx.moveTo(x,0)
ctx.lineTo(x,H)
ctx.stroke()

}

for(let y=0;y<H;y+=GRID){

ctx.beginPath()
ctx.moveTo(0,y)
ctx.lineTo(W,y)
ctx.stroke()

}

}

function drawPolygon(poly,color){

ctx.strokeStyle=color
ctx.lineWidth=2

ctx.beginPath()

poly.forEach((p,i)=>{

if(i==0) ctx.moveTo(p.x,p.y)
else ctx.lineTo(p.x,p.y)

})

ctx.stroke()

}

function drawRooms(){

rooms.forEach(r=>{

drawPolygon(r.points,"#00ff88")

})

}

function drawObstacles(){

obstacles.forEach(o=>{

drawPolygon(o.points,"#ff5555")

})

}

function drawPipes(){

ctx.strokeStyle="#00aaff"
ctx.lineWidth=2

pipes.forEach(pipe=>{

ctx.beginPath()

pipe.forEach((p,i)=>{

if(i==0) ctx.moveTo(p.x,p.y)
else ctx.lineTo(p.x,p.y)

})

ctx.stroke()

})

}

function render(){

ctx.clearRect(0,0,W,H)

drawGrid()
drawRooms()
drawObstacles()
drawPipes()

requestAnimationFrame(render)

}

render()

canvas.onclick=(e)=>{

let x=e.offsetX
let y=e.offsetY

if(mode==="room"){

if(!currentRoom){

currentRoom={points:[]}
rooms.push(currentRoom)

}

currentRoom.points.push({x,y})

}

if(mode==="obstacle"){

if(!currentObstacle){

currentObstacle={points:[]}
obstacles.push(currentObstacle)

}

currentObstacle.points.push({x,y})

}

}

document.getElementById("close").onclick=()=>{

currentRoom=null
currentObstacle=null

}

document.getElementById("room").onclick=()=>{

mode="room"

}

document.getElementById("obstacle").onclick=()=>{

mode="obstacle"

}

document.getElementById("reset").onclick=()=>{

rooms=[]
pipes=[]
obstacles=[]

}

function boundingBox(points){

let minX=Infinity
let minY=Infinity
let maxX=-Infinity
let maxY=-Infinity

points.forEach(p=>{

if(p.x<minX)minX=p.x
if(p.y<minY)minY=p.y
if(p.x>maxX)maxX=p.x
if(p.y>maxY)maxY=p.y

})

return {minX,minY,maxX,maxY}

}

function generateCircuit(room){

let box=boundingBox(room.points)

let minX=box.minX+5
let minY=box.minY+5
let maxX=box.maxX-5
let maxY=box.maxY-5

let step=10
let offset=step*2

let ida=[]
let retorno=[]

while(minX<maxX && minY<maxY){

ida.push({x:minX,y:minY})
ida.push({x:maxX,y:minY})
ida.push({x:maxX,y:maxY})
ida.push({x:minX,y:maxY})

minX+=offset
minY+=offset
maxX-=offset
maxY-=offset

}

let cx=(box.minX+box.maxX)/2
let cy=(box.minY+box.maxY)/2

retorno.push({x:cx,y:cy})

for(let i=ida.length-1;i>=0;i--){

let p=ida[i]

retorno.push({
x:p.x+step,
y:p.y+step
})

}

return ida.concat(retorno)

}

function pipeLength(pipe){

let L=0

for(let i=1;i<pipe.length;i++){

let dx=pipe[i].x-pipe[i-1].x
let dy=pipe[i].y-pipe[i-1].y

L+=Math.sqrt(dx*dx+dy*dy)

}

return L/100

}

document.getElementById("generate").onclick=()=>{

pipes=[]

let total=0

rooms.forEach(room=>{

let circuit=generateCircuit(room)

pipes.push(circuit)

total+=pipeLength(circuit)

})

document.getElementById("meters").innerText=total.toFixed(1)

}

</script>

</body>
</html>
