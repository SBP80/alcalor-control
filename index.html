     <!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>ALLCALOR</title>
<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f0f0f0;
  overflow:hidden;
}
#barra{
  background:#222;
  padding:10px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
}
button{
  padding:10px 14px;
  border:none;
  background:#f97316;
  color:#fff;
  border-radius:4px;
  font-weight:bold;
  font-size:14px;
}
button.activo{ background:#15803d; }
button.bloqueado{ background:#6b7280; }
input,select{
  padding:10px 12px;
  border:1px solid #ccc;
  border-radius:4px;
  font-size:14px;
  min-width:140px;
}
#info{
  background:#fff;
  padding:8px 10px;
  font-size:14px;
  border-bottom:1px solid #ccc;
  white-space:pre-line;
}
canvas{
  display:block;
  background:#f5f5f5;
  touch-action:none;
}
</style>
</head>
<body>

<div id="barra">
  <button id="nuevo">Nuevo</button>
  <button id="cerrar">Cerrar estancia</button>
  <button id="borrar">Borrar punto</button>
  <button id="fijar">Fijar estancia</button>
  <button id="editar">Editar estancia</button>
  <button id="mover">Mover estancia</button>
  <button id="verificar">Verificación</button>
  <button id="diag">Diagonal siguiente</button>
  <button id="aplicarDiag">Aplicar diagonal</button>
  <button id="escala">Calibrar escala</button>

  <input id="nombre" type="text" placeholder="Nombre estancia">
  <select id="planta">
    <option value="Planta baja">Planta baja</option>
    <option value="Planta 1">Planta 1</option>
    <option value="Planta 2">Planta 2</option>
    <option value="Sótano">Sótano</option>
    <option value="Buhardilla">Buhardilla</option>
  </select>
</div>

<div id="info">Modo dibujo</div>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const btnNuevo = document.getElementById("nuevo");
const btnCerrar = document.getElementById("cerrar");
const btnBorrar = document.getElementById("borrar");
const btnFijar = document.getElementById("fijar");
const btnEditar = document.getElementById("editar");
const btnMover = document.getElementById("mover");
const btnVerificar = document.getElementById("verificar");
const btnDiag = document.getElementById("diag");
const btnAplicarDiag = document.getElementById("aplicarDiag");
const btnEscala = document.getElementById("escala");
const inputNombre = document.getElementById("nombre");
const selectPlanta = document.getElementById("planta");
const info = document.getElementById("info");

let puntos = [];
let cerrado = false;
let fijado = false;
let modoMover = false;
let modoVerificacion = false;

let diagonales = [];
let diagActual = 0;
let diagonalesObjetivo = [];
let etiquetaDiagonal = null;

let pxPorMetro = 100;
let calibrando = false;
let verticesCalibracion = [];

let etiquetasLados = [];

let pointerActivo = false;
let arrastrandoPunto = false;
let moviendoFigura = false;
let indicePunto = -1;

let startX = 0;
let startY = 0;
let lastX = 0;
let lastY = 0;

const RADIO_PUNTO = 20;
const UMBRAL_ARRASTRE = 6;
const UMBRAL_TOQUE = 10;

function ajustar(){
  const barraH = document.getElementById("barra").offsetHeight;
  const infoH = document.getElementById("info").offsetHeight;
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight - barraH - infoH;
  dibujar();
}
window.addEventListener("resize", ajustar);

function pos(e){
  const r = canvas.getBoundingClientRect();
  return {
    x: e.clientX - r.left,
    y: e.clientY - r.top
  };
}

function distancia(a,b){
  return Math.hypot(a.x - b.x, a.y - b.y);
}

function distanciaXY(x1,y1,x2,y2){
  return Math.hypot(x2 - x1, y2 - y1);
}

function metrosDesdePx(px){
  return px / pxPorMetro;
}

function pxDesdeMetros(m){
  return m * pxPorMetro;
}

function formatM(v){
  return v.toFixed(2).replace(".", ",") + " m";
}

function buscarPunto(x,y){
  for(let i=0;i<puntos.length;i++){
    if(distanciaXY(puntos[i].x,puntos[i].y,x,y) < RADIO_PUNTO){
      return i;
    }
  }
  return -1;
}

function puntoSobreSegmento(px,py,a,b){
  const cross = Math.abs((py-a.y)*(b.x-a.x) - (px-a.x)*(b.y-a.y));
  if(cross > 0.8) return false;

  const dot = (px-a.x)*(b.x-a.x) + (py-a.y)*(b.y-a.y);
  if(dot < 0) return false;

  const lenSq = (b.x-a.x)*(b.x-a.x) + (b.y-a.y)*(b.y-a.y);
  if(dot > lenSq) return false;

  return true;
}

function puntoDentroPoligono(x,y){
  if(puntos.length < 3) return false;
  let dentro = false;

  for(let i=0,j=puntos.length-1;i<puntos.length;j=i++){
    const xi = puntos[i].x;
    const yi = puntos[i].y;
    const xj = puntos[j].x;
    const yj = puntos[j].y;

    const cruza = ((yi > y) !== (yj > y)) &&
      (x < (xj - xi) * (y - yi) / ((yj - yi) || 0.000001) + xi);

    if(cruza) dentro = !dentro;
  }
  return dentro;
}

function puntoSobreAlgunLado(x,y){
  if(puntos.length < 2) return false;
  const limite = cerrado ? puntos.length : puntos.length - 1;
  for(let i=0;i<limite;i++){
    const a = puntos[i];
    const b = puntos[(i+1)%puntos.length];
    if(puntoSobreSegmento(x,y,a,b)) return true;
  }
  return false;
}

function puntoDentroPoligonoConBorde(x,y){
  return puntoDentroPoligono(x,y) || puntoSobreAlgunLado(x,y);
}

function orient(a,b,c){
  const v = (b.y-a.y)*(c.x-b.x) - (b.x-a.x)*(c.y-b.y);
  if(Math.abs(v) < 0.000001) return 0;
  return v > 0 ? 1 : 2;
}

function segmentosIntersectan(a,b,c,d){
  const o1 = orient(a,b,c);
  const o2 = orient(a,b,d);
  const o3 = orient(c,d,a);
  const o4 = orient(c,d,b);

  if(o1 !== o2 && o3 !== o4) return true;

  if(o1 === 0 && puntoSobreSegmento(c.x,c.y,a,b)) return true;
  if(o2 === 0 && puntoSobreSegmento(d.x,d.y,a,b)) return true;
  if(o3 === 0 && puntoSobreSegmento(a.x,a.y,c,d)) return true;
  if(o4 === 0 && puntoSobreSegmento(b.x,b.y,c,d)) return true;

  return false;
}

function diagonalValida(i,j){
  const a = puntos[i];
  const b = puntos[j];

  for(let k=0;k<puntos.length;k++){
    const c = puntos[k];
    const d = puntos[(k+1)%puntos.length];

    const usaI = (k === i || (k+1)%puntos.length === i);
    const usaJ = (k === j || (k+1)%puntos.length === j);
    if(usaI || usaJ) continue;

    if(segmentosIntersectan(a,b,c,d)) return false;
  }

  const muestras = 12;
  for(let t=1;t<muestras;t++){
    const s = t / muestras;
    const x = a.x + (b.x - a.x) * s;
    const y = a.y + (b.y - a.y) * s;
    if(!puntoDentroPoligonoConBorde(x,y)) return false;
  }

  return true;
}

function calcularDiagonales(){
  diagonales = [];
  if(!cerrado || puntos.length < 4) return;

  const n = puntos.length;
  for(let i=0;i<n;i++){
    for(let j=i+2;j<n;j++){
      if(i === 0 && j === n-1) continue;
      if(diagonalValida(i,j)) diagonales.push([i,j]);
    }
  }

  if(diagActual >= diagonales.length) diagActual = 0;

  while(diagonalesObjetivo.length < diagonales.length){
    diagonalesObjetivo.push(undefined);
  }
}

function moverFigura(dx,dy){
  for(const p of puntos){
    p.x += dx;
    p.y += dy;
  }
}

function centroFigura(){
  if(puntos.length === 0){
    return {x: canvas.width/2, y: canvas.height/2};
  }

  let minX = puntos[0].x, maxX = puntos[0].x;
  let minY = puntos[0].y, maxY = puntos[0].y;

  for(const p of puntos){
    if(p.x < minX) minX = p.x;
    if(p.x > maxX) maxX = p.x;
    if(p.y < minY) minY = p.y;
    if(p.y > maxY) maxY = p.y;
  }

  return { x:(minX+maxX)/2, y:(minY+maxY)/2 };
}

function angulo(a,b,c){
  const abx = a.x - b.x;
  const aby = a.y - b.y;
  const cbx = c.x - b.x;
  const cby = c.y - b.y;

  const dot = abx * cbx + aby * cby;
  const mag1 = Math.hypot(abx, aby);
  const mag2 = Math.hypot(cbx, cby);

  if(mag1 === 0 || mag2 === 0) return 0;

  let cos = dot / (mag1 * mag2);
  cos = Math.max(-1, Math.min(1, cos));

  return Math.acos(cos) * 180 / Math.PI;
}

function etiqueta(texto,x,y,color){
  const lineas = String(texto).split("\n");
  ctx.save();
  ctx.font = "bold 14px Arial";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  let ancho = 0;
  for(const linea of lineas){
    ancho = Math.max(ancho, ctx.measureText(linea).width);
  }
  ancho += 16;

  const altoLinea = 18;
  const alto = Math.max(24, lineas.length * altoLinea + 8);

  ctx.fillStyle = "rgba(255,255,255,0.96)";
  ctx.fillRect(x - ancho/2, y - alto/2, ancho, alto);

  ctx.strokeStyle = "rgba(0,0,0,0.12)";
  ctx.strokeRect(x - ancho/2, y - alto/2, ancho, alto);

  ctx.fillStyle = color;

  if(lineas.length === 1){
    ctx.fillText(lineas[0], x, y);
  }else{
    const inicioY = y - ((lineas.length - 1) * altoLinea) / 2;
    for(let i=0;i<lineas.length;i++){
      ctx.fillText(lineas[i], x, inicioY + i * altoLinea);
    }
  }

  ctx.restore();
  return {x, y, w: ancho, h: alto};
}

function generarEtiquetasLados(){
  etiquetasLados = [];
  if(!cerrado) return;

  for(let i=0;i<puntos.length;i++){
    const a = puntos[i];
    const b = puntos[(i+1)%puntos.length];
    const mx = (a.x+b.x)/2;
    const my = (a.y+b.y)/2;
    const caja = etiqueta(formatM(metrosDesdePx(distancia(a,b))), mx, my, "#2563eb");

    etiquetasLados.push({
      lado: i,
      x: caja.x,
      y: caja.y,
      w: caja.w,
      h: caja.h
    });
  }
}

function buscarEtiquetaLado(x,y){
  for(const e of etiquetasLados){
    if(
      x >= e.x - e.w/2 &&
      x <= e.x + e.w/2 &&
      y >= e.y - e.h/2 &&
      y <= e.y + e.h/2
    ){
      return e.lado;
    }
  }
  return -1;
}

function editarMedidaLado(lado){
  if(!cerrado || modoVerificacion) return;

  const a = puntos[lado];
  const bIndex = (lado + 1) % puntos.length;
  const b = puntos[bIndex];
  const actualM = metrosDesdePx(distancia(a,b));

  const respuesta = prompt("Nueva medida del lado en metros", actualM.toFixed(2).replace(".", ","));
  if(respuesta === null) return;

  const nuevaM = Number(respuesta.replace(",", ".").trim());
  if(!Number.isFinite(nuevaM) || nuevaM <= 0) return;

  const nuevaPx = pxDesdeMetros(nuevaM);

  const dx = b.x - a.x;
  const dy = b.y - a.y;
  const len = Math.hypot(dx,dy);
  if(len <= 0.0001) return;

  const ux = dx / len;
  const uy = dy / len;

  b.x = a.x + ux * nuevaPx;
  b.y = a.y + uy * nuevaPx;

  calcularDiagonales();
  dibujar();
}

function editarDiagonal(){
  if(!modoVerificacion || !etiquetaDiagonal || diagonales.length === 0) return;

  const d = diagonales[diagActual];
  const a = puntos[d[0]];
  const b = puntos[d[1]];
  const actual = metrosDesdePx(distancia(a,b));

  const respuesta = prompt(
    "Medida real diagonal en metros",
    (diagonalesObjetivo[diagActual] ?? actual).toFixed(2).replace(".", ",")
  );
  if(respuesta === null) return;

  const valor = Number(respuesta.replace(",", ".").trim());
  if(!Number.isFinite(valor) || valor <= 0) return;

  diagonalesObjetivo[diagActual] = valor;
  dibujar();
}

function aplicarDiagonalObjetivo(){
  if(!modoVerificacion) return;
  if(diagonales.length === 0) return;
  if(diagonalesObjetivo[diagActual] === undefined) return;

  const d = diagonales[diagActual];
  const i = d[0];
  const j = d[1];
  const a = puntos[i];
  const b = puntos[j];

  const objetivoM = diagonalesObjetivo[diagActual];
  const objetivoPx = pxDesdeMetros(objetivoM);

  const dx = b.x - a.x;
  const dy = b.y - a.y;
  const len = Math.hypot(dx,dy);

  if(len <= 0.0001){
    b.x = a.x + objetivoPx;
    b.y = a.y;
  }else{
    const ux = dx / len;
    const uy = dy / len;
    b.x = a.x + ux * objetivoPx;
    b.y = a.y + uy * objetivoPx;
  }

  calcularDiagonales();
  dibujar();
}

function dibujarNombreYPlanta(){
  if(!cerrado || modoVerificacion) return;

  const c = centroFigura();
  const nombre = inputNombre.value.trim() || "Sin nombre";
  const planta = selectPlanta.value;

  etiqueta(nombre, c.x, c.y - 12, "#111827");
  etiqueta(planta, c.x, c.y + 18, "#374151");
}

function dibujarDiagonal(){
  etiquetaDiagonal = null;
  if(!modoVerificacion || diagonales.length === 0) return;

  const d = diagonales[diagActual];
  const a = puntos[d[0]];
  const b = puntos[d[1]];

  ctx.save();
  ctx.setLineDash([10,8]);
  ctx.beginPath();
  ctx.moveTo(a.x,a.y);
  ctx.lineTo(b.x,b.y);
  ctx.strokeStyle = "purple";
  ctx.lineWidth = 3;
  ctx.stroke();
  ctx.restore();

  const mx = (a.x+b.x)/2;
  const my = (a.y+b.y)/2;
  const valor = metrosDesdePx(distancia(a,b));

  let texto = "D" + (diagActual + 1) + " " + formatM(valor);

  if(diagonalesObjetivo[diagActual] !== undefined){
    const obj = diagonalesObjetivo[diagActual];
    const error = Math.abs(valor - obj);
    texto =
      "D" + (diagActual + 1) + " " + formatM(valor) +
      "\nObj " + formatM(obj) +
      "\nΔ " + formatM(error);
  }

  const caja = etiqueta(texto, mx, my, "purple");
  etiquetaDiagonal = {
    x: caja.x,
    y: caja.y,
    w: caja.w,
    h: caja.h
  };
}

function dibujarCalibracion(){
  if(!calibrando) return;

  for(const idx of verticesCalibracion){
    const p = puntos[idx];
    if(!p) continue;

    ctx.beginPath();
    ctx.arc(p.x,p.y,10,0,Math.PI*2);
    ctx.fillStyle = "#dc2626";
    ctx.fill();
    ctx.strokeStyle = "#ffffff";
    ctx.lineWidth = 3;
    ctx.stroke();
  }
}

function actualizarInfo(){
  let texto = "";

  if(calibrando){
    texto = verticesCalibracion.length === 0
      ? "Calibrar escala · toca el primer vértice"
      : "Calibrar escala · toca el segundo vértice";
  }else if(modoVerificacion){
    texto = "Modo verificación";
    texto += diagonales.length > 0
      ? " · D" + (diagActual + 1) + " de " + diagonales.length
      : " · Sin diagonales válidas";
    texto += " · Toca la etiqueta morada para introducir la diagonal real";
  }else if(fijado){
    texto = "Estancia fijada";
  }else if(modoMover){
    texto = "Modo mover estancia";
  }else if(cerrado){
    texto = "Estancia cerrada · Toca una medida azul para editar en metros";
  }else if(puntos.length >= 3){
    texto = "Modo dibujo · Toca el punto verde para cerrar";
  }else{
    texto = "Modo dibujo";
  }

  texto += " · Escala: 1 m = " + pxPorMetro.toFixed(1).replace(".", ",") + " px";
  info.textContent = texto;
}

function actualizarBotones(){
  btnMover.classList.toggle("activo", modoMover);
  btnVerificar.classList.toggle("activo", modoVerificacion);
  btnEscala.classList.toggle("activo", calibrando);
  btnFijar.classList.toggle("bloqueado", fijado);
  btnEditar.classList.toggle("activo", !fijado);
  btnAplicarDiag.classList.toggle(
    "activo",
    modoVerificacion && diagonalesObjetivo[diagActual] !== undefined
  );
}

function dibujar(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  etiquetasLados = [];
  etiquetaDiagonal = null;

  if(puntos.length > 1){
    ctx.beginPath();
    ctx.moveTo(puntos[0].x, puntos[0].y);
    for(let i=1;i<puntos.length;i++){
      ctx.lineTo(puntos[i].x, puntos[i].y);
    }

    if(cerrado){
      ctx.closePath();
      ctx.fillStyle = "rgba(249,115,22,0.10)";
      ctx.fill();
    }

    ctx.strokeStyle = "#f97316";
    ctx.lineWidth = 3;
    ctx.stroke();
  }

  if(!fijado){
    for(let i=0;i<puntos.length;i++){
      const p = puntos[i];
      ctx.beginPath();

      if(i === 0 && !cerrado && puntos.length >= 3){
        ctx.arc(p.x,p.y,10,0,Math.PI*2);
        ctx.fillStyle = "#16a34a";
        ctx.fill();
        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth = 3;
        ctx.stroke();
      }else{
        ctx.arc(p.x,p.y,7,0,Math.PI*2);
        ctx.fillStyle = "#000000";
        ctx.fill();
      }
    }
  }

  if(cerrado){
    generarEtiquetasLados();

    for(let i=0;i<puntos.length;i++){
      const a = puntos[(i-1+puntos.length)%puntos.length];
      const b = puntos[i];
      const c = puntos[(i+1)%puntos.length];
      ctx.fillStyle = "green";
      ctx.font = "14px Arial";
      ctx.textAlign = "center";
      ctx.fillText(Math.round(angulo(a,b,c)) + "°", b.x + 20, b.y - 10);
    }
  }

  dibujarNombreYPlanta();
  dibujarDiagonal();
  dibujarCalibracion();
  actualizarBotones();
  actualizarInfo();
}

function empezarCalibracion(){
  if(!cerrado || puntos.length < 2) return;
  calibrando = true;
  modoMover = false;
  modoVerificacion = false;
  verticesCalibracion = [];
  dibujar();
}

function terminarCalibracion(){
  if(verticesCalibracion.length !== 2) return;

  const a = puntos[verticesCalibracion[0]];
  const b = puntos[verticesCalibracion[1]];
  const largoPx = distancia(a,b);

  if(largoPx < 10){
    calibrando = false;
    verticesCalibracion = [];
    dibujar();
    return;
  }

  const respuesta = prompt("Distancia real en metros", "");
  if(respuesta === null){
    calibrando = false;
    verticesCalibracion = [];
    dibujar();
    return;
  }

  const realM = Number(respuesta.replace(",", ".").trim());
  if(!Number.isFinite(realM) || realM <= 0){
    calibrando = false;
    verticesCalibracion = [];
    dibujar();
    return;
  }

  pxPorMetro = largoPx / realM;
  calibrando = false;
  verticesCalibracion = [];
  dibujar();
}

function onPointerDown(e){
  e.preventDefault();
  canvas.setPointerCapture(e.pointerId);

  if(fijado && !calibrando) return;

  const p = pos(e);
  pointerActivo = true;
  arrastrandoPunto = false;
  moviendoFigura = false;
  indicePunto = buscarPunto(p.x,p.y);

  startX = p.x;
  startY = p.y;
  lastX = p.x;
  lastY = p.y;

  if(calibrando) return;

  if(modoMover && cerrado && puntoDentroPoligonoConBorde(p.x,p.y)){
    moviendoFigura = true;
    indicePunto = -1;
  }
}

function onPointerMove(e){
  if(!pointerActivo || fijado || calibrando) return;

  const p = pos(e);

  if(moviendoFigura){
    const dx = p.x - lastX;
    const dy = p.y - lastY;
    moverFigura(dx,dy);
    lastX = p.x;
    lastY = p.y;
    calcularDiagonales();
    dibujar();
    return;
  }

  if(indicePunto !== -1){
    if(distanciaXY(startX,startY,p.x,p.y) > UMBRAL_ARRASTRE){
      arrastrandoPunto = true;
    }

    if(arrastrandoPunto){
      puntos[indicePunto].x = p.x;
      puntos[indicePunto].y = p.y;
      if(cerrado) calcularDiagonales();
      dibujar();
    }
  }
}

function onPointerUp(e){
  if(!pointerActivo) return;
  e.preventDefault();

  const p = pos(e);
  const movimiento = distanciaXY(startX, startY, p.x, p.y);

  if(calibrando){
    const idx = buscarPunto(p.x,p.y);
    if(idx !== -1){
      if(verticesCalibracion.length === 0){
        verticesCalibracion.push(idx);
      }else if(verticesCalibracion.length === 1 && idx !== verticesCalibracion[0]){
        verticesCalibracion.push(idx);
        terminarCalibracion();
      }
    }
    pointerActivo = false;
    dibujar();
    return;
  }

  if(moviendoFigura){
    pointerActivo = false;
    moviendoFigura = false;
    indicePunto = -1;
    calcularDiagonales();
    dibujar();
    return;
  }

  if(!arrastrandoPunto && movimiento <= UMBRAL_TOQUE){
    if(modoVerificacion && etiquetaDiagonal){
      if(
        p.x >= etiquetaDiagonal.x - etiquetaDiagonal.w/2 &&
        p.x <= etiquetaDiagonal.x + etiquetaDiagonal.w/2 &&
        p.y >= etiquetaDiagonal.y - etiquetaDiagonal.h/2 &&
        p.y <= etiquetaDiagonal.y + etiquetaDiagonal.h/2
      ){
        pointerActivo = false;
        editarDiagonal();
        return;
      }
    }

    const i = buscarPunto(p.x,p.y);

    if(i === 0 && puntos.length >= 3 && !cerrado){
      cerrado = true;
      calcularDiagonales();
    }else if(i === -1 && !cerrado){
      puntos.push({x:p.x,y:p.y});
    }else if(i === -1 && cerrado && !modoMover && !modoVerificacion){
      const lado = buscarEtiquetaLado(p.x,p.y);
      if(lado !== -1){
        pointerActivo = false;
        editarMedidaLado(lado);
        return;
      }
    }
  }

  pointerActivo = false;
  arrastrandoPunto = false;
  indicePunto = -1;
  dibujar();
}

canvas.addEventListener("pointerdown", onPointerDown);
canvas.addEventListener("pointermove", onPointerMove);
canvas.addEventListener("pointerup", onPointerUp);
canvas.addEventListener("pointercancel", onPointerUp);

btnNuevo.onclick = function(){
  puntos = [];
  cerrado = false;
  fijado = false;
  modoMover = false;
  modoVerificacion = false;
  diagonales = [];
  diagActual = 0;
  diagonalesObjetivo = [];
  etiquetaDiagonal = null;
  calibrando = false;
  verticesCalibracion = [];
  pxPorMetro = 100;
  inputNombre.value = "";
  selectPlanta.value = "Planta baja";
  dibujar();
};

btnCerrar.onclick = function(){
  if(puntos.length >= 3){
    cerrado = true;
    calcularDiagonales();
    dibujar();
  }
};

btnBorrar.onclick = function(){
  if(fijado) return;

  if(puntos.length > 0){
    puntos.pop();
  }

  if(puntos.length < 3){
    cerrado = false;
    modoVerificacion = false;
    diagonales = [];
    diagActual = 0;
    diagonalesObjetivo = [];
    etiquetaDiagonal = null;
    calibrando = false;
    verticesCalibracion = [];
  }else if(cerrado){
    calcularDiagonales();
  }

  dibujar();
};

btnFijar.onclick = function(){
  if(!cerrado) return;
  fijado = true;
  modoMover = false;
  dibujar();
};

btnEditar.onclick = function(){
  fijado = false;
  modoMover = false;
  dibujar();
};

btnMover.onclick = function(){
  if(fijado || !cerrado) return;
  modoMover = !modoMover;
  dibujar();
};

btnVerificar.onclick = function(){
  if(!cerrado) return;
  modoVerificacion = !modoVerificacion;

  if(modoVerificacion){
    calibrando = false;
    verticesCalibracion = [];
    calcularDiagonales();
    diagActual = 0;
  }

  dibujar();
};

btnDiag.onclick = function(){
  if(!modoVerificacion || diagonales.length === 0) return;
  diagActual++;
  if(diagActual >= diagonales.length) diagActual = 0;
  dibujar();
};

btnAplicarDiag.onclick = function(){
  aplicarDiagonalObjetivo();
};

btnEscala.onclick = function(){
  empezarCalibracion();
};

inputNombre.oninput = function(){ dibujar(); };
selectPlanta.onchange = function(){ dibujar(); };

ajustar();
</script>
