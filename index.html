<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>ALLCALOR PRO</title>

<style>

body{
font-family:Arial;
background:#0f2b44;
color:white;
margin:0;
padding:20px;
}

h1{
text-align:center;
}

.panel{
background:#12314a;
padding:15px;
border-radius:8px;
margin-bottom:15px;
}

button{
background:#2b83ff;
color:white;
border:none;
padding:8px 12px;
cursor:pointer;
margin-right:8px;
}

canvas{
background:#efe9dd;
border-radius:8px;
display:block;
margin:auto;
}

input{
padding:6px;
width:120px;
}

</style>

</head>

<body>

<h1>ALLCALOR PRO - Motor Geométrico</h1>

<div class="panel">

Nombre estancia
<input id="nombreEstancia" value="Estancia">

<br><br>

Escala: 1m =
<input type="number" id="escalaInput" value="100">

px

Separación tubo (cm)
<input type="number" id="pasoInput" value="10">

<br><br>

<button onclick="cerrarPoligono()">Cerrar estancia</button>
<button onclick="deshacer()">Deshacer</button>
<button onclick="reiniciar()">Reiniciar</button>
<button onclick="generarSistema()">Generar circuito</button>
<button onclick="modoColector()">Colocar colector</button>

<div id="datosEstancia"></div>

</div>

<canvas id="canvas" width="1000" height="600"></canvas>

<script>

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

let puntos=[]
let cerrado=false

let mouse={x:0,y:0}

let previewLong=0
let previewAng=null

let shift=false
let alt=false

let modo_col=false
let colector=null

document.addEventListener("keydown",e=>{
if(e.key==="Shift")shift=true
if(e.key==="Alt")alt=true
})

document.addEventListener("keyup",e=>{
if(e.key==="Shift")shift=false
if(e.key==="Alt")alt=false
})

canvas.addEventListener("mousemove",function(e){

const rect=canvas.getBoundingClientRect()

mouse.x=e.clientX-rect.left
mouse.y=e.clientY-rect.top

calcularPreview()

dibujar()

})

canvas.addEventListener("click",function(e){

const rect=canvas.getBoundingClientRect()

let x=e.clientX-rect.left
let y=e.clientY-rect.top

if(modo_col){

colector={x,y}
modo_col=false
dibujar()
return

}

if(cerrado)return

if(puntos.length>0){

let p=puntos[puntos.length-1]

let dx=x-p.x
let dy=y-p.y

let ang=Math.atan2(dy,dx)

if(shift){

ang=Math.round(ang/(Math.PI/2))*(Math.PI/2)

}

if(alt){

ang=Math.round(ang/(Math.PI/4))*(Math.PI/4)

}

let dist=Math.hypot(dx,dy)

x=p.x+Math.cos(ang)*dist
y=p.y+Math.sin(ang)*dist

}

puntos.push({x,y})

dibujar()

})

function modoColector(){

modo_col=true

}

function calcularPreview(){

if(puntos.length===0)return

let ultimo=puntos[puntos.length-1]

let dx=mouse.x-ultimo.x
let dy=mouse.y-ultimo.y

let ang=Math.atan2(dy,dx)

if(shift){

ang=Math.round(ang/(Math.PI/2))*(Math.PI/2)

}

if(alt){

ang=Math.round(ang/(Math.PI/4))*(Math.PI/4)

}

let dist=Math.hypot(dx,dy)

mouseSnap={
x:ultimo.x+Math.cos(ang)*dist,
y:ultimo.y+Math.sin(ang)*dist
}

previewLong=dist/getEscala()

if(puntos.length>=2){

let p0=puntos[puntos.length-2]
let p1=puntos[puntos.length-1]

previewAng=calcularAngulo(p0,p1,mouseSnap)

}else{

previewAng=null

}

}

function cerrarPoligono(){

if(puntos.length<3)return

cerrado=true

calcularDatosEstancia()

dibujar()

}

function deshacer(){

if(cerrado)return

puntos.pop()

dibujar()

}

function reiniciar(){

puntos=[]
cerrado=false
colector=null

document.getElementById("datosEstancia").innerHTML=""

dibujar()

}

function dibujar(){

ctx.clearRect(0,0,canvas.width,canvas.height)

if(puntos.length===0)return

ctx.beginPath()

ctx.moveTo(puntos[0].x,puntos[0].y)

for(let i=1;i<puntos.length;i++){
ctx.lineTo(puntos[i].x,puntos[i].y)
}

if(!cerrado){
ctx.lineTo(mouse.x,mouse.y)
}

ctx.strokeStyle="#2b83ff"
ctx.lineWidth=2
ctx.stroke()

for(let p of puntos){

ctx.beginPath()
ctx.arc(p.x,p.y,4,0,Math.PI*2)
ctx.fillStyle="red"
ctx.fill()

}

dibujarMedidasCursor()

if(colector){

ctx.beginPath()
ctx.arc(colector.x,colector.y,6,0,Math.PI*2)
ctx.fillStyle="orange"
ctx.fill()

ctx.fillStyle="black"
ctx.fillText("Colector",colector.x+10,colector.y)

}

}

function dibujarMedidasCursor(){

if(puntos.length===0)return

ctx.fillStyle="black"
ctx.font="14px Arial"

let texto=previewLong.toFixed(2)+" m"

if(previewAng!==null){
texto+=" | "+previewAng.toFixed(1)+"°"
}

ctx.fillText(texto,mouse.x+15,mouse.y-10)

}

function calcularAngulo(a,b,c){

let abx=a.x-b.x
let aby=a.y-b.y

let cbx=c.x-b.x
let cby=c.y-b.y

let dot=abx*cbx+aby*cby

let mag1=Math.hypot(abx,aby)
let mag2=Math.hypot(cbx,cby)

let ang=Math.acos(dot/(mag1*mag2))

return ang*180/Math.PI

}

function calcularDatosEstancia(){

let area=areaPoligono(puntos)
let perimetro=perimetroPoligono(puntos)

let nombre=document.getElementById("nombreEstancia").value

document.getElementById("datosEstancia").innerHTML=

nombre+"<br>"+
"Área: "+area.toFixed(2)+" m²<br>"+
"Perímetro: "+perimetro.toFixed(2)+" m"

}

function areaPoligono(poly){

let area=0

for(let i=0;i<poly.length;i++){

let j=(i+1)%poly.length

area+=poly[i].x*poly[j].y-poly[j].x*poly[i].y

}

return Math.abs(area/2)/(getEscala()*getEscala())

}

function perimetroPoligono(poly){

let p=0

for(let i=0;i<poly.length;i++){

let j=(i+1)%poly.length

let dx=poly[i].x-poly[j].x
let dy=poly[i].y-poly[j].y

p+=Math.hypot(dx,dy)/getEscala()

}

return p

}

function getEscala(){
return parseFloat(document.getElementById("escalaInput").value)
}

</script>

</body>
</html>
