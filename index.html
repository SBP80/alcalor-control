<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ALLCALOR PRO</title>

<style>

body{
font-family:Arial;
background:#0f2b44;
color:white;
margin:0;
padding:20px;
user-select:none;
}

h1{
text-align:center;
}

.panel{
background:#12314a;
padding:15px;
border-radius:8px;
margin-bottom:15px;
}

button{
background:#2b83ff;
color:white;
border:none;
padding:8px 12px;
cursor:pointer;
margin-right:8px;
}

canvas{
background:#f4f1e8;
border-radius:8px;
display:block;
margin:auto;
touch-action:none;
}

</style>

</head>

<body>

<h1>ALLCALOR PRO</h1>

<div class="panel">

Escala px/m
<input id="escala" type="number" value="100">

<button onclick="cerrar()">Cerrar estancia</button>
<button onclick="deshacer()">Deshacer</button>
<button onclick="reiniciar()">Reiniciar</button>

<div id="datos"></div>

</div>

<canvas id="canvas" width="1100" height="650"></canvas>

<script>

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

let puntos=[]
let cerrado=false
let arrastrando=null

let mouse={x:0,y:0}

function escala(){
return parseFloat(document.getElementById("escala").value)
}

function snap(v){

let g=escala()/10

return Math.round(v/g)*g

}

function pos(e){

const r=canvas.getBoundingClientRect()

if(e.touches){
return{
x:snap(e.touches[0].clientX-r.left),
y:snap(e.touches[0].clientY-r.top)
}
}

return{
x:snap(e.clientX-r.left),
y:snap(e.clientY-r.top)
}

}

canvas.addEventListener("mousedown",inicio)
canvas.addEventListener("touchstart",inicio)

canvas.addEventListener("mousemove",mover)
canvas.addEventListener("touchmove",mover)

canvas.addEventListener("mouseup",fin)
canvas.addEventListener("touchend",fin)

canvas.addEventListener("dblclick",insertarVertice)

function inicio(e){

let p=pos(e)

for(let i=0;i<puntos.length;i++){

if(Math.hypot(p.x-puntos[i].x,p.y-puntos[i].y)<10){

arrastrando=i
return

}

}

if(cerrado)return

puntos.push(p)

dibujar()

}

function mover(e){

let p=pos(e)

mouse=p

if(arrastrando!=null){

if(e.shiftKey){

let prev=puntos[(arrastrando-1+puntos.length)%puntos.length]

let dx=p.x-prev.x
let dy=p.y-prev.y

if(Math.abs(dx)>Math.abs(dy))dy=0
else dx=0

puntos[arrastrando]={x:prev.x+dx,y:prev.y+dy}

}else{

puntos[arrastrando]=p

}

}

dibujar()

}

function fin(){

arrastrando=null

}

function insertarVertice(e){

if(puntos.length<2)return

let p=pos(e)

let mejor=999999
let index=null

for(let i=0;i<puntos.length;i++){

let j=(i+1)%puntos.length

let a=puntos[i]
let b=puntos[j]

let d=distanciaPuntoSegmento(p,a,b)

if(d<mejor){

mejor=d
index=j

}

}

if(mejor<15){

puntos.splice(index,0,p)

dibujar()

}

}

function distanciaPuntoSegmento(p,a,b){

let l2=(b.x-a.x)*(b.x-a.x)+(b.y-a.y)*(b.y-a.y)

if(l2===0)return Math.hypot(p.x-a.x,p.y-a.y)

let t=((p.x-a.x)*(b.x-a.x)+(p.y-a.y)*(b.y-a.y))/l2

t=Math.max(0,Math.min(1,t))

let x=a.x+t*(b.x-a.x)
let y=a.y+t*(b.y-a.y)

return Math.hypot(p.x-x,p.y-y)

}

function cerrar(){

if(puntos.length<3)return

cerrado=true

calcularDatos()

dibujar()

}

function deshacer(){

if(cerrado)return

puntos.pop()

dibujar()

}

function reiniciar(){

puntos=[]
cerrado=false
arrastrando=null

document.getElementById("datos").innerHTML=""

dibujar()

}

function angulo(a,b,c){

let ang=Math.atan2(c.y-b.y,c.x-b.x)-Math.atan2(a.y-b.y,a.x-b.x)

ang=ang*180/Math.PI

if(ang<0)ang+=360

return ang

}

function cuadricula(){

let metro=escala()
let fino=metro/10

for(let x=0;x<canvas.width;x+=fino){

ctx.beginPath()
ctx.strokeStyle=(x%metro==0)?"#cfcfcf":"#e6e6e6"
ctx.moveTo(x,0)
ctx.lineTo(x,canvas.height)
ctx.stroke()

}

for(let y=0;y<canvas.height;y+=fino){

ctx.beginPath()
ctx.strokeStyle=(y%metro==0)?"#cfcfcf":"#e6e6e6"
ctx.moveTo(0,y)
ctx.lineTo(canvas.width,y)
ctx.stroke()

}

}

function dibujar(){

ctx.clearRect(0,0,canvas.width,canvas.height)

cuadricula()

if(puntos.length){

ctx.beginPath()

ctx.moveTo(puntos[0].x,puntos[0].y)

for(let i=1;i<puntos.length;i++){

ctx.lineTo(puntos[i].x,puntos[i].y)

}

if(cerrado){

ctx.closePath()

ctx.fillStyle="rgba(0,120,255,0.15)"

ctx.fill()

}

ctx.strokeStyle="#2b83ff"
ctx.lineWidth=2
ctx.stroke()

}

for(let p of puntos){

ctx.beginPath()
ctx.arc(p.x,p.y,5,0,Math.PI*2)
ctx.fillStyle="red"
ctx.fill()

}

if(puntos.length && !cerrado){

let p=puntos[puntos.length-1]

ctx.beginPath()
ctx.moveTo(p.x,p.y)
ctx.lineTo(mouse.x,mouse.y)
ctx.setLineDash([5,5])
ctx.stroke()
ctx.setLineDash([])

let d=Math.hypot(mouse.x-p.x,mouse.y-p.y)/escala()

ctx.fillStyle="black"
ctx.fillText(d.toFixed(2)+" m",mouse.x+10,mouse.y-10)

}

if(arrastrando!=null){

let p=puntos[arrastrando]

let prev=puntos[(arrastrando-1+puntos.length)%puntos.length]
let next=puntos[(arrastrando+1)%puntos.length]

if(prev && next){

let ang=angulo(prev,p,next)

ctx.fillStyle="black"
ctx.fillText(ang.toFixed(1)+"°",p.x+10,p.y-10)

}

}

}

function calcularDatos(){

let area=0
let per=0

for(let i=0;i<puntos.length;i++){

let j=(i+1)%puntos.length

area+=puntos[i].x*puntos[j].y-puntos[j].x*puntos[i].y

per+=Math.hypot(
puntos[i].x-puntos[j].x,
puntos[i].y-puntos[j].y
)

}

area=Math.abs(area/2)/(escala()*escala())
per=per/escala()

document.getElementById("datos").innerHTML=
"Área: "+area.toFixed(2)+" m²<br>Perímetro: "+per.toFixed(2)+" m"

}

dibujar()

</script>

</body>
</html>
