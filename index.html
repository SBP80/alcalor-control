<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ALLCALOR PRO</title>
<style>
body{font-family:Arial;background:#0f172a;color:white;margin:0;}
header{background:#1e293b;padding:15px;text-align:center;font-weight:bold;}
.container{padding:20px;max-width:1000px;margin:auto;}
input,select{width:100%;padding:8px;margin:6px 0 12px 0;border-radius:5px;border:none;}
button{background:#2563eb;color:white;border:none;padding:10px 20px;border-radius:5px;cursor:pointer;}
canvas{background:white;margin-top:20px;border-radius:8px;}
.resultado{margin-top:15px;font-size:18px;font-weight:bold;}
</style>
</head>
<body>

<header>ALLCALOR - GENERADOR PROFESIONAL REAL</header>

<div class="container">

<label>Largo estancia (m)</label>
<input type="number" id="largo" step="0.1">

<label>Ancho estancia (m)</label>
<input type="number" id="ancho" step="0.1">

<label>Separación (cm)</label>
<select id="paso">
<option value="10">10</option>
<option value="15">15</option>
<option value="20">20</option>
</select>

<button onclick="generarPlano()">Generar plano</button>

<canvas id="plano" width="900" height="650"></canvas>
<div class="resultado" id="resultado"></div>

</div>

<script>
function generarPlano(){

const largo = parseFloat(document.getElementById("largo").value);
const ancho = parseFloat(document.getElementById("ancho").value);
const paso = parseFloat(document.getElementById("paso").value)/100;

if(!largo || !ancho) return;

const canvas = document.getElementById("plano");
const ctx = canvas.getContext("2d");
ctx.clearRect(0,0,canvas.width,canvas.height);

const margen=80;
const escala=Math.min((canvas.width-margen*2)/largo,(canvas.height-margen*2)/ancho);

const largoPx=largo*escala;
const anchoPx=ancho*escala;
const pasoPx=paso*escala;

const maxCircuito=100;
const superficie=largo*ancho;
const metrosEstimados=superficie*(1/paso);
const circuitos=Math.ceil(metrosEstimados/maxCircuito);

const colores=["red","blue","green","orange","purple","brown"];

const zonaAltura=anchoPx/circuitos;

let resultadoHTML="Superficie: "+superficie.toFixed(1)+" m²<br>";
resultadoHTML+="Circuitos: "+circuitos+"<br><br>";

for(let c=0;c<circuitos;c++){

let xMin=margen;
let xMax=margen+largoPx;
let yMin=margen+c*zonaAltura;
let yMax=margen+(c+1)*zonaAltura;

let metros=0;

ctx.strokeStyle=colores[c%colores.length];
ctx.lineWidth=2;
ctx.beginPath();

// salida horizontal desde colector
ctx.moveTo(margen-30,yMin+10);
ctx.lineTo(xMin,yMin+10);

while((xMax-xMin)>pasoPx*2 && (yMax-yMin)>pasoPx*2){

// ida →
ctx.lineTo(xMax,yMin);
metros+=largo;

// bajar
yMin+=pasoPx;

// retorno ←
ctx.lineTo(xMin,yMin);
metros+=largo;

// bajar
yMin+=pasoPx;
}

// retorno al colector
ctx.lineTo(margen-30,yMin);

ctx.stroke();

resultadoHTML+="Circuito "+(c+1)+": "+metros.toFixed(1)+" m<br>";
}

// colector
ctx.strokeStyle="black";
ctx.lineWidth=4;
ctx.beginPath();
ctx.moveTo(margen-30,margen);
ctx.lineTo(margen-30,margen+anchoPx);
ctx.stroke();

document.getElementById("resultado").innerHTML=resultadoHTML;
}
</script>

</body>
</html>
