<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ALLCALOR PRO - Motor Hidráulico Real 5.1</title>

<style>
body{
    font-family:Arial;
    background:#0f172a;
    color:white;
    margin:0;
    padding:20px;
}
h1{text-align:center;}
.panel{
    background:#1e293b;
    padding:20px;
    border-radius:8px;
    margin-bottom:20px;
}
input, select{
    width:100%;
    padding:8px;
    margin-bottom:10px;
}
button{
    background:#2563eb;
    color:white;
    border:none;
    padding:10px;
    cursor:pointer;
}
canvas{
    background:white;
    border-radius:8px;
}
.resultado{margin-top:20px;}
</style>
</head>

<body>

<h1>ALLCALOR PRO – Motor Hidráulico Real 5.1</h1>

<div class="panel">
<label>Largo estancia (m)</label>
<input type="number" id="inputLargo" value="5">

<label>Ancho estancia (m)</label>
<input type="number" id="inputAncho" value="6">

<label>Separación (cm)</label>
<select id="inputPaso">
<option value="0.10">10</option>
<option value="0.15">15</option>
<option value="0.20">20</option>
<option value="0.05">5 (Baños)</option>
</select>

<label>Máx metros por circuito</label>
<input type="number" id="inputMaxMetro" value="100">

<label>Pared colector</label>
<select id="inputPared">
<option value="izquierda">Izquierda</option>
<option value="derecha">Derecha</option>
</select>

<button onclick="generar()">Generar plano</button>
</div>

<canvas id="plano" width="900" height="600"></canvas>
<div class="resultado" id="resultado"></div>

<script>

function generar(){

const largo=parseFloat(document.getElementById("inputLargo").value);
const ancho=parseFloat(document.getElementById("inputAncho").value);
const paso=parseFloat(document.getElementById("inputPaso").value);
const maxMetro=parseFloat(document.getElementById("inputMaxMetro").value);
const pared=document.getElementById("inputPared").value;

const superficie=largo*ancho;
const longitudTotal=superficie/paso;
const circuitos=Math.ceil(longitudTotal/maxMetro);

const canvas=document.getElementById("plano");
const ctx=canvas.getContext("2d");
ctx.clearRect(0,0,canvas.width,canvas.height);

const margin=60;
const escala=Math.min((canvas.width-200)/largo,(canvas.height-200)/ancho);

const largoPx=largo*escala;
const anchoPx=ancho*escala;

ctx.lineWidth=3;
ctx.strokeStyle="black";
ctx.strokeRect(margin,margin,largoPx,anchoPx);

// colector
const colectorX=pared==="izquierda"?margin-30:margin+largoPx+30;
ctx.lineWidth=6;
ctx.beginPath();
ctx.moveTo(colectorX,margin);
ctx.lineTo(colectorX,margin+anchoPx);
ctx.stroke();

const pasoPx=paso*escala;
const anchoCircuito=largoPx/circuitos;

let html="";
html+="Superficie: "+superficie.toFixed(1)+" m²<br>";
html+="Longitud total estimada: "+longitudTotal.toFixed(1)+" m<br>";
html+="Circuitos: "+circuitos+"<br><br>";

for(let c=0;c<circuitos;c++){

const inicioX=margin+(c*anchoCircuito);
const finX=inicioX+anchoCircuito;

let x1=inicioX;
let y1=margin;
let x2=finX;
let y2=margin+anchoPx;

ctx.strokeStyle=`hsl(${c*100},70%,50%)`;
ctx.lineWidth=2;
ctx.beginPath();

let longitudCircuito=0;

while(x1<x2 && y1<y2){

ctx.moveTo(x1,y1);
ctx.lineTo(x2,y1);
ctx.lineTo(x2,y2);
ctx.lineTo(x1,y2);

longitudCircuito+=((x2-x1)+(y2-y1))*2/escala;

x1+=pasoPx;
y1+=pasoPx;
x2-=pasoPx;
y2-=pasoPx;
}

ctx.stroke();

// conexión colector
ctx.beginPath();
ctx.moveTo(colectorX,margin+(c*20));
ctx.lineTo(inicioX,margin);
ctx.stroke();

html+="Circuito "+(c+1)+": "+longitudCircuito.toFixed(1)+" m<br>";

}

document.getElementById("resultado").innerHTML=html;

}

</script>
</body>
</html>
