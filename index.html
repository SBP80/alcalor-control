<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ALLCALOR PRO</title>

<style>

body{
font-family:Arial;
background:#0f2b44;
color:white;
margin:0;
padding:20px;
}

h1{text-align:center;}

.panel{
background:#12314a;
padding:15px;
border-radius:8px;
margin-bottom:15px;
}

button{
background:#2b83ff;
color:white;
border:none;
padding:8px 12px;
cursor:pointer;
margin-right:8px;
}

canvas{
background:#f4f1e8;
border-radius:8px;
display:block;
margin:auto;
}

input{
padding:6px;
width:120px;
}

</style>
</head>

<body>

<h1>ALLCALOR PRO - Motor Geométrico</h1>

<div class="panel">

Nombre estancia
<input id="nombreEstancia" value="habitacion 1">

<br><br>

Escala: 1m =
<input type="number" id="escalaInput" value="100">

px

Separación tubo (cm)
<input type="number" id="pasoInput" value="10">

<br><br>

<button onclick="cerrarPoligono()">Cerrar estancia</button>
<button onclick="deshacer()">Deshacer</button>
<button onclick="reiniciar()">Reiniciar</button>
<button onclick="modoColector()">Colocar colector</button>
<button onclick="modoPuerta()">Colocar puerta</button>

<div id="datos"></div>

</div>

<canvas id="canvas" width="1000" height="600"></canvas>

<script>

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

let puntos=[]
let cerrado=false

let mouse={x:0,y:0}

let arrastrandoPunto=null
let arrastrandoPuerta=null
let arrastrandoColector=false

let puertaSeleccionada=null

let colector=null
let modo_col=false

let modo_puerta=false

let puertas=[]

document.addEventListener("keydown",e=>{

if(puertaSeleccionada!=null){

if(e.key==="r"){

puertas[puertaSeleccionada].rot+=Math.PI/2
dibujar()

}

if(e.key==="f"){

puertas[puertaSeleccionada].lado*=-1
dibujar()

}

}

})

canvas.addEventListener("wheel",e=>{

if(puertaSeleccionada!=null){

puertas[puertaSeleccionada].ancho+=e.deltaY>0?-5:5

if(puertas[puertaSeleccionada].ancho<30)
puertas[puertaSeleccionada].ancho=30

dibujar()

}

})

canvas.addEventListener("mousemove",e=>{

const rect=canvas.getBoundingClientRect()

mouse.x=e.clientX-rect.left
mouse.y=e.clientY-rect.top

if(arrastrandoPunto!=null){

puntos[arrastrandoPunto].x=mouse.x
puntos[arrastrandoPunto].y=mouse.y

dibujar()
return
}

if(arrastrandoColector){

colector.x=mouse.x
colector.y=mouse.y

dibujar()
return
}

if(arrastrandoPuerta!=null){

puertas[arrastrandoPuerta].x=mouse.x
puertas[arrastrandoPuerta].y=mouse.y

dibujar()
return
}

dibujar()

})

canvas.addEventListener("mousedown",e=>{

const rect=canvas.getBoundingClientRect()

let x=e.clientX-rect.left
let y=e.clientY-rect.top

for(let i=0;i<puntos.length;i++){

if(Math.hypot(x-puntos[i].x,y-puntos[i].y)<8){

arrastrandoPunto=i
return

}

}

if(colector){

if(x>colector.x && x<colector.x+colector.w &&
   y>colector.y && y<colector.y+colector.h){

arrastrandoColector=true
return

}

}

for(let i=0;i<puertas.length;i++){

if(Math.hypot(x-puertas[i].x,y-puertas[i].y)<10){

arrastrandoPuerta=i
puertaSeleccionada=i
return

}

}

})

canvas.addEventListener("mouseup",()=>{

arrastrandoPunto=null
arrastrandoPuerta=null
arrastrandoColector=false

})

canvas.addEventListener("click",e=>{

const rect=canvas.getBoundingClientRect()

let x=e.clientX-rect.left
let y=e.clientY-rect.top

if(modo_col){

colector={x,y,w:80,h:40}
modo_col=false
dibujar()
return

}

if(modo_puerta){

puertas.push({
x,y,
ancho:80,
rot:0,
lado:1
})

modo_puerta=false
dibujar()
return

}

if(cerrado)return

puntos.push({x,y})

dibujar()

})

function modoColector(){

modo_col=true

}

function modoPuerta(){

modo_puerta=true

}

function cerrarPoligono(){

if(puntos.length<3)return

cerrado=true

calcularDatos()

dibujar()

}

function deshacer(){

if(cerrado)return

puntos.pop()

dibujar()

}

function reiniciar(){

puntos=[]
puertas=[]
colector=null
cerrado=false

document.getElementById("datos").innerHTML=""

dibujar()

}

function getEscala(){

return parseFloat(document.getElementById("escalaInput").value)

}

function dibujarCuadricula(){

let escala=getEscala()

let fino=escala/10
let metro=escala

for(let x=0;x<canvas.width;x+=fino){

ctx.beginPath()
ctx.strokeStyle=(x%metro==0)?"#cfcfcf":"#e7e7e7"
ctx.moveTo(x,0)
ctx.lineTo(x,canvas.height)
ctx.stroke()

}

for(let y=0;y<canvas.height;y+=fino){

ctx.beginPath()
ctx.strokeStyle=(y%metro==0)?"#cfcfcf":"#e7e7e7"
ctx.moveTo(0,y)
ctx.lineTo(canvas.width,y)
ctx.stroke()

}

}

function dibujar(){

ctx.clearRect(0,0,canvas.width,canvas.height)

dibujarCuadricula()

if(puntos.length){

ctx.beginPath()
ctx.moveTo(puntos[0].x,puntos[0].y)

for(let i=1;i<puntos.length;i++)
ctx.lineTo(puntos[i].x,puntos[i].y)

if(cerrado){

ctx.closePath()
ctx.fillStyle="rgba(0,120,255,0.15)"
ctx.fill()

}

ctx.strokeStyle="#2b83ff"
ctx.lineWidth=2
ctx.stroke()

}

for(let p of puntos){

ctx.beginPath()
ctx.arc(p.x,p.y,5,0,Math.PI*2)
ctx.fillStyle="red"
ctx.fill()

}

if(!cerrado && puntos.length){

let p=puntos[puntos.length-1]

ctx.beginPath()
ctx.moveTo(p.x,p.y)
ctx.lineTo(mouse.x,mouse.y)
ctx.setLineDash([5,5])
ctx.stroke()
ctx.setLineDash([])

let dx=mouse.x-p.x
let dy=mouse.y-p.y

let dist=Math.hypot(dx,dy)/getEscala()

ctx.fillStyle="black"
ctx.fillText(dist.toFixed(2)+" m",mouse.x+10,mouse.y-10)

}

for(let puerta of puertas){

let dx=Math.cos(puerta.rot)*puerta.ancho/2
let dy=Math.sin(puerta.rot)*puerta.ancho/2

ctx.strokeStyle="brown"
ctx.lineWidth=4

ctx.beginPath()
ctx.moveTo(puerta.x-dx,puerta.y-dy)
ctx.lineTo(puerta.x+dx,puerta.y+dy)
ctx.stroke()

ctx.beginPath()
ctx.arc(
puerta.x,
puerta.y,
puerta.ancho,
puerta.rot,
puerta.rot+puerta.lado*Math.PI/2
)

ctx.strokeStyle="#888"
ctx.stroke()

}

if(colector){

ctx.fillStyle="orange"
ctx.fillRect(colector.x,colector.y,colector.w,colector.h)

ctx.fillStyle="black"
ctx.fillText("Colector",colector.x,colector.y-5)

}

}

function calcularDatos(){

let area=0
let per=0

for(let i=0;i<puntos.length;i++){

let j=(i+1)%puntos.length

area+=puntos[i].x*puntos[j].y-puntos[j].x*puntos[i].y

per+=Math.hypot(
puntos[i].x-puntos[j].x,
puntos[i].y-puntos[j].y
)

}

area=Math.abs(area/2)/(getEscala()*getEscala())
per=per/getEscala()

document.getElementById("datos").innerHTML=

document.getElementById("nombreEstancia").value+
"<br>Área: "+area.toFixed(2)+" m²"+
"<br>Perímetro: "+per.toFixed(2)+" m"

}

dibujar()

</script>

</body>
</html>
