<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>🔥 ALLCALOR PRO</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f2b44;
color:white;
padding:10px;
}

h1{
text-align:center;
}

.toolbar{
background:#12314a;
padding:10px;
border-radius:8px;
margin-bottom:10px;
}

button{
border:none;
padding:8px 12px;
margin-right:6px;
border-radius:5px;
font-weight:bold;
cursor:pointer;
}

.green{background:#28a745}
.blue{background:#2b83ff}
.orange{background:#ff9800}
.red{background:#e53935}

#layout{
display:flex;
gap:10px;
}

#panel{
width:220px;
background:#12314a;
padding:10px;
border-radius:8px;
}

canvas{
background:#f4f1e8;
border-radius:8px;
cursor:crosshair;
}

#canvasBox{
position:relative;
}

#hud{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.6);
padding:6px 12px;
border-radius:6px;
font-weight:bold;
}

</style>
</head>

<body>

<h1>🔥 ALLCALOR PRO</h1>

<div class="toolbar">

Escala
<input id="scale" type="number" value="100" style="width:70px">

<button class="green" onclick="newRoom()">Nueva estancia</button>
<button class="blue" onclick="closeRoom()">Cerrar estancia</button>
<button class="orange" onclick="undo()">Deshacer</button>
<button class="red" onclick="reset()">Reiniciar</button>

</div>

<div id="layout">

<div id="panel">

<b>ESTANCIAS</b>
<div id="rooms"></div>

<hr>

<div id="total"></div>

</div>

<div id="canvasBox">

<div id="hud">0 m | 0°</div>

<canvas id="canvas" width="1100" height="650"></canvas>

</div>

</div>

<script>

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

let rooms=[]
let current=[]
let drawing=true

let zoom=1
let offsetX=0
let offsetY=0

let mouse={x:0,y:0}

let dragPoint=null
let dragRoom=null

function scale(){
return parseFloat(document.getElementById("scale").value)
}

function screenToWorld(x,y){

return{
x:(x-offsetX)/zoom,
y:(y-offsetY)/zoom
}

}

function worldToScreen(x,y){

return{
x:x*zoom+offsetX,
y:y*zoom+offsetY
}

}

canvas.addEventListener("mousedown",e=>{

const rect=canvas.getBoundingClientRect()

const x=e.clientX-rect.left
const y=e.clientY-rect.top

const p=screenToWorld(x,y)

mouse=p

if(drawing){

current.push(p)

draw()

return

}

})

canvas.addEventListener("mousemove",e=>{

const rect=canvas.getBoundingClientRect()

const x=e.clientX-rect.left
const y=e.clientY-rect.top

mouse=screenToWorld(x,y)

draw()

})

canvas.addEventListener("wheel",e=>{

const scaleFactor=1.1

const mouseX=e.offsetX
const mouseY=e.offsetY

const wx=(mouseX-offsetX)/zoom
const wy=(mouseY-offsetY)/zoom

zoom*=e.deltaY<0?scaleFactor:1/scaleFactor

offsetX=mouseX-wx*zoom
offsetY=mouseY-wy*zoom

draw()

})

function newRoom(){

drawing=true
current=[]

}

function closeRoom(){

if(current.length<3)return

rooms.push({
name:"h"+(rooms.length+1),
v:[...current]
})

current=[]
drawing=false

updatePanel()
draw()

}

function undo(){

current.pop()
draw()

}

function reset(){

rooms=[]
current=[]
drawing=true

updatePanel()
draw()

}

function area(poly){

let a=0

for(let i=0;i<poly.length;i++){

let j=(i+1)%poly.length

a+=poly[i].x*poly[j].y
a-=poly[j].x*poly[i].y

}

return Math.abs(a/2)/(scale()*scale())

}

function perimeter(poly){

let p=0

for(let i=0;i<poly.length;i++){

let j=(i+1)%poly.length

p+=Math.hypot(poly[j].x-poly[i].x,poly[j].y-poly[i].y)

}

return p/scale()

}

function updatePanel(){

let html=""
let total=0

for(let r of rooms){

let a=area(r.v)
let p=perimeter(r.v)

total+=a

html+=`
<div>
<b>${r.name}</b><br>
Área: ${a.toFixed(2)} m²<br>
Perímetro: ${p.toFixed(2)} m
</div><br>
`

}

document.getElementById("rooms").innerHTML=html
document.getElementById("total").innerHTML="Total: "+total.toFixed(2)+" m²"

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

for(let r of rooms){

ctx.beginPath()

let p0=worldToScreen(r.v[0].x,r.v[0].y)
ctx.moveTo(p0.x,p0.y)

for(let i=1;i<r.v.length;i++){

let p=worldToScreen(r.v[i].x,r.v[i].y)
ctx.lineTo(p.x,p.y)

}

ctx.closePath()

ctx.fillStyle="rgba(0,120,255,0.2)"
ctx.fill()

ctx.strokeStyle="#2b83ff"
ctx.lineWidth=2
ctx.stroke()

}

if(current.length){

for(let v of current){

let p=worldToScreen(v.x,v.y)

ctx.beginPath()
ctx.arc(p.x,p.y,5,0,Math.PI*2)
ctx.fillStyle="red"
ctx.fill()

}

let last=current[current.length-1]

let p1=worldToScreen(last.x,last.y)
let p2=worldToScreen(mouse.x,mouse.y)

ctx.setLineDash([6,6])

ctx.beginPath()
ctx.moveTo(p1.x,p1.y)
ctx.lineTo(p2.x,p2.y)
ctx.stroke()

ctx.setLineDash([])

let dist=Math.hypot(mouse.x-last.x,mouse.y-last.y)/scale()

document.getElementById("hud").innerText=dist.toFixed(2)+" m"

}

}

draw()

</script>

</body>
</html>
