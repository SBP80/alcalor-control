   176	function puntoSobreSegmento(px,py,a,b){
   177	  const cross = Math.abs((py-a.y)*(b.x-a.x) - (px-a.x)*(b.y-a.y));
   178	  if(cross > 0.8) return false;
   179	
   180	  const dot = (px-a.x)*(b.x-a.x) + (py-a.y)*(b.y-a.y);
   181	  if(dot < 0) return false;
   182	
   183	  const lenSq = (b.x-a.x)*(b.x-a.x) + (b.y-a.y)*(b.y-a.y);
   184	  if(dot > lenSq) return false;
   185	
   186	  return true;
   187	}

   222	function orient(a,b,c){

   228	function segmentosIntersectan(a,b,c,d){
   229	  const o1 = orient(a,b,c);

   231	  const o3 = orient(c,d,a);
   232	  const o4 = orient(c,d,b);
   233	
   234	  if(o1 !== o2 && o3 !== o4) return true;
   235	
   236	  if(o1 === 0 && puntoSobreSegmento(c.x,c.y,a,b)) return true;
   237	  if(o2 === 0 && puntoSobreSegmento(d.x,d.y,a,b)) return true;
   238	  if(o3 === 0 && puntoSobreSegmento(a.x,a.y,c,d)) return true;
   239	  if(o4 === 0 && puntoSobreSegmento(b.x,b.y,c,d)) return true;
   240	
   241	  return false;
   242	}

   244	function diagonalValida(i,j){
   245	  const a = puntos[i];
   246	  const b = puntos[j];
   247	
   248	  for(let k=0;k<puntos.length;k++){
   249	    const c = puntos[k];
   250	    const d = puntos[(k+1)%puntos.length];
   251	
   252	    const usaI = (k === i || (k+1)%puntos.length === i);
   253	    const usaJ = (k === j || (k+1)%puntos.length === j);
   254	    if(usaI || usaJ) continue;
   255	
   256	    if(segmentosIntersectan(a,b,c,d)) return false;
   257	  }
   258	
   259	  const muestras = 12;
   260	  for(let t=1;t<muestras;t++){
   261	    const s = t / muestras;
   262	    const x = a.x + (b.x - a.x) * s;
   263	    const y = a.y + (b.y - a.y) * s;
   264	    if(!puntoDentroPoligonoConBorde(x,y)) return false;
   265	  }
   266	
   267	  return true;
   268	}

   314	function angulo(a,b,c){
   315	  const abx = a.x - b.x;
   316	  const aby = a.y - b.y;
   317	  const cbx = c.x - b.x;
   318	  const cby = c.y - b.y;
   319	
   320	  const dot = abx * cbx + aby * cby;
   321	  const mag1 = Math.hypot(abx, aby);
   322	  const mag2 = Math.hypot(cbx, cby);
   323	
   324	  if(mag1 === 0 || mag2 === 0) return 0;
   325	
   326	  let cos = dot / (mag1 * mag2);
   327	  cos = Math.max(-1, Math.min(1, cos));
   328	
   329	  return Math.acos(cos) * 180 / Math.PI;
   330	}

   332	function etiqueta(texto,x,y,color){
   333	  const lineas = String(texto).split("\n");

   335	  ctx.font = "bold 14px Arial";
   336	  ctx.textAlign = "center";

   338	
   339	  let ancho = 0;
   340	  for(const linea of lineas){
   341	    ancho = Math.max(ancho, ctx.measureText(linea).width);
   342	  }
   343	  ancho += 28;
   344	
   345	  const altoLinea = 18;
   346	  const alto = Math.max(34, lineas.length * altoLinea + 16);
   347	
   348	  ctx.fillStyle = "rgba(255,255,255,0.96)";
   349	  ctx.fillRect(x - ancho/2, y - alto/2, ancho, alto);
   350	
   351	  ctx.strokeStyle = "rgba(0,0,0,0.12)";
   352	  ctx.strokeRect(x - ancho/2, y - alto/2, ancho, alto);
   353	
   354	  ctx.fillStyle = color;
   355	
   356	  if(lineas.length === 1){
   357	    ctx.fillText(lineas[0], x, y);
   358	  }else{
   359	    const inicioY = y - ((lineas.length - 1) * altoLinea) / 2;
   360	    for(let i=0;i<lineas.length;i++){
   361	      ctx.fillText(lineas[i], x, inicioY + i * altoLinea);
   362	    }
   363	  }
   364	
   365	  ctx.restore();
   366	  return {x, y, w: ancho, h: alto};
   367	}

   404	function editarMedidaLado(lado){
   405	  if(!cerrado || modoVerificacion) return;
   406	
   407	  const a = puntos[lado];
   408	  const bIndex = (lado + 1) % puntos.length;
   409	  const b = puntos[bIndex];
   410	  const actualM = metrosDesdePx(distancia(a,b));
   411	
   412	  const respuesta = prompt("Nueva medida del lado en metros", actualM.toFixed(2).replace(".", ","));
   413	  if(respuesta === null) return;
   414	
   415	  const nuevaM = Number(respuesta.replace(",", ".").trim());
   416	  if(!Number.isFinite(nuevaM) || nuevaM <= 0) return;
   417	
   418	  const nuevaPx = pxDesdeMetros(nuevaM);
   419	
   420	  const dx = b.x - a.x;
   421	  const dy = b.y - a.y;
   422	  const len = Math.hypot(dx,dy);
   423	  if(len <= 0.0001) return;
   424	
   425	  const ux = dx / len;
   426	  const uy = dy / len;
   427	
   428	  b.x = a.x + ux * nuevaPx;
   429	  b.y = a.y + uy * nuevaPx;
   430	
   431	  calcularDiagonales();
   432	  dibujar();
   433	}

   583	  texto += " Â· Escala: 1 m = " + pxPorMetro.toFixed(1).replace(".", ",") + " px";

   599	function dibujar(){
   600	  ctx.clearRect(0,0,canvas.width,canvas.height);
   601	  etiquetasLados = [];
   602	  etiquetaDiagonal = null;
   603	
   604	  if(puntos.length > 1){
   605	    ctx.beginPath();
   606	    ctx.moveTo(puntos[0].x, puntos[0].y);
   607	    for(let i=1;i<puntos.length;i++){
   608	      ctx.lineTo(puntos[i].x, puntos[i].y);
   609	    }
   610	
   611	    if(cerrado){
   612	      ctx.closePath();
   613	      ctx.fillStyle = "rgba(249,115,22,0.10)";
   614	      ctx.fill();
   615	    }
   616	
   617	    ctx.strokeStyle = "#f97316";
   618	    ctx.lineWidth = 3;
   619	    ctx.stroke();
   620	  }
   621	
   622	  if(!fijado){
   623	    for(let i=0;i<puntos.length;i++){
   624	      const p = puntos[i];
   625	      ctx.beginPath();
   626	
   627	      if(i === 0 && !cerrado && puntos.length >= 3){
   628	        ctx.arc(p.x,p.y,10,0,Math.PI*2);
   629	        ctx.fillStyle = "#16a34a";
   630	        ctx.fill();
   631	        ctx.strokeStyle = "#ffffff";
   632	        ctx.lineWidth = 3;
   633	        ctx.stroke();
   634	      }else{
   635	        ctx.arc(p.x,p.y,7,0,Math.PI*2);
   636	        ctx.fillStyle = "#000000";
   637	        ctx.fill();
   638	      }
   639	    }
   640	  }
   641	
   642	  if(cerrado){
   643	    generarEtiquetasLados();
   644	
   645	    for(let i=0;i<puntos.length;i++){
   646	      const a = puntos[(i-1+puntos.length)%puntos.length];
   647	      const b = puntos[i];
   648	      const c = puntos[(i+1)%puntos.length];
   649	      ctx.fillStyle = "green";
   650	      ctx.font = "14px Arial";
   651	      ctx.textAlign = "center";
   652	      ctx.fillText(Math.round(angulo(a,b,c)) + "Â°", b.x + 20, b.y - 10);
   653	    }
   654	  }
   655	
   656	  dibujarNombreYPlanta();
   657	  dibujarDiagonal();
   658	  dibujarCalibracion();
   659	  actualizarBotones();
   660	  actualizarInfo();
   661	}

   663	function empezarCalibracion(){
   664	  if(!cerrado || puntos.length < 2) return;
   665	  calibrando = true;
   666	  modoMover = false;
   667	  modoVerificacion = false;
   668	  verticesCalibracion = [];
   669	  dibujar();
   670	}
   671	
   672	function terminarCalibracion(){
   673	  if(verticesCalibracion.length !== 2) return;
   674	
   675	  const a = puntos[verticesCalibracion[0]];
   676	  const b = puntos[verticesCalibracion[1]];
   677	  const largoPx = distancia(a,b);
   678	
   679	  if(largoPx < 10){
   680	    calibrando = false;
   681	    verticesCalibracion = [];
   682	    dibujar();
   683	    return;
   684	  }
   685	
   686	  const respuesta = prompt("Distancia real en metros", "");
   687	  if(respuesta === null){
   688	    calibrando = false;
   689	    verticesCalibracion = [];
   690	    dibujar();
   691	    return;
   692	  }
   693	
   694	  const realM = Number(respuesta.replace(",", ".").trim());
   695	  if(!Number.isFinite(realM) || realM <= 0){
   696	    calibrando = false;
   697	    verticesCalibracion = [];
   698	    dibujar();
   699	    return;
   700	  }
   701	
   702	  pxPorMetro = largoPx / realM;
   703	  calibrando = false;
   704	  verticesCalibracion = [];
   705	  dibujar();
   706	}

   708	function onPointerDown(e){
   709	  e.preventDefault();
   710	  canvas.setPointerCapture(e.pointerId);
   711	
   712	  if(fijado && !calibrando) return;
   713	
   714	  const p = pos(e);
   715	  pointerActivo = true;
   716	  arrastrandoPunto = false;
   717	  moviendoFigura = false;
   718	  indicePunto = buscarPunto(p.x,p.y);
   719	
   720	  startX = p.x;
   721	  startY = p.y;
   722	  lastX = p.x;
   723	  lastY = p.y;
   724	
   725	  if(calibrando) return;
   726	
   727	  if(modoMover && cerrado && puntoDentroPoligonoConBorde(p.x,p.y)){
   728	    moviendoFigura = true;
   729	    indicePunto = -1;
   730	  }
   731	}
   732	
   733	function onPointerMove(e){
   734	  if(!pointerActivo || fijado || calibrando) return;
   735	
   736	  const p = pos(e);
   737	
   738	  if(moviendoFigura){
   739	    const dx = p.x - lastX;
   740	    const dy = p.y - lastY;
   741	    moverFigura(dx,dy);
   742	    lastX = p.x;
   743	    lastY = p.y;
   744	    calcularDiagonales();
   745	    dibujar();
   746	    return;
   747	  }
   748	
   749	  if(indicePunto !== -1){
   750	    if(distanciaXY(startX,startY,p.x,p.y) > UMBRAL_ARRASTRE){
   751	      arrastrandoPunto = true;
   752	    }
   753	
   754	    if(arrastrandoPunto){
   755	      puntos[indicePunto].x = p.x;
   756	      puntos[indicePunto].y = p.y;
   757	      if(cerrado) calcularDiagonales();
   758	      dibujar();
   759	    }
   760	  }
   761	}
   762	
   763	function onPointerUp(e){
   764	  if(!pointerActivo) return;
   765	  e.preventDefault();
   766	
   767	  const p = pos(e);
   768	  const movimiento = distanciaXY(startX, startY, p.x, p.y);
   769	
   770	  if(calibrando){
   771	    const idx = buscarPunto(p.x,p.y);
   772	    if(idx !== -1){
   773	      if(verticesCalibracion.length === 0){
   774	        verticesCalibracion.push(idx);
   775	      }else if(verticesCalibracion.length === 1 && idx !== verticesCalibracion[0]){
   776	        verticesCalibracion.push(idx);
   777	        terminarCalibracion();
   778	      }
   779	    }
   780	    pointerActivo = false;
   781	    dibujar();
   782	    return;
   783	  }
   784	
   785	  if(moviendoFigura){
   786	    pointerActivo = false;
   787	    moviendoFigura = false;
   788	    indicePunto = -1;
   789	    calcularDiagonales();
   790	    dibujar();
   791	    return;
   792	  }
   793	
   794	  if(!arrastrandoPunto && movimiento <= UMBRAL_TOQUE){
   795	    if(modoVerificacion && etiquetaDiagonal){
   796	      const margen = 22;
   797	      if(
   798	        p.x >= etiquetaDiagonal.x - etiquetaDiagonal.w/2 - margen &&
   799	        p.x <= etiquetaDiagonal.x + etiquetaDiagonal.w/2 + margen &&
   800	        p.y >= etiquetaDiagonal.y - etiquetaDiagonal.h/2 - margen &&
   801	        p.y <= etiquetaDiagonal.y + etiquetaDiagonal.h/2 + margen
   802	      ){
   803	        pointerActivo = false;
   804	        arrastrandoPunto = false;
   805	        moviendoFigura = false;
   806	        indicePunto = -1;
   807	        editarDiagonal();
   808	        return;
   809	      }
   810	    }
   811	
   812	    const i = buscarPunto(p.x,p.y);
   813	
   814	    if(i === 0 && puntos.length >= 3 && !cerrado){
   815	      cerrado = true;
   816	      calcularDiagonales();
   817	    }else if(i === -1 && !cerrado){
   818	      puntos.push({x:p.x,y:p.y});
   819	    }else if(i === -1 && cerrado && !modoMover && !modoVerificacion){
   820	      const lado = buscarEtiquetaLado(p.x,p.y);
   821	      if(lado !== -1){
   822	        pointerActivo = false;
   823	        editarMedidaLado(lado);
   824	        return;
   825	      }
   826	    }
   827	  }
   828	
   829	  pointerActivo = false;
   830	  arrastrandoPunto = false;
   831	  indicePunto = -1;
   832	  dibujar();
   833	}
