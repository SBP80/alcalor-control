<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>🔥 ALLCALOR PRO</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f2b44;
color:white;
}

h1{
text-align:center;
margin:10px 0;
}

.panel{
display:flex;
gap:8px;
flex-wrap:wrap;
background:#12314a;
padding:10px;
border-radius:8px;
margin:10px;
}

button{
border:none;
padding:8px 12px;
border-radius:4px;
font-weight:bold;
cursor:pointer;
}

.new{background:#28a745}
.close{background:#2b83ff}
.undo{background:#ff9800}
.reset{background:#e53935}
.nav{background:#444}

#layout{
display:flex;
gap:10px;
margin:10px;
}

#roomsPanel{
width:220px;
background:#12314a;
padding:10px;
border-radius:8px;
}

#canvasBox{
position:relative;
}

canvas{
background:#f4f1e8;
border-radius:8px;
cursor:crosshair;
}

#hud{
position:absolute;
top:6px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.7);
padding:6px 14px;
border-radius:6px;
font-weight:bold;
}

.len{color:#00e676}
.ang{color:#ff9800}

#cursorHUD{
position:absolute;
pointer-events:none;
background:rgba(0,0,0,0.7);
padding:4px 8px;
border-radius:4px;
font-size:13px;
}

</style>
</head>

<body>

<h1>🔥 ALLCALOR PRO</h1>

<div class="panel">

Escala
<input id="scale" type="number" value="100">

<button class="new" onclick="newRoom()">Nueva estancia</button>
<button class="close" onclick="closeRoom()">Cerrar estancia</button>
<button class="undo" onclick="undo()">Deshacer</button>
<button class="reset" onclick="resetAll()">Reiniciar</button>

<button class="nav" onclick="zoom(1.2)">+</button>
<button class="nav" onclick="zoom(0.8)">−</button>
<button class="nav" onclick="center()">⛶</button>
<button class="nav" onclick="moveMode=!moveMode">🖐</button>

</div>

<div id="layout">

<div id="roomsPanel">
<b>ESTANCIAS</b>
<div id="rooms"></div>
<hr>
<div id="total"></div>
</div>

<div id="canvasBox">

<div id="hud">
<span class="len">0 m</span> |
<span class="ang">0°</span>
</div>

<div id="cursorHUD"></div>

<canvas id="canvas" width="1100" height="650"></canvas>

</div>
</div>

<script>

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

let camera={x:0,y:0,zoom:1}

let rooms=[]
let current=[]
let drawing=true

let mouse={x:0,y:0}

let dragVertex=null
let dragRoom=null
let moveMode=false
let draggingCanvas=false

function scale(){
return parseFloat(document.getElementById("scale").value)
}

function screenToWorld(x,y){
return{
x:(x-camera.x)/camera.zoom,
y:(y-camera.y)/camera.zoom
}
}

function getMouse(e){
const r=canvas.getBoundingClientRect()
return screenToWorld(e.clientX-r.left,e.clientY-r.top)
}

canvas.onmousedown=e=>{

let p=getMouse(e)
mouse=p

if(moveMode){
draggingCanvas=true
return
}

if(drawing){
current.push(p)
draw()
return
}

for(let r of rooms){
for(let v of r.v){
if(Math.hypot(v.x-p.x,v.y-p.y)<10/camera.zoom){
dragVertex=v
return
}
}
}

for(let r of rooms){
if(pointInside(p,r.v)){
dragRoom={room:r,start:p}
return
}
}

}

canvas.onmousemove=e=>{

let p=getMouse(e)
mouse=p

updateHUD(e)

if(draggingCanvas){
camera.x+=e.movementX
camera.y+=e.movementY
draw()
return
}

if(dragVertex){
dragVertex.x=p.x
dragVertex.y=p.y
updateList()
draw()
}

if(dragRoom){

let dx=p.x-dragRoom.start.x
let dy=p.y-dragRoom.start.y

dragRoom.start=p

for(let v of dragRoom.room.v){
v.x+=dx
v.y+=dy
}

updateList()
draw()

}

draw()

}

canvas.onmouseup=()=>{
dragVertex=null
dragRoom=null
draggingCanvas=false
}

canvas.onwheel=e=>{
e.preventDefault()
let factor=e.deltaY>0?0.9:1.1
zoom(factor)
}

function zoom(f){
camera.zoom*=f
draw()
}

function center(){
camera.zoom=1
camera.x=0
camera.y=0
draw()
}

function newRoom(){
drawing=true
current=[]
}

function closeRoom(){

if(current.length<3)return

let name=prompt("Nombre estancia")

rooms.push({name:name||"estancia",v:[...current]})

current=[]
drawing=false

updateList()
draw()

}

function undo(){
current.pop()
draw()
}

function resetAll(){
rooms=[]
current=[]
drawing=true
updateList()
draw()
}

function area(p){

let a=0

for(let i=0;i<p.length;i++){
let j=(i+1)%p.length
a+=p[i].x*p[j].y
a-=p[j].x*p[i].y
}

return Math.abs(a/2)/(scale()*scale())

}

function per(p){

let s=0

for(let i=0;i<p.length;i++){
let j=(i+1)%p.length
s+=Math.hypot(p[j].x-p[i].x,p[j].y-p[i].y)
}

return s/scale()

}

function updateList(){

let html=""
let tot=0

for(let r of rooms){

let a=area(r.v)
let p=per(r.v)

tot+=a

html+=`<div>
<b>${r.name}</b><br>
Área: ${a.toFixed(2)} m²<br>
Perímetro: ${p.toFixed(2)} m
</div><br>`

}

document.getElementById("rooms").innerHTML=html
document.getElementById("total").innerHTML="<b>Total: "+tot.toFixed(2)+" m²</b>"

}

function angle(a,b,c){

let ang=Math.atan2(c.y-b.y,c.x-b.x)-Math.atan2(a.y-b.y,a.x-b.x)

ang=Math.abs(ang*180/Math.PI)

if(ang>180)ang=360-ang

return ang

}

function pointInside(p,poly){

let inside=false

for(let i=0,j=poly.length-1;i<poly.length;j=i++){

let xi=poly[i].x,yi=poly[i].y
let xj=poly[j].x,yj=poly[j].y

let intersect=((yi>p.y)!=(yj>p.y)) &&
(p.x<(xj-xi)*(p.y-yi)/(yj-yi)+xi)

if(intersect)inside=!inside

}

return inside

}

function updateHUD(e){

const cursor=document.getElementById("cursorHUD")

cursor.style.left=e.clientX+10+"px"
cursor.style.top=e.clientY+10+"px"

let last=null
let prev=null

if(current.length>0){
last=current[current.length-1]
prev=current[current.length-2]
}

if(dragVertex){
last=dragVertex
}

if(last){

let dist=Math.hypot(mouse.x-last.x,mouse.y-last.y)/scale()

let ang=0
if(prev){
ang=angle(prev,last,mouse)
}

document.querySelector(".len").innerText=dist.toFixed(2)+" m"
document.querySelector(".ang").innerText=ang.toFixed(1)+"°"

cursor.innerHTML=dist.toFixed(2)+" m | "+ang.toFixed(1)+"°"

}

}

function draw(){

ctx.setTransform(1,0,0,1,0,0)
ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.setTransform(camera.zoom,0,0,camera.zoom,camera.x,camera.y)

for(let r of rooms){

ctx.beginPath()
ctx.moveTo(r.v[0].x,r.v[0].y)

for(let i=1;i<r.v.length;i++){
ctx.lineTo(r.v[i].x,r.v[i].y)
}

ctx.closePath()

ctx.fillStyle="rgba(0,120,255,0.15)"
ctx.fill()

ctx.strokeStyle="#2b83ff"
ctx.lineWidth=2/camera.zoom
ctx.stroke()

for(let v of r.v){

ctx.beginPath()
ctx.arc(v.x,v.y,5/camera.zoom,0,Math.PI*2)
ctx.fillStyle="red"
ctx.fill()

}

}

if(current.length){

for(let v of current){

ctx.beginPath()
ctx.arc(v.x,v.y,5/camera.zoom,0,Math.PI*2)
ctx.fillStyle="red"
ctx.fill()

}

let last=current[current.length-1]

ctx.setLineDash([6/camera.zoom,6/camera.zoom])

ctx.beginPath()
ctx.moveTo(last.x,last.y)
ctx.lineTo(mouse.x,mouse.y)
ctx.stroke()

ctx.setLineDash([])

}

}

draw()

</script>

</body>
</html>
