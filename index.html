<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ALLCALOR CONTROL</title>

<style>

body{
margin:0;
background:#1c1c1c;
font-family:Arial;
color:white;
overflow:hidden;
}

#toolbar{
height:60px;
background:#2b2b2b;
display:flex;
align-items:center;
padding:10px;
gap:10px;
}

button{
padding:8px 14px;
border:none;
background:#444;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#666;
}

canvas{
background:#111;
display:block;
}

#info{
position:absolute;
right:10px;
top:70px;
background:#2b2b2b;
padding:12px;
border-radius:8px;
font-size:13px;
}

</style>
</head>

<body>

<div id="toolbar">
<button id="newRoom">Nueva estancia</button>
<button id="closeRoom">Cerrar estancia</button>
<button id="generate">Generar circuito</button>
<button id="reset">Reset</button>
</div>

<canvas id="canvas"></canvas>

<div id="info">
<div>Estancia: <span id="roomName">-</span></div>
<div>Superficie: <span id="area">0</span> m²</div>
<div>Tubo: <span id="meters">0</span> m</div>
<div id="cursorInfo"></div>
</div>

<script>

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight-60

const GRID=50

let rooms=[]
let pipes=[]

let drawing=false
let currentRoom=null
let mouse={x:0,y:0}

function snap(v){
return Math.round(v/GRID)*GRID
}

canvas.addEventListener("mousemove",e=>{

mouse.x=snap(e.offsetX)
mouse.y=snap(e.offsetY)

})

canvas.addEventListener("click",e=>{

if(!drawing)return

currentRoom.points.push({
x:mouse.x,
y:mouse.y
})

})

document.getElementById("newRoom").onclick=()=>{

let name=prompt("Nombre estancia")

currentRoom={
name:name,
points:[]
}

rooms.push(currentRoom)

drawing=true

document.getElementById("roomName").innerText=name

}

document.getElementById("closeRoom").onclick=()=>{

drawing=false
calculateArea(currentRoom)

}

document.getElementById("reset").onclick=()=>{

rooms=[]
pipes=[]

document.getElementById("meters").innerText="0"
document.getElementById("area").innerText="0"

}

function drawGrid(){

ctx.strokeStyle="#222"

for(let x=0;x<canvas.width;x+=GRID){

ctx.beginPath()
ctx.moveTo(x,0)
ctx.lineTo(x,canvas.height)
ctx.stroke()

}

for(let y=0;y<canvas.height;y+=GRID){

ctx.beginPath()
ctx.moveTo(0,y)
ctx.lineTo(canvas.width,y)
ctx.stroke()

}

}

function drawRooms(){

rooms.forEach(room=>{

ctx.strokeStyle="#00ff9c"
ctx.lineWidth=2

ctx.beginPath()

room.points.forEach((p,i)=>{

if(i===0)ctx.moveTo(p.x,p.y)
else ctx.lineTo(p.x,p.y)

})

ctx.stroke()

})

}

function drawPreview(){

if(!drawing)return
if(currentRoom.points.length===0)return

let last=currentRoom.points[currentRoom.points.length-1]

ctx.strokeStyle="#ffaa00"
ctx.lineWidth=1

ctx.beginPath()
ctx.moveTo(last.x,last.y)
ctx.lineTo(mouse.x,mouse.y)
ctx.stroke()

let dx=mouse.x-last.x
let dy=mouse.y-last.y

let length=Math.sqrt(dx*dx+dy*dy)/100
let angle=Math.atan2(dy,dx)*180/Math.PI

document.getElementById("cursorInfo").innerText=
length.toFixed(2)+" m | "+angle.toFixed(1)+"°"

}

function drawPipes(){

ctx.strokeStyle="#00aaff"
ctx.lineWidth=2

pipes.forEach(pipe=>{

ctx.beginPath()

pipe.forEach((p,i)=>{

if(i===0)ctx.moveTo(p.x,p.y)
else ctx.lineTo(p.x,p.y)

})

ctx.stroke()

})

}

function render(){

ctx.clearRect(0,0,canvas.width,canvas.height)

drawGrid()
drawRooms()
drawPreview()
drawPipes()

requestAnimationFrame(render)

}

render()

function calculateArea(room){

let area=0
let pts=room.points

for(let i=0;i<pts.length;i++){

let j=(i+1)%pts.length

area+=pts[i].x*pts[j].y
area-=pts[j].x*pts[i].y

}

area=Math.abs(area/2)/10000

document.getElementById("area").innerText=area.toFixed(2)

}

function generateCircuit(room){

let minX=Math.min(...room.points.map(p=>p.x))
let minY=Math.min(...room.points.map(p=>p.y))
let maxX=Math.max(...room.points.map(p=>p.x))
let maxY=Math.max(...room.points.map(p=>p.y))

let step=100
let pipe=[]

while(minX<maxX && minY<maxY){

pipe.push({x:minX,y:minY})
pipe.push({x:maxX,y:minY})
pipe.push({x:maxX,y:maxY})
pipe.push({x:minX,y:maxY})

minX+=step
minY+=step
maxX-=step
maxY-=step

}

return pipe

}

function pipeLength(pipe){

let L=0

for(let i=1;i<pipe.length;i++){

let dx=pipe[i].x-pipe[i-1].x
let dy=pipe[i].y-pipe[i-1].y

L+=Math.sqrt(dx*dx+dy*dy)

}

return L/100

}

document.getElementById("generate").onclick=()=>{

pipes=[]
let total=0

rooms.forEach(room=>{

let circuit=generateCircuit(room)
pipes.push(circuit)

total+=pipeLength(circuit)

})

document.getElementById("meters").innerText=total.toFixed(1)

}

</script>

</body>
</html>
