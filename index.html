<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ALLCALOR PRO - Motor Hidráulico</title>
<style>
body{font-family:Arial;background:#0f172a;color:white;margin:0}
header{background:#1e293b;padding:15px;text-align:center;font-weight:bold}
.container{padding:20px;max-width:1100px;margin:auto}
input,select{width:100%;padding:8px;margin:6px 0 12px 0;border-radius:5px;border:none}
button{background:#2563eb;color:white;border:none;padding:10px 20px;border-radius:5px;cursor:pointer}
canvas{background:white;margin-top:20px;border-radius:8px}
.resultado{margin-top:15px;font-size:16px;font-weight:bold}
.row{display:grid;grid-template-columns:1fr 1fr;gap:20px}
</style>
</head>
<body>

<header>ALLCALOR - MOTOR HIDRÁULICO REAL</header>

<div class="container">

<div class="row">
<div>
<label>Largo estancia (m)</label>
<input type="number" id="largo" value="5" step="0.1">

<label>Ancho estancia (m)</label>
<input type="number" id="ancho" value="6" step="0.1">

<label>Separación (cm)</label>
<select id="paso">
<option value="5">5</option>
<option value="10" selected>10</option>
<option value="15">15</option>
<option value="20">20</option>
</select>

<label>Máx metros por circuito</label>
<input type="number" id="maxMetro" value="100">

<label>Pared colector</label>
<select id="pared">
<option value="izquierda" selected>Izquierda</option>
<option value="derecha">Derecha</option>
<option value="arriba">Arriba</option>
<option value="abajo">Abajo</option>
</select>

</div>
</div>

<button onclick="generarPlano()">Generar plano</button>

<canvas id="plano" width="1000" height="700"></canvas>
<div class="resultado" id="resultado"></div>

</div>

<script>

function generarPlano(){

const largo=parseFloat(document.getElementById("largo").value);
const ancho=parseFloat(document.getElementById("ancho").value);
const paso=parseFloat(document.getElementById("paso").value)/100;
const maxMetro=parseFloat(document.getElementById("maxMetro").value);
const pared=document.getElementById("pared").value;

if(!largo||!ancho) return;

const canvas=document.getElementById("plano");
const ctx=canvas.getContext("2d");
ctx.clearRect(0,0,canvas.width,canvas.height);

const margen=80;
const escala=Math.min((canvas.width-margen*2)/largo,(canvas.height-margen*2)/ancho);

const largoPx=largo*escala;
const anchoPx=ancho*escala;
const pasoPx=paso*escala;

// --- Generar caracol doble real ---
function generarCaracol(){

let puntos=[];
let xMin=0;
let xMax=largo;
let yMin=0;
let yMax=ancho;

while((xMax-xMin)>paso && (yMax-yMin)>paso){

// ida exterior
puntos.push([xMin,yMin]);
puntos.push([xMax,yMin]);
puntos.push([xMax,yMax]);
puntos.push([xMin,yMax]);

// retorno interior paralelo
xMin+=paso;
yMin+=paso;
xMax-=paso;
yMax-=paso;

puntos.push([xMin,yMax]);
puntos.push([xMin,yMin]);
}

return puntos;
}

// --- calcular longitud ---
function calcularLongitud(lista){
let total=0;
for(let i=1;i<lista.length;i++){
let dx=lista[i][0]-lista[i-1][0];
let dy=lista[i][1]-lista[i-1][1];
total+=Math.sqrt(dx*dx+dy*dy);
}
return total;
}

let puntos=generarCaracol();
let longitudTotal=calcularLongitud(puntos);

let circuitos=Math.ceil(longitudTotal/maxMetro);
let objetivo=longitudTotal/circuitos;

let listaCircuitos=[];
let actual=[];
let acumulado=0;

for(let i=1;i<puntos.length;i++){

actual.push(puntos[i-1]);

let dx=puntos[i][0]-puntos[i-1][0];
let dy=puntos[i][1]-puntos[i-1][1];
let tramo=Math.sqrt(dx*dx+dy*dy);

if(acumulado+tramo>objetivo && listaCircuitos.length<circuitos-1){
listaCircuitos.push(actual);
actual=[];
acumulado=0;
}else{
acumulado+=tramo;
}
}
actual.push(puntos[puntos.length-1]);
listaCircuitos.push(actual);

// --- dibujar colector ---
ctx.strokeStyle="black";
ctx.lineWidth=4;
ctx.beginPath();

if(pared==="izquierda"){
ctx.moveTo(margen-40,margen);
ctx.lineTo(margen-40,margen+anchoPx);
}
if(pared==="derecha"){
ctx.moveTo(margen+largoPx+40,margen);
ctx.lineTo(margen+largoPx+40,margen+anchoPx);
}
if(pared==="arriba"){
ctx.moveTo(margen,margen-40);
ctx.lineTo(margen+largoPx,margen-40);
}
if(pared==="abajo"){
ctx.moveTo(margen,margen+anchoPx+40);
ctx.lineTo(margen+largoPx,margen+anchoPx+40);
}
ctx.stroke();

// --- dibujar circuitos ---
const colores=["red","blue","green","orange","purple","brown"];

for(let c=0;c<listaCircuitos.length;c++){

ctx.beginPath();
ctx.strokeStyle=colores[c%colores.length];
ctx.lineWidth=2;

let lista=listaCircuitos[c];

for(let i=0;i<lista.length;i++){

let px=margen+lista[i][0]*escala;
let py=margen+lista[i][1]*escala;

if(i===0) ctx.moveTo(px,py);
else ctx.lineTo(px,py);
}

ctx.stroke();
}

// --- resultados ---
let html="Superficie: "+(largo*ancho).toFixed(1)+" m²<br>";
html+="Longitud total: "+longitudTotal.toFixed(1)+" m<br>";
html+="Circuitos: "+circuitos+"<br><br>";

for(let i=0;i<listaCircuitos.length;i++){
html+="Circuito "+(i+1)+": "+calcularLongitud(listaCircuitos[i]).toFixed(1)+" m<br>";
}

document.getElementById("resultado").innerHTML=html;

}

</script>

</body>
</html>
