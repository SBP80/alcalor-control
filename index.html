<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ALLCALOR PRO</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f2b44;
color:white;
}

header{
background:#1a1a1a;
padding:12px;
text-align:center;
font-size:22px;
}

.toolbar{
background:#173a5e;
padding:10px;
display:flex;
gap:8px;
align-items:center;
}

button{
border:none;
padding:6px 12px;
border-radius:4px;
cursor:pointer;
font-weight:bold;
}

.green{background:#28a745}
.blue{background:#2b83ff}
.orange{background:#ff9800}
.red{background:#e53935}

#layout{
display:flex;
}

#panel{
width:250px;
background:#1c3f63;
padding:10px;
height:calc(100vh - 90px);
}

canvas{
background:#f4f1e8;
cursor:crosshair;
}

</style>
</head>

<body>

<header>🔥 ALLCALOR PRO</header>

<div class="toolbar">

Escala
<input id="scale" type="number" value="100" style="width:60px">

<button class="green" onclick="startRoom()">Nueva estancia</button>
<button class="blue" onclick="finishRoom()">Cerrar estancia</button>

<button class="orange" onclick="generateSpiral(0.05)">5 cm</button>
<button class="orange" onclick="generateSpiral(0.10)">10 cm</button>
<button class="orange" onclick="generateSpiral(0.15)">15 cm</button>

<button class="orange" onclick="undo()">Deshacer</button>
<button class="red" onclick="resetAll()">Reiniciar</button>

</div>

<div id="layout">

<div id="panel">

<h3>Estancias</h3>
<div id="roomList"></div>

</div>

<canvas id="canvas" width="1100" height="700"></canvas>

</div>

<script>

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

let rooms=[]
let current=[]
let drawing=false
let dragPoint=null
let circuits=[]

canvas.addEventListener("mousedown",mouseDown)
canvas.addEventListener("mousemove",mouseMove)
canvas.addEventListener("mouseup",()=>dragPoint=null)

function startRoom(){
drawing=true
current=[]
}

function finishRoom(){

if(current.length<3)return

let name=prompt("Nombre estancia","Estancia")

rooms.push({
name,
points:[...current]
})

drawing=false
current=[]

updatePanel()
draw()

}

function undo(){
current.pop()
draw()
}

function resetAll(){
rooms=[]
current=[]
circuits=[]
drawing=false
updatePanel()
draw()
}

function mouseDown(e){

const rect=canvas.getBoundingClientRect()

let x=e.clientX-rect.left
let y=e.clientY-rect.top

for(let r of rooms){

for(let p of r.points){

if(Math.hypot(p.x-x,p.y-y)<8){

dragPoint=p
return

}

}

}

if(drawing){

current.push({x,y})
draw()

}

}

function mouseMove(e){

if(!dragPoint)return

const rect=canvas.getBoundingClientRect()

dragPoint.x=e.clientX-rect.left
dragPoint.y=e.clientY-rect.top

updatePanel()
draw()

}

function distance(a,b){
return Math.hypot(b.x-a.x,b.y-a.y)
}

function angle(a,b,c){

let ab=Math.atan2(a.y-b.y,a.x-b.x)
let cb=Math.atan2(c.y-b.y,c.x-b.x)

let ang=Math.abs((ab-cb)*180/Math.PI)

if(ang>180)ang=360-ang

return ang

}

function polygonArea(points){

let area=0

for(let i=0;i<points.length;i++){

let j=(i+1)%points.length

area+=points[i].x*points[j].y
area-=points[j].x*points[i].y

}

return Math.abs(area/2)

}

function updatePanel(){

const list=document.getElementById("roomList")
list.innerHTML=""

rooms.forEach(r=>{

let area=polygonArea(r.points)/10000

let div=document.createElement("div")

div.innerHTML="<b>"+r.name+"</b><br>"+area.toFixed(2)+" m²"

list.appendChild(div)

})

}

function generateSpiral(step){

if(rooms.length===0)return

let room=rooms[rooms.length-1]
let pts=room.points

let minX=Math.min(...pts.map(p=>p.x))
let maxX=Math.max(...pts.map(p=>p.x))
let minY=Math.min(...pts.map(p=>p.y))
let maxY=Math.max(...pts.map(p=>p.y))

let offset=step*100

let path=[]

while(minX<maxX && minY<maxY){

path.push({x:minX,y:minY})
path.push({x:maxX,y:minY})
path.push({x:maxX,y:maxY})
path.push({x:minX,y:maxY})

minX+=offset
minY+=offset
maxX-=offset
maxY-=offset

}

circuits.push(path)

draw()

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

rooms.forEach(room=>{

ctx.beginPath()

ctx.moveTo(room.points[0].x,room.points[0].y)

for(let i=1;i<room.points.length;i++){
ctx.lineTo(room.points[i].x,room.points[i].y)
}

ctx.closePath()
ctx.strokeStyle="blue"
ctx.stroke()

room.points.forEach((p,i)=>{

ctx.beginPath()
ctx.arc(p.x,p.y,4,0,Math.PI*2)
ctx.fillStyle="red"
ctx.fill()

let prev=room.points[(i-1+room.points.length)%room.points.length]
let next=room.points[(i+1)%room.points.length]

let ang=angle(prev,p,next)

ctx.fillStyle="black"
ctx.fillText(ang.toFixed(1)+"°",p.x+5,p.y-5)

})

for(let i=0;i<room.points.length;i++){

let a=room.points[i]
let b=room.points[(i+1)%room.points.length]

let midX=(a.x+b.x)/2
let midY=(a.y+b.y)/2

let len=distance(a,b)/100

ctx.fillText(len.toFixed(2)+" m",midX,midY)

}

})

circuits.forEach(c=>{

ctx.beginPath()
ctx.moveTo(c[0].x,c[0].y)

for(let i=1;i<c.length;i++){
ctx.lineTo(c[i].x,c[i].y)
}

ctx.strokeStyle="red"
ctx.lineWidth=2
ctx.stroke()

})

if(current.length){

ctx.beginPath()

ctx.moveTo(current[0].x,current[0].y)

for(let i=1;i<current.length;i++){
ctx.lineTo(current[i].x,current[i].y)
}

ctx.strokeStyle="black"
ctx.stroke()

current.forEach(p=>{

ctx.beginPath()
ctx.arc(p.x,p.y,4,0,Math.PI*2)
ctx.fillStyle="red"
ctx.fill()

})

}

}

draw()

</script>

</body>
</html>
