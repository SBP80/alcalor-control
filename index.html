<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>🔥 ALLCALOR PRO</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f2b44;
color:white;
}

header{
background:#1b1b1b;
padding:12px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.toolbar{
background:#173a5e;
padding:10px;
}

button{
border:none;
padding:6px 12px;
margin-right:6px;
border-radius:4px;
cursor:pointer;
font-weight:bold;
}

.green{background:#28a745}
.blue{background:#2b83ff}
.orange{background:#ff9800}
.red{background:#e53935}

#layout{
display:flex;
}

#panel{
width:220px;
background:#1c3f63;
padding:10px;
}

canvas{
background:#f4f1e8;
cursor:crosshair;
}

</style>
</head>

<body>

<header>🔥 ALLCALOR PRO</header>

<div class="toolbar">

Escala px/m
<input id="scaleInput" type="number" value="100" style="width:60px">

<button class="green" onclick="startRoom()">Nueva estancia</button>
<button class="blue" onclick="closeRoom()">Cerrar estancia</button>
<button class="orange" onclick="undoPoint()">Deshacer</button>
<button class="red" onclick="resetAll()">Reiniciar</button>

</div>

<div id="layout">

<div id="panel">

<h3>Estancias</h3>

<div id="roomsPanel"></div>

<hr>

Total: <span id="totalArea">0</span> m²

</div>

<canvas id="canvas" width="1200" height="700"></canvas>

</div>

<script>

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

let scale=100
let rooms=[]
let drawing=false
let points=[]

let mouse={x:0,y:0}

let dragVertex=null
let dragRoom=null

function dist(a,b){
return Math.hypot(a.x-b.x,a.y-b.y)
}

function polygonArea(v){

let sum=0

for(let i=0;i<v.length;i++){

let j=(i+1)%v.length

sum+=v[i].x*v[j].y-v[j].x*v[i].y

}

return Math.abs(sum/2)

}

function centroid(v){

let x=0
let y=0

for(let p of v){

x+=p.x
y+=p.y

}

return{x:x/v.length,y:y/v.length}

}

function angle(a,b,c){

let abx=a.x-b.x
let aby=a.y-b.y

let cbx=c.x-b.x
let cby=c.y-b.y

let dot=abx*cbx+aby*cby

let mag1=Math.sqrt(abx*abx+aby*aby)
let mag2=Math.sqrt(cbx*cbx+cby*cby)

let ang=Math.acos(dot/(mag1*mag2))*180/Math.PI

return ang

}

function pointInside(poly,x,y){

let inside=false

for(let i=0,j=poly.length-1;i<poly.length;j=i++){

let xi=poly[i].x, yi=poly[i].y
let xj=poly[j].x, yj=poly[j].y

let intersect=((yi>y)!=(yj>y))
&&(x<(xj-xi)*(y-yi)/(yj-yi)+xi)

if(intersect) inside=!inside

}

return inside

}

canvas.onmousedown=e=>{

const r=canvas.getBoundingClientRect()

let x=e.clientX-r.left
let y=e.clientY-r.top

mouse={x,y}

for(let ri=0;ri<rooms.length;ri++){

let room=rooms[ri]

for(let vi=0;vi<room.v.length;vi++){

let p=room.v[vi]

if(dist(p,mouse)<10){

dragVertex={room:ri,index:vi}
return

}

}

}

for(let ri=0;ri<rooms.length;ri++){

if(pointInside(rooms[ri].v,x,y)){

dragRoom=ri
return

}

}

}

canvas.onmouseup=()=>{

dragVertex=null
dragRoom=null

}

canvas.onmousemove=e=>{

const r=canvas.getBoundingClientRect()

let x=e.clientX-r.left
let y=e.clientY-r.top

let dx=x-mouse.x
let dy=y-mouse.y

mouse={x,y}

if(dragVertex){

rooms[dragVertex.room].v[dragVertex.index].x=x
rooms[dragVertex.room].v[dragVertex.index].y=y

updatePanel()
draw()

return

}

if(dragRoom!==null){

for(let p of rooms[dragRoom].v){

p.x+=dx
p.y+=dy

}

draw()

return

}

draw()

}

canvas.onclick=e=>{

if(!drawing) return

const r=canvas.getBoundingClientRect()

points.push({
x:e.clientX-r.left,
y:e.clientY-r.top
})

draw()

}

function startRoom(){

drawing=true
points=[]

}

function closeRoom(){

if(points.length<3) return

let name=prompt("Nombre estancia","estancia")

rooms.push({
name:name,
v:[...points]
})

points=[]
drawing=false

updatePanel()
draw()

}

function undoPoint(){

points.pop()
draw()

}

function resetAll(){

rooms=[]
points=[]
drawing=false

updatePanel()
draw()

}

function drawVertex(p){

ctx.beginPath()
ctx.arc(p.x,p.y,5,0,Math.PI*2)
ctx.fillStyle="red"
ctx.fill()

}

function drawPolygon(v){

ctx.beginPath()

ctx.moveTo(v[0].x,v[0].y)

for(let i=1;i<v.length;i++)
ctx.lineTo(v[i].x,v[i].y)

ctx.closePath()

ctx.fillStyle="rgba(0,150,255,0.15)"
ctx.fill()

ctx.strokeStyle="#2b83ff"
ctx.lineWidth=2
ctx.stroke()

for(let i=0;i<v.length;i++){

let p=v[i]
let next=v[(i+1)%v.length]
let prev=v[(i-1+v.length)%v.length]

drawVertex(p)

let ang=angle(prev,p,next)

ctx.fillStyle="orange"
ctx.fillText(ang.toFixed(0)+"°",p.x+8,p.y-8)

let midX=(p.x+next.x)/2
let midY=(p.y+next.y)/2

let d=dist(p,next)/scale

ctx.fillStyle="black"
ctx.fillText(d.toFixed(2)+" m",midX,midY)

}

}

function drawPreview(){

if(!drawing) return
if(points.length===0) return

let last=points[points.length-1]

ctx.beginPath()
ctx.moveTo(last.x,last.y)
ctx.lineTo(mouse.x,mouse.y)
ctx.strokeStyle="#2b83ff"
ctx.stroke()

let midX=(last.x+mouse.x)/2
let midY=(last.y+mouse.y)/2

let d=dist(last,mouse)/scale

ctx.fillStyle="black"
ctx.fillText(d.toFixed(2)+" m",midX,midY)

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

scale=parseFloat(document.getElementById("scaleInput").value)

for(let r of rooms){

drawPolygon(r.v)

let c=centroid(r.v)
let area=polygonArea(r.v)/(scale*scale)

ctx.fillStyle="black"
ctx.fillText(area.toFixed(2)+" m²",c.x,c.y)

}

if(drawing){

for(let p of points)
drawVertex(p)

drawPreview()

}

}

function updatePanel(){

let html=""
let total=0

for(let r of rooms){

let area=polygonArea(r.v)/(scale*scale)
total+=area

html+=`
<b>${r.name}</b><br>
Área: ${area.toFixed(2)} m²<hr>
`

}

document.getElementById("roomsPanel").innerHTML=html
document.getElementById("totalArea").innerText=total.toFixed(2)

}

draw()

</script>

</body>
</html>
