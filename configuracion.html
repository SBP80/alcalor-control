<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Configuración PRO</title>

<style>
:root{
  --bg:#0b0b0b;
  --panel:#151515;
  --line:#2b2b2b;
  --text:#ffffff;
  --accent:#f39b2f;
  --btnText:#111;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
}

.wrap{
  padding:20px;
  max-width:900px;
  margin:auto;
}

h1{color:var(--accent)}

.panel{
  background:var(--panel);
  padding:16px;
  border-radius:12px;
  margin-bottom:15px;
}

input, select{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #333;
  background:#111;
  color:#fff;
}

button{
  padding:12px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.btn{
  background:var(--accent);
  color:var(--btnText);
  width:100%;
}

.preview{
  margin-top:20px;
  padding:15px;
  border-radius:12px;
  background:#000;
}
.logo-preview{
  width:80px;
  height:80px;
  object-fit:contain;
}
</style>
</head>

<body>

<div class="wrap">

<h1>Configuración</h1>

<div class="panel">
<h3>Visual</h3>

<label>Nombre</label>
<input id="nombre">

<label>Color principal</label>
<input type="color" id="color">

<label>Color texto</label>
<input type="color" id="texto">

<label>Color texto botón</label>
<input type="color" id="btnTexto">

<label>Logo (imagen)</label>
<input type="file" id="logoFile">
</div>

<div class="panel">
<h3>Notificaciones</h3>

<label>Activar</label>
<select id="noti">
<option value="true">Sí</option>
<option value="false">No</option>
</select>

<label>Sonido</label>
<select id="sonido">
<option value="true">Sí</option>
<option value="false">No</option>
</select>
</div>

<button class="btn" onclick="guardar()">Guardar</button>

<div class="preview">
<h3>Vista previa</h3>
<img id="logoPreview" class="logo-preview">
<h2 id="prevNombre">ALLCALOR</h2>
<button id="btnDemo">Botón</button>
</div>

</div>

<script>

function cargar(){
  let c = JSON.parse(localStorage.getItem("configAllcalor")) || {}

  nombre.value = c.nombre || "ALLCALOR"
  color.value = c.color || "#f39b2f"
  texto.value = c.texto || "#ffffff"
  btnTexto.value = c.btnTexto || "#111111"

  noti.value = c.noti !== false ? "true":"false"
  sonido.value = c.sonido !== false ? "true":"false"

  if(c.logo){
    logoPreview.src = c.logo
  }

  aplicar()
}

function aplicar(){
  let c = recoger()

  document.documentElement.style.setProperty("--accent", c.color)
  document.documentElement.style.setProperty("--text", c.texto)
  document.documentElement.style.setProperty("--btnText", c.btnTexto)

  prevNombre.innerText = c.nombre
  prevNombre.style.color = c.color

  btnDemo.style.background = c.color
  btnDemo.style.color = c.btnTexto
}

function recoger(){
  return {
    nombre: nombre.value,
    color: color.value,
    texto: texto.value,
    btnTexto: btnTexto.value,
    noti: noti.value === "true",
    sonido: sonido.value === "true"
  }
}

logoFile.addEventListener("change", function(){
  let file = this.files[0]
  if(!file) return

  let reader = new FileReader()
  reader.onload = function(e){
    logoPreview.src = e.target.result
    localStorage.setItem("logoTemp", e.target.result)
  }
  reader.readAsDataURL(file)
})

function guardar(){
  let cfg = recoger()

  let logo = localStorage.getItem("logoTemp")
  if(logo){
    cfg.logo = logo
  }

  localStorage.setItem("configAllcalor", JSON.stringify(cfg))

  alert("Guardado")
}

cargar()

</script>

</body>
</html>
