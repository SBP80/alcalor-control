<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Configuración PRO · ALLCALOR</title>

<style>
:root{
  --bg:#0b0b0b;
  --panel:#151515;
  --line:#2b2b2b;
  --text:#ffffff;
  --accent:#f39b2f;
}
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
}
.wrap{
  max-width:1200px;
  margin:auto;
  padding:20px;
}
h2{
  color:var(--accent);
  margin-top:30px;
}
.section{
  background:var(--panel);
  padding:20px;
  border-radius:18px;
  border:1px solid var(--line);
  margin-bottom:20px;
}
input,select{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid var(--line);
  background:#111;
  color:#fff;
  margin-top:5px;
  margin-bottom:10px;
}
label{
  font-size:13px;
}
.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
.btn{
  padding:14px;
  border:none;
  border-radius:12px;
  background:var(--accent);
  color:#111;
  font-weight:800;
  width:100%;
  margin-top:20px;
}
</style>
</head>

<body>

<div class="wrap">

<h1>Configuración PRO</h1>

<!-- VISUAL -->
<div class="section">
<h2>Visual</h2>

<label>Nombre</label>
<input id="nombre">

<label>Subtítulo</label>
<input id="sub">

<div class="row">
<div>
<label>Color principal</label>
<input type="color" id="color">
</div>
<div>
<label>Color fondo</label>
<input type="color" id="bg">
</div>
</div>

<div class="row">
<div>
<label>Color panel</label>
<input type="color" id="panel">
</div>
<div>
<label>Color texto</label>
<input type="color" id="text">
</div>
</div>

<div class="row">
<div>
<label>Tamaño nombre</label>
<input type="number" id="tam">
</div>
<div>
<label>Fuente</label>
<select id="fuente">
<option>Arial</option>
<option>Verdana</option>
<option>Tahoma</option>
<option>Georgia</option>
</select>
</div>
</div>

</div>

<!-- LOGO -->
<div class="section">
<h2>Logo</h2>

<label>Subir logo</label>
<input type="file" id="logo">

<label>Tamaño logo</label>
<input type="range" id="logoSize" min="50" max="300">

<label>Opacidad marca agua</label>
<input type="range" id="logoOpacity" min="0" max="1" step="0.1">

</div>

<!-- INTERFAZ -->
<div class="section">
<h2>Interfaz</h2>

<label><input type="checkbox" id="reloj"> Mostrar reloj</label><br>
<label><input type="checkbox" id="fecha"> Mostrar fecha</label><br>
<label><input type="checkbox" id="notas"> Mostrar notas</label><br>

</div>

<!-- EMPRESA -->
<div class="section">
<h2>Empresa</h2>

<label>Nombre empresa</label>
<input id="empresa">

<label>CIF</label>
<input id="cif">

<label>Teléfono</label>
<input id="tel">

<label>Email</label>
<input id="mail">

<label>Dirección</label>
<input id="dir">

</div>

<button class="btn" onclick="guardar()">Guardar todo</button>

</div>

<script>

function getConfig(){
  return JSON.parse(localStorage.getItem("configAllcalor")) || {};
}

function guardar(){
  const reader = new FileReader();

  const file = document.getElementById("logo").files[0];

  if(file){
    reader.onload = function(e){
      saveData(e.target.result);
    }
    reader.readAsDataURL(file);
  }else{
    saveData();
  }
}

function saveData(logoData){
  let c = getConfig();

  c.nombre = document.getElementById("nombre").value;
  c.subtitulo = document.getElementById("sub").value;
  c.color = document.getElementById("color").value;
  c.colorFondo = document.getElementById("bg").value;
  c.colorPanel = document.getElementById("panel").value;
  c.colorTexto = document.getElementById("text").value;
  c.tamNombre = document.getElementById("tam").value;
  c.fuente = document.getElementById("fuente").value;

  c.logoSize = document.getElementById("logoSize").value;
  c.logoOpacity = document.getElementById("logoOpacity").value;

  c.mostrarReloj = document.getElementById("reloj").checked;
  c.mostrarFecha = document.getElementById("fecha").checked;
  c.mostrarNotas = document.getElementById("notas").checked;

  c.empresa = document.getElementById("empresa").value;
  c.cif = document.getElementById("cif").value;
  c.tel = document.getElementById("tel").value;
  c.mail = document.getElementById("mail").value;
  c.dir = document.getElementById("dir").value;

  if(logoData){
    c.logo = logoData;
  }

  localStorage.setItem("configAllcalor", JSON.stringify(c));

  alert("Guardado correctamente");
}

function cargar(){
  const c = getConfig();

  document.getElementById("nombre").value = c.nombre || "";
  document.getElementById("sub").value = c.subtitulo || "";
  document.getElementById("color").value = c.color || "#f39b2f";
  document.getElementById("bg").value = c.colorFondo || "#0b0b0b";
  document.getElementById("panel").value = c.colorPanel || "#151515";
  document.getElementById("text").value = c.colorTexto || "#ffffff";
  document.getElementById("tam").value = c.tamNombre || 30;

  document.getElementById("logoSize").value = c.logoSize || 150;
  document.getElementById("logoOpacity").value = c.logoOpacity || 0.1;

  document.getElementById("reloj").checked = c.mostrarReloj !== false;
  document.getElementById("fecha").checked = c.mostrarFecha !== false;
  document.getElementById("notas").checked = c.mostrarNotas !== false;

  document.getElementById("empresa").value = c.empresa || "";
  document.getElementById("cif").value = c.cif || "";
  document.getElementById("tel").value = c.tel || "";
  document.getElementById("mail").value = c.mail || "";
  document.getElementById("dir").value = c.dir || "";
}

cargar();

</script>

</body>
</html>
