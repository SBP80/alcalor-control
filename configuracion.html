<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Configuración - ALLCALOR PRO</title>

<style>
:root{
    --bg:#0b0b0b;
    --panel:#151515;
    --accent:#f39b2f;
    --text:#ffffff;
}

body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:Arial, sans-serif;
}

header{
    padding:15px;
    background:#000;
    text-align:center;
    font-weight:bold;
}

.container{
    padding:15px;
}

.section{
    background:var(--panel);
    padding:15px;
    margin-bottom:15px;
    border-radius:10px;
}

h2{
    margin-top:0;
    color:var(--accent);
}

input, select{
    width:100%;
    padding:8px;
    margin-top:5px;
    margin-bottom:10px;
    border-radius:6px;
    border:none;
}

button{
    padding:10px;
    background:var(--accent);
    border:none;
    border-radius:8px;
    color:#000;
    font-weight:bold;
    cursor:pointer;
    width:100%;
}

.preview{
    margin-top:10px;
    padding:10px;
    border:1px solid #333;
    border-radius:8px;
    text-align:center;
}

.logo-preview{
    max-width:120px;
    margin-top:10px;
}
</style>
</head>

<body>

<header>Configuración</header>

<div class="container">

<!-- IDENTIDAD -->
<div class="section">
<h2>Identidad</h2>

<label>Nombre empresa</label>
<input id="nombre">

<label>Subtítulo</label>
<input id="subtitulo">

<label>Logo</label>
<input type="file" id="logo">

<img id="logoPreview" class="logo-preview">

<label>Tipografía</label>
<select id="fuente">
<option value="Arial">Arial</option>
<option value="Verdana">Verdana</option>
<option value="Tahoma">Tahoma</option>
<option value="Georgia">Georgia</option>
</select>

<label>Tamaño texto</label>
<input type="range" id="tamano" min="12" max="30">

<label>Sombra texto</label>
<input type="range" id="sombra" min="0" max="10">

</div>

<!-- COLORES -->
<div class="section">
<h2>Colores</h2>

<label>Color principal</label>
<input type="color" id="colorPrincipal">

<label>Color fondo</label>
<input type="color" id="colorFondo">

<label>Color texto</label>
<input type="color" id="colorTexto">

</div>

<!-- EMPRESA -->
<div class="section">
<h2>Datos empresa</h2>

<label>Teléfono</label>
<input id="telefono">

<label>Email</label>
<input id="email">

<label>Dirección</label>
<input id="direccion">

<label>CIF</label>
<input id="cif">

</div>

<!-- GUARDAR -->
<button onclick="guardar()">Guardar configuración</button>

<!-- PREVIEW -->
<div class="section">
<h2>Vista previa</h2>

<div id="preview" class="preview">
<p id="previewNombre">ALLCALOR PRO</p>
<p id="previewSub">Sistema profesional</p>
</div>

</div>

</div>

<script>

// CARGAR CONFIG
function cargar(){
    let cfg = JSON.parse(localStorage.getItem("config")) || {};

    nombre.value = cfg.nombre || "";
    subtitulo.value = cfg.subtitulo || "";
    telefono.value = cfg.telefono || "";
    email.value = cfg.email || "";
    direccion.value = cfg.direccion || "";
    cif.value = cfg.cif || "";

    fuente.value = cfg.fuente || "Arial";
    tamano.value = cfg.tamano || 18;
    sombra.value = cfg.sombra || 0;

    colorPrincipal.value = cfg.colorPrincipal || "#f39b2f";
    colorFondo.value = cfg.colorFondo || "#0b0b0b";
    colorTexto.value = cfg.colorTexto || "#ffffff";

    if(cfg.logo){
        logoPreview.src = cfg.logo;
    }

    actualizarPreview();
}

// GUARDAR
function guardar(){
    let reader = new FileReader();

    if(logo.files[0]){
        reader.onload = function(e){
            guardarConfig(e.target.result);
        };
        reader.readAsDataURL(logo.files[0]);
    }else{
        guardarConfig(null);
    }
}

function guardarConfig(logoData){

    let old = JSON.parse(localStorage.getItem("config")) || {};

    let cfg = {
        nombre:nombre.value,
        subtitulo:subtitulo.value,
        telefono:telefono.value,
        email:email.value,
        direccion:direccion.value,
        cif:cif.value,

        fuente:fuente.value,
        tamano:tamano.value,
        sombra:sombra.value,

        colorPrincipal:colorPrincipal.value,
        colorFondo:colorFondo.value,
        colorTexto:colorTexto.value,

        logo: logoData || old.logo
    };

    localStorage.setItem("config", JSON.stringify(cfg));
    alert("Guardado");
}

// PREVIEW
function actualizarPreview(){
    let cfg = JSON.parse(localStorage.getItem("config")) || {};

    previewNombre.innerText = nombre.value || "ALLCALOR PRO";
    previewSub.innerText = subtitulo.value || "";

    preview.style.fontFamily = fuente.value;
    preview.style.color = colorTexto.value;
    preview.style.background = colorFondo.value;

    previewNombre.style.fontSize = tamano.value + "px";
    previewNombre.style.textShadow = "0 0 " + sombra.value + "px #000";
}

// EVENTOS
document.querySelectorAll("input, select").forEach(el=>{
    el.addEventListener("input", actualizarPreview);
});

// INIT
cargar();

</script>

</body>
</html>
