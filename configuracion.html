<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Configuración</title>
<style>
:root{
  --bg:#0b0b0b;
  --panel:#151515;
  --panel2:#1d1d1d;
  --line:#2b2b2b;
  --text:#ffffff;
  --muted:#bdbdbd;
  --accent:#f39b2f;
  --btnText:#111111;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
}
.wrap{
  max-width:980px;
  margin:0 auto;
  padding:18px;
}
.panel{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:18px;
  padding:16px;
  margin-bottom:16px;
}
h1{
  margin:0 0 16px 0;
  color:var(--accent);
  font-size:38px;
}
h2{
  margin:0 0 12px 0;
  color:var(--accent);
  font-size:22px;
}
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
.grid-3{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:12px;
}
.field{
  display:flex;
  flex-direction:column;
  gap:6px;
  margin-bottom:12px;
}
.field label{
  font-size:13px;
  color:var(--muted);
}
input[type="text"],
input[type="password"],
input[type="email"],
input[type="color"]{
  width:100%;
  border:1px solid var(--line);
  background:#101010;
  color:#fff;
  border-radius:12px;
  padding:12px 14px;
}
input[type="color"]{
  padding:6px;
  height:52px;
}
.check{
  display:flex;
  align-items:center;
  gap:10px;
  background:#101010;
  border:1px solid var(--line);
  border-radius:12px;
  padding:12px 14px;
}
.actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:8px;
}
.btn{
  border:none;
  border-radius:14px;
  padding:12px 16px;
  font-weight:800;
  cursor:pointer;
}
.btn-main{
  background:var(--accent);
  color:var(--btnText);
}
.btn-sec{
  background:#2b2b2b;
  color:#fff;
}
.help{
  color:var(--muted);
  font-size:12px;
  line-height:1.45;
}
.preview{
  margin-top:16px;
  background:#101010;
  border:1px solid var(--line);
  border-radius:16px;
  padding:16px;
}
.preview-name{
  margin:0;
  font-size:28px;
  color:var(--accent);
}
.preview-sub{
  margin:6px 0 0 0;
  color:var(--muted);
}
.preview-box{
  margin-top:14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
}
.preview-clock{
  border:1px solid var(--line);
  border-radius:14px;
  padding:10px 14px;
  min-width:180px;
}
.preview-notes{
  width:60px;
  height:60px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:var(--accent);
  color:var(--btnText);
  font-size:28px;
}
.hidden{
  display:none !important;
}
.badge{
  display:inline-block;
  padding:8px 12px;
  border-radius:999px;
  background:var(--panel2);
  border:1px solid var(--line);
  color:var(--muted);
  font-size:12px;
  font-weight:700;
}
.msg{
  margin-top:10px;
  min-height:20px;
  color:#b7ffcb;
  font-size:13px;
}
@media (max-width:800px){
  h1{font-size:34px}
  .grid,.grid-3{grid-template-columns:1fr}
  .actions .btn{width:100%}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="panel">
    <h1>Configuración</h1>
    <div class="badge" id="infoUsuario">Usuario actual: -</div>
  </div>

  <div class="panel">
    <h2>Visual</h2>

    <div class="field">
      <label>Nombre de la app</label>
      <input id="cfgNombre" type="text" placeholder="ALLCALOR">
    </div>

    <div class="field">
      <label>Subtítulo</label>
      <input id="cfgSubtitulo" type="text" placeholder="Centro de control">
    </div>

    <div class="grid">
      <div class="field">
        <label>Color principal</label>
        <input id="cfgColor" type="color">
      </div>

      <div class="field">
        <label>Nombre comercial de la empresa</label>
        <input id="cfgEmpresa" type="text" placeholder="ALLCALOR">
      </div>
    </div>

    <div class="grid">
      <label class="check">
        <input id="cfgMostrarReloj" type="checkbox">
        Mostrar reloj
      </label>

      <label class="check">
        <input id="cfgMostrarFecha" type="checkbox">
        Mostrar fecha
      </label>

      <label class="check">
        <input id="cfgMostrarNotas" type="checkbox">
        Mostrar notas rápidas
      </label>
    </div>
  </div>

  <div class="panel">
    <h2>Empresa</h2>

    <div class="grid">
      <div class="field">
        <label>Razón social</label>
        <input id="cfgRazonSocial" type="text" placeholder="Razón social">
      </div>

      <div class="field">
        <label>CIF</label>
        <input id="cfgCif" type="text" placeholder="CIF">
      </div>
    </div>

    <div class="grid">
      <div class="field">
        <label>Teléfono principal</label>
        <input id="cfgTelefono" type="text" placeholder="Teléfono">
      </div>

      <div class="field">
        <label>Email principal</label>
        <input id="cfgEmail" type="email" placeholder="Email">
      </div>
    </div>

    <div class="field">
      <label>Dirección</label>
      <input id="cfgDireccion" type="text" placeholder="Dirección de empresa">
    </div>
  </div>

  <div class="panel">
    <h2>Acceso</h2>

    <div class="grid">
      <div class="field">
        <label>Nueva clave del usuario actual</label>
        <input id="cfgClaveNueva" type="password" placeholder="Nueva clave">
      </div>

      <div class="field">
        <label>Repetir nueva clave</label>
        <input id="cfgClaveNueva2" type="password" placeholder="Repetir nueva clave">
      </div>
    </div>

    <div class="help">
      La clave de emergencia <b>admin / 1234</b> sigue entrando para que no vuelvas a quedarte fuera.
    </div>
  </div>

  <div class="panel">
    <h2>Vista previa</h2>

    <div class="preview">
      <h3 id="prevNombre" class="preview-name">ALLCALOR</h3>
      <div id="prevSub" class="preview-sub">Centro de control</div>

      <div class="preview-box">
        <div id="prevClock" class="preview-clock">
          <div id="prevHora" style="font-size:24px;font-weight:800;color:var(--accent);">00:00:00</div>
          <div id="prevFecha" style="font-size:12px;color:var(--muted);margin-top:6px;">lunes, 1 de enero de 2026</div>
        </div>

        <div id="prevNotes" class="preview-notes">📝</div>
      </div>
    </div>

    <div id="msg" class="msg"></div>

    <div class="actions">
      <button class="btn btn-main" onclick="guardarYVolver()">Guardar y volver</button>
      <button class="btn btn-sec" onclick="volver()">Volver</button>
    </div>
  </div>
</div>

<script>
function getSession(){
  try{
    return JSON.parse(localStorage.getItem("allcalor_session")) || null;
  }catch(e){
    return null;
  }
}

const currentSession = getSession();
if(!currentSession){
  window.location.href = "login.html";
}

function getConfig(){
  try{
    return JSON.parse(localStorage.getItem("configAllcalor")) || {};
  }catch(e){
    return {};
  }
}

function setConfig(cfg){
  localStorage.setItem("configAllcalor", JSON.stringify(cfg));
}

function getUsers(){
  try{
    const users = JSON.parse(localStorage.getItem("allcalor_users"));
    if(Array.isArray(users) && users.length) return users;
  }catch(e){}
  const inicial = [
    {
      username:"admin",
      password:"1234",
      nombre:"Administrador",
      role:"administrador",
      active:true
    }
  ];
  localStorage.setItem("allcalor_users", JSON.stringify(inicial));
  return inicial;
}

function setUsers(users){
  localStorage.setItem("allcalor_users", JSON.stringify(users));
}

function cargar(){
  const cfg = Object.assign({
    nombre:"ALLCALOR",
    subtitulo:"Centro de control",
    color:"#f39b2f",
    empresa:"ALLCALOR",
    razonSocial:"",
    cif:"",
    telefono:"",
    email:"",
    direccion:"",
    mostrarReloj:true,
    mostrarFecha:true,
    mostrarNotas:true
  }, getConfig());

  document.getElementById("infoUsuario").textContent =
    "Usuario actual: " + (currentSession?.username || "-") + " · Rol: " + (currentSession?.role || "-");

  document.getElementById("cfgNombre").value = cfg.nombre;
  document.getElementById("cfgSubtitulo").value = cfg.subtitulo;
  document.getElementById("cfgColor").value = cfg.color;
  document.getElementById("cfgEmpresa").value = cfg.empresa || "";
  document.getElementById("cfgRazonSocial").value = cfg.razonSocial || "";
  document.getElementById("cfgCif").value = cfg.cif || "";
  document.getElementById("cfgTelefono").value = cfg.telefono || "";
  document.getElementById("cfgEmail").value = cfg.email || "";
  document.getElementById("cfgDireccion").value = cfg.direccion || "";
  document.getElementById("cfgMostrarReloj").checked = !!cfg.mostrarReloj;
  document.getElementById("cfgMostrarFecha").checked = !!cfg.mostrarFecha;
  document.getElementById("cfgMostrarNotas").checked = !!cfg.mostrarNotas;
  document.getElementById("cfgClaveNueva").value = "";
  document.getElementById("cfgClaveNueva2").value = "";

  actualizarVista();
}

function recogerConfig(){
  const actual = getConfig();
  return {
    ...actual,
    nombre: document.getElementById("cfgNombre").value.trim() || "ALLCALOR",
    subtitulo: document.getElementById("cfgSubtitulo").value.trim() || "Centro de control",
    color: document.getElementById("cfgColor").value || "#f39b2f",
    empresa: document.getElementById("cfgEmpresa").value.trim(),
    razonSocial: document.getElementById("cfgRazonSocial").value.trim(),
    cif: document.getElementById("cfgCif").value.trim(),
    telefono: document.getElementById("cfgTelefono").value.trim(),
    email: document.getElementById("cfgEmail").value.trim(),
    direccion: document.getElementById("cfgDireccion").value.trim(),
    mostrarReloj: document.getElementById("cfgMostrarReloj").checked,
    mostrarFecha: document.getElementById("cfgMostrarFecha").checked,
    mostrarNotas: document.getElementById("cfgMostrarNotas").checked
  };
}

function actualizarVista(){
  const cfg = recogerConfig();
  document.documentElement.style.setProperty("--accent", cfg.color);

  document.getElementById("prevNombre").textContent = cfg.nombre;
  document.getElementById("prevSub").textContent = cfg.subtitulo;
  document.getElementById("prevClock").classList.toggle("hidden", !cfg.mostrarReloj && !cfg.mostrarFecha);
  document.getElementById("prevHora").classList.toggle("hidden", !cfg.mostrarReloj);
  document.getElementById("prevFecha").classList.toggle("hidden", !cfg.mostrarFecha);
  document.getElementById("prevNotes").classList.toggle("hidden", !cfg.mostrarNotas);
}

function cambiarClaveUsuarioActual(){
  const c1 = document.getElementById("cfgClaveNueva").value.trim();
  const c2 = document.getElementById("cfgClaveNueva2").value.trim();

  if(!c1 && !c2) return {ok:true};

  if(c1.length < 4){
    return {ok:false, msg:"La nueva clave debe tener al menos 4 caracteres."};
  }

  if(c1 !== c2){
    return {ok:false, msg:"Las dos claves no coinciden."};
  }

  const users = getUsers();
  const idx = users.findIndex(u => (u.username || "") === currentSession.username);

  if(idx === -1){
    return {ok:false, msg:"No se encontró el usuario actual."};
  }

  users[idx].password = c1;
  setUsers(users);

  return {ok:true, msg:"Clave cambiada correctamente."};
}

function guardarYVolver(){
  const cambio = cambiarClaveUsuarioActual();
  if(!cambio.ok){
    document.getElementById("msg").textContent = cambio.msg;
    return;
  }

  setConfig(recogerConfig());
  window.location.href = "app.html";
}

function volver(){
  window.location.href = "app.html";
}

function pad(n){
  return String(n).padStart(2,"0");
}

function relojPreview(){
  const now = new Date();
  const dias = ["domingo","lunes","martes","miércoles","jueves","viernes","sábado"];
  const meses = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
  document.getElementById("prevHora").textContent =
    pad(now.getHours()) + ":" + pad(now.getMinutes()) + ":" + pad(now.getSeconds());
  document.getElementById("prevFecha").textContent =
    dias[now.getDay()] + ", " + now.getDate() + " de " + meses[now.getMonth()] + " de " + now.getFullYear();
}

[
  "cfgNombre","cfgSubtitulo","cfgColor","cfgEmpresa","cfgRazonSocial","cfgCif",
  "cfgTelefono","cfgEmail","cfgDireccion","cfgClaveNueva","cfgClaveNueva2",
  "cfgMostrarReloj","cfgMostrarFecha","cfgMostrarNotas"
].forEach(id => {
  document.getElementById(id).addEventListener("input", actualizarVista);
  document.getElementById(id).addEventListener("change", actualizarVista);
});

cargar();
relojPreview();
setInterval(relojPreview, 1000);
</script>
</body>
</html>
