<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Configuración · ALLCALOR</title>
<style>
:root{
  --bg:#0b0b0b;
  --panel:#151515;
  --panel2:#1d1d1d;
  --line:#2b2b2b;
  --text:#ffffff;
  --muted:#bdbdbd;
  --accent:#f39b2f;
  --btnText:#111111;
  --shadow:0 10px 24px rgba(0,0,0,.28);
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
}
button,input,select,textarea{
  font:inherit;
}
button{
  cursor:pointer;
  touch-action:manipulation;
}
.hidden{
  display:none !important;
}
.topbar{
  position:sticky;
  top:0;
  z-index:50;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:14px;
  padding:14px 16px;
  background:rgba(11,11,11,.96);
  border-bottom:1px solid var(--line);
  backdrop-filter:blur(8px);
}
.brand-name{
  margin:0;
  line-height:1;
  color:var(--accent);
  font-size:30px;
  font-weight:800;
}
.brand-sub{
  margin:6px 0 0 0;
  font-size:12px;
  color:var(--muted);
}
.topbar-right{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
.btn-top{
  border:none;
  border-radius:12px;
  padding:12px 16px;
  font-weight:800;
  background:var(--accent);
  color:var(--btnText);
}
.wrap{
  max-width:1450px;
  margin:0 auto;
  padding:16px;
}
.layout{
  display:grid;
  grid-template-columns:320px 1fr 420px;
  gap:16px;
}
.sidebar{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:20px;
  padding:14px;
  box-shadow:var(--shadow);
  height:fit-content;
  position:sticky;
  top:88px;
}
.side-title{
  margin:0 0 12px 0;
  color:var(--accent);
  font-size:20px;
}
.menu{
  display:grid;
  gap:8px;
}
.menu-btn{
  width:100%;
  text-align:left;
  border:none;
  border-radius:14px;
  padding:14px 14px;
  font-weight:800;
  background:var(--panel2);
  color:var(--text);
  border:1px solid var(--line);
}
.menu-btn.active{
  background:var(--accent);
  color:var(--btnText);
}
.main{
  min-width:0;
}
.section{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:20px;
  padding:16px;
  margin-bottom:16px;
  box-shadow:var(--shadow);
}
.section-title{
  margin:0 0 14px 0;
  color:var(--accent);
  font-size:24px;
}
.section-sub{
  margin:0 0 14px 0;
  color:var(--muted);
  font-size:13px;
}
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
.grid-3{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:12px;
}
.field{
  display:flex;
  flex-direction:column;
  gap:6px;
  margin-bottom:12px;
}
.field label{
  font-size:13px;
  color:var(--muted);
}
input[type="text"],
input[type="password"],
input[type="email"],
input
