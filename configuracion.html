<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Configuración</title>

<style>
:root{
  --bg:#0b0b0b;
  --panel:#151515;
  --line:#2b2b2b;
  --text:#ffffff;
  --accent:#f39b2f;
  --btnText:#111;
  --fontMain:Arial;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:var(--fontMain);
}

/* HEADER */
.top{
  display:flex;
  justify-content:space-between;
  padding:14px;
  border-bottom:1px solid var(--line);
}
.title{
  font-size:22px;
  font-weight:900;
  color:var(--accent);
}

/* LAYOUT */
.wrap{
  display:grid;
  grid-template-columns:260px 1fr 350px;
  gap:12px;
  padding:12px;
}

/* MENU */
.menu button{
  width:100%;
  margin-bottom:6px;
  padding:12px;
  border:none;
  background:#222;
  color:#fff;
  border-radius:10px;
  font-weight:800;
}
.menu button.active{
  background:var(--accent);
  color:#000;
}

/* SECCIONES */
.section{
  background:var(--panel);
  padding:14px;
  border-radius:12px;
  border:1px solid var(--line);
}
.hidden{display:none;}

input,select{
  width:100%;
  margin-bottom:10px;
  padding:10px;
  background:#000;
  border:1px solid var(--line);
  color:#fff;
  border-radius:8px;
}

/* PREVIEW */
.preview{
  background:var(--panel);
  padding:12px;
  border-radius:12px;
}

.preview-box{
  padding:12px;
  border:1px solid var(--line);
  background:var(--bg);
}

button{
  padding:10px;
  border:none;
  border-radius:8px;
  font-weight:800;
}
.main{background:var(--accent);color:#000;}
.sec{background:#333;color:#fff;}
</style>
</head>

<body>

<div class="top">
  <div class="title">Configuración</div>
  <div>
    <button class="main" onclick="guardar()">Guardar</button>
    <button class="sec" onclick="volver()">Volver</button>
  </div>
</div>

<div class="wrap">

<div class="menu">
  <button onclick="tab('visual')" class="active">Visual</button>
  <button onclick="tab('empresa')">Empresa</button>
</div>

<div>

<div id="visual" class="section">
  <h3>Visual</h3>

  <input id="nombre" placeholder="Nombre app">
  <input id="sub" placeholder="Subtitulo">

  <label>Color principal</label>
  <input type="color" id="color">

  <label>Fondo</label>
  <input type="color" id="bg">

  <label>Panel</label>
  <input type="color" id="panel">

  <label>Texto</label>
  <input type="color" id="text">

  <label>Fuente</label>
  <select id="fuente">
    <option>Arial</option>
    <option>Verdana</option>
    <option>Tahoma</option>
  </select>

</div>

<div id="empresa" class="section hidden">
  <h3>Empresa</h3>
  <input placeholder="Nombre empresa">
  <input placeholder="Teléfono">
</div>

</div>

<div class="preview">
  <h3>Vista previa</h3>

  <div class="preview-box">
    <h2 id="pNombre">ALLCALOR</h2>
    <p id="pSub">Centro de control</p>
    <button id="pBtn">Botón</button>
  </div>

</div>

</div>

<script>

function get(){
  return JSON.parse(localStorage.getItem("configAllcalor")||"{}");
}

function set(c){
  localStorage.setItem("configAllcalor",JSON.stringify(c));
}

function aplicar(c){
  let r=document.documentElement;

  r.style.setProperty("--bg",c.bg||"#0b0b0b");
  r.style.setProperty("--panel",c.panel||"#151515");
  r.style.setProperty("--text",c.text||"#fff");
  r.style.setProperty("--accent",c.color||"#f39b2f");
  r.style.setProperty("--fontMain",c.fuente||"Arial");

  pNombre.innerText=c.nombre||"ALLCALOR";
  pSub.innerText=c.sub||"Centro de control";

  pBtn.style.background=c.color;
}

function cargar(){
  let c=get();

  nombre.value=c.nombre||"";
  sub.value=c.sub||"";
  color.value=c.color||"#f39b2f";
  bg.value=c.bg||"#0b0b0b";
  panel.value=c.panel||"#151515";
  text.value=c.text||"#ffffff";
  fuente.value=c.fuente||"Arial";

  aplicar(c);
}

function guardar(){
  let c={
    nombre:nombre.value,
    sub:sub.value,
    color:color.value,
    bg:bg.value,
    panel:panel.value,
    text:text.value,
    fuente:fuente.value
  };

  set(c);
  aplicar(c);
}

function tab(t){
  visual.classList.add("hidden");
  empresa.classList.add("hidden");
  document.getElementById(t).classList.remove("hidden");
}

function volver(){
  location.href="app.html";
}

/* preview en tiempo real */
document.querySelectorAll("input,select").forEach(el=>{
  el.oninput=()=>{
    guardar();
  };
});

cargar();

</script>

</body>
</html>
