<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Configuración</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#0b0b0b;
  color:#fff;
}

.wrap{
  max-width:600px;
  margin:40px auto;
  padding:20px;
}

.panel{
  background:#151515;
  border:1px solid #2b2b2b;
  border-radius:16px;
  padding:20px;
}

h1{
  color:#f39b2f;
  margin-bottom:20px;
}

input{
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border-radius:10px;
  border:1px solid #333;
  background:#101010;
  color:#fff;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.btn{
  background:#f39b2f;
  color:#111;
}

.btn-sec{
  background:#2b2b2b;
  color:#fff;
}
</style>
</head>

<body>

<div class="wrap">
  <div class="panel">
    <h1>Configuración</h1>

    <input id="nombre" placeholder="Nombre empresa">
    <input id="color" type="color">

    <button class="btn" onclick="guardar()">Guardar y volver</button>
    <button class="btn-sec" onclick="volver()">Volver</button>
  </div>
</div>

<script>

// CARGAR CONFIG
function getConfig(){
  return JSON.parse(localStorage.getItem("configAllcalor")) || {
    nombre:"ALLCALOR",
    color:"#f39b2f"
  };
}

// GUARDAR CONFIG
function setConfig(cfg){
  localStorage.setItem("configAllcalor", JSON.stringify(cfg));
}

// AL CARGAR
window.onload = function(){
  const cfg = getConfig();
  document.getElementById("nombre").value = cfg.nombre;
  document.getElementById("color").value = cfg.color;
};

// GUARDAR
function guardar(){
  const cfg = getConfig();

  cfg.nombre = document.getElementById("nombre").value;
  cfg.color = document.getElementById("color").value;

  setConfig(cfg);

  window.location.href = "app.html";
}

// VOLVER
function volver(){
  window.location.href = "app.html";
}

</script>

</body>
</html>
