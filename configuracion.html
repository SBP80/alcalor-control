<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Configuración · ALLCALOR</title>

<style>
:root{
  --bg:#0b0b0b;
  --panel:#151515;
  --panel2:#1d1d1d;
  --line:#2b2b2b;
  --text:#ffffff;
  --muted:#bdbdbd;
  --accent:#f39b2f;
  --btnText:#111111;
  --shadow:0 10px 24px rgba(0,0,0,.28);
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
}

.topbar{
  position:sticky;
  top:0;
  z-index:50;
  display:flex;
  justify-content:space-between;
  padding:14px 16px;
  background:rgba(11,11,11,.96);
  border-bottom:1px solid var(--line);
}

.brand-name{
  margin:0;
  color:var(--accent);
  font-size:28px;
  font-weight:800;
}

.topbar-right{
  display:flex;
  gap:10px;
}

.btn{
  border:none;
  border-radius:12px;
  padding:12px 16px;
  font-weight:800;
  background:var(--accent);
  color:var(--btnText);
}

.wrap{
  padding:16px;
}

.section{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:20px;
  padding:16px;
  margin-bottom:16px;
}

.section-title{
  color:var(--accent);
  font-size:22px;
}

.field{
  margin-bottom:12px;
}

input,select{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid var(--line);
  background:#101010;
  color:#fff;
}

.check{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.preview{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:20px;
  padding:16px;
}

.preview-card{
  background:var(--panel2);
  border-radius:14px;
  padding:12px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="topbar">
  <h1 class="brand-name">Configuración</h1>
  <div class="topbar-right">
    <button class="btn" onclick="saveAll()">Guardar</button>
    <button class="btn" onclick="goBack()">Volver</button>
  </div>
</div>

<div class="wrap">

<div class="section">
  <div class="section-title">Visual</div>

  <div class="field">
    <label>Nombre</label>
    <input id="cfgNombre">
  </div>

  <div class="field">
    <label>Subtítulo</label>
    <input id="cfgSubtitulo">
  </div>

  <div class="field">
    <label>Color</label>
    <input type="color" id="cfgColor">
  </div>

  <div class="check">
    <input type="checkbox" id="cfgMayus">
    <label>Mayúsculas</label>
  </div>

</div>

<div class="preview">
  <h2 id="prevName">ALLCALOR</h2>
  <div id="prevSub">Centro de control</div>

  <div class="preview-card">
    Clientes
    <br>
    <button>Abrir</button>
  </div>
</div>

</div>

<script>

let config={};

function getConfig(){
  try{return JSON.parse(localStorage.getItem("configAllcalor"))||{}}
  catch(e){return {}}
}

function setConfig(c){
  localStorage.setItem("configAllcalor",JSON.stringify(c));
}

function load(){
  config=getConfig();

  cfgNombre.value=config.nombre||"ALLCALOR";
  cfgSubtitulo.value=config.sub||"Centro de control";
  cfgColor.value=config.color||"#f39b2f";
  cfgMayus.checked=config.mayus||false;

  apply();
}

function apply(){
  let name=cfgNombre.value||"ALLCALOR";

  if(cfgMayus.checked) name=name.toUpperCase();

  prevName.textContent=name;
  prevSub.textContent=cfgSubtitulo.value;

  prevName.style.color=cfgColor.value;
}

function saveAll(){
  config={
    nombre:cfgNombre.value,
    sub:cfgSubtitulo.value,
    color:cfgColor.value,
    mayus:cfgMayus.checked
  };

  setConfig(config);
  alert("Guardado");
}
function goBack(){
  window.location.href="app.html";
}

document.querySelectorAll("input").forEach(el=>{
  el.addEventListener("input",apply);
  el.addEventListener("change",apply);
});

load();

</script>
</body>
</html>
