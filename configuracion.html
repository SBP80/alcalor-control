<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Configuración</title>

<style>
:root{
  --bg:#0b0b0b;
  --panel:#151515;
  --line:#2b2b2b;
  --text:#ffffff;
  --accent:#f39b2f;
}

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* LOGIN */
.login{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.login-box{
  background:#111;
  padding:20px;
  border-radius:10px;
  width:280px;
}

.login input{
  width:100%;
  padding:10px;
  margin-bottom:10px;
}

.login button{
  width:100%;
  padding:10px;
  background:var(--accent);
  border:none;
  font-weight:bold;
}

/* APP */
.app{
  display:none;
}

.header{
  display:flex;
  justify-content:space-between;
  padding:15px;
  border-bottom:1px solid var(--line);
}

.btn{
  padding:10px;
  border:none;
  border-radius:8px;
  font-weight:bold;
}

.wrap{
  display:flex;
  height:calc(100vh - 60px);
}

/* PANEL IZQUIERDA */
.left{
  width:350px;
  overflow:auto;
  padding:15px;
}

.section{
  margin-bottom:20px;
}

input, select{
  width:100%;
  padding:8px;
  margin-bottom:10px;
}

/* PREVIEW */
.right{
  flex:1;
  border-left:1px solid var(--line);
  padding:20px;
}

.preview{
  border:1px solid #333;
  padding:20px;
  border-radius:10px;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="login">
  <div class="login-box">
    <h3>Acceso configuración</h3>
    <input type="password" id="clave" placeholder="Código">
    <button onclick="entrar()">Entrar</button>
    <button onclick="volver()">Volver</button>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">

  <div class="header">
    <button class="btn" onclick="volver()">Volver</button>
    <button class="btn" onclick="guardarYVolver()">Guardar y volver</button>
  </div>

  <div class="wrap">

    <div class="left">

      <div class="section">
        <h3>Nombre</h3>
        <input id="nombre" placeholder="ALLCALOR PRO">
      </div>

      <div class="section">
        <h3>Color</h3>
        <input type="color" id="color">
      </div>

      <div class="section">
        <h3>Fuente</h3>
        <select id="fuente">
          <option style="font-family:Arial">Arial</option>
          <option style="font-family:Verdana">Verdana</option>
          <option style="font-family:Tahoma">Tahoma</option>
          <option style="font-family:Georgia">Georgia</option>
          <option style="font-family:Courier New">Courier</option>
        </select>
      </div>

      <div class="section">
        <h3>Tamaño</h3>
        <input type="range" id="tamano" min="14" max="40">
      </div>

      <div class="section">
        <h3>Logo</h3>
        <input type="file" id="logo">
      </div>

    </div>

    <div class="right">

      <div class="preview" id="preview">
        <h1 id="pNombre">ALLCALOR PRO</h1>
        <p>Vista previa</p>
      </div>

    </div>

  </div>

</div>

<script>

// CLAVE
const CLAVE = localStorage.getItem("claveConfig") || "1234";

// LOGIN
function entrar(){
  if(document.getElementById("clave").value === CLAVE){
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";
  }else{
    alert("Código incorrecto");
  }
}

// VOLVER
function volver(){
  window.location.href="app.html";
}

// CARGAR
function cargar(){
  let cfg = JSON.parse(localStorage.getItem("configAllcalor")) || {};

  nombre.value = cfg.nombre || "ALLCALOR PRO";
  color.value = cfg.color || "#f39b2f";
  fuente.value = cfg.fuente || "Arial";
  tamano.value = cfg.tamano || 20;

  actualizar();
}

// ACTUALIZAR
function actualizar(){
  pNombre.innerText = nombre.value;
  pNombre.style.color = color.value;
  pNombre.style.fontFamily = fuente.value;
  pNombre.style.fontSize = tamano.value+"px";
}

// GUARDAR
function guardarYVolver(){
  let cfg = {
    nombre:nombre.value,
    color:color.value,
    fuente:fuente.value,
    tamano:tamano.value
  };

  localStorage.setItem("configAllcalor", JSON.stringify(cfg));
  window.location.href="app.html";
}

// EVENTOS
document.querySelectorAll("input,select").forEach(el=>{
  el.addEventListener("input", actualizar);
});

// INIT
cargar();

</script>

</body>
</html>
