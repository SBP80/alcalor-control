<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Configuración</title>

  <style>
    :root{
      --bg:#0b0b0b;
      --panel:#151515;
      --line:#2b2b2b;
      --text:#ffffff;
      --accent:#f39b2f;
    }

    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
      padding:20px;
    }

    .box{
      max-width:600px;
      margin:auto;
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:12px;
      padding:20px;
    }

    h1{
      margin-top:0;
      color:var(--accent);
    }

    label{
      display:block;
      margin-top:15px;
      font-size:14px;
    }

    input, select{
      width:100%;
      padding:10px;
      margin-top:5px;
      border-radius:8px;
      border:none;
      background:#222;
      color:#fff;
    }

    .preview{
      margin-top:20px;
      padding:20px;
      border:1px solid var(--line);
      border-radius:10px;
      text-align:center;
    }

    .btns{
      margin-top:20px;
      display:flex;
      gap:10px;
    }

    button{
      flex:1;
      padding:12px;
      border:none;
      border-radius:10px;
      font-weight:bold;
      cursor:pointer;
    }

    .guardar{
      background:var(--accent);
      color:#111;
    }

    .volver{
      background:#444;
      color:#fff;
    }
  </style>
</head>

<body>

<div class="box">
  <h1>Configuración</h1>

  <label>Nombre</label>
  <input id="nombre">

  <label>Color</label>
  <input type="color" id="color">

  <label>Fuente</label>
  <select id="fuente">
    <option>Arial</option>
    <option>Verdana</option>
    <option>Tahoma</option>
    <option>Georgia</option>
    <option>Courier New</option>
  </select>

  <label>Tamaño</label>
  <input type="range" id="tamano" min="16" max="40">

  <div class="preview" id="preview">
    PREVISUALIZACIÓN
  </div>

  <div class="btns">
    <button class="volver" onclick="volver()">Volver</button>
    <button class="guardar" onclick="guardar()">Guardar y volver</button>
  </div>
</div>

<script>
  const nombre = document.getElementById("nombre");
  const color = document.getElementById("color");
  const fuente = document.getElementById("fuente");
  const tamano = document.getElementById("tamano");
  const preview = document.getElementById("preview");

  function cargar(){
    const cfg = JSON.parse(localStorage.getItem("configAllcalor")) || {};

    nombre.value = cfg.nombre || "ALLCALOR PRO";
    color.value = cfg.color || "#f39b2f";
    fuente.value = cfg.fuente || "Arial";
    tamano.value = cfg.tamano || 22;

    actualizar();
  }

  function actualizar(){
    preview.innerText = nombre.value;
    preview.style.color = color.value;
    preview.style.fontFamily = fuente.value;
    preview.style.fontSize = tamano.value + "px";
  }

  function guardar(){
    const cfg = {
      nombre: nombre.value,
      color: color.value,
      fuente: fuente.value,
      tamano: tamano.value
    };

    localStorage.setItem("configAllcalor", JSON.stringify(cfg));

    window.location.href = "app.html";
  }

  function volver(){
    window.location.href = "app.html";
  }

  nombre.oninput = actualizar;
  color.oninput = actualizar;
  fuente.onchange = actualizar;
  tamano.oninput = actualizar;

  cargar();
</script>

</body>
</html>
