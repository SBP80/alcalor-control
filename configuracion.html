<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Configuración</title>

<style>
:root{
  --bg:#0b0b0b;
  --panel:#151515;
  --line:#2b2b2b;
  --text:#fff;
  --muted:#aaa;
  --accent:#f39b2f;
}
body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
}
.wrap{
  padding:20px;
  max-width:800px;
  margin:auto;
}
h1{
  color:var(--accent);
}
.panel{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:14px;
  padding:16px;
  margin-bottom:16px;
}
label{
  font-size:12px;
  color:var(--muted);
}
input, select{
  width:100%;
  padding:10px;
  margin-top:6px;
  margin-bottom:12px;
  border-radius:10px;
  border:1px solid var(--line);
  background:#111;
  color:#fff;
}
button{
  padding:12px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}
.btn{
  background:var(--accent);
  color:#000;
  width:100%;
  margin-bottom:10px;
}
.btn-sec{
  background:#333;
  color:#fff;
  width:100%;
}
</style>
</head>

<body>

<div class="wrap">

<h1>Configuración</h1>

<div class="panel">
<h3>Empresa</h3>

<label>Nombre comercial</label>
<input id="nombre">

<label>Razón social</label>
<input id="razon">

<label>CIF</label>
<input id="cif">

<label>Teléfono</label>
<input id="telefono">

<label>Email</label>
<input id="email">

<label>Dirección</label>
<input id="direccion">
</div>

<div class="panel">
<h3>Diseño</h3>

<label>Color principal</label>
<input id="color" type="color">

<label>Mostrar reloj</label>
<select id="reloj">
<option value="true">Sí</option>
<option value="false">No</option>
</select>

<label>Mostrar fecha</label>
<select id="fecha">
<option value="true">Sí</option>
<option value="false">No</option>
</select>

<label>Mostrar botón notas</label>
<select id="notas">
<option value="true">Sí</option>
<option value="false">No</option>
</select>
</div>

<div class="panel">
<h3>Seguridad</h3>

<label>Nueva clave admin</label>
<input id="clave" type="password">
</div>

<div class="panel">
<h3>Notificaciones (preparado)</h3>

<label>Activar notificaciones</label>
<select id="notificaciones">
<option value="true">Sí</option>
<option value="false">No</option>
</select>

<label>Sonido</label>
<select id="sonido">
<option value="true">Sí</option>
<option value="false">No</option>
</select>
</div>

<button class="btn" onclick="guardar()">Guardar todo</button>
<button class="btn-sec" onclick="volver()">Volver</button>

</div>

<script>

function cargar(){
  const c = JSON.parse(localStorage.getItem("configAllcalor")) || {};

  nombre.value = c.nombre || "ALLCALOR";
  razon.value = c.razon || "";
  cif.value = c.cif || "";
  telefono.value = c.telefono || "";
  email.value = c.email || "";
  direccion.value = c.direccion || "";

  color.value = c.color || "#f39b2f";

  reloj.value = c.mostrarReloj !== false ? "true":"false";
  fecha.value = c.mostrarFecha !== false ? "true":"false";
  notas.value = c.mostrarNotas !== false ? "true":"false";

  notificaciones.value = c.notificaciones !== false ? "true":"false";
  sonido.value = c.sonido !== false ? "true":"false";
}

function guardar(){

  const cfg = {
    nombre: nombre.value,
    razon: razon.value,
    cif: cif.value,
    telefono: telefono.value,
    email: email.value,
    direccion: direccion.value,

    color: color.value,

    mostrarReloj: reloj.value === "true",
    mostrarFecha: fecha.value === "true",
    mostrarNotas: notas.value === "true",

    notificaciones: notificaciones.value === "true",
    sonido: sonido.value === "true"
  };

  localStorage.setItem("configAllcalor", JSON.stringify(cfg));

  if(clave.value){
    let users = JSON.parse(localStorage.getItem("allcalor_users")) || [];
    const admin = users.find(u => u.username === "admin");
    if(admin){
      admin.password = clave.value;
      localStorage.setItem("allcalor_users", JSON.stringify(users));
    }
  }

  alert("Guardado correctamente");
}

function volver(){
  window.location.href="app.html";
}

cargar();

</script>

</body>
</html>
