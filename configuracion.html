<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Configuración · ALLCALOR</title>

<style>
:root{
  --bg:#0b0b0b;
  --panel:#151515;
  --line:#2b2b2b;
  --text:#ffffff;
  --muted:#bdbdbd;
  --accent:#f39b2f;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
}

/* TOP */
.top{
  padding:16px;
  border-bottom:1px solid var(--line);
}
.top h1{
  margin:0;
  color:var(--accent);
}
.actions{
  margin-top:10px;
  display:flex;
  gap:10px;
}
button{
  border:none;
  padding:12px 16px;
  border-radius:12px;
  font-weight:700;
}
.btn-main{background:var(--accent);color:#000}
.btn-sec{background:#333;color:#fff}

/* LAYOUT */
.wrap{
  display:grid;
  grid-template-columns:260px 1fr 350px;
  gap:16px;
  padding:16px;
}

/* MENU */
.menu{
  background:var(--panel);
  padding:12px;
  border-radius:16px;
  border:1px solid var(--line);
}
.menu button{
  width:100%;
  margin-bottom:8px;
  background:#222;
  color:#fff;
}
.menu button.active{
  background:var(--accent);
  color:#000;
}

/* SECTION */
.section{
  background:var(--panel);
  padding:16px;
  border-radius:16px;
  border:1px solid var(--line);
}
.field{
  margin-bottom:12px;
}
input,select{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid var(--line);
  background:#101010;
  color:#fff;
}

/* PREVIEW */
.preview{
  background:var(--panel);
  padding:16px;
  border-radius:16px;
  border:1px solid var(--line);
}
.card{
  background:#222;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="top">
  <h1>Configuración</h1>
  <div class="actions">
    <button class="btn-main" onclick="guardar()">Guardar</button>
    <button class="btn-sec" onclick="volver()">Volver</button>
  </div>
</div>

<div class="wrap">

<!-- MENU -->
<div class="menu">
  <button class="active" onclick="mostrar('visual',this)">Visual</button>
  <button onclick="mostrar('empresa',this)">Empresa</button>
  <button onclick="mostrar('sistema',this)">Sistema</button>
</div>

<!-- CONTENIDO -->
<div>

<div id="visual" class="section">
  <h2>Visual</h2>

  <div class="field">
    <label>Nombre</label>
    <input id="nombre">
  </div>

  <div class="field">
    <label>Subtítulo</label>
    <input id="sub">
  </div>

  <div class="field">
    <label>Color principal</label>
    <input id="color" type="color">
  </div>

</div>

<div id="empresa" class="section" style="display:none">
  <h2>Empresa</h2>

  <div class="field">
    <label>Nombre empresa</label>
    <input id="empresaNombre">
  </div>

</div>

<div id="sistema" class="section" style="display:none">
  <h2>Sistema</h2>

  <div class="field">
    <label><input type="checkbox" id="reloj"> Mostrar reloj</label>
  </div>

</div>

</div>

<!-- PREVIEW -->
<div class="preview">
  <h3>Vista previa</h3>

  <h2 id="prevNombre">ALLCALOR</h2>
  <p id="prevSub">Centro de control</p>

  <div class="card">
    <b>Clientes</b><br>
    <button>Abrir</button>
  </div>

</div>

</div>

<script>

/* CAMBIAR SECCIÓN */
function mostrar(id,btn){
  document.querySelectorAll(".section").forEach(s=>s.style.display="none");
  document.getElementById(id).style.display="block";

  document.querySelectorAll(".menu button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}

/* GUARDAR */
function guardar(){
  const cfg={
    nombre:document.getElementById("nombre").value,
    sub:document.getElementById("sub").value,
    color:document.getElementById("color").value
  };
  localStorage.setItem("cfg",JSON.stringify(cfg));
  aplicar();
}

/* CARGAR */
function cargar(){
  const cfg=JSON.parse(localStorage.getItem("cfg")||"{}");
  document.getElementById("nombre").value=cfg.nombre||"ALLCALOR";
  document.getElementById("sub").value=cfg.sub||"Centro de control";
  document.getElementById("color").value=cfg.color||"#f39b2f";
  aplicar();
}

/* APLICAR */
function aplicar(){
  const cfg=JSON.parse(localStorage.getItem("cfg")||"{}");

  document.getElementById("prevNombre").textContent=cfg.nombre||"ALLCALOR";
  document.getElementById("prevSub").textContent=cfg.sub||"Centro de control";

  document.documentElement.style.setProperty("--accent",cfg.color||"#f39b2f");
}

/* VOLVER */
function volver(){
  window.location.href="app.html";
}

/* LIVE PREVIEW */
["nombre","sub","color"].forEach(id=>{
  document.getElementById(id).addEventListener("input",guardar);
});

cargar();

</script>

</body>
</html>
